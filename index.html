<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Battle Tanks - Multiplayer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #0a0f1a;
            touch-action: pan-x pan-y;
        }

        /* شاشة تسجيل الدخول */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a2a3a, #0a0f1a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-container {
            background: rgba(10, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #d4af37;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .login-container h1 {
            color: #d4af37;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .login-container p {
            color: #8a9aa8;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .login-container input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 30px;
            border: 1px solid #d4af37;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            outline: none;
        }

        .login-container input:focus {
            border-color: #ffd966;
            background: rgba(255,255,255,0.15);
        }

        .login-container button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-container button:active {
            transform: scale(0.98);
        }

        .switch-btn {
            background: transparent !important;
            color: #d4af37;
            border: 1px solid #d4af37 !important;
            margin-top: 10px;
        }

        /* الشاشة الرئيسية */
        .main-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0f1725, #070b14);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 900;
        }

        .main-screen h2 {
            color: #d4af37;
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(212,175,55,0.5);
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .play-btn {
            background: linear-gradient(135deg, #d4af37, #b8860b);
            padding: 18px 40px;
            border: none;
            border-radius: 60px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .wallet-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            padding: 18px 40px;
            border: none;
            border-radius: 60px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .admin-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            position: absolute;
            top: 20px;
            right: 20px;
            display: none;
        }

        .play-btn:active, .wallet-btn:active, .admin-btn:active {
            transform: scale(0.96);
        }

        .user-card {
            background: rgba(255,255,255,0.1);
            padding: 15px 30px;
            border-radius: 50px;
            margin-top: 30px;
            text-align: center;
            color: white;
            backdrop-filter: blur(5px);
        }

        .user-card div {
            margin: 5px 0;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 20px 40px;
            border-radius: 60px;
            color: #d4af37;
            display: none;
            z-index: 2000;
            font-size: 18px;
        }

        /* اللوبي */
        .lobby {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .lobby-container {
            background: linear-gradient(145deg, #1a2a3a, #0f1a24);
            padding: 30px;
            border-radius: 40px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            border: 2px solid #d4af37;
        }

        .lobby-container h2 {
            color: #d4af37;
            margin-bottom: 20px;
        }

        .seats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 30px 0;
        }

        .seat {
            background: #2a3a4a;
            padding: 15px;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            border: 1px solid #d4af37;
            transition: all 0.2s;
        }

        .seat:hover {
            background: #3a4a5a;
            transform: scale(1.02);
        }

        .seat.occupied {
            background: #2e7035;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .create-room-btn {
            background: #d4af37;
            color: #1a2a3a;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .lobby-status {
            color: #d4af37;
            margin-top: 20px;
            font-size: 18px;
        }

        .back-lobby-btn {
            background: #555;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            margin-top: 15px;
            cursor: pointer;
        }

        /* HUD اللعبة */
        .game-hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            pointer-events: none;
            z-index: 100;
        }

        .status-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            border-left: 3px solid #d4af37;
        }

        .team-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            text-align: right;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: auto;
        }

        .joystick {
            width: 120px;
            height: 120px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #d4af37;
            border-radius: 60px;
            position: relative;
            cursor: pointer;
        }

        .joystick-handle {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #d4af37, #b8860b);
            border-radius: 25px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .fire-btn {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #e55, #a22);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
            transition: transform 0.05s;
        }

        .fire-btn:active {
            transform: scale(0.95);
        }

        .cooldown {
            position: absolute;
            bottom: 120px;
            right: 40px;
            background: rgba(0,0,0,0.7);
            padding: 5px 15px;
            border-radius: 20px;
            color: #d4af37;
            font-size: 12px;
            pointer-events: none;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        .report-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .report-container {
            background: linear-gradient(145deg, #1a2a3a, #0f1a24);
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            border: 2px solid #d4af37;
            max-width: 400px;
            width: 90%;
        }

        .report-container h2 {
            color: #d4af37;
            margin-bottom: 20px;
        }

        .report-container p {
            color: white;
            margin: 15px 0;
            line-height: 1.8;
        }

        .back-home {
            background: linear-gradient(135deg, #d4af37, #b8860b);
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .joystick { width: 90px; height: 90px; }
            .fire-btn { width: 65px; height: 65px; font-size: 30px; }
            .seats { grid-template-columns: repeat(2, 1fr); }
            .play-btn, .wallet-btn { padding: 12px 25px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <!-- شاشة تسجيل الدخول -->
    <div class="login-screen" id="loginScreen">
        <div class="login-container">
            <h1>⚔️ BATTLE TANKS</h1>
            <p>ساحة المعركة الإلكترونية</p>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button id="loginBtn">🎖️ دخول المعركة</button>
            <button id="registerBtn" class="switch-btn">✨ إنشاء حساب جديد</button>
        </div>
    </div>

    <!-- الشاشة الرئيسية -->
    <div class="main-screen" id="mainScreen">
        <h2>BATTLE TANKS ELITE</h2>
        <div class="btn-group">
            <button class="play-btn" id="playBtn">🎮 العب الآن</button>
            <button class="wallet-btn" id="walletBtn">💰 المحفظة</button>
        </div>
        <div class="user-card">
            <div>👤 <span id="username">اللاعب</span></div>
            <div>💰 <span id="balance">0</span> $</div>
            <div>🏆 <span id="gamesPlayed">0</span> مباراة</div>
        </div>
        <button class="admin-btn" id="adminBtn">⚙️ لوحة التحكم</button>
    </div>

    <!-- شاشة اللوبي -->
    <div class="lobby" id="lobby">
        <div class="lobby-container">
            <h2>🏆 لوبي المعركة</h2>
            <div class="seats" id="seats"></div>
            <button class="create-room-btn" id="createRoomBtn">➕ إنشاء غرفة جديدة</button>
            <div class="lobby-status" id="lobbyStatus"></div>
            <button class="back-lobby-btn" id="backFromLobbyBtn">🏠 العودة للرئيسية</button>
        </div>
    </div>

    <!-- HUD اللعبة -->
    <div class="game-hud" id="gameHud">
        <div class="status-bar">
            <div>🎮 <span id="gameUsername">اللاعب</span></div>
            <div>💰 <span id="gameBalance">0</span> $</div>
            <div>❤️ <span id="health">100</span>%</div>
        </div>
        <div class="team-info">
            <div style="color:#ff8888;">🔴 الأحمر: <span id="team1">0</span></div>
            <div style="color:#88aaff;">🔵 الأزرق: <span id="team2">0</span></div>
        </div>
        <div class="cooldown" id="cooldown">✅ جاهز</div>
        <div class="controls">
            <div class="joystick" id="joystick">
                <div class="joystick-handle" id="joystickHandle"></div>
            </div>
            <div class="fire-btn" id="fireBtn">💥</div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <!-- شاشة النتائج -->
    <div class="report-screen" id="reportScreen">
        <div class="report-container">
            <h2>📊 تقرير المعركة</h2>
            <p id="reportText"></p>
            <button class="back-home" id="backHomeBtn">🏠 العودة للرئيسية</button>
        </div>
    </div>

    <div class="loading" id="loading">⏳ جاري التحميل...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        // Firebase Configuration
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyCvPo4HlsNhyf1WBmTzIr6CdR1c2lQ5sHU",
            authDomain: "boomb-fa3e7.firebaseapp.com",
            databaseURL: "https://boomb-fa3e7-default-rtdb.firebaseio.com",
            projectId: "boomb-fa3e7",
            storageBucket: "boomb-fa3e7.firebasestorage.app",
            messagingSenderId: "499624996530",
            appId: "1:499624996530:web:235f71e450845c748523ab",
            measurementId: "G-42P00L5HJ9"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // Server URL
        const SERVER_URL = "https://tank-yf0p.onrender.com";
        
        import io from 'https://cdn.socket.io/4.6.0/socket.io.esm.min.js';
        const socket = io(SERVER_URL);
        
        let currentUser = null;
        let currentBalance = 0;
        let isAdmin = false;
        
        // Socket Events
        socket.on('connect', () => {
            console.log('✅ Connected to server');
        });
        
        socket.on('auth_success', (data) => {
            console.log('✅ Auth success:', data);
            document.getElementById('loading').style.display = 'none';
            currentBalance = data.balance;
            isAdmin = data.isAdmin || false;
            
            // حفظ بيانات الجلسة في localStorage
            localStorage.setItem('adminToken', data.token || 'authenticated');
            localStorage.setItem('userEmail', data.email);
            localStorage.setItem('isAdmin', isAdmin);
            localStorage.setItem('userId', data.userId);
            
            document.getElementById('balance').innerText = currentBalance;
            document.getElementById('gameBalance').innerText = currentBalance;
            document.getElementById('gamesPlayed').innerText = data.gamesPlayed || 0;
            
            if (isAdmin) {
                document.getElementById('adminBtn').style.display = 'block';
            }
            
            showMainScreen();
        });
        
        socket.on('auth_error', (data) => {
            console.error('Auth error:', data);
            document.getElementById('loading').style.display = 'none';
            alert('خطأ في المصادقة: ' + data.message);
        });
        
        socket.on('lobby_joined', (data) => {
            console.log('Joined lobby, balance:', data.balance);
            currentBalance = data.balance;
            document.getElementById('balance').innerText = currentBalance;
            document.getElementById('gameBalance').innerText = currentBalance;
            if (data.isAdmin) {
                document.getElementById('adminBtn').style.display = 'block';
            }
        });
        
        socket.on('rooms_list', (data) => {
            displayRooms(data.rooms);
        });
        
        socket.on('room_created', (data) => {
            document.getElementById('lobbyStatus').innerHTML = '✅ تم إنشاء الغرفة، جاري انتظار لاعبين...';
        });
        
        socket.on('room_update', (data) => {
            updateSeatsDisplay(data.players, data.maxSeats);
            if (data.players.length === data.maxSeats) {
                document.getElementById('lobbyStatus').innerHTML = '🚀 اكتملت المقاعد! جاري بدء المعركة...';
            }
        });
        
        socket.on('game_start', (data) => {
            startGame(data);
        });
        
        socket.on('game_ended', (data) => {
            endGame(data);
        });
        
        socket.on('error', (data) => {
            console.error('Server error:', data);
            alert(data.message);
        });
        
        // Functions
        async function login(email, password) {
            if (!email || !password) {
                alert('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }
            document.getElementById('loading').style.display = 'flex';
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                currentUser = userCredential.user;
                const token = await currentUser.getIdToken();
                socket.emit('auth', { token });
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                alert('خطأ في تسجيل الدخول: ' + error.message);
            }
        }
        
        async function register(email, password) {
            if (!email || !password) {
                alert('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }
            if (password.length < 6) {
                alert('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }
            document.getElementById('loading').style.display = 'flex';
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                currentUser = userCredential.user;
                const token = await currentUser.getIdToken();
                socket.emit('auth', { token });
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                alert('خطأ في إنشاء الحساب: ' + error.message);
            }
        }
        
        function showMainScreen() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'flex';
            document.getElementById('username').innerText = currentUser.email.split('@')[0];
            document.getElementById('gameUsername').innerText = currentUser.email.split('@')[0];
        }
        
        function showLobby() {
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('lobby').style.display = 'flex';
            socket.emit('join_lobby');
        }
        
        function displayRooms(rooms) {
            const seatsContainer = document.getElementById('seats');
            if (!seatsContainer) return;
            
            if (!rooms || rooms.length === 0) {
                seatsContainer.innerHTML = '<div style="color:white; grid-column:span 4; text-align:center;">لا توجد غرف متاحة، اضغط "إنشاء غرفة جديدة"</div>';
                return;
            }
            
            seatsContainer.innerHTML = rooms.map(room => `
                <div class="seat" onclick="window.joinRoomById('${room.id}')">
                    <div>🏠 غرفة</div>
                    <div>👥 ${room.players}/${room.maxSeats}</div>
                </div>
            `).join('');
        }
        
        function updateSeatsDisplay(players, maxSeats) {
            const seatsContainer = document.getElementById('seats');
            if (!seatsContainer) return;
            
            seatsContainer.innerHTML = '';
            for (let i = 0; i < maxSeats; i++) {
                const isOccupied = i < players.length;
                const playerName = isOccupied ? (players[i]?.slice(0, 8) || 'لاعب') : 'شاغر';
                
                const seatDiv = document.createElement('div');
                seatDiv.className = 'seat' + (isOccupied ? ' occupied' : '');
                seatDiv.innerHTML = `
                    <div style="font-size:20px;">${i + 1}</div>
                    <div style="font-size:12px;">${playerName}</div>
                `;
                seatsContainer.appendChild(seatDiv);
            }
        }
        
        function createRoom() {
            socket.emit('create_room', { seats: 8 });
        }
        
        function joinRoom(roomId) {
            socket.emit('join_room', { roomId });
        }
        
        window.joinRoomById = joinRoom;
        
        function startGame(data) {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('gameHud').style.display = 'block';
            document.getElementById('canvas').style.display = 'block';
            console.log('Game started with players:', data.players);
        }
        
        function endGame(data) {
            document.getElementById('reportText').innerHTML = `
                🏆 ${data.message || 'انتهت المعركة!'}<br>
                💰 المكافأة: ${data.reward || 0} $<br>
                ⏱️ المدة: ${data.duration || 0} ثانية
            `;
            document.getElementById('reportScreen').style.display = 'flex';
            document.getElementById('gameHud').style.display = 'none';
            document.getElementById('canvas').style.display = 'none';
            
            if (data.reward) {
                currentBalance = (currentBalance || 0) + data.reward;
                document.getElementById('balance').innerText = currentBalance;
            }
        }
        
        function backToHome() {
            document.getElementById('reportScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'flex';
        }
        
        function goToWallet() {
            window.location.href = 'wallet.html';
        }
        
        function goToAdmin() {
            window.location.href = 'admin.html';
        }
        
        // Joystick
        function setupJoystick() {
            const joystick = document.getElementById('joystick');
            const handle = document.getElementById('joystickHandle');
            let active = false;
            
            const move = (e) => {
                if (!active) return;
                const rect = joystick.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;
                let dx = touch.clientX - (rect.left + rect.width/2);
                let dy = touch.clientY - (rect.top + rect.height/2);
                const distance = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                const angle = Math.atan2(dy, dx);
                dx = Math.cos(angle) * distance;
                dy = Math.sin(angle) * distance;
                handle.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                socket.emit('move', { x: dx / 50, y: dy / 50, timestamp: Date.now() });
            };
            
            joystick.addEventListener('touchstart', (e) => { e.preventDefault(); active = true; });
            joystick.addEventListener('mousedown', () => { active = true; });
            window.addEventListener('touchmove', move);
            window.addEventListener('mousemove', move);
            window.addEventListener('touchend', () => {
                active = false;
                handle.style.transform = 'translate(-50%, -50%)';
                socket.emit('move', { x: 0, y: 0 });
            });
            window.addEventListener('mouseup', () => {
                active = false;
                handle.style.transform = 'translate(-50%, -50%)';
                socket.emit('move', { x: 0, y: 0 });
            });
        }
        
        // Fire Button
        let lastShoot = 0;
        const SHOOT_COOLDOWN = 3000;
        
        function setupFireButton() {
            const fireBtn = document.getElementById('fireBtn');
            const cooldownEl = document.getElementById('cooldown');
            
            const shoot = () => {
                const now = Date.now();
                if (now - lastShoot < SHOOT_COOLDOWN) {
                    const remaining = Math.ceil((SHOOT_COOLDOWN - (now - lastShoot)) / 1000);
                    cooldownEl.innerHTML = `⏱️ ${remaining} ثواني`;
                    return;
                }
                lastShoot = now;
                cooldownEl.innerHTML = '⏱️ 3 ثواني';
                socket.emit('shoot', { timestamp: now });
                let count = 3;
                const interval = setInterval(() => {
                    count--;
                    if (count <= 0) {
                        clearInterval(interval);
                        cooldownEl.innerHTML = '✅ جاهز';
                    } else {
                        cooldownEl.innerHTML = `⏱️ ${count} ثواني`;
                    }
                }, 1000);
            };
            
            fireBtn.addEventListener('click', shoot);
            fireBtn.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });
        }
        
        // Initialize
        function init() {
            setupJoystick();
            setupFireButton();
            
            document.getElementById('loginBtn').onclick = () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                login(email, password);
            };
            
            document.getElementById('registerBtn').onclick = () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                register(email, password);
            };
            
            document.getElementById('playBtn').onclick = () => {
                showLobby();
            };
            
            document.getElementById('walletBtn').onclick = () => {
                goToWallet();
            };
            
            document.getElementById('adminBtn').onclick = () => {
                goToAdmin();
            };
            
            document.getElementById('createRoomBtn').onclick = () => {
                createRoom();
            };
            
            document.getElementById('backFromLobbyBtn').onclick = () => {
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'flex';
            };
            
            document.getElementById('backHomeBtn').onclick = () => {
                backToHome();
            };
        }
        
        init();
        console.log('🎮 Game ready!');
    </script>
</body>
</html>
