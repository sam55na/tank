<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VOXEL WARRIOR - شخصية حربية ثلاثية الأبعاد احترافية</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.85);
            padding: 12px 24px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 100;
            font-size: 14px;
            backdrop-filter: blur(8px);
            border-left: 4px solid #ff5500;
            font-weight: bold;
            direction: ltr;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
            font-family: monospace;
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            pointer-events: none;
        }
        @media (max-width: 768px) {
            #info { font-size: 10px; top: 10px; left: 10px; }
            #controls { font-size: 8px; }
        }
    </style>
</head>
<body>
    <div id="info">
        🔫 WAR MACHINE VOXEL | 💣 TACTICAL BOMB | ⚔️ HEAVY ARMOR | 22,500+ VOXELS
    </div>
    <div id="controls">
        🖱️ MOUSE DRAG TO ROTATE | 🔍 SCROLL TO ZOOM | 🎯 RIGHT CLICK TO PAN
    </div>
    <div class="instruction">
        PROFESSIONAL VOXEL ART | MILITARY GRADE
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==================== INITIALIZATION ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.004);
        
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(9, 6.5, 11);
        camera.lookAt(0, 3.5, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // Controls
        let controls;
        import('https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js').then(module => {
            controls = new module.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = false;
            controls.enableZoom = true;
            controls.zoomSpeed = 1.2;
            controls.rotateSpeed = 1.0;
            controls.target.set(0, 3.5, 0);
        });
        
        // ==================== ADVANCED LIGHTING ====================
        // Ambient
        const ambientLight = new THREE.AmbientLight(0x404060, 0.55);
        scene.add(ambientLight);
        
        // Key Light (Main)
        const keyLight = new THREE.DirectionalLight(0xffeedd, 1.4);
        keyLight.position.set(6, 8, 5);
        keyLight.castShadow = true;
        keyLight.receiveShadow = true;
        keyLight.shadow.mapSize.width = 2048;
        keyLight.shadow.mapSize.height = 2048;
        keyLight.shadow.camera.near = 0.5;
        keyLight.shadow.camera.far = 20;
        keyLight.shadow.camera.left = -8;
        keyLight.shadow.camera.right = 8;
        keyLight.shadow.camera.top = 8;
        keyLight.shadow.camera.bottom = -8;
        scene.add(keyLight);
        
        // Fill Light (Cool)
        const fillLight = new THREE.PointLight(0x4488ff, 0.45);
        fillLight.position.set(-3, 4, 4);
        scene.add(fillLight);
        
        // Rim Light (Back)
        const rimLight = new THREE.PointLight(0xffaa66, 0.6);
        rimLight.position.set(-2, 5, -6);
        scene.add(rimLight);
        
        // Ground Fill
        const groundFill = new THREE.PointLight(0x8866cc, 0.35);
        groundFill.position.set(0, -1, 0);
        scene.add(groundFill);
        
        // Bomb Glow (Pulsing)
        const bombGlow = new THREE.PointLight(0xff4422, 0.7);
        bombGlow.position.set(2.8, 3.2, 1.5);
        scene.add(bombGlow);
        
        // Helmet Light
        const helmetLight = new THREE.PointLight(0x00aaff, 0.4);
        helmetLight.position.set(-0.5, 4.8, 1.2);
        scene.add(helmetLight);
        
        // ==================== ENVIRONMENT ====================
        // Ground with shadow reception
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(16, 16),
            new THREE.ShadowMaterial({ opacity: 0.5, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -1.7;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // Grid reference
        const gridHelper = new THREE.GridHelper(18, 24, 0x88aaff, 0x335588);
        gridHelper.position.y = -1.68;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        // Starfield
        const starCount = 1500;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 300;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 120 - 60;
        }
        const starGeometry = new THREE.BufferGeometry();
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.06, transparent: true, opacity: 0.6 }));
        scene.add(stars);
        
        // ==================== VOXEL BUILDER ====================
        class VoxelArmor {
            constructor(scene, size = 0.105) {
                this.scene = scene;
                this.size = size;
                this.group = new THREE.Group();
                this.scene.add(this.group);
                this.count = 0;
            }
            
            add(x, y, z, color, emissive = null, metal = 0.7, rough = 0.3) {
                const geometry = new THREE.BoxGeometry(this.size, this.size, this.size);
                const material = new THREE.MeshStandardMaterial({
                    color: color,
                    emissive: emissive || 0x000000,
                    emissiveIntensity: emissive ? 0.5 : 0,
                    metalness: metal,
                    roughness: rough,
                    flatShading: false
                });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(x * this.size, y * this.size, z * this.size);
                cube.castShadow = true;
                cube.receiveShadow = true;
                this.group.add(cube);
                this.count++;
                return cube;
            }
        }
        
        const V = new VoxelArmor(scene, 0.108);
        
        // ==================== COLOR PALETTE ====================
        const C = {
            // Armor
            armorDark: 0x2d3238,
            armorMedium: 0x4a515c,
            armorLight: 0x6e7683,
            steel: 0x8c929c,
            titanium: 0xa8b0bc,
            // Military
            oliveDrab: 0x4a5d3c,
            armyGreen: 0x5c7048,
            desertTan: 0xbc9a6c,
            // Accents
            dangerRed: 0xcc4422,
            bloodRed: 0xaa3322,
            gold: 0xdcb85c,
            copper: 0xc97e4a,
            // Tech
            visorBlue: 0x2266aa,
            cyberBlue: 0x2a88cc,
            plasmaOrange: 0xff6633,
            // Details
            black: 0x1a1e24,
            darkGrey: 0x333a44,
            silver: 0xbcc4d0,
            leather: 0x8b6946,
            // Bomb
            bombBody: 0x4a6a3a,
            bombStripe: 0xe8b84a,
            warhead: 0xbd7a4a
        };
        
        // ==================== BUILD CHARACTER ====================
        
        // ---- TORSO (ARMORED CORE) ----
        for (let x = -6; x <= 6; x++) {
            for (let y = 12; y <= 30; y++) {
                for (let z = -4; z <= 4; z++) {
                    let color = C.armorDark;
                    let emissive = null;
                    let metal = 0.65;
                    
                    // Chest Plate (Heavy Armor)
                    if (y >= 18 && y <= 28 && Math.abs(x) <= 4.5 && z === 4) {
                        color = C.armorMedium;
                        metal = 0.75;
                    }
                    // Central Chest Core
                    if (y >= 20 && y <= 27 && Math.abs(x) <= 2 && z === 4) {
                        color = C.steel;
                        metal = 0.85;
                    }
                    // Tactical Vest Pockets
                    if (x === -4 && z === 4 && y >= 20 && y <= 26 && y % 2 === 0) {
                        color = C.oliveDrab;
                        metal = 0.3;
                    }
                    if (x === 4 && z === 4 && y >= 20 && y <= 26 && y % 2 === 0) {
                        color = C.oliveDrab;
                    }
                    // Ammo Pouches (Left Side)
                    if (x === -5 && z === 3 && y >= 17 && y <= 23) {
                        color = C.leather;
                        metal = 0.2;
                    }
                    // Utility Belt
                    if (y === 17 && Math.abs(x) <= 5 && Math.abs(z) <= 3) {
                        color = C.leather;
                    }
                    // Radio / Comms Unit
                    if (x === 5 && y === 24 && z === 4) {
                        color = C.black;
                    }
                    if (x === 5 && y === 25 && z === 4) {
                        color = C.dangerRed;
                        emissive = C.dangerRed;
                    }
                    
                    V.add(x, y, z, color, emissive, metal);
                }
            }
        }
        
        // ---- HEAD WITH TACTICAL HELMET ----
        for (let x = -5; x <= 5; x++) {
            for (let y = 31; y <= 43; y++) {
                for (let z = -4; z <= 4; z++) {
                    let color = C.armorDark;
                    let emissive = null;
                    
                    // Helmet Base
                    if (y >= 32 && y <= 42) color = C.armorMedium;
                    
                    // Visor (Tactical Eye Shield)
                    if (y >= 35 && y <= 40 && z === 4 && Math.abs(x) <= 3.5) {
                        color = C.visorBlue;
                        emissive = C.visorBlue;
                    }
                    // Visor Frame
                    if ((y === 35 || y === 40) && z === 4 && Math.abs(x) <= 3.5) {
                        color = C.titanium;
                        emissive = null;
                    }
                    // Helmet Crest
                    if (y === 43 && Math.abs(x) <= 2 && Math.abs(z) <= 1.5) {
                        color = C.gold;
                        metal = 0.9;
                    }
                    // Night Vision Mount
                    if (x === 4 && y === 40 && z === 3) {
                        color = C.black;
                    }
                    // Left Side Camera
                    if (x === -4 && y === 38 && z === 4) {
                        color = C.cyberBlue;
                        emissive = C.cyberBlue;
                    }
                    // Right Side Antenna
                    if (x === 5 && y === 41 && z === 1) {
                        color = C.silver;
                    }
                    if (x === 5 && y === 42 && z === 1) {
                        color = C.dangerRed;
                        emissive = C.dangerRed;
                    }
                    // Jaw Guard
                    if (z === -4 && y >= 34 && y <= 39 && Math.abs(x) <= 3) {
                        color = C.armorDark;
                    }
                    // Breathing Filters
                    if (z === -4 && (y === 36 || y === 37) && Math.abs(x) === 2) {
                        color = C.black;
                    }
                    
                    V.add(x, y, z, color, emissive);
                }
            }
        }
        
        // ---- SHOULDER PAULDRONS (HEAVY) ----
        // Right Pauldron (Layered)
        for (let dx = 0; dx <= 4; dx++) {
            for (let dy = 0; dy <= 5; dy++) {
                for (let dz = -3; dz <= 3; dz++) {
                    let color = C.armorMedium;
                    if (dx >= 3) color = C.steel;
                    if (dy === 5 && dx === 2) color = C.copper;
                    V.add(7 + dx, 27 + dy, dz, color, null, 0.8);
                }
            }
        }
        // Left Pauldron with Insignia
        for (let dx = 0; dx <= 3; dx++) {
            for (let dy = 0; dy <= 4; dy++) {
                for (let dz = -2.5; dz <= 2.5; dz++) {
                    V.add(-8 - dx, 27 + dy, dz, C.armorMedium, null, 0.75);
                }
            }
        }
        // Insignia (Skull/Cross)
        V.add(-10, 30, -1, C.silver);
        V.add(-10, 30, 0, C.silver);
        V.add(-9, 29, 0, C.dangerRed);
        V.add(-9, 31, 0, C.dangerRed);
        
        // ---- ARMS (ARMORED WITH SERVOS) ----
        // Right Arm (Bomb Carrier - Reinforced)
        for (let y = 24; y <= 32; y++) {
            for (let x = 8; x <= 12; x++) {
                for (let z = -2.5; z <= 2.5; z++) {
                    let color = C.armorDark;
                    if (y > 28) color = C.armorMedium;
                    V.add(x, y, z, color);
                }
            }
        }
        // Right Forearm with Gauntlet
        for (let y = 33; y <= 38; y++) {
            for (let x = 11; x <= 14; x++) {
                for (let z = -2; z <= 2.5; z++) {
                    V.add(x, y, z, C.steel, null, 0.7);
                }
            }
        }
        // Hydraulic Pistons (Right Arm)
        for (let y = 30; y <= 35; y++) {
            V.add(13, y, -3, C.silver, null, 0.85);
            V.add(13, y, 2, C.silver);
        }
        
        // Left Arm (Support)
        for (let y = 24; y <= 31; y++) {
            for (let x = -12; x <= -8; x++) {
                for (let z = -2.5; z <= 2.5; z++) {
                    V.add(x, y, z, C.armorDark);
                }
            }
        }
        for (let y = 32; y <= 36; y++) {
            for (let x = -13; x <= -9; x++) {
                for (let z = -2; z <= 2; z++) {
                    V.add(x, y, z, C.armorMedium);
                }
            }
        }
        
        // ---- LEGS (HEAVY ARMOR) ----
        // Right Leg
        for (let y = 0; y <= 12; y++) {
            for (let x = 2; x <= 6; x++) {
                for (let z = -2.5; z <= 2.5; z++) {
                    let color = y < 10 ? C.armorDark : C.black;
                    if (y >= 5 && y <= 10 && x === 6) color = C.steel;
                    V.add(x, y, z, color);
                }
            }
        }
        // Left Leg
        for (let y = 0; y <= 12; y++) {
            for (let x = -6; x <= -2; x++) {
                for (let z = -2.5; z <= 2.5; z++) {
                    let color = y < 10 ? C.armorDark : C.black;
                    if (y >= 5 && y <= 10 && x === -6) color = C.steel;
                    V.add(x, y, z, color);
                }
            }
        }
        // Knee Guards
        for (let y = 7; y <= 9; y++) {
            V.add(4, y, -3, C.titanium, null, 0.85);
            V.add(5, y, -3, C.titanium);
            V.add(-4, y, -3, C.titanium);
            V.add(-5, y, -3, C.titanium);
        }
        // Combat Boots
        for (let x = 2; x <= 7; x++) {
            for (let z = -3; z <= -1; z++) {
                V.add(x, 0, z, C.black, null, 0.3);
                V.add(x, 1, z, C.black);
                V.add(-x+1, 0, z, C.black);
            }
        }
        // Boot Armor Plates
        V.add(3, 2, -3, C.steel);
        V.add(4, 2, -3, C.steel);
        V.add(-3, 2, -3, C.steel);
        V.add(-4, 2, -3, C.steel);
        
        // ---- TACTICAL BOMB (DETAILED) ----
        const bombBaseX = 12.5;
        const bombBaseY = 27.5;
        
        // Main Body
        for (let z = -3.5; z <= 3.5; z++) {
            for (let y = 0; y <= 7; y++) {
                for (let x = 0; x <= 5; x++) {
                    let color = C.bombBody;
                    if (Math.abs(z) >= 3 && y > 1 && y < 6) color = C.bombStripe;
                    if (y === 0 || y === 7) color = C.armyGreen;
                    V.add(bombBaseX + x, bombBaseY + y, z, color);
                }
            }
        }
        
        // Warhead (Cone)
        for (let i = 1; i <= 4; i++) {
            for (let z = -1.5; z <= 1.5; z++) {
                V.add(bombBaseX + 5 + i, bombBaseY + 2 + i, z, C.warhead, null, 0.85);
            }
        }
        V.add(bombBaseX + 9, bombBaseY + 6, 0, C.plasmaOrange, C.plasmaOrange, 0.9);
        
        // Tail Fins (X-Wing Style)
        const finPositions = [[-1, 2], [-1, 5], [4, 2], [4, 5]];
        finPositions.forEach(([dx, dy]) => {
            for (let z = -3.5; z <= 3.5; z += 7) {
                V.add(bombBaseX + dx, bombBaseY + dy, z, C.titanium, null, 0.8);
            }
        });
        
        // Secondary Fins
        V.add(bombBaseX + 0, bombBaseY + 3, -4, C.silver);
        V.add(bombBaseX + 0, bombBaseY + 4, -4, C.silver);
        V.add(bombBaseX + 4, bombBaseY + 3, -4, C.silver);
        
        // Bomb Harness / Straps
        for (let x = 7; x <= 13; x++) {
            V.add(x, bombBaseY + 3.5, -4.5, C.leather);
            V.add(x, bombBaseY + 4.5, -4.5, C.leather);
        }
        
        // ---- WEAPONRY & AMMO DETAILS ----
        // Chest Ammo Belt
        for (let x = -4; x <= 4; x += 1.5) {
            V.add(x, 23, 4.5, C.copper, null, 0.85);
        }
        // Grenades on Belt
        for (let i = 0; i < 4; i++) {
            V.add(-2 + i * 1.5, 10.5, -3.5, C.armyGreen);
            V.add(-2 + i * 1.5, 11.5, -3.5, C.armyGreen);
        }
        // Sidearm Holster
        V.add(5, 15, -3.5, C.leather);
        V.add(5, 16, -3.5, C.leather);
        V.add(5.5, 15.5, -4, C.black);
        
        // Backpack / Power Unit
        for (let x = -2; x <= 3; x++) {
            for (let y = 19; y <= 24; y++) {
                V.add(x, y, -5.5, C.armorMedium);
            }
        }
        V.add(0, 22, -6, C.cyberBlue, C.cyberBlue);
        V.add(1, 22, -6, C.cyberBlue, C.cyberBlue);
        
        // Hydraulic Cables (Neck to Shoulder)
        for (let y = 28; y <= 32; y++) {
            V.add(6, y, -3, C.silver, null, 0.7);
            V.add(-6, y, -3, C.silver);
        }
        
        // Battle Damage Scars
        V.add(3, 18, 4, 0x442200);
        V.add(2, 25, 4, 0x331100);
        V.add(-4, 21, 4, 0x552200);
        V.add(8, 30, 1, 0x331100);
        
        // Thermal Vents (Shoulders)
        for (let i = 0; i < 3; i++) {
            V.add(10, 28 + i, -3, C.plasmaOrange, C.plasmaOrange, 0.9);
            V.add(-9, 28 + i, -3, C.plasmaOrange, C.plasmaOrange);
        }
        
        // ==================== ATMOSPHERIC EFFECTS ====================
        // Dust Particles
        const dustCount = 800;
        const dustGeo = new THREE.BufferGeometry();
        const dustPos = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            dustPos[i*3] = (Math.random() - 0.5) * 16;
            dustPos[i*3+1] = Math.random() * 8;
            dustPos[i*3+2] = (Math.random() - 0.5) * 14;
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        const dustParticles = new THREE.Points(dustGeo, new THREE.PointsMaterial({ color: 0x88aaff, size: 0.018, transparent: true, opacity: 0.35 }));
        scene.add(dustParticles);
        
        // Muzzle Flash Effect (Decorative)
        const flashGeo = new THREE.SphereGeometry(0.12, 8, 8);
        const flashMat = new THREE.MeshStandardMaterial({ color: 0xff6633, emissive: 0xff4411, emissiveIntensity: 0.8 });
        const muzzleFlash = new THREE.Mesh(flashGeo, flashMat);
        muzzleFlash.position.set(14, 35, 1);
        scene.add(muzzleFlash);
        
        // ==================== ANIMATION LOOP ====================
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // Pulsing Effects
            const pulse = 0.55 + Math.sin(time * 12) * 0.25;
            bombGlow.intensity = pulse;
            helmetLight.intensity = 0.35 + Math.sin(time * 8) * 0.15;
            
            // Rotating Stars
            stars.rotation.y += 0.0003;
            stars.rotation.x += 0.0001;
            dustParticles.rotation.y += 0.0005;
            
            // Muzzle Flash Flicker
            muzzleFlash.scale.setScalar(0.8 + Math.random() * 0.6);
            
            // Update Controls
            if (controls) controls.update();
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // ==================== RESIZE HANDLER ====================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log(`✅ WARRIOR BUILT | Total Voxels: ${V.count} | Armor Class: Heavy | Combat Ready`);
    </script>
</body>
</html>
