<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شخصية 3D احترافية - Three.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 100;
            pointer-events: none;
            backdrop-filter: blur(5px);
        }
        
        #controls-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 100;
            font-size: 12px;
            pointer-events: none;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>شخصية 3D احترافية</h2>
        <p>شخصية واقعية مع إضاءة ديناميكية وظلال</p>
    </div>
    <div id="controls-panel">
        🖱️ اسحب للتدوير | 🔍 مرر للتكبير | 🖱️ زر يمين للتحريك
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // إعداد المشهد
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008); // ضباب خفيف للعمق

        // إعداد الكاميرا
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 7);
        camera.lookAt(0, 1.5, 0);

        // إعداد الـ Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // تفعيل الظلال
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // ظلال ناعمة
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // CSS2 Renderer للنصوص
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // إعداد عناصر التحكم
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.5;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 1.5, 0);

        // ==================== الإضاءة الاحترافية ====================
        
        // Ambient Light - إضاءة محيطية
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        // Main Directional Light - الضوء الرئيسي
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        mainLight.position.set(5, 8, 3);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 15;
        mainLight.shadow.camera.left = -5;
        mainLight.shadow.camera.right = 5;
        mainLight.shadow.camera.top = 5;
        mainLight.shadow.camera.bottom = -5;
        scene.add(mainLight);
        
        // Fill Light from below - إضاءة تعبئة من الأسفل
        const fillLight = new THREE.PointLight(0x4466cc, 0.4);
        fillLight.position.set(0, -1, 0);
        scene.add(fillLight);
        
        // Back Rim Light - إضاءة خلفية لتحديد الحواف
        const rimLight = new THREE.PointLight(0xffaa66, 0.6);
        rimLight.position.set(-3, 2, -4);
        scene.add(rimLight);
        
        // Colored accent lights - إضاءات ملونة جانبية
        const leftAccent = new THREE.PointLight(0xff66aa, 0.3);
        leftAccent.position.set(-3, 2, 2);
        scene.add(leftAccent);
        
        const rightAccent = new THREE.PointLight(0x66ffaa, 0.3);
        rightAccent.position.set(3, 2, 2);
        scene.add(rightAccent);
        
        // Spotlight for dramatic effect
        const spotLight = new THREE.SpotLight(0xffaa66, 0.5);
        spotLight.position.set(2, 5, 3);
        spotLight.castShadow = true;
        spotLight.angle = 0.3;
        spotLight.penumbra = 0.5;
        spotLight.distance = 15;
        scene.add(spotLight);
        
        // Helper lights visualization (optional - للتصحيح)
        // const helper = new THREE.DirectionalLightHelper(mainLight, 0.5);
        // scene.add(helper);
        
        // ==================== إنشاء الشخصية ====================
        const character = new THREE.Group();
        
        // مواد واقعية
        const skinMaterial = new THREE.MeshStandardMaterial({
            color: 0xf5d0a9,
            roughness: 0.35,
            metalness: 0.05,
            emissive: 0x000000,
            emissiveIntensity: 0
        });
        
        const eyeMaterial = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            roughness: 0.2,
            metalness: 0.9,
            emissive: 0x4488ff,
            emissiveIntensity: 0.1
        });
        
        const pupilMaterial = new THREE.MeshStandardMaterial({
            color: 0x000000,
            roughness: 0.1,
            metalness: 0.1
        });
        
        const hairMaterial = new THREE.MeshStandardMaterial({
            color: 0x4a3728,
            roughness: 0.6,
            metalness: 0.1
        });
        
        const clothesMaterial = new THREE.MeshStandardMaterial({
            color: 0x2c5530,
            roughness: 0.4,
            metalness: 0.1,
            emissive: 0x112211,
            emissiveIntensity: 0.1
        });
        
        const pantsMaterial = new THREE.MeshStandardMaterial({
            color: 0x2a2a3a,
            roughness: 0.5,
            metalness: 0.05
        });
        
        // الجسم
        const body = new THREE.Mesh(
            new THREE.CylinderGeometry(0.45, 0.5, 1.2, 32),
            clothesMaterial
        );
        body.position.y = 0.6;
        body.castShadow = true;
        body.receiveShadow = true;
        character.add(body);
        
        // الرأس
        const head = new THREE.Mesh(
            new THREE.SphereGeometry(0.45, 64, 64),
            skinMaterial
        );
        head.position.y = 1.25;
        head.castShadow = true;
        head.receiveShadow = true;
        character.add(head);
        
        // العين اليسرى
        const leftEye = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 32, 32),
            eyeMaterial
        );
        leftEye.position.set(-0.16, 1.38, 0.42);
        leftEye.castShadow = true;
        character.add(leftEye);
        
        // العين اليمنى
        const rightEye = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 32, 32),
            eyeMaterial
        );
        rightEye.position.set(0.16, 1.38, 0.42);
        rightEye.castShadow = true;
        character.add(rightEye);
        
        // بؤبؤ العين
        const leftPupil = new THREE.Mesh(
            new THREE.SphereGeometry(0.06, 32, 32),
            pupilMaterial
        );
        leftPupil.position.set(-0.16, 1.36, 0.54);
        character.add(leftPupil);
        
        const rightPupil = new THREE.Mesh(
            new THREE.SphereGeometry(0.06, 32, 32),
            pupilMaterial
        );
        rightPupil.position.set(0.16, 1.36, 0.54);
        character.add(rightPupil);
        
        // الأنف
        const nose = new THREE.Mesh(
            new THREE.CylinderGeometry(0.08, 0.1, 0.12, 16),
            skinMaterial
        );
        nose.position.set(0, 1.28, 0.48);
        nose.castShadow = true;
        character.add(nose);
        
        // الفم (قوس)
        const mouth = new THREE.Mesh(
            new THREE.TorusGeometry(0.1, 0.03, 16, 32, Math.PI),
            new THREE.MeshStandardMaterial({ color: 0xcc8866, roughness: 0.3 })
        );
        mouth.rotation.x = 0.1;
        mouth.rotation.z = 0.1;
        mouth.position.set(0, 1.18, 0.48);
        character.add(mouth);
        
        // الشعر
        const hair = new THREE.Mesh(
            new THREE.SphereGeometry(0.48, 32, 32),
            hairMaterial
        );
        hair.scale.set(1.05, 0.4, 1.1);
        hair.position.y = 1.62;
        hair.castShadow = true;
        character.add(hair);
        
        // خصلة شعر أمامية
        const hairFront = new THREE.Mesh(
            new THREE.ConeGeometry(0.15, 0.12, 16),
            hairMaterial
        );
        hairFront.position.set(0, 1.7, 0.42);
        hairFront.castShadow = true;
        character.add(hairFront);
        
        // الأذنين
        const leftEar = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 32, 32),
            skinMaterial
        );
        leftEar.position.set(-0.45, 1.28, 0);
        leftEar.castShadow = true;
        character.add(leftEar);
        
        const rightEar = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 32, 32),
            skinMaterial
        );
        rightEar.position.set(0.45, 1.28, 0);
        rightEar.castShadow = true;
        character.add(rightEar);
        
        // الذراع الأيسر
        const leftArm = new THREE.Mesh(
            new THREE.CylinderGeometry(0.12, 0.1, 0.9, 16),
            clothesMaterial
        );
        leftArm.position.set(-0.55, 1.05, 0);
        leftArm.castShadow = true;
        character.add(leftArm);
        
        // الذراع الأيمن
        const rightArm = new THREE.Mesh(
            new THREE.CylinderGeometry(0.12, 0.1, 0.9, 16),
            clothesMaterial
        );
        rightArm.position.set(0.55, 1.05, 0);
        rightArm.castShadow = true;
        character.add(rightArm);
        
        // الساق اليسرى
        const leftLeg = new THREE.Mesh(
            new THREE.CylinderGeometry(0.14, 0.12, 0.85, 16),
            pantsMaterial
        );
        leftLeg.position.set(-0.22, 0.2, 0);
        leftLeg.castShadow = true;
        character.add(leftLeg);
        
        // الساق اليمنى
        const rightLeg = new THREE.Mesh(
            new THREE.CylinderGeometry(0.14, 0.12, 0.85, 16),
            pantsMaterial
        );
        rightLeg.position.set(0.22, 0.2, 0);
        rightLeg.castShadow = true;
        character.add(rightLeg);
        
        // إضافة حزام
        const belt = new THREE.Mesh(
            new THREE.TorusGeometry(0.48, 0.05, 16, 64),
            new THREE.MeshStandardMaterial({ color: 0x8b5a2b, metalness: 0.6, roughness: 0.4 })
        );
        belt.rotation.x = Math.PI / 2;
        belt.position.y = 0.55;
        character.add(belt);
        
        scene.add(character);
        
        // ==================== إضافة كرة بلورية سحرية ====================
        const crystalBall = new THREE.Mesh(
            new THREE.SphereGeometry(0.25, 64, 64),
            new THREE.MeshStandardMaterial({
                color: 0x88aaff,
                metalness: 0.9,
                roughness: 0.2,
                emissive: 0x224466,
                emissiveIntensity: 0.3,
                transparent: true,
                opacity: 0.85
            })
        );
        crystalBall.position.set(0.8, 1.4, 0.6);
        crystalBall.castShadow = true;
        scene.add(crystalBall);
        
        // ==================== الأرضية ====================
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(12, 12),
            new THREE.MeshStandardMaterial({
                color: 0x2a2a3a,
                roughness: 0.7,
                metalness: 0.1,
                side: THREE.DoubleSide
            })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.1;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // شبكة مساعدة على الأرض
        const gridHelper = new THREE.GridHelper(12, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.08;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.3;
        scene.add(gridHelper);
        
        // ==================== جزيئات متطايرة (تأثير سحري) ====================
        const particleCount = 400;
        const particlesGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i * 3] = (Math.random() - 0.5) * 12;
            particlePositions[i * 3 + 1] = Math.random() * 4;
            particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 10 - 2;
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        
        const particleMaterial = new THREE.PointsMaterial({
            color: 0x88aaff,
            size: 0.03,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });
        
        const particles = new THREE.Points(particlesGeometry, particleMaterial);
        scene.add(particles);
        
        // ==================== نص CSS2D ====================
        const nameDiv = document.createElement('div');
        nameDiv.textContent = '✨ شخصية واقعية ✨';
        nameDiv.style.color = '#fff';
        nameDiv.style.fontSize = '18px';
        nameDiv.style.fontWeight = 'bold';
        nameDiv.style.textShadow = '0 0 10px rgba(0,0,0,0.5)';
        nameDiv.style.background = 'rgba(0,0,0,0.6)';
        nameDiv.style.padding = '5px 15px';
        nameDiv.style.borderRadius = '20px';
        nameDiv.style.backdropFilter = 'blur(5px)';
        nameDiv.style.border = '1px solid rgba(255,255,255,0.3)';
        
        const nameLabel = new CSS2DObject(nameDiv);
        nameLabel.position.set(0, 2.1, 0);
        character.add(nameLabel);
        
        // ==================== حلقة التحريك ====================
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            
            // حركة خفيفة للشخصية (تنفس)
            const breath = Math.sin(time * 2) * 0.003;
            character.position.y = breath;
            
            // حركة العيون (نظرات خفيفة)
            leftPupil.position.x = -0.16 + Math.sin(time * 0.8) * 0.008;
            rightPupil.position.x = 0.16 + Math.sin(time * 0.8) * 0.008;
            
            // دوران الكرة البلورية
            crystalBall.rotation.y = time * 0.5;
            crystalBall.rotation.x = Math.sin(time * 0.7) * 0.3;
            
            // حركة الجزيئات
            particles.rotation.y = time * 0.05;
            particles.rotation.x = Math.sin(time * 0.1) * 0.1;
            
            // تغيير ألوان الإضاءة الجانبية ببطء
            const hue = (time * 0.1) % (Math.PI * 2);
            leftAccent.intensity = 0.3 + Math.sin(time * 0.5) * 0.1;
            rightAccent.intensity = 0.3 + Math.cos(time * 0.5) * 0.1;
            
            // تحديث عناصر التحكم
            controls.update();
            
            //渲染
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        // ==================== معالجة تغيير حجم النافذة ====================
        window.addEventListener('resize', onWindowResize, false);
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // تأثير دخول سلس
        character.scale.set(0, 0, 0);
        setTimeout(() => {
            let scaleAnim = 0;
            const scaleInterval = setInterval(() => {
                scaleAnim += 0.05;
                character.scale.set(scaleAnim, scaleAnim, scaleAnim);
                if (scaleAnim >= 1) clearInterval(scaleInterval);
            }, 20);
        }, 100);
        
        console.log('تم تحميل المشهد ثلاثي الأبعاد بنجاح!');
    </script>
</body>
</html>
