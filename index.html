<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dwarf Bomber - Fixed | Working Joystick | Working Bomb Predictor</title>
    <style>
        * {
            box-sizing: border-box;
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #0a2f1f;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Overlay */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 30;
        }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 40;
        }
        #crosshair .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 34px;
            height: 34px;
            border: 2px solid #ffaa44;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #crosshair .dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #ffaa44;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        #crosshair .line-h, #crosshair .line-v {
            position: absolute;
            background: #ffaa44;
        }
        #crosshair .line-h {
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            transform: translateY(-50%);
        }
        #crosshair .line-v {
            top: 0;
            left: 50%;
            width: 1px;
            height: 100%;
            transform: translateX(-50%);
        }

        /* Info Panels */
        #info-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            color: #ffdd99;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 11px;
            font-weight: bold;
            border-left: 3px solid #ffaa44;
            pointer-events: none;
            z-index: 50;
        }
        #score-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            color: #ffaa44;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 32px;
            font-family: monospace;
            pointer-events: none;
            z-index: 50;
        }

        /* LEFT ZONE - Movement Joystick */
        #left-zone {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50%;
            height: 100%;
            pointer-events: auto;
            z-index: 60;
        }
        .joystick-base {
            position: absolute;
            bottom: 80px;
            left: 80px;
            width: 150px;
            height: 150px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            border: 2px solid #ffaa55;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .joystick-thumb {
            position: absolute;
            width: 65px;
            height: 65px;
            background: radial-gradient(circle, #ffcc77, #ffaa33);
            border-radius: 50%;
            box-shadow: 0 4px 12px black;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* RIGHT ZONE - Camera Control */
        #right-zone {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 50%;
            height: 100%;
            pointer-events: auto;
            z-index: 60;
        }
        .camera-hint {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: rgba(255,255,200,0.7);
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 6px 14px;
            border-radius: 24px;
            pointer-events: none;
        }

        /* Distance Slider */
        #slider-area {
            position: absolute;
            bottom: 120px;
            left: 25px;
            width: 55px;
            height: 200px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            border: 2px solid #ffaa55;
            pointer-events: auto;
            z-index: 70;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }
        #slider-thumb {
            width: 45px;
            height: 45px;
            background: #ffaa55;
            border-radius: 50%;
            margin-bottom: 8px;
            cursor: pointer;
            box-shadow: 0 2px 10px black;
        }
        .slider-labels {
            position: absolute;
            left: -40px;
            top: 10px;
            color: #ffdd99;
            font-size: 11px;
            font-weight: bold;
        }
        #distance-value {
            position: absolute;
            bottom: -30px;
            left: -5px;
            right: -5px;
            text-align: center;
            color: #ffaa55;
            font-weight: bold;
            font-size: 13px;
            background: rgba(0,0,0,0.6);
            padding: 4px;
            border-radius: 20px;
        }

        /* Action Buttons */
        #action-buttons {
            position: absolute;
            bottom: 100px;
            right: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            pointer-events: auto;
            z-index: 70;
        }
        .action-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border: 2px solid #ffaa55;
            color: white;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px black;
            transition: transform 0.05s;
        }
        .action-btn:active {
            transform: scale(0.92);
            background: #ffaa55;
            color: #222;
        }

        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a3a1a, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            color: #ffcc77;
            font-size: 24px;
            flex-direction: column;
            gap: 15px;
        }

        .bomb-marker-text {
            position: absolute;
            bottom: 190px;
            left: 110px;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            color: #ffaa66;
            font-size: 11px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        💣 DWARF BOMBER - FIXED VERSION 💣<br>
        <span>WORKING JOYSTICK | WORKING BOMB PREDICTOR</span>
    </div>

    <div id="ui-overlay">
        <div id="crosshair">
            <div class="ring"></div>
            <div class="dot"></div>
            <div class="line-h"></div>
            <div class="line-v"></div>
        </div>
        <div id="info-panel">🎮 LEFT = MOVE | RIGHT = CAMERA | SLIDER = BOMB RANGE (5-20m)</div>
        <div id="score-panel">💥 <span id="score">0</span></div>
        
        <div id="left-zone">
            <div class="joystick-base" id="joystick-base"></div>
            <div class="joystick-thumb" id="joystick-thumb"></div>
        </div>
        
        <div id="right-zone">
            <div class="camera-hint">🎥 DRAG TO ROTATE CAMERA</div>
        </div>
        
        <div id="slider-area">
            <div id="slider-thumb"></div>
            <div class="slider-labels">▲ 20m<br><br>▼ 5m</div>
            <div id="distance-value">📏 <span id="dist-value">12.5</span> m</div>
        </div>
        
        <div id="action-buttons">
            <button class="action-btn" id="btn-jump">🦘 JUMP</button>
            <button class="action-btn" id="btn-throw">💣 THROW</button>
        </div>
        <div class="bomb-marker-text">🎯 ORANGE RING = BOMB LANDING POINT</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        (function() {
            // ========== THREE.JS SETUP ==========
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a3522);
            scene.fog = new THREE.FogExp2(0x0a3522, 0.005);
            
            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 300);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // Lighting
            const ambient = new THREE.AmbientLight(0x5a6e5a, 0.65);
            scene.add(ambient);
            const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
            mainLight.position.set(10, 20, 8);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 1024;
            mainLight.shadow.mapSize.height = 1024;
            scene.add(mainLight);
            const fillLight = new THREE.PointLight(0x88aacc, 0.4);
            fillLight.position.set(-5, 12, 6);
            scene.add(fillLight);
            
            // Ground
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x5a9e5a, roughness: 0.8 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), groundMat);
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.05;
            ground.receiveShadow = true;
            scene.add(ground);
            
            const grid = new THREE.GridHelper(300, 30, 0xaacc88, 0x558844);
            grid.position.y = 0;
            grid.material.transparent = true;
            grid.material.opacity = 0.4;
            scene.add(grid);
            
            // Decorative rocks
            for(let i = 0; i < 120; i++) {
                const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.2 + Math.random() * 0.3), 
                    new THREE.MeshStandardMaterial({ color: 0x7a6a55, roughness: 0.9 }));
                rock.position.set((Math.random() - 0.5) * 280, -0.2, (Math.random() - 0.5) * 280);
                rock.scale.set(1, Math.random() * 0.5 + 0.3, 1);
                rock.castShadow = true;
                scene.add(rock);
            }
            
            // ========== CHARACTER ==========
            let character, mixer, animations = {};
            let currentAction = null;
            let handBone = null;
            let bombInHand = null;
            let throwCooldown = false;
            
            const loader = new THREE.GLTFLoader();
            loader.load('https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb', (gltf) => {
                character = gltf.scene;
                character.scale.set(0.55, 0.55, 0.55);
                character.position.set(0, 0, 0);
                character.traverse(n => { if(n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
                scene.add(character);
                
                mixer = new THREE.AnimationMixer(character);
                gltf.animations.forEach(clip => {
                    animations[clip.name.toLowerCase()] = mixer.clipAction(clip);
                });
                
                // Find hand bone
                character.traverse(node => {
                    if(node.isBone && (node.name.includes("Hand") || node.name === "mixamorig:RightHand")) {
                        handBone = node;
                    }
                });
                if(!handBone) {
                    const dummy = new THREE.Group();
                    character.add(dummy);
                    handBone = dummy;
                }
                
                if(animations['idle']) {
                    currentAction = animations['idle'];
                    currentAction.play();
                }
                
                document.getElementById('loading-screen').style.display = 'none';
                createHandBomb();
            });
            
            function createHandBomb() {
                if(bombInHand) return;
                const bombMesh = new THREE.Mesh(new THREE.SphereGeometry(0.32, 24, 24), 
                    new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.85 }));
                const fuse = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.4, 6), 
                    new THREE.MeshStandardMaterial({ color: 0xff6633 }));
                fuse.position.y = 0.42;
                bombMesh.add(fuse);
                if(handBone) {
                    bombMesh.position.set(0.45, -0.1, 0.2);
                    handBone.add(bombMesh);
                }
                bombInHand = bombMesh;
            }
            
            function removeHandBomb() {
                if(bombInHand && bombInHand.parent) {
                    bombInHand.parent.remove(bombInHand);
                    bombInHand = null;
                }
            }
            
            // ========== INPUT SYSTEM ==========
            // Movement state
            let moveDirection = { x: 0, z: 0 };
            let jumpRequested = false;
            let throwRequested = false;
            
            // Keyboard support
            const keys = { w: false, s: false, a: false, d: false };
            window.addEventListener('keydown', (e) => {
                if(e.code === 'KeyW') keys.w = true;
                if(e.code === 'KeyS') keys.s = true;
                if(e.code === 'KeyA') keys.a = true;
                if(e.code === 'KeyD') keys.d = true;
                if(e.code === 'Space') { e.preventDefault(); jumpRequested = true; }
                if(e.code === 'KeyF') { e.preventDefault(); throwRequested = true; }
            });
            window.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW') keys.w = false;
                if(e.code === 'KeyS') keys.s = false;
                if(e.code === 'KeyA') keys.a = false;
                if(e.code === 'KeyD') keys.d = false;
            });
            
            // ========== JOYSTICK - CORRECT DIRECTION ==========
            const leftZone = document.getElementById('left-zone');
            const joystickBase = document.getElementById('joystick-base');
            const joystickThumb = document.getElementById('joystick-thumb');
            let joystickActive = false;
            let joystickCenterX = 0, joystickCenterY = 0;
            const maxRadius = 65;
            
            function updateJoystick(clientX, clientY) {
                let dx = clientX - joystickCenterX;
                let dy = clientY - joystickCenterY;
                let distance = Math.min(Math.hypot(dx, dy), maxRadius);
                let angle = Math.atan2(dy, dx);
                let limitedX = Math.cos(angle) * distance;
                let limitedY = Math.sin(angle) * distance;
                
                joystickThumb.style.transform = `translate(calc(-50% + ${limitedX}px), calc(-50% + ${limitedY}px))`;
                
                // Normalize to -1..1
                // dx positive = right, dy positive = down
                // For movement: right = +x, forward = -z (since dy positive = down on screen = forward in world)
                let normX = limitedX / maxRadius;
                let normZ = -limitedY / maxRadius;  // Negative because dragging up (negative Y) should move forward (positive Z)
                
                moveDirection.x = normX;
                moveDirection.z = normZ;
            }
            
            function resetJoystick() {
                joystickThumb.style.transform = 'translate(-50%, -50%)';
                if(!keys.w && !keys.s && !keys.a && !keys.d) {
                    moveDirection.x = 0;
                    moveDirection.z = 0;
                }
            }
            
            leftZone.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const rect = joystickBase.getBoundingClientRect();
                joystickCenterX = rect.left + rect.width / 2;
                joystickCenterY = rect.top + rect.height / 2;
                joystickActive = true;
                
                const touch = e.touches[0];
                updateJoystick(touch.clientX, touch.clientY);
            });
            
            window.addEventListener('touchmove', (e) => {
                if(!joystickActive) return;
                for(let i = 0; i < e.touches.length; i++) {
                    const touch = e.touches[i];
                    const zoneRect = leftZone.getBoundingClientRect();
                    if(touch.clientX >= zoneRect.left && touch.clientX <= zoneRect.right &&
                       touch.clientY >= zoneRect.top && touch.clientY <= zoneRect.bottom) {
                        updateJoystick(touch.clientX, touch.clientY);
                        break;
                    }
                }
            });
            
            window.addEventListener('touchend', () => {
                joystickActive = false;
                resetJoystick();
            });
            
            // Update keyboard movement
            function updateKeyboardMove() {
                let x = 0, z = 0;
                if(keys.a) x = -1;
                if(keys.d) x = 1;
                if(keys.w) z = 1;
                if(keys.s) z = -1;
                if(x !== 0 || z !== 0) {
                    moveDirection.x = x;
                    moveDirection.z = z;
                } else if(!joystickActive) {
                    if(moveDirection.x !== 0 || moveDirection.z !== 0) {
                        moveDirection.x = 0;
                        moveDirection.z = 0;
                    }
                }
            }
            
            // ========== CAMERA CONTROL ==========
            const rightZone = document.getElementById('right-zone');
            let cameraDrag = false;
            let cameraYaw = 0, cameraPitch = 0.3;
            let lastX = 0, lastY = 0;
            let characterAngle = 0;
            
            rightZone.addEventListener('touchstart', (e) => {
                e.preventDefault();
                cameraDrag = true;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            });
            
            window.addEventListener('touchmove', (e) => {
                if(!cameraDrag) return;
                let dx = e.touches[0].clientX - lastX;
                let dy = e.touches[0].clientY - lastY;
                cameraYaw += dx * 0.008;
                cameraPitch += dy * 0.006;
                cameraPitch = Math.max(-0.6, Math.min(0.8, cameraPitch));
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            });
            
            window.addEventListener('touchend', () => {
                cameraDrag = false;
            });
            
            // ========== DISTANCE SLIDER (5m to 20m) ==========
            const sliderArea = document.getElementById('slider-area');
            const sliderThumb = document.getElementById('slider-thumb');
            let throwDistance = 12.5;
            let sliderActive = false;
            
            function updateSlider(clientY) {
                const rect = sliderArea.getBoundingClientRect();
                let relativeY = Math.min(rect.bottom, Math.max(rect.top, clientY));
                let t = (rect.bottom - relativeY) / rect.height;
                t = Math.min(1, Math.max(0, t));
                throwDistance = 5 + t * 15;
                document.getElementById('dist-value').innerText = throwDistance.toFixed(1);
                
                let thumbOffset = t * (rect.height - 45);
                sliderThumb.style.marginBottom = `${thumbOffset}px`;
            }
            
            sliderArea.addEventListener('touchstart', (e) => {
                e.preventDefault();
                sliderActive = true;
                updateSlider(e.touches[0].clientY);
            });
            
            window.addEventListener('touchmove', (e) => {
                if(!sliderActive) return;
                updateSlider(e.touches[0].clientY);
            });
            
            window.addEventListener('touchend', () => {
                sliderActive = false;
            });
            
            // Initialize slider position
            function initSlider() {
                const rect = sliderArea.getBoundingClientRect();
                let t = (throwDistance - 5) / 15;
                let thumbOffset = t * (rect.height - 45);
                sliderThumb.style.marginBottom = `${thumbOffset}px`;
            }
            setTimeout(initSlider, 200);
            
            // ========== BUTTONS ==========
            const jumpBtn = document.getElementById('btn-jump');
            const throwBtn = document.getElementById('btn-throw');
            
            jumpBtn.addEventListener('mousedown', () => { jumpRequested = true; });
            jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); jumpRequested = true; });
            jumpBtn.addEventListener('mouseup', () => { setTimeout(() => { jumpRequested = false; }, 50); });
            jumpBtn.addEventListener('touchend', () => { setTimeout(() => { jumpRequested = false; }, 50); });
            
            throwBtn.addEventListener('mousedown', () => { throwRequested = true; });
            throwBtn.addEventListener('touchstart', (e) => { e.preventDefault(); throwRequested = true; });
            throwBtn.addEventListener('mouseup', () => { setTimeout(() => { throwRequested = false; }, 50); });
            throwBtn.addEventListener('touchend', () => { setTimeout(() => { throwRequested = false; }, 50); });
            
            // ========== GAME MECHANICS ==========
            let bombs = [];
            let particles = [];
            let targets = [];
            let score = 0;
            
            // Jump physics
            let isJumping = false;
            let jumpCount = 0;
            let verticalVel = 0;
            
            // ========== BOMB LANDING PREDICTOR (WORKING) ==========
            let landingMarker = null;
            
            function createLandingMarker() {
                const geometry = new THREE.RingGeometry(0.6, 1.1, 32);
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0xffaa55, 
                    emissive: 0xff4400, 
                    emissiveIntensity: 0.6,
                    side: THREE.DoubleSide,
                    transparent: true
                });
                const marker = new THREE.Mesh(geometry, material);
                marker.rotation.x = -Math.PI / 2;
                marker.position.y = 0.05;
                scene.add(marker);
                return marker;
            }
            
            landingMarker = createLandingMarker();
            
            // Calculate exact landing point based on throw distance
            function calculateLandingPoint() {
                if(!character) return null;
                
                const startPos = character.position.clone().add(new THREE.Vector3(0, 1.6, 0));
                const forwardDir = new THREE.Vector3(0, 0, 1).applyQuaternion(character.quaternion);
                
                // Launch angle: 40 degrees for good range
                const angleRad = 0.7; // ~40 degrees
                const gravity = 0.024;
                const sin2Theta = Math.sin(2 * angleRad);
                // Calculate required velocity for desired distance
                let speed = Math.sqrt((throwDistance * gravity) / sin2Theta);
                speed = Math.min(2.3, Math.max(0.9, speed));
                
                const vx = forwardDir.x * Math.cos(angleRad) * speed;
                const vz = forwardDir.z * Math.cos(angleRad) * speed;
                const vy = Math.sin(angleRad) * speed;
                
                let pos = startPos.clone();
                let vel = new THREE.Vector3(vx, vy, vz);
                
                for(let step = 0; step < 180; step++) {
                    pos.add(vel);
                    vel.y -= gravity;
                    if(pos.y <= 0.1) {
                        return pos;
                    }
                }
                return null;
            }
            
            function updateLandingMarker() {
                const landingPos = calculateLandingPoint();
                if(landingMarker && landingPos) {
                    landingMarker.position.set(landingPos.x, 0.06, landingPos.z);
                    // Pulse effect
                    const intensity = 0.5 + Math.sin(Date.now() * 0.008) * 0.3;
                    landingMarker.material.emissiveIntensity = intensity;
                }
            }
            
            // Throw bomb
            function throwBomb() {
                if(!character || throwCooldown) return;
                throwCooldown = true;
                removeHandBomb();
                
                const startPos = character.position.clone().add(new THREE.Vector3(0, 1.6, 0));
                const forwardDir = new THREE.Vector3(0, 0, 1).applyQuaternion(character.quaternion);
                
                const angleRad = 0.7;
                const gravity = 0.024;
                const sin2Theta = Math.sin(2 * angleRad);
                let speed = Math.sqrt((throwDistance * gravity) / sin2Theta);
                speed = Math.min(2.3, Math.max(0.9, speed));
                
                const vx = forwardDir.x * Math.cos(angleRad) * speed;
                const vz = forwardDir.z * Math.cos(angleRad) * speed;
                const vy = Math.sin(angleRad) * speed;
                
                const bombMesh = new THREE.Mesh(new THREE.SphereGeometry(0.45, 24, 24), 
                    new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.9 }));
                const fuse = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.14, 0.45, 8), 
                    new THREE.MeshStandardMaterial({ color: 0xff6633 }));
                fuse.position.y = 0.48;
                bombMesh.add(fuse);
                bombMesh.position.copy(startPos);
                bombMesh.castShadow = true;
                scene.add(bombMesh);
                
                bombs.push({ 
                    mesh: bombMesh, 
                    vel: new THREE.Vector3(vx, vy, vz), 
                    life: 280,
                    gravity: gravity
                });
                
                // Animation
                if(animations['punch']) {
                    if(currentAction) currentAction.fadeOut(0.1);
                    currentAction = animations['punch'];
                    currentAction.reset().fadeIn(0.1).play();
                    setTimeout(() => {
                        if(animations['idle'] && currentAction === animations['punch']) {
                            currentAction.fadeOut(0.2);
                            currentAction = animations['idle'];
                            currentAction.play();
                        }
                    }, 350);
                }
                
                setTimeout(() => { createHandBomb(); throwCooldown = false; }, 300);
            }
            
            // Explosion
            function explode(position) {
                const flash = new THREE.Mesh(new THREE.SphereGeometry(2.0, 16, 16), 
                    new THREE.MeshBasicMaterial({ color: 0xff8844, transparent: true, opacity: 0.9 }));
                flash.position.copy(position);
                scene.add(flash);
                setTimeout(() => scene.remove(flash), 120);
                
                for(let i = 0; i < 50; i++) {
                    const particle = new THREE.Mesh(new THREE.SphereGeometry(0.15 + Math.random() * 0.25), 
                        new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4400 }));
                    particle.position.copy(position);
                    scene.add(particle);
                    particles.push({
                        mesh: particle,
                        vel: new THREE.Vector3((Math.random() - 0.5) * 2.2, Math.random() * 1.4, (Math.random() - 0.5) * 2.2),
                        life: 0,
                        maxLife: 55,
                        gravity: 0.018
                    });
                }
                
                // Hit targets
                for(let i = 0; i < targets.length; i++) {
                    if(targets[i].mesh.position.distanceTo(position) < 2.8) {
                        scene.remove(targets[i].mesh);
                        targets.splice(i, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                        spawnTarget();
                        i--;
                    }
                }
            }
            
            function spawnTarget() {
                const targetMat = new THREE.MeshStandardMaterial({ color: 0xdd5555, emissive: 0x331100 });
                const target = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.8, 1.8), targetMat);
                const angle = Math.random() * Math.PI * 2;
                const radius = 35 + Math.random() * 80;
                target.position.set(Math.cos(angle) * radius, 0.9, Math.sin(angle) * radius);
                target.castShadow = true;
                scene.add(target);
                targets.push({ mesh: target });
            }
            
            // Initial targets
            for(let i = 0; i < 12; i++) spawnTarget();
            
            function updateBombs() {
                for(let i = bombs.length - 1; i >= 0; i--) {
                    const b = bombs[i];
                    b.mesh.position.add(b.vel);
                    b.vel.y -= b.gravity;
                    b.mesh.rotation.x += 0.2;
                    
                    if(b.mesh.position.y < 0.1) {
                        explode(b.mesh.position);
                        scene.remove(b.mesh);
                        bombs.splice(i, 1);
                        continue;
                    }
                    b.life--;
                    if(b.life <= 0) {
                        explode(b.mesh.position);
                        scene.remove(b.mesh);
                        bombs.splice(i, 1);
                    }
                }
            }
            
            function updateParticles() {
                for(let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.mesh.position.add(p.vel);
                    p.vel.y -= p.gravity;
                    p.life++;
                    if(p.life >= p.maxLife || p.mesh.position.y < -0.3) {
                        scene.remove(p.mesh);
                        particles.splice(i, 1);
                    }
                }
            }
            
            // Jump handling
            function handleJump() {
                if(jumpRequested) {
                    if(!isJumping && jumpCount < 2) {
                        verticalVel = 0.52;
                        isJumping = true;
                        jumpCount++;
                    } else if(isJumping && jumpCount === 1 && verticalVel < 0.1) {
                        verticalVel = 0.48;
                        jumpCount++;
                    }
                    jumpRequested = false;
                }
                
                if(isJumping) {
                    character.position.y += verticalVel;
                    verticalVel -= 0.024;
                    if(character.position.y <= 0) {
                        character.position.y = 0;
                        isJumping = false;
                        jumpCount = 0;
                        verticalVel = 0;
                    }
                } else {
                    character.position.y = 0;
                }
            }
            
            // Movement
            function handleMovement() {
                if(!character) return;
                let x = moveDirection.x;
                let z = moveDirection.z;
                
                if(Math.abs(x) > 0.05 || Math.abs(z) > 0.05) {
                    let angle = Math.atan2(x, z);
                    character.rotation.y = angle;
                    characterAngle = angle;
                    const speed = 0.28;
                    character.position.x += Math.sin(angle) * speed;
                    character.position.z += Math.cos(angle) * speed;
                    
                    // Boundaries
                    const limit = 140;
                    character.position.x = Math.min(limit, Math.max(-limit, character.position.x));
                    character.position.z = Math.min(limit, Math.max(-limit, character.position.z));
                    
                    if(animations['walking'] && currentAction !== animations['walking'] && currentAction !== animations['punch']) {
                        if(currentAction) currentAction.fadeOut(0.15);
                        currentAction = animations['walking'];
                        currentAction.reset().fadeIn(0.15).play();
                    }
                } else {
                    if(animations['idle'] && currentAction !== animations['idle'] && currentAction !== animations['punch']) {
                        if(currentAction) currentAction.fadeOut(0.2);
                        currentAction = animations['idle'];
                        currentAction.reset().play();
                    }
                }
            }
            
            // Camera follow
            let smoothYaw = 0, smoothPitch = 0.3;
            function updateCamera() {
                if(!character) return;
                if(!cameraDrag) {
                    cameraYaw = cameraYaw * 0.96 + characterAngle * 0.04;
                }
                smoothYaw += (cameraYaw - smoothYaw) * 0.1;
                smoothPitch += (cameraPitch - smoothPitch) * 0.1;
                
                const dist = 9.5;
                const camX = character.position.x - Math.sin(smoothYaw) * dist * Math.cos(smoothPitch);
                const camY = character.position.y + 2.5 + Math.sin(smoothPitch) * dist;
                const camZ = character.position.z - Math.cos(smoothYaw) * dist * Math.cos(smoothPitch);
                
                camera.position.set(camX, camY, camZ);
                camera.lookAt(character.position.clone().add(new THREE.Vector3(0, 1.4, 0)));
            }
            
            // Animation loop
            const clock = new THREE.Clock();
            
            function animate() {
                requestAnimationFrame(animate);
                const delta = clock.getDelta();
                if(!character) return;
                
                updateKeyboardMove();
                handleJump();
                handleMovement();
                updateBombs();
                updateParticles();
                updateLandingMarker();  // Update bomb predictor
                updateCamera();
                
                // Handle throw (independent)
                if(throwRequested && !throwCooldown) {
                    throwBomb();
                    throwRequested = false;
                }
                
                if(mixer) mixer.update(delta);
                renderer.render(scene, camera);
            }
            
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                initSlider();
            });
            
            // Recreate hand bomb if needed
            setInterval(() => {
                if(character && handBone && !bombInHand && !throwCooldown) {
                    createHandBomb();
                }
            }, 500);
        })();
    </script>
</body>
</html>
