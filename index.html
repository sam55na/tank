<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Warrior - شخصية حربية احترافية بأشكال كروية</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 100;
            font-size: 14px;
            pointer-events: none;
            backdrop-filter: blur(8px);
            border-left: 4px solid #ff5500;
            font-weight: bold;
            font-family: monospace;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
            z-index: 100;
            font-size: 12px;
            pointer-events: none;
            font-family: monospace;
        }
        #stats {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ffaa66;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        🎯 3D WARRIOR | 💣 TACTICAL BOMB | ⚡ SPHERICAL SCULPTING
    </div>
    <div id="controls">
        🖱️ اسحب بالماوس للتدوير | 🔍 اسكرول للتكبير | 🎨 شخصية من كرات منحوتة
    </div>
    <div id="stats">
        ⚙️ جاري التحميل...
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // =============== إعداد المشهد ===============
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.008);
        
        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3.8, 7.5);
        camera.lookAt(0, 2.5, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.target.set(0, 2.5, 0);
        controls.zoomSpeed = 1.2;
        
        // =============== إضاءة احترافية ===============
        const ambientLight = new THREE.AmbientLight(0x404060, 0.55);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.3);
        mainLight.position.set(4, 7, 5);
        mainLight.castShadow = true;
        mainLight.receiveShadow = false;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x88aaff, 0.5);
        fillLight.position.set(-2, 3, 3);
        scene.add(fillLight);
        
        const rimLight = new THREE.PointLight(0xffaa77, 0.6);
        rimLight.position.set(1, 4, -5);
        scene.add(rimLight);
        
        const backLight = new THREE.PointLight(0xff8866, 0.45);
        backLight.position.set(-1, 3, -4);
        scene.add(backLight);
        
        const bombGlow = new THREE.PointLight(0xff5533, 0.55);
        bombGlow.position.set(2.2, 2.4, 1.3);
        scene.add(bombGlow);
        
        const helmetLight = new THREE.PointLight(0x33aaff, 0.4);
        helmetLight.position.set(-0.3, 4.2, 1);
        scene.add(helmetLight);
        
        // =============== أرضية ===============
        const gridHelper = new THREE.GridHelper(10, 20, 0x88aaff, 0x446688);
        gridHelper.position.y = -1.4;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(9, 9),
            new THREE.ShadowMaterial({ opacity: 0.4, color: 0x000000, transparent: true })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -1.35;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // =============== مجموعة الشخصية ===============
        const characterGroup = new THREE.Group();
        scene.add(characterGroup);
        
        let sphereCount = 0;
        
        // دالة إضافة كرة
        function addSphere(x, y, z, radius, color, metalness = 0.65, roughness = 0.25, emissive = null) {
            const geometry = new THREE.SphereGeometry(radius, 24, 24);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                metalness: metalness,
                roughness: roughness,
                emissive: emissive || 0x000000,
                emissiveIntensity: emissive ? 0.3 : 0
            });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(x, y, z);
            sphere.castShadow = true;
            sphere.receiveShadow = true;
            characterGroup.add(sphere);
            sphereCount++;
            return sphere;
        }
        
        // =============== الألوان ===============
        const colors = {
            // دروع وأسلحة
            armorDark: 0x3a4455,
            armorMid: 0x556077,
            armorLight: 0x6c7a92,
            steel: 0x8e9eb5,
            titanium: 0xaab4c8,
            // تفاصيل
            gold: 0xd4af37,
            copper: 0xcd7a4a,
            red: 0xdd5533,
            darkRed: 0xaa3322,
            // قماش وجلد
            fabric: 0x5a6b42,
            leather: 0x8b5a2b,
            // خوذة
            visor: 0x2a7fae,
            visorGlow: 0x3a9fce,
            // قنبلة
            bombGreen: 0x5a7a4a,
            bombYellow: 0xe8b84a,
            // أساسيات
            black: 0x222233,
            silver: 0xc0c8dc
        };
        
        // =============== بناء الجسم باستخدام الكرات ===============
        
        // ---- الرأس (كرة رئيسية) ----
        addSphere(0, 4.15, 0, 0.58, colors.armorMid, 0.7, 0.3);
        addSphere(0, 4.15, 0.15, 0.55, colors.armorLight, 0.7, 0.28);
        
        // حاجب العين (Visor)
        addSphere(0, 4.0, 0.65, 0.35, colors.visor, 0.85, 0.2, colors.visor);
        addSphere(0.35, 4.0, 0.65, 0.28, colors.visor, 0.85, 0.2);
        addSphere(-0.35, 4.0, 0.65, 0.28, colors.visor, 0.85, 0.2);
        
        // جهاز اتصال جانبي
        addSphere(0.75, 4.1, 0.2, 0.18, colors.red, 0.5, 0.4, colors.red);
        addSphere(-0.75, 4.15, 0.15, 0.16, colors.silver, 0.8, 0.25);
        
        // قمة الخوذة
        addSphere(0, 4.7, 0, 0.22, colors.gold, 0.85, 0.2);
        
        // ---- الجذع العلوي (صدر) ----
        addSphere(0, 3.2, 0.1, 0.72, colors.armorDark, 0.7, 0.28);
        addSphere(0.45, 3.25, 0.15, 0.58, colors.armorMid, 0.72, 0.26);
        addSphere(-0.45, 3.25, 0.15, 0.58, colors.armorMid, 0.72, 0.26);
        
        // عضلات الصدر
        addSphere(0.5, 3.05, 0.55, 0.38, colors.armorLight, 0.75, 0.25);
        addSphere(-0.5, 3.05, 0.55, 0.38, colors.armorLight, 0.75, 0.25);
        addSphere(0, 3.0, 0.65, 0.42, colors.steel, 0.8, 0.22);
        
        // منتصف الصدر (درع)
        addSphere(0, 3.1, 0.8, 0.35, colors.gold, 0.85, 0.2);
        
        // ---- الجذع السفلي (بطن) ----
        addSphere(0, 2.4, 0.05, 0.65, colors.fabric, 0.35, 0.55);
        addSphere(0.3, 2.45, 0.1, 0.48, colors.fabric, 0.35, 0.55);
        addSphere(-0.3, 2.45, 0.1, 0.48, colors.fabric, 0.35, 0.55);
        
        // حزام الخصر
        addSphere(0, 2.0, 0.2, 0.52, colors.leather, 0.4, 0.5);
        addSphere(0.5, 2.0, 0.25, 0.4, colors.leather, 0.4, 0.5);
        addSphere(-0.5, 2.0, 0.25, 0.4, colors.leather, 0.4, 0.5);
        
        // ---- الكتفين (دروع كروية) ----
        addSphere(0.95, 3.45, 0, 0.48, colors.armorLight, 0.78, 0.26);
        addSphere(-0.95, 3.45, 0, 0.45, colors.armorLight, 0.78, 0.26);
        addSphere(1.1, 3.55, 0.15, 0.38, colors.copper, 0.82, 0.24);
        addSphere(-1.05, 3.52, 0.1, 0.36, colors.copper, 0.8, 0.25);
        
        // مسامير على الكتف
        addSphere(1.25, 3.65, 0.25, 0.12, colors.gold, 0.9, 0.18);
        addSphere(-1.2, 3.62, 0.2, 0.12, colors.gold, 0.9, 0.18);
        
        // ---- الذراع الأيمن (حامل القنبلة) ----
        addSphere(1.35, 3.15, 0.05, 0.42, colors.armorDark, 0.68, 0.3);
        addSphere(1.55, 2.75, 0, 0.38, colors.armorMid, 0.7, 0.28);
        addSphere(1.7, 2.35, -0.05, 0.35, colors.armorLight, 0.72, 0.27);
        addSphere(1.82, 1.95, -0.1, 0.32, colors.armorLight, 0.73, 0.26);
        addSphere(1.88, 1.55, -0.12, 0.28, colors.steel, 0.75, 0.25);
        
        // قبضة اليد
        addSphere(1.92, 1.18, -0.15, 0.24, colors.armorLight, 0.7, 0.28);
        
        // أنابيب هيدروليكية على الذراع
        addSphere(1.45, 2.55, 0.55, 0.14, colors.silver, 0.85, 0.2);
        addSphere(1.62, 2.15, 0.52, 0.13, colors.silver, 0.85, 0.2);
        
        // ---- الذراع الأيسر ----
        addSphere(-1.3, 3.15, 0.05, 0.4, colors.armorDark, 0.68, 0.3);
        addSphere(-1.48, 2.78, 0, 0.36, colors.armorMid, 0.7, 0.28);
        addSphere(-1.62, 2.42, -0.03, 0.33, colors.armorMid, 0.71, 0.27);
        addSphere(-1.72, 2.08, -0.08, 0.3, colors.armorLight, 0.72, 0.26);
        addSphere(-1.78, 1.75, -0.1, 0.26, colors.armorLight, 0.73, 0.25);
        
        // ---- الأرجل ----
        // الفخذ الأيمن
        addSphere(0.55, 1.45, 0.05, 0.44, colors.armorDark, 0.65, 0.32);
        addSphere(0.7, 1.05, 0.02, 0.4, colors.armorDark, 0.66, 0.31);
        addSphere(0.8, 0.68, -0.02, 0.36, colors.black, 0.4, 0.55);
        
        // الساق اليمنى
        addSphere(0.85, 0.32, -0.05, 0.32, colors.black, 0.35, 0.6);
        addSphere(0.88, -0.02, -0.08, 0.28, colors.black, 0.3, 0.65);
        
        // الفخذ الأيسر
        addSphere(-0.55, 1.45, 0.05, 0.44, colors.armorDark, 0.65, 0.32);
        addSphere(-0.7, 1.05, 0.02, 0.4, colors.armorDark, 0.66, 0.31);
        addSphere(-0.8, 0.68, -0.02, 0.36, colors.black, 0.4, 0.55);
        
        // الساق اليسرى
        addSphere(-0.85, 0.32, -0.05, 0.32, colors.black, 0.35, 0.6);
        addSphere(-0.88, -0.02, -0.08, 0.28, colors.black, 0.3, 0.65);
        
        // الأحذية
        addSphere(0.95, -0.18, -0.15, 0.26, colors.black, 0.25, 0.7);
        addSphere(-0.95, -0.18, -0.15, 0.26, colors.black, 0.25, 0.7);
        
        // واقي الركبة
        addSphere(0.75, 0.85, 0.55, 0.22, colors.silver, 0.75, 0.25);
        addSphere(-0.75, 0.85, 0.55, 0.22, colors.silver, 0.75, 0.25);
        
        // =============== القنبلة (من كرات) ===============
        // جسم القنبلة الرئيسي
        addSphere(2.45, 2.35, 0.25, 0.45, colors.bombGreen, 0.5, 0.4);
        addSphere(2.85, 2.38, 0.28, 0.42, colors.bombGreen, 0.5, 0.4);
        addSphere(3.22, 2.42, 0.3, 0.4, colors.bombGreen, 0.5, 0.4);
        addSphere(3.58, 2.45, 0.32, 0.38, colors.bombGreen, 0.5, 0.4);
        
        // خطوط تحذير صفراء
        addSphere(2.65, 2.38, 0.75, 0.22, colors.bombYellow, 0.45, 0.35);
        addSphere(3.05, 2.42, 0.78, 0.22, colors.bombYellow, 0.45, 0.35);
        addSphere(3.42, 2.45, 0.8, 0.21, colors.bombYellow, 0.45, 0.35);
        
        // رأس القنبلة
        addSphere(3.95, 2.48, 0.35, 0.35, colors.copper, 0.82, 0.22);
        addSphere(4.25, 2.52, 0.38, 0.28, colors.red, 0.85, 0.2, colors.red);
        addSphere(4.48, 2.55, 0.4, 0.2, colors.darkRed, 0.88, 0.18, colors.darkRed);
        
        // زعانف الذيل
        addSphere(2.25, 2.32, 0.85, 0.18, colors.silver, 0.78, 0.24);
        addSphere(2.25, 2.32, -0.35, 0.18, colors.silver, 0.78, 0.24);
        addSphere(3.65, 2.42, 0.9, 0.18, colors.silver, 0.78, 0.24);
        addSphere(3.65, 2.42, -0.4, 0.18, colors.silver, 0.78, 0.24);
        
        // أحزمة حمل القنبلة
        addSphere(2.05, 2.28, 0.45, 0.16, colors.leather, 0.35, 0.55);
        addSphere(2.05, 2.48, 0.45, 0.16, colors.leather, 0.35, 0.55);
        addSphere(1.85, 2.38, 0.45, 0.14, colors.leather, 0.35, 0.55);
        
        // =============== تفاصيل إضافية ===============
        // خراطيش ذخيرة على الصدر
        addSphere(0.3, 2.85, 0.95, 0.12, colors.gold, 0.88, 0.18);
        addSphere(-0.3, 2.85, 0.95, 0.12, colors.gold, 0.88, 0.18);
        addSphere(0, 2.7, 0.98, 0.13, colors.gold, 0.88, 0.18);
        
        // قنابل يدوية على الحزام
        addSphere(0.85, 1.85, 0.75, 0.18, colors.bombGreen, 0.48, 0.42);
        addSphere(0.45, 1.85, 0.78, 0.16, colors.bombGreen, 0.48, 0.42);
        addSphere(-0.45, 1.85, 0.78, 0.16, colors.bombGreen, 0.48, 0.42);
        addSphere(-0.85, 1.85, 0.75, 0.18, colors.bombGreen, 0.48, 0.42);
        
        // جهاز اتصال على الظهر
        addSphere(0, 2.65, -0.85, 0.28, colors.black, 0.4, 0.5);
        addSphere(0, 2.85, -0.88, 0.22, colors.silver, 0.7, 0.3);
        addSphere(0, 3.05, -0.9, 0.18, colors.red, 0.6, 0.35, colors.red);
        
        // فتحات تهوية حرارية
        addSphere(0.95, 3.15, 0.85, 0.12, colors.red, 0.65, 0.3, colors.red);
        addSphere(-0.95, 3.15, 0.85, 0.12, colors.red, 0.65, 0.3, colors.red);
        
        // شارة عسكرية
        addSphere(-1.15, 2.95, 0.65, 0.14, colors.red, 0.55, 0.35);
        addSphere(-1.05, 2.85, 0.68, 0.12, colors.gold, 0.75, 0.25);
        
        // كاميرا حرارية على الخوذة
        addSphere(0.55, 4.35, 0.55, 0.1, colors.visorGlow, 0.8, 0.2, colors.visorGlow);
        
        // =============== تأثيرات متحركة ===============
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // نبض ضوء القنبلة
            bombGlow.intensity = 0.5 + Math.sin(time * 10) * 0.2;
            
            // وميض خفيف للخوذة
            helmetLight.intensity = 0.35 + Math.sin(time * 6) * 0.1;
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        document.getElementById('stats').innerHTML = `✅ ${sphereCount} SPHERES | ORGANIC SCULPT`;
        console.log(`✅ شخصية من ${sphereCount} كرة منحوتة بشكل عضوي`);
        console.log(`🎨 تم استخدام كرات (Spheres) بدلاً من المكعبات لنحت جسم واقعي`);
    </script>
</body>
</html>
