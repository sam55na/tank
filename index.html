<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Voxel Shooter 3D</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.153.0/examples/js/controls/OrbitControls.js"></script>
<script>
  // إعداد المشهد والكاميرا
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xa0a0a0);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(10, 10, 20);

  const renderer = new THREE.WebGLRenderer({antialias: true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  // إضاءة
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(10, 20, 10);
  scene.add(dirLight);

  // إعداد مادة المكعبات الصغيرة
  function createVoxelMaterial(color) {
    return new THREE.MeshStandardMaterial({ color: color });
  }

  const voxelSize = 0.2; // حجم كل مكعب صغير

  // دالة لإنشاء مكعب صغير (Voxel)
  function createVoxel(x, y, z, color) {
    const geometry = new THREE.BoxGeometry(voxelSize, voxelSize, voxelSize);
    const material = createVoxelMaterial(color);
    const cube = new THREE.Mesh(geometry, material);
    cube.position.set(x, y, z);
    return cube;
  }

  // إنشاء شخصية الشوتر
  const shooter = new THREE.Group();

  // الرأس
  for(let x=-1; x<=1; x+=0.2){
    for(let y=0; y<=1; y+=0.2){
      for(let z=-1; z<=1; z+=0.2){
        shooter.add(createVoxel(x, y+3, z, 0xffcc99)); // لون البشرة
      }
    }
  }

  // الجسم
  for(let x=-1.2; x<=1.2; x+=0.2){
    for(let y=0; y<=2; y+=0.2){
      for(let z=-0.6; z<=0.6; z+=0.2){
        shooter.add(createVoxel(x, y+1, z, 0x5555ff)); // زي أزرق
      }
    }
  }

  // الذراعين
  for(let x=-1.6; x<=1.6; x+=3.2){ // يمين ويسار
    for(let y=0; y<=1.5; y+=0.2){
      for(let z=-0.4; z<=0.4; z+=0.2){
        shooter.add(createVoxel(x, y+1.5, z, 0xffcc99)); // لون البشرة
        shooter.add(createVoxel(x, y+1.5, z, 0x5555ff)); // إضافة زي أزرق فوق الجلد
      }
    }
  }

  // الأرجل
  for(let x=-0.8; x<=0.8; x+=1.6){ // قدمين
    for(let y=-2; y<=0; y+=0.2){
      for(let z=-0.4; z<=0.4; z+=0.2){
        shooter.add(createVoxel(x, y, z, 0x333333)); // سروال/حذاء أسود
      }
    }
  }

  // القنبلة في اليد اليمنى
  const bombGroup = new THREE.Group();
  for(let x=-0.4; x<=0.4; x+=0.1){
    for(let y=-0.4; y<=0.4; y+=0.1){
      for(let z=-0.4; z<=0.4; z+=0.1){
        bombGroup.add(createVoxel(x, y, z, 0x222222)); // قنبلة سوداء
      }
    }
  }
  bombGroup.position.set(1.6, 2, 0); // اليد اليمنى
  shooter.add(bombGroup);

  scene.add(shooter);

  // الأرضية
  const groundGeo = new THREE.PlaneGeometry(50,50);
  const groundMat = new THREE.MeshStandardMaterial({color:0x888888});
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI/2;
  ground.position.y = -2;
  scene.add(ground);

  // إعادة تحجيم تلقائي
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // التحديث والتدوير
  function animate(){
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>
</body>
</html>
