<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>محاولة تحسين القزم</title>
    <style> body { margin: 0; background: radial-gradient(circle, #444, #000); overflow: hidden; } </style>
</head>
<body>
    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // تفعيل الظلال لزيادة الواقعية
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- إضاءة سينمائية ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(5, 5, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- المواد (Materials) بخواص واقعية ---
        const matYellow = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.4 });
        const matSkin = new THREE.MeshStandardMaterial({ color: 0xffdbac, roughness: 0.3 });
        const matWhite = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });

        const model = new THREE.Group();

        // قبعة منحنية (باستخدام Torus و Cone مدمجين)
        const hatBase = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.1, 16, 100), matYellow);
        hatBase.rotation.x = Math.PI/2;
        hatBase.position.y = 1.4;
        model.add(hatBase);

        const hatTop = new THREE.Mesh(new THREE.ConeGeometry(0.4, 1.2, 32), matYellow);
        hatTop.position.y = 1.8;
        hatTop.rotation.z = -0.2;
        model.add(hatTop);

        // وجه مستدير
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), matSkin);
        head.position.y = 1.1;
        head.castShadow = true;
        model.add(head);

        // أنف كروي كبير (كما في الصورة)
        const nose = new THREE.Mesh(new THREE.SphereGeometry(0.1, 32, 32), matSkin);
        nose.position.set(0, 1.1, 0.4);
        model.add(nose);

        // اللحية (كتلة واحدة ناعمة بدلاً من كرات مبعثرة)
        const beard = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), matWhite);
        beard.scale.set(1.1, 1.3, 0.8);
        beard.position.set(0, 0.7, 0.2);
        model.add(beard);

        // جسم ممتلئ
        const body = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), matYellow);
        body.scale.set(1.1, 1, 0.9);
        body.position.y = 0.2;
        body.receiveShadow = true;
        model.add(body);

        scene.add(model);

        function animate() {
            requestAnimationFrame(animate);
            model.rotation.y += 0.005; // دوران هادئ للعرض
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
