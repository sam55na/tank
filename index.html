<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dwarf Bomber - Fixed & Ready</title>
    <style>
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* واجهة اللمس */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .touch-region { pointer-events: auto; position: absolute; bottom: 0; height: 100%; width: 50%; }
        #left-region { left: 0; }
        #right-region { right: 0; }

        /* الجويستك */
        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: #ffaa44; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px rgba(255,170,68,0.6); }

        /* التحكم بالمسافة (يسار) */
        #dist-container { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 45px; height: 220px; background: rgba(0,0,0,0.6); border-radius: 25px; border: 1px solid #ffaa44; display: flex; flex-direction: column; align-items: center; padding: 15px 0; pointer-events: auto; }
        #dist-slider { appearance: none; width: 180px; height: 10px; background: #333; border-radius: 5px; transform: rotate(-90deg); margin-top: 85px; cursor: pointer; }
        #dist-slider::-webkit-slider-thumb { appearance: none; width: 25px; height: 25px; background: #ffaa44; border-radius: 50%; border: 2px solid #fff; }

        /* الأزرار (يمين) */
        #action-container { position: absolute; bottom: 40px; right: 30px; display: flex; flex-direction: column; gap: 20px; pointer-events: auto; }
        .btn { width: 75px; height: 75px; border-radius: 50%; border: 2px solid #ffaa44; background: rgba(0,0,0,0.5); color: white; font-size: 30px; display: flex; align-items: center; justify-content: center; }
        .btn:active { background: #ffaa44; transform: scale(0.9); }
        #throw-btn { width: 95px; height: 95px; border-width: 4px; font-size: 40px; }

        #stats { position: absolute; top: 20px; left: 0; width: 100%; text-align: center; color: #ffaa44; font-weight: bold; pointer-events: none; z-index: 20; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

    <div id="stats">المسافة المستهدفة: <span id="val">12</span> متر</div>

    <div id="ui-layer">
        <div id="left-region" class="touch-region">
            <div id="dist-container">
                <input type="range" id="dist-slider" min="5" max="25" value="12">
            </div>
            <div id="joy-base"><div id="joy-stick"></div></div>
        </div>
        
        <div id="right-region" class="touch-region">
            <div id="action-container">
                <button class="btn" id="jump-btn">🆙</button>
                <button class="btn" id="throw-btn">💣</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. إعداد المشهد (Scene Setup)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x112211);
        scene.fog = new THREE.Fog(0x112211, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // الإضاءة
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 15, 10);
        sun.castShadow = true;
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x404040, 0.6));

        // 2. بناء العالم (World)
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x224422 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const grid = new THREE.GridHelper(100, 40, 0x44ff44, 0x224422);
        scene.add(grid);

        // 3. بناء اللاعب (Character) - بشكل هندسي لضمان الظهور
        const player = new THREE.Group();
        const bodyGeo = new THREE.BoxGeometry(0.8, 1.2, 0.5);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.6;
        body.castShadow = true;
        player.add(body);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        head.position.y = 1.3;
        player.add(head);

        scene.add(player);

        // مؤشر الهدف
        const targetMarker = new THREE.Mesh(
            new THREE.RingGeometry(0.4, 0.6, 32),
            new THREE.MeshBasicMaterial({ color: 0xffaa00, side: THREE.DoubleSide, transparent: true, opacity: 0.6 })
        );
        targetMarker.rotation.x = -Math.PI/2;
        targetMarker.position.y = 0.05;
        scene.add(targetMarker);

        // 4. نظام التحكم (Logic)
        let joyPos = { x: 0, y: 0 };
        let camRot = { yaw: 0, pitch: -0.2 };
        let distLimit = 12;
        let isJumping = false;
        let yVel = 0;

        // اللمس المتعدد
        const activeTouches = {};
        
        document.addEventListener('touchstart', (e) => {
            for(let t of e.changedTouches) {
                activeTouches[t.identifier] = { x: t.clientX, y: t.clientY };
            }
        });

        document.addEventListener('touchmove', (e) => {
            for(let t of e.changedTouches) {
                const start = activeTouches[t.identifier];
                if(!start) continue;

                if(t.clientX < window.innerWidth / 2) {
                    // حركة الجويستك (يسار)
                    if(t.target.id === 'joy-stick' || t.target.id === 'joy-base') {
                        const base = document.getElementById('joy-base').getBoundingClientRect();
                        const bx = base.left + 60, by = base.top + 60;
                        const dx = t.clientX - bx, dy = t.clientY - by;
                        const d = Math.min(Math.hypot(dx, dy), 50);
                        const angle = Math.atan2(dy, dx);
                        joyPos.x = (Math.cos(angle) * d) / 50;
                        joyPos.y = (Math.sin(angle) * d) / 50;
                        document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${Math.cos(angle)*d}px), calc(-50% + ${Math.sin(angle)*d}px))`;
                    }
                } else {
                    // تحريك الكاميرا (يمين)
                    const dx = t.clientX - start.x;
                    const dy = t.clientY - start.y;
                    camRot.yaw -= dx * 0.006;
                    camRot.pitch = Math.max(-0.8, Math.min(0.5, camRot.pitch - dy * 0.006));
                    start.x = t.clientX;
                    start.y = t.clientY;
                }
            }
        });

        document.addEventListener('touchend', (e) => {
            for(let t of e.changedTouches) {
                delete activeTouches[t.identifier];
                if(t.clientX < window.innerWidth / 2) {
                    joyPos = { x: 0, y: 0 };
                    document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)';
                }
            }
        });

        // الأزرار
        document.getElementById('dist-slider').oninput = (e) => {
            distLimit = e.target.value;
            document.getElementById('val').innerText = distLimit;
        };

        document.getElementById('jump-btn').ontouchstart = () => {
            if(!isJumping) { isJumping = true; yVel = 0.25; }
        };

        document.getElementById('throw-btn').ontouchstart = () => {
            const bomb = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({color: 0x222}));
            bomb.position.copy(player.position).add(new THREE.Vector3(0, 1, 0));
            scene.add(bomb);
            
            const start = bomb.position.clone();
            const end = targetMarker.position.clone();
            let p = 0;
            const animateBomb = () => {
                p += 0.03;
                if(p >= 1) { scene.remove(bomb); return; }
                bomb.position.lerpVectors(start, end, p);
                bomb.position.y += Math.sin(p * Math.PI) * 4;
                requestAnimationFrame(animateBomb);
            };
            animateBomb();
        };

        // 5. حلقة التحديث (Game Loop)
        function animate() {
            requestAnimationFrame(animate);

            // الحركة
            if(joyPos.x !== 0 || joyPos.y !== 0) {
                const speed = 0.15;
                const forward = new THREE.Vector3(Math.sin(camRot.yaw), 0, Math.cos(camRot.yaw));
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), forward);
                
                player.position.addScaledVector(forward, -joyPos.y * speed);
                player.position.addScaledVector(side, joyPos.x * speed);
                player.rotation.y = Math.atan2(joyPos.x, -joyPos.y) + camRot.yaw;
            }

            // الجاذبية
            if(isJumping) {
                player.position.y += yVel;
                yVel -= 0.015;
                if(player.position.y <= 0) { player.position.y = 0; isJumping = false; }
            }

            // الكاميرا خلف اللاعب
            const camDist = 7;
            camera.position.x = player.position.x - Math.sin(camRot.yaw) * camDist;
            camera.position.z = player.position.z - Math.cos(camRot.yaw) * camDist;
            camera.position.y = player.position.y + 4 + camRot.pitch * 5;
            camera.lookAt(player.position.x, player.position.y + 1, player.position.z);

            // تحديث مكان سقوط القنبلة
            const dir = new THREE.Vector3(0,0,1).applyQuaternion(player.quaternion);
            targetMarker.position.set(
                player.position.x + dir.x * distLimit,
                0.06,
                player.position.z + dir.z * distLimit
            );

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
