<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Battle Tanks Elite - معركة الدبابات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: linear-gradient(145deg, #0a0f1a 0%, #05070c 100%);
            touch-action: pan-x pan-y;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .login-screen, .main-screen, .lobby, .admin-panel, .report-screen, .hud {
            /* سيتم التحكم في display عبر JavaScript */
        }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 10%, #1e2a3a, #0a0f1f);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-container {
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(25px);
            padding: 40px 30px;
            border-radius: 48px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.5);
        }

        .login-container h1 {
            color: #d4af37;
            font-size: 36px;
            margin-bottom: 10px;
        }

        .login-container input {
            width: 100%;
            padding: 16px 20px;
            margin: 10px 0;
            border-radius: 60px;
            background: rgba(20, 28, 40, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: white;
            font-size: 16px;
        }

        .login-container button {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: linear-gradient(105deg, #d4af37, #b8860b);
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .main-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0f1725, #070b14);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 900;
        }

        .main-screen h2 {
            color: #d4af37;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin: 20px;
        }

        .play-btn {
            background: linear-gradient(135deg, #d4af37, #b8860b);
            padding: 18px 40px;
            border: none;
            border-radius: 60px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        .wallet-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            padding: 18px 40px;
            border: none;
            border-radius: 60px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        .admin-btn {
            background: #e74c3c;
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            position: absolute;
            top: 20px;
            right: 20px;
            display: none;
        }

        .user-card {
            background: rgba(255,255,255,0.1);
            padding: 15px 30px;
            border-radius: 50px;
            margin-top: 30px;
            text-align: center;
            color: white;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 20px 40px;
            border-radius: 60px;
            color: #d4af37;
            display: none;
            z-index: 10001;
        }

        .lobby {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .lobby-container {
            background: linear-gradient(145deg, #111a24, #0a0f18);
            padding: 30px;
            border-radius: 48px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 2px solid #d4af37;
        }

        .seats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 25px 0;
        }

        .seat {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 28px;
            cursor: pointer;
            border: 1px solid #d4af37;
            color: white;
        }

        .seat.occupied {
            background: #2e7035;
            cursor: not-allowed;
        }

        .create-room-btn {
            background: #d4af37;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .back-lobby-btn {
            background: #555;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            margin-top: 15px;
            cursor: pointer;
        }

        .hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        .status-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-left: 4px solid #d4af37;
            border-radius: 16px;
            color: white;
        }

        .team-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-radius: 16px;
            color: white;
            text-align: right;
        }

        .cooldown-side {
            position: absolute;
            top: 80px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 30px;
            color: #d4af37;
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,240,0.85);
        }
        .crosshair::before {
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            transform: translateY(-50%);
        }
        .crosshair::after {
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
        }

        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
        }

        .joystick-base {
            width: 120px;
            height: 120px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #d4af37;
            border-radius: 70px;
            position: relative;
            pointer-events: auto;
        }

        .joystick-handle {
            width: 52px;
            height: 52px;
            background: radial-gradient(circle, #d4af37, #b8860b);
            border-radius: 30px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .fire-btn {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #e55, #a22);
            border: 2px solid #d4af37;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            color: white;
            cursor: pointer;
            pointer-events: auto;
        }

        .report-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .report-container {
            background: linear-gradient(135deg, #1a1a2e, #0a0a1a);
            padding: 30px;
            border-radius: 40px;
            text-align: center;
            border: 2px solid #d4af37;
        }

        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .admin-container {
            background: linear-gradient(135deg, #121926, #080c14);
            padding: 30px;
            border-radius: 40px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #d4af37;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        @media (max-width: 600px) {
            .joystick-base { width: 100px; height: 100px; }
            .fire-btn { width: 70px; height: 70px; font-size: 28px; }
            .play-btn, .wallet-btn { padding: 12px 25px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <!-- شاشة تسجيل الدخول -->
    <div class="login-screen" id="loginScreen">
        <div class="login-container">

    <canvas id="canvas"></canvas>

    <!-- شاشة النتائج -->
    <div class="report-screen" id="reportScreen">
        <div class="report-container">
            <h2>📊 تقرير المعركة</h2>
            <p id="reportText"></p>
            <button class="back-home-btn" id="backHomeBtn" style="margin-top:20px; padding:12px 30px; background:#d4af37; border:none; border-radius:30px;">🏠 العودة للرئيسية</button>
        </div>
    </div>

    <!-- لوحة التحكم -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-container">
            <h3 style="color:#d4af37;">⚙️ لوحة التحكم</h3>
            <div id="adminStats">جاري التحميل...</div>
            <input type="email" id="targetEmail" placeholder="البريد الإلكتروني" style="width:100%; margin:10px 0; padding:12px; border-radius:30px;">
            <input type="number" id="amount" placeholder="المبلغ" style="width:100%; margin:10px 0; padding:12px; border-radius:30px;">
            <button id="adminDepositBtn" style="width:100%; margin:5px 0; padding:12px; background:#d4af37; border:none; border-radius:30px;">➕ إيداع</button>
            <button id="adminWithdrawBtn" style="width:100%; margin:5px 0; padding:12px; background:#e74c3c; border:none; border-radius:30px;">➖ سحب</button>
            <button id="closeAdminBtn" style="width:100%; margin:10px 0; padding:12px; background:#555; border:none; border-radius:30px;">إغلاق</button>
        </div>
    </div>

    <div class="loading" id="loading">⏳ جاري التحميل...</div>

    <script type="importmap">
        {
            "imports": {

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js';

        // ============================================
        // 🔥 Firebase Configuration
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyCvPo4HlsNhyf1WBmTzIr6CdR1c2lQ5sHU",
            authDomain: "boomb-fa3e7.firebaseapp.com",
            databaseURL: "https://boomb-fa3e7-default-rtdb.firebaseio.com",
            projectId: "boomb-fa3e7",
            storageBucket: "boomb-fa3e7.firebasestorage.app",
            messagingSenderId: "499624996530",
            appId: "1:499624996530:web:235f71e450845c748523ab"
        };
        
        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        
        // ============================================
        // 🌐 Server Connection
        // ============================================
        const SERVER_URL = "https://tank-yf0p.onrender.com";
        import io from 'https://cdn.socket.io/4.6.0/socket.io.esm.min.js';
        const socket = io(SERVER_URL);
        
        // ============================================
        // 🎮 Game State
        // ============================================
        let currentUser = null;
        let currentBalance = 0;
        let isAdmin = false;
        let currentGame = null;
        let lobbySeats = [];
        let gameSettings = { seatPrice: 1, seatCount: 2 };
        
        // ============================================
        // 🎨 Three.js Game Engine
        // ============================================
        class AudioEngine {
            constructor() { this.ctx = null; this.engineOsc = null; this.engineGain = null; }
            init() { if (this.ctx) return; try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
            startEngine() { if (!this.ctx) this.init(); if (this.engineOsc) return; try { this.engineOsc = this.ctx.createOscillator(); this.engineGain = this.ctx.createGain(); const filter = this.ctx.createBiquadFilter(); this.engineOsc.type = 'sawtooth'; this.engineOsc.frequency.value = 42; filter.type = 'lowpass'; filter.frequency.value = 180; this.engineGain.gain.value = 0.08; this.engineOsc.connect(filter); filter.connect(this.engineGain); this.engineGain.connect(this.ctx.destination); this.engineOsc.start(); } catch(e) {} }
            updateEngine(speed) { if (!this.engineOsc) return; const freq = 42 + speed * 40; this.engineOsc.frequency.setTargetAtTime(freq, this.ctx.currentTime, 0.05); this.engineGain.gain.setTargetAtTime(0.08 + speed * 0.1, this.ctx.currentTime, 0.05); }
            fire() { if (!this.ctx) return; const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = 'square'; osc.frequency.setValueAtTime(170, now); osc.frequency.exponentialRampToValueAtTime(55, now + 0.28); gain.gain.setValueAtTime(0.7, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.32); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 0.32); }
            explosion(distance) { if (!this.ctx) return; const vol = Math.max(0.2, Math.min(0.9, 1 - distance / 60)); const now = this.ctx.currentTime; const noise = this.ctx.createBufferSource(); const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * 1.0, this.ctx.sampleRate); const data = buffer.getChannelData(0); for (let i = 0; i < buffer.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / buffer.length, 1.3); noise.buffer = buffer; const gain = this.ctx.createGain(); gain.gain.setValueAtTime(vol, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 1.0); noise.connect(gain); gain.connect(this.ctx.destination); noise.start(now); }
        }

        class GameSimulation {
            constructor() { 
                this.scene = null; this.camera = null; this.renderer = null; 
                this.tanks = new Map(); this.bullets = []; this.playerTank = null; 
                this.joystick = { x: 0, y: 0 }; this.cameraShake = 0; this.lastShot = 0; 
                this.obstacles = []; this.particles = []; this.team1Count = 0; this.team2Count = 0;
                this.playerTeam = null; this.otherPlayers = new Map();
            }

            init() { 
                this.scene = new THREE.Scene(); 
                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500); 
                this.renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight); 
                this.renderer.shadowMap.enabled = true; 
                this.scene.background = new THREE.Color(0x1a2a3a); 
                this.scene.fog = new THREE.FogExp2(0x1a2a3a, 0.0018);
                
                const ambient = new THREE.AmbientLight(0xffffff, 0.6); 
                this.scene.add(ambient); 
                const sun = new THREE.DirectionalLight(0xffeedd, 1.4); 
                sun.position.set(50, 70, 40); 
                sun.castShadow = true; 
                this.scene.add(sun); 
                
                this.createTerrain(); 
                this.createObstacles(); 
                this.animate(); 
            }
            
            createTerrain() { 
                const geo = new THREE.PlaneGeometry(450, 450, 60, 60); 
                geo.rotateX(-Math.PI / 2); 
                const ground = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x6a5a4a, roughness: 0.9 })); 
                ground.receiveShadow = true; 
                this.scene.add(ground); 
                const gridHelper = new THREE.GridHelper(460, 50, 0x8a8a7a, 0x5a5a4a);
                gridHelper.position.y = 0.03;
                this.scene.add(gridHelper);
            }
            
            createObstacles() {
                const rockMat = new THREE.MeshStandardMaterial({ color: 0x6a6a5a });
                const positions = [
                    { x: -45, z: -20 }, { x: -30, z: 40 }, { x: -10, z: -55 }, { x: 15, z: -35 },
                    { x: 40, z: -15 }, { x: 55, z: 25 }, { x: 35, z: 55 }, { x: -25, z: -45 },
                    { x: -55, z: 15 }, { x: 5, z: 60 }, { x: 70, z: -25 }, { x: -60, z: -40 }
                ];
                positions.forEach(pos => {
                    const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(1.2), rockMat);
                    rock.scale.set(1.8, 1.5, 1.8);
                    rock.position.set(pos.x, 0.6, pos.z);
                    rock.castShadow = true;
                    this.scene.add(rock);
                    this.obstacles.push(rock);
                });
            }
            
            createTank(color, x, z, team, playerId = null) { 
                const group = new THREE.Group(); 
                const body = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.9, 3.6), new THREE.MeshStandardMaterial({ color: color, metalness: 0.7 })); 
                body.position.y = 0.5; 
                body.castShadow = true; 
                group.add(body); 
                
                const turret = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 0.7, 32), new THREE.MeshStandardMaterial({ color: color, metalness: 0.8 })); 
                turret.position.y = 0.95; 
                group.add(turret); 
                
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.32, 2.2, 16), new THREE.MeshStandardMaterial({ color: 0x3a3a3a })); 
                barrel.position.set(0, 1.05, 1.5); 
                group.add(barrel); 
                
                group.position.set(x, 0, z); 
                group.userData = { health: 100, team: team, playerId: playerId }; 
                this.scene.add(group); 
                return group; 
            }
            
            fire(tank) { 
                const now = Date.now(); 
                if(now - this.lastShot < 3000) return false; 
                this.lastShot = now; 
                const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(tank.quaternion); 
                const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.26, 24, 24), new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4422 })); 
                bullet.position.copy(tank.position); 
                bullet.position.y += 1.2; 
                bullet.userData = { velocity: dir.multiplyScalar(2.6), owner: tank, life: 200 }; 
                this.scene.add(bullet); 
                this.bullets.push(bullet); 
                if(tank === this.playerTank) gameApp.audio.fire(); 
                
                // إرسال حدث الإطلاق للخادم
                socket.emit('shoot', { position: bullet.position, direction: dir });
                return true; 
            }
            
            createExplosion(pos, size = 1.2) {
                const explosionGroup = new THREE.Group();
                const flash = new THREE.Mesh(new THREE.SphereGeometry(size * 0.6, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4422, emissiveIntensity: 1.2 }));
                explosionGroup.add(flash);
                explosionGroup.position.copy(pos);
                this.scene.add(explosionGroup);
                
                for(let i = 0; i < 45; i++) { 
                    const particle = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 6), new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4422 })); 
                    particle.position.copy(pos); 
                    particle.userData = { vel: new THREE.Vector3((Math.random() - 0.5) * 1.2, Math.random() * 1.5 + 0.5, (Math.random() - 0.5) * 1.2), life: 1, gravity: 0.03 }; 
                    this.scene.add(particle); 
                    this.particles.push(particle); 
                }
                
                setTimeout(() => this.scene.remove(explosionGroup), 200);
                const dist = this.playerTank ? pos.distanceTo(this.playerTank.position) : 0;
                gameApp.audio.explosion(dist);
                if(dist < 35) this.cameraShake = 1.2;
            }
            
            updateParticles() {
                for(let i = this.particles.length-1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.userData.life -= 0.025;
                    if(p.userData.life <= 0) {
                        this.scene.remove(p);
                        this.particles.splice(i,1);
                    } else {
                        p.position.x += p.userData.vel.x;
                        p.position.z += p.userData.vel.z;
                        p.position.y += p.userData.vel.y;
                        if(p.userData.gravity) p.userData.vel.y -= p.userData.gravity;
                        p.scale.setScalar(p.userData.life * 1.5);
                    }
                }
            }
            
            update() { 
                this.updateParticles();
                
                if(this.playerTank) { 
                    const speed = -this.joystick.y * 0.22;
                    const rot = -this.joystick.x * 0.045; 
                    const oldX = this.playerTank.position.x, oldZ = this.playerTank.position.z; 
                    this.playerTank.rotation.y += rot; 
                    this.playerTank.translateZ(speed); 
                    if(this.checkCollision(this.playerTank)) this.playerTank.position.set(oldX, 0, oldZ); 
                    gameApp.audio.updateEngine(Math.abs(speed) * 3.5); 
                    
                    // إرسال حركة اللاعب للخادم
                    socket.emit('move', { position: this.playerTank.position, rotation: this.playerTank.rotation.y });
                    
                    const camOffset = new THREE.Vector3(0, 5.5, -12).applyQuaternion(this.playerTank.quaternion); 
                    let camTarget = this.playerTank.position.clone().add(camOffset); 
                    if(this.cameraShake > 0) { 
                        camTarget.x += (Math.random() - 0.5) * this.cameraShake * 0.5; 
                        camTarget.y += (Math.random() - 0.5) * this.cameraShake * 0.3; 
                        this.cameraShake *= 0.92; 
                    } 
                    this.camera.position.lerp(camTarget, 0.12); 
                    this.camera.lookAt(this.playerTank.position.clone().add(new THREE.Vector3(0, 1.2, 0))); 
                } 
                
                // تحديث الرصاصات
                for(let i = this.bullets.length-1; i >= 0; i--) { 
                    const b = this.bullets[i]; 
                    b.position.add(b.userData.velocity); 
                    b.userData.life--; 
                    let hit = false; 
                    
                    // فحص الاصطدام بالعوائق
                    for(let obs of this.obstacles) { 
                        if(new THREE.Box3().setFromObject(b).intersectsBox(new THREE.Box3().setFromObject(obs))) { 
                            hit = true; 
                            this.createExplosion(b.position); 
                            this.scene.remove(b); 
                            this.bullets.splice(i,1); 
                            break; 
                        } 
                    } 
                    
                    // فحص الاصطدام بالدبابات
                    if(!hit) { 
                        for(let [id, tank] of this.tanks) { 
                            if(tank !== b.userData.owner && tank.userData.team !== b.userData.owner.userData.team && b.position.distanceTo(tank.position) < 1.9) { 
                                hit = true; 
                                this.createExplosion(b.position, 1.5); 
                                this.scene.remove(b); 
                                this.bullets.splice(i,1); 
                                this.scene.remove(tank); 
                                this.tanks.delete(id); 
                                this.updateCounts(); 
                                if(tank === this.playerTank) gameApp.endBattle(this.team1Count === 0 ? 'الفريق الأزرق' : 'الفريق الأحمر'); 
                                else if(this.team1Count === 0 || this.team2Count === 0) { 
                                    const winner = this.team1Count === 0 ? 'الفريق الأزرق' : 'الفريق الأحمر'; 
                                    gameApp.endBattle(winner); 
                                } 
                                break; 
                            } 
                        } 
                    } 
                    if(!hit && (b.userData.life < 0 || Math.abs(b.position.x) > 430 || Math.abs(b.position.z) > 430)) { 
                        this.scene.remove(b); 
                        this.bullets.splice(i,1); 
                    } 
                } 
            }
            
            checkCollision(tank) { 
                const box = new THREE.Box3().setFromObject(tank); 
                for(let obs of this.obstacles) if(box.intersectsBox(new THREE.Box3().setFromObject(obs))) return true; 
                return false; 
            }
            
            updateCounts() { 
                this.team1Count = 0; this.team2Count = 0; 
                for(let tank of this.tanks.values()) if(tank.userData.team === 1) this.team1Count++; else this.team2Count++; 
                document.getElementById('team1').innerText = this.team1Count; 
                document.getElementById('team2').innerText = this.team2Count; 
            }
            
            updateOtherPlayer(data) {
                // تحديث موقع دبابة لاعب آخر
                let tank = this.otherPlayers.get(data.userId);
                if(!tank && data.userId !== currentUser?.uid) {
                    const color = data.team === 1 ? 0x8b5a2b : 0x4a6a8b;
                    tank = this.createTank(color, data.position.x, data.position.z, data.team, data.userId);
                    this.otherPlayers.set(data.userId, tank);
                    this.tanks.set(data.userId, tank);
                }
                if(tank) {
                    tank.position.set(data.position.x, 0, data.position.z);
                    tank.rotation.y = data.rotation;
                }
            }
            
            animate() { requestAnimationFrame(() => this.animate()); this.update(); if(this.renderer) this.renderer.render(this.scene, this.camera); }
        }

        // ============================================
        // 🎮 Game App Controller
        // ============================================
        const gameApp = {
            audio: new AudioEngine(), 
            sim: new GameSimulation(), 
            currentUser: null, 
            lobbySeats: [], 
            gameSettings: { seatPrice: 1, seatCount: 2 },
            battleResult: null,
            lobbyInterval: null,
            
            // Socket Events
            initSocket() {
                socket.on('connect', () => console.log('✅ Connected to server'));
                
                socket.on('auth_success', (data) => {
                    console.log('✅ Auth success:', data);
                    document.getElementById('loading').style.display = 'none';
                    this.currentUser = { uid: data.userId, email: data.email, username: data.username, balance: data.balance, isAdmin: data.isAdmin };
                    currentBalance = data.balance;
                    isAdmin = data.isAdmin;
                    localStorage.setItem('adminToken', 'authenticated');
                    localStorage.setItem('userEmail', data.email);
                    localStorage.setItem('isAdmin', data.isAdmin);
                    document.getElementById('balance').innerText = currentBalance;
                    document.getElementById('gameBalance').innerText = currentBalance;
                    document.getElementById('username').innerText = data.username || data.email.split('@')[0];
                    document.getElementById('gameUsername').innerText = data.username || data.email.split('@')[0];
                    if(isAdmin) document.getElementById('adminBtn').style.display = 'block';
                    this.showMainScreen();
                });
                
                socket.on('auth_error', (data) => {
                    document.getElementById('loading').style.display = 'none';
                    alert('خطأ في المصادقة: ' + data.message);
                });
                
                socket.on('lobby_joined', (data) => {
                    currentBalance = data.balance;
                    document.getElementById('balance').innerText = currentBalance;
                    document.getElementById('gameBalance').innerText = currentBalance;
                });
                
                socket.on('rooms_list', (data) => {
                    this.displayRooms(data.rooms);
                });
                
                socket.on('room_created', (data) => {
                    document.getElementById('lobbyStatus').innerHTML = '✅ تم إنشاء الغرفة، جاري انتظار لاعبين...';
                });
                
                socket.on('room_update', (data) => {
                    this.updateSeatsDisplay(data.players, data.maxSeats);
                    if(data.players.length === data.maxSeats) {
                        document.getElementById('lobbyStatus').innerHTML = '🚀 اكتملت المقاعد! جاري بدء المعركة...';
                    }
                });
                
                socket.on('game_start', (data) => {
                    this.startGame(data);
                });
                
                socket.on('game_ended', (data) => {
                    this.endBattle(data.winner);
                });
                
                socket.on('player_moved', (data) => {
                    if(this.sim) this.sim.updateOtherPlayer(data);
                });
                
                socket.on('player_shot', (data) => {
                    // عرض إطلاق نار من لاعب آخر
                    console.log('Player shot:', data.userId);
                });
                
                socket.on('error', (data) => {
                    alert(data.message);
                });
            },
            
            async login(email, password) {
                if(!email || !password) return alert('الرجاء إدخال البريد وكلمة المرور');
                document.getElementById('loading').style.display = 'flex';
                try {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const token = await userCredential.user.getIdToken();
                    socket.emit('auth', { token });
                } catch(error) {
                    document.getElementById('loading').style.display = 'none';
                    alert('خطأ: ' + error.message);
                }
            },
            
            async register(email, password) {
                if(!email || !password) return alert('الرجاء إدخال البريد وكلمة المرور');
                if(password.length < 6) return alert('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                document.getElementById('loading').style.display = 'flex';
                try {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const token = await userCredential.user.getIdToken();
                    socket.emit('auth', { token });
                } catch(error) {
                    document.getElementById('loading').style.display = 'none';
                    alert('خطأ: ' + error.message);
                }
            },
            
            showMainScreen() {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'flex';
                this.audio.init();
            },
            
            showLobby() {
                document.getElementById('mainScreen').style.display = 'none';
                document.getElementById('lobby').style.display = 'flex';
                socket.emit('join_lobby');
            },
            
            displayRooms(rooms) {
                const grid = document.getElementById('seatsGrid');
                if(!grid) return;
                if(!rooms || rooms.length === 0) {
                    grid.innerHTML = '<div style="grid-column:span 2; text-align:center;">لا توجد غرف، اضغط "إنشاء غرفة جديدة"</div>';
                    return;
                }
                grid.innerHTML = rooms.map(room => `
                    <div class="seat" onclick="gameApp.joinRoom('${room.id}')">
                        <div>🏠 غرفة</div>
                        <div>👥 ${room.players}/${room.maxSeats}</div>
                    </div>
                `).join('');
            },
            
            updateSeatsDisplay(players, maxSeats) {
                const grid = document.getElementById('seatsGrid');
                if(!grid) return;
                grid.innerHTML = '';
                for(let i = 0; i < maxSeats; i++) {
                    const isOccupied = i < players.length;
                    const seat = document.createElement('div');
                    seat.className = 'seat' + (isOccupied ? ' occupied' : '');
                    seat.innerHTML = `<div>${i+1}</div><div>${isOccupied ? players[i]?.slice(0,8) || 'لاعب' : 'شاغر'}</div>`;
                    grid.appendChild(seat);
                }
            },
            
            createRoom() {
                socket.emit('create_room', { seats: 2 });
            },
            
            joinRoom(roomId) {
                socket.emit('join_room', { roomId });
            },
            
            startGame(data) {
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                
                this.sim.init();
                const positions = [
                    { x: -75, z: -70, team: 1 }, { x: 65, z: 70, team: 2 }
                ];
                const myTeam = data.yourTeam || 1;
                const myPos = positions[myTeam === 1 ? 0 : 1];
                const myColor = myTeam === 1 ? 0x8b5a2b : 0x4a6a8b;
                
                this.sim.playerTeam = myTeam;
                this.sim.playerTank = this.sim.createTank(myColor, myPos.x, myPos.z, myTeam, currentUser?.uid);
                this.sim.tanks.set('player', this.sim.playerTank);
                
                this.setupControls();
                this.audio.startEngine();
                this.battleResult = { startTime: new Date() };
            },
            
            setupControls() {
                const base = document.getElementById('joystickBase'), handle = document.getElementById('joystickHandle');
                let active = false;
                const move = (e) => {
                    if(!active) return;
                    const rect = base.getBoundingClientRect();
                    const touch = e.touches ? e.touches[0] : e;
                    let dx = touch.clientX - (rect.left + rect.width/2), dy = touch.clientY - (rect.top + rect.height/2);
                    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 65), ang = Math.atan2(dy, dx);
                    dx = Math.cos(ang) * dist; dy = Math.sin(ang) * dist;
                    handle.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    this.sim.joystick = { x: dx/65, y: dy/65 };
                };
                base.addEventListener('touchstart', e => { e.preventDefault(); active = true; });
                base.addEventListener('mousedown', () => active = true);
                window.addEventListener('touchmove', move);
                window.addEventListener('mousemove', move);
                window.addEventListener('touchend', () => { active = false; handle.style.transform = 'translate(-50%, -50%)'; this.sim.joystick = { x: 0, y: 0 }; });
                window.addEventListener('mouseup', () => { active = false; handle.style.transform = 'translate(-50%, -50%)'; this.sim.joystick = { x: 0, y: 0 }; });
                
                let lastFire = 0;
                const fire = () => {
                    if(this.sim.playerTank && Date.now() - lastFire > 3000) {
                        lastFire = Date.now();
                        if(this.sim.fire(this.sim.playerTank)) {
                            document.getElementById('cooldownText').innerHTML = '⏱️ 3 ثواني';
                            let count = 3;
                            const interval = setInterval(() => {
                                count--;
                                if(count <= 0) {
                                    clearInterval(interval);
                                    document.getElementById('cooldownText').innerHTML = '✅ جاهز';
                                } else {
                                    document.getElementById('cooldownText').innerHTML = `⏱️ ${count} ثواني`;
                                }
                            }, 1000);
                        }
                    }
                };
                document.getElementById('fireBtn').addEventListener('click', fire);
                document.getElementById('fireBtn').addEventListener('touchstart', e => { e.preventDefault(); fire(); });
            },
            
            endBattle(winner) {
                const duration = Math.round((new Date() - this.battleResult.startTime) / 1000);
                const report = `🏆 الفائز: ${winner}\n⏱️ المدة: ${duration} ثانية`;
                document.getElementById('reportText').innerHTML = report.replace(/\n/g, '<br>');
                document.getElementById('reportScreen').style.display = 'flex';
                document.getElementById('hud').style.display = 'none';
                if(this.sim.playerTank) this.sim.scene.remove(this.sim.playerTank);
            },
            
            backToHome() {
                document.getElementById('reportScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'flex';
            },
            
            goToWallet() { window.location.href = 'wallet.html'; },
            goToAdmin() { window.location.href = 'admin.html'; },
            
            init() {
                this.initSocket();
                document.getElementById('loginBtn').onclick = () => {
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    this.login(email, password);
                };
                document.getElementById('registerBtn').onclick = () => {
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    this.register(email, password);
                };
                document.getElementById('playBtn').onclick = () => this.showLobby();
                document.getElementById('walletBtn').onclick = () => this.goToWallet();
                document.getElementById('adminBtn').onclick = () => this.goToAdmin();
                document.getElementById('createRoomBtn').onclick = () => this.createRoom();
                document.getElementById('backFromLobbyBtn').onclick = () => {
                    document.getElementById('lobby').style.display = 'none';
                    document.getElementById('mainScreen').style.display = 'flex';
                };
                document.getElementById('backHomeBtn').onclick = () => this.backToHome();
                document.getElementById('closeAdminBtn').onclick = () => document.getElementById('adminPanel').style.display = 'none';
            }
        };
        
        window.gameApp = gameApp;
        gameApp.init();
        console.log('🎮 Game ready!');
    </script>
</body>
</html>
