<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القزم - نسخة مطورة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #87CEEB 0%, #E0F6FF 50%, #87CEEB 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        .header {
            text-align: center;
            color: rgba(70, 130, 180, 0.9);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            animation: fadeIn 1s ease-in;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #DAA520 0%, #FF8C00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.8;
            letter-spacing: 1px;
            color: #4682B4;
        }

        .footer {
            text-align: center;
            color: rgba(70, 130, 180, 0.7);
            font-size: 0.9rem;
            animation: fadeIn 2s ease-in;
        }

        .stats {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(218, 165, 32, 0.5);
            border-radius: 8px;
            padding: 1rem;
            color: rgba(70, 130, 180, 0.8);
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            min-width: 200px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(218, 165, 32, 0.2);
        }

        .stat-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .stat-label {
            color: rgba(218, 165, 32, 0.9);
            font-weight: bold;
        }

        .stat-value {
            color: rgba(70, 130, 180, 0.9);
            font-weight: bold;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .header p {
                font-size: 0.85rem;
            }

            .stats {
                font-size: 0.75rem;
                bottom: 1rem;
                right: 1rem;
                min-width: 150px;
            }

            .ui-overlay {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="ui-overlay">
    <div class="header">
        <h1>🧙 القزم المحارب 🧙</h1>
        <p>شخصية ثلاثية الأبعاد</p>
    </div>
    <div class="footer">
        <p>قزم بقنبلة في يده!</p>
    </div>
</div>

<div class="stats">
    <div class="stat-item">
        <span class="stat-label">FPS:</span>
        <span class="stat-value" id="fps">60</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">الكائنات:</span>
        <span class="stat-value">12</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">الإضاءات:</span>
        <span class="stat-value">3</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">الحالة:</span>
        <span class="stat-value" style="color: #32CD32;">نشط ✓</span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- الإعدادات الأساسية ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 20, 40);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // --- نظام الإضاءة ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 7);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.width = 2048;
    directionalLight.shadow.mapSize.height = 2048;
    scene.add(directionalLight);

    const warmLight = new THREE.PointLight(0xFFD700, 0.5, 20);
    warmLight.position.set(-3, 2, 3);
    scene.add(warmLight);

    // --- الخامات ---
    const skinMat = new THREE.MeshStandardMaterial({
        color: 0xF4A460,
        roughness: 0.6,
        metalness: 0.0
    });

    const clothesMat = new THREE.MeshStandardMaterial({
        color: 0x8B4513,
        roughness: 0.8,
        metalness: 0.0
    });

    const hatMat = new THREE.MeshStandardMaterial({
        color: 0xDAA520,
        roughness: 0.7,
        metalness: 0.1
    });

    const beltMat = new THREE.MeshStandardMaterial({
        color: 0xFFD700,
        roughness: 0.5,
        metalness: 0.3
    });

    const bombMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a1a,
        roughness: 0.3,
        metalness: 0.6
    });

    const fuseMat = new THREE.MeshStandardMaterial({
        color: 0xffcc00,
        roughness: 0.4,
        metalness: 0.2,
        emissive: 0xff6600,
        emissiveIntensity: 0.3
    });

    // --- بناء الشخصية ---
    const dwarf = new THREE.Group();

    // ===== الرأس =====
    const headGeo = new THREE.SphereGeometry(0.45, 32, 32);
    const head = new THREE.Mesh(headGeo, skinMat);
    head.position.y = 1.3;
    head.castShadow = true;
    head.receiveShadow = true;
    dwarf.add(head);

    // ===== القبعة =====
    const hatGeo = new THREE.ConeGeometry(0.5, 0.7, 32);
    const hat = new THREE.Mesh(hatGeo, hatMat);
    hat.position.y = 1.9;
    hat.rotation.z = 0.3;
    hat.castShadow = true;
    hat.receiveShadow = true;
    dwarf.add(hat);

    // ===== الجسم =====
    const bodyGeo = new THREE.CapsuleGeometry(0.4, 0.8, 8, 16);
    const body = new THREE.Mesh(bodyGeo, clothesMat);
    body.position.y = 0.4;
    body.castShadow = true;
    body.receiveShadow = true;
    dwarf.add(body);

    // ===== الحزام =====
    const beltGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.15, 32);
    const belt = new THREE.Mesh(beltGeo, beltMat);
    belt.position.y = 0.35;
    belt.castShadow = true;
    belt.receiveShadow = true;
    dwarf.add(belt);

    // ===== الذراع اليسرى =====
    const leftArmGeo = new THREE.CapsuleGeometry(0.1, 0.6, 8, 16);
    const leftArm = new THREE.Mesh(leftArmGeo, clothesMat);
    leftArm.position.set(-0.65, 0.7, 0);
    leftArm.rotation.z = Math.PI / 4;
    leftArm.castShadow = true;
    leftArm.receiveShadow = true;
    dwarf.add(leftArm);

    // ===== اليد اليسرى =====
    const leftHandGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const leftHand = new THREE.Mesh(leftHandGeo, skinMat);
    leftHand.position.set(-1.0, 0.2, 0);
    leftHand.castShadow = true;
    dwarf.add(leftHand);

    // ===== الذراع اليمنى (تحمل القنبلة) =====
    const rightArmGeo = new THREE.CapsuleGeometry(0.1, 0.6, 8, 16);
    const rightArm = new THREE.Mesh(rightArmGeo, clothesMat);
    rightArm.position.set(0.65, 0.7, 0);
    rightArm.rotation.z = -Math.PI / 3;
    rightArm.castShadow = true;
    rightArm.receiveShadow = true;
    dwarf.add(rightArm);

    // ===== اليد اليمنى =====
    const rightHandGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const rightHand = new THREE.Mesh(rightHandGeo, skinMat);
    rightHand.position.set(0.95, 0.3, 0);
    rightHand.castShadow = true;
    dwarf.add(rightHand);

    // ===== الساق اليسرى =====
    const leftLegGeo = new THREE.CapsuleGeometry(0.12, 0.7, 8, 16);
    const leftLeg = new THREE.Mesh(leftLegGeo, clothesMat);
    leftLeg.position.set(-0.3, -0.6, 0);
    leftLeg.castShadow = true;
    leftLeg.receiveShadow = true;
    dwarf.add(leftLeg);

    // ===== القدم اليسرى =====
    const leftFootGeo = new THREE.BoxGeometry(0.3, 0.2, 0.4);
    const footMat = new THREE.MeshStandardMaterial({ color: 0x654321 });
    const leftFoot = new THREE.Mesh(leftFootGeo, footMat);
    leftFoot.position.set(-0.3, -1.15, 0);
    leftFoot.castShadow = true;
    leftFoot.receiveShadow = true;
    dwarf.add(leftFoot);

    // ===== الساق اليمنى =====
    const rightLegGeo = new THREE.CapsuleGeometry(0.12, 0.7, 8, 16);
    const rightLeg = new THREE.Mesh(rightLegGeo, clothesMat);
    rightLeg.position.set(0.3, -0.6, 0);
    rightLeg.castShadow = true;
    rightLeg.receiveShadow = true;
    dwarf.add(rightLeg);

    // ===== القدم اليمنى =====
    const rightFoot = new THREE.Mesh(leftFootGeo, footMat);
    rightFoot.position.set(0.3, -1.15, 0);
    rightFoot.castShadow = true;
    rightFoot.receiveShadow = true;
    dwarf.add(rightFoot);

    // ===== القنبلة في اليد اليمنى =====
    const bombGroup = new THREE.Group();

    // جسم القنبلة (كرة سوداء)
    const bombBodyGeo = new THREE.SphereGeometry(0.25, 32, 32);
    const bombBody = new THREE.Mesh(bombBodyGeo, bombMat);
    bombBody.castShadow = true;
    bombBody.receiveShadow = true;

    // الفتيل
    const fusePoints = [];
    fusePoints.push(new THREE.Vector3(0, 0.2, 0));
    fusePoints.push(new THREE.Vector3(0.05, 0.35, 0.05));
    fusePoints.push(new THREE.Vector3(0.1, 0.45, 0));
    
    const fuseCurve = new THREE.CatmullRomCurve3(fusePoints);
    const fuseGeo = new THREE.TubeGeometry(fuseCurve, 8, 0.02, 6, false);
    const fuse = new THREE.Mesh(fuseGeo, fuseMat);
    fuse.castShadow = true;

    bombGroup.add(bombBody);
    bombGroup.add(fuse);
    bombGroup.position.set(1.1, 0.35, 0.2);
    bombGroup.scale.set(0.8, 0.8, 0.8);
    dwarf.add(bombGroup);

    // ===== الأرضية =====
    const groundGeo = new THREE.PlaneGeometry(15, 15);
    const groundMat = new THREE.MeshStandardMaterial({
        color: 0x90EE90,
        roughness: 0.8
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.5;
    ground.receiveShadow = true;
    scene.add(ground);

    scene.add(dwarf);

    // --- متغيرات الحركة والتأثيرات ---
    let frameCount = 0;
    const fpsDisplay = document.getElementById('fps');
    let lastTime = Date.now();

    // --- حلقة التحريك ---
    function animate() {
        requestAnimationFrame(animate);

        frameCount++;
        const currentTime = Date.now();
        if (currentTime - lastTime >= 1000) {
            fpsDisplay.textContent = frameCount;
            frameCount = 0;
            lastTime = currentTime;
        }

        const t = Date.now() * 0.001;

        // دوران لطيف
        dwarf.rotation.y = Math.sin(t * 0.5) * 0.2;

        // قفز خفيف
        dwarf.position.y = Math.sin(t * 1.5) * 0.1;

        // حركة الذراع اليسرى
        leftArm.rotation.z = Math.PI / 4 + Math.sin(t * 1.2) * 0.3;

        // حركة الذراع اليمنى (مع القنبلة)
        rightArm.rotation.z = -Math.PI / 3 + Math.sin(t * 1.2 + Math.PI) * 0.3;

        // حركة القنبلة
        bombGroup.rotation.z = Math.sin(t * 2) * 0.3;
        bombGroup.rotation.y = Math.cos(t * 1.5) * 0.2;

        // حركة الساقين
        leftLeg.rotation.x = Math.sin(t * 1.2) * 0.25;
        rightLeg.rotation.x = Math.sin(t * 1.2 + Math.PI) * 0.25;

        // تمايل القبعة
        hat.rotation.z = 0.3 + Math.sin(t * 0.8) * 0.15;

        renderer.render(scene, camera);
    }

    // التعامل مع تغيير حجم النافذة
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>


</body>
</html>
