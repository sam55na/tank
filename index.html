<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المحارب الرشيق - Smooth Shooter Experience</title>
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body { margin: 0; overflow: hidden; background: #0a0e27; font-family: 'Arial', sans-serif; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); pointer-events: none; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ff88; }
        #crosshair::before { width: 2px; height: 12px; left: 50%; top: -15px; transform: translateX(-50%); }
        #crosshair::after { width: 12px; height: 2px; left: -15px; top: 50%; transform: translateY(-50%); }
        #info-panel { position: absolute; top: 20px; left: 20px; background: rgba(10, 14, 39, 0.85); color: #00ff88; padding: 12px 20px; border-radius: 6px; border: 1px solid #00ff88; font-family: 'Courier New', monospace; font-size: 0.85rem; }
        #info-panel h1 { margin: 0; font-size: 1rem; color: #00ffff; }
        #info-panel p { margin: 3px 0 0; font-size: 0.75rem; opacity: 0.8; }
        #score-panel { position: absolute; top: 20px; right: 20px; background: rgba(10, 14, 39, 0.85); color: #ffff00; padding: 10px 20px; border-radius: 6px; border: 1px solid #ffff00; font-size: 1rem; font-weight: bold; font-family: 'Courier New', monospace; }
        #joystick-container { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(0, 255, 136, 0.05); border-radius: 50%; pointer-events: auto; border: 1px solid rgba(0, 255, 136, 0.2); }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: radial-gradient(circle, #00ff88, #00cc66); border-radius: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 15px #00ff88; }
        #action-buttons { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 20px; pointer-events: auto; }
        .action-btn { width: 70px; height: 70px; border-radius: 50%; border: 1px solid; color: white; font-weight: bold; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px; transition: all 0.1s; user-select: none; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), rgba(0,0,0,0.4)); }
        #btn-jump { border-color: #00d4ff; box-shadow: 0 0 15px #00d4ff; }
        #btn-throw { border-color: #ff0055; box-shadow: 0 0 15px #ff0055; }
        .action-btn:active { transform: scale(0.88); }
        #fps-counter { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); color: #00ff88; padding: 8px 12px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="crosshair"></div>
        <div id="info-panel">
            <h1>⚔️ VANGUARD SHOOTER</h1>
            <p>Smooth TPP • Agile Combat • Laser Precision</p>
        </div>
        <div id="score-panel">TARGETS: <span id="score">0</span></div>
        <div id="joystick-container"><div id="joystick-knob"></div></div>
        <div id="action-buttons">
            <button class="action-btn" id="btn-jump">⬆️</button>
            <button class="action-btn" id="btn-throw">🔥</button>
        </div>
        <div id="fps-counter">FPS: 60</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==========================================
        // 1. إعداد المشهد
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0e27);
        scene.fog = new THREE.Fog(0x0a0e27, 120, 300);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // الإضاءة
        const sunLight = new THREE.DirectionalLight(0x00ffff, 1.3);
        sunLight.position.set(100, 150, 100);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.left = -200;
        sunLight.shadow.camera.right = 200;
        sunLight.shadow.camera.top = 200;
        sunLight.shadow.camera.bottom = -200;
        sunLight.shadow.bias = -0.0008;
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0x1a2a4a, 0.9);
        scene.add(ambientLight);

        // الأرضية
        const groundGeo = new THREE.PlaneGeometry(600, 600);
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x0f1a2a,
            roughness: 0.95,
            metalness: 0.05
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // العوائق
        const obstacles = [];
        for(let i=0; i<40; i++) {
            const rockGeo = new THREE.DodecahedronGeometry(Math.random() * 2.5 + 1.2);
            const rockMat = new THREE.MeshStandardMaterial({
                color: 0x1a3a4a,
                roughness: 0.8,
                metalness: 0.2
            });
            const rock = new THREE.Mesh(rockGeo, rockMat);
            rock.position.set(Math.random()*400-200, 0, Math.random()*400-200);
            rock.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
            rock.castShadow = true;
            rock.receiveShadow = true;
            scene.add(rock);
            obstacles.push({ mesh: rock, radius: Math.random() * 2.5 + 1.2 });
        }

        // ==========================================
        // 2. بناء الشخصية الرشيقة (Athletic Build)
        // ==========================================
        const matArmor = new THREE.MeshStandardMaterial({
            color: 0x1a1a3e,
            metalness: 0.9,
            roughness: 0.15,
            emissive: 0x00ff88,
            emissiveIntensity: 0.1
        });
        const matJoint = new THREE.MeshStandardMaterial({
            color: 0xff6600,
            metalness: 0.8,
            roughness: 0.2,
            emissive: 0xff3300,
            emissiveIntensity: 0.2
        });
        const matGlow = new THREE.MeshStandardMaterial({
            color: 0x00ffff,
            emissive: 0x00ffff,
            emissiveIntensity: 0.7,
            metalness: 0.95
        });

        const character = new THREE.Group();
        character.scale.set(1.1, 1.1, 1.1); // أصغر قليلاً للرشاقة
        scene.add(character);

        // الجذع (أنحف)
        const torsoGroup = new THREE.Group();
        character.add(torsoGroup);

        const upperTorso = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.52, 1.05, 28), matArmor);
        upperTorso.position.y = 2.5;
        upperTorso.castShadow = true;
        torsoGroup.add(upperTorso);

        const lowerTorso = new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.62, 0.88, 28), matArmor);
        lowerTorso.position.y = 1.62;
        lowerTorso.castShadow = true;
        torsoGroup.add(lowerTorso);

        // الرأس
        const headGroup = new THREE.Group();
        torsoGroup.add(headGroup);

        const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), matArmor);
        head.position.y = 3.3;
        head.castShadow = true;
        headGroup.add(head);

        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.14, 0.18), matGlow);
        visor.position.set(0, 3.4, 0.3);
        headGroup.add(visor);

        // الأذرع (أنحف وأسرع)
        function buildArm(side) {
            const armGroup = new THREE.Group();
            const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.48, 28, 28), matJoint);
            shoulder.castShadow = true;
            armGroup.add(shoulder);

            const bicep = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.2, 0.92, 24), matArmor);
            bicep.position.y = -0.62;
            bicep.castShadow = true;
            armGroup.add(bicep);

            const forearmGroup = new THREE.Group();
            forearmGroup.position.y = -1.2;

            const elbow = new THREE.Mesh(new THREE.SphereGeometry(0.24, 28, 28), matJoint);
            elbow.castShadow = true;
            forearmGroup.add(elbow);

            const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.22, 1.0, 24), matArmor);
            forearm.position.y = -0.54;
            forearm.castShadow = true;
            forearmGroup.add(forearm);

            const wrist = new THREE.Mesh(new THREE.SphereGeometry(0.2, 24, 24), matJoint);
            wrist.position.y = -1.1;
            wrist.castShadow = true;
            forearmGroup.add(wrist);

            const hand = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.3, 0.35), matJoint);
            hand.position.y = -1.22;
            hand.castShadow = true;
            forearmGroup.add(hand);

            armGroup.add(forearmGroup);
            armGroup.position.set(side * 1.3, 2.8, 0);

            return { armGroup, forearmGroup };
        }

        const rightArmData = buildArm(1);
        const leftArmData = buildArm(-1);
        torsoGroup.add(rightArmData.armGroup);
        torsoGroup.add(leftArmData.armGroup);

        // الأرجل (أنحف)
        function buildLeg(side) {
            const legGroup = new THREE.Group();
            const hipJoint = new THREE.Mesh(new THREE.SphereGeometry(0.4, 28, 28), matJoint);
            hipJoint.position.y = -0.18;
            hipJoint.castShadow = true;
            legGroup.add(hipJoint);

            const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.3, 1.15, 24), matArmor);
            thigh.position.y = -0.7;
            thigh.castShadow = true;
            legGroup.add(thigh);

            const shinGroup = new THREE.Group();
            shinGroup.position.y = -1.35;

            const knee = new THREE.Mesh(new THREE.SphereGeometry(0.3, 28, 28), matJoint);
            knee.castShadow = true;
            shinGroup.add(knee);

            const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.24, 1.15, 24), matArmor);
            shin.position.y = -0.6;
            shin.castShadow = true;
            shinGroup.add(shin);

            const ankle = new THREE.Mesh(new THREE.SphereGeometry(0.25, 24, 24), matJoint);
            ankle.position.y = -1.25;
            ankle.castShadow = true;
            shinGroup.add(ankle);

            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.3, 1.0), matArmor);
            foot.position.set(0, -1.38, 0.24);
            foot.castShadow = true;
            shinGroup.add(foot);

            legGroup.add(shinGroup);
            legGroup.position.set(side * 0.6, 1.4, 0);

            return { legGroup, shinGroup };
        }

        const rightLegData = buildLeg(1);
        const leftLegData = buildLeg(-1);
        character.add(rightLegData.legGroup);
        character.add(leftLegData.legGroup);

        // ==========================================
        // 3. نظام الكاميرا السلس (Smooth Spring Arm)
        // ==========================================
        const cameraTarget = new THREE.Vector3();
        const cameraVelocity = new THREE.Vector3();
        const cameraSmoothing = 0.08; // تخميد الكاميرا

        function updateCamera() {
            const targetOffset = new THREE.Vector3(0, 5.5, -14);
            targetOffset.applyQuaternion(character.quaternion);
            const targetPos = character.position.clone().add(targetOffset);

            // تطبيق Spring Arm Damping
            cameraVelocity.copy(targetPos).sub(camera.position).multiplyScalar(cameraSmoothing);
            camera.position.add(cameraVelocity);

            // النظر إلى نقطة أعلى من الشخصية قليلاً
            const lookTarget = character.position.clone().add(new THREE.Vector3(0, 3.2, 0));
            camera.lookAt(lookTarget);
        }

        // ==========================================
        // 4. نظام الأهداف
        // ==========================================
        const targets = [];
        let score = 0;
        function spawnTarget() {
            const target = new THREE.Mesh(
                new THREE.SphereGeometry(1.2, 16, 16),
                new THREE.MeshStandardMaterial({
                    color: 0xff0055,
                    emissive: 0xff0055,
                    emissiveIntensity: 0.5,
                    metalness: 0.7
                })
            );
            const angle = Math.random() * Math.PI * 2;
            const dist = 35 + Math.random() * 70;
            target.position.set(Math.cos(angle)*dist, 2.2, Math.sin(angle)*dist);
            target.castShadow = true;
            scene.add(target);
            targets.push(target);
        }
        for(let i=0; i<20; i++) spawnTarget();

        // ==========================================
        // 5. نظام القذائف (Laser-Straight من الكاميرا)
        // ==========================================
        const projectiles = [];
        const particles = [];

        function fireProjectile(isRight) {
            // الرمي من منظور الكاميرا (Crosshair Accurate)
            const rayDir = new THREE.Vector3(0, 0, -1);
            rayDir.applyQuaternion(camera.quaternion);
            rayDir.normalize();

            const proj = new THREE.Mesh(
                new THREE.SphereGeometry(0.25, 12, 12),
                new THREE.MeshStandardMaterial({
                    color: 0xff0055,
                    emissive: 0xff0055,
                    emissiveIntensity: 1.0,
                    metalness: 0.9
                })
            );
            proj.position.copy(camera.position).add(rayDir.clone().multiplyScalar(5));
            proj.castShadow = true;
            scene.add(proj);

            projectiles.push({
                mesh: proj,
                vel: rayDir.multiplyScalar(1.0), // سرعة عالية
                life: 250,
                hasExploded: false
            });
        }

        function createExplosion(pos) {
            for(let i=0; i<40; i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(0.08 + Math.random() * 0.1, 6, 6),
                    new THREE.MeshStandardMaterial({
                        color: [0xff0055, 0xffff00, 0xff6600][Math.floor(Math.random()*3)],
                        emissive: [0xff0055, 0xffff00, 0xff6600][Math.floor(Math.random()*3)],
                        emissiveIntensity: 0.9,
                        metalness: 0.7
                    })
                );
                p.position.copy(pos);
                scene.add(p);

                const angle = Math.random() * Math.PI * 2;
                const elevation = Math.random() * Math.PI - Math.PI / 2;
                const vel = new THREE.Vector3(
                    Math.cos(angle) * Math.cos(elevation),
                    Math.sin(elevation),
                    Math.sin(angle) * Math.cos(elevation)
                ).multiplyScalar(0.4 + Math.random() * 0.25);

                particles.push({
                    mesh: p,
                    vel: vel,
                    life: 0,
                    maxLife: 50,
                    friction: 0.95
                });
            }
        }

        // ==========================================
        // 6. نظام التحكم
        // ==========================================
        const input = { forward: 0, side: 0, jump: false, throw: false };
        const joystick = { active: false, startX: 0, startY: 0 };
        const knob = document.getElementById('joystick-knob');

        document.getElementById('joystick-container').addEventListener('touchstart', (e) => {
            joystick.active = true;
            joystick.startX = e.touches[0].clientX;
            joystick.startY = e.touches[0].clientY;
        });

        window.addEventListener('touchmove', (e) => {
            if (!joystick.active) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystick.startX;
            let dy = touch.clientY - joystick.startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 50;
            if (dist > maxDist) {
                dx *= maxDist / dist;
                dy *= maxDist / dist;
            }
            knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            input.side = -dx / maxDist;
            input.forward = -dy / maxDist;
        });

        window.addEventListener('touchend', () => {
            joystick.active = false;
            knob.style.transform = `translate(-50%, -50%)`;
            input.forward = 0;
            input.side = 0;
        });

        document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); input.jump = true; });
        document.getElementById('btn-throw').addEventListener('touchstart', (e) => { e.preventDefault(); input.throw = true; });

        const keys = {};
        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // ==========================================
        // 7. منطق اللعبة
        // ==========================================
        let state = 'idle';
        let animTime = 0;
        let verticalVel = 0;
        let isJumping = false;
        let throwTimer = 0;
        let throwSide = true;
        let frameCount = 0;
        let lastFpsTime = Date.now();

        function lerp(a, b, t) { return a + (b - a) * Math.min(t, 1); }

        function checkCollision(pos, radius) {
            for(let obs of obstacles) {
                if(pos.distanceTo(obs.mesh.position) < radius + obs.radius) return true;
            }
            return false;
        }

        function updateLogic() {
            if (keys['KeyW']) input.forward = 1;
            else if (keys['KeyS']) input.forward = -1;
            else if (!joystick.active) input.forward = 0;

            if (keys['KeyA']) input.side = 1;
            else if (keys['KeyD']) input.side = -1;
            else if (!joystick.active) input.side = 0;

            if (keys['Space']) input.jump = true;
            if (keys['KeyF'] || keys['KeyT']) input.throw = true;

            // الحركة السريعة
            if (Math.abs(input.forward) > 0.1 || Math.abs(input.side) > 0.1) {
                const angle = Math.atan2(input.side, input.forward);
                character.rotation.y = angle;
                const speed = 0.28; // سرعة عالية
                const newPos = character.position.clone();
                newPos.x += Math.sin(character.rotation.y) * speed;
                newPos.z += Math.cos(character.rotation.y) * speed;
                
                if(!checkCollision(newPos, 1.2)) {
                    character.position.copy(newPos);
                }
                state = 'run';
            } else {
                state = 'idle';
            }

            // القفز
            if (input.jump && !isJumping) {
                verticalVel = 0.36;
                isJumping = true;
                input.jump = false;
            }
            if (isJumping) {
                character.position.y += verticalVel;
                verticalVel -= 0.02;
                if (character.position.y <= 0) {
                    character.position.y = 0;
                    isJumping = false;
                    verticalVel = 0;
                }
                state = 'jump';
            }

            // الرمي
            if (input.throw && throwTimer <= 0) {
                fireProjectile(throwSide);
                throwSide = !throwSide;
                throwTimer = 30;
                input.throw = false;
            }
            if (throwTimer > 0) throwTimer--;

            // تحديث الكاميرا
            updateCamera();

            // القذائف
            for(let i=projectiles.length-1; i>=0; i--) {
                const p = projectiles[i];
                p.mesh.position.add(p.vel);
                p.life--;

                targets.forEach((t, idx) => {
                    if (p.mesh.position.distanceTo(t.position) < 1.7) {
                        createExplosion(t.position);
                        scene.remove(t);
                        targets.splice(idx, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                        spawnTarget();
                        p.life = 0;
                    }
                });

                if (p.mesh.position.y < 0.3 && !p.hasExploded) {
                    createExplosion(p.mesh.position);
                    p.hasExploded = true;
                    p.life = 0;
                }

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    projectiles.splice(i, 1);
                }
            }

            // الجزيئات
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.vel);
                p.vel.multiplyScalar(p.friction);
                p.vel.y -= 0.008;
                p.life++;
                if (p.life > p.maxLife * 0.5) {
                    p.mesh.material.opacity = 1 - (p.life - p.maxLife * 0.5) / (p.maxLife * 0.5);
                    p.mesh.material.transparent = true;
                }
                if (p.life >= p.maxLife) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
        }

        function updateAnimations() {
            const s = 0.22;
            if (state === 'idle') {
                rightArmData.armGroup.rotation.x = lerp(rightArmData.armGroup.rotation.x, Math.sin(animTime * 0.3) * 0.1, s);
                leftArmData.armGroup.rotation.x = lerp(leftArmData.armGroup.rotation.x, -Math.sin(animTime * 0.3) * 0.1, s);
                rightArmData.forearmGroup.rotation.x = lerp(rightArmData.forearmGroup.rotation.x, -0.25, s);
                leftArmData.forearmGroup.rotation.x = lerp(leftArmData.forearmGroup.rotation.x, -0.25, s);
                rightLegData.legGroup.rotation.x = lerp(rightLegData.legGroup.rotation.x, 0, s);
                leftLegData.legGroup.rotation.x = lerp(leftLegData.legGroup.rotation.x, 0, s);
                rightLegData.shinGroup.rotation.x = lerp(rightLegData.shinGroup.rotation.x, 0, s);
                leftLegData.shinGroup.rotation.x = lerp(leftLegData.shinGroup.rotation.x, 0, s);
            } else if (state === 'run') {
                const t = animTime * 6.5; // أسرع
                rightLegData.legGroup.rotation.x = lerp(rightLegData.legGroup.rotation.x, Math.sin(t) * 0.88, s);
                leftLegData.legGroup.rotation.x = lerp(leftLegData.legGroup.rotation.x, -Math.sin(t) * 0.88, s);
                rightLegData.shinGroup.rotation.x = lerp(rightLegData.shinGroup.rotation.x, Math.max(0, -Math.sin(t)) * 0.98, s);
                leftLegData.shinGroup.rotation.x = lerp(leftLegData.shinGroup.rotation.x, Math.max(0, Math.sin(t)) * 0.98, s);
                
                rightArmData.armGroup.rotation.x = lerp(rightArmData.armGroup.rotation.x, Math.sin(t) * 0.78, s);
                leftArmData.armGroup.rotation.x = lerp(leftArmData.armGroup.rotation.x, -Math.sin(t) * 0.78, s);
                rightArmData.forearmGroup.rotation.x = lerp(rightArmData.forearmGroup.rotation.x, -1.2, s);
                leftArmData.forearmGroup.rotation.x = lerp(leftArmData.forearmGroup.rotation.x, -1.2, s);
                
                torsoGroup.rotation.z = Math.sin(t * 0.5) * 0.08;
            } else if (state === 'jump') {
                rightArmData.armGroup.rotation.x = lerp(rightArmData.armGroup.rotation.x, 0.85, s);
                leftArmData.armGroup.rotation.x = lerp(leftArmData.armGroup.rotation.x, 0.85, s);
                rightArmData.forearmGroup.rotation.x = lerp(rightArmData.forearmGroup.rotation.x, -1.35, s);
                leftArmData.forearmGroup.rotation.x = lerp(leftArmData.forearmGroup.rotation.x, -1.35, s);
                rightLegData.legGroup.rotation.x = lerp(rightLegData.legGroup.rotation.x, -0.6, s);
                leftLegData.legGroup.rotation.x = lerp(leftLegData.legGroup.rotation.x, -0.6, s);
                rightLegData.shinGroup.rotation.x = lerp(rightLegData.shinGroup.rotation.x, 0.9, s);
                leftLegData.shinGroup.rotation.x = lerp(leftLegData.shinGroup.rotation.x, 0.9, s);
            }

            if(throwTimer > 16) {
                const throwProgress = (30 - throwTimer) / 14;
                if(throwSide) {
                    rightArmData.armGroup.rotation.x = lerp(rightArmData.armGroup.rotation.x, -1.3 + throwProgress * 0.5, s);
                    rightArmData.armGroup.rotation.z = lerp(rightArmData.armGroup.rotation.z, -0.4, s);
                    rightArmData.forearmGroup.rotation.x = lerp(rightArmData.forearmGroup.rotation.x, -1.8, s);
                } else {
                    leftArmData.armGroup.rotation.x = lerp(leftArmData.armGroup.rotation.x, -1.3 + throwProgress * 0.5, s);
                    leftArmData.armGroup.rotation.z = lerp(leftArmData.armGroup.rotation.z, 0.4, s);
                    leftArmData.forearmGroup.rotation.x = lerp(leftArmData.forearmGroup.rotation.x, -1.8, s);
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            animTime += 0.016;
            updateLogic();
            updateAnimations();
            renderer.render(scene, camera);

            // عداد FPS
            frameCount++;
            const now = Date.now();
            if (now - lastFpsTime >= 1000) {
                document.getElementById('fps-counter').innerText = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsTime = now;
            }
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
