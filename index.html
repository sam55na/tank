<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TNT Wars - ساحة الدبابات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Cairo', 'Tahoma', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            background: #05070c;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.4;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 40%, rgba(212,175,55,0.15) 0%, transparent 50%),
                        repeating-linear-gradient(45deg, rgba(212,175,55,0.05) 0px, rgba(212,175,55,0.05) 2px, transparent 2px, transparent 8px);
            animation: rotateBg 60s linear infinite;
        }

        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, #0a0f1a, #03050a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(2px);
        }

        .login-container {
            background: rgba(8, 12, 20, 0.75);
            backdrop-filter: blur(20px);
            padding: clamp(30px, 6vw, 50px) clamp(25px, 5vw, 45px);
            border-radius: min(60px, 12vw);
            width: calc(100% - 40px);
            max-width: 480px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,175,55,0.1) inset;
        }

        .login-container h1 {
            background: linear-gradient(135deg, #f3e6b0, #d4af37, #b8860b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: clamp(28px, 7vw, 48px);
            margin-bottom: 12px;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .subtitle {
            color: #9aaebf;
            font-size: clamp(12px, 3.5vw, 15px);
            margin-bottom: clamp(30px, 7vw, 45px);
        }

        .google-btn {
            width: 100%;
            padding: clamp(14px, 4vw, 18px);
            background: white;
            border: none;
            border-radius: min(80px, 15vw);
            font-size: clamp(16px, 4.5vw, 18px);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: #1e2a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: inherit;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .google-btn:active {
            transform: scale(0.97);
        }

        .main-screen {
            background: radial-gradient(ellipse at 20% 30%, #0f1725, #03050a);
            display: none;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 900;
            overflow: hidden;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(5, 8, 15, 0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.4);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            gap: 12px;
            flex-wrap: nowrap;
        }

        .balance-card {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4));
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            min-width: 95px;
        }

        .balance-icon {
            font-size: 20px;
        }

        .balance-info {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .balance-label {
            font-size: 10px;
            color: #8a9aa8;
            letter-spacing: 0.5px;
        }

        .balance-amount {
            font-size: 18px;
            font-weight: bold;
            color: #d4af37;
        }

        .title-card {
            text-align: center;
            flex: 1;
        }

        .neon-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #fff8e7, #d4af37, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
            animation: neonPulse 1.8s ease-in-out infinite alternate;
            white-space: nowrap;
        }

        @keyframes neonPulse {
            0% {
                text-shadow: 0 0 2px rgba(212, 175, 55, 0.3);
                opacity: 0.9;
            }
            100% {
                text-shadow: 0 0 12px rgba(212, 175, 55, 0.8), 0 0 20px rgba(212, 175, 55, 0.5);
                opacity: 1;
            }
        }

        .stats-card {
            display: flex;
            gap: 12px;
            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4));
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            min-width: 115px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-icon {
            font-size: 16px;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 10px;
            color: #8a9aa8;
        }

        .stat-value {
            font-size: 15px;
            font-weight: bold;
            color: #d4af37;
        }

        .separator {
            width: 1px;
            height: 25px;
            background: rgba(212, 175, 55, 0.3);
            margin: 0 4px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding-top: 80px;
            padding-bottom: 30px;
            overflow-y: auto;
        }

        .logout-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(231, 76, 60, 0.85);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .logout-btn:active {
            transform: scale(0.95);
        }

        .user-card {
            background: rgba(10, 15, 25, 0.7);
            backdrop-filter: blur(15px);
            padding: 25px 35px;
            border-radius: 50px;
            margin-top: 20px;
            text-align: center;
            color: white;
            width: 90%;
            max-width: 420px;
            border: 1px solid rgba(212, 175, 55, 0.35);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 12px;
            border: 3px solid #d4af37;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            background: #1e2a3a;
        }

        .user-name {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #d4af37;
        }

        .user-email {
            font-size: 12px;
            color: #9aaebf;
            word-break: break-all;
        }

        .code-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(212,175,55,0.3);
        }

        .code-label {
            font-size: 12px;
            color: #8a9aa8;
            margin-bottom: 8px;
        }

        .code-value {
            font-size: 18px;
            font-weight: bold;
            color: #d4af37;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .copy-btn {
            margin-top: 8px;
            background: rgba(212,175,55,0.2);
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:active {
            transform: scale(0.95);
            background: rgba(212,175,55,0.4);
        }

        .friend-section {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 25px;
        }

        .search-input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(212,175,55,0.3);
            padding: 10px 15px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            text-align: center;
            margin-bottom: 10px;
        }

        .search-input:focus {
            outline: none;
            border-color: #d4af37;
        }

        .search-btn {
            width: 100%;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            border: none;
            padding: 8px;
            border-radius: 30px;
            color: #1e2a3a;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-btn:active {
            transform: scale(0.98);
        }

        .friend-result {
            margin-top: 10px;
            padding: 10px;
            background: rgba(212,175,55,0.1);
            border-radius: 20px;
            font-size: 12px;
            display: none;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(12px);
            padding: 20px 40px;
            border-radius: 70px;
            color: #d4af37;
            display: none;
            z-index: 10001;
            font-size: 18px;
            font-weight: bold;
            border: 1px solid #d4af37;
            white-space: nowrap;
            box-shadow: 0 0 30px rgba(212,175,55,0.3);
        }

        .toast-notify {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            color: #d4af37;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 14px;
            z-index: 10002;
            border: 1px solid #d4af37;
            animation: slideUpFade 2.8s ease forwards;
            max-width: 85vw;
            text-align: center;
            font-weight: 500;
            pointer-events: none;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(30px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }

        @media (max-width: 600px) {
            .top-bar {
                padding: 8px 12px;
                gap: 8px;
            }
            .balance-card, .stats-card {
                padding: 4px 10px;
            }
            .balance-amount {
                font-size: 14px;
            }
            .neon-title {
                font-size: 16px;
                letter-spacing: 1.5px;
            }
            .user-card {
                padding: 18px 25px;
            }
            .user-avatar {
                width: 65px;
                height: 65px;
            }
        }

        @media (max-width: 480px) {
            .balance-label, .stat-label {
                display: none;
            }
            .neon-title {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="bg-animation"></div>

<!-- شاشة تسجيل الدخول -->
<div class="login-screen" id="loginScreen">
    <div class="login-container">
        <h1>💣 TNT WARS 💣</h1>
        <div class="subtitle">ELITE BATTLEFIELD | ساحة المعركة</div>
        <button class="google-btn" id="googleLoginBtn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="24" height="24">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
            </svg>
            <span>تسجيل الدخول بحساب Google</span>
        </button>
    </div>
</div>

<!-- الواجهة الرئيسية -->
<div class="main-screen" id="mainScreen">
    <div class="top-bar">
        <div class="balance-card">
            <span class="balance-icon">💰</span>
            <div class="balance-info">
                <span class="balance-label">الرصيد</span>
                <span class="balance-amount" id="topBalance">0</span>
            </div>
        </div>
        <div class="title-card">
            <div class="neon-title">💣 TNT WARS 💣</div>
        </div>
        <div class="stats-card">
            <div class="stat-item">
                <span class="stat-icon">🏆</span>
                <div class="stat-info">
                    <span class="stat-label">مباريات</span>
                    <span class="stat-value" id="topGames">0</span>
                </div>
            </div>
            <div class="separator"></div>
            <div class="stat-item">
                <span class="stat-icon">⚔️</span>
                <div class="stat-info">
                    <span class="stat-label">انتصارات</span>
                    <span class="stat-value" id="topWins">0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="user-card">
            <img class="user-avatar" id="userAvatar" alt="صورة المستخدم">
            <div class="user-name" id="username">اللاعب</div>
            <div class="user-email" id="userEmail">-</div>
            
            <div class="code-section">
                <div class="code-label">🎫 كود المعركة</div>
                <div class="code-value" id="userCodeDisplay">-</div>
                <button class="copy-btn" id="copyCodeBtn">📋 نسخ الكود</button>
            </div>
            
            <div class="friend-section">
                <input type="text" id="searchCodeInput" class="search-input" placeholder="🔍 أدخل كود صديق">
                <button id="searchFriendBtn" class="search-btn">➕ إضافة صديق</button>
                <div id="friendResult" class="friend-result"></div>
            </div>
        </div>
    </div>

    <button class="logout-btn" id="logoutBtn">
        <span>🚪</span> <span>خروج</span>
    </button>
</div>

<div class="loading" id="loading">⏳ جاري التحميل...</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js';
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js';

    const firebaseConfig = {
        apiKey: "AIzaSyCvPo4HlsNhyf1WBmTzIr6CdR1c2lQ5sHU",
        authDomain: "boomb-fa3e7.firebaseapp.com",
        databaseURL: "https://boomb-fa3e7-default-rtdb.firebaseio.com",
        projectId: "boomb-fa3e7",
        storageBucket: "boomb-fa3e7.firebasestorage.app",
        messagingSenderId: "499624996530",
        appId: "1:499624996530:web:235f71e450845c748523ab"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();
    googleProvider.setCustomParameters({ prompt: 'select_account' });

    const API_BASE_URL = 'https://tank-yf0p.onrender.com';

    let currentUser = null;
    let currentBalance = 0;
    let userStats = { gamesPlayed: 0, wins: 0 };
    let currentUserCode = null;

    const loginScreen = document.getElementById('loginScreen');
    const mainScreen = document.getElementById('mainScreen');
    const loadingDiv = document.getElementById('loading');
    const googleLoginBtn = document.getElementById('googleLoginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const usernameSpan = document.getElementById('username');
    const userEmailSpan = document.getElementById('userEmail');
    const userAvatar = document.getElementById('userAvatar');
    const topBalance = document.getElementById('topBalance');
    const topGames = document.getElementById('topGames');
    const topWins = document.getElementById('topWins');
    const userCodeDisplay = document.getElementById('userCodeDisplay');
    const copyCodeBtn = document.getElementById('copyCodeBtn');
    const searchCodeInput = document.getElementById('searchCodeInput');
    const searchFriendBtn = document.getElementById('searchFriendBtn');
    const friendResult = document.getElementById('friendResult');

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-notify';
        toast.textContent = message;
        toast.style.background = isError ? 'rgba(231, 76, 60, 0.95)' : 'rgba(0,0,0,0.92)';
        toast.style.borderColor = isError ? '#e74c3c' : '#d4af37';
        toast.style.color = isError ? '#fff' : '#d4af37';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
    }

    async function getFirebaseToken() {
        const user = auth.currentUser;
        if (!user) return null;
        try {
            return await user.getIdToken();
        } catch (error) {
            console.error('خطأ في جلب التوكن:', error);
            return null;
        }
    }

    async function fetchUserFromServer() {
        const user = auth.currentUser;
        if (!user) return false;
        
        try {
            const token = await getFirebaseToken();
            if (!token) return false;
            
            const response = await fetch(`${API_BASE_URL}/api/user/data?uid=${user.uid}`, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });
            
            if (!response.ok) throw new Error('فشل جلب البيانات');
            
            const data = await response.json();
            
            if (data.success) {
                currentBalance = data.balance;
                userStats = {
                    gamesPlayed: data.gamesPlayed,
                    wins: data.wins
                };
                currentUserCode = data.userIdCode;
                updateUI();
                return true;
            }
            return false;
        } catch (error) {
            console.error('خطأ في جلب بيانات السيرفر:', error);
            return false;
        }
    }

    async function createUserOnServer() {
        const user = auth.currentUser;
        if (!user) return false;
        
        try {
            const token = await getFirebaseToken();
            if (!token) return false;
            
            const response = await fetch(`${API_BASE_URL}/api/user/create`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                if (data.userIdCode) {
                    currentUserCode = data.userIdCode;
                    showToast(`✨ كود المستخدم: ${data.userIdCode}`, false);
                }
                return true;
            }
            return false;
        } catch (error) {
            console.error('خطأ في إنشاء المستخدم:', error);
            return false;
        }
    }

    async function saveUserToServer() {
        const user = auth.currentUser;
        if (!user) return false;
        
        try {
            const token = await getFirebaseToken();
            if (!token) return false;
            
            const response = await fetch(`${API_BASE_URL}/api/user/update`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    uid: user.uid,
                    balance: currentBalance,
                    gamesPlayed: userStats.gamesPlayed,
                    wins: userStats.wins
                })
            });
            
            const data = await response.json();
            return data.success;
        } catch (error) {
            console.error('خطأ في حفظ البيانات:', error);
            return false;
        }
    }

    async function findUserByCode(code) {
        const user = auth.currentUser;
        if (!user) return null;
        
        try {
            const token = await getFirebaseToken();
            if (!token) return null;
            
            const response = await fetch(`${API_BASE_URL}/api/user/bycode/${code}`, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });
            
            const data = await response.json();
            if (data.success) {
                return data.user;
            }
            return null;
        } catch (error) {
            console.error('خطأ في البحث:', error);
            return null;
        }
    }

    async function sendFriendRequest(toUserIdCode) {
        const user = auth.currentUser;
        if (!user) return false;
        
        try {
            const token = await getFirebaseToken();
            if (!token) return false;
            
            const response = await fetch(`${API_BASE_URL}/api/friends/request`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    fromUid: user.uid,
                    toUserIdCode: toUserIdCode
                })
            });
            
            const data = await response.json();
            if (data.success) {
                showToast(data.message, false);
                return true;
            } else {
                showToast(data.error, true);
                return false;
            }
        } catch (error) {
            console.error('خطأ في إرسال الطلب:', error);
            showToast('حدث خطأ في إرسال الطلب', true);
            return false;
        }
    }

    function updateUI() {
        if (currentUser) {
            const displayName = currentUser.displayName || (currentUser.email ? currentUser.email.split('@')[0] : 'مقاتل');
            usernameSpan.textContent = displayName;
            userEmailSpan.textContent = currentUser.email;
            topBalance.textContent = currentBalance;
            topGames.textContent = userStats.gamesPlayed;
            topWins.textContent = userStats.wins;
            
            if (currentUserCode) {
                userCodeDisplay.textContent = currentUserCode;
            } else {
                userCodeDisplay.textContent = 'جاري التحميل...';
            }

            if (currentUser.photoURL) {
                userAvatar.src = currentUser.photoURL;
            } else {
                userAvatar.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23d4af37"%3E%3Cpath d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"%3E%3C/path%3E%3C/svg%3E';
            }
        }
    }

    function saveUserData() {
        if (currentUser) {
            const key = `user_${currentUser.uid}`;
            localStorage.setItem(key, JSON.stringify({
                balance: currentBalance,
                stats: userStats,
                name: currentUser.displayName,
                email: currentUser.email,
                userCode: currentUserCode
            }));
            saveUserToServer();
        }
    }

    function loadUserData() {
        if (!currentUser) return false;
        const key = `user_${currentUser.uid}`;
        const saved = localStorage.getItem(key);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                currentBalance = data.balance ?? 100;
                userStats = data.stats || { gamesPlayed: 0, wins: 0 };
                currentUserCode = data.userCode || null;
                return true;
            } catch(e) {}
        }
        currentBalance = 100;
        userStats = { gamesPlayed: 0, wins: 0 };
        return false;
    }

    async function loginWithGoogle() {
        loadingDiv.style.display = 'flex';
        try {
            const result = await signInWithPopup(auth, googleProvider);
            const user = result.user;
            currentUser = {
                uid: user.uid,
                email: user.email,
                displayName: user.displayName || user.email.split('@')[0],
                photoURL: user.photoURL,
                isGuest: false
            };
            
            const serverDataLoaded = await fetchUserFromServer();
            
            if (!serverDataLoaded) {
                loadUserData();
                await createUserOnServer();
                await fetchUserFromServer();
            }
            
            updateUI();
            saveUserData();
            loadingDiv.style.display = 'none';
            showMainScreen();
            
            if (currentUserCode) {
                showToast(`🎫 كود المعركة: ${currentUserCode}`, false);
            } else {
                showToast(`🌟 مرحباً ${currentUser.displayName} !`, false);
            }
        } catch (error) {
            loadingDiv.style.display = 'none';
            console.error('خطأ في تسجيل الدخول:', error);
            showToast('فشل تسجيل الدخول بحساب Google', true);
        }
    }

    async function handleLogout() {
        loadingDiv.style.display = 'flex';
        try {
            if (currentUser) {
                await saveUserToServer();
                saveUserData();
                await signOut(auth);
            }
            currentUser = null;
            mainScreen.style.display = 'none';
            loginScreen.style.display = 'flex';
            loadingDiv.style.display = 'none';
            showToast('👋 تم تسجيل الخروج بنجاح', false);
        } catch (error) {
            loadingDiv.style.display = 'none';
            showToast('حدث خطأ أثناء تسجيل الخروج', true);
        }
    }

    function showMainScreen() {
        loginScreen.style.display = 'none';
        mainScreen.style.display = 'flex';
    }

    copyCodeBtn.addEventListener('click', () => {
        if (currentUserCode) {
            navigator.clipboard.writeText(currentUserCode);
            showToast('✅ تم نسخ الكود', false);
        } else {
            showToast('⚠️ لا يوجد كود للنسخ', true);
        }
    });

    searchFriendBtn.addEventListener('click', async () => {
        const code = searchCodeInput.value.trim();
        if (!code) {
            showToast('⚠️ الرجاء إدخال الكود', true);
            return;
        }
        
        if (code === currentUserCode) {
            showToast('❌ لا يمكن إضافة نفسك كصديق', true);
            return;
        }
        
        loadingDiv.style.display = 'flex';
        const user = await findUserByCode(code);
        loadingDiv.style.display = 'none';
        
        if (user) {
            friendResult.style.display = 'block';
            friendResult.innerHTML = `
                <div style="text-align: center;">
                    <div style="font-weight: bold; color: #d4af37;">${user.username}</div>
                    <div style="font-size: 11px; color: #8a9aa8; margin: 5px 0;">${user.email}</div>
                    <button id="confirmAddFriend" style="background: #d4af37; border: none; padding: 5px 20px; border-radius: 20px; margin-top: 8px; cursor: pointer; font-weight: bold;">➕ إضافة</button>
                </div>
            `;
            
            document.getElementById('confirmAddFriend').addEventListener('click', async () => {
                loadingDiv.style.display = 'flex';
                await sendFriendRequest(code);
                loadingDiv.style.display = 'none';
                friendResult.style.display = 'none';
                searchCodeInput.value = '';
            });
        } else {
            friendResult.style.display = 'block';
            friendResult.innerHTML = `<div style="text-align: center; color: #e74c3c;">❌ لم يتم العثور على مستخدم بهذا الكود</div>`;
            setTimeout(() => {
                friendResult.style.display = 'none';
            }, 3000);
        }
    });

    googleLoginBtn.addEventListener('click', loginWithGoogle);
    logoutBtn.addEventListener('click', handleLogout);

    onAuthStateChanged(auth, async (user) => {
        if (user && (!currentUser)) {
            currentUser = {
                uid: user.uid,
                email: user.email,
                displayName: user.displayName || user.email.split('@')[0],
                photoURL: user.photoURL,
                isGuest: false
            };
            
            await fetchUserFromServer();
            
            if (currentBalance === 0 && userStats.gamesPlayed === 0) {
                loadUserData();
            }
            
            updateUI();
            saveUserData();
            showMainScreen();
        }
    });
</script>
</body>
</html>
