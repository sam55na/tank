<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المجسم الحربي - ذراعين محسنة</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; }
        #info {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); color: #ffaa66;
            padding: 10px 20px; border-radius: 8px;
            z-index: 100; font-size: 14px; pointer-events: none;
        }
        #controls {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.6); color: #ccc;
            padding: 8px 15px; border-radius: 8px;
            font-size: 12px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">⚔️ المجسم الحربي | ذراعين محسنة | مفاصل دقيقة</div>
    <div id="controls">🖱️ اسحب للتدوير | 🔍 اسكرول للتكبير</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3.5, 7);
        camera.lookAt(0, 2.2, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 2.2, 0);
        
        // إضاءة
        const ambientLight = new THREE.AmbientLight(0x404060, 0.7);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(3, 5, 4);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x88aaff, 0.4);
        fillLight.position.set(-2, 2, 3);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffaa88, 0.3);
        backLight.position.set(0, 2, -4);
        scene.add(backLight);
        
        const model = new THREE.Group();
        scene.add(model);
        
        // المواد
        const materialArmor = new THREE.MeshStandardMaterial({ color: 0x4a6a8a, metalness: 0.6, roughness: 0.4 });
        const materialGold = new THREE.MeshStandardMaterial({ color: 0xca9622, metalness: 0.7, roughness: 0.3 });
        const materialDark = new THREE.MeshStandardMaterial({ color: 0x3a4a5a, metalness: 0.5, roughness: 0.5 });
        const materialJoint = new THREE.MeshStandardMaterial({ color: 0xbc9a6a, metalness: 0.65, roughness: 0.35 });
        const materialFoot = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, metalness: 0.3, roughness: 0.7 });
        
        // =============== الجذع ===============
        const torsoGeo = new THREE.SphereGeometry(0.85, 64, 64);
        const torso = new THREE.Mesh(torsoGeo, materialArmor);
        torso.position.set(0, 2.1, 0);
        torso.castShadow = true;
        model.add(torso);
        
        // =============== الرأس ===============
        const headGeo = new THREE.SphereGeometry(0.45, 64, 64);
        const head = new THREE.Mesh(headGeo, materialArmor);
        head.position.set(0, 3.05, 0);
        head.castShadow = true;
        model.add(head);
        
        // =============== المخروط ===============
        const spikeGeo = new THREE.ConeGeometry(0.28, 0.85, 32);
        const spike = new THREE.Mesh(spikeGeo, materialGold);
        spike.position.set(0, 3.52, 0.1);
        spike.rotation.x = 0.12;
        spike.castShadow = true;
        model.add(spike);
        
        // =============== الذراع الأيمن (محسنة) ===============
        // نقطة الكتف
        const shoulderR = new THREE.Mesh(new THREE.SphereGeometry(0.28, 32, 32), materialJoint);
        shoulderR.position.set(1.08, 2.62, 0);
        shoulderR.castShadow = true;
        model.add(shoulderR);
        
        // العضد (الجزء العلوي)
        const armUpperR = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.3, 0.92, 24), materialDark);
        armUpperR.position.set(1.38, 2.18, 0);
        armUpperR.castShadow = true;
        model.add(armUpperR);
        
        // مفصل الكوع
        const elbowR = new THREE.Mesh(new THREE.SphereGeometry(0.24, 32, 32), materialJoint);
        elbowR.position.set(1.68, 1.74, 0);
        elbowR.castShadow = true;
        model.add(elbowR);
        
        // الساعد (الجزء السفلي)
        const armLowerR = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.25, 0.88, 24), materialDark);
        armLowerR.position.set(1.98, 1.32, 0);
        armLowerR.castShadow = true;
        model.add(armLowerR);
        
        // مفصل الرسغ
        const wristR = new THREE.Mesh(new THREE.SphereGeometry(0.2, 32, 32), materialJoint);
        wristR.position.set(2.28, 0.9, 0);
        wristR.castShadow = true;
        model.add(wristR);
        
        // اليد
        const handR = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.28, 0.48), materialDark);
        handR.position.set(2.55, 0.88, 0);
        handR.castShadow = true;
        model.add(handR);
        
        // =============== الذراع الأيسر (محسنة) ===============
        const shoulderL = new THREE.Mesh(new THREE.SphereGeometry(0.28, 32, 32), materialJoint);
        shoulderL.position.set(-1.08, 2.62, 0);
        shoulderL.castShadow = true;
        model.add(shoulderL);
        
        const armUpperL = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.3, 0.92, 24), materialDark);
        armUpperL.position.set(-1.38, 2.18, 0);
        armUpperL.castShadow = true;
        model.add(armUpperL);
        
        const elbowL = new THREE.Mesh(new THREE.SphereGeometry(0.24, 32, 32), materialJoint);
        elbowL.position.set(-1.68, 1.74, 0);
        elbowL.castShadow = true;
        model.add(elbowL);
        
        const armLowerL = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.25, 0.88, 24), materialDark);
        armLowerL.position.set(-1.98, 1.32, 0);
        armLowerL.castShadow = true;
        model.add(armLowerL);
        
        const wristL = new THREE.Mesh(new THREE.SphereGeometry(0.2, 32, 32), materialJoint);
        wristL.position.set(-2.28, 0.9, 0);
        wristL.castShadow = true;
        model.add(wristL);
        
        const handL = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.28, 0.48), materialDark);
        handL.position.set(-2.55, 0.88, 0);
        handL.castShadow = true;
        model.add(handL);
        
        // =============== الساق اليمنى ===============
        const thighR = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.34, 1.0, 24), materialDark);
        thighR.position.set(0.68, 1.05, 0);
        thighR.castShadow = true;
        model.add(thighR);
        
        const kneeR = new THREE.Mesh(new THREE.SphereGeometry(0.26, 32, 32), materialJoint);
        kneeR.position.set(0.72, 0.52, 0.05);
        kneeR.castShadow = true;
        model.add(kneeR);
        
        const calfR = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.28, 0.9, 24), materialDark);
        calfR.position.set(0.72, 0.05, 0);
        calfR.castShadow = true;
        model.add(calfR);
        
        // =============== الساق اليسرى ===============
        const thighL = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.34, 1.0, 24), materialDark);
        thighL.position.set(-0.68, 1.05, 0);
        thighL.castShadow = true;
        model.add(thighL);
        
        const kneeL = new THREE.Mesh(new THREE.SphereGeometry(0.26, 32, 32), materialJoint);
        kneeL.position.set(-0.72, 0.52, 0.05);
        kneeL.castShadow = true;
        model.add(kneeL);
        
        const calfL = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.28, 0.9, 24), materialDark);
        calfL.position.set(-0.72, 0.05, 0);
        calfL.castShadow = true;
        model.add(calfL);
        
        // =============== القدم ===============
        const footGeo = new THREE.BoxGeometry(0.68, 0.2, 1.05);
        
        const footR = new THREE.Mesh(footGeo, materialFoot);
        footR.position.set(0.82, -0.32, 0.2);
        footR.castShadow = true;
        model.add(footR);
        
        const footL = new THREE.Mesh(footGeo, materialFoot);
        footL.position.set(-0.82, -0.32, 0.2);
        footL.castShadow = true;
        model.add(footL);
        
        // =============== تحريك ===============
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('✅ المجسم جاهز - ذراعين محسنة');
        console.log('💪 هيكل الذراع: كتف → عضد → كوع → ساعد → رسغ → يد');
        console.log('📏 المسافات متساوية بين المفاصل');
    </script>
</body>
</html>
