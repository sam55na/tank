<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DWARF WARRIOR - قزم حربي بتقنية الأشكال الهندسية الاحترافية</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: linear-gradient(135deg, rgba(0,0,0,0.85), rgba(0,0,0,0.6));
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 100;
            pointer-events: none;
            backdrop-filter: blur(8px);
            font-size: 14px;
            direction: rtl;
            font-weight: bold;
            border-right: 4px solid #ff6600;
            font-family: monospace;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        #controls-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
            font-family: monospace;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        
        .tech-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-radius: 8px;
            color: #ffaa66;
            font-family: monospace;
            font-size: 11px;
            z-index: 100;
            backdrop-filter: blur(4px);
            direction: ltr;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div id="info">
        ⚔️ القزم الحديدي | تصميم بالأشكال الهندسية الأساسية 🎨 | مخروط + أسطوانات + دوائر متوهجة
    </div>
    <div id="controls-panel">
        🖱️ الفأرة: تدوير 360° | 🔍 تمرير: تكبير | ✨ نحت وتفاصيل واقعية
    </div>
    <div class="tech-badge">
        🔺 مخروط | 🔵 أسطوانات | ⭕ دوائر متوهجة | 🎨 نحت احترافي
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // --- إعداد المش scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);
        
        // --- الكاميرا ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4.5, 3.5, 7);
        camera.lookAt(0, 1.2, 0);
        
        // --- العارض ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // CSS2D للنصوص
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- التحكم بالكاميرا ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 1.0;
        controls.target.set(0, 1.3, 0);
        
        // --- الإضاءة المتقدمة ---
        // Ambient
        const ambientLight = new THREE.AmbientLight(0x404060, 0.55);
        scene.add(ambientLight);
        
        // Directional Light رئيسي
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        mainLight.position.set(5, 8, 4);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 15;
        mainLight.shadow.camera.left = -5;
        mainLight.shadow.camera.right = 5;
        mainLight.shadow.camera.top = 5;
        mainLight.shadow.camera.bottom = -5;
        scene.add(mainLight);
        
        // Fill Light
        const fillLight = new THREE.PointLight(0x6688aa, 0.5);
        fillLight.position.set(-2, 2, -3);
        scene.add(fillLight);
        
        // Rim Light
        const rimLight = new THREE.PointLight(0xffaa66, 0.7);
        rimLight.position.set(1.5, 2.5, -2.5);
        scene.add(rimLight);
        
        // Warm Fill
        const warmFill = new THREE.PointLight(0xff8866, 0.55);
        warmFill.position.set(2.5, 1.5, 2);
        scene.add(warmFill);
        
        // نار القنبلة
        const bombLight = new THREE.PointLight(0xff4400, 0.9);
        bombLight.position.set(1.3, 0.7, 0.9);
        scene.add(bombLight);
        
        // --- الأرضية والبيئة ---
        const groundPlane = new THREE.Mesh(
            new THREE.CircleGeometry(12, 32),
            new THREE.MeshStandardMaterial({ color: 0x1a1a2a, roughness: 0.7, metalness: 0.1 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.1;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.05;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        // --- إنشاء الشخصية باستخدام الأشكال المطلوبة ---
        const dwarfGroup = new THREE.Group();
        
        // ========== 1. الجسم: أسطوانة عريضة ==========
        const bodyCylinder = new THREE.Mesh(
            new THREE.CylinderGeometry(0.75, 0.82, 1.25, 24),
            new THREE.MeshStandardMaterial({ color: 0x5a6e7e, roughness: 0.28, metalness: 0.75, emissive: 0x112233, emissiveIntensity: 0.05 })
        );
        bodyCylinder.castShadow = true;
        bodyCylinder.receiveShadow = true;
        bodyCylinder.position.y = 0.6;
        dwarfGroup.add(bodyCylinder);
        
        // نحت وتفاصيل على الجسم (حلقات معدنية)
        const detailRing1 = new THREE.Mesh(
            new THREE.TorusGeometry(0.78, 0.06, 24, 64),
            new THREE.MeshStandardMaterial({ color: 0xbc9a6a, metalness: 0.85, roughness: 0.2 })
        );
        detailRing1.rotation.x = Math.PI / 2;
        detailRing1.position.y = 0.85;
        dwarfGroup.add(detailRing1);
        
        const detailRing2 = new THREE.Mesh(
            new THREE.TorusGeometry(0.78, 0.06, 24, 64),
            new THREE.MeshStandardMaterial({ color: 0xbc9a6a, metalness: 0.85, roughness: 0.2 })
        );
        detailRing2.rotation.x = Math.PI / 2;
        detailRing2.position.y = 0.35;
        dwarfGroup.add(detailRing2);
        
        // زخرفة صدرية (نحت)
        const chestOrnament = new THREE.Mesh(
            new THREE.CylinderGeometry(0.68, 0.68, 0.55, 8),
            new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.88, roughness: 0.18 })
        );
        chestOrnament.castShadow = true;
        chestOrnament.position.y = 0.68;
        dwarfGroup.add(chestOrnament);
        
        // حزام الخصر
        const beltRing = new THREE.Mesh(
            new THREE.TorusGeometry(0.78, 0.09, 24, 64),
            new THREE.MeshStandardMaterial({ color: 0x8b5a2b, metalness: 0.55, roughness: 0.4 })
        );
        beltRing.rotation.x = Math.PI / 2;
        beltRing.position.y = 0.28;
        dwarfGroup.add(beltRing);
        
        // ========== 2. الرأس: مخروط + دائرة متوهجة ==========
        // قاعدة الرأس (مخروط مقلوب قليلاً للشكل القزمي)
        const headCone = new THREE.Mesh(
            new THREE.ConeGeometry(0.62, 0.85, 32),
            new THREE.MeshStandardMaterial({ color: 0xcd9a6b, roughness: 0.25, metalness: 0.08 })
        );
        headCone.castShadow = true;
        headCone.position.y = 1.32;
        dwarfGroup.add(headCone);
        
        // خوذة (مخروط علوي)
        const helmetCone = new THREE.Mesh(
            new THREE.ConeGeometry(0.65, 0.58, 24),
            new THREE.MeshStandardMaterial({ color: 0x8a9aae, metalness: 0.85, roughness: 0.2 })
        );
        helmetCone.castShadow = true;
        helmetCone.position.y = 1.72;
        dwarfGroup.add(helmetCone);
        
        // قمة الخوذة (مخروط صغير)
        const crestCone = new THREE.Mesh(
            new THREE.ConeGeometry(0.28, 0.48, 12),
            new THREE.MeshStandardMaterial({ color: 0xdd8855, metalness: 0.65 })
        );
        crestCone.position.y = 2.02;
        dwarfGroup.add(crestCone);
        
        // ========== الدائرة المتوهجة (الهالة/التاج) ==========
        const glowingRing = new THREE.Mesh(
            new THREE.TorusGeometry(0.68, 0.05, 32, 64),
            new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4400, emissiveIntensity: 0.6, metalness: 0.3 })
        );
        glowingRing.position.y = 1.95;
        glowingRing.rotation.x = Math.PI / 2;
        dwarfGroup.add(glowingRing);
        
        // دائرة متوهجة صغيرة فوق القمة
        const topGlow = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 16, 16),
            new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4400, emissiveIntensity: 0.8 })
        );
        topGlow.position.y = 2.22;
        dwarfGroup.add(topGlow);
        
        // ========== 3. اللحية والوجه (تفاصيل نحت) ==========
        // اللحية الرئيسية (مخروط مقلوب)
        const beardCone = new THREE.Mesh(
            new THREE.ConeGeometry(0.58, 0.68, 16),
            new THREE.MeshStandardMaterial({ color: 0xb87c4f, roughness: 0.85 })
        );
        beardCone.position.y = 1.05;
        beardCone.castShadow = true;
        dwarfGroup.add(beardCone);
        
        // تفاصيل اللحية (أسطوانات رفيعة للضفائر)
        const leftBraid = new THREE.Mesh(
            new THREE.CylinderGeometry(0.11, 0.09, 0.52, 6),
            new THREE.MeshStandardMaterial({ color: 0xa56b3e })
        );
        leftBraid.position.set(-0.38, 1.08, 0.52);
        leftBraid.rotation.z = 0.35;
        dwarfGroup.add(leftBraid);
        
        const rightBraid = new THREE.Mesh(
            new THREE.CylinderGeometry(0.11, 0.09, 0.52, 6),
            new THREE.MeshStandardMaterial({ color: 0xa56b3e })
        );
        rightBraid.position.set(0.38, 1.08, 0.52);
        rightBraid.rotation.z = -0.35;
        dwarfGroup.add(rightBraid);
        
        // العيون (كرات صغيرة مع توهج)
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x4488aa, emissiveIntensity: 0.25 });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.11, 24, 24), eyeMat);
        leftEye.position.set(-0.22, 1.48, 0.68);
        dwarfGroup.add(leftEye);
        
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.11, 24, 24), eyeMat);
        rightEye.position.set(0.22, 1.48, 0.68);
        dwarfGroup.add(rightEye);
        
        // بؤبؤ العين
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
        leftPupil.position.set(-0.22, 1.475, 0.79);
        dwarfGroup.add(leftPupil);
        
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
        rightPupil.position.set(0.22, 1.475, 0.79);
        dwarfGroup.add(rightPupil);
        
        // حواجب (أسطوانات مستطيلة)
        const browMat = new THREE.MeshStandardMaterial({ color: 0x4a2e1e });
        const leftBrow = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.1, 0.12), browMat);
        leftBrow.position.set(-0.26, 1.58, 0.7);
        leftBrow.rotation.z = -0.2;
        dwarfGroup.add(leftBrow);
        
        const rightBrow = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.1, 0.12), browMat);
        rightBrow.position.set(0.26, 1.58, 0.7);
        rightBrow.rotation.z = 0.2;
        dwarfGroup.add(rightBrow);
        
        // أنف (مخروط صغير)
        const noseCone = new THREE.Mesh(
            new THREE.ConeGeometry(0.11, 0.22, 12),
            new THREE.MeshStandardMaterial({ color: 0xbd8a5a })
        );
        noseCone.position.set(0, 1.38, 0.78);
        dwarfGroup.add(noseCone);
        
        // ========== 4. اليدين: أسطوانات رفيعة ==========
        const armMat = new THREE.MeshStandardMaterial({ color: 0x7a6a5a, roughness: 0.35 });
        
        // الذراع الأيسر (أسطوانة رفيعة)
        const leftArm = new THREE.Mesh(
            new THREE.CylinderGeometry(0.22, 0.24, 0.92, 10),
            armMat
        );
        leftArm.position.set(-0.85, 0.92, 0);
        leftArm.rotation.z = 0.45;
        leftArm.rotation.x = -0.15;
        leftArm.castShadow = true;
        dwarfGroup.add(leftArm);
        
        // الذراع الأيمن
        const rightArm = new THREE.Mesh(
            new THREE.CylinderGeometry(0.22, 0.24, 0.92, 10),
            armMat
        );
        rightArm.position.set(0.85, 0.92, 0);
        rightArm.rotation.z = -0.45;
        rightArm.rotation.x = 0.18;
        rightArm.castShadow = true;
        dwarfGroup.add(rightArm);
        
        // أكتاف (نصف كرات للنحت)
        const pauldronMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6a, metalness: 0.88 });
        const leftPaul = new THREE.Mesh(new THREE.SphereGeometry(0.42, 10, 10), pauldronMat);
        leftPaul.position.set(-0.98, 1.18, 0);
        leftPaul.scale.set(0.8, 0.5, 1);
        dwarfGroup.add(leftPaul);
        
        const rightPaul = new THREE.Mesh(new THREE.SphereGeometry(0.42, 10, 10), pauldronMat);
        rightPaul.position.set(0.98, 1.18, 0);
        rightPaul.scale.set(0.8, 0.5, 1);
        dwarfGroup.add(rightPaul);
        
        // القفازات (كرات)
        const gauntletMat = new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.75 });
        const leftHand = new THREE.Mesh(new THREE.SphereGeometry(0.24, 8, 8), gauntletMat);
        leftHand.position.set(-1.15, 0.62, 0.25);
        dwarfGroup.add(leftHand);
        
        const rightHand = new THREE.Mesh(new THREE.SphereGeometry(0.24, 8, 8), gauntletMat);
        rightHand.position.set(1.15, 0.62, 0.25);
        dwarfGroup.add(rightHand);
        
        // ========== 5. القدمين: أسطوانات متوسطة ==========
        const legMat = new THREE.MeshStandardMaterial({ color: 0x5a4a3a, metalness: 0.35 });
        
        const leftLeg = new THREE.Mesh(
            new THREE.CylinderGeometry(0.3, 0.34, 0.85, 10),
            legMat
        );
        leftLeg.position.set(-0.42, 0.28, 0);
        leftLeg.castShadow = true;
        dwarfGroup.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(
            new THREE.CylinderGeometry(0.3, 0.34, 0.85, 10),
            legMat
        );
        rightLeg.position.set(0.42, 0.28, 0);
        rightLeg.castShadow = true;
        dwarfGroup.add(rightLeg);
        
        // الأحذية (أسطوانات مقطوعة)
        const bootMat = new THREE.MeshStandardMaterial({ color: 0x6a4a3a, metalness: 0.45 });
        const leftBoot = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.42, 0.28, 8), bootMat);
        leftBoot.position.set(-0.42, -0.05, 0.12);
        dwarfGroup.add(leftBoot);
        
        const rightBoot = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.42, 0.28, 8), bootMat);
        rightBoot.position.set(0.42, -0.05, 0.12);
        dwarfGroup.add(rightBoot);
        
        // ========== 6. القنبلة (أسطوانة + كرة + دائرة متوهجة) ==========
        const bombGroup = new THREE.Group();
        
        // جسم القنبلة (كرة)
        const bombBody = new THREE.Mesh(
            new THREE.SphereGeometry(0.4, 32, 32),
            new THREE.MeshStandardMaterial({ color: 0x445566, metalness: 0.65, roughness: 0.28 })
        );
        bombBody.scale.set(0.9, 1.12, 0.9);
        bombGroup.add(bombBody);
        
        // أسطوانة الفتيل
        const fuseCyl = new THREE.Mesh(
            new THREE.CylinderGeometry(0.09, 0.11, 0.42, 10),
            new THREE.MeshStandardMaterial({ color: 0xdd9955 })
        );
        fuseCyl.position.y = 0.55;
        bombGroup.add(fuseCyl);
        
        // دائرة متوهجة (النار)
        const fireGlow = new THREE.Mesh(
            new THREE.SphereGeometry(0.13, 16, 16),
            new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff3300, emissiveIntensity: 0.85 })
        );
        fireGlow.position.y = 0.78;
        bombGroup.add(fireGlow);
        
        // حلقات زخرفية حول القنبلة
        const bombRing = new THREE.Mesh(
            new THREE.TorusGeometry(0.42, 0.05, 16, 48),
            new THREE.MeshStandardMaterial({ color: 0xaa8866, metalness: 0.6 })
        );
        bombRing.rotation.x = Math.PI / 2;
        bombRing.position.y = -0.12;
        bombGroup.add(bombRing);
        
        bombGroup.position.set(1.32, 0.62, 0.58);
        bombGroup.castShadow = true;
        dwarfGroup.add(bombGroup);
        
        // يد تمسك القنبلة
        const holdingHand = new THREE.Mesh(new THREE.SphereGeometry(0.27, 10, 10), gauntletMat);
        holdingHand.position.set(1.42, 0.66, 0.72);
        dwarfGroup.add(holdingHand);
        
        // ========== 7. عباءة (أسطوانة عريضة مفرغة) ==========
        const cloakCyl = new THREE.Mesh(
            new THREE.CylinderGeometry(0.95, 1.2, 1.3, 12),
            new THREE.MeshStandardMaterial({ color: 0x4a2a1a, roughness: 0.85, metalness: 0.02, transparent: true, opacity: 0.88 })
        );
        cloakCyl.position.y = 0.55;
        cloakCyl.scale.set(1.02, 0.85, 0.72);
        dwarfGroup.add(cloakCyl);
        
        // ========== 8. تفاصيل نحت إضافية ==========
        // خواتم على الأصابع
        const fingerRing = new THREE.Mesh(
            new THREE.TorusGeometry(0.28, 0.04, 12, 32),
            new THREE.MeshStandardMaterial({ color: 0xddaa77, metalness: 0.9 })
        );
        fingerRing.position.set(1.18, 0.62, 0.48);
        dwarfGroup.add(fingerRing);
        
        // وسام على الصدر
        const medal = new THREE.Mesh(
            new THREE.CylinderGeometry(0.18, 0.22, 0.08, 6),
            new THREE.MeshStandardMaterial({ color: 0xffaa66, metalness: 0.85 })
        );
        medal.position.set(0, 0.72, 0.82);
        dwarfGroup.add(medal);
        
        // --- CSS2D للاسم ---
        const nameDiv = document.createElement('div');
        nameDiv.innerHTML = '⚔️ ثورين الجبل الحديدي ⚔️<br><span style="font-size:10px;">حامل القنبلة الأسطوري</span>';
        nameDiv.style.color = '#ffdd99';
        nameDiv.style.fontSize = '15px';
        nameDiv.style.fontWeight = 'bold';
        nameDiv.style.textAlign = 'center';
        nameDiv.style.background = 'linear-gradient(135deg, rgba(0,0,0,0.8), rgba(40,20,0,0.9))';
        nameDiv.style.padding = '5px 12px';
        nameDiv.style.borderRadius = '30px';
        nameDiv.style.border = '1px solid #ffaa55';
        nameDiv.style.fontFamily = 'monospace';
        nameDiv.style.backdropFilter = 'blur(8px)';
        
        const nameLabel = new CSS2DObject(nameDiv);
        nameLabel.position.set(0, 2.35, 0);
        dwarfGroup.add(nameLabel);
        
        // شريط الصحة
        const healthDiv = document.createElement('div');
        healthDiv.style.width = '120px';
        healthDiv.style.height = '10px';
        healthDiv.style.backgroundColor = '#330000';
        healthDiv.style.borderRadius = '10px';
        healthDiv.style.border = '1px solid #ffaa55';
        healthDiv.style.overflow = 'hidden';
        
        const healthFill = document.createElement('div');
        healthFill.style.width = '88%';
        healthFill.style.height = '100%';
        healthFill.style.backgroundColor = '#dd4444';
        healthFill.style.background = 'linear-gradient(90deg, #ff6644, #dd2222)';
        healthDiv.appendChild(healthFill);
        
        const healthLabel = new CSS2DObject(healthDiv);
        healthLabel.position.set(0, 2.15, 0);
        dwarfGroup.add(healthLabel);
        
        scene.add(dwarfGroup);
        
        // --- جزيئات بيئية ---
        const particleCount = 800;
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 40;
            positions[i*3+1] = Math.random() * 6;
            positions[i*3+2] = (Math.random() - 0.5) * 30;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.04, transparent: true, opacity: 0.4 });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // --- حلقة التحريك ---
        let animTime = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            animTime += 0.016;
            
            // تأثيرات القنبلة
            fireGlow.scale.setScalar(0.9 + Math.sin(animTime * 22) * 0.15);
            fireGlow.material.emissiveIntensity = 0.7 + Math.sin(animTime * 28) * 0.4;
            bombLight.intensity = 0.8 + Math.sin(animTime * 20) * 0.35;
            
            // الدائرة المتوهجة تدور وتتوهج
            glowingRing.material.emissiveIntensity = 0.5 + Math.sin(animTime * 3) * 0.3;
            glowingRing.rotation.z = Math.sin(animTime * 1.5) * 0.1;
            topGlow.material.emissiveIntensity = 0.6 + Math.sin(animTime * 4) * 0.3;
            
            // حركة القنبلة
            bombGroup.position.y = 0.62 + Math.sin(animTime * 14) * 0.008;
            bombGroup.rotation.z = Math.sin(animTime * 3) * 0.03;
            
            // حركة اللحية
            beardCone.rotation.z = Math.sin(animTime * 1.2) * 0.02;
            leftBraid.rotation.z = 0.35 + Math.sin(animTime * 1.5) * 0.03;
            rightBraid.rotation.z = -0.35 + Math.sin(animTime * 1.5) * 0.03;
            
            // حركة الأكتاف
            leftPaul.rotation.z = Math.sin(animTime * 1.8) * 0.02;
            rightPaul.rotation.z = Math.sin(animTime * 1.8) * 0.02;
            
            // حركة الجسيمات
            particles.rotation.y += 0.0005;
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        // استجابة تغيير الحجم
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('✅ تم إنشاء القزم الحربي باستخدام: مخروط | أسطوانات عريضة ورفيعة ومتوسطة | دوائر متوهجة | نحت وتفاصيل واقعية');
    </script>
</body>
</html>
