<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voxel Soldier AR</title>
<style>
body { margin:0; overflow:hidden; background:#101010; }
canvas { display:block; }
#info {
  position:absolute;
  top:10px; left:10px;
  color:white; font-family:sans-serif;
  background:rgba(0,0,0,0.5); padding:8px 12px; border-radius:6px;
}
</style>
</head>
<body>
<div id="info">💣 Voxel Soldier | عسكري يحمل قنبلة</div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

// ======================= SCENE =======================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x101010);

// ======================= CAMERA =======================
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(6,5,10);
camera.lookAt(0,2,0);

// ======================= RENDERER =====================
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ======================= CONTROLS =====================
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// ======================= LIGHTING =====================
const ambientLight = new THREE.AmbientLight(0x404040, 0.7);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(10,10,10);
dirLight.castShadow = true;
scene.add(dirLight);

// ======================= VOXEL BUILDER =====================
class VoxelBuilder {
    constructor(scene, size=0.15){
        this.scene = scene;
        this.size = size;
        this.group = new THREE.Group();
        this.scene.add(this.group);
    }

    add(x,y,z,color,emissive=null){
        const geometry = new THREE.BoxGeometry(this.size,this.size,this.size);
        const material = new THREE.MeshStandardMaterial({
            color: color,
            emissive: emissive || 0x000000,
            metalness: 0.6,
            roughness: 0.3
        });
        const cube = new THREE.Mesh(geometry,material);
        cube.position.set(x*this.size, y*this.size, z*this.size);
        cube.castShadow = true;
        cube.receiveShadow = true;
        this.group.add(cube);
    }
}

const V = new VoxelBuilder(scene,0.12);

// ======================= COLORS =====================
const C = {
    armor: 0x3a4a3c,
    armorLight: 0x5c6f58,
    armorDark: 0x22282a,
    bomb: 0xcc4422,
    skin: 0xf0c19f,
    visor: 0x2266aa,
    metallic: 0xaaaaaa
};

// ======================= CHARACTER MODEL =====================
// TORSO
for(let x=-2;x<=2;x++){
  for(let y=0;y<=3;y++){
    for(let z=-1;z<=1;z++){
      V.add(x,y,z,C.armor);
    }
  }
}

// HEAD
for(let x=-1;x<=1;x++){
  for(let y=4;y<=5;y++){
    for(let z=-1;z<=1;z++){
      V.add(x,y,z,C.armorDark);
    }
  }
}
// VISOR
for(let x=-1;x<=1;x++){
  V.add(x,5,1,C.visor);
}

// ARMS
// Right Arm (holding bomb)
for(let x=3;x<=4;x++){
  for(let y=1;y<=3;y++){
    for(let z=-1;z<=1;z++){
      V.add(x,y,z,C.armor);
    }
  }
}
// Left Arm
for(let x=-4;x<=-3;x++){
  for(let y=1;y<=3;y++){
    for(let z=-1;z<=1;z++){
      V.add(x,y,z,C.armor);
    }
  }
}

// LEGS
for(let x=-1;x<=1;x++){
  for(let y=-3;y<=-1;y++){
    for(let z=-1;z<=1;z++){
      V.add(x,y,z,C.armorLight);
    }
  }
}

// BOMB IN RIGHT HAND
for(let x=3;x<=4;x++){
  for(let y=3;y<=4;y++){
    for(let z=-1;z<=1;z++){
      V.add(x,y,z,C.bomb);
    }
  }
}

// ======================= GROUND =====================
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.ShadowMaterial({opacity:0.3})
);
ground.rotation.x = -Math.PI/2;
ground.position.y=-3;
ground.receiveShadow=true;
scene.add(ground);

// ======================= ANIMATION =====================
function animate(){
  requestAnimationFrame(animate);
  V.group.rotation.y += 0.005;
  controls.update();
  renderer.render(scene,camera);
}
animate();

// ======================= RESIZE =====================
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

console.log("✅ Voxel Soldier Loaded");
</script>
</body>
</html>
