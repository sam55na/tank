<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Elite Soldier - Tactical Front</title>
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); pointer-events: none; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ff00; opacity: 0.9; }
        #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
        #crosshair::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
        #info-panel { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.85); color: #fff; padding: 15px 25px; border-radius: 4px; border-left: 5px solid #00ff00; font-family: 'Courier New'; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        #info-panel h1 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; color: #00ff00; text-transform: uppercase; }
        #info-panel p { margin: 5px 0 0; font-size: 0.8rem; color: #aaa; }
        #score-panel { position: absolute; top: 20px; right: 20px; background: rgba(0, 0, 0, 0.85); color: #00ff00; padding: 12px 30px; border-radius: 4px; font-size: 1.3rem; font-weight: bold; border: 1px solid rgba(0, 255, 0, 0.5); font-family: 'Courier New'; }
        #joystick-container { position: absolute; bottom: 60px; left: 60px; width: 140px; height: 140px; background: rgba(255, 255, 255, 0.03); border-radius: 50%; pointer-events: auto; border: 2px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(5px); }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; background: rgba(255, 255, 255, 0.85); border-radius: 50%; transform: translate(-50%,-50%); box-shadow: 0 5px 20px rgba(0,0,0,0.6); }
        #action-buttons { position: absolute; bottom: 60px; right: 60px; display: flex; gap: 30px; pointer-events: auto; }
        .action-btn { width: 90px; height: 90px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.3); color: white; font-weight: bold; font-size: 1.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(0,0,0,0.6); transition: all 0.15s; user-select: none; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        #btn-jump { border-color: #00aaff; }
        #btn-throw { border-color: #ff4400; }
        .action-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.25); }
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: #00ff00; font-family: 'Courier New'; }
        .loader { border: 5px solid #1a1a1a; border-top: 5px solid #00ff00; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin-bottom: 25px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <p>DEPLOYING ELITE SOLDIER...</p>
    </div>

    <div id="ui-container">
        <div id="crosshair"></div>
        <div id="info-panel">
            <h1>> TACTICAL VANGUARD</h1>
            <p>Close Shoulder Cam • Pro Soldier Model • Double Flip</p>
        </div>
        <div id="score-panel">ELIMINATED: <span id="score">0</span></div>
        <div id="joystick-container"><div id="joystick-knob"></div></div>
        <div id="action-buttons">
            <button class="action-btn" id="btn-jump">⬆️</button>
            <button class="action-btn" id="btn-throw">🔥</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.128.0/examples/jsm/loaders/GLTFLoader.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';

        // ==========================================
        // 1. إعداد المشهد والإضاءة
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x080808);
        scene.fog = new THREE.Fog(0x080808, 100, 350);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1.8);
        sunLight.position.set(40, 100, 40);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.set(2048, 2048);
        sunLight.shadow.camera.left = -120;
        sunLight.shadow.camera.right = 120;
        sunLight.shadow.camera.top = 120;
        sunLight.shadow.camera.bottom = -120;
        sunLight.shadow.bias = -0.0005;
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0x606060, 1.4);
        scene.add(ambientLight);

        // الأرضية الحربية
        const grid = new THREE.GridHelper(1000, 100, 0x00ff00, 0x111111);
        scene.add(grid);

        const groundGeo = new THREE.PlaneGeometry(1000, 1000);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x0c0c0c, roughness: 0.95, metalness: 0.1 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // ==========================================
        // 2. تحميل الجندي الحربي (Soldier)
        // ==========================================
        let character, mixer, animations = {};
        let currentAction, throwCooldown = 0;
        const loader = new GLTFLoader();

        // استخدام نموذج الجندي الرسمي من Three.js
        const modelUrl = 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Soldier.glb';

        loader.load(modelUrl, (gltf) => {
            character = gltf.scene;
            character.scale.set(2.2, 2.2, 2.2); // تكبير الجندي ليكون أكثر هيبة
            character.userData.velocity = new THREE.Vector3();
            character.userData.isJumping = false;
            character.userData.jumpCount = 0;

            character.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(character);

            mixer = new THREE.AnimationMixer(character);
            gltf.animations.forEach(clip => {
                animations[clip.name.toLowerCase()] = mixer.clipAction(clip);
            });

            if (animations['idle']) {
                currentAction = animations['idle'];
                currentAction.play();
            }

            document.getElementById('loading-screen').style.display = 'none';
        }, undefined, (error) => {
            console.error('Error loading soldier model:', error);
            createFallbackSoldier();
            document.getElementById('loading-screen').style.display = 'none';
        });

        function createFallbackSoldier() {
            character = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 2.0, 0.5), new THREE.MeshStandardMaterial({ color: 0x2e4d23 }));
            body.position.y = 1.0;
            body.castShadow = true;
            character.add(body);
            character.userData.velocity = new THREE.Vector3();
            character.userData.isJumping = false;
            character.userData.jumpCount = 0;
            scene.add(character);
        }

        // ==========================================
        // 3. نظام التحكم والكاميرا القريبة
        // ==========================================
        const input = { forward: 0, side: 0, jump: false, throw: false };
        const joystick = { active: false, startX: 0, startY: 0 };
        const knob = document.getElementById('joystick-knob');

        document.getElementById('joystick-container').addEventListener('touchstart', (e) => {
            joystick.active = true;
            joystick.startX = e.touches[0].clientX;
            joystick.startY = e.touches[0].clientY;
        });

        window.addEventListener('touchmove', (e) => {
            if (!joystick.active) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystick.startX;
            let dy = touch.clientY - joystick.startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 50;
            if (dist > maxDist) {
                dx *= maxDist / dist;
                dy *= maxDist / dist;
            }
            knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            input.side = -dx / maxDist;
            input.forward = -dy / maxDist;
        });

        window.addEventListener('touchend', () => {
            joystick.active = false;
            knob.style.transform = `translate(-50%, -50%)`;
            input.forward = 0;
            input.side = 0;
        });

        document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); input.jump = true; });
        document.getElementById('btn-throw').addEventListener('touchstart', (e) => { e.preventDefault(); input.throw = true; });

        const keys = {};
        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // ==========================================
        // 4. نظام القذائف والانفجارات
        // ==========================================
        const projectiles = [], particles = [], targets = [];
        let score = 0;

        function spawnTarget() {
            const target = new THREE.Mesh(
                new THREE.SphereGeometry(1.5, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.8 })
            );
            const angle = Math.random() * Math.PI * 2;
            const dist = 50 + Math.random() * 80;
            target.position.set(Math.cos(angle)*dist, 2.5, Math.sin(angle)*dist);
            scene.add(target);
            targets.push(target);
        }
        for(let i=0; i<12; i++) spawnTarget();

        function fireProjectile() {
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
            let firePos = character.position.clone().add(new THREE.Vector3(0.4, 1.6, 0.2).applyQuaternion(character.quaternion));
            
            const proj = new THREE.Mesh(
                new THREE.SphereGeometry(0.3, 12, 12),
                new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 1.5 })
            );
            proj.position.copy(firePos);
            scene.add(proj);

            projectiles.push({ mesh: proj, vel: dir.multiplyScalar(1.5), life: 200 });
            createMuzzleFlash(firePos);
        }

        function createMuzzleFlash(pos) {
            for(let i=0; i<10; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.1, 4, 4), new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0xffff00 }));
                p.position.copy(pos);
                scene.add(p);
                particles.push({ mesh: p, vel: new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(0.5), life: 0, maxLife: 10 });
            }
        }

        function createExplosion(pos) {
            for(let i=0; i<40; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6, 6), new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xff2200 }));
                p.position.copy(pos);
                scene.add(p);
                particles.push({
                    mesh: p,
                    vel: new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(0.8),
                    life: 0,
                    maxLife: 50,
                    friction: 0.94
                });
            }
        }

        function fadeToAction(name, duration) {
            if (!animations[name] || currentAction === animations[name]) return;
            const previousAction = currentAction;
            currentAction = animations[name];
            if (previousAction) previousAction.fadeOut(duration);
            currentAction.reset().setEffectiveTimeScale(1).setEffectiveWeight(1).fadeIn(duration).play();
        }

        // ==========================================
        // 5. حلقة التحديث الرئيسية
        // ==========================================
        function update(delta) {
            if (!character) return;

            if (keys['KeyW']) input.forward = 1; else if (keys['KeyS']) input.forward = -1; else if (!joystick.active) input.forward = 0;
            if (keys['KeyA']) input.side = 1; else if (keys['KeyD']) input.side = -1; else if (!joystick.active) input.side = 0;
            if (keys['Space']) { input.jump = true; keys['Space'] = false; }
            if (keys['KeyF']) { input.throw = true; keys['KeyF'] = false; }

            const moveDir = new THREE.Vector3(input.side, 0, input.forward);
            if (moveDir.length() > 0.1) {
                const angle = Math.atan2(input.side, input.forward);
                character.rotation.y = angle;
                character.position.x += Math.sin(angle) * 0.3;
                character.position.z += Math.cos(angle) * 0.3;
                fadeToAction('run', 0.15);
            } else {
                fadeToAction('idle', 0.15);
            }

            if (input.jump && character.userData.jumpCount < 2) {
                character.userData.velocity.y = 0.4;
                character.userData.isJumping = true;
                character.userData.jumpCount++;
                input.jump = false;
                if (character.userData.jumpCount === 2) {
                    character.userData.isFlipping = true;
                    character.userData.flipAngle = 0;
                }
            }

            if (character.userData.isJumping) {
                character.position.y += character.userData.velocity.y;
                character.userData.velocity.y -= 0.02;
                
                if (character.userData.isFlipping) {
                    character.userData.flipAngle += 0.25;
                    character.children[0].rotation.x = character.userData.flipAngle;
                    if (character.userData.flipAngle >= Math.PI * 2) {
                        character.userData.isFlipping = false;
                        character.children[0].rotation.x = 0;
                    }
                }

                if (character.position.y <= 0) {
                    character.position.y = 0;
                    character.userData.isJumping = false;
                    character.userData.jumpCount = 0;
                    character.userData.isFlipping = false;
                    character.children[0].rotation.x = 0;
                }
            }

            if (input.throw && throwCooldown <= 0) {
                fireProjectile();
                throwCooldown = 25;
                input.throw = false;
            }
            if (throwCooldown > 0) throwCooldown--;

            // الكاميرا القريبة (Close Shoulder Camera)
            const camOffset = new THREE.Vector3(1.5, 3.5, -6).applyQuaternion(character.quaternion);
            camera.position.lerp(character.position.clone().add(camOffset), 0.15);
            camera.lookAt(character.position.clone().add(new THREE.Vector3(0, 2, 2).applyQuaternion(character.quaternion)));

            for(let i=projectiles.length-1; i>=0; i--) {
                const p = projectiles[i];
                p.mesh.position.add(p.vel);
                p.life--;
                targets.forEach((t, idx) => {
                    if (p.mesh.position.distanceTo(t.position) < 2.0) {
                        createExplosion(t.position);
                        scene.remove(t);
                        targets.splice(idx, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                        spawnTarget();
                        p.life = 0;
                    }
                });
                if (p.life <= 0) { scene.remove(p.mesh); projectiles.splice(i, 1); }
            }

            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.vel);
                if (p.friction) p.vel.multiplyScalar(p.friction);
                p.life++;
                if (p.life >= p.maxLife) { scene.remove(p.mesh); particles.splice(i, 1); }
            }

            if (mixer) mixer.update(delta);
        }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            update(clock.getDelta());
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
