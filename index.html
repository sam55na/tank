<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>شخصية القزم - Three.js</title>
    <style>
        body { margin: 0; background-color: #f0f0f0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

<script>
    // 1. إعدادات المشهد الأساسية
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff); // خلفية بيضاء نقية

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // إضافة تحكم الكاميرا
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 2. الإضاءة
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); // ضوء محيطي ساطع
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1); // ضوء شمس
    directionalLight.position.set(5, 10, 7.5);
    scene.add(directionalLight);

    const pointLight = new THREE.PointLight(0xffeedd, 0.5); // ضوء دافئ للوجه
    pointLight.position.set(0, 1.5, 2);
    scene.add(pointLight);

    // 3. مجموعة الشخصية (Dwarf Group)
    const dwarfGroup = new THREE.Group();

    // 4. خامات الألوان (Materials)
    const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac, roughness: 0.6 }); // لون البشرة
    const beardMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 }); // اللحية
    const hairMat = beardMat.clone(); // الشعر الأبيض
    const tunicMat = new THREE.MeshStandardMaterial({ color: 0xeeb422, roughness: 0.7 }); // لون السترة الأصفر
    const beltMat = new THREE.MeshStandardMaterial({ color: 0x8b4513, roughness: 0.8 }); // لون الحزام
    const bootMat = new THREE.MeshStandardMaterial({ color: 0xa0522d, roughness: 0.8 }); // لون الحذاء
    const hatMat = new THREE.MeshStandardMaterial({ color: 0xffcb2f, roughness: 0.7 }); // لون القبعة
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x333333 }); // بؤبؤ العين

    // --- بناء الشخصية ---

    // 1. الجسم والسترة (Tunic)
    const bodyGeo = new THREE.SphereGeometry(0.7, 32, 32);
    const body = new THREE.Mesh(bodyGeo, tunicMat);
    body.scale.set(1, 1.3, 0.8);
    dwarfGroup.add(body);

    // 2. الرأس والوجه
    const headGeo = new THREE.SphereGeometry(0.4, 32, 32);
    const head = new THREE.Mesh(headGeo, skinMat);
    head.position.y = 1.2;
    dwarfGroup.add(head);

    // 3. العيون وحواجب
    const eyeGeo = new THREE.SphereGeometry(0.05, 16, 16);
    const eyebrowMat = hairMat.clone();
    
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.15, 1.25, 1.55); // وضعه أمام الوجه قليلاً
    leftEye.scale.z = 0.5;
    head.add(leftEye);

    const leftEyebrowGeo = new THREE.SphereGeometry(0.02, 16, 16);
    const leftEyebrow = new THREE.Mesh(leftEyebrowGeo, eyebrowMat);
    leftEyebrow.scale.set(5, 0.5, 1);
    leftEyebrow.position.set(-0.15, 1.35, 1.55);
    leftEyebrow.rotation.z = -0.1;
    head.add(leftEyebrow);

    const rightEye = leftEye.clone();
    rightEye.position.x = 0.15;
    head.add(rightEye);

    const rightEyebrow = leftEyebrow.clone();
    rightEyebrow.position.x = 0.15;
    rightEyebrow.rotation.z = 0.1;
    head.add(rightEyebrow);

    // 4. الأنف
    const noseGeo = new THREE.SphereGeometry(0.06, 16, 16);
    const nose = new THREE.Mesh(noseGeo, skinMat);
    nose.position.set(0, 1.15, 1.5);
    nose.scale.set(1.2, 1.5, 1);
    head.add(nose);

    // 5. اللحية والشعر (خدعة باستخدام مئات الكرات الصغيرة)
    function createBeardHair(x, y, z, scale, rotation = 0) {
        const hair = new THREE.Mesh(new THREE.SphereGeometry(0.02, 8, 8), beardMat);
        hair.position.set(x, y, z);
        hair.scale.set(1, scale * 3, 1);
        hair.rotation.x = -Math.PI / 4; // اتجاه لأسفل
        hair.rotation.z = rotation;
        head.add(hair);
    }

    for (let i = 0; i < 200; i++) {
        const radius = 0.35;
        const u = Math.random();
        const v = Math.random();
        const phi = 2 * Math.PI * u;
        const theta = Math.acos(2 * v - 1);
        
        // قصر الشعر على النصف السفلي للرأس (منطقة اللحية)
        if (theta > Math.PI / 2) {
            const x = radius * Math.sin(theta) * Math.cos(phi);
            const y = radius * Math.cos(theta) - 0.1; // لأسفل الوجه
            const z = radius * Math.sin(theta) * Math.sin(phi) + 0.05; // أمام الوجه
            createBeardHair(x, y, z, 1.2, (phi - Math.PI / 2) * 0.1);
        }
    }

    // 6. الشارب (Moustache)
    function createMoustache(x, y, z, flip = false) {
        const geo = new THREE.CylinderGeometry(0.01, 0.01, 0.3, 16);
        const stache = new THREE.Mesh(geo, hairMat);
        stache.rotation.z = Math.PI / 2.5 * (flip ? 1 : -1);
        stache.position.set(x, y, z);
        head.add(stache);
    }
    createMoustache(-0.12, 1.08, 1.5, false);
    createMoustache(0.12, 1.08, 1.5, true);

    // 7. القبعة المخروطية الملتوية (Looped Hat)
    // نستخدم أسطوانة مشوهة على شكل حلقة مفتوحة لتمثيل التواء القبعة
    const hatLoopedGeo = new THREE.TorusGeometry(0.3, 0.12, 16, 100, Math.PI * 1.6);
    const hatLoop = new THREE.Mesh(hatLoopedGeo, hatMat);
    hatLoop.position.set(0, 1.5, 0.1);
    hatLoop.rotation.x = Math.PI / 2;
    dwarfGroup.add(hatLoop);

    // الرأس المستدق للقبعة
    const hatTipGeo = new THREE.ConeGeometry(0.12, 0.6, 32);
    const hatTip = new THREE.Mesh(hatTipGeo, hatMat);
    hatTip.position.set(-0.2, 1.7, 0.2); // في نهاية الحلقة
    hatTip.rotation.z = 0.2;
    hatTip.rotation.x = -0.2;
    dwarfGroup.add(hatTip);

    // حافة القبعة (Cuff)
    const hatCuffGeo = new THREE.CylinderGeometry(0.42, 0.45, 0.2, 32);
    const hatCuffMat = hatMat.clone(); hatCuffMat.color.multiplyScalar(0.9); // أغمق قليلاً
    const hatCuff = new THREE.Mesh(hatCuffGeo, hatCuffMat);
    hatCuff.position.y = 1.42;
    dwarfGroup.add(hatCuff);

    // 8. الحزام والمشبك (Belt & Buckle)
    const beltGeo = new THREE.CylinderGeometry(0.72, 0.72, 0.1, 32, 1, true);
    const belt = new THREE.Mesh(beltGeo, beltMat);
    belt.position.y = 0;
    dwarfGroup.add(belt);

    const buckleGeo = new THREE.BoxGeometry(0.15, 0.15, 0.05);
    const buckleMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8 });
    const buckle = new THREE.Mesh(buckleGeo, buckleMat);
    buckle.position.set(0, 0, 0.72);
    dwarfGroup.add(buckle);

    // 9. الأطراف السفلية (الأرجل والأحذية)
    function createLegAndBoot(x, isLeft = true) {
        const legGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.6, 16);
        const leg = new THREE.Mesh(legGeo, bootMat);
        leg.position.set(x, -0.6, 0.1);
        dwarfGroup.add(leg);

        const bootGeo = new THREE.SphereGeometry(0.2, 32, 32);
        const bootMatLower = bootMat.clone(); bootMatLower.roughness = 1; // أخشن
        const boot = new THREE.Mesh(bootGeo, bootMatLower);
        boot.scale.set(1.5, 1, 2);
        boot.position.set(x, -0.8, 0.3);
        dwarfGroup.add(boot);
    }
    createLegAndBoot(-0.35, true);
    createLegAndBoot(0.35, false);

    // 10. الأطراف العلوية (الأكمام واليدين)
    function createArmAndHand(x, rotation = 0) {
        const armGroup = new THREE.Group();
        const armGeo = new THREE.CylinderGeometry(0.15, 0.12, 0.6, 16);
        const arm = new THREE.Mesh(armGeo, skinMat);
        armGroup.add(arm);

        const handGeo = new THREE.SphereGeometry(0.12, 16, 16);
        const hand = new THREE.Mesh(handGeo, skinMat);
        hand.position.y = -0.3;
        armGroup.add(hand);

        armGroup.position.set(x, 0.3, 0.2);
        armGroup.rotation.z = rotation;
        dwarfGroup.add(armGroup);
    }
    createArmAndHand(-0.8, -0.1);
    createArmAndHand(0.8, 0.1);

    // 11. إضافة الشخصية للمشهد
    scene.add(dwarfGroup);

    // --- حلقة التحريك والتحديث ---
    function animate() {
        requestAnimationFrame(animate);
        controls.update(); // تفعيل حركة الكاميرا
        renderer.render(scene, camera);
    }
    
    // التعامل مع تغيير حجم النافذة
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
