<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Warrior - شخصية حربية ثلاثية الأبعاد</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 12px 20px;
            border-radius: 8px;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
            font-size: 14px;
            border-left: 4px solid #ff5500;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }
        .status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #0f0;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">
        🔫 WARRIOR VOXEL | 💣 HEAVY BOMB | 🛡️ FULL ARMOR
    </div>
    <div id="controls">
        🖱️ اسحب بالماوس للتدوير | 🔍 اسكرول للتكبير
    </div>
    <div class="status" id="status">
        ⚙️ جاري التحميل...
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // إعداد المشهد
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.Fog(0x0a0a2a, 15, 30);
        
        // الكاميرا - موضوعة بشكل صحيح لرؤية الشخصية
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 4, 8);
        camera.lookAt(0, 2, 0);
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // إضافة OrbitControls
        let controls;
        import('https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js').then(module => {
            controls = new module.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = false;
            controls.enableZoom = true;
            controls.target.set(0, 2, 0);
            document.getElementById('status').innerHTML = '✅ جاهز | اسحب للتدوير';
        });
        
        // الإضاءة
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        mainLight.position.set(5, 8, 4);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x4488ff, 0.4);
        fillLight.position.set(-2, 3, 3);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xff8866, 0.5);
        backLight.position.set(0, 3, -4);
        scene.add(backLight);
        
        const bombLight = new THREE.PointLight(0xff4422, 0.6);
        bombLight.position.set(2.5, 2.2, 1.2);
        scene.add(bombLight);
        
        // أرضية
        const gridHelper = new THREE.GridHelper(12, 20, 0x88aaff, 0x446688);
        gridHelper.position.y = -1.2;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(10, 10),
            new THREE.ShadowMaterial({ opacity: 0.4, color: 0x000000, transparent: true })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -1.15;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // نجوم
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 800;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount; i++) {
            starsPositions[i*3] = (Math.random() - 0.5) * 200;
            starsPositions[i*3+1] = (Math.random() - 0.5) * 80;
            starsPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const stars = new THREE.Points(starsGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.08 }));
        scene.add(stars);
        
        // ==================== بناء الشخصية ====================
        const characterGroup = new THREE.Group();
        scene.add(characterGroup);
        
        const voxelSize = 0.12;
        
        function addVoxel(x, y, z, color, emissive = null) {
            const geometry = new THREE.BoxGeometry(voxelSize, voxelSize, voxelSize);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                emissive: emissive || 0x000000,
                emissiveIntensity: emissive ? 0.4 : 0,
                metalness: 0.7,
                roughness: 0.3
            });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(x * voxelSize, y * voxelSize, z * voxelSize);
            cube.castShadow = true;
            cube.receiveShadow = true;
            characterGroup.add(cube);
            return cube;
        }
        
        // الألوان
        const COLORS = {
            armor: 0x4a5568,
            darkArmor: 0x2d3748,
            lightArmor: 0x718096,
            red: 0xe53e3e,
            orange: 0xed8936,
            yellow: 0xf6e05e,
            green: 0x48bb78,
            darkGreen: 0x2f855a,
            black: 0x1a202c,
            silver: 0xcbd5e0,
            gold: 0xd69e2e,
            blue: 0x4299e1,
            visor: 0x2c7a7a,
            bomb: 0x5a67d8,
            brown: 0x9b6b43
        };
        
        // === الجسم الرئيسي (الجذع) ===
        for (let x = -4; x <= 4; x++) {
            for (let y = 6; y <= 14; y++) {
                for (let z = -2; z <= 2; z++) {
                    let color = COLORS.armor;
                    if (y >= 8 && y <= 12 && Math.abs(x) <= 3 && z === 2) color = COLORS.lightArmor;
                    if (y === 10 && Math.abs(x) <= 1 && z === 2) color = COLORS.gold;
                    if (x === -3 && z === 2 && y >= 8 && y <= 12) color = COLORS.darkGreen;
                    if (x === 3 && z === 2 && y >= 8 && y <= 12) color = COLORS.darkGreen;
                    addVoxel(x, y, z, color);
                }
            }
        }
        
        // === الرأس والخوذة ===
        for (let x = -3; x <= 3; x++) {
            for (let y = 15; y <= 20; y++) {
                for (let z = -2; z <= 2; z++) {
                    let color = COLORS.darkArmor;
                    if (y >= 16 && y <= 19 && z === 2 && Math.abs(x) <= 2) color = COLORS.visor;
                    if (y === 20 && Math.abs(x) <= 1 && z === 0) color = COLORS.gold;
                    if (x === 3 && y === 17 && z === 1) color = COLORS.red;
                    if (x === -3 && y === 18 && z === 1) color = COLORS.blue;
                    addVoxel(x, y, z, color);
                }
            }
        }
        
        // === الكتف الأيمن (درع كبير) ===
        for (let dx = 0; dx <= 3; dx++) {
            for (let dy = 0; dy <= 3; dy++) {
                for (let dz = -1; dz <= 1; dz++) {
                    addVoxel(5 + dx, 13 + dy, dz, COLORS.lightArmor);
                }
            }
        }
        // مسامير على الكتف
        addVoxel(7, 15, 1, COLORS.gold);
        addVoxel(7, 15, -1, COLORS.gold);
        
        // === الكتف الأيسر ===
        for (let dx = 0; dx <= 2; dx++) {
            for (let dy = 0; dy <= 2; dy++) {
                for (let dz = -1; dz <= 1; dz++) {
                    addVoxel(-5 - dx, 13 + dy, dz, COLORS.lightArmor);
                }
            }
        }
        
        // === الذراع الأيمن (حامل القنبلة) ===
        for (let y = 11; y <= 15; y++) {
            for (let x = 5; x <= 7; x++) {
                for (let z = -1; z <= 1; z++) {
                    addVoxel(x, y, z, COLORS.armor);
                }
            }
        }
        for (let y = 16; y <= 19; y++) {
            for (let x = 7; x <= 9; x++) {
                for (let z = -1; z <= 1; z++) {
                    addVoxel(x, y, z, COLORS.lightArmor);
                }
            }
        }
        
        // === الذراع الأيسر ===
        for (let y = 11; y <= 15; y++) {
            for (let x = -7; x <= -5; x++) {
                for (let z = -1; z <= 1; z++) {
                    addVoxel(x, y, z, COLORS.armor);
                }
            }
        }
        for (let y = 16; y <= 18; y++) {
            for (let x = -9; x <= -7; x++) {
                for (let z = -1; z <= 1; z++) {
                    addVoxel(x, y, z, COLORS.lightArmor);
                }
            }
        }
        
        // === الأرجل ===
        // الرجل اليمنى
        for (let y = 0; y <= 5; y++) {
            for (let x = 2; x <= 4; x++) {
                for (let z = -1; z <= 1; z++) {
                    let color = y < 3 ? COLORS.black : COLORS.armor;
                    addVoxel(x, y, z, color);
                }
            }
        }
        // الرجل اليسرى
        for (let y = 0; y <= 5; y++) {
            for (let x = -4; x <= -2; x++) {
                for (let z = -1; z <= 1; z++) {
                    let color = y < 3 ? COLORS.black : COLORS.armor;
                    addVoxel(x, y, z, color);
                }
            }
        }
        
        // الأحذية
        for (let x = 2; x <= 5; x++) {
            addVoxel(x, 0, -2, COLORS.black);
            addVoxel(x, 1, -2, COLORS.black);
            addVoxel(-x+1, 0, -2, COLORS.black);
            addVoxel(-x+1, 1, -2, COLORS.black);
        }
        
        // واقي الركبة
        addVoxel(3, 3, -2, COLORS.silver);
        addVoxel(-3, 3, -2, COLORS.silver);
        
        // === القنبلة ===
        // جسم القنبلة
        for (let y = 0; y <= 4; y++) {
            for (let x = 0; x <= 3; x++) {
                for (let z = -1; z <= 1; z++) {
                    let color = COLORS.bomb;
                    if (y === 2 && Math.abs(z) === 1) color = COLORS.yellow;
                    addVoxel(10 + x, 14 + y, z, color);
                }
            }
        }
        
        // رأس القنبلة المخروطي
        addVoxel(13, 17, 0, COLORS.orange);
        addVoxel(14, 18, 0, COLORS.red);
        addVoxel(15, 19, 0, COLORS.red, COLORS.red);
        
        // زعانف الذيل
        addVoxel(10, 16, -2, COLORS.silver);
        addVoxel(10, 16, 2, COLORS.silver);
        addVoxel(12, 16, -2, COLORS.silver);
        addVoxel(12, 16, 2, COLORS.silver);
        
        // أحزمة حمل القنبلة
        for (let x = 8; x <= 10; x++) {
            addVoxel(x, 15, -2, COLORS.brown);
            addVoxel(x, 16, -2, COLORS.brown);
        }
        
        // === تفاصيل إضافية ===
        // خراطيش على الصدر
        for (let x = -2; x <= 2; x += 2) {
            addVoxel(x, 12, 3, COLORS.gold);
            addVoxel(x, 13, 3, COLORS.gold);
        }
        
        // قنابل يدوية على الحزام
        for (let i = 0; i < 3; i++) {
            addVoxel(-1 + i, 5, -2, COLORS.darkGreen);
            addVoxel(-1 + i, 6, -2, COLORS.darkGreen);
        }
        
        // جهاز اتصال على الظهر
        for (let x = -1; x <= 1; x++) {
            for (let y = 10; y <= 12; y++) {
                addVoxel(x, y, -3, COLORS.black);
            }
        }
        addVoxel(0, 11, -4, COLORS.red, COLORS.red);
        
        // أنابيب هيدروليكية
        for (let y = 14; y <= 18; y++) {
            addVoxel(8, y, -2, COLORS.silver);
        }
        
        // فتحات تهوية على الكتف
        addVoxel(7, 14, -2, COLORS.orange, COLORS.orange);
        addVoxel(-6, 14, -2, COLORS.orange, COLORS.orange);
        
        // شارة عسكرية
        addVoxel(-5, 14, -2, COLORS.red);
        addVoxel(-5, 14, -1, COLORS.red);
        
        // آثار معركة
        addVoxel(2, 9, 3, 0x442200);
        addVoxel(-1, 7, 3, 0x331100);
        addVoxel(4, 17, 1, 0x331100);
        
        // === تأثيرات متحركة ===
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // نبض ضوء القنبلة
            const pulse = 0.5 + Math.sin(time * 10) * 0.25;
            bombLight.intensity = pulse;
            
            // دوران النجوم
            stars.rotation.y += 0.0005;
            stars.rotation.x += 0.0002;
            
            if (controls) controls.update();
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('✅ شخصية الحرب جاهزة!');
        document.getElementById('status').innerHTML = '✅ تم التحميل | ' + characterGroup.children.length + ' فوكسل';
    </script>
</body>
</html>
