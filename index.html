<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مجسم القزم الحربي الاحترافي - لعبة متعددة اللاعبين</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', 'Segoe UI', sans-serif;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 100;
            pointer-events: none;
            backdrop-filter: blur(5px);
            font-size: 14px;
            direction: rtl;
            font-weight: bold;
            border-right: 4px solid #ff5500;
        }
        
        #controls-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
            font-family: monospace;
            pointer-events: none;
            direction: ltr;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            z-index: 200;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        ⚔️ القزم الحربي | حامل القنبلة 💣 | لعبة متعددة اللاعبين
    </div>
    <div id="controls-panel">
        🖱️ اسحب لتدوير الكاميرا | 🖱️ زر الفأرة الأيمن لتحريك المنظور
    </div>
    
    <!-- Import Three.js core and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // إعداد المشهد
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);
        
        // إعداد الكاميرا
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 8);
        camera.lookAt(0, 1, 0);
        
        // إعداد العارضين
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // عارض CSS2D للنص فوق الرأس
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // التحكم بالكاميرا
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 1.0;
        controls.target.set(0, 1.5, 0);
        
        // --- الإضاءة الاحترافية ---
        
        // Ambient light
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        // Main directional light (شمس)
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 15;
        mainLight.shadow.camera.left = -5;
        mainLight.shadow.camera.right = 5;
        mainLight.shadow.camera.top = 5;
        mainLight.shadow.camera.bottom = -5;
        scene.add(mainLight);
        
        // Fill light from below
        const fillLight = new THREE.PointLight(0x4466cc, 0.4);
        fillLight.position.set(0, -1, 0);
        scene.add(fillLight);
        
        // Back rim light
        const rimLight = new THREE.PointLight(0xffaa66, 0.6);
        rimLight.position.set(-2, 2, -3);
        scene.add(rimLight);
        
        // Warm fill from side
        const warmFill = new THREE.PointLight(0xff8866, 0.5);
        warmFill.position.set(3, 2, 2);
        scene.add(warmFill);
        
        // إضافة مؤثرات إضاءة متحركة (نار)
        const fireLight = new THREE.PointLight(0xff4400, 0.8);
        fireLight.position.set(1.2, 0.8, 1);
        scene.add(fireLight);
        
        // --- الأرضية والبيئة ---
        
        // Ground plane with texture
        const groundGeometry = new THREE.CircleGeometry(12, 32);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x2a2a3a, 
            roughness: 0.7, 
            metalness: 0.1,
            side: THREE.DoubleSide
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.05;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Grid helper for reference
        const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = 0;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        // Decorative particles (dust/atmosphere)
        const particleCount = 800;
        const particlesGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 40;
            particlePositions[i*3+1] = Math.random() * 5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 30;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.05, transparent: true, opacity: 0.4 });
        const particles = new THREE.Points(particlesGeometry, particleMaterial);
        scene.add(particles);
        
        // --- إنشاء مجسم القزم الحربي الاحترافي ---
        const dwarfGroup = new THREE.Group();
        
        // 1. الجسم الرئيسي (درع ثقيل)
        const bodyGeo = new THREE.CylinderGeometry(0.65, 0.7, 1.2, 12);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4a5b6e, roughness: 0.3, metalness: 0.7 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        body.position.y = 0.6;
        dwarfGroup.add(body);
        
        // درع صدري معدني
        const chestPlateGeo = new THREE.CylinderGeometry(0.68, 0.68, 0.8, 8);
        const metalMat = new THREE.MeshStandardMaterial({ color: 0xaa8866, roughness: 0.2, metalness: 0.85 });
        const chestPlate = new THREE.Mesh(chestPlateGeo, metalMat);
        chestPlate.castShadow = true;
        chestPlate.position.y = 0.65;
        dwarfGroup.add(chestPlate);
        
        // حزام خصر
        const beltGeo = new THREE.TorusGeometry(0.65, 0.08, 16, 40);
        const beltMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.5, metalness: 0.3 });
        const belt = new THREE.Mesh(beltGeo, beltMat);
        belt.rotation.x = Math.PI / 2;
        belt.position.y = 0.25;
        dwarfGroup.add(belt);
        
        // 2. الرأس (قزم بلحية)
        const headGeo = new THREE.SphereGeometry(0.55, 32, 32);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xcd9a6b, roughness: 0.25, metalness: 0.1 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.castShadow = true;
        head.position.y = 1.25;
        dwarfGroup.add(head);
        
        // خوذة حربية
        const helmetGeo = new THREE.CylinderGeometry(0.58, 0.62, 0.45, 8);
        const helmetMat = new THREE.MeshStandardMaterial({ color: 0x7c8c9e, metalness: 0.8, roughness: 0.2 });
        const helmet = new THREE.Mesh(helmetGeo, helmetMat);
        helmet.castShadow = true;
        helmet.position.y = 1.55;
        dwarfGroup.add(helmet);
        
        // قمة الخوذة
        const crestGeo = new THREE.ConeGeometry(0.22, 0.35, 8);
        const crestMat = new THREE.MeshStandardMaterial({ color: 0xcc5533, metalness: 0.5 });
        const crest = new THREE.Mesh(crestGeo, crestMat);
        crest.position.y = 1.78;
        dwarfGroup.add(crest);
        
        // اللحية الكثيفة
        const beardGeo = new THREE.CylinderGeometry(0.52, 0.45, 0.5, 8);
        const beardMat = new THREE.MeshStandardMaterial({ color: 0xb87c4f, roughness: 0.9 });
        const beard = new THREE.Mesh(beardGeo, beardMat);
        beard.position.y = 1.02;
        beard.castShadow = true;
        dwarfGroup.add(beard);
        
        // تفاصيل اللحية (ضفائر)
        const braidGeo = new THREE.CylinderGeometry(0.12, 0.1, 0.45, 6);
        const braidMat = new THREE.MeshStandardMaterial({ color: 0xa56b3e });
        const leftBraid = new THREE.Mesh(braidGeo, braidMat);
        leftBraid.position.set(-0.35, 1.05, 0.45);
        leftBraid.rotation.z = 0.3;
        dwarfGroup.add(leftBraid);
        
        const rightBraid = new THREE.Mesh(braidGeo, braidMat);
        rightBraid.position.set(0.35, 1.05, 0.45);
        rightBraid.rotation.z = -0.3;
        dwarfGroup.add(rightBraid);
        
        // العيون (مع بريق)
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x224466, emissiveIntensity: 0.3 });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.11, 24, 24), eyeMat);
        leftEye.position.set(-0.2, 1.38, 0.55);
        dwarfGroup.add(leftEye);
        
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.11, 24, 24), eyeMat);
        rightEye.position.set(0.2, 1.38, 0.55);
        dwarfGroup.add(rightEye);
        
        // بؤبؤ العين
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
        leftPupil.position.set(-0.2, 1.37, 0.66);
        dwarfGroup.add(leftPupil);
        
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pupilMat);
        rightPupil.position.set(0.2, 1.37, 0.66);
        dwarfGroup.add(rightPupil);
        
        // حواجب غاضبة
        const browMat = new THREE.MeshStandardMaterial({ color: 0x4a2e1e });
        const leftBrow = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.09, 0.1), browMat);
        leftBrow.position.set(-0.23, 1.49, 0.58);
        leftBrow.rotation.z = -0.2;
        dwarfGroup.add(leftBrow);
        
        const rightBrow = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.09, 0.1), browMat);
        rightBrow.position.set(0.23, 1.49, 0.58);
        rightBrow.rotation.z = 0.2;
        dwarfGroup.add(rightBrow);
        
        // 3. الأكتاف (دروع كتف)
        const shoulderMat = new THREE.MeshStandardMaterial({ color: 0xaa8866, metalness: 0.9, roughness: 0.3 });
        const leftShoulder = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 8), shoulderMat);
        leftShoulder.position.set(-0.75, 1.15, 0);
        leftShoulder.scale.set(0.8, 0.5, 0.9);
        dwarfGroup.add(leftShoulder);
        
        const rightShoulder = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 8), shoulderMat);
        rightShoulder.position.set(0.75, 1.15, 0);
        rightShoulder.scale.set(0.8, 0.5, 0.9);
        dwarfGroup.add(rightShoulder);
        
        // أذرع
        const armMat = new THREE.MeshStandardMaterial({ color: 0x6a5a4a, roughness: 0.4 });
        const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.85, 8), armMat);
        leftArm.position.set(-0.78, 0.85, 0);
        leftArm.rotation.z = 0.35;
        leftArm.rotation.x = -0.2;
        dwarfGroup.add(leftArm);
        
        const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.85, 8), armMat);
        rightArm.position.set(0.78, 0.85, 0);
        rightArm.rotation.z = -0.35;
        rightArm.rotation.x = 0.15;
        dwarfGroup.add(rightArm);
        
        // قفازات معدنية
        const gauntletMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6a, metalness: 0.7 });
        const leftHand = new THREE.Mesh(new THREE.SphereGeometry(0.22, 6, 6), gauntletMat);
        leftHand.position.set(-1.05, 0.58, 0.2);
        dwarfGroup.add(leftHand);
        
        const rightHand = new THREE.Mesh(new THREE.SphereGeometry(0.22, 6, 6), gauntletMat);
        rightHand.position.set(1.05, 0.58, 0.2);
        dwarfGroup.add(rightHand);
        
        // 4. الأرجل
        const legMat = new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 0.6 });
        const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.32, 0.8, 8), legMat);
        leftLeg.position.set(-0.38, 0.25, 0);
        dwarfGroup.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.32, 0.8, 8), legMat);
        rightLeg.position.set(0.38, 0.25, 0);
        dwarfGroup.add(rightLeg);
        
        // أحذية حديدية
        const bootMat = new THREE.MeshStandardMaterial({ color: 0x5a4a3a, metalness: 0.5 });
        const leftBoot = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.25, 0.65), bootMat);
        leftBoot.position.set(-0.38, -0.1, 0.1);
        dwarfGroup.add(leftBoot);
        
        const rightBoot = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.25, 0.65), bootMat);
        rightBoot.position.set(0.38, -0.1, 0.1);
        dwarfGroup.add(rightBoot);
        
        // 5. القنبلة 💣 - تفاصيل احترافية
        const bombGroup = new THREE.Group();
        const bombBodyGeo = new THREE.SphereGeometry(0.38, 32, 32);
        const bombMat = new THREE.MeshStandardMaterial({ color: 0x334455, metalness: 0.4, roughness: 0.3 });
        const bombBody = new THREE.Mesh(bombBodyGeo, bombMat);
        bombBody.scale.set(0.9, 1.1, 0.9);
        bombGroup.add(bombBody);
        
        // فتيل القنبلة
        const fuseGeo = new THREE.CylinderGeometry(0.08, 0.09, 0.35, 8);
        const fuseMat = new THREE.MeshStandardMaterial({ color: 0xcc8844 });
        const fuse = new THREE.Mesh(fuseGeo, fuseMat);
        fuse.position.y = 0.48;
        bombGroup.add(fuse);
        
        // شرارة نار على الفتيل (متوهجة)
        const sparkMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff3300, emissiveIntensity: 0.8 });
        const spark = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 8), sparkMat);
        spark.position.y = 0.68;
        bombGroup.add(spark);
        
        // خطوط تفاصيل القنبلة
        const stripeMat = new THREE.MeshStandardMaterial({ color: 0xccaa66 });
        const stripe = new THREE.Mesh(new THREE.TorusGeometry(0.38, 0.04, 16, 40), stripeMat);
        stripe.rotation.x = Math.PI / 2;
        stripe.position.y = -0.15;
        bombGroup.add(stripe);
        
        const stripe2 = new THREE.Mesh(new THREE.TorusGeometry(0.38, 0.04, 16, 40), stripeMat);
        stripe2.rotation.x = Math.PI / 2;
        stripe2.position.y = 0.15;
        bombGroup.add(stripe2);
        
        bombGroup.position.set(1.25, 0.55, 0.45);
        bombGroup.castShadow = true;
        dwarfGroup.add(bombGroup);
        
        // إضافة يد ثانية تمسك القنبلة (تعديل بسيط)
        const gripHand = new THREE.Mesh(new THREE.SphereGeometry(0.24, 8, 8), gauntletMat);
        gripHand.position.set(1.32, 0.58, 0.55);
        dwarfGroup.add(gripHand);
        
        // --- إضافة عباءة حربية (قماش) ---
        const cloakGeo = new THREE.CylinderGeometry(0.85, 1.1, 1.2, 8);
        const cloakMat = new THREE.MeshStandardMaterial({ color: 0x5d3a1a, roughness: 0.9, metalness: 0.05, transparent: true, opacity: 0.85 });
        const cloak = new THREE.Mesh(cloakGeo, cloakMat);
        cloak.position.y = 0.55;
        cloak.scale.set(1.1, 0.9, 0.8);
        dwarfGroup.add(cloak);
        
        // --- اسم اللاعب CSS2D ---
        const playerNameDiv = document.createElement('div');
        playerNameDiv.textContent = '⚔️ WARRIOR_DWARF ⚔️';
        playerNameDiv.style.color = '#ffcc88';
        playerNameDiv.style.fontSize = '18px';
        playerNameDiv.style.fontWeight = 'bold';
        playerNameDiv.style.textShadow = '1px 1px 2px black';
        playerNameDiv.style.background = 'rgba(0,0,0,0.6)';
        playerNameDiv.style.padding = '4px 12px';
        playerNameDiv.style.borderRadius = '20px';
        playerNameDiv.style.border = '1px solid #ffaa55';
        playerNameDiv.style.fontFamily = 'monospace';
        playerNameDiv.style.backdropFilter = 'blur(4px)';
        
        const nameLabel = new CSS2DObject(playerNameDiv);
        nameLabel.position.set(0, 2.2, 0);
        dwarfGroup.add(nameLabel);
        
        // شريط الصحة (Health bar indicator)
        const healthBarBg = document.createElement('div');
        healthBarBg.style.width = '100px';
        healthBarBg.style.height = '8px';
        healthBarBg.style.backgroundColor = '#330000';
        healthBarBg.style.borderRadius = '4px';
        healthBarBg.style.border = '1px solid #aa5555';
        healthBarBg.style.overflow = 'hidden';
        
        const healthFill = document.createElement('div');
        healthFill.style.width = '85%';
        healthFill.style.height = '100%';
        healthFill.style.backgroundColor = '#dd4444';
        healthFill.style.borderRadius = '3px';
        healthFill.style.transition = 'width 0.3s';
        healthBarBg.appendChild(healthFill);
        
        const healthLabel = new CSS2DObject(healthBarBg);
        healthLabel.position.set(0, 2.0, 0);
        dwarfGroup.add(healthLabel);
        
        // إضافة تأثير الهالة (aura) حول القزم
        const auraGeo = new THREE.SphereGeometry(0.95, 16, 16);
        const auraMat = new THREE.MeshBasicMaterial({ color: 0xff8833, transparent: true, opacity: 0.12, side: THREE.BackSide });
        const aura = new THREE.Mesh(auraGeo, auraMat);
        aura.scale.set(1.2, 1.1, 1.2);
        dwarfGroup.add(aura);
        
        scene.add(dwarfGroup);
        
        // --- مؤثرات بيئية إضافية ---
        
        // Smoke particles حول القنبلة (تأثير نار)
        const smokeCount = 30;
        const smokeParticles = [];
        const smokeGeo = new THREE.SphereGeometry(0.04, 6, 6);
        
        for (let i = 0; i < smokeCount; i++) {
            const smokeMat = new THREE.MeshStandardMaterial({ color: 0xaa8866, emissive: 0x442200, transparent: true, opacity: 0.4 });
            const smoke = new THREE.Mesh(smokeGeo, smokeMat);
            smoke.userData = { offsetX: (Math.random() - 0.5) * 0.5, offsetZ: (Math.random() - 0.5) * 0.5, speed: 0.005 + Math.random() * 0.01, phase: Math.random() * Math.PI * 2 };
            dwarfGroup.add(smoke);
            smokeParticles.push(smoke);
        }
        
        // --- إضافة بعض الأعداء الوهميين أو الزملاء (لإظهار تعدد اللاعبين) ---
        // إنشاء نسختين إضافيتين من القزم ولكن بتعديلات بسيطة ووضعها على الجانبين
        const createDummyDwarf = (x, z, colorVariant, name) => {
            const dummyGroup = new THREE.Group();
            // نسخة مبسطة لكن مع تغيير اللون
            const dummyBody = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.65, 1.1, 8), new THREE.MeshStandardMaterial({ color: colorVariant, roughness: 0.5, metalness: 0.5 }));
            dummyBody.castShadow = true;
            dummyBody.position.y = 0.55;
            dummyGroup.add(dummyBody);
            
            const dummyHead = new THREE.Mesh(new THREE.SphereGeometry(0.5, 24, 24), new THREE.MeshStandardMaterial({ color: 0xc28b5c }));
            dummyHead.position.y = 1.2;
            dummyGroup.add(dummyHead);
            
            const dummyHelm = new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.55, 0.4, 8), new THREE.MeshStandardMaterial({ color: 0x8a9aad, metalness: 0.7 }));
            dummyHelm.position.y = 1.48;
            dummyGroup.add(dummyHelm);
            
            // اسم للاعب الآخر
            const nameDiv = document.createElement('div');
            nameDiv.textContent = name;
            nameDiv.style.color = '#aaffcc';
            nameDiv.style.fontSize = '14px';
            nameDiv.style.background = 'rgba(0,0,0,0.5)';
            nameDiv.style.padding = '2px 8px';
            nameDiv.style.borderRadius = '12px';
            const nameLabel2 = new CSS2DObject(nameDiv);
            nameLabel2.position.set(0, 1.9, 0);
            dummyGroup.add(nameLabel2);
            
            dummyGroup.position.set(x, 0, z);
            scene.add(dummyGroup);
            return dummyGroup;
        };
        
        createDummyDwarf(-2.5, -2.2, 0x6a8e9e, '🔰 ALLY_GRIMGAR');
        createDummyDwarf(2.8, -2.0, 0x8e6a5e, '⚡ RAGNAR_BOMB');
        createDummyDwarf(0, -3.2, 0x5e7e6a, '🛡️ THORIN_SHIELD');
        
        // --- حلقة التحريك (Animation Loop) ---
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016; // ~60fps
            
            // تحريك القنبلة قليلاً وإشعال النبض
            bombGroup.position.y = 0.55 + Math.sin(time * 12) * 0.008;
            spark.scale.setScalar(0.9 + Math.sin(time * 25) * 0.2);
            spark.material.emissiveIntensity = 0.6 + Math.sin(time * 30) * 0.3;
            fireLight.intensity = 0.7 + Math.sin(time * 18) * 0.2;
            
            // تحريك الدخان حول القنبلة
            smokeParticles.forEach((smoke, idx) => {
                smoke.position.set(1.25 + Math.sin(time * 3 + idx) * 0.08, 0.7 + Math.cos(time * 4 + idx) * 0.05, 0.55 + Math.sin(time * 2.5 + idx) * 0.08);
                smoke.material.opacity = 0.3 + Math.sin(time * 5 + idx) * 0.15;
            });
            
            // تحريك الريشة قليلاً
            crest.rotation.z = Math.sin(time * 1.5) * 0.03;
            
            // تحريك العباءة
            cloak.rotation.z = Math.sin(time * 1.2) * 0.02;
            
            // تحريك الجسيمات المنتشرة
            particles.rotation.y += 0.001;
            
            // تحريك الكاميرا الدائرية بشكل اختياري بسيط (يمكن تعطيلها إذا كان المستخدم يتحكم)
            if (!controls.autoRotate) {
                // لا شيء
            }
            
            // تحديث controls و render
            controls.update();
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        // استجابة لتغيير حجم النافذة
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // إضافة تأثير تحميل بسيط وإخفاء رسالة التحميل
        setTimeout(() => {
            const loadingDiv = document.querySelector('.loading');
            if (loadingDiv) loadingDiv.style.display = 'none';
        }, 500);
        
        console.log('تم تحميل المجسم الاحترافي للقزم الحربي بنجاح!');
    </script>
</body>
</html>
