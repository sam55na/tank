<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dwarf Bomber - Arcade Pro Edition</title>
    <style>
        * {
            box-sizing: border-box;
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #0a2f1f;
            font-family: system-ui, -apple-system, sans-serif;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* UI Layer */
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 30;
        }

        /* Crosshair */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 40;
        }
        #crosshair .ring {
            position: absolute; top: 50%; left: 50%; width: 34px; height: 34px;
            border: 2px solid #ffaa44; border-radius: 50%; transform: translate(-50%, -50%);
            animation: pulse 0.8s infinite;
        }
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        /* Panels */
        #info-panel {
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7);
            color: #ffdd99; padding: 8px 16px; border-radius: 24px; font-size: 11px;
            border-left: 3px solid #ffaa44; pointer-events: none;
        }
        #score-panel {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8);
            color: #ffaa44; padding: 8px 24px; border-radius: 40px; font-size: 28px;
            font-family: monospace; font-weight: bold;
        }

        /* Joystick & Zones */
        #left-zone {
            position: absolute; bottom: 0; left: 0; width: 220px; height: 220px;
            pointer-events: auto; z-index: 60;
        }
        .joystick-base {
            position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px;
            background: rgba(0,0,0,0.5); border-radius: 50%; border: 2px solid #ffaa55;
        }
        .joystick-thumb {
            position: absolute; width: 50px; height: 50px; top: 50%; left: 50%;
            background: radial-gradient(circle, #ffcc77, #ffaa33); border-radius: 50%;
            transform: translate(-50%, -50%); box-shadow: 0 4px 10px black;
        }

        /* Slider Area */
        #slider-area {
            position: absolute; bottom: 100px; left: 190px; width: 50px; height: 180px;
            background: rgba(0,0,0,0.7); border-radius: 25px; border: 2px solid #ffaa55;
            pointer-events: auto; z-index: 70; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end; padding-bottom: 5px;
        }
        #slider-thumb {
            width: 40px; height: 40px; background: #ffaa55; border-radius: 50%;
            box-shadow: 0 2px 8px black; transition: margin-bottom 0.05s linear;
        }
        #distance-value {
            position: absolute; bottom: -35px; width: 80px; text-align: center;
            color: #ffaa55; font-weight: bold; font-size: 12px;
        }

        /* Buttons */
        #action-buttons {
            position: absolute; bottom: 40px; right: 40px; display: flex; gap: 20px;
            pointer-events: auto; z-index: 70;
        }
        .action-btn {
            width: 75px; height: 75px; border-radius: 50%; background: rgba(0,0,0,0.8);
            border: 2px solid #ffaa55; color: white; font-size: 20px; font-weight: bold;
        }
        .action-btn:active { transform: scale(0.9); background: #ffaa55; }

        #loading-screen {
            position: fixed; inset: 0; background: #051a10; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #ffaa55; font-size: 20px; transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        🎮 جاري تحميل الواجهة الاحترافية...
        <div id="load-progress" style="width:200px; height:4px; background:#222; margin-top:10px; border-radius:2px;">
            <div id="load-bar" style="width:0%; height:100%; background:#ffaa55;"></div>
        </div>
    </div>

    <div id="ui-overlay">
        <div id="crosshair"><div class="ring"></div></div>
        <div id="info-panel">وضع التجربة | الجويستيك (يسار) | الكاميرا (يمين)</div>
        <div id="score-panel">💥 <span id="score">0</span></div>
        
        <div id="left-zone">
            <div class="joystick-base" id="joy-base"></div>
            <div class="joystick-thumb" id="joy-thumb"></div>
        </div>
        
        <div id="slider-area">
            <div id="slider-thumb"></div>
            <div id="distance-value">📏 <span id="dist-val">12.5</span> m</div>
        </div>
        
        <div id="action-buttons">
            <button class="action-btn" id="btn-jump">JUMP</button>
            <button class="action-btn" id="btn-throw">BOMB</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        (function() {
            // --- Engine Setup ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a1f15);
            scene.fog = new THREE.FogExp2(0x0a1f15, 0.005);

            const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 500);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffaa55, 1.2);
            sun.position.set(20, 40, 20);
            sun.castShadow = true;
            scene.add(sun);

            // Ground
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(500, 500),
                new THREE.MeshStandardMaterial({ color: 0x1a3322 })
            );
            ground.rotation.x = -Math.PI/2;
            ground.receiveShadow = true;
            scene.add(ground);
            scene.add(new THREE.GridHelper(500, 50, 0x224433, 0x112211));

            // --- Player ---
            const playerGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({color: 0x4aae77}));
            body.position.y = 1; body.castShadow = true;
            playerGroup.add(body);
            scene.add(playerGroup);

            // Predictor Ring
            const predictor = new THREE.Mesh(
                new THREE.RingGeometry(0.8, 1.2, 32),
                new THREE.MeshBasicMaterial({ color: 0xffaa44, transparent: true, opacity: 0.6, side: THREE.DoubleSide })
            );
            predictor.rotation.x = -Math.PI/2; predictor.position.y = 0.1;
            scene.add(predictor);

            // --- State ---
            let moveDir = { x: 0, z: 0 };
            let throwDist = 12.5;
            let isJumping = false, vVel = 0;
            let score = 0;
            let joystickActive = false, sliderActive = false;
            let joyCenter = { x: 0, y: 0 };
            const maxJoyRadius = 50;

            // --- Input Handlers (FIXED) ---
            const joyBase = document.getElementById('joy-base');
            const joyThumb = document.getElementById('joy-thumb');
            const sliderArea = document.getElementById('slider-area');
            const sliderThumb = document.getElementById('slider-thumb');

            function updateJoystick(x, y) {
                const dx = x - joyCenter.x;
                const dy = y - joyCenter.y;
                const dist = Math.min(Math.hypot(dx, dy), maxJoyRadius);
                const angle = Math.atan2(dy, dx);
                
                const lx = Math.cos(angle) * dist;
                const ly = Math.sin(angle) * dist;
                joyThumb.style.transform = `translate(calc(-50% + ${lx}px), calc(-50% + ${ly}px))`;
                
                // الإصلاح: اليمين موجب واليسار سالب (بدون عكس)
                moveDir.x = lx / maxJoyRadius;
                moveDir.z = -ly / maxJoyRadius; 
            }

            function updateSlider(y) {
                const rect = sliderArea.getBoundingClientRect();
                const relY = Math.min(rect.bottom, Math.max(rect.top, y));
                const t = (rect.bottom - relY) / rect.height;
                throwDist = 5 + (t * 15);
                document.getElementById('dist-val').innerText = throwDist.toFixed(1);
                sliderThumb.style.marginBottom = `${t * (rect.height - 45)}px`;
            }

            // Multi-Touch Support
            window.addEventListener('touchstart', (e) => {
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth / 2) {
                        joystickActive = true;
                        const rect = joyBase.getBoundingClientRect();
                        joyCenter = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
                        updateJoystick(t.clientX, t.clientY);
                    }
                    if(t.target.closest('#slider-area')) {
                        sliderActive = true;
                        updateSlider(t.clientY);
                    }
                }
            }, {passive: false});

            window.addEventListener('touchmove', (e) => {
                for(let t of e.changedTouches) {
                    if(joystickActive && t.clientX < window.innerWidth / 2) updateJoystick(t.clientX, t.clientY);
                    if(sliderActive) updateSlider(t.clientY);
                }
            }, {passive: false});

            window.addEventListener('touchend', (e) => {
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth / 2) {
                        joystickActive = false;
                        moveDir = { x: 0, z: 0 };
                        joyThumb.style.transform = 'translate(-50%, -50%)';
                    }
                    sliderActive = false;
                }
            });

            // Buttons
            document.getElementById('btn-jump').onclick = () => { if(!isJumping) { vVel = 0.5; isJumping = true; } };
            document.getElementById('btn-throw').onclick = () => throwBomb();

            // --- Game Logic ---
            function throwBomb() {
                const bomb = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({color: 0x222222, emissive: 0xff0000}));
                bomb.position.copy(playerGroup.position).add(new THREE.Vector3(0, 1.5, 0));
                scene.add(bomb);

                const angle = 0.75, g = 0.025;
                const speed = Math.sqrt((throwDist * g) / Math.sin(2 * angle));
                const forward = new THREE.Vector3(Math.sin(playerGroup.rotation.y), 0, Math.cos(playerGroup.rotation.y));
                
                let t = 0;
                const startPos = bomb.position.clone();
                const interval = setInterval(() => {
                    t += 0.04;
                    bomb.position.x = startPos.x + forward.x * (speed * Math.cos(angle) * t * 25);
                    bomb.position.z = startPos.z + forward.z * (speed * Math.cos(angle) * t * 25);
                    bomb.position.y = startPos.y + (speed * Math.sin(angle) * t * 25) - (0.5 * 9.8 * t * t);
                    
                    if(bomb.position.y <= 0.2) {
                        clearInterval(interval);
                        createExplosion(bomb.position);
                        scene.remove(bomb);
                    }
                }, 20);
            }

            function createExplosion(pos) {
                const light = new THREE.PointLight(0xffaa44, 5, 10);
                light.position.copy(pos); scene.add(light);
                setTimeout(() => scene.remove(light), 150);
            }

            function update() {
                // Movement
                if(Math.abs(moveDir.x) > 0.1 || Math.abs(moveDir.z) > 0.1) {
                    playerGroup.position.x += moveDir.x * 0.2;
                    playerGroup.position.z -= moveDir.z * 0.2;
                    playerGroup.rotation.y = Math.atan2(moveDir.x, moveDir.z);
                }

                // Jump
                if(isJumping) {
                    playerGroup.position.y += vVel;
                    vVel -= 0.025;
                    if(playerGroup.position.y <= 0) { playerGroup.position.y = 0; isJumping = false; }
                }

                // Predictor
                const fwd = new THREE.Vector3(Math.sin(playerGroup.rotation.y), 0, Math.cos(playerGroup.rotation.y));
                predictor.position.set(playerGroup.position.x + fwd.x * throwDist, 0.1, playerGroup.position.z + fwd.z * throwDist);

                // Camera follow
                const offset = new THREE.Vector3(0, 10, 15);
                camera.position.lerp(playerGroup.position.clone().add(offset), 0.1);
                camera.lookAt(playerGroup.position);
            }

            function animate() {
                requestAnimationFrame(animate);
                update();
                renderer.render(scene, camera);
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-screen').remove(), 500);
            animate();
        })();
    </script>
</body>
</html>
