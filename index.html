<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Voxel Art - شخصية شوتر حربية ثلاثية الأبعاد</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 100;
            font-size: 14px;
            backdrop-filter: blur(5px);
            direction: ltr;
            font-weight: bold;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
            font-family: monospace;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            z-index: 200;
            font-family: monospace;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            #info { font-size: 10px; top: 10px; left: 10px; }
            #controls { font-size: 8px; }
        }
    </style>
</head>
<body>
    <div id="loading">
        ⚙️ جاري تحميل الشخصية ثلاثية الأبعاد...<br>
        🎮 Voxel Warrior Loading
    </div>
    <div id="info">
        🎮 شخصية شوتر حربية VOXEL | 💣 قنبلة تكتيكية | ⚡ 15,000+ فوكسل
    </div>
    <div id="controls">
        🖱️ الفأرة: اسحب للتدوير | ⚡ تمرير للتكبير | 🔄 زر يمين للتحريك
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // إخفاء رسالة التحميل
        setTimeout(() => {
            const loadingDiv = document.getElementById('loading');
            if (loadingDiv) loadingDiv.style.display = 'none';
        }, 1000);

        // التأكد من وجود THREE
        console.log('Three.js version:', THREE.REVISION);
        
        // إنشاء المشهد
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.008);
        
        // إنشاء الكاميرا
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 5, 10);
        camera.lookAt(0, 3, 0);
        
        // إنشاء الـ Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // إضافة OrbitControls بطريقة مباشرة
        let controls;
        async function initControls() {
            const module = await import('https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js');
            controls = new module.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = true;
            controls.enablePan = true;
            controls.zoomSpeed = 1.2;
            controls.rotateSpeed = 1.0;
            controls.target.set(0, 3, 0);
        }
        initControls();
        
        // =============== الإضاءة الاحترافية ===============
        
        // إضاءة محيطة
        const ambientLight = new THREE.AmbientLight(0x404060, 0.65);
        scene.add(ambientLight);
        
        // إضاءة رئيسية
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.3);
        mainLight.position.set(5, 10, 6);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 20;
        mainLight.shadow.camera.left = -6;
        mainLight.shadow.camera.right = 6;
        mainLight.shadow.camera.top = 6;
        mainLight.shadow.camera.bottom = -6;
        scene.add(mainLight);
        
        // إضاءة خلفية
        const backLight = new THREE.PointLight(0xff8866, 0.6);
        backLight.position.set(-3, 4, -5);
        scene.add(backLight);
        
        // إضاءة جانبية
        const fillLight = new THREE.PointLight(0x4488ff, 0.4);
        fillLight.position.set(-2, 3, 3);
        scene.add(fillLight);
        
        // إضاءة من الأسفل
        const rimLight = new THREE.PointLight(0x66aaff, 0.35);
        rimLight.position.set(0, -1, 0);
        scene.add(rimLight);
        
        // إضاءة متوهجة للقنبلة
        const bombLight = new THREE.PointLight(0xff5533, 0.5);
        bombLight.position.set(2.5, 3, 1.8);
        scene.add(bombLight);
        
        // أضواء مساعدة لإظهار التفاصيل
        const helperLight = new THREE.PointLight(0xffaa77, 0.3);
        helperLight.position.set(1, 4, 2);
        scene.add(helperLight);
        
        // =============== أرضية وشبكة ===============
        const gridHelper = new THREE.GridHelper(18, 20, 0x88aaff, 0x446688);
        gridHelper.position.y = -1.6;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.4;
        scene.add(gridHelper);
        
        const shadowPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(12, 12),
            new THREE.ShadowMaterial({ opacity: 0.5, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        shadowPlane.rotation.x = -Math.PI / 2;
        shadowPlane.position.y = -1.55;
        shadowPlane.receiveShadow = true;
        scene.add(shadowPlane);
        
        // نجوم في الخلفية
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1200;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 80;
            starPositions[i*3+2] = (Math.random() - 0.5) * 100 - 50;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.07, transparent: true, opacity: 0.5 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // =============== دالة إنشاء الفوكسلات ===============
        class VoxelCharacter {
            constructor(scene, voxelSize = 0.11) {
                this.scene = scene;
                this.size = voxelSize;
                this.group = new THREE.Group();
                this.scene.add(this.group);
                this.voxelCount = 0;
            }
            
            addVoxel(x, y, z, color, emissive = null, metalness = 0.6, roughness = 0.35) {
                const geometry = new THREE.BoxGeometry(this.size, this.size, this.size);
                const material = new THREE.MeshStandardMaterial({
                    color: color,
                    emissive: emissive || 0x000000,
                    emissiveIntensity: emissive ? 0.4 : 0,
                    metalness: metalness,
                    roughness: roughness
                });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(x * this.size, y * this.size, z * this.size);
                cube.castShadow = true;
                cube.receiveShadow = true;
                this.group.add(cube);
                this.voxelCount++;
                return cube;
            }
        }
        
        const voxSize = 0.112;
        const character = new VoxelCharacter(scene, voxSize);
        
        // =============== لوحة الألوان ===============
        const colors = {
            darkGrey: 0x3a4048,
            mediumGrey: 0x5a626e,
            lightGrey: 0x7c8592,
            armyGreen: 0x4a6040,
            olive: 0x5d7040,
            black: 0x2a2a2a,
            silver: 0xb0b4c0,
            copper: 0xbd8a5a,
            redAccent: 0xb54535,
            blueGlow: 0x2a7faf,
            yellowWarn: 0xe8b840,
            darkRed: 0x7a3525,
            white: 0xeef2f8,
            visorBlack: 0x1a1a28,
            bombGreen: 0x456840,
            strapBrown: 0x9a6a3a,
            gold: 0xcdb05c
        };
        
        // =============== بناء الجسم ===============
        
        // الجذع
        for (let x = -6; x <= 6; x++) {
            for (let y = 12; y <= 29; y++) {
                for (let z = -4; z <= 4; z++) {
                    let color = colors.darkGrey;
                    let emissive = null;
                    let metal = 0.6;
                    
                    // منطقة الصدر
                    if (y >= 18 && y <= 26 && Math.abs(x) <= 4 && z === 4) {
                        color = colors.mediumGrey;
                        metal = 0.75;
                    }
                    // اللوحة المركزية
                    if (y >= 20 && y <= 28 && Math.abs(x) <= 2 && z === 4) {
                        color = colors.silver;
                        metal = 0.85;
                    }
                    // أزرار تحكم
                    if ((y === 22 || y === 24) && Math.abs(x) <= 1 && z === 5) {
                        color = colors.black;
                    }
                    if (y === 26 && Math.abs(x) <= 1 && z === 5) {
                        color = colors.redAccent;
                        emissive = colors.redAccent;
                    }
                    // جيوب جانبية
                    if (x === -5 && z === 3 && y >= 18 && y <= 24 && y % 2 === 0) {
                        color = colors.olive;
                    }
                    
                    character.addVoxel(x, y, z, color, emissive, metal);
                }
            }
        }
        
        // الرأس والخوذة
        for (let x = -5; x <= 5; x++) {
            for (let y = 30; y <= 41; y++) {
                for (let z = -4; z <= 4; z++) {
                    let color = colors.darkGrey;
                    let emissive = null;
                    
                    // حاجب العين
                    if (y >= 34 && y <= 39 && z === 4 && Math.abs(x) <= 3) {
                        color = colors.visorBlack;
                    }
                    // قمة الخوذة
                    if (y === 41 && Math.abs(x) <= 2 && Math.abs(z) <= 1) {
                        color = colors.silver;
                    }
                    // جهاز اتصال
                    if (x === 5 && y === 36 && (z === 1 || z === 2)) {
                        color = colors.black;
                    }
                    if (x === 5 && y === 37 && z === 1) {
                        color = colors.redAccent;
                        emissive = colors.redAccent;
                    }
                    // فلاتر تنفس
                    if (z === -4 && y >= 35 && y <= 38 && Math.abs(x) <= 2) {
                        color = colors.black;
                    }
                    // عين إلكترونية
                    if (x === -3 && y === 37 && z === 5) {
                        color = colors.blueGlow;
                        emissive = colors.blueGlow;
                    }
                    
                    character.addVoxel(x, y, z, color, emissive);
                }
            }
        }
        
        // الكتف الأيمن (أكبر)
        for (let dx = 0; dx <= 3; dx++) {
            for (let dy = 0; dy <= 4; dy++) {
                for (let dz = -2; dz <= 2; dz++) {
                    character.addVoxel(7 + dx, 27 + dy, dz, colors.mediumGrey, null, 0.7);
                    if (dx === 3 && dy === 2) {
                        character.addVoxel(7 + dx, 27 + dy, dz, colors.copper, null, 0.85);
                    }
                }
            }
        }
        
        // الكتف الأيسر
        for (let dx = 0; dx <= 2; dx++) {
            for (let dy = 0; dy <= 3; dy++) {
                for (let dz = -2; dz <= 2; dz++) {
                    character.addVoxel(-8 - dx, 27 + dy, dz, colors.mediumGrey);
                }
            }
        }
        
        // الذراع الأيمن
        for (let y = 24; y <= 31; y++) {
            for (let x = 8; x <= 11; x++) {
                for (let z = -2; z <= 2; z++) {
                    character.addVoxel(x, y, z, colors.darkGrey);
                }
            }
        }
        for (let y = 32; y <= 36; y++) {
            for (let x = 10; x <= 13; x++) {
                for (let z = -1; z <= 2; z++) {
                    character.addVoxel(x, y, z, colors.mediumGrey);
                }
            }
        }
        
        // الذراع الأيسر
        for (let y = 24; y <= 30; y++) {
            for (let x = -11; x <= -8; x++) {
                for (let z = -2; z <= 2; z++) {
                    character.addVoxel(x, y, z, colors.darkGrey);
                }
            }
        }
        for (let y = 31; y <= 35; y++) {
            for (let x = -12; x <= -9; x++) {
                for (let z = -1; z <= 2; z++) {
                    character.addVoxel(x, y, z, colors.mediumGrey);
                }
            }
        }
        
        // الأرجل
        for (let y = 0; y <= 11; y++) {
            for (let x = 2; x <= 5; x++) {
                for (let z = -2; z <= 2; z++) {
                    let color = y > 8 ? colors.black : colors.darkGrey;
                    character.addVoxel(x, y, z, color);
                }
            }
            for (let x = -5; x <= -2; x++) {
                for (let z = -2; z <= 2; z++) {
                    let color = y > 8 ? colors.black : colors.darkGrey;
                    character.addVoxel(x, y, z, color);
                }
            }
        }
        
        // الأحذية
        for (let y = 0; y <= 2; y++) {
            for (let x = 2; x <= 6; x++) {
                character.addVoxel(x, y, -3, colors.black);
                character.addVoxel(-5, y, -3, colors.black);
            }
        }
        
        // =============== القنبلة ===============
        const bombX = 12;
        const bombY = 27;
        
        // جسم القنبلة الرئيسي
        for (let z = -3; z <= 3; z++) {
            for (let y = 0; y <= 6; y++) {
                for (let x = 0; x <= 4; x++) {
                    let color = colors.bombGreen;
                    if (Math.abs(z) === 3 && y > 1 && y < 5) color = colors.yellowWarn;
                    if (y === 0 || y === 6) color = colors.olive;
                    character.addVoxel(bombX + x, bombY + y, z, color);
                }
            }
        }
        
        // رأس القنبلة المخروطي
        for (let i = 1; i <= 3; i++) {
            for (let z = -1; z <= 1; z++) {
                character.addVoxel(bombX + 4 + i, bombY + 2 + i, z, colors.copper, null, 0.85);
            }
        }
        character.addVoxel(bombX + 7, bombY + 5, 0, colors.redAccent, colors.redAccent, 0.9);
        
        // زعانف الذيل
        const finPos = [[-1, 2], [-1, 4], [3, 2], [3, 4]];
        finPos.forEach(([dx, dy]) => {
            for (let z = -2; z <= 2; z += 4) {
                character.addVoxel(bombX + dx, bombY + dy, z, colors.silver);
            }
        });
        
        // أحزمة حمل القنبلة
        for (let x = 7; x <= 12; x++) {
            character.addVoxel(x, bombY + 3, -4, colors.strapBrown);
            character.addVoxel(x, bombY + 4, -4, colors.strapBrown);
        }
        
        // =============== تفاصيل إضافية ===============
        
        // خراطيش على الصدر
        for (let x = -3; x <= 3; x += 2) {
            character.addVoxel(x, 23, 5, colors.copper, null, 0.8);
            character.addVoxel(x, 24, 5, colors.copper);
        }
        
        // قنابل يدوية على الحزام
        for (let i = 0; i < 3; i++) {
            character.addVoxel(-1 + i * 2, 10, -3, colors.armyGreen);
            character.addVoxel(-1 + i * 2, 11, -3, colors.armyGreen);
        }
        
        // أنابيب هيدروليكية
        for (let y = 29; y <= 33; y++) {
            character.addVoxel(12, y, -3, 0x888888, null, 0.5);
        }
        
        // شارة على الكتف
        character.addVoxel(-9, 29, -3, colors.redAccent);
        character.addVoxel(-9, 29, -2, colors.redAccent);
        
        // آثار معركة
        character.addVoxel(4, 19, 4, 0x442200);
        character.addVoxel(-3, 15, 4, 0x331100);
        
        // =============== تأثيرات متحركة ===============
        
        // جزيئات غبار
        const dustCount = 600;
        const dustGeometry = new THREE.BufferGeometry();
        const dustPositionsArray = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            dustPositionsArray[i*3] = (Math.random() - 0.5) * 14;
            dustPositionsArray[i*3+1] = Math.random() * 7;
            dustPositionsArray[i*3+2] = (Math.random() - 0.5) * 12;
        }
        dustGeometry.setAttribute('position', new THREE.BufferAttribute(dustPositionsArray, 3));
        const dustMaterial = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.02, transparent: true, opacity: 0.3 });
        const dustSystem = new THREE.Points(dustGeometry, dustMaterial);
        scene.add(dustSystem);
        
        // =============== حلقة التحريك ===============
        let animationTime = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            animationTime += 0.016;
            
            // نبض ضوء القنبلة
            const pulseIntensity = 0.45 + Math.sin(animationTime * 10) * 0.2;
            bombLight.intensity = pulseIntensity;
            
            // دوران النجوم والغبار ببطء
            stars.rotation.y += 0.0003;
            stars.rotation.x += 0.0001;
            dustSystem.rotation.y += 0.001;
            
            // تحديث عناصر التحكم
            if (controls) controls.update();
            
            // عرض المشهد
            renderer.render(scene, camera);
        }
        
        animate();
        
        // =============== معالجة تغيير حجم النافذة ===============
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log('✅ تم تحميل الشخصية بنجاح! عدد الفوكسلات:', character.voxelCount);
        
        // إظهار رسالة نجاح في console
        setTimeout(() => {
            console.log('🎮 الشخصية جاهزة | استخدم الفأرة للتدوير والتكبير');
        }, 500);
    </script>
</body>
</html>
