<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Samurai - تجربة قتال الساموراي</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            color: white;
            z-index: 100;
            pointer-events: none;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .stat-panel {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 12px 20px;
            border-radius: 15px;
            border-left: 4px solid #00ffff;
            font-size: 1.1rem;
        }
        .health-bar-container {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            width: 200px;
            height: 20px;
            margin-top: 8px;
        }
        .health-bar {
            background: linear-gradient(90deg, #ff3366, #ff6680);
            width: 100%;
            height: 100%;
            border-radius: 10px;
            transition: width 0.2s;
        }
        #minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 180px;
            height: 180px;
            background: rgba(0,0,0,0.85);
            border: 2px solid #00ffff;
            border-radius: 12px;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        #minimapCanvas {
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }
        #kill-feed {
            position: absolute;
            top: 80px;
            right: 20px;
            width: 260px;
            background: rgba(0,0,0,0.75);
            border-radius: 10px;
            padding: 10px;
            font-size: 13px;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
        }
        .kill-entry {
            color: #ffaa44;
            margin: 6px 0;
            animation: fadeOut 3s forwards;
            border-left: 2px solid #ffaa44;
            padding-left: 8px;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(20px); display: none; }
        }
        #controls-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.65);
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 12px;
            color: #ccc;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
            backdrop-filter: blur(4px);
        }
        .game-over-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0a0a2aee;
            border: 2px solid cyan;
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            z-index: 200;
            display: none;
            min-width: 350px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(0,255,255,0.3);
        }
        button {
            pointer-events: auto;
            background: linear-gradient(90deg, #00aaff, #0066cc);
            border: none;
            padding: 10px 24px;
            margin: 10px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            transition: 0.2s;
        }
        button:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px cyan;
        }
        .damage-number {
            position: absolute;
            color: #ff6666;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 0 0 5px red;
            pointer-events: none;
            z-index: 150;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); }
        }
        @keyframes screenFlash {
            0% { background-color: rgba(255,0,0,0); }
            50% { background-color: rgba(255,0,0,0.3); }
            100% { background-color: rgba(255,0,0,0); }
        }
        .flash {
            animation: screenFlash 0.2s;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat-panel">
            ⚔️ <span id="kills">0</span> قتلى
            <div class="health-bar-container">
                <div class="health-bar" id="healthBar" style="width: 100%"></div>
            </div>
            ❤️ <span id="healthValue">100</span>%
        </div>
        <div class="stat-panel">
            💰 المكافأة: <span id="currentReward">0</span>
        </div>
    </div>
    <div id="minimap">
        <canvas id="minimapCanvas" width="180" height="180"></canvas>
    </div>
    <div id="kill-feed"></div>
    <div id="controls-info">
        🎮 WASD: حركة | 🖱️ زر الفأرة الأيسر: ضربة خفيفة (20 دمج)<br>
        🖱️ زر الفأرة الأيمن: ضربة ثقيلة (40 دمج) | ⬆️ Shift: ركض | ␣ Space: قفز
    </div>
    <div id="gameOverPanel" class="game-over-panel">
        <h2>⚔️ نهاية المعركة ⚔️</h2>
        <div id="finalResults"></div>
        <button onclick="location.reload()">🔄 إعادة اللعب</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ------------------- إعدادات التجربة -------------------
        let scene, camera, renderer;
        let playerModel;
        let enemies = [];  // قائمة الأعداء (ساموراي خصوم)
        let keys = { w: false, s: false, a: false, d: false, shift: false, space: false };
        let mouseX = 0, mouseY = 0;
        let health = 100;
        let kills = 0;
        let attackCooldown = false;
        let isBlocking = false;
        let playerPos = { x: 0, z: 0 };
        let velocity = { x: 0, z: 0 };
        let verticalVelocity = 0;
        let canJump = true;
        let lastTime = 0;
        
        // إعدادات القتال
        const MOVE_SPEED = 5.5;
        const RUN_SPEED = 9;
        const JUMP_POWER = 7;
        const GRAVITY = 18;
        const ATTACK_COOLDOWN_MS = 500;
        const LIGHT_DAMAGE = 20;
        const HEAVY_DAMAGE = 40;
        const ATTACK_RANGE = 2.2;
        
        // متغيرات الكاميرا
        let cameraAngleYaw = 0;
        let cameraDistance = 7;
        let cameraHeight = 4.5;
        
        // ------------------- إنشاء العالم -------------------
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050b1a);
            scene.fog = new THREE.FogExp2(0x050b1a, 0.0006);
            
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // إضاءة
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const mainLight = new THREE.DirectionalLight(0xffffff, 1);
            mainLight.position.set(10, 20, 5);
            mainLight.castShadow = true;
            scene.add(mainLight);
            const fillLight = new THREE.PointLight(0x3366ff, 0.4);
            fillLight.position.set(0, 12, 0);
            scene.add(fillLight);
            
            // أضواء نيون متحركة
            for (let i = 0; i < 30; i++) {
                const neon = new THREE.PointLight(0xff44aa, 0.5, 40);
                neon.position.set((Math.random() - 0.5) * 400, Math.random() * 15, (Math.random() - 0.5) * 400);
                scene.add(neon);
            }
            
            createCity();
            createPlayer();
            createEnemies(5);  // 5 أعداء ساموراي
            
            setupControls();
            setupMouseEvents();
            
            animate();
        }
        
        function createCity() {
            // أرضية شبكة طرق
            const grid = new THREE.GridHelper(700, 40, 0x33aaff, 0x2266aa);
            grid.position.y = -0.4;
            scene.add(grid);
            
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x141428, roughness: 0.8 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(700, 700), groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // مبانٍ مهجورة
            const colors = [0x2a3a4a, 0x3a4a5a, 0x1a2a3a, 0x4a5a6a];
            for (let i = 0; i < 120; i++) {
                const w = Math.random() * 12 + 4;
                const h = Math.random() * 10 + 2;
                const d = Math.random() * 12 + 4;
                const mat = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)], roughness: 0.6 });
                const building = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                const x = (Math.random() - 0.5) * 600;
                const z = (Math.random() - 0.5) * 600;
                building.position.set(x, h / 2 - 0.5, z);
                building.castShadow = true;
                scene.add(building);
                
                // نوافذ مضيئة
                if (Math.random() > 0.75) {
                    const winMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff2200 });
                    const windowLight = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.8, 0.1), winMat);
                    windowLight.position.set(x + (Math.random() - 0.5) * w * 0.6, h * (Math.random() * 0.5 + 0.3), z + d / 2 + 0.1);
                    scene.add(windowLight);
                }
            }
        }
        
        function createPlayer() {
            const group = new THREE.Group();
            
            // درع أحمر
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, metalness: 0.7, roughness: 0.3 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.85, 1.25, 0.65), bodyMat);
            body.position.y = 0.65;
            body.castShadow = true;
            group.add(body);
            
            // خوذة
            const headMat = new THREE.MeshStandardMaterial({ color: 0xdd4444, metalness: 0.8 });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.48), headMat);
            head.position.y = 1.25;
            group.add(head);
            
            // قمة الخوذة
            const crest = new THREE.Mesh(new THREE.ConeGeometry(0.32, 0.55, 8), new THREE.MeshStandardMaterial({ color: 0xffaa66, metalness: 0.9 }));
            crest.position.y = 1.6;
            group.add(crest);
            
            // سيف نيون (أزرق)
            const swordGroup = new THREE.Group();
            const handle = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.45, 0.16), new THREE.MeshStandardMaterial({ color: 0xaa8866 }));
            handle.position.y = -0.2;
            swordGroup.add(handle);
            const bladeMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00aaff, emissiveIntensity: 0.9 });
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.3, 0.06), bladeMat);
            blade.position.y = 0.55;
            swordGroup.add(blade);
            const glow = new THREE.Mesh(new THREE.BoxGeometry(0.22, 1.5, 0.12), new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.3 }));
            glow.position.y = 0.55;
            swordGroup.add(glow);
            
            swordGroup.position.set(0.7, 0.35, 0.4);
            swordGroup.rotation.z = -0.3;
            group.add(swordGroup);
            
            group.position.set(0, 0, 0);
            scene.add(group);
            playerModel = group;
            playerModel.userData = { swordGroup, attackTimer: 0 };
            playerPos = { x: 0, z: 0 };
        }
        
        function createEnemies(count) {
            const colors = [0xaa44ff, 0xff44aa, 0x44ffaa, 0xffaa44, 0x44aaff];
            for (let i = 0; i < count; i++) {
                const group = new THREE.Group();
                const bodyMat = new THREE.MeshStandardMaterial({ color: colors[i % colors.length], metalness: 0.6 });
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.85, 1.25, 0.65), bodyMat);
                body.position.y = 0.65;
                group.add(body);
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.48), bodyMat);
                head.position.y = 1.25;
                group.add(head);
                
                // سيف نيون بلون مختلف
                const swordGroup = new THREE.Group();
                const bladeMat = new THREE.MeshStandardMaterial({ color: colors[i % colors.length], emissive: colors[i % colors.length], emissiveIntensity: 0.6 });
                const blade = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.2, 0.06), bladeMat);
                blade.position.y = 0.5;
                swordGroup.add(blade);
                swordGroup.position.set(0.7, 0.35, 0.4);
                group.add(swordGroup);
                
                // موقع عشوائي
                const angle = Math.random() * Math.PI * 2;
                const radius = 80 + Math.random() * 150;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                group.position.set(x, 0, z);
                scene.add(group);
                
                enemies.push({
                    model: group,
                    swordGroup,
                    health: 100,
                    pos: { x, z },
                    name: `عدو ${i+1}`,
                    color: colors[i % colors.length],
                    attackCooldown: 0,
                    lastSeenTime: 0
                });
            }
        }
        
        function updateEnemiesAI(deltaTime) {
            for (let enemy of enemies) {
                if (enemy.health <= 0) continue;
                
                // تحرك العدو نحو اللاعب
                const dx = playerPos.x - enemy.pos.x;
                const dz = playerPos.z - enemy.pos.z;
                const dist = Math.hypot(dx, dz);
                if (dist > 1.2) {
                    const move = Math.min(3.5 * deltaTime, 0.2);
                    const dirX = dx / dist;
                    const dirZ = dz / dist;
                    enemy.pos.x += dirX * move;
                    enemy.pos.z += dirZ * move;
                    // حدود
                    enemy.pos.x = Math.min(340, Math.max(-340, enemy.pos.x));
                    enemy.pos.z = Math.min(340, Math.max(-340, enemy.pos.z));
                    enemy.model.position.set(enemy.pos.x, 0, enemy.pos.z);
                    
                    // تدوير العدو باتجاه اللاعب
                    const angleToPlayer = Math.atan2(dx, dz);
                    enemy.model.rotation.y = angleToPlayer;
                }
                
                // هجوم العدو إذا كان قريباً
                if (enemy.attackCooldown <= 0 && dist < ATTACK_RANGE && health > 0) {
                    // ضربة خفيفة من العدو
                    const damage = LIGHT_DAMAGE;
                    health = Math.max(0, health - damage);
                    updateUI();
                    addDamageNumber(enemy.pos.x, enemy.pos.z, damage);
                    addKillFeed(`🗡️ ${enemy.name} ضربك بـ ${damage} ضرر!`);
                    screenFlash();
                    enemy.attackCooldown = 1.2;  // ثانية
                    
                    // اهتزاز الكاميرا
                    if (camera) {
                        camera.position.x += (Math.random() - 0.5) * 0.2;
                        camera.position.z += (Math.random() - 0.5) * 0.2;
                    }
                }
                if (enemy.attackCooldown > 0) enemy.attackCooldown -= deltaTime;
                
                // إذا مات العدو
                if (enemy.health <= 0) {
                    scene.remove(enemy.model);
                    // حذفه من القائمة بعد قليل
                }
            }
            // إزالة الأعداء الموتى
            enemies = enemies.filter(e => e.health > 0);
        }
        
        function attackEnemies(damage) {
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                const dx = e.pos.x - playerPos.x;
                const dz = e.pos.z - playerPos.z;
                const dist = Math.hypot(dx, dz);
                if (dist < ATTACK_RANGE && e.health > 0) {
                    e.health = Math.max(0, e.health - damage);
                    addDamageNumber(e.pos.x, e.pos.z, damage);
                    if (e.health <= 0) {
                        kills++;
                        updateUI();
                        addKillFeed(`⚔️ قتلت ${e.name}! ⚔️`);
                        // تأثير انفجار نيون
                        const explosionColor = e.color;
                        const particles = new THREE.PointLight(explosionColor, 1, 15);
                        particles.position.set(e.pos.x, 1.5, e.pos.z);
                        scene.add(particles);
                        setTimeout(() => scene.remove(particles), 300);
                    } else {
                        addKillFeed(`💥 ضربت ${e.name} بـ ${damage} ضرر`);
                    }
                    break; // ضربة واحدة تصيب عدو واحد فقط
                }
            }
        }
        
        function performAttack(damage, type) {
            if (attackCooldown) return;
            attackCooldown = true;
            
            // حركة السيف
            if (playerModel && playerModel.userData.swordGroup) {
                playerModel.userData.swordGroup.rotation.x = -Math.PI / 1.8;
                setTimeout(() => {
                    if (playerModel && playerModel.userData.swordGroup)
                        playerModel.userData.swordGroup.rotation.x = 0;
                }, 180);
            }
            
            attackEnemies(damage);
            
            setTimeout(() => { attackCooldown = false; }, ATTACK_COOLDOWN_MS);
        }
        
        function updateMovement(deltaTime) {
            let speed = keys.shift ? RUN_SPEED : MOVE_SPEED;
            let moveX = 0, moveZ = 0;
            if (keys.w) moveZ -= 1;
            if (keys.s) moveZ += 1;
            if (keys.a) moveX -= 1;
            if (keys.d) moveX += 1;
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
            }
            
            playerPos.x += moveX * speed * deltaTime;
            playerPos.z += moveZ * speed * deltaTime;
            playerPos.x = Math.min(340, Math.max(-340, playerPos.x));
            playerPos.z = Math.min(340, Math.max(-340, playerPos.z));
            
            // الجاذبية والقفز
            verticalVelocity -= GRAVITY * deltaTime;
            let newY = verticalVelocity * deltaTime;
            if (playerPos.y + newY <= 0) {
                playerPos.y = 0;
                verticalVelocity = 0;
                canJump = true;
            } else {
                playerPos.y += newY;
            }
            
            if (playerModel) {
                playerModel.position.set(playerPos.x, playerPos.y, playerPos.z);
                // تدوير حسب اتجاه الكاميرا
                playerModel.rotation.y = cameraAngleYaw;
            }
            
            // كاميرا خلف اللاعب
            const targetCamX = playerPos.x - Math.sin(cameraAngleYaw) * cameraDistance;
            const targetCamZ = playerPos.z - Math.cos(cameraAngleYaw) * cameraDistance;
            camera.position.x += (targetCamX - camera.position.x) * 0.1;
            camera.position.z += (targetCamZ - camera.position.z) * 0.1;
            camera.position.y += (playerPos.y + cameraHeight - camera.position.y) * 0.1;
            camera.lookAt(playerPos.x, playerPos.y + 1.2, playerPos.z);
        }
        
        function updateUI() {
            document.getElementById('kills').innerText = kills;
            const percent = Math.max(0, health);
            document.getElementById('healthBar').style.width = percent + '%';
            document.getElementById('healthValue').innerText = Math.floor(percent);
            const reward = kills * 8 + (kills >= 5 ? 20 : 0);
            document.getElementById('currentReward').innerText = reward;
            
            if (health <= 0) {
                endGame();
            }
        }
        
        function endGame() {
            const panel = document.getElementById('gameOverPanel');
            const resultsDiv = document.getElementById('finalResults');
            const reward = kills * 8 + (kills >= 5 ? 20 : 0);
            resultsDiv.innerHTML = `
                <p>⚔️ القتلى: ${kills}</p>
                <p>💰 المكافأة: ${reward}</p>
                <p>🏆 ${kills > 3 ? 'انتصار مذهل!' : 'حاول مرة أخرى'}</p>
            `;
            panel.style.display = 'block';
            // إيقاف الحركة
            keys = { w: false, s: false, a: false, d: false, shift: false, space: false };
        }
        
        function addKillFeed(msg) {
            const feed = document.getElementById('kill-feed');
            const entry = document.createElement('div');
            entry.className = 'kill-entry';
            entry.innerText = msg;
            feed.appendChild(entry);
            setTimeout(() => entry.remove(), 3200);
        }
        
        function addDamageNumber(x, z, dmg) {
            const div = document.createElement('div');
            div.className = 'damage-number';
            div.innerText = `-${dmg}`;
            const screenX = (x / 700) * window.innerWidth + window.innerWidth/2;
            const screenY = (z / 700) * window.innerHeight + window.innerHeight/2 - 100;
            div.style.left = screenX + 'px';
            div.style.top = screenY + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 800);
        }
        
        function screenFlash() {
            const flashDiv = document.createElement('div');
            flashDiv.style.position = 'fixed';
            flashDiv.style.top = 0;
            flashDiv.style.left = 0;
            flashDiv.style.width = '100%';
            flashDiv.style.height = '100%';
            flashDiv.style.backgroundColor = 'rgba(255,0,0,0.3)';
            flashDiv.style.pointerEvents = 'none';
            flashDiv.style.zIndex = 1000;
            document.body.appendChild(flashDiv);
            setTimeout(() => flashDiv.remove(), 120);
        }
        
        function updateMinimap() {
            const canvas = document.getElementById('minimapCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0a0a2a';
            ctx.fillRect(0, 0, 180, 180);
            
            // شبكة
            ctx.strokeStyle = '#3366aa';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 8; i++) {
                ctx.beginPath();
                ctx.moveTo(i * 22.5, 0);
                ctx.lineTo(i * 22.5, 180);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * 22.5);
                ctx.lineTo(180, i * 22.5);
                ctx.stroke();
            }
            
            // اللاعب
            const px = ((playerPos.x + 350) / 700) * 180;
            const pz = ((playerPos.z + 350) / 700) * 180;
            ctx.fillStyle = '#00ff88';
            ctx.beginPath();
            ctx.arc(px, pz, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // الأعداء
            for (let e of enemies) {
                const ex = ((e.pos.x + 350) / 700) * 180;
                const ez = ((e.pos.z + 350) / 700) * 180;
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(ex, ez, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function setupControls() {
            window.addEventListener('keydown', (e) => {
                switch(e.key) {
                    case 'w': keys.w = true; break;
                    case 's': keys.s = true; break;
                    case 'a': keys.a = true; break;
                    case 'd': keys.d = true; break;
                    case 'Shift': keys.shift = true; break;
                    case ' ': keys.space = true; if (canJump && health>0) { verticalVelocity = JUMP_POWER; canJump = false; } break;
                }
            });
            window.addEventListener('keyup', (e) => {
                switch(e.key) {
                    case 'w': keys.w = false; break;
                    case 's': keys.s = false; break;
                    case 'a': keys.a = false; break;
                    case 'd': keys.d = false; break;
                    case 'Shift': keys.shift = false; break;
                    case ' ': keys.space = false; break;
                }
            });
        }
        
        function setupMouseEvents() {
            window.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = (e.clientY / window.innerHeight) * 2 - 1;
                cameraAngleYaw += (mouseX * 0.03);
                cameraAngleYaw = Math.atan2(Math.sin(cameraAngleYaw), Math.cos(cameraAngleYaw));
            });
            window.addEventListener('mousedown', (e) => {
                if (health <= 0) return;
                if (e.button === 0) performAttack(LIGHT_DAMAGE, 'light');
                else if (e.button === 2) performAttack(HEAVY_DAMAGE, 'heavy');
            });
            window.addEventListener('contextmenu', (e) => e.preventDefault());
        }
        
        function animate(currentTime = 0) {
            requestAnimationFrame(animate);
            const delta = Math.min(0.033, (currentTime - lastTime) / 1000);
            lastTime = currentTime;
            if (health > 0) {
                updateMovement(delta);
                updateEnemiesAI(delta);
            }
            updateMinimap();
            renderer.render(scene, camera);
        }
        
        // بدء اللعبة
        init();
    </script>
</body>
</html>
