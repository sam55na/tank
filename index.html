<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DWARF WARRIOR - شخصية قزم حربية احترافية واقعية</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: linear-gradient(135deg, rgba(0,0,0,0.85), rgba(0,0,0,0.6));
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 100;
            pointer-events: none;
            backdrop-filter: blur(8px);
            font-size: 14px;
            direction: rtl;
            font-weight: bold;
            border-right: 4px solid #ff6600;
            font-family: monospace;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        #controls-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
            font-family: monospace;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        
        .stats {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 12px 20px;
            border-radius: 12px;
            color: #ffaa66;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            backdrop-filter: blur(8px);
            border-left: 3px solid #ff6600;
            text-align: right;
            direction: rtl;
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 5px #ff6600; }
            50% { text-shadow: 0 0 20px #ff3300; }
        }
    </style>
</head>
<body>
    <div id="info">
        ⚔️ القزم الحربي الأسطوري | حامل القنبلة الملتهبة 💣 | أنيميشن تفاعلي
    </div>
    <div id="controls-panel">
        🖱️ الفأرة: تدوير | 🖱️ زر أيمن: تحريك | 🔍 تمرير: تكبير | ✨ جودة احترافية
    </div>
    <div class="stats">
        ⚡ المستوى: 99 أسطوري<br>
        🛡️ الدروع: 2,500<br>
        💥 القوة: 1,800<br>
        🔥 القنبلة: متفجرة
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- إعداد المشهد المتقدم ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020210);
        scene.fog = new THREE.FogExp2(0x020210, 0.006);
        
        // --- الكاميرا السينمائية ---
        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4.5, 3.2, 7.5);
        camera.lookAt(0, 1.2, 0);
        
        // --- العارضين ---
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        
        // CSS2D للنصوص
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // Effect Composer للتأثيرات البصرية
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.8, 0.3, 0.2);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.6;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // --- التحكم بالكاميرا الاحترافي ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.0;
        controls.rotateSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.target.set(0, 1.4, 0);
        
        // --- نظام الإضاءة السينمائي المتقدم ---
        
        // Ambient مع تدرج لوني
        const ambientLight = new THREE.AmbientLight(0x2a2a3a, 0.55);
        scene.add(ambientLight);
        
        // Directional Light الرئيسي مع ظلال ناعمة
        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.3);
        mainLight.position.set(4, 8, 3);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 20;
        mainLight.shadow.camera.left = -6;
        mainLight.shadow.camera.right = 6;
        mainLight.shadow.camera.top = 6;
        mainLight.shadow.camera.bottom = -6;
        mainLight.shadow.bias = -0.0001;
        scene.add(mainLight);
        
        // Fill Light ناعم من الخلف
        const backFill = new THREE.PointLight(0x6688aa, 0.55);
        backFill.position.set(-2, 2.5, -3.5);
        scene.add(backFill);
        
        // Rim Light للهالة
        const rimLight = new THREE.PointLight(0xffaa66, 0.85);
        rimLight.position.set(1.5, 2.8, -2.8);
        scene.add(rimLight);
        
        // Warm Fill جانبي
        const warmFill = new THREE.PointLight(0xff8866, 0.65);
        warmFill.position.set(2.5, 1.8, 2);
        scene.add(warmFill);
        
        // Cool Fill من الأسفل
        const coolFill = new THREE.PointLight(0x44aaff, 0.45);
        coolFill.position.set(0, -1.2, 0);
        scene.add(coolFill);
        
        // نار القنبلة الديناميكية
        const bombFireLight = new THREE.PointLight(0xff4400, 1.2);
        bombFireLight.position.set(1.3, 0.7, 0.9);
        bombFireLight.distance = 5;
        bombFireLight.decay = 1.5;
        scene.add(bombFireLight);
        
        // إضاءة متحركة إضافية
        const movingLight = new THREE.PointLight(0xffaa55, 0.45);
        movingLight.position.set(0, 2, 1);
        scene.add(movingLight);
        
        // --- الأرضية البيئية الواقعية ---
        const groundPlane = new THREE.Mesh(
            new THREE.CircleGeometry(14, 32),
            new THREE.MeshStandardMaterial({ color: 0x1a1a2a, roughness: 0.75, metalness: 0.1, roughnessMap: null })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.08;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // نمط أرضية متكرر
        const gridHelper = new THREE.GridHelper(24, 32, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.05;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.3;
        scene.add(gridHelper);
        
        // دوائر أرضية زخرفية
        const ringGeo = new THREE.TorusGeometry(2.2, 0.05, 64, 200);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0x442200, emissiveIntensity: 0.3 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        ring.position.y = -0.04;
        scene.add(ring);
        
        // --- إنشاء الشخصية الرئيسية بتفاصيل واقعية ---
        const dwarfGroup = new THREE.Group();
        
        // 1. الجسد مع درع مفصّل
        const torsoGeo = new THREE.CylinderGeometry(0.72, 0.78, 1.28, 16);
        const armorMat = new THREE.MeshStandardMaterial({ color: 0x5a6e7e, roughness: 0.28, metalness: 0.82, emissive: 0x112233, emissiveIntensity: 0.08 });
        const torso = new THREE.Mesh(torsoGeo, armorMat);
        torso.castShadow = true;
        torso.receiveShadow = true;
        torso.position.y = 0.62;
        dwarfGroup.add(torso);
        
        // درع صدري متقن
        const chestArmorGeo = new THREE.CylinderGeometry(0.75, 0.72, 0.85, 12);
        const chestMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6a, roughness: 0.22, metalness: 0.88 });
        const chestArmor = new THREE.Mesh(chestArmorGeo, chestMat);
        chestArmor.castShadow = true;
        chestArmor.position.y = 0.68;
        dwarfGroup.add(chestArmor);
        
        // حزام خصر من الجلد المعدني
        const beltGeo = new THREE.TorusGeometry(0.72, 0.09, 24, 48);
        const beltMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, metalness: 0.45, roughness: 0.4 });
        const belt = new THREE.Mesh(beltGeo, beltMat);
        belt.rotation.x = Math.PI / 2;
        belt.position.y = 0.28;
        dwarfGroup.add(belt);
        
        // إبزيم الحزام
        const buckleGeo = new THREE.BoxGeometry(0.35, 0.18, 0.08);
        const buckleMat = new THREE.MeshStandardMaterial({ color: 0xddaa77, metalness: 0.95 });
        const buckle = new THREE.Mesh(buckleGeo, buckleMat);
        buckle.position.set(0, 0.28, 0.75);
        dwarfGroup.add(buckle);
        
        // 2. الرأس بتفاصيل واقعية
        const headGeo = new THREE.SphereGeometry(0.58, 48, 48);
        const skinMat = new THREE.MeshStandardMaterial({ color: 0xcd9a6b, roughness: 0.28, metalness: 0.08, bumpScale: 0.3 });
        const head = new THREE.Mesh(headGeo, skinMat);
        head.castShadow = true;
        head.position.y = 1.32;
        dwarfGroup.add(head);
        
        // خوذة حربية أنيقة
        const helmetGeo = new THREE.CylinderGeometry(0.62, 0.68, 0.52, 12);
        const helmetMat = new THREE.MeshStandardMaterial({ color: 0x8a9aae, metalness: 0.85, roughness: 0.18 });
        const helmet = new THREE.Mesh(helmetGeo, helmetMat);
        helmet.castShadow = true;
        helmet.position.y = 1.62;
        dwarfGroup.add(helmet);
        
        // قرون الخوذة (زخرفة)
        const hornMat = new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.7 });
        const leftHorn = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.55, 8), hornMat);
        leftHorn.position.set(-0.52, 1.82, 0.15);
        leftHorn.rotation.z = -0.4;
        leftHorn.rotation.x = 0.2;
        dwarfGroup.add(leftHorn);
        
        const rightHorn = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.55, 8), hornMat);
        rightHorn.position.set(0.52, 1.82, 0.15);
        rightHorn.rotation.z = 0.4;
        rightHorn.rotation.x = 0.2;
        dwarfGroup.add(rightHorn);
        
        // قمة الخوذة
        const crestGeo = new THREE.ConeGeometry(0.28, 0.48, 8);
        const crestMat = new THREE.MeshStandardMaterial({ color: 0xdd8855, metalness: 0.6 });
        const crest = new THREE.Mesh(crestGeo, crestMat);
        crest.position.y = 1.92;
        dwarfGroup.add(crest);
        
        // لحية كثيفة ومفصلة
        const beardGeo = new THREE.CylinderGeometry(0.58, 0.52, 0.62, 12);
        const beardMat = new THREE.MeshStandardMaterial({ color: 0xb87c4f, roughness: 0.85, metalness: 0.02 });
        const beard = new THREE.Mesh(beardGeo, beardMat);
        beard.position.y = 1.05;
        beard.castShadow = true;
        dwarfGroup.add(beard);
        
        // تفاصيل اللحية (جدائل)
        const braidMat2 = new THREE.MeshStandardMaterial({ color: 0xa56b3e });
        for (let i = -1; i <= 1; i+=2) {
            const braid = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.11, 0.55, 6), braidMat2);
            braid.position.set(i * 0.38, 1.08, 0.48);
            braid.rotation.z = i * 0.35;
            braid.rotation.x = 0.2;
            dwarfGroup.add(braid);
        }
        
        // العيون مع توهج
        const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xf8f8fc, emissive: 0x4488aa, emissiveIntensity: 0.2 });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 32, 32), eyeWhiteMat);
        leftEye.position.set(-0.22, 1.46, 0.62);
        dwarfGroup.add(leftEye);
        
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 32, 32), eyeWhiteMat);
        rightEye.position.set(0.22, 1.46, 0.62);
        dwarfGroup.add(rightEye);
        
        // بؤبؤ العين مع انعكاس
        const pupilMat2 = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x220000 });
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 24, 24), pupilMat2);
        leftPupil.position.set(-0.22, 1.445, 0.74);
        dwarfGroup.add(leftPupil);
        
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 24, 24), pupilMat2);
        rightPupil.position.set(0.22, 1.445, 0.74);
        dwarfGroup.add(rightPupil);
        
        // انعكاس الضوء في العين
        const highlightMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const leftHighlight = new THREE.Mesh(new THREE.SphereGeometry(0.03, 16, 16), highlightMat);
        leftHighlight.position.set(-0.26, 1.47, 0.78);
        dwarfGroup.add(leftHighlight);
        
        const rightHighlight = new THREE.Mesh(new THREE.SphereGeometry(0.03, 16, 16), highlightMat);
        rightHighlight.position.set(0.18, 1.47, 0.78);
        dwarfGroup.add(rightHighlight);
        
        // حواجب غاضبة ومفصلة
        const browMat2 = new THREE.MeshStandardMaterial({ color: 0x4a2e1e });
        const leftBrow = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.11, 0.12), browMat2);
        leftBrow.position.set(-0.26, 1.56, 0.64);
        leftBrow.rotation.z = -0.25;
        dwarfGroup.add(leftBrow);
        
        const rightBrow = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.11, 0.12), browMat2);
        rightBrow.position.set(0.26, 1.56, 0.64);
        rightBrow.rotation.z = 0.25;
        dwarfGroup.add(rightBrow);
        
        // ندبة على الوجه
        const scarGeo = new THREE.BoxGeometry(0.18, 0.04, 0.05);
        const scarMat = new THREE.MeshStandardMaterial({ color: 0xaa7766 });
        const scar = new THREE.Mesh(scarGeo, scarMat);
        scar.position.set(0.38, 1.28, 0.68);
        scar.rotation.z = 0.5;
        dwarfGroup.add(scar);
        
        // 3. أكتاف دروع ضخمة
        const pauldronMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6a, metalness: 0.92, roughness: 0.2 });
        const leftPaul = new THREE.Mesh(new THREE.SphereGeometry(0.48, 12, 12), pauldronMat);
        leftPaul.position.set(-0.88, 1.22, 0);
        leftPaul.scale.set(0.85, 0.55, 1.1);
        dwarfGroup.add(leftPaul);
        
        const rightPaul = new THREE.Mesh(new THREE.SphereGeometry(0.48, 12, 12), pauldronMat);
        rightPaul.position.set(0.88, 1.22, 0);
        rightPaul.scale.set(0.85, 0.55, 1.1);
        dwarfGroup.add(rightPaul);
        
        // أذرع عضلية
        const armMat2 = new THREE.MeshStandardMaterial({ color: 0x7a6a5a, roughness: 0.35 });
        const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.28, 0.95, 10), armMat2);
        leftArm.position.set(-0.88, 0.88, 0);
        leftArm.rotation.z = 0.42;
        leftArm.rotation.x = -0.15;
        dwarfGroup.add(leftArm);
        
        const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.28, 0.95, 10), armMat2);
        rightArm.position.set(0.88, 0.88, 0);
        rightArm.rotation.z = -0.42;
        rightArm.rotation.x = 0.18;
        dwarfGroup.add(rightArm);
        
        // قفازات مفصلة
        const gauntletMat2 = new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.78 });
        const leftGaunt = new THREE.Mesh(new THREE.SphereGeometry(0.26, 10, 10), gauntletMat2);
        leftGaunt.position.set(-1.18, 0.62, 0.25);
        dwarfGroup.add(leftGaunt);
        
        const rightGaunt = new THREE.Mesh(new THREE.SphereGeometry(0.26, 10, 10), gauntletMat2);
        rightGaunt.position.set(1.18, 0.62, 0.25);
        dwarfGroup.add(rightGaunt);
        
        // 4. أرجل قوية
        const legMat2 = new THREE.MeshStandardMaterial({ color: 0x5a4a3a, metalness: 0.35 });
        const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.35, 0.88, 10), legMat2);
        leftLeg.position.set(-0.42, 0.28, 0);
        dwarfGroup.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.35, 0.88, 10), legMat2);
        rightLeg.position.set(0.42, 0.28, 0);
        dwarfGroup.add(rightLeg);
        
        // أحذية حديدية ثقيلة
        const bootMat2 = new THREE.MeshStandardMaterial({ color: 0x6a4a3a, metalness: 0.55 });
        const leftBoot = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.28, 0.72), bootMat2);
        leftBoot.position.set(-0.42, -0.08, 0.12);
        dwarfGroup.add(leftBoot);
        
        const rightBoot = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.28, 0.72), bootMat2);
        rightBoot.position.set(0.42, -0.08, 0.12);
        dwarfGroup.add(rightBoot);
        
        // 5. القنبلة المتطورة مع تأثيرات نار
        const bombGroup = new THREE.Group();
        
        // جسم القنبلة الرئيسي
        const bombBodyGeo = new THREE.SphereGeometry(0.42, 48, 48);
        const bombMat2 = new THREE.MeshStandardMaterial({ color: 0x445566, metalness: 0.65, roughness: 0.28, emissive: 0x221100 });
        const bombBody2 = new THREE.Mesh(bombBodyGeo, bombMat2);
        bombBody2.scale.set(0.92, 1.15, 0.92);
        bombGroup.add(bombBody2);
        
        // فتيل القنبلة
        const fuseGeo2 = new THREE.CylinderGeometry(0.1, 0.12, 0.45, 12);
        const fuseMat2 = new THREE.MeshStandardMaterial({ color: 0xdd9955 });
        const fuse2 = new THREE.Mesh(fuseGeo2, fuseMat2);
        fuse2.position.y = 0.55;
        bombGroup.add(fuse2);
        
        // نار مشتعلة متحركة
        const fireGeo = new THREE.SphereGeometry(0.14, 16, 16);
        const fireMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff3300, emissiveIntensity: 0.9 });
        const fireBall = new THREE.Mesh(fireGeo, fireMat);
        fireBall.position.y = 0.78;
        bombGroup.add(fireBall);
        
        // جزيئات نار صغيرة حول القنبلة
        const fireParticles = [];
        for (let i = 0; i < 12; i++) {
            const particle = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4422, emissiveIntensity: 0.6 }));
            particle.userData = { angle: (i / 12) * Math.PI * 2, radius: 0.55, speed: 1 + Math.random() * 2 };
            bombGroup.add(particle);
            fireParticles.push(particle);
        }
        
        // حزام القنبلة
        const bombStrap = new THREE.Mesh(new THREE.TorusGeometry(0.42, 0.06, 16, 48), new THREE.MeshStandardMaterial({ color: 0xaa8866 }));
        bombStrap.rotation.x = Math.PI / 2;
        bombStrap.position.y = -0.12;
        bombGroup.add(bombStrap);
        
        bombGroup.position.set(1.35, 0.62, 0.55);
        bombGroup.castShadow = true;
        dwarfGroup.add(bombGroup);
        
        // يد إضافية تمسك القنبلة
        const holdingHand = new THREE.Mesh(new THREE.SphereGeometry(0.28, 12, 12), gauntletMat2);
        holdingHand.position.set(1.42, 0.65, 0.68);
        dwarfGroup.add(holdingHand);
        
        // عباءة فاخرة
        const cloakGeo2 = new THREE.CylinderGeometry(0.95, 1.25, 1.35, 12);
        const cloakMat2 = new THREE.MeshStandardMaterial({ color: 0x4a2a1a, roughness: 0.88, metalness: 0.02, transparent: true, opacity: 0.92 });
        const cloak2 = new THREE.Mesh(cloakGeo2, cloakMat2);
        cloak2.position.y = 0.58;
        cloak2.scale.set(1.05, 0.85, 0.75);
        dwarfGroup.add(cloak2);
        
        // --- CSS2D لعرض الاسم والرتبة ---
        const nameDiv = document.createElement('div');
        nameDiv.innerHTML = '⚔️ ثورين حامل النار ⚔️<br><span style="font-size:10px;">حارس الجبل الحديدي</span>';
        nameDiv.style.color = '#ffdd99';
        nameDiv.style.fontSize = '16px';
        nameDiv.style.fontWeight = 'bold';
        nameDiv.style.textAlign = 'center';
        nameDiv.style.background = 'linear-gradient(135deg, rgba(0,0,0,0.8), rgba(40,20,0,0.9))';
        nameDiv.style.padding = '6px 14px';
        nameDiv.style.borderRadius = '30px';
        nameDiv.style.border = '1px solid #ffaa55';
        nameDiv.style.fontFamily = 'monospace';
        nameDiv.style.backdropFilter = 'blur(8px)';
        nameDiv.style.boxShadow = '0 0 15px rgba(255,100,0,0.3)';
        
        const nameLabel2 = new CSS2DObject(nameDiv);
        nameLabel2.position.set(0, 2.35, 0);
        dwarfGroup.add(nameLabel2);
        
        // شريط الصحة المتقدم
        const healthContainer = document.createElement('div');
        healthContainer.style.width = '130px';
        healthContainer.style.height = '12px';
        healthContainer.style.backgroundColor = '#330000';
        healthContainer.style.borderRadius = '12px';
        healthContainer.style.border = '1px solid #ffaa55';
        healthContainer.style.overflow = 'hidden';
        healthContainer.style.boxShadow = '0 0 5px rgba(0,0,0,0.5)';
        
        const healthFill2 = document.createElement('div');
        healthFill2.style.width = '92%';
        healthFill2.style.height = '100%';
        healthFill2.style.backgroundColor = '#dd4444';
        healthFill2.style.borderRadius = '10px';
        healthFill2.style.background = 'linear-gradient(90deg, #ff6644, #dd2222)';
        healthContainer.appendChild(healthFill2);
        
        const healthLabel2 = new CSS2DObject(healthContainer);
        healthLabel2.position.set(0, 2.15, 0);
        dwarfGroup.add(healthLabel2);
        
        scene.add(dwarfGroup);
        
        // --- جزيئات بيئية متطورة ---
        const particleCount2 = 1500;
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount2 * 3);
        for (let i = 0; i < particleCount2; i++) {
            positions[i*3] = (Math.random() - 0.5) * 45;
            positions[i*3+1] = Math.random() * 6;
            positions[i*3+2] = (Math.random() - 0.5) * 35;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat2 = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.04, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending });
        const particles2 = new THREE.Points(particleGeo, particleMat2);
        scene.add(particles2);
        
        // --- حلقة التحريك الديناميكية ---
        let time2 = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time2 += 0.016;
            
            // تأثيرات القنبلة
            fireBall.scale.setScalar(0.9 + Math.sin(time2 * 22) * 0.15);
            fireBall.material.emissiveIntensity = 0.7 + Math.sin(time2 * 28) * 0.4;
            bombFireLight.intensity = 0.9 + Math.sin(time2 * 20) * 0.4;
            
            // جزيئات النار الدائرية
            fireParticles.forEach((part, idx) => {
                const angle = part.userData.angle + time2 * part.userData.speed;
                const radius = 0.58;
                part.position.x = Math.cos(angle) * radius;
                part.position.z = Math.sin(angle) * radius;
                part.position.y = 0.15 + Math.sin(time2 * 15 + idx) * 0.08;
                const intensity = 0.5 + Math.sin(time2 * 25 + idx) * 0.3;
                part.material.emissiveIntensity = intensity;
            });
            
            // تحريك القنبلة
            bombGroup.position.y = 0.62 + Math.sin(time2 * 14) * 0.008;
            bombGroup.rotation.z = Math.sin(time2 * 3) * 0.03;
            
            // تحريك الخوذة والقرون
            crest.rotation.z = Math.sin(time2 * 1.8) * 0.02;
            leftHorn.rotation.z = -0.4 + Math.sin(time2 * 1.5) * 0.02;
            rightHorn.rotation.z = 0.4 + Math.sin(time2 * 1.5) * 0.02;
            
            // تحريك العباءة
            cloak2.rotation.z = Math.sin(time2 * 1.2) * 0.025;
            
            // تحريك الإضاءة
            movingLight.position.x = Math.sin(time2 * 0.8) * 1.2;
            movingLight.intensity = 0.4 + Math.sin(time2 * 1.2) * 0.15;
            
            // تحريك الجسيمات
            particles2.rotation.y += 0.0008;
            particles2.rotation.x = Math.sin(time2 * 0.2) * 0.05;
            
            // تأثير التنفس الخفيف للشخصية
            dwarfGroup.position.y = Math.sin(time2 * 2.5) * 0.002;
            
            controls.update();
            effectComposer.render();
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        // استجابة لتغيير حجم النافذة
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('✨ شخصية القزم الحربي الاحترافية تم تحميلها بنجاح!');
    </script>
</body>
</html>
