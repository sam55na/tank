<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المجسم الحربي - الأشكال الأساسية فقط</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; }
        #info {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); color: #ffaa66;
            padding: 10px 20px; border-radius: 8px;
            z-index: 100; font-size: 14px; pointer-events: none;
        }
        #controls {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.6); color: #ccc;
            padding: 8px 15px; border-radius: 8px;
            font-size: 12px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">⚔️ المجسم الحربي | جذع + رأس + مخروط مائل + أذرع + أرجل + قدم</div>
    <div id="controls">🖱️ اسحب للتدوير | 🔍 اسكرول للتكبير</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // المشهد
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        
        // الكاميرا
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3.5, 6);
        camera.lookAt(0, 2, 0);
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // التحكم
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 2, 0);
        
        // إضاءة بسيطة
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(3, 5, 4);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x88aaff, 0.4);
        fillLight.position.set(-2, 2, 3);
        scene.add(fillLight);
        
        // مجموعة المجسم
        const model = new THREE.Group();
        scene.add(model);
        
        // =============== المواد ===============
        const materialArmor = new THREE.MeshStandardMaterial({ color: 0x4a6a8a, metalness: 0.6, roughness: 0.4 });
        const materialGold = new THREE.MeshStandardMaterial({ color: 0xca9622, metalness: 0.7, roughness: 0.3 });
        const materialDark = new THREE.MeshStandardMaterial({ color: 0x3a4a5a, metalness: 0.5, roughness: 0.5 });
        const materialFoot = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, metalness: 0.3, roughness: 0.7 });
        
        // =============== 1. الجذع (كرة) ===============
        const torsoGeo = new THREE.SphereGeometry(0.85, 64, 64);
        const torso = new THREE.Mesh(torsoGeo, materialArmor);
        torso.position.set(0, 2.1, 0);
        torso.castShadow = true;
        model.add(torso);
        
        // =============== 2. الرأس (كرة أصغر بثلاث مرات من الجذع) ===============
        // الجذع نصف قطره 0.85، الرأس أصغر بثلاث مرات = 0.85/3 ≈ 0.283
        // لكن لجعلها متناسبة بشكل أفضل: نصف قطر الرأس 0.45
        const headGeo = new THREE.SphereGeometry(0.45, 64, 64);
        const head = new THREE.Mesh(headGeo, materialArmor);
        // مدمجة مع الجذع بجزء بسيط (تداخل 0.1)
        head.position.set(0, 3.0, 0.05);
        head.castShadow = true;
        model.add(head);
        
        // =============== 3. المخروط (كبير ومائل قليلاً ومدمج مع الرأس) ===============
        const spikeGeo = new THREE.ConeGeometry(0.28, 0.85, 32);
        const spike = new THREE.Mesh(spikeGeo, materialGold);
        // مائل قليلاً ومدمج مع الرأس
        spike.position.set(0.08, 3.48, 0.12);
        spike.rotation.x = 0.18;
        spike.rotation.z = 0.08;
        spike.castShadow = true;
        model.add(spike);
        
        // =============== 4. الذراع الأيمن (أسطوانتين + مفصل) ===============
        // الجزء العلوي
        const armUpperRGeo = new THREE.CylinderGeometry(0.32, 0.3, 0.9, 24);
        const armUpperR = new THREE.Mesh(armUpperRGeo, materialDark);
        armUpperR.position.set(1.2, 2.5, 0);
        armUpperR.rotation.z = 0.25;
        armUpperR.rotation.x = 0.1;
        armUpperR.castShadow = true;
        model.add(armUpperR);
        
        // مفصل الكوع (كرة)
        const elbowRGeo = new THREE.SphereGeometry(0.22, 32, 32);
        const elbowR = new THREE.Mesh(elbowRGeo, materialGold);
        elbowR.position.set(1.52, 2.02, -0.05);
        elbowR.castShadow = true;
        model.add(elbowR);
        
        // الجزء السفلي
        const armLowerRGeo = new THREE.CylinderGeometry(0.27, 0.24, 0.85, 24);
        const armLowerR = new THREE.Mesh(armLowerRGeo, materialDark);
        armLowerR.position.set(1.8, 1.58, -0.08);
        armLowerR.rotation.z = 0.2;
        armLowerR.rotation.x = 0.15;
        armLowerR.castShadow = true;
        model.add(armLowerR);
        
        // =============== 5. الذراع الأيسر (أسطوانتين + مفصل) ===============
        const armUpperLGeo = new THREE.CylinderGeometry(0.32, 0.3, 0.9, 24);
        const armUpperL = new THREE.Mesh(armUpperLGeo, materialDark);
        armUpperL.position.set(-1.2, 2.5, 0);
        armUpperL.rotation.z = -0.25;
        armUpperL.rotation.x = 0.1;
        armUpperL.castShadow = true;
        model.add(armUpperL);
        
        const elbowLGeo = new THREE.SphereGeometry(0.22, 32, 32);
        const elbowL = new THREE.Mesh(elbowLGeo, materialGold);
        elbowL.position.set(-1.52, 2.02, -0.05);
        elbowL.castShadow = true;
        model.add(elbowL);
        
        const armLowerLGeo = new THREE.CylinderGeometry(0.27, 0.24, 0.85, 24);
        const armLowerL = new THREE.Mesh(armLowerLGeo, materialDark);
        armLowerL.position.set(-1.8, 1.58, -0.08);
        armLowerL.rotation.z = -0.2;
        armLowerL.rotation.x = 0.15;
        armLowerL.castShadow = true;
        model.add(armLowerL);
        
        // =============== 6. الساق اليمنى (أسطوانتين + مفصل) ===============
        // الفخذ
        const thighRGeo = new THREE.CylinderGeometry(0.38, 0.34, 1.0, 24);
        const thighR = new THREE.Mesh(thighRGeo, materialDark);
        thighR.position.set(0.6, 1.05, 0);
        thighR.rotation.z = 0.05;
        thighR.castShadow = true;
        model.add(thighR);
        
        // مفصل الركبة
        const kneeRGeo = new THREE.SphereGeometry(0.26, 32, 32);
        const kneeR = new THREE.Mesh(kneeRGeo, materialGold);
        kneeR.position.set(0.68, 0.52, 0.1);
        kneeR.castShadow = true;
        model.add(kneeR);
        
        // الساق
        const calfRGeo = new THREE.CylinderGeometry(0.32, 0.28, 0.9, 24);
        const calfR = new THREE.Mesh(calfRGeo, materialDark);
        calfR.position.set(0.7, 0.05, -0.03);
        calfR.castShadow = true;
        model.add(calfR);
        
        // =============== 7. الساق اليسرى (أسطوانتين + مفصل) ===============
        const thighLGeo = new THREE.CylinderGeometry(0.38, 0.34, 1.0, 24);
        const thighL = new THREE.Mesh(thighLGeo, materialDark);
        thighL.position.set(-0.6, 1.05, 0);
        thighL.rotation.z = -0.05;
        thighL.castShadow = true;
        model.add(thighL);
        
        const kneeLGeo = new THREE.SphereGeometry(0.26, 32, 32);
        const kneeL = new THREE.Mesh(kneeLGeo, materialGold);
        kneeL.position.set(-0.68, 0.52, 0.1);
        kneeL.castShadow = true;
        model.add(kneeL);
        
        const calfLGeo = new THREE.CylinderGeometry(0.32, 0.28, 0.9, 24);
        const calfL = new THREE.Mesh(calfLGeo, materialDark);
        calfL.position.set(-0.7, 0.05, -0.03);
        calfL.castShadow = true;
        model.add(calfL);
        
        // =============== 8. القدم (مستطيل) ===============
        const footGeo = new THREE.BoxGeometry(0.6, 0.2, 1.0);
        
        const footR = new THREE.Mesh(footGeo, materialFoot);
        footR.position.set(0.8, -0.32, 0.2);
        footR.castShadow = true;
        model.add(footR);
        
        const footL = new THREE.Mesh(footGeo, materialFoot);
        footL.position.set(-0.8, -0.32, 0.2);
        footL.castShadow = true;
        model.add(footL);
        
        // =============== تحريك ===============
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('✅ المجسم جاهز - فقط الأشكال المطلوبة');
        console.log('📐 الجذع: كرة | الرأس: كرة أصغر بثلاث مرات | مخروط كبير مائل');
        console.log('💪 الأذرع: أسطوانتين + مفصل | 🦵 الأرجل: أسطوانتين + مفصل | 🦶 القدم: مستطيل');
    </script>
</body>
</html>
