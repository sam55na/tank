<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحارب المطور - ترابط هيكلي كامل</title>
    <style>
        body { margin: 0; overflow: hidden; background: #05050a; font-family: monospace; }
        #overlay {
            position: absolute; top: 20px; left: 20px;
            color: #00f2ff; background: rgba(0,0,0,0.7);
            padding: 15px; border-left: 4px solid #00f2ff;
            pointer-events: none; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <b style="font-size: 16px;">S-TIER GUARDIAN</b><br>
        نظام الترابط الحيوي: نشط 100%
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 4, 9);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 2, 0);

        // --- إضاءة قوية لإبراز التداخل ---
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(5, 10, 5);
        mainLight.castShadow = true;
        scene.add(mainLight);

        const blueLight = new THREE.PointLight(0x00f2ff, 1.5);
        blueLight.position.set(-4, 3, 2);
        scene.add(blueLight);

        scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        // --- المواد (ألوان قوية وواضحة) ---
        const matArmor = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 });
        const matJoint = new THREE.MeshStandardMaterial({ color: 0x00f2ff, emissive: 0x00f2ff, emissiveIntensity: 0.5 });
        const matGold = new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 1, roughness: 0.1 });

        const character = new THREE.Group();
        scene.add(character);

        // 1. الجذع (قطعتان متداخلتان لتعريض الصدر)
        const lowerTorso = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.45, 0.8, 12), matArmor);
        lowerTorso.position.y = 1.6;
        character.add(lowerTorso);

        const upperTorso = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.3, 0.9, 12), matArmor);
        upperTorso.position.y = 2.3; // تداخل مع الجزء السفلي
        character.add(upperTorso);

        // 2. الرأس والخوذة
        const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.3), matJoint);
        neck.position.y = 2.8;
        character.add(neck);

        const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), matArmor);
        head.position.y = 3.1;
        character.add(head);

        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.1, 0.1), matJoint);
        visor.position.set(0, 3.2, 0.25);
        character.add(visor);

        // 3. الأذرع (هيكل متصل)
        function createArm(side) {
            const arm = new THREE.Group();
            
            // كتف ضخم مدمج
            const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), matArmor);
            arm.add(shoulder);

            // عضد
            const bicep = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.15, 0.8), matArmor);
            bicep.position.y = -0.5;
            arm.add(bicep);

            // كوع (مفصل مضيء)
            const elbow = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 12), matJoint);
            elbow.position.y = -0.9;
            arm.add(elbow);

            // ساعد مع شفرة مدمجة
            const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.18, 0.8), matArmor);
            forearm.position.y = -1.3;
            arm.add(forearm);

            const blade = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.8, 4), matGold);
            blade.position.set(0, -1.8, 0.1);
            blade.rotation.x = Math.PI;
            arm.add(blade);

            arm.position.set(side * 0.9, 2.6, 0);
            return arm;
        }
        character.add(createArm(1));
        character.add(createArm(-1));

        // 4. الأرجل (قوية ومستقرة)
        function createLeg(side) {
            const leg = new THREE.Group();
            
            const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.2, 1), matArmor);
            thigh.position.y = -0.5;
            leg.add(thigh);

            const knee = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 12), matJoint);
            knee.position.y = -1;
            leg.add(knee);

            const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 1), matArmor);
            shin.position.y = -1.5;
            leg.add(shin);

            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.8), matGold);
            foot.position.set(0, -2.1, 0.2);
            leg.add(foot);

            leg.position.set(side * 0.45, 1.3, 0);
            return leg;
        }
        character.add(createLeg(1));
        character.add(createLeg(-1));

        // أرضية وشبكة
        const grid = new THREE.GridHelper(10, 20, 0x00f2ff, 0x222222);
        grid.position.y = -0.9;
        scene.add(grid);

        // --- التحريك ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.002;
            
            // حركة تنفس خفيفة جداً للترابط
            character.position.y = Math.sin(time) * 0.05;
            character.rotation.y += 0.005;

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
