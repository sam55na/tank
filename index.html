<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القزم الودود - نسخة مطورة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #87CEEB 0%, #E0F6FF 50%, #87CEEB 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        .header {
            text-align: center;
            color: rgba(70, 130, 180, 0.9);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            animation: fadeIn 1s ease-in;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #DAA520 0%, #FF8C00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.8;
            letter-spacing: 1px;
            color: #4682B4;
        }

        .footer {
            text-align: center;
            color: rgba(70, 130, 180, 0.7);
            font-size: 0.9rem;
            animation: fadeIn 2s ease-in;
        }

        .stats {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(218, 165, 32, 0.5);
            border-radius: 8px;
            padding: 1rem;
            color: rgba(70, 130, 180, 0.8);
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            min-width: 200px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(218, 165, 32, 0.2);
        }

        .stat-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .stat-label {
            color: rgba(218, 165, 32, 0.9);
            font-weight: bold;
        }

        .stat-value {
            color: rgba(70, 130, 180, 0.9);
            font-weight: bold;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .header p {
                font-size: 0.85rem;
            }

            .stats {
                font-size: 0.75rem;
                bottom: 1rem;
                right: 1rem;
                min-width: 150px;
            }

            .ui-overlay {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="ui-overlay">
    <div class="header">
        <h1>🧙 القزم الودود 🧙</h1>
        <p>شخصية ثلاثية الأبعاد مرحة</p>
    </div>
    <div class="footer">
        <p>استمتع بهذا القزم الصغير الودود!</p>
    </div>
</div>

<div class="stats">
    <div class="stat-item">
        <span class="stat-label">FPS:</span>
        <span class="stat-value" id="fps">60</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">الكائنات:</span>
        <span class="stat-value">18</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">الإضاءات:</span>
        <span class="stat-value">3</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">الحالة:</span>
        <span class="stat-value" style="color: #32CD32;">نشط ✓</span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- الإعدادات الأساسية ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 15, 30);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // --- نظام الإضاءة ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 7);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.width = 2048;
    directionalLight.shadow.mapSize.height = 2048;
    scene.add(directionalLight);

    // ضوء دافئ من الأمام
    const warmLight = new THREE.PointLight(0xFFD700, 0.5, 20);
    warmLight.position.set(-3, 2, 3);
    scene.add(warmLight);

    // --- الخامات ---
    const skinMat = new THREE.MeshStandardMaterial({
        color: 0xF4A460,
        roughness: 0.6,
        metalness: 0.0
    });

    const beardMat = new THREE.MeshStandardMaterial({
        color: 0xFFFFFF,
        roughness: 0.8,
        metalness: 0.0
    });

    const hatMat = new THREE.MeshStandardMaterial({
        color: 0xDAA520,
        roughness: 0.7,
        metalness: 0.1
    });

    const clothesMat = new THREE.MeshStandardMaterial({
        color: 0x8B4513,
        roughness: 0.8,
        metalness: 0.0
    });

    const beltMat = new THREE.MeshStandardMaterial({
        color: 0xFFD700,
        roughness: 0.5,
        metalness: 0.3
    });

    // --- بناء الشخصية ---
    const dwarf = new THREE.Group();

    // 1. الرأس (كرة كبيرة)
    const headGeo = new THREE.SphereGeometry(0.5, 32, 32);
    const head = new THREE.Mesh(headGeo, skinMat);
    head.position.y = 1.2;
    head.castShadow = true;
    head.receiveShadow = true;
    dwarf.add(head);

    // 2. اللحية البيضاء
    const beardGeo = new THREE.SphereGeometry(0.35, 32, 32);
    beardGeo.scale(1, 0.6, 0.8);
    const beard = new THREE.Mesh(beardGeo, beardMat);
    beard.position.set(0, 0.7, 0.3);
    beard.castShadow = true;
    beard.receiveShadow = true;
    dwarf.add(beard);

    // 3. الأنف (كرة صغيرة)
    const noseGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const nose = new THREE.Mesh(noseGeo, skinMat);
    nose.position.set(0, 1.25, 0.45);
    nose.castShadow = true;
    dwarf.add(nose);

    // 4. العيون
    const eyeGeo = new THREE.SphereGeometry(0.08, 16, 16);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
    
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.15, 1.35, 0.48);
    leftEye.castShadow = true;
    dwarf.add(leftEye);

    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.15, 1.35, 0.48);
    rightEye.castShadow = true;
    dwarf.add(rightEye);

    // 5. الأذنان
    const earGeo = new THREE.SphereGeometry(0.1, 16, 16);
    earGeo.scale(0.6, 1, 0.5);
    
    const leftEar = new THREE.Mesh(earGeo, skinMat);
    leftEar.position.set(-0.55, 1.2, 0);
    leftEar.castShadow = true;
    dwarf.add(leftEar);

    const rightEar = new THREE.Mesh(earGeo, skinMat);
    rightEar.position.set(0.55, 1.2, 0);
    rightEar.castShadow = true;
    dwarf.add(rightEar);

    // 6. القبعة الذهبية
    const hatGeo = new THREE.ConeGeometry(0.55, 0.8, 32);
    const hat = new THREE.Mesh(hatGeo, hatMat);
    hat.position.set(0, 1.85, 0);
    hat.rotation.z = 0.3;
    hat.castShadow = true;
    hat.receiveShadow = true;
    dwarf.add(hat);

    // 7. الجسم (كرة مفلطحة)
    const bodyGeo = new THREE.SphereGeometry(0.6, 32, 32);
    bodyGeo.scale(1, 1.2, 1);
    const body = new THREE.Mesh(bodyGeo, clothesMat);
    body.position.y = 0.3;
    body.castShadow = true;
    body.receiveShadow = true;
    dwarf.add(body);

    // 8. الحزام الأصفر
    const beltGeo = new THREE.CylinderGeometry(0.65, 0.65, 0.15, 32);
    const belt = new THREE.Mesh(beltGeo, beltMat);
    belt.position.y = 0.25;
    belt.castShadow = true;
    belt.receiveShadow = true;
    dwarf.add(belt);

    // 9. الأطراف العلوية (الذراعان)
    const armGeo = new THREE.SphereGeometry(0.15, 16, 16);
    armGeo.scale(0.5, 1.2, 0.5);

    const leftArm = new THREE.Mesh(armGeo, clothesMat);
    leftArm.position.set(-0.8, 0.6, 0);
    leftArm.castShadow = true;
    leftArm.receiveShadow = true;
    dwarf.add(leftArm);

    const rightArm = new THREE.Mesh(armGeo, clothesMat);
    rightArm.position.set(0.8, 0.6, 0);
    rightArm.castShadow = true;
    rightArm.receiveShadow = true;
    dwarf.add(rightArm);

    // 10. اليدان
    const handGeo = new THREE.SphereGeometry(0.12, 16, 16);
    
    const leftHand = new THREE.Mesh(handGeo, skinMat);
    leftHand.position.set(-0.85, -0.05, 0);
    leftHand.castShadow = true;
    dwarf.add(leftHand);

    const rightHand = new THREE.Mesh(handGeo, skinMat);
    rightHand.position.set(0.85, -0.05, 0);
    rightHand.castShadow = true;
    dwarf.add(rightHand);

    // 11. الأطراف السفلية (الساقان)
    const legGeo = new THREE.SphereGeometry(0.18, 16, 16);
    legGeo.scale(0.6, 1.1, 0.6);

    const leftLeg = new THREE.Mesh(legGeo, clothesMat);
    leftLeg.position.set(-0.35, -0.75, 0);
    leftLeg.castShadow = true;
    leftLeg.receiveShadow = true;
    dwarf.add(leftLeg);

    const rightLeg = new THREE.Mesh(legGeo, clothesMat);
    rightLeg.position.set(0.35, -0.75, 0);
    rightLeg.castShadow = true;
    rightLeg.receiveShadow = true;
    dwarf.add(rightLeg);

    // 12. الأحذية
    const shoeGeo = new THREE.BoxGeometry(0.3, 0.2, 0.4);
    const shoeMat = new THREE.MeshStandardMaterial({ color: 0x654321 });

    const leftShoe = new THREE.Mesh(shoeGeo, shoeMat);
    leftShoe.position.set(-0.35, -1.2, 0);
    leftShoe.castShadow = true;
    leftShoe.receiveShadow = true;
    dwarf.add(leftShoe);

    const rightShoe = new THREE.Mesh(shoeGeo, shoeMat);
    rightShoe.position.set(0.35, -1.2, 0);
    rightShoe.castShadow = true;
    rightShoe.receiveShadow = true;
    dwarf.add(rightShoe);

    // 13. الأرضية
    const groundGeo = new THREE.PlaneGeometry(10, 10);
    const groundMat = new THREE.MeshStandardMaterial({
        color: 0x90EE90,
        roughness: 0.8
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.5;
    ground.receiveShadow = true;
    scene.add(ground);

    scene.add(dwarf);

    // --- متغيرات الحركة والتأثيرات ---
    let frameCount = 0;
    const fpsDisplay = document.getElementById('fps');
    let lastTime = Date.now();

    // --- حلقة التحريك ---
    function animate() {
        requestAnimationFrame(animate);

        frameCount++;
        const currentTime = Date.now();
        if (currentTime - lastTime >= 1000) {
            fpsDisplay.textContent = frameCount;
            frameCount = 0;
            lastTime = currentTime;
        }

        const t = Date.now() * 0.001;

        // حركة دوران لطيفة
        dwarf.rotation.y = Math.sin(t * 0.5) * 0.15;

        // حركة قفز خفيفة
        dwarf.position.y = Math.sin(t * 1.5) * 0.15;

        // حركة الذراعين
        leftArm.rotation.z = Math.sin(t * 1.2) * 0.3 + 0.2;
        rightArm.rotation.z = Math.sin(t * 1.2 + Math.PI) * 0.3 - 0.2;

        // حركة الساقين
        leftLeg.rotation.x = Math.sin(t * 1.2) * 0.2;
        rightLeg.rotation.x = Math.sin(t * 1.2 + Math.PI) * 0.2;

        // حركة طفيفة للقبعة
        hat.rotation.z = 0.3 + Math.sin(t * 0.8) * 0.1;

        renderer.render(scene, camera);
    }

    // التعامل مع تغيير حجم النافذة
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>

</body>
</html>
