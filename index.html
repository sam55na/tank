<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول - منصة الألعاب</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #05070c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* خلفية متحركة */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at center, rgba(212,175,55,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* الحاوية الرئيسية */
        .login-container {
            position: relative;
            z-index: 10;
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 50px 40px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* الشعار */
        .logo {
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #d4af37;
            font-size: 42px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .logo p {
            color: #8a9aa8;
            margin-top: 10px;
            font-size: 14px;
        }

        /* زر Google */
        .google-btn {
            width: 100%;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            margin: 20px 0;
            color: #1a1a2e;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            background: white;
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-btn img {
            width: 24px;
            height: 24px;
        }

        /* حالة التحميل */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 20px 40px;
            border-radius: 60px;
            color: #d4af37;
            display: none;
            z-index: 1000;
            font-size: 18px;
            backdrop-filter: blur(10px);
            border: 1px solid #d4af37;
        }

        /* رسالة الخطأ */
        .error-message {
            color: #ff6b6b;
            background: rgba(255, 0, 0, 0.1);
            padding: 12px;
            border-radius: 12px;
            margin: 15px 0;
            font-size: 14px;
            display: none;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        /* معلومات المستخدم بعد الدخول */
        .user-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            display: none;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 10px;
            border: 2px solid #d4af37;
        }

        .user-name {
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .user-email {
            color: #8a9aa8;
            font-size: 14px;
            margin: 5px 0;
        }

        .logout-btn {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(212, 175, 55, 0.4);
        }

        /* تذييل */
        .footer {
            margin-top: 30px;
            color: #4a5568;
            font-size: 12px;
        }

        /* للشاشات الصغيرة */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 25px;
                width: 95%;
            }
            
            .logo h1 {
                font-size: 32px;
            }
            
            .google-btn {
                padding: 14px 20px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="login-container" id="loginContainer">
        <div class="logo">
            <h1>🎮 منصة الألعاب</h1>
            <p>سجل دخولك بواسطة Google للمتابعة</p>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <button class="google-btn" id="googleLoginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            تسجيل الدخول بحساب Google
        </button>
        
        <div class="user-info" id="userInfo">
            <img class="user-avatar" id="userAvatar" alt="Avatar">
            <div class="user-name" id="userName"></div>
            <div class="user-email" id="userEmail"></div>
            <button class="logout-btn" id="logoutBtn">تسجيل الخروج</button>
        </div>
        
        <div class="footer">
            <p>🔒 جميع البيانات مشفرة وتُمر عبر السيرفر الآمن</p>
        </div>
    </div>
    
    <div class="loading" id="loading">
        ⏳ جاري التحقق من الحساب...
    </div>

    <!-- Import Firebase Modules -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js"
            }
        }
    </script>
    
    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from 'firebase/auth';
        
        // ============================================
        // 🔧 إعدادات Firebase (نفس البيانات الموجودة في الكود المرفق)
        // ============================================
        const firebaseConfig = {
            apiKey: "AlzaSyCvPo4HIsNhyf1WBmTzlr6CdR1c2lQ5sHU",
            authDomain: "boomb-fa3e7.firebaseapp.com",
            databaseURL: "https://boomb-fa3e7-default-rtdb.firebaseio.com",
            projectId: "boomb-fa3e7",
            storageBucket: "boomb-fa3e7.firebasestorage.app",
            messagingSenderId: "499624996530",
            appId: "1:499624996530:web:235f71e450845c748523ab"
        };
        
        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        // عنوان السيرفر
        const SERVER_URL = "https://tank-yf0p.onrender.com";
        
        // عناصر DOM
        const googleBtn = document.getElementById('googleLoginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginContainer = document.getElementById('loginContainer');
        const userInfoDiv = document.getElementById('userInfo');
        const loadingDiv = document.getElementById('loading');
        const errorMessageDiv = document.getElementById('errorMessage');
        const userNameSpan = document.getElementById('userName');
        const userEmailSpan = document.getElementById('userEmail');
        const userAvatarImg = document.getElementById('userAvatar');
        
        // عرض رسالة خطأ
        function showError(message) {
            errorMessageDiv.textContent = message;
            errorMessageDiv.style.display = 'block';
            setTimeout(() => {
                errorMessageDiv.style.display = 'none';
            }, 5000);
        }
        
        // عرض حالة التحميل
        function showLoading(show) {
            loadingDiv.style.display = show ? 'flex' : 'none';
        }
        
        // إرسال التوكن إلى السيرفر للتحقق
        async function authenticateWithServer(idToken, userData) {
            try {
                const response = await fetch(`${SERVER_URL}/api/auth/google`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        idToken: idToken,
                        userData: {
                            uid: userData.uid,
                            email: userData.email,
                            name: userData.displayName,
                            photoURL: userData.photoURL
                        }
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // تخزين معلومات الجلسة
                    localStorage.setItem('user', JSON.stringify({
                        uid: userData.uid,
                        email: userData.email,
                        name: userData.displayName,
                        photoURL: userData.photoURL,
                        token: result.token,
                        balance: result.balance
                    }));
                    
                    // عرض معلومات المستخدم
                    showUserInfo(userData, result.balance);
                    return true;
                } else {
                    showError(result.error || 'فشل المصادقة مع السيرفر');
                    return false;
                }
            } catch (error) {
                console.error('Server auth error:', error);
                showError('لا يمكن الاتصال بالسيرفر. تأكد من اتصالك بالإنترنت');
                return false;
            }
        }
        
        // عرض معلومات المستخدم في الواجهة
        function showUserInfo(userData, balance = 0) {
            loginContainer.style.maxWidth = '480px';
            document.querySelector('.logo h1').style.fontSize = '28px';
            document.querySelector('.logo p').style.display = 'none';
            googleBtn.style.display = 'none';
            userInfoDiv.style.display = 'block';
            
            userNameSpan.textContent = userData.displayName || userData.email.split('@')[0];
            userEmailSpan.textContent = userData.email;
            userAvatarImg.src = userData.photoURL || 'https://ui-avatars.com/api/?background=d4af37&color=fff&bold=true&name=' + encodeURIComponent(userData.displayName || 'User');
            
            // يمكن إضافة رصيد المستخدم هنا إذا أردت
            // userInfoDiv.innerHTML += `<div class="user-balance">💰 الرصيد: ${balance} $</div>`;
        }
        
        // تسجيل الدخول بحساب Google
        async function loginWithGoogle() {
            showLoading(true);
            
            try {
                // فتح نافذة اختيار حساب Google
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const idToken = await user.getIdToken();
                
                console.log('✅ Google login successful:', user.email);
                
                // إرسال التوكن إلى السيرفر للمصادقة
                const authenticated = await authenticateWithServer(idToken, {
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName,
                    photoURL: user.photoURL
                });
                
                if (authenticated) {
                    console.log('✅ Server authentication successful');
                }
                
            } catch (error) {
                console.error('Google login error:', error);
                
                if (error.code === 'auth/popup-blocked') {
                    showError('تم حظر النافذة المنبثقة. يرجى السماح بالنوافذ المنبثقة لهذا الموقع');
                } else if (error.code === 'auth/popup-closed-by-user') {
                    showError('تم إغلاق نافذة تسجيل الدخول قبل اكتمال العملية');
                } else {
                    showError('فشل تسجيل الدخول: ' + (error.message || 'خطأ غير معروف'));
                }
            } finally {
                showLoading(false);
            }
        }
        
        // تسجيل الخروج
        async function logout() {
            showLoading(true);
            
            try {
                // تسجيل الخروج من Firebase
                await signOut(auth);
                
                // إعلام السيرفر بتسجيل الخروج
                const token = localStorage.getItem('user') ? JSON.parse(localStorage.getItem('user')).token : null;
                if (token) {
                    await fetch(`${SERVER_URL}/api/auth/logout`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token })
                    });
                }
                
                // مسح البيانات المحلية
                localStorage.removeItem('user');
                
                // إعادة تعيين الواجهة
                loginContainer.style.maxWidth = '480px';
                document.querySelector('.logo h1').style.fontSize = '42px';
                document.querySelector('.logo p').style.display = 'block';
                googleBtn.style.display = 'flex';
                userInfoDiv.style.display = 'none';
                errorMessageDiv.style.display = 'none';
                
                console.log('✅ Logged out successfully');
                
            } catch (error) {
                console.error('Logout error:', error);
                showError('حدث خطأ أثناء تسجيل الخروج');
            } finally {
                showLoading(false);
            }
        }
        
        // التحقق من حالة تسجيل الدخول عند تحميل الصفحة
        async function checkAuthState() {
            const savedUser = localStorage.getItem('user');
            
            if (savedUser) {
                try {
                    const userData = JSON.parse(savedUser);
                    
                    // التحقق من صحة التوكن مع السيرفر
                    const response = await fetch(`${SERVER_URL}/api/auth/verify`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: userData.token })
                    });
                    
                    const result = await response.json();
                    
                    if (result.valid) {
                        showUserInfo({
                            uid: userData.uid,
                            email: userData.email,
                            displayName: userData.name,
                            photoURL: userData.photoURL
                        }, result.balance);
                    } else {
                        // التوكن غير صالح، مسح البيانات
                        localStorage.removeItem('user');
                    }
                } catch (error) {
                    console.error('Token verification error:', error);
                    localStorage.removeItem('user');
                }
            }
        }
        
        // مراقبة حالة المصادقة في Firebase (للتغييرات)
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // المستخدم مسجل الدخول في Firebase
                console.log('Firebase auth state: user logged in', user.email);
            } else {
                // المستخدم غير مسجل الدخول في Firebase
                console.log('Firebase auth state: user logged out');
            }
        });
        
        // ربط الأحداث
        googleBtn.addEventListener('click', loginWithGoogle);
        logoutBtn.addEventListener('click', logout);
        
        // التحقق من الحالة عند بدء التشغيل
        checkAuthState();
        
        console.log('✅ Google Login UI Ready');
    </script>
</body>
</html>
