<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dwarf Bomber Pro - Multiplayer Client</title>
    <style>
        :root { --primary: #ffaa55; --bg: #0a2f1f; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        /* واجهة المستخدم الاحترافية */
        #game-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        .panel {
            position: absolute; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); border: 1px solid rgba(255,170,85,0.3);
            color: white; padding: 10px 20px; border-radius: 15px; pointer-events: auto;
        }
        #stats { top: 20px; left: 20px; }
        #network-status { top: 20px; right: 20px; font-size: 12px; }
        .ping-good { color: #00ff88; }

        /* التحكم (Mobile First) */
        .joystick-container {
            position: absolute; bottom: 50px; left: 50px;
            width: 120px; height: 120px; background: rgba(255,255,255,0.1);
            border-radius: 50%; pointer-events: auto;
        }
        #stick {
            position: absolute; top: 50%; left: 50%;
            width: 50px; height: 50px; background: var(--primary);
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(255,170,85,0.5);
        }
        .btn-action {
            position: absolute; bottom: 50px; right: 50px;
            width: 80px; height: 80px; background: rgba(255,170,85,0.8);
            border: none; border-radius: 50%; color: white;
            font-weight: bold; pointer-events: auto; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-ui">
        <div id="stats" class="panel">
            <div>اللاعب: <span id="player-name">Dwarf_1</span></div>
            <div>النقاط: <span id="score">0</span></div>
        </div>
        
        <div id="network-status" class="panel">
            <span class="ping-good">●</span> المتصفح (وضع التجربة المحلية)
        </div>

        <div class="joystick-container" id="joy-base">
            <div id="stick"></div>
        </div>

        <button class="btn-action" id="btn-shoot">BOMB</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        /**
         * محرك اللعبة - العميل الاحترافي
         * مصمم ليكون قابل للربط بـ Socket.io بسهولة
         */
        class GameClient {
            constructor() {
                this.initScene();
                this.initLights();
                this.initEntities();
                this.initEventListeners();
                this.render();
            }

            initScene() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x0d1a14);
                this.scene.fog = new THREE.Fog(0x0d1a14, 10, 50);

                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 10, 15);
                
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                document.body.appendChild(this.renderer.domElement);

                // الأرضية بتفاصيل PBR
                const floorGeo = new THREE.PlaneGeometry(100, 100);
                const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a2e23, roughness: 0.8 });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                this.scene.add(floor);
            }

            initLights() {
                const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
                this.scene.add(hemi);

                const dir = new THREE.DirectionalLight(0xffaa55, 1);
                dir.position.set(5, 10, 7);
                dir.castShadow = true;
                this.scene.add(dir);
            }

            initEntities() {
                // مصفوفة لتخزين اللاعبين الآخرين عند الربط بالسيرفر
                this.remotePlayers = {}; 
                
                // اللاعب المحلي (Placeholder ككتلة احترافية لحين تحميل الموديل)
                this.player = new THREE.Group();
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(1, 2, 1),
                    new THREE.MeshStandardMaterial({ color: 0xffaa55 })
                );
                body.position.y = 1;
                body.castShadow = true;
                this.player.add(body);
                this.scene.add(this.player);

                // حالة اللاعب (Local State)
                this.input = { forward: 0, side: 0 };
                this.velocity = new THREE.Vector3();
            }

            initEventListeners() {
                // نظام الجويستيك (Logic)
                const base = document.getElementById('joy-base');
                const stick = document.getElementById('stick');
                let active = false;

                const handleMove = (e) => {
                    if (!active) return;
                    const rect = base.getBoundingClientRect();
                    const touch = e.touches ? e.touches[0] : e;
                    const dx = touch.clientX - (rect.left + rect.width/2);
                    const dy = touch.clientY - (rect.top + rect.height/2);
                    const dist = Math.min(Math.hypot(dx, dy), 50);
                    const angle = Math.atan2(dy, dx);

                    stick.style.left = `calc(50% + ${Math.cos(angle) * dist}px)`;
                    stick.style.top = `calc(50% + ${Math.sin(angle) * dist}px)`;

                    this.input.side = Math.cos(angle) * (dist / 50);
                    this.input.forward = -Math.sin(angle) * (dist / 50);
                };

                base.addEventListener('mousedown', () => active = true);
                window.addEventListener('mouseup', () => {
                    active = false;
                    stick.style.left = '50%'; stick.style.top = '50%';
                    this.input = { forward: 0, side: 0 };
                });
                window.addEventListener('mousemove', handleMove);
                
                // Touch events
                base.addEventListener('touchstart', (e) => { active = true; handleMove(e); });
                window.addEventListener('touchmove', handleMove);
                window.addEventListener('touchend', () => { 
                    active = false; 
                    this.input = { forward: 0, side: 0 };
                });

                document.getElementById('btn-shoot').onclick = () => this.spawnBomb();
            }

            spawnBomb() {
                // في النسخة النهائية، هذا الأمر سيرسل للسيرفر
                console.log("إرسال طلب إطلاق قنبلة للسيرفر...");
                const bomb = new THREE.Mesh(
                    new THREE.SphereGeometry(0.3),
                    new THREE.MeshStandardMaterial({ color: 0x333333, emissive: 0xff0000 })
                );
                bomb.position.copy(this.player.position).add(new THREE.Vector3(0, 1, 0));
                this.scene.add(bomb);
                
                // تحريك وهمي محلي للتجربة
                const dir = new THREE.Vector3(0, 5, -10).applyQuaternion(this.player.quaternion);
                let t = 0;
                const interval = setInterval(() => {
                    t += 0.05;
                    bomb.position.x += dir.x * 0.05;
                    bomb.position.z += dir.z * 0.05;
                    bomb.position.y = 1 + (dir.y * t) - (0.5 * 9.8 * t * t);
                    
                    if (bomb.position.y <= 0) {
                        this.scene.remove(bomb);
                        clearInterval(interval);
                    }
                }, 20);
            }

            update(delta) {
                // Client-Side Prediction: حرك اللاعب محلياً فوراً
                const speed = 0.15;
                if (Math.abs(this.input.forward) > 0.1 || Math.abs(this.input.side) > 0.1) {
                    this.player.position.x += this.input.side * speed;
                    this.player.position.z -= this.input.forward * speed;
                    
                    // تدوير اللاعب نحو اتجاه الحركة
                    const targetAngle = Math.atan2(this.input.side, this.input.forward);
                    this.player.rotation.y = targetAngle;
                }

                // الكاميرا تتبع اللاعب بنعومة (Lerp)
                const idealOffset = new THREE.Vector3(0, 10, 12);
                idealOffset.applyQuaternion(this.player.quaternion);
                idealOffset.add(this.player.position);
                this.camera.position.lerp(idealOffset, 0.1);
                this.camera.lookAt(this.player.position);
            }

            render() {
                requestAnimationFrame(() => this.render());
                this.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        // تشغيل اللعبة
        const game = new GameClient();

        window.addEventListener('resize', () => {
            game.camera.aspect = window.innerWidth / window.innerHeight;
            game.camera.updateProjectionMatrix();
            game.renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
