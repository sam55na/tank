<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحارب الناعم - مفاصل انسيابية</title>
    <style>
        body { margin: 0; overflow: hidden; background: #ffffff; }
        #label {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #2c3e50; font-family: 'Segoe UI', sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="label">
        <h2 style="margin:0">SMOOTH ARMOR UNIT</h2>
        <p style="margin:5px 0; opacity:0.6">تم تنعيم الحواف ونقاط الالتقاء</p>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.149.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.149.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 4, 9);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // إضاءة ناعمة (Studio Lighting)
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // المواد (ألوان متناسقة ناعمة)
        const matMain = new THREE.MeshStandardMaterial({ color: 0x34495e, metalness: 0.5, roughness: 0.4 });
        const matSoft = new THREE.MeshStandardMaterial({ color: 0x2c3e50, metalness: 0.7, roughness: 0.2 });
        const matGlow = new THREE.MeshBasicMaterial({ color: 0x00d4ff });

        const character = new THREE.Group();
        scene.add(character);

        // --- 1. الجذع العريض المنسجم ---
        // استخدام كبسولة عريضة تعطي شكل الصدر والخصر كقطعة واحدة ناعمة
        const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.7, 1.2, 10, 20), matMain);
        torso.position.y = 2.0;
        character.add(torso);

        // --- 2. الرأس المدمج ---
        const head = new THREE.Mesh(new THREE.CapsuleGeometry(0.35, 0.2, 10, 20), matMain);
        head.position.y = 3.2; // تداخل مع أعلى الكبسولة (الجذع)
        character.add(head);

        const eye = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.05, 4, 10), matGlow);
        eye.rotation.z = Math.PI / 2;
        eye.position.set(0, 3.3, 0.3);
        character.add(eye);

        // --- 3. الأطراف (تستخدم الكبسولات للتنعيم) ---
        function createSmoothLimb(side, isArm) {
            const limb = new THREE.Group();
            
            // الجزء العلوي (العضد أو الفخذ)
            const upper = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.8, 10, 20), matSoft);
            upper.position.y = -0.4;
            limb.add(upper);

            // الجزء السفلي (الساعد أو الساق) - تداخل مع المفصل
            const lower = new THREE.Mesh(new THREE.CapsuleGeometry(0.22, 0.8, 10, 20), matMain);
            lower.position.y = -1.2;
            limb.add(lower);

            // تعديل الموقع حسب النوع (ذراع أو رجل)
            if (isArm) {
                limb.position.set(side * 1.0, 2.6, 0);
                limb.rotation.z = side * 0.15;
            } else {
                limb.position.set(side * 0.45, 1.4, 0);
                // إضافة قدم بسيطة ناعمة
                const foot = new THREE.Mesh(new THREE.CapsuleGeometry(0.2, 0.4, 10, 20), matSoft);
                foot.rotation.x = Math.PI / 2;
                foot.position.set(0, -1.8, 0.2);
                limb.add(foot);
            }
            
            return limb;
        }

        character.add(createSmoothLimb(1, true));  // ذراع يمين
        character.add(createSmoothLimb(-1, true)); // ذراع يسار
        character.add(createSmoothLimb(1, false)); // رجل يمين
        character.add(createSmoothLimb(-1, false));// رجل يسار

        // --- حلقة التحريك ---
        function animate() {
            requestAnimationFrame(animate);
            character.rotation.y += 0.005;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
