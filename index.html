<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المحارب المدرع - فيزياء احترافية</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #fff; font-family: sans-serif; }
        #info-panel { position: absolute; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 10px; border-left: 5px solid #d35400; z-index: 100; direction: rtl; }
        #controls-panel { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 100; }
        .ctrl-btn { background: #1e2a3a; color: #fff; border: none; border-radius: 8px; padding: 12px 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .ctrl-btn:hover { background: #d35400; }
        .ctrl-btn.active { background: #d35400; box-shadow: 0 0 15px rgba(211, 84, 0, 0.5); }
        #state-label { position: absolute; top: 20px; right: 20px; background: #1e2a3a; color: #f39c12; padding: 10px 20px; border-radius: 8px; font-weight: bold; z-index: 100; }
    </style>
</head>
<body>
    <div id="info-panel">
        <h3 style="margin:0">⚔️ HEAVY VANGUARD</h3>
        <p style="margin:5px 0 0; font-size:12px;">محاكاة فيزيائية متطورة • حركية الأطراف المتعددة</p>
    </div>
    <div id="state-label">🧍 وقوف</div>
    <div id="controls-panel">
        <button class="ctrl-btn" id="btn-idle">🧍 وقوف</button>
        <button class="ctrl-btn" id="btn-run">🏃 ركض</button>
        <button class="ctrl-btn" id="btn-jump">⬆️ قفز</button>
        <button class="ctrl-btn" id="btn-throw">🎯 رمي</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // الإعدادات الأساسية
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f2f5);
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 5, 12);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // الإضاءة
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(5, 10, 7);
        sun.castShadow = true;
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // المواد
        const matArmor = new THREE.MeshStandardMaterial({ color: 0x2c3e50, metalness: 0.8, roughness: 0.2 });
        const matJoint = new THREE.MeshStandardMaterial({ color: 0xd35400, metalness: 0.5 });
        const matGlow  = new THREE.MeshStandardMaterial({ color: 0x00d4ff, emissive: 0x00d4ff, emissiveIntensity: 2 });

        // بناء الشخصية (هيكل ميكانيكي)
        const character = new THREE.Group();
        scene.add(character);

        const torso = new THREE.Group();
        character.add(torso);
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.5, 1.2, 16), matArmor);
        body.position.y = 2.0; body.castShadow = true;
        torso.add(body);

        const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), matArmor);
        head.position.y = 2.8; head.castShadow = true;
        torso.add(head);

        // وظيفة بناء الأطراف
        function createLimb(x, y, isArm) {
            const group = new THREE.Group();
            group.position.set(x, y, 0);
            const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 0.8), matArmor);
            upper.position.y = -0.4;
            group.add(upper);

            const lowerGroup = new THREE.Group();
            lowerGroup.position.y = -0.8;
            const joint = new THREE.Mesh(new THREE.SphereGeometry(0.18), matJoint);
            lowerGroup.add(joint);
            const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.12, 0.8), matArmor);
            lower.position.y = -0.4;
            lowerGroup.add(lower);
            
            group.add(lowerGroup);
            return { main: group, lower: lowerGroup };
        }

        const rArm = createLimb(0.9, 2.5, true);
        const lArm = createLimb(-0.9, 2.5, true);
        const rLeg = createLimb(0.4, 1.4, false);
        const lLeg = createLimb(-0.4, 1.4, false);

        torso.add(rArm.main, lArm.main);
        character.add(rLeg.main, lLeg.main);

        // الأرضية
        const grid = new THREE.GridHelper(20, 20);
        grid.position.y = -0.1;
        scene.add(grid);

        // نظام التحريك الفيزيائي
        let state = 'idle';
        let time = 0;
        const lerp = (a, b, t) => a + (b - a) * t;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;
            const speed = 0.15; // سرعة الانتقال بين الحالات

            if (state === 'idle') {
                const breathing = Math.sin(time * 1.5) * 0.05;
                torso.position.y = lerp(torso.position.y, breathing, speed);
                rArm.main.rotation.x = lerp(rArm.main.rotation.x, 0.2, speed);
                lArm.main.rotation.x = lerp(lArm.main.rotation.x, 0.2, speed);
                rLeg.main.rotation.x = lerp(rLeg.main.rotation.x, 0, speed);
                lLeg.main.rotation.x = lerp(lLeg.main.rotation.x, 0, speed);
                rLeg.lower.rotation.x = lerp(rLeg.lower.rotation.x, 0, speed);
                lLeg.lower.rotation.x = lerp(lLeg.lower.rotation.x, 0, speed);
                character.rotation.y += 0.005;
            } 
            
            else if (state === 'run') {
                const runSpeed = 8;
                const cycle = time * runSpeed;
                
                // حركة الجذع (ميلان للأمام مع ارتداد)
                torso.rotation.x = 0.2 + Math.sin(cycle * 2) * 0.05;
                torso.position.y = Math.abs(Math.sin(cycle)) * 0.2;
                
                // الأرجل (حركة دائرية فيزيائية)
                rLeg.main.rotation.x = Math.sin(cycle) * 0.8;
                lLeg.main.rotation.x = Math.sin(cycle + Math.PI) * 0.8;
                
                // ثني الركبة الطبيعي (فقط عند العودة للخلف)
                rLeg.lower.rotation.x = Math.max(0, Math.sin(cycle - 1.5)) * 1.2;
                lLeg.lower.rotation.x = Math.max(0, Math.sin(cycle + Math.PI - 1.5)) * 1.2;
                
                // الأذرع (تأرجح عكسي مع ثني المرفق)
                rArm.main.rotation.x = Math.sin(cycle + Math.PI) * 0.6;
                lArm.main.rotation.x = Math.sin(cycle) * 0.6;
                rArm.lower.rotation.x = -0.8;
                lArm.lower.rotation.x = -0.8;
            }

            else if (state === 'jump') {
                const jumpTime = (time * 5) % Math.PI;
                const h = Math.sin(jumpTime) * 2;
                character.position.y = h;
                
                // وضعية الانكماش في الهواء
                const tuck = h > 0.5 ? 0.8 : 0;
                rLeg.main.rotation.x = lerp(rLeg.main.rotation.x, -tuck, 0.2);
                lLeg.main.rotation.x = lerp(lLeg.main.rotation.x, -tuck, 0.2);
                rLeg.lower.rotation.x = lerp(rLeg.lower.rotation.x, tuck * 1.5, 0.2);
                
                if (h < 0.1 && time > 0.5) state = 'idle';
            }

            else if (state === 'throw') {
                const throwCycle = (time * 4) % 10;
                if (throwCycle < 3) { // الاستعداد (Wind-up)
                    rArm.main.rotation.x = lerp(rArm.main.rotation.x, -2, 0.1);
                    torso.rotation.y = lerp(torso.rotation.y, 0.5, 0.1);
                } else if (throwCycle < 5) { // الإطلاق (Release)
                    rArm.main.rotation.x = lerp(rArm.main.rotation.x, 1.5, 0.4);
                    torso.rotation.y = lerp(torso.rotation.y, -0.3, 0.4);
                } else {
                    state = 'idle';
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // التحكم
        const setBtn = (id) => {
            document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        document.getElementById('btn-idle').onclick = () => { state = 'idle'; setBtn('btn-idle'); document.getElementById('state-label').innerText = '🧍 وقوف'; };
        document.getElementById('btn-run').onclick = () => { state = 'run'; setBtn('btn-run'); document.getElementById('state-label').innerText = '🏃 ركض'; };
        document.getElementById('btn-jump').onclick = () => { state = 'jump'; time = 0; setBtn('btn-jump'); document.getElementById('state-label').innerText = '⬆️ قفز'; };
        document.getElementById('btn-throw').onclick = () => { state = 'throw'; time = 0; setBtn('btn-throw'); document.getElementById('state-label').innerText = '🎯 رمي'; };

        animate();
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
