<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dwarf Bomber Pro - Smart Camera</title>
    <style>
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #050f0a; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .zone { position: absolute; height: 100%; width: 50%; pointer-events: auto; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }

        /* Joystick */
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 110px; height: 110px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,170,68,0.4); border-radius: 50%; backdrop-filter: blur(5px); }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: radial-gradient(circle, #ffcc66, #ffaa33); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px rgba(255,170,68,0.5); }

        /* Distance Slider */
        #dist-wrapper { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 40px; height: 200px; background: rgba(0,0,0,0.7); border-radius: 20px; border: 1px solid #ffaa33; display: flex; flex-direction: column; align-items: center; padding: 10px 0; }
        #dist-slider { appearance: none; width: 160px; height: 8px; background: #222; border-radius: 5px; transform: rotate(-90deg); margin-top: 75px; cursor: pointer; }
        #dist-slider::-webkit-slider-thumb { appearance: none; width: 22px; height: 22px; background: #ffaa33; border-radius: 50%; border: 2px solid #fff; }

        /* Action Buttons */
        #actions { position: absolute; bottom: 40px; right: 30px; display: flex; flex-direction: column; gap: 20px; }
        .btn { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #ffaa33; background: rgba(0,0,0,0.6); color: white; font-size: 28px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .btn:active { background: #ffaa33; transform: scale(0.9); }
        #throw-btn { width: 90px; height: 90px; border-width: 3px; font-size: 35px; background: rgba(230, 57, 70, 0.4); }

        #hud { position: absolute; top: 20px; width: 100%; text-align: center; color: #ffaa33; font-weight: bold; pointer-events: none; z-index: 20; text-shadow: 2px 2px #000; font-family: monospace; }
    </style>
</head>
<body>

    <div id="hud">TARGET DISTANCE: <span id="dist-val">12</span>m | SCORE: <span id="score">0</span></div>

    <div id="ui-layer">
        <div id="left-zone" class="zone">
            <div id="dist-wrapper">
                <input type="range" id="dist-slider" min="5" max="20" value="12">
            </div>
            <div id="joy-base"><div id="joy-stick"></div></div>
        </div>
        <div id="right-zone" class="zone">
            <div id="actions">
                <button class="btn" id="jump-btn">🦘</button>
                <button class="btn" id="throw-btn">💣</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- الأساسيات ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a140f);
        scene.fog = new THREE.FogExp2(0x0a140f, 0.04);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // الإضاءة
        const ambient = new THREE.AmbientLight(0x404040, 0.8);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        // الأرضية
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x1a2e1a }));
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);
        scene.add(new THREE.GridHelper(200, 50, 0x225522, 0x112211));

        // --- بناء الشخصية (War Gnome) ---
        const player = new THREE.Group();
        // الجسم (درع)
        const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.9, 0.6), new THREE.MeshStandardMaterial({color: 0x444444}));
        torso.position.y = 0.8;
        player.add(torso);
        // الرأس والخوذة
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        head.position.y = 1.4;
        player.add(head);
        const helmet = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.5, 8), new THREE.MeshStandardMaterial({color: 0x666666}));
        helmet.position.y = 1.7;
        player.add(helmet);
        // اليدين
        const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.6), new THREE.MeshStandardMaterial({color: 0x444444}));
        armL.position.set(-0.5, 1, 0);
        player.add(armL);
        const armR = armL.clone();
        armR.position.x = 0.5;
        player.add(armR);

        scene.add(player);

        // مؤشر الهدف
        const targetMarker = new THREE.Mesh(
            new THREE.RingGeometry(0.5, 0.8, 32),
            new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.7, side: THREE.DoubleSide })
        );
        targetMarker.rotation.x = -Math.PI/2;
        scene.add(targetMarker);

        // --- المتغيرات والتحكم ---
        let moveInput = { x: 0, y: 0 };
        let camControl = { yaw: 0, pitch: 0.3, isManual: false };
        let bombDist = 12;
        let score = 0;
        let particles = [];
        let isJumping = false;
        let yVel = 0;

        const touches = {};
        
        // معالجة اللمس المتعدد
        const handleTouch = (e) => {
            for(let t of e.changedTouches) {
                if(e.type === 'touchstart') touches[t.identifier] = { x: t.clientX, y: t.clientY };
                
                if(t.clientX < window.innerWidth / 2) {
                    // الجويستك
                    if(t.target.id === 'joy-stick' || t.target.id === 'joy-base') {
                        const base = document.getElementById('joy-base').getBoundingClientRect();
                        const bx = base.left + 55, by = base.top + 55;
                        const dx = t.clientX - bx, dy = t.clientY - by;
                        const d = Math.min(Math.hypot(dx, dy), 50);
                        const angle = Math.atan2(dy, dx);
                        moveInput.x = (Math.cos(angle) * d) / 50;
                        moveInput.y = (Math.sin(angle) * d) / 50;
                        document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${Math.cos(angle)*d}px), calc(-50% + ${Math.sin(angle)*d}px))`;
                    }
                } else {
                    // الكاميرا (يمين)
                    if(e.type === 'touchmove') {
                        const start = touches[t.identifier];
                        const dx = t.clientX - start.x;
                        const dy = t.clientY - start.y;
                        camControl.yaw -= dx * 0.007;
                        camControl.pitch = Math.max(-0.4, Math.min(0.8, camControl.pitch - dy * 0.007));
                        camControl.isManual = true;
                        start.x = t.clientX;
                        start.y = t.clientY;
                    }
                }
            }
        };

        window.addEventListener('touchstart', handleTouch);
        window.addEventListener('touchmove', handleTouch);
        window.addEventListener('touchend', (e) => {
            for(let t of e.changedTouches) {
                delete touches[t.identifier];
                if(t.clientX < window.innerWidth / 2) {
                    moveInput = { x: 0, y: 0 };
                    document.getElementById('joy-stick').style.transform = 'translate(-50%, -50%)';
                } else {
                    camControl.isManual = false; // العودة للوضع التلقائي عند ترك الشاشة
                }
            }
        });

        document.getElementById('dist-slider').oninput = (e) => {
            bombDist = e.target.value;
            document.getElementById('dist-val').innerText = bombDist;
        };

        document.getElementById('jump-btn').ontouchstart = () => { if(!isJumping) { isJumping = true; yVel = 0.28; } };
        document.getElementById('throw-btn').ontouchstart = throwBomb;

        // --- القنبلة والانفجار ---
        function throwBomb() {
            const bomb = new THREE.Group();
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshStandardMaterial({color: 0x222, metalness: 0.8}));
            sphere.castShadow = true;
            bomb.add(sphere);
            // فتيل
            const fuse = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.2), new THREE.MeshStandardMaterial({color: 0xff0000}));
            fuse.position.y = 0.35;
            bomb.add(fuse);

            bomb.position.copy(player.position).add(new THREE.Vector3(0, 1.2, 0));
            scene.add(bomb);
            
            const start = bomb.position.clone();
            const end = targetMarker.position.clone();
            let p = 0;
            const throwAnim = () => {
                p += 0.025;
                if(p >= 1) { explode(end); scene.remove(bomb); return; }
                bomb.position.lerpVectors(start, end, p);
                bomb.position.y += Math.sin(p * Math.PI) * 5;
                bomb.rotation.x += 0.2;
                requestAnimationFrame(throwAnim);
            };
            throwAnim();
        }

        function explode(pos) {
            // وميض
            const flash = new THREE.PointLight(0xffaa00, 5, 10);
            flash.position.copy(pos).y += 1;
            scene.add(flash);
            setTimeout(() => scene.remove(flash), 150);

            // جزيئات الانفجار
            for(let i=0; i<20; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color: 0xff6600}));
                p.position.copy(pos);
                const vel = new THREE.Vector3((Math.random()-0.5)*0.5, Math.random()*0.6, (Math.random()-0.5)*0.5);
                scene.add(p);
                particles.push({ mesh: p, vel: vel, life: 1.0 });
            }
            score += 10;
            document.getElementById('score').innerText = score;
        }

        // --- التحديث المستمر ---
        function animate() {
            requestAnimationFrame(animate);

            // الحركة والكاميرا التلقائية
            if(moveInput.x !== 0 || moveInput.y !== 0) {
                const speed = 0.18;
                const forward = new THREE.Vector3(Math.sin(camControl.yaw), 0, Math.cos(camControl.yaw));
                const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), forward);
                
                player.position.addScaledVector(forward, -moveInput.y * speed);
                player.position.addScaledVector(side, moveInput.x * speed);
                
                // تدوير اللاعب
                const targetAngle = Math.atan2(moveInput.x, -moveInput.y) + camControl.yaw;
                player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, targetAngle, 0.1);

                // الكاميرا تتبع اللاعب تلقائياً إذا لم يكن هناك تحكم يدوي
                if(!camControl.isManual) {
                    camControl.yaw = THREE.MathUtils.lerp(camControl.yaw, player.rotation.y, 0.05);
                }
            }

            // الجاذبية والقفز
            if(isJumping) {
                player.position.y += yVel;
                yVel -= 0.015;
                if(player.position.y <= 0) { player.position.y = 0; isJumping = false; }
            }

            // وضعية الكاميرا الاحترافية (خلف وأعلى)
            const offset = new THREE.Vector3(
                -Math.sin(camControl.yaw) * 7 * Math.cos(camControl.pitch),
                4 + Math.sin(camControl.pitch) * 7,
                -Math.cos(camControl.yaw) * 7 * Math.cos(camControl.pitch)
            );
            camera.position.copy(player.position).add(offset);
            camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z);

            // تحديث مؤشر الهدف
            const dir = new THREE.Vector3(0,0,1).applyQuaternion(player.quaternion);
            targetMarker.position.set(player.position.x + dir.x * bombDist, 0.05, player.position.z + dir.z * bombDist);
            targetMarker.material.opacity = 0.3 + Math.sin(Date.now()*0.01)*0.3;

            // تحديث الجزيئات
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.vel);
                p.vel.y -= 0.02;
                p.life -= 0.02;
                p.mesh.scale.setScalar(p.life);
                if(p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
