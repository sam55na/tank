<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Battle Tanks Elite - معركة الدبابات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: linear-gradient(145deg, #0a0f1a 0%, #05070c 100%);
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            position: fixed;
            top: 0;
            left: 0;
            object-fit: cover;
        }
        
        /* باقي الـ CSS كما هو - تم حذفه للاختصار ولكن سيتم تضمينه كاملاً */
        .login-screen, .main-screen, .lobby, .admin-panel, .report-screen, .hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .login-screen {
            background: radial-gradient(circle at 30% 10%, #1e2a3a, #0a0f1f);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-container {
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(25px);
            padding: 40px 30px;
            border-radius: 48px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.5);
        }
        
        .login-container h1 {
            color: #d4af37;
            font-size: clamp(24px, 8vw, 36px);
            margin-bottom: 10px;
        }
        
        .login-container p {
            color: #8a9aa8;
            margin-bottom: 20px;
        }
        
        .login-container input {
            width: 100%;
            padding: 16px 20px;
            margin: 10px 0;
            border-radius: 60px;
            background: rgba(20, 28, 40, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: white;
            font-size: 16px;
            outline: none;
        }
        
        .login-container button {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: linear-gradient(105deg, #d4af37, #b8860b);
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .login-container button:active {
            transform: scale(0.97);
        }
        
        .switch-btn {
            background: transparent !important;
            border: 1px solid #d4af37 !important;
            margin-top: 10px;
        }
        
        .main-screen {
            background: linear-gradient(145deg, #0f1725, #070b14);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 900;
        }
        
        .main-screen h2 {
            color: #d4af37;
            font-size: clamp(24px, 8vw, 36px);
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            text-align: center;
            padding: 0 20px;
        }
        
        .btn-group {
            display: flex;
            gap: 20px;
            margin: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .play-btn, .wallet-btn {
            padding: clamp(12px, 4vw, 18px) clamp(25px, 8vw, 40px);
            border: none;
            border-radius: 60px;
            font-size: clamp(18px, 5vw, 24px);
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        
        .play-btn {
            background: linear-gradient(135deg, #d4af37, #b8860b);
        }
        
        .wallet-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }
        
        .admin-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            position: absolute;
            top: 20px;
            right: 20px;
            display: none;
            transition: transform 0.2s;
            z-index: 100;
        }
        
        .user-card {
            background: rgba(255,255,255,0.1);
            padding: 15px 30px;
            border-radius: 50px;
            margin-top: 30px;
            text-align: center;
            color: white;
            backdrop-filter: blur(5px);
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 20px 40px;
            border-radius: 60px;
            color: #d4af37;
            display: none;
            z-index: 10001;
            font-size: 18px;
        }
        
        .lobby {
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .lobby-container {
            background: linear-gradient(145deg, #111a24, #0a0f18);
            padding: clamp(20px, 5vw, 30px);
            border-radius: 48px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 2px solid #d4af37;
        }
        
        .hud {
            pointer-events: none;
            z-index: 100;
            display: none;
        }
        
        .status-bar {
            position: absolute;
            top: clamp(10px, 3vh, 20px);
            left: clamp(10px, 3vw, 20px);
            background: rgba(0,0,0,0.8);
            padding: clamp(6px, 2vw, 8px) clamp(12px, 3vw, 16px);
            border-left: 4px solid #d4af37;
            border-radius: 16px;
            color: white;
            font-size: clamp(10px, 3vw, 14px);
            backdrop-filter: blur(4px);
        }
        
        .team-info {
            position: absolute;
            top: clamp(10px, 3vh, 20px);
            right: clamp(10px, 3vw, 20px);
            background: rgba(0,0,0,0.8);
            padding: clamp(6px, 2vw, 8px) clamp(12px, 3vw, 16px);
            border-radius: 16px;
            text-align: right;
            color: white;
            font-size: clamp(10px, 3vw, 14px);
        }
        
        .cooldown-side {
            position: absolute;
            top: clamp(60px, 10vh, 80px);
            right: clamp(10px, 3vw, 20px);
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: clamp(10px, 3vw, 12px);
            color: #d4af37;
            font-weight: bold;
            pointer-events: none;
        }
        
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: clamp(30px, 5vw, 36px);
            height: clamp(30px, 5vw, 36px);
        }
        
        .controls {
            position: absolute;
            bottom: clamp(20px, 5vh, 30px);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 clamp(10px, 5vw, 20px);
            pointer-events: none;
        }
        
        .joystick-base {
            width: clamp(80px, 20vw, 120px);
            height: clamp(80px, 20vw, 120px);
            background: rgba(0,0,0,0.6);
            border: 2px solid #d4af37;
            border-radius: 70px;
            position: relative;
            pointer-events: auto;
        }
        
        .joystick-handle {
            width: clamp(35px, 10vw, 52px);
            height: clamp(35px, 10vw, 52px);
            background: radial-gradient(circle, #d4af37, #b8860b);
            border-radius: 30px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        
        .fire-btn {
            width: clamp(60px, 15vw, 80px);
            height: clamp(60px, 15vw, 80px);
            background: radial-gradient(circle, #e55, #a22);
            border: 2px solid #d4af37;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(28px, 6vw, 36px);
            color: white;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 0 12px rgba(255,0,0,0.4);
            transition: transform 0.05s;
        }
        
        .elimination-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            background-color: rgba(0,0,0,0.9);
            color: #ff4444;
            padding: clamp(15px,4vw,20px) clamp(25px,6vw,40px);
            border-radius: 30px;
            font-size: clamp(18px,5vw,24px);
            font-weight: bold;
            z-index: 10000;
            text-align: center;
            border: 2px solid #ff4444;
            animation: fadeOut 3s ease-in-out;
            white-space: nowrap;
        }
        
        @keyframes fadeOut {
            0% { opacity: 0; transform: translate(-50%,-50%) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
            80% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%,-50%) scale(0.8); }
        }
        
        .admin-panel {
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        
        .admin-container {
            background: linear-gradient(135deg, #121926, #080c14);
            padding: clamp(20px, 5vw, 30px);
            border-radius: 40px;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid #d4af37;
        }
    </style>
</head>

        {
            "imports": {

    <script type="module">
        import * as THREE from 'three';
        import io from 'socket.io-client';
        
        // ==================== تحسينات الأداء ====================
        // إعدادات الأداء العالية
        const PERFORMANCE_CONFIG = {
            maxParticles: 200,        // الحد الأقصى للجزيئات
            particleLifetime: 0.8,     // عمر الجزيئات
            updateRate: 60,            // معدل التحديث
            interpolationSpeed: 0.25,  // سرعة الاستيفاء (لحركة سلسة)
            networkUpdateInterval: 50,  // تحديث الشبكة كل 50ms
        };
        
        // ==================== Firebase Config ====================
        const firebaseConfig = {
            apiKey: "AIzaSyB2xQG9w8LzqLxYvqW5yV5pY7xL5xV5xY",
            authDomain: "boomb-fa3e7.firebaseapp.com",
            databaseURL: "https://boomb-fa3e7-default-rtdb.firebaseio.com",
            projectId: "boomb-fa3e7",
            storageBucket: "boomb-fa3e7.firebasestorage.app",
            messagingSenderId: "499624996530",
            appId: "1:499624996530:web:235f71e450845c748523ab"
        };
        
        // ==================== Audio Engine ====================
        class AudioEngine {
            constructor() { 
                this.ctx = null; 
                this.engineOsc = null; 
                this.engineGain = null;
            }
            
            init() { 
                if (this.ctx) return; 
                try { 
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {}
            }
            
            startEngine() { 
                if (!this.ctx) this.init(); 
                if (this.engineOsc) return; 
                try { 
                    this.engineOsc = this.ctx.createOscillator(); 
                    this.engineGain = this.ctx.createGain(); 
                    const filter = this.ctx.createBiquadFilter(); 
                    this.engineOsc.type = 'sawtooth';
                    this.engineOsc.frequency.value = 42; 
                    filter.type = 'lowpass'; 
                    filter.frequency.value = 180;
                    this.engineGain.gain.value = 0.08; 
                    this.engineOsc.connect(filter);
                    filter.connect(this.engineGain); 
                    this.engineGain.connect(this.ctx.destination);
                    this.engineOsc.start(); 
                } catch(e) {}
            }
            
            updateEngine(speed) { 
                if (!this.engineOsc) return; 
                const freq = 42 + speed * 40;
                this.engineOsc.frequency.setTargetAtTime(freq, this.ctx.currentTime, 0.05);
                this.engineGain.gain.setTargetAtTime(0.08 + speed * 0.1, this.ctx.currentTime, 0.05);
            }
            
            fire() { 
                if (!this.ctx) return; 
                const now = this.ctx.currentTime; 
                const osc = this.ctx.createOscillator(); 
                const gain = this.ctx.createGain(); 
                osc.type = 'square';
                osc.frequency.setValueAtTime(170, now);
                osc.frequency.exponentialRampToValueAtTime(55, now + 0.28);
                gain.gain.setValueAtTime(0.7, now); 
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.32); 
                osc.connect(gain); 
                gain.connect(this.ctx.destination); 
                osc.start(now); 
                osc.stop(now + 0.32);
            }
            
            explosion(distance) { 
                if (!this.ctx) return; 
                const vol = Math.max(0.2, Math.min(0.9, 1 - distance / 60)); 
                const now = this.ctx.currentTime; 
                const noise = this.ctx.createBufferSource();
                const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * 1.0, this.ctx.sampleRate); 
                const data = buffer.getChannelData(0); 
                for (let i = 0; i < buffer.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / buffer.length, 1.3); 
                noise.buffer = buffer; 
                const gain = this.ctx.createGain(); 
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1.0); 
                noise.connect(gain);
                gain.connect(this.ctx.destination); 
                noise.start(now);
            }
        }
        
        // ==================== Game Simulation with Interpolation ====================
        class GameSimulation {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.tanks = new Map();
                this.bullets = [];
                this.playerTank = null;
                this.joystick = { x: 0, y: 0 };
                this.cameraShake = 0;
                this.lastShot = 0;
                this.obstacles = [];
                this.particles = [];
                this.team1Count = 0;
                this.team2Count = 0;
                this.playerTeam = null;
                this.otherPlayers = new Map();
                this.gameActive = false;
                this.isEliminated = false;
                this.lastMoveTime = 0;
                this.playerId = null;
                
                // تحسين: تخزين بيانات الاستيفاء للاعبين الآخرين
                this.otherPlayersData = new Map(); // { targetPosition, targetRotation, currentPosition, currentRotation, lastUpdateTime }
            }
            
            init() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
                this.renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.shadowMap.enabled = true;
                this.scene.background = new THREE.Color(0x1a2a3a);
                this.scene.fog = new THREE.FogExp2(0x1a2a3a, 0.0018);
                
                const ambient = new THREE.AmbientLight(0xffff, 0.6);
                this.scene.add(ambient);
                const sun = new THREE.DirectionalLight(0xffeedd, 1.4);
                sun.position.set(50, 70, 40);
                sun.castShadow = true;
                sun.shadow.mapSize.set(1024, 1024);
                this.scene.add(sun);
                
                this.createTerrain();
                this.createObstacles();
                
                window.addEventListener('resize', () => this.onWindowResize());
                this.animate();
            }
            
            onWindowResize() {
                if (this.camera && this.renderer) {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                }
            }
            
            createTerrain() {
                const geo = new THREE.PlaneGeometry(450, 450, 60, 60);
                geo.rotateX(-Math.PI / 2);
                const groundMat = new THREE.MeshStandardMaterial({ color: 0x6a5a4a, roughness: 0.9, metalness: 0.05 });
                const ground = new THREE.Mesh(geo, groundMat);
                ground.receiveShadow = true;
                this.scene.add(ground);
                
                const gridHelper = new THREE.GridHelper(460, 50, 0x8a8a7a, 0x5a5a4a);
                gridHelper.position.y = 0.03;
                this.scene.add(gridHelper);
            }
            
            createObstacles() {
                const rockMat = new THREE.MeshStandardMaterial({ color: 0x6a6a5a, roughness: 0.75 });
                const positions = [
                    { x: -45, z: -20 }, { x: -30, z: 40 }, { x: -10, z: -55 }, { x: 15, z: -35 },
                    { x: 40, z: -15 }, { x: 55, z: 25 }, { x: 35, z: 55 }, { x: -25, z: -45 },
                    { x: -55, z: 15 }, { x: 5, z: 60 }, { x: 70, z: -25 }, { x: -60, z: -40 },
                    { x: -40, z: 65 }, { x: 25, z: -65 }, { x: 50, z: 45 }, { x: -50, z: 55 }
                ];
                
                positions.forEach(pos => {
                    const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(1, 2), rockMat);
                    rock.scale.set(1.8, 1.5, 1.8);
                    rock.position.set(pos.x, 0.6, pos.z);
                    rock.castShadow = true;
                    this.scene.add(rock);
                    this.obstacles.push(rock);
                });
            }
            
            createTank(color, x, z, team, playerId = null) {
                const group = new THREE.Group();
                const bodyMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.7, roughness: 0.4 });
                const body = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.9, 3.6), bodyMat);
                body.position.y = 0.5;
                body.castShadow = true;
                group.add(body);
                
                const turretMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.8 });
                const turret = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 0.7, 32), turretMat);
                turret.position.y = 0.95;
                turret.castShadow = true;
                group.add(turret);
                
                const barrelMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a });
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.32, 2.2, 16), barrelMat);
                barrel.position.set(0, 1.05, 1.5);
                barrel.rotation.x = 0.05;
                group.add(barrel);
                
                group.position.set(x, 0, z);
                group.userData = { health: 100, team: team, playerId: playerId };
                
                this.scene.add(group);
                return group;
            }
            
            fire(tank) {
                if (this.isEliminated || !this.gameActive) return false;
                const now = Date.now();
                if (now - this.lastShot < 3000) return false;
                this.lastShot = now;
                
                const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(tank.quaternion);
                const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.26, 24, 24), 
                    new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4422, emissiveIntensity: 0.6 }));
                bullet.position.copy(tank.position);
                bullet.position.y += 1.2;
                bullet.userData = { velocity: dir.multiplyScalar(2.6), owner: tank, life: 200, ownerId: tank.userData.playerId || 'player' };
                this.scene.add(bullet);
                this.bullets.push(bullet);
                
                if (tank === this.playerTank) gameApp.audio.fire();
                socket.emit('shoot', { position: bullet.position, direction: dir });
                return true;
            }
            
            createExplosion(pos, size = 1.2) {
                const explosionGroup = new THREE.Group();
                const flash = new THREE.Mesh(new THREE.SphereGeometry(size * 0.6, 16, 16),
                    new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4422, emissiveIntensity: 1.2 }));
                explosionGroup.add(flash);
                explosionGroup.position.copy(pos);
                this.scene.add(explosionGroup);
                
                const particleCount = Math.min(45, PERFORMANCE_CONFIG.maxParticles);
                for (let i = 0; i < particleCount; i++) {
                    const particle = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 6),
                        new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4422 }));
                    particle.position.copy(pos);
                    particle.userData = {
                        vel: new THREE.Vector3((Math.random() - 0.5) * 1.2, Math.random() * 1.5 + 0.5, (Math.random() - 0.5) * 1.2),
                        life: 1, gravity: 0.03
                    };
                    this.scene.add(particle);
                    this.particles.push(particle);
                }
                
                setTimeout(() => this.scene.remove(explosionGroup), 200);
                const dist = this.playerTank ? pos.distanceTo(this.playerTank.position) : 0;
                gameApp.audio.explosion(dist);
                if (dist < 35) this.cameraShake = 1.2;
            }
            
            updateParticles() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.userData.life -= 0.025;
                    if (p.userData.life <= 0) {
                        this.scene.remove(p);
                        this.particles.splice(i, 1);
                    } else {
                        p.position.x += p.userData.vel.x;
                        p.position.z += p.userData.vel.z;
                        p.position.y += p.userData.vel.y;
                        if (p.userData.gravity) p.userData.vel.y -= p.userData.gravity;
                        p.material.emissiveIntensity = p.userData.life * 1.5;
                        p.scale.setScalar(p.userData.life * 1.5);
                    }
                }
            }
            
            // تحسين: تحديث اللاعبين الآخرين باستخدام الاستيفاء (Interpolation)
            updateOtherPlayer(data) {
                if (this.gameActive || this.isEliminated) return;
                
                let tank = this.otherPlayers.get(data.userId);
                if (!tank && data.userId !== this.playerId) {
                    const color = data.team === 1 ? 0x8b5a2b : 0x4a6a8b;
                    const pos = data.position || { x: 0, z: 0 };
                    tank = this.createTank(color, pos.x, pos.z, data.team, data.userId);
                    this.otherPlayers.set(data.userId, tank);
                    this.tanks.set(data.userId, tank);
                    
                    // تخزين بيانات الاستيفاء
                    this.otherPlayersData.set(data.userId, {
                        targetPosition: new THREE.Vector3(pos.x, 0, pos.z),
                        targetRotation: data.rotation || 0,
                        currentPosition: new THREE.Vector3(pos.x, 0, pos.z),
                        currentRotation: data.rotation || 0,
                        lastUpdateTime: Date.now()
                    });
                }
                
                if (tank && data.position) {
                    // تحديث البيانات المستهدفة للاستيفاء
                    const interpData = this.otherPlayersData.get(data.userId);
                    if (interpData) {
                        interpData.targetPosition.set(data.position.x, 0, data.position.z);
                        interpData.targetRotation = data.rotation || 0;
                        interpData.lastUpdateTime = Date.now();
                    }
                }
            }
            
            // تحسين: تحديث مواضع اللاعبين الآخرين باستخدام الاستيفاء السلس
            updateOtherPlayersInterpolation() {
                const now = Date.now();
                for (const [userId, tank] of this.otherPlayers) {
                    const interpData = this.otherPlayersData.get(userId);
                    if (interpData && tank) {
                        // حساب عامل الاستيفاء (كلما مر وقت أطول، كلما تحرك بشكل أسرع)
                        const timeSinceUpdate = Math.min(200, now - interpData.lastUpdateTime);
                        const factor = Math.min(1, timeSinceUpdate / 50) * PERFORMANCE_CONFIG.interpolationSpeed;
                        
                        // استيفاء الموقع
                        interpData.currentPosition.lerp(interpData.targetPosition, factor);
                        tank.position.copy(interpData.currentPosition);
                        
                        // استيفاء الدوران (مع معالجة الزوايا)
                        let rotDiff = interpData.targetRotation - interpData.currentRotation;
                        if (Math.abs(rotDiff) > Math.PI) rotDiff -= Math.sign(rotDiff) * Math.PI * 2;
                        interpData.currentRotation += rotDiff * factor;
                        tank.rotation.y = interpData.currentRotation;
                    }
                }
            }
            
            removeTank(userId) {
                const tank = this.tanks.get(userId);
                if (tank) {
                    this.createExplosion(tank.position, 2.0);
                    this.scene.remove(tank);
                    this.tanks.delete(userId);
                    this.otherPlayers.delete(userId);
                    this.otherPlayersData.delete(userId);
                    this.updateCounts();
                }
            }
            
            update() {
                if (!this.gameActive || this.isEliminated) return;
                this.updateParticles();
                this.updateOtherPlayersInterpolation(); // تحسين: تحديث سلس للاعبين الآخرين
                
                if (this.playerTank) {
                    const speed = -this.joystick.y * 0.22;
                    const rot = -this.joystick.x * 0.045;
                    const oldX = this.playerTank.position.x, oldZ = this.playerTank.position.z;
                    this.playerTank.rotation.y += rot;
                    this.playerTank.translateZ(speed);
                    if (this.checkCollision(this.playerTank)) this.playerTank.position.set(oldX, 0, oldZ);
                    
                    gameApp.audio.updateEngine(Math.abs(speed) * 3.5);
                    
                    const now = Date.now();
                    if (now - this.lastMoveTime > PERFORMANCE_CONFIG.networkUpdateInterval) {
                        this.lastMoveTime = now;
                        socket.emit('move', { position: this.playerTank.position, rotation: this.playerTank.rotation.y });
                    }
                    
                    const camOffset = new THREE.Vector3(0, 5.5, -12).applyQuaternion(this.playerTank.quaternion);
                    let camTarget = this.playerTank.position.clone().add(camOffset);
                    if (this.cameraShake > 0) {
                        camTarget.x += (Math.random() - 0.5) * this.cameraShake * 0.5;
                        camTarget.y += (Math.random() - 0.5) * this.cameraShake * 0.3;
                        this.cameraShake *= 0.92;
                    }
                    this.camera.position.lerp(camTarget, 0.12);
                    this.camera.lookAt(this.playerTank.position.clone().add(new THREE.Vector3(0, 1.2, 0)));
                }
                
                // تحديث الرصاصات
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    const b = this.bullets[i];
                    b.position.add(b.userData.velocity);
                    b.userData.life--;
                    let hit = false;
                    
                    for (let obs of this.obstacles) {
                        if (new THREE.Box3().setFromObject(b).intersectsBox(new THREE.Box3().setFromObject(obs))) {
                            hit = true;
                            this.createExplosion(b.position);
                            this.scene.remove(b);
                            this.bullets.splice(i, 1);
                            break;
                        }
                    }
                    
                    if (!hit) {
                        for (let [id, tank] of this.tanks) {
                            const isOwner = (b.userData.owner === tank);
                            const isSameTeam = tank.userData.team === b.userData.owner?.userData?.team;
                            
                            if (!isOwner && !isSameTeam && b.position.distanceTo(tank.position) < 1.9) {
                                hit = true;
                                this.createExplosion(b.position, 1.5);
                                this.scene.remove(b);
                                this.bullets.splice(i, 1);
                                
                                if (b.userData.owner === this.playerTank) {
                                    socket.emit('damage', { damage: 100, killerId: this.playerId, targetId: id });
                                }
                                break;
                            }
                        }
                    }
                    
                    if (!hit && (b.userData.life < 0 || Math.abs(b.position.x) > 430 || Math.abs(b.position.z) > 430)) {
                        this.scene.remove(b);
                        this.bullets.splice(i, 1);
                    }
                }
            }
            
            checkCollision(tank) {
                const box = new THREE.Box3().setFromObject(tank);
                for (let obs of this.obstacles) {
                    if (box.intersectsBox(new THREE.Box3().setFromObject(obs))) return true;
                }
                return false;
            }
            
            updateCounts() {
                this.team1Count = 0;
                this.team2Count = 0;
                for (let tank of this.tanks.values()) {
                    if (tank.userData.team === 1) this.team1Count++;
                    else if (tank.userData.team === 2) this.team2Count++;
                }
                const team1El = document.getElementById('team1');
                const team2El = document.getElementById('team2');
                if (team1El) team1El.innerText = this.team1Count;
                if (team2El) team2El.innerText = this.team2Count;
            }
            
            animate() {
                requestAnimationFrame(() => this.animate());
                this.update();
                if (this.renderer && this.scene && this.camera) {
                    this.renderer.render(this.scene, this.camera);
                }
            }
        }
        
        // ==================== Socket and App Logic ====================
        const SERVER_URL = "https://tank-yf0p.onrender.com";
        const socket = io(SERVER_URL);

                            this.sim.createExplosion(this.sim.playerTank.position, 2.5);

                            this.sim.playerTank = null;
                        }
                        const eliminationMessage = document.createElement('div');

                if (data.players) {

            setupControls() {
                const base = document.getElementById('joystickBase');
                const handle = document.getElementById('joystickHandle');
                let active = false;
                
                const move = (e) => {
                    if (!active) return;
                    const rect = base.getBoundingClientRect();
                    const touch = e.touches ? e.touches[0] : e;
                    let dx = touch.clientX - (rect.left + rect.width/2);
                    let dy = touch.clientY - (rect.top + rect.height/2);
                    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 65);
                    const ang = Math.atan2(dy, dx);
                    dx = Math.cos(ang) * dist;
                    dy = Math.sin(ang) * dist;
                    handle.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    this.sim.joystick = { x: dx/65, y: dy/65 };
                };
                
                base.addEventListener('touchstart', (e) => { e.preventDefault(); active = true; });
                base.addEventListener('mousedown', () => active = true);
                window.addEventListener('touchmove', move);
                window.addEventListener('mousemove', move);
                window.addEventListener('touchend', () => { active = false; handle.style.transform = 'translate(-50%, -50%)'; this.sim.joystick = { x: 0, y: 0 }; });
                window.addEventListener('mouseup', () => { active = false; handle.style.transform = 'translate(-50%, -50%)'; this.sim.joystick = { x: 0, y: 0 }; });
                
                let lastFire = 0;
                const fire = () => {
                    if (this.sim.playerTank && !this.sim.isEliminated && this.sim.gameActive && Date.now() - lastFire > 3000) {
                        lastFire = Date.now();
                        this.sim.fire(this.sim.playerTank);
                        document.getElementById('cooldownSide').innerHTML = '⏳ 3s';
                        let count = 3;
                        const interval = setInterval(() => {
                            count--;
                            if (count <= 0) {
                                clearInterval(interval);
                                document.getElementById('cooldownSide').innerHTML = '🔥 جاهز';
                            } else {
                                document.getElementById('cooldownSide').innerHTML = `⏳ ${count}s`;
                            }
                        }, 1000);
                    }
                };
                
                const fireBtn = document.getElementById('fireBtn');
                fireBtn.addEventListener('click', fire);
                fireBtn.addEventListener('touchstart', (e) => { e.preventDefault(); fire(); });
            },

                document.getElementById('resetDataBtn').onclick = async () => {
                    if (!confirm('⚠️ تحذير: هذا الإجراء سيمسح جميع البيانات بشكل نهائي! هل أنت متأكد؟')) return;
                    const confirmText = prompt('اكتب "مسح" للتأكيد النهائي');
                    if (confirmText !== 'مسح') return;
                    try {
                        const response = await fetch(`${SERVER_URL}/api/admin/resetAll`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ adminToken: 'authenticated', userId: currentUser?.uid })
                        });
                        const data = await response.json();
                        if (data.success) {
                            alert('تم مسح جميع البيانات بنجاح');
                        } else {
                            alert(data.error);
                        }
                    } catch(e) { alert('خطأ في الاتصال'); }
                };
                document.getElementById('refreshStatsBtn').onclick = () => {
                    this.refreshRoomsList();
                };
            }
        };
        
        window.gameApp = gameApp;
        gameApp.init();
        console.log('Game ready with optimized performance and smooth interpolation!');
    </script>
</body>
</html>
