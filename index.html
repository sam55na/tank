<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Battle Tanks Elite - معركة الدبابات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: linear-gradient(145deg, #0a0f1a 0%, #05070c 100%);
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            position: fixed;
            top: 0;
            left: 0;
            object-fit: cover;
        }

        .landscape-warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            text-align: center;
            flex-direction: column;
            gap: 20px;
        }

        .login-screen, .main-screen, .lobby, .admin-panel, .report-screen, .hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .login-screen {
            background: radial-gradient(circle at 30% 10%, #1e2a3a, #0a0f1f);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-container {
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(25px);
            padding: 40px 30px;
            border-radius: 48px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.5);
        }

        .login-container h1 {
            color: #d4af37;
            font-size: clamp(24px, 8vw, 36px);
            margin-bottom: 10px;
        }

        .login-container p {
            color: #8a9aa8;
            margin-bottom: 20px;
        }

        .login-container input {
            width: 100%;
            padding: 16px 20px;
            margin: 10px 0;
            border-radius: 60px;
            background: rgba(20,28,40,0.8);
            border: 1px solid rgba(212,175,55,0.4);
            color: white;
            font-size: 16px;
            outline: none;
        }

        .login-container button {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: linear-gradient(105deg, #d4af37, #b8860b);
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-container button:active {
            transform: scale(0.97);
        }

        .switch-btn {
            background: transparent !important;
            border: 1px solid #d4af37 !important;
            margin-top: 10px;
        }

        .main-screen {
            background: linear-gradient(145deg, #0f1725, #070b14);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 900;
        }

        .main-screen h2 {
            color: #d4af37;
            font-size: clamp(24px, 8vw, 36px);
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(212,175,55,0.5);
            text-align: center;
            padding: 0 20px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .play-btn, .wallet-btn {
            padding: clamp(12px, 4vw, 18px) clamp(25px, 8vw, 40px);
            border: none;
            border-radius: 60px;
            font-size: clamp(18px, 5vw, 24px);
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .play-btn {
            background: linear-gradient(135deg, #d4af37, #b8860b);
        }

        .wallet-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .admin-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            position: absolute;
            top: 20px;
            right: 20px;
            display: none;
            transition: transform 0.2s;
            z-index: 100;
        }

        .play-btn:active, .wallet-btn:active, .admin-btn:active {
            transform: scale(0.96);
        }

        .user-card {
            background: rgba(255,255,255,0.1);
            padding: 15px 30px;
            border-radius: 50px;
            margin-top: 30px;
            text-align: center;
            color: white;
            backdrop-filter: blur(5px);
        }

        .user-card div {
            margin: 5px 0;
            font-size: clamp(12px, 4vw, 16px);
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 20px 40px;
            border-radius: 60px;
            color: #d4af37;
            display: none;
            z-index: 10001;
            font-size: 18px;
        }

        .lobby {
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .lobby-container {
            background: linear-gradient(145deg, #111a24, #0a0f18);
            padding: clamp(20px, 5vw, 30px);
            border-radius: 48px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 2px solid #d4af37;
        }

        .lobby-container h2 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: clamp(20px, 6vw, 28px);
        }

        .seats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 25px 0;
        }

        .seat {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 28px;
            cursor: pointer;
            border: 1px solid #d4af37;
            color: white;
            transition: all 0.2s;
        }

        .seat.occupied {
            background: #2e7035;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .create-room-btn, .back-lobby-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .create-room-btn {
            background: #d4af37;
        }

        .back-lobby-btn {
            background: #555;
            color: white;
        }

        .create-room-btn:active, .back-lobby-btn:active {
            transform: scale(0.96);
        }

        .lobby-status {
            color: #d4af37;
            margin-top: 15px;
            font-size: 14px;
        }

        .hud {
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        .status-bar {
            position: absolute;
            top: clamp(10px, 3vh, 20px);
            left: clamp(10px, 3vw, 20px);
            background: rgba(0,0,0,0.8);
            padding: clamp(6px, 2vw, 8px) clamp(12px, 3vw, 16px);
            border-left: 4px solid #d4af37;
            border-radius: 16px;
            color: white;
            font-size: clamp(10px, 3vw, 14px);
            backdrop-filter: blur(4px);
        }

        .team-info {
            position: absolute;
            top: clamp(10px, 3vh, 20px);
            right: clamp(10px, 3vw, 20px);
            background: rgba(0,0,0,0.8);
            padding: clamp(6px, 2vw, 8px) clamp(12px, 3vw, 16px);
            border-radius: 16px;
            text-align: right;
            color: white;
            font-size: clamp(10px, 3vw, 14px);
        }

        .cooldown-side {
            position: absolute;
            top: clamp(60px, 10vh, 80px);
            right: clamp(10px, 3vw, 20px);
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: clamp(10px, 3vw, 12px);
            color: #d4af37;
            font-weight: bold;
            pointer-events: none;
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: clamp(30px, 5vw, 36px);
            height: clamp(30px, 5vw, 36px);
        }

        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,240,0.85);
        }

        .crosshair::before {
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            transform: translateY(-50%);
        }

        .crosshair::after {
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
        }

        .controls {
            position: absolute;
            bottom: clamp(20px, 5vh, 30px);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 clamp(10px, 5vw, 20px);
            pointer-events: none;
        }

        .joystick-base {
            width: clamp(80px, 20vw, 120px);
            height: clamp(80px, 20vw, 120px);
            background: rgba(0,0,0,0.6);
            border: 2px solid #d4af37;
            border-radius: 70px;
            position: relative;
            pointer-events: auto;
        }

        .joystick-handle {
            width: clamp(35px, 10vw, 52px);
            height: clamp(35px, 10vw, 52px);
            background: radial-gradient(circle, #d4af37, #b8860b);
            border-radius: 30px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .fire-btn {
            width: clamp(60px, 15vw, 80px);
            height: clamp(60px, 15vw, 80px);
            background: radial-gradient(circle, #e55, #a22);
            border: 2px solid #d4af37;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(28px, 6vw, 36px);
            color: white;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 0 12px rgba(255,0,0,0.4);
            transition: transform 0.05s;
        }

        .fire-btn-active {
            transform: scale(0.95);
        }

        .report-screen {
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .report-container {
            background: linear-gradient(135deg, #1a1a2e, #0a0a1a);
            padding: clamp(20px, 5vw, 30px);
            border-radius: 40px;
            text-align: center;
            border: 2px solid #d4af37;
            max-width: 400px;
            width: 90%;
        }

        .report-container h2 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: clamp(20px, 6vw, 28px);
        }

        .report-container p {
            color: white;
            margin: 15px 0;
            line-height: 1.8;
            font-size: clamp(14px, 4vw, 16px);
        }

        .back-home-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .admin-panel {
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 4000;
        }

        .admin-container {
            background: linear-gradient(135deg, #121926, #080c14);
            padding: clamp(20px, 5vw, 30px);
            border-radius: 40px;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid #d4af37;
        }

        .admin-container h3 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: clamp(20px, 5vw, 24px);
        }

        .admin-container input, .admin-container select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 30px;
            border: 1px solid #d4af37;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .admin-container button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #d4af37;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .admin-container button:active {
            transform: scale(0.97);
        }

        .admin-container .danger-btn {
            background: #e74c3c;
            color: white;
        }

        .elimination-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            background-color: rgba(0,0,0,0.9);
            color: #ff4444;
            padding: clamp(15px,4vw,20px) clamp(25px,6vw,40px);
            border-radius: 30px;
            font-size: clamp(18px,5vw,24px);
            font-weight: bold;
            z-index: 10000;
            text-align: center;
            border: 2px solid #ff4444;
            animation: fadeOut 3s ease-in-out;
            white-space: nowrap;
        }

        @keyframes fadeOut {
            0% { opacity: 0; transform: translate(-50%,-50%) scale(0.8);}
            20% { opacity: 1; transform: translate(-50%,-50%) scale(1);}
            80% { opacity: 1; transform: translate(-50%,-50%) scale(1);}
            100% { opacity: 0; transform: translate(-50%,-50%) scale(0.8);}
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="loading" id="loading">جاري الاتصال...</div>
    <div class="login-screen" id="loginScreen">
        <div class="login-container">
            <h1>⚡Battle Tanks⚡</h1>
            <p>ساحة المعركة الإلكترونية</p>
            <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email">
            <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password">
            <button id="loginBtn">دخول</button>
            <button id="registerBtn" class="switch-btn">إنشاء حساب</button>
        </div>
    </div>
    <div class="main-screen" id="mainScreen">
        <h2>🏆 معركة الدبابات 🏆</h2>
        <div class="btn-group">
            <button class="play-btn" id="playBtn">🎮 معركة سريعة</button>
            <button class="wallet-btn" id="walletBtn">💰 المحفظة</button>
        </div>
        <div class="user-card">
            <div>👤 <span id="gameUsername">---</span></div>
            <div>💰 <span id="gameBalance">0</span> عملة</div>
            <div>🎮 لعب: <span id="gamesPlayed">0</span></div>
            <div>🏆 فوز: <span id="wins">0</span></div>
        </div>
        <button class="admin-btn" id="adminBtn">🛡️ لوحة التحكم</button>
    </div>
    <div class="lobby" id="lobby">
        <div class="lobby-container">
            <h2>⚔️ غرفة المعركة ⚔️</h2>
            <div class="seats-grid" id="seatsGrid"></div>
            <button class="create-room-btn" id="createRoomBtn">إنشاء غرفة</button>
            <button class="back-lobby-btn" id="backFromLobbyBtn">🔙 رجوع</button>
            <div class="lobby-status" id="lobbyStatus">انتظر إنشاء الغرفة...</div>
        </div>
    </div>
    <div class="hud" id="hud">
        <div class="status-bar">❤️ الصحة: <span id="health">100</span>%</div>
        <div class="team-info">🟫 الفريق البني: <span id="team1">0</span> | 🔵 الفريق الأزرق: <span id="team2">0</span></div>
        <div class="cooldown-side" id="cooldownText">🔫 جاهز</div>
        <div class="crosshair"></div>
        <div class="controls">
            <div class="joystick-base" id="joystickBase"><div class="joystick-handle" id="joystickHandle"></div></div>
            <div class="fire-btn" id="fireBtn">💥</div>
        </div>
    </div>
    <div class="report-screen" id="reportScreen">
        <div class="report-container">
            <h2>🏁 نهاية المعركة 🏁</h2>
            <p id="reportText"></p>
            <button class="back-home-btn" id="backHomeBtn">العودة للرئيسية</button>
        </div>
    </div>
    <div class="admin-panel" id="adminPanel">
        <div class="admin-container">
            <h3>🛠️ لوحة التحكم</h3>
            <input type="number" id="seatPrice" placeholder="سعر المقعد">
            <button id="saveSeatPriceBtn">حفظ سعر المقعد</button>
            <input type="number" id="maxPlayers" placeholder="الحد الأقصى للاعبين">
            <button id="saveMaxPlayersBtn">حفظ الحد الأقصى</button>
            <hr>
            <input type="email" id="targetEmail" placeholder="بريد المستخدم">
            <input type="number" id="amount" placeholder="المبلغ">
            <button id="adminDepositBtn">💰 إيداع</button>
            <button id="adminWithdrawBtn">💸 سحب</button>
            <button id="resetDataBtn" class="danger-btn">⚠️ إعادة ضبط البيانات</button>
            <button id="refreshStatsBtn">🔄 تحديث الإحصائيات</button>
            <button id="closeAdminBtn">❌ إغلاق</button>
        </div>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "socket.io-client": "https://cdn.socket.io/4.6.0/socket.io.esm.min.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import io from 'socket.io-client';
        
        // Firebase Config (محاكاة)
        const firebaseConfig = {
            apiKey: "AIzaSyDummyKeyForTanksGame",
            authDomain: "tanks-game.firebaseapp.com",
            projectId: "tanks-game",
            storageBucket: "tanks-game.firebasestorage.app",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abcd1234"
        };
        
        const SERVER_URL = "https://tank-yf0p.onrender.com";
        const socket = io(SERVER_URL, { transports: ['websocket'] });
        
        let currentUser = null;
        let currentBalance = 0;
        let isAdmin = false;
        let gameSettings = { seatPrice: 1, maxPlayers: 2 };
        
        class AudioEngine {
            constructor() { this.ctx = null; this.engineOsc = null; this.engineGain = null; }
            init() { if (this.ctx) return; try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
            startEngine() { if (!this.ctx) this.init(); if (this.engineOsc) return; try { this.engineOsc = this.ctx.createOscillator(); this.engineGain = this.ctx.createGain(); const filter = this.ctx.createBiquadFilter(); this.engineOsc.type = 'sawtooth'; this.engineOsc.frequency.value = 42; filter.type = 'lowpass'; filter.frequency.value = 180; this.engineGain.gain.value = 0.08; this.engineOsc.connect(filter); filter.connect(this.engineGain); this.engineGain.connect(this.ctx.destination); this.engineOsc.start(); } catch(e){} }
            updateEngine(speed) { if (!this.engineOsc) return; const freq = 42 + speed * 40; this.engineOsc.frequency.setTargetAtTime(freq, this.ctx.currentTime, 0.05); this.engineGain.gain.setTargetAtTime(0.08 + speed * 0.1, this.ctx.currentTime, 0.05); }
            fire() { if (!this.ctx) return; const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = 'square'; osc.frequency.setValueAtTime(170, now); osc.frequency.exponentialRampToValueAtTime(55, now + 0.28); gain.gain.setValueAtTime(0.7, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.32); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 0.32); }
            explosion(distance) { if (!this.ctx) return; const vol = Math.max(0.2, Math.min(0.9, 1 - distance / 60)); const now = this.ctx.currentTime; const noise = this.ctx.createBufferSource(); const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * 1.0, this.ctx.sampleRate); const data = buffer.getChannelData(0); for (let i = 0; i < buffer.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / buffer.length, 1.3); noise.buffer = buffer; const gain = this.ctx.createGain(); gain.gain.setValueAtTime(vol, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 1.0); noise.connect(gain); gain.connect(this.ctx.destination); noise.start(now); }
        }
        
        class GameSimulation {
            constructor() { this.scene = null; this.camera = null; this.renderer = null; this.tanks = new Map(); this.bullets = []; this.playerTank = null; this.joystick = {x:0,y:0}; this.cameraShake = 0; this.obstacles = []; this.particles = []; this.team1Count = 0; this.team2Count = 0; this.playerTeam = null; this.otherPlayers = new Map(); this.gameActive = false; this.isEliminated = false; this.lastMoveTime = 0; this.playerId = null; this.targetPositions = new Map(); }
            
            init() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
                this.renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.shadowMap.enabled = true;
                this.scene.background = new THREE.Color(0x1a2a3a);
                this.scene.fog = new THREE.FogExp2(0x1a2a3a, 0.0018);
                const ambient = new THREE.AmbientLight(0xffff, 0.6);
                this.scene.add(ambient);
                const sun = new THREE.DirectionalLight(0xffeedd, 1.4);
                sun.position.set(50, 70, 40);
                sun.castShadow = true;
                sun.shadow.mapSize.set(1024, 1024);
                this.scene.add(sun);
                this.createTerrain();
                this.createObstacles();
                window.addEventListener('resize', () => this.onWindowResize());
                this.animate();
            }
            
            onWindowResize() { if (this.camera && this.renderer) { this.camera.aspect = window.innerWidth / window.innerHeight; this.camera.updateProjectionMatrix(); this.renderer.setSize(window.innerWidth, window.innerHeight); } }
            
            createTerrain() {
                const geo = new THREE.PlaneGeometry(450, 450, 60, 60);
                geo.rotateX(-Math.PI / 2);
                const groundMat = new THREE.MeshStandardMaterial({ color: 0x6a5a4a, roughness: 0.9, metalness: 0.05 });
                const ground = new THREE.Mesh(geo, groundMat);
                ground.receiveShadow = true;
                this.scene.add(ground);
                const gridHelper = new THREE.GridHelper(460, 50, 0x8a8a7a, 0x5a5a4a);
                gridHelper.position.y = 0.03;
                this.scene.add(gridHelper);
            }
            
            createObstacles() {
                const rockMat = new THREE.MeshStandardMaterial({ color: 0x6a6a5a, roughness: 0.75 });
                const positions = [{x:-45,z:-20},{x:-30,z:40},{x:-10,z:-55},{x:15,z:-35},{x:40,z:-15},{x:55,z:25},{x:35,z:55},{x:-25,z:-45},{x:-55,z:15},{x:5,z:60},{x:70,z:-25},{x:-60,z:-40},{x:-40,z:65},{x:25,z:-65},{x:50,z:45}];
                positions.forEach(pos => {
                    const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(1.2), rockMat);
                    rock.scale.set(1.8, 1.5, 1.8);
                    rock.position.set(pos.x, 0.6, pos.z);
                    rock.castShadow = true;
                    this.scene.add(rock);
                    this.obstacles.push(rock);
                });
            }
            
            createTank(color, x, z, team, playerId = null) {
                const group = new THREE.Group();
                const bodyMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.7, roughness: 0.4 });
                const body = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.9, 3.6), bodyMat);
                body.position.y = 0.5;
                body.castShadow = true;
                group.add(body);
                const turretMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.8 });
                const turret = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 0.7, 32), turretMat);
                turret.position.y = 0.95;
                turret.castShadow = true;
                group.add(turret);
                const barrelMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a });
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.32, 2.2, 16), barrelMat);
                barrel.position.set(0, 1.05, 1.5);
                barrel.rotation.x = 0.05;
                group.add(barrel);
                group.position.set(x, 0, z);
                group.userData = { health: 100, team: team, playerId: playerId };
                this.scene.add(group);
                return group;
            }
            
            updateOtherPlayer(data) {
                if (!this.gameActive && !this.isEliminated) return;
                let tank = this.otherPlayers.get(data.userId);
                if (tank && data.userId !== this.playerId) {
                    if (data.position) {
                        const targetPos = new THREE.Vector3(data.position.x, 0, data.position.z);
                        this.targetPositions.set(data.userId, { position: targetPos, rotation: data.rotation || 0 });
                        tank.userData.targetPos = targetPos;
                        tank.userData.targetRot = data.rotation || 0;
                    }
                } else if (data.userId !== this.playerId && data.team) {
                    const color = data.team === 1 ? 0x8b5a2b : 0x4a6a8b;
                    const pos = data.position || {x:0,z:0};
                    tank = this.createTank(color, pos.x, pos.z, data.team, data.userId);
                    this.otherPlayers.set(data.userId, tank);
                    this.tanks.set(data.userId, tank);
                }
            }
            
            updateSmoothMovements() {
                for (let [id, tank] of this.otherPlayers) {
                    const target = this.targetPositions.get(id);
                    if (target && tank) {
                        tank.position.lerp(target.position, 0.25);
                        tank.rotation.y += (target.rotation - tank.rotation.y) * 0.2;
                    }
                }
            }
            
            fire(tank) { if (this.isEliminated || !this.gameActive) return false; const now = Date.now(); if(now - this.lastShot < 3000) return false; this.lastShot = now; const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(tank.quaternion); const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.26, 24, 24), new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4422, emissiveIntensity: 0.6 })); bullet.position.copy(tank.position); bullet.position.y += 1.2; bullet.userData = { velocity: dir.multiplyScalar(2.6), owner: tank, life: 200, ownerId: tank.userData.playerId || 'player' }; this.scene.add(bullet); this.bullets.push(bullet); if(tank === this.playerTank) gameApp.audio.fire(); socket.emit('shoot', { position: bullet.position, direction: dir }); return true; }
            
            createExplosion(pos, size = 1.2) { const explosionGroup = new THREE.Group(); const flash = new THREE.Mesh(new THREE.SphereGeometry(size * 0.6, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4422, emissiveIntensity: 1.2 })); explosionGroup.add(flash); explosionGroup.position.copy(pos); this.scene.add(explosionGroup); for(let i = 0; i < 45; i++) { const particle = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 6), new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4422 })); particle.position.copy(pos); particle.userData = { vel: new THREE.Vector3((Math.random() - 0.5) * 1.2, Math.random() * 1.5 + 0.5, (Math.random() - 0.5) * 1.2), life: 1, gravity: 0.03 }; this.scene.add(particle); this.particles.push(particle); } setTimeout(() => this.scene.remove(explosionGroup), 200); const dist = this.playerTank ? pos.distanceTo(this.playerTank.position) : 0; gameApp.audio.explosion(dist); if(dist < 35) this.cameraShake = 1.2; }
            
            updateParticles() { for(let i = this.particles.length-1; i >= 0; i--) { const p = this.particles[i]; p.userData.life -= 0.025; if(p.userData.life <= 0) { this.scene.remove(p); this.particles.splice(i,1); } else { p.position.x += p.userData.vel.x; p.position.z += p.userData.vel.z; p.position.y += p.userData.vel.y; if(p.userData.gravity) p.userData.vel.y -= p.userData.gravity; p.material.emissiveIntensity = p.userData.life * 1.5; p.scale.setScalar(p.userData.life * 1.5); } } }
            
            update() { if (!this.gameActive || this.isEliminated) { this.updateParticles(); return; } this.updateSmoothMovements(); if(this.playerTank) { const speed = -this.joystick.y * 0.22; const rot = -this.joystick.x * 0.045; const oldX = this.playerTank.position.x, oldZ = this.playerTank.position.z; this.playerTank.rotation.y += rot; this.playerTank.translateZ(speed); if(this.checkCollision(this.playerTank)) this.playerTank.position.set(oldX, 0, oldZ); gameApp.audio.updateEngine(Math.abs(speed) * 3.5); const now = Date.now(); if (now - this.lastMoveTime > 50) { this.lastMoveTime = now; socket.emit('move', { position: this.playerTank.position, rotation: this.playerTank.rotation.y }); } const camOffset = new THREE.Vector3(0, 5.5, -12).applyQuaternion(this.playerTank.quaternion); let camTarget = this.playerTank.position.clone().add(camOffset); if(this.cameraShake > 0) { camTarget.x += (Math.random() - 0.5) * this.cameraShake * 0.5; camTarget.y += (Math.random() - 0.5) * this.cameraShake * 0.3; this.cameraShake *= 0.92; } this.camera.position.lerp(camTarget, 0.12); this.camera.lookAt(this.playerTank.position.clone().add(new THREE.Vector3(0, 1.2, 0))); } this.updateParticles(); for(let i = this.bullets.length-1; i >= 0; i--) { const b = this.bullets[i]; b.position.add(b.userData.velocity); b.userData.life--; let hit = false; for(let obs of this.obstacles) if(new THREE.Box3().setFromObject(b).intersectsBox(new THREE.Box3().setFromObject(obs))) { hit = true; this.createExplosion(b.position); this.scene.remove(b); this.bullets.splice(i,1); break; } if(!hit) { for(let [id, tank] of this.tanks) { const isOwner = (b.userData.owner === tank); const isSameTeam = tank.userData.team === b.userData.owner?.userData?.team; if (!isOwner && !isSameTeam && b.position.distanceTo(tank.position) < 1.9) { hit = true; this.createExplosion(b.position, 1.5); this.scene.remove(b); this.bullets.splice(i,1); if(b.userData.owner === this.playerTank) socket.emit('damage', { damage: 100, killerId: this.playerId, targetId: id }); break; } } } if(!hit && (b.userData.life < 0 || Math.abs(b.position.x) > 430 || Math.abs(b.position.z) > 430)) { this.scene.remove(b); this.bullets.splice(i,1); } } }
            
            checkCollision(tank) { const box = new THREE.Box3().setFromObject(tank); for(let obs of this.obstacles) if(box.intersectsBox(new THREE.Box3().setFromObject(obs))) return true; return false; }
            updateCounts() { this.team1Count = 0; this.team2Count = 0; for(let tank of this.tanks.values()) if(tank.userData.team === 1) this.team1Count++; else if(tank.userData.team === 2) this.team2Count++; const team1El = document.getElementById('team1'); const team2El = document.getElementById('team2'); if (team1El) team1El.innerText = this.team1Count; if (team2El) team2El.innerText = this.team2Count; }
            removeTank(userId) { const tank = this.tanks.get(userId); if (tank) { this.createExplosion(tank.position, 2.0); this.scene.remove(tank); this.tanks.delete(userId); this.otherPlayers.delete(userId); this.updateCounts(); } }
            animate() { requestAnimationFrame(() => this.animate()); this.update(); if(this.renderer && this.scene && this.camera) this.renderer.render(this.scene, this.camera); }
        }
        
        const gameApp = {
            sim: new GameSimulation(),

            init() { this.initSocket(); this.bindEvents(); this.audio.init(); },
            bindEvents() {
                document.getElementById('loginBtn').onclick = () => this.login(document.getElementById('email').value, document.getElementById('password').value);

                document.getElementById('createRoomBtn').onclick = () => this.createRoom();
                document.getElementById('backFromLobbyBtn').onclick = () => { document.getElementById('lobby').style.display = 'none'; document.getElementById('mainScreen').style.display = 'flex'; };
                document.getElementById('backHomeBtn').onclick = () => this.backToHome();

                document.getElementById('saveSeatPriceBtn').onclick = () => this.saveSeatPrice();

                document.getElementById('adminDepositBtn').onclick = () => this.adminDeposit();

                document.getElementById('resetDataBtn').onclick = () => this.resetAllData();
                document.getElementById('refreshStatsBtn').onclick = () => this.refreshStats();
                const fireBtn = document.getElementById('fireBtn');
                fireBtn.addEventListener('mousedown', () => { if(this.sim.playerTank && !this.sim.isEliminated && this.sim.gameActive) { this.sim.fire(this.sim.playerTank); fireBtn.classList.add('fire-btn-active'); setTimeout(() => fireBtn.classList.remove('fire-btn-active'), 100); } });
                fireBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if(this.sim.playerTank && !this.sim.isEliminated && this.sim.gameActive) { this.sim.fire(this.sim.playerTank); fireBtn.classList.add('fire-btn-active'); setTimeout(() => fireBtn.classList.remove('fire-btn-active'), 100); } });
            },
            initSocket() {
                socket.on('connect', () => console.log('Connected'));
                socket.on('auth_success', (data) => { document.getElementById('loading').style.display = 'none'; currentUser = {uid: data.userId, email: data.email, username: data.username, balance: data.balance, isAdmin: data.isAdmin}; currentBalance = data.balance; isAdmin = data.isAdmin; this.sim.playerId = data.userId; localStorage.setItem('adminToken', 'authenticated'); localStorage.setItem('userEmail', data.email); localStorage.setItem('isAdmin', data.isAdmin); document.getElementById('balance').innerText = currentBalance; document.getElementById('gameBalance').innerText = currentBalance; document.getElementById('username').innerText = data.username || data.email.split('@')[0]; document.getElementById('gameUsername').innerText = data.username || data.email.split('@')[0]; document.getElementById('gamesPlayed').innerText = data.gamesPlayed || 0; document.getElementById('wins').innerText = data.wins || 0; if(isAdmin) document.getElementById('adminBtn').style.display = 'block'; this.showMainScreen(); });
                socket.on('auth_error', (data) => { document.getElementById('loading').style.display = 'none'; alert(data.message); });
                socket.on('lobby_joined', (data) => { currentBalance = data.balance; document.getElementById('gameBalance').innerText = currentBalance; if(data.settings) { gameSettings = data.settings; document.getElementById('seatPrice').value = data.settings.seatPrice; document.getElementById('maxPlayers').value = data.settings.maxPlayers; } this.updateLobby(data.players || []); });
                socket.on('game_start', (data) => this.startGame(data));
                socket.on('player_joined', (data) => this.updateLobby(data.players || []));
                socket.on('player_moved', (data) => { if(this.sim && data.userId !== currentUser?.uid) this.sim.updateOtherPlayer(data); });
                socket.on('player_shot', (data) => console.log('Player shot:', data.userId));
                socket.on('game_state_update', (data) => { if(this.sim && this.sim.gameActive && data.players) data.players.forEach(player => { if(player.userId != currentUser?.uid) this.sim.updateOtherPlayer(player); }); });
                socket.on('player_eliminated', (data) => { if(this.sim && this.sim.gameActive && data.userId != currentUser?.uid) this.sim.removeTank(data.userId); });
                socket.on('you_were_eliminated', (data) => { if(this.sim && this.sim.gameActive) { this.sim.isEliminated = true; this.sim.gameActive = false; if(this.sim.playerTank) { this.sim.createExplosion(this.sim.playerTank.position, 2.5); this.sim.scene.remove(this.sim.playerTank); this.sim.playerTank = null; } const msg = document.createElement('div'); msg.className = 'elimination-message'; msg.innerText = '💀 تم الاستبعاد 💀'; document.body.appendChild(msg); document.getElementById('joystickBase').style.opacity = '0.3'; document.getElementById('fireBtn').style.opacity = '0.3'; document.getElementById('joystickBase').style.pointerEvents = 'none'; document.getElementById('fireBtn').style.pointerEvents = 'none'; setTimeout(() => { if(msg) msg.remove(); document.getElementById('joystickBase').style.opacity = '1'; document.getElementById('fireBtn').style.opacity = '1'; document.getElementById('joystickBase').style.pointerEvents = 'auto'; document.getElementById('fireBtn').style.pointerEvents = 'auto'; }, 3000); } });
            },
            updateLobby(players) { const grid = document.getElementById('seatsGrid'); grid.innerHTML = ''; for(let i=0; i<gameSettings.maxPlayers; i++) { const isOccupied = players && players[i]; const seat = document.createElement('div'); seat.className = 'seat' + (isOccupied ? ' occupied' : ''); seat.innerHTML = `<div>${i+1}</div><div>${isOccupied ? (players[i]?.slice(0,8) || 'لاعب') : 'شاغر'}</div>`; seat.onclick = () => { if(!isOccupied) this.joinRoom(i); }; grid.appendChild(seat); } },
            createRoom() { socket.emit('create_room', { seats: gameSettings.maxPlayers || 2 }); },
            joinRoom(roomId) { socket.emit('join_room', { roomId }); },
            startGame(data) { document.getElementById('lobby').style.display = 'none'; document.getElementById('hud').style.display = 'block'; document.getElementById('health').innerText = '100'; this.sim.isEliminated = false; this.sim.gameActive = true; this.sim.lastMoveTime = 0; document.getElementById('joystickBase').style.opacity = '1'; document.getElementById('fireBtn').style.opacity = '1'; document.getElementById('joystickBase').style.pointerEvents = 'auto'; document.getElementById('fireBtn').style.pointerEvents = 'auto'; this.sim.init(); const positions = [{ x: -75, z: -70, team: 1 }, { x: 70, z: 70, team: 2 }]; const myTeam = data.yourTeam || 1; const myPos = positions[myTeam === 1 ? 0 : 1]; const myColor = myTeam === 1 ? 0x8b5a2b : 0x4a6a8b; this.sim.playerTeam = myTeam; this.sim.playerTank = this.sim.createTank(myColor, myPos.x, myPos.z, myTeam, currentUser?.uid); this.sim.playerTank.userData.playerId = currentUser?.uid; this.sim.tanks.set(currentUser?.uid, this.sim.playerTank); if(data.players) { data.players.forEach(player => { if(player.userId !== currentUser?.uid) { const otherTeam = player.team || (player.userId === data.players[0]?.userId ? 1 : 2); const otherPos = positions[otherTeam === 1 ? 0 : 1]; const otherColor = otherTeam === 1 ? 0x8b5a2b : 0x4a6a8b; const tank = this.sim.createTank(otherColor, otherPos.x, otherPos.z, otherTeam, player.userId); tank.userData.playerId = player.userId; this.sim.tanks.set(player.userId, tank); this.sim.otherPlayers.set(player.userId, tank); } }); } this.sim.updateCounts(); this.setupControls(); this.audio.startEngine(); },
            setupControls() { const base = document.getElementById('joystickBase'), handle = document.getElementById('joystickHandle'); let active = false; const move = (e) => { if(!active) return; const rect = base.getBoundingClientRect(); const touch = e.touches ? e.touches[0] : e; let dx = touch.clientX - (rect.left + rect.width/2), dy = touch.clientY - (rect.top + rect.height/2); const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 65), ang = Math.atan2(dy, dx); dx = Math.cos(ang) * dist; dy = Math.sin(ang) * dist; handle.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; this.sim.joystick = { x: dx/65, y: dy/65 }; }; base.addEventListener('touchstart', e => { e.preventDefault(); active = true; }); base.addEventListener('mousedown', () => active = true); window.addEventListener('touchmove', move); window.addEventListener('mousemove', move); window.addEventListener('touchend', () => { active = false; handle.style.transform = 'translate(-50%, -50%)'; this.sim.joystick = { x: 0, y: 0 }; }); window.addEventListener('mouseup', () => { active = false; handle.style.transform = 'translate(-50%, -50%)'; this.sim.joystick = { x: 0, y: 0 }; }); },
            showMainScreen() { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('mainScreen').style.display = 'flex'; },
            showLobby() { document.getElementById('mainScreen').style.display = 'none'; document.getElementById('lobby').style.display = 'flex'; socket.emit('join_lobby'); },
            backToHome() { document.getElementById('reportScreen').style.display = 'none'; document.getElementById('mainScreen').style.display = 'flex'; if(this.sim && this.sim.scene) { this.sim.gameActive = false; } },
            async login(email, password) { if(!email || !password) return alert('أدخل البريد وكلمة المرور'); document.getElementById('loading').style.display = 'flex'; socket.emit('login', { email, password }); },
            async register(email, password) { if(!email || !password) return alert('أدخل البريد وكلمة المرور'); document.getElementById('loading').style.display = 'flex'; socket.emit('register', { email, password }); },
            async saveSeatPrice() { const price = parseInt(document.getElementById('seatPrice').value); if(isNaN(price) || price < 1) return alert('قيمة غير صالحة'); try { const response = await fetch(`${SERVER_URL}/api/admin/setSeatPrice`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ adminToken: 'authenticated', userid: currentUser?.uid, price }) }); const data = await response.json(); if(data.success) { alert(`تم ضبط السعر إلى ${price}$`); gameSettings.seatPrice = price; } else { alert(data.error); } } catch(e) { alert('خطأ بالاتصال'); } },
            async saveMaxPlayers() { const max = parseInt(document.getElementById('maxPlayers').value); if(isNaN(max) || max < 2 || max > 4) return alert('القيمة بين 2 و 4'); try { const response = await fetch(`${SERVER_URL}/api/admin/setMaxPlayers`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ adminToken: 'authenticated', userid: currentUser?.uid, maxPlayers: max }) }); const data = await response.json(); if(data.success) { alert(`تم ضبط الحد الأقصى إلى ${max}`); gameSettings.maxPlayers = max; } else { alert(data.error); } } catch(e) { alert('خطأ بالاتصال'); } },
            async adminDeposit() { const email = document.getElementById('targetEmail').value; const amount = parseInt(document.getElementById('amount').value); if(!email || !amount) return alert('أدخل البريد والمبلغ'); try { const response = await fetch(`${SERVER_URL}/api/admin/balance`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ adminToken: 'authenticated', userId: email, amount, action: 'deposit' }) }); const data = await response.json(); if(data.success) { alert(`تم إيداع ${amount} للمستخدم ${email}`); this.refreshStats(); } else { alert(data.error); } } catch(e) { alert('خطأ في الاتصال'); } },
            async adminWithdraw() { const email = document.getElementById('targetEmail').value; const amount = parseInt(document.getElementById('amount').value); if(!email || !amount) return alert('أدخل البريد والمبلغ'); try { const response = await fetch(`${SERVER_URL}/api/admin/balance`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ adminToken: 'authenticated', userId: email, amount, action: 'withdraw' }) }); const data = await response.json(); if(data.success) { alert(`تم سحب ${amount} من المستخدم ${email}`); this.refreshStats(); } else { alert(data.error); } } catch(e) { alert('خطأ في الاتصال'); } },

        };
        
        window.gameApp = gameApp;
