<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المحارب المدرع - AAA Multiplayer Ready</title>
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body { margin: 0; overflow: hidden; background: #0a0e27; font-family: 'Arial', sans-serif; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #info-panel { position: absolute; top: 20px; left: 20px; background: rgba(10, 14, 39, 0.9); color: #00ff88; padding: 15px 25px; border-radius: 8px; border: 2px solid #00ff88; font-family: 'Courier New', monospace; font-size: 0.9rem; }
        #info-panel h1 { margin: 0; font-size: 1.2rem; color: #00ffff; text-shadow: 0 0 10px #00ffff; }
        #info-panel p { margin: 5px 0 0; font-size: 0.8rem; }
        #joystick-container { position: absolute; bottom: 50px; left: 50px; width: 140px; height: 140px; background: rgba(0, 255, 136, 0.08); border-radius: 50%; pointer-events: auto; border: 2px solid rgba(0, 255, 136, 0.3); }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; background: radial-gradient(circle, #00ff88, #00cc66); border-radius: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 20px #00ff88, inset 0 0 10px rgba(0,0,0,0.5); }
        #action-buttons { position: absolute; bottom: 50px; right: 50px; display: flex; gap: 30px; pointer-events: auto; }
        .action-btn { width: 90px; height: 90px; border-radius: 50%; border: 2px solid; color: white; font-weight: bold; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px; transition: transform 0.1s, box-shadow 0.2s; user-select: none; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), rgba(0,0,0,0.5)); }
        #btn-jump { border-color: #00d4ff; box-shadow: 0 0 20px #00d4ff, inset 0 0 10px rgba(0,212,255,0.2); }
        #btn-throw { border-color: #ff0055; box-shadow: 0 0 20px #ff0055, inset 0 0 10px rgba(255,0,85,0.2); }
        .action-btn:active { transform: scale(0.85); }
        #score-panel { position: absolute; top: 20px; right: 20px; background: rgba(10, 14, 39, 0.9); color: #ffff00; padding: 12px 25px; border-radius: 8px; border: 2px solid #ffff00; font-size: 1.2rem; font-weight: bold; font-family: 'Courier New', monospace; text-shadow: 0 0 10px #ffff00; }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="info-panel">
            <h1>⚔️ HEAVY VANGUARD - AAA</h1>
            <p>MULTIPLAYER READY • LASER-STRAIGHT PROJECTILES • CINEMATIC ANIMATIONS</p>
        </div>
        <div id="score-panel">TARGETS: <span id="score">0</span></div>
        <div id="joystick-container"><div id="joystick-knob"></div></div>
        <div id="action-buttons">
            <button class="action-btn" id="btn-jump">⬆️</button>
            <button class="action-btn" id="btn-throw">🔥</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==========================================
        // 1. إعداد المشهد (Cinematic Scene)
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0e27);
        scene.fog = new THREE.Fog(0x0a0e27, 100, 250);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        // الإضاءة الاحترافية
        const sunLight = new THREE.DirectionalLight(0x00ffff, 1.5);
        sunLight.position.set(80, 120, 80);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 4096;
        sunLight.shadow.mapSize.height = 4096;
        sunLight.shadow.camera.left = -200;
        sunLight.shadow.camera.right = 200;
        sunLight.shadow.camera.top = 200;
        sunLight.shadow.camera.bottom = -200;
        sunLight.shadow.bias = -0.0008;
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0x1a2a4a, 0.8);
        scene.add(ambientLight);

        const neonLight = new THREE.PointLight(0xff0055, 1.0);
        neonLight.position.set(-50, 50, 50);
        scene.add(neonLight);

        // الأرضية (Cyber-Style)
        const groundGeo = new THREE.PlaneGeometry(500, 500);
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x0f1a2a,
            roughness: 0.95,
            metalness: 0.1,
            map: new THREE.CanvasTexture(createGridTexture())
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        function createGridTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0f1a2a';
            ctx.fillRect(0, 0, 512, 512);
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 1;
            for(let i=0; i<=512; i+=32) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, 512);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(512, i);
                ctx.stroke();
            }
            return canvas;
        }

        // العوائق
        const obstacles = [];
        for(let i=0; i<50; i++) {
            const rockGeo = new THREE.DodecahedronGeometry(Math.random() * 3.5 + 1.5);
            const rockMat = new THREE.MeshStandardMaterial({
                color: 0x1a3a4a,
                roughness: 0.7,
                metalness: 0.3
            });
            const rock = new THREE.Mesh(rockGeo, rockMat);
            rock.position.set(Math.random()*350-175, 0, Math.random()*350-175);
            rock.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
            rock.castShadow = true;
            rock.receiveShadow = true;
            scene.add(rock);
            obstacles.push({ mesh: rock, radius: Math.random() * 3.5 + 1.5 });
        }

        // ==========================================
        // 2. بناء الشخصية (Cyber-Knight AAA)
        // ==========================================
        const matArmor = new THREE.MeshStandardMaterial({
            color: 0x1a1a3e,
            metalness: 0.95,
            roughness: 0.1,
            emissive: 0x00ff88,
            emissiveIntensity: 0.15
        });
        const matJoint = new THREE.MeshStandardMaterial({
            color: 0xff6600,
            metalness: 0.8,
            roughness: 0.2,
            emissive: 0xff3300,
            emissiveIntensity: 0.3
        });
        const matGlow = new THREE.MeshStandardMaterial({
            color: 0x00ffff,
            emissive: 0x00ffff,
            emissiveIntensity: 0.8,
            metalness: 0.9
        });

        const character = new THREE.Group();
        character.scale.set(1.3, 1.3, 1.3);
        scene.add(character);

        // الجذع
        const torsoGroup = new THREE.Group();
        character.add(torsoGroup);

        const upperTorso = new THREE.Mesh(new THREE.CylinderGeometry(1.0, 0.6, 1.2, 32), matArmor);
        upperTorso.position.y = 2.6;
        upperTorso.castShadow = true;
        torsoGroup.add(upperTorso);

        const lowerTorso = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.72, 1.0, 32), matArmor);
        lowerTorso.position.y = 1.7;
        lowerTorso.castShadow = true;
        torsoGroup.add(lowerTorso);

        // الرأس
        const headGroup = new THREE.Group();
        torsoGroup.add(headGroup);

        const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), matArmor);
        head.position.y = 3.4;
        head.castShadow = true;
        headGroup.add(head);

        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.16, 0.2), matGlow);
        visor.position.set(0, 3.5, 0.35);
        headGroup.add(visor);

        // الأذرع
        function buildArm(side) {
            const armGroup = new THREE.Group();
            const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.58, 32, 32), matJoint);
            shoulder.castShadow = true;
            armGroup.add(shoulder);

            const bicep = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.26, 1.05, 32), matArmor);
            bicep.position.y = -0.7;
            bicep.castShadow = true;
            armGroup.add(bicep);

            const forearmGroup = new THREE.Group();
            forearmGroup.position.y = -1.3;

            const elbow = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), matJoint);
            elbow.castShadow = true;
            forearmGroup.add(elbow);

            const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.34, 0.28, 1.1, 32), matArmor);
            forearm.position.y = -0.6;
            forearm.castShadow = true;
            forearmGroup.add(forearm);

            const wrist = new THREE.Mesh(new THREE.SphereGeometry(0.25, 28, 28), matJoint);
            wrist.position.y = -1.2;
            wrist.castShadow = true;
            forearmGroup.add(wrist);

            const hand = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.36, 0.4), matJoint);
            hand.position.y = -1.35;
            hand.castShadow = true;
            forearmGroup.add(hand);

            armGroup.add(forearmGroup);
            armGroup.position.set(side * 1.45, 2.9, 0);

            return { armGroup, forearmGroup };
        }

        const rightArmData = buildArm(1);
        const leftArmData = buildArm(-1);
        torsoGroup.add(rightArmData.armGroup);
        torsoGroup.add(leftArmData.armGroup);

        // الأرجل
        function buildLeg(side) {
            const legGroup = new THREE.Group();
            const hipJoint = new THREE.Mesh(new THREE.SphereGeometry(0.48, 32, 32), matJoint);
            hipJoint.position.y = -0.2;
            hipJoint.castShadow = true;
            legGroup.add(hipJoint);

            const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.46, 0.36, 1.3, 32), matArmor);
            thigh.position.y = -0.8;
            thigh.castShadow = true;
            legGroup.add(thigh);

            const shinGroup = new THREE.Group();
            shinGroup.position.y = -1.5;

            const knee = new THREE.Mesh(new THREE.SphereGeometry(0.36, 32, 32), matJoint);
            knee.castShadow = true;
            shinGroup.add(knee);

            const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.36, 0.28, 1.3, 32), matArmor);
            shin.position.y = -0.68;
            shin.castShadow = true;
            shinGroup.add(shin);

            const ankle = new THREE.Mesh(new THREE.SphereGeometry(0.3, 28, 28), matJoint);
            ankle.position.y = -1.35;
            ankle.castShadow = true;
            shinGroup.add(ankle);

            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.34, 1.15), matArmor);
            foot.position.set(0, -1.52, 0.28);
            foot.castShadow = true;
            shinGroup.add(foot);

            legGroup.add(shinGroup);
            legGroup.position.set(side * 0.7, 1.5, 0);

            return { legGroup, shinGroup };
        }

        const rightLegData = buildLeg(1);
        const leftLegData = buildLeg(-1);
        character.add(rightLegData.legGroup);
        character.add(leftLegData.legGroup);

        // ==========================================
        // 3. نظام الأهداف
        // ==========================================
        const targets = [];
        let score = 0;
        function spawnTarget() {
            const target = new THREE.Mesh(
                new THREE.SphereGeometry(1.5, 20, 20),
                new THREE.MeshStandardMaterial({
                    color: 0xff0055,
                    emissive: 0xff0055,
                    emissiveIntensity: 0.6,
                    metalness: 0.7
                })
            );
            const angle = Math.random() * Math.PI * 2;
            const dist = 30 + Math.random() * 60;
            target.position.set(Math.cos(angle)*dist, 2.5, Math.sin(angle)*dist);
            target.castShadow = true;
            scene.add(target);
            targets.push(target);
        }
        for(let i=0; i<18; i++) spawnTarget();

        // ==========================================
        // 4. نظام القذائف (Laser-Straight)
        // ==========================================
        const projectiles = [];
        const particles = [];
        const trails = [];

        function fireProjectile(isRight) {
            const hand = isRight ? rightArmData.forearmGroup.children[3] : leftArmData.forearmGroup.children[3];
            const handWorldPos = new THREE.Vector3();
            hand.getWorldPosition(handWorldPos);

            const proj = new THREE.Mesh(
                new THREE.SphereGeometry(0.3, 16, 16),
                new THREE.MeshStandardMaterial({
                    color: 0xff0055,
                    emissive: 0xff0055,
                    emissiveIntensity: 1.0,
                    metalness: 0.9
                })
            );
            proj.position.copy(handWorldPos);
            proj.castShadow = true;
            scene.add(proj);

            // اتجاه مستقيم تماماً
            const dir = new THREE.Vector3(0, 0, 1);
            dir.applyQuaternion(character.quaternion);
            dir.normalize();

            projectiles.push({
                mesh: proj,
                vel: dir.multiplyScalar(1.2), // سرعة عالية جداً
                life: 200,
                hasExploded: false,
                startPos: handWorldPos.clone()
            });

            // إضافة وميض عند الرمي
            addMuzzleFlash(handWorldPos);
        }

        function addMuzzleFlash(pos) {
            const flash = new THREE.Mesh(
                new THREE.SphereGeometry(0.4, 8, 8),
                new THREE.MeshStandardMaterial({
                    color: 0xffff00,
                    emissive: 0xffff00,
                    emissiveIntensity: 2.0
                })
            );
            flash.position.copy(pos);
            scene.add(flash);
            particles.push({
                mesh: flash,
                vel: new THREE.Vector3(0, 0, 0),
                life: 0,
                maxLife: 8,
                isMuzzle: true
            });
        }

        function createExplosion(pos) {
            // انفجار سينمائي
            for(let i=0; i<50; i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(0.1 + Math.random() * 0.12, 8, 8),
                    new THREE.MeshStandardMaterial({
                        color: [0xff0055, 0xffff00, 0xff6600][Math.floor(Math.random()*3)],
                        emissive: [0xff0055, 0xffff00, 0xff6600][Math.floor(Math.random()*3)],
                        emissiveIntensity: 1.0,
                        metalness: 0.8
                    })
                );
                p.position.copy(pos);
                scene.add(p);

                const angle = Math.random() * Math.PI * 2;
                const elevation = Math.random() * Math.PI - Math.PI / 2;
                const vel = new THREE.Vector3(
                    Math.cos(angle) * Math.cos(elevation),
                    Math.sin(elevation),
                    Math.sin(angle) * Math.cos(elevation)
                ).multiplyScalar(0.5 + Math.random() * 0.3);

                particles.push({
                    mesh: p,
                    vel: vel,
                    life: 0,
                    maxLife: 60,
                    friction: 0.96
                });
            }

            // موجة صدمة
            const shockwave = new THREE.Mesh(
                new THREE.SphereGeometry(0.8, 20, 20),
                new THREE.MeshStandardMaterial({
                    color: 0xff0055,
                    emissive: 0xff0055,
                    emissiveIntensity: 1.0,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.8
                })
            );
            shockwave.position.copy(pos);
            scene.add(shockwave);

            particles.push({
                mesh: shockwave,
                vel: new THREE.Vector3(0, 0, 0),
                life: 0,
                maxLife: 25,
                isShockwave: true,
                initialScale: 0.8
            });
        }

        // ==========================================
        // 5. نظام التحكم
        // ==========================================
        const input = { forward: 0, side: 0, jump: false, throw: false };
        const joystick = { active: false, startX: 0, startY: 0 };
        const knob = document.getElementById('joystick-knob');

        document.getElementById('joystick-container').addEventListener('touchstart', (e) => {
            joystick.active = true;
            joystick.startX = e.touches[0].clientX;
            joystick.startY = e.touches[0].clientY;
        });

        window.addEventListener('touchmove', (e) => {
            if (!joystick.active) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystick.startX;
            let dy = touch.clientY - joystick.startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 60;
            if (dist > maxDist) {
                dx *= maxDist / dist;
                dy *= maxDist / dist;
            }
            knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            input.side = -dx / maxDist;
            input.forward = -dy / maxDist;
        });

        window.addEventListener('touchend', () => {
            joystick.active = false;
            knob.style.transform = `translate(-50%, -50%)`;
            input.forward = 0;
            input.side = 0;
        });

        document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); input.jump = true; });
        document.getElementById('btn-throw').addEventListener('touchstart', (e) => { e.preventDefault(); input.throw = true; });

        const keys = {};
        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // ==========================================
        // 6. منطق اللعبة
        // ==========================================
        let state = 'idle';
        let animTime = 0;
        let verticalVel = 0;
        let isJumping = false;
        let throwTimer = 0;
        let throwSide = true;

        function lerp(a, b, t) { return a + (b - a) * Math.min(t, 1); }

        function checkCollision(pos, radius) {
            for(let obs of obstacles) {
                if(pos.distanceTo(obs.mesh.position) < radius + obs.radius) return true;
            }
            return false;
        }

        function updateLogic() {
            if (keys['KeyW']) input.forward = 1;
            else if (keys['KeyS']) input.forward = -1;
            else if (!joystick.active) input.forward = 0;

            if (keys['KeyA']) input.side = 1;
            else if (keys['KeyD']) input.side = -1;
            else if (!joystick.active) input.side = 0;

            if (keys['Space']) input.jump = true;
            if (keys['KeyF'] || keys['KeyT']) input.throw = true;

            // الحركة
            if (Math.abs(input.forward) > 0.1 || Math.abs(input.side) > 0.1) {
                const angle = Math.atan2(input.side, input.forward);
                character.rotation.y = angle;
                const speed = 0.25;
                const newPos = character.position.clone();
                newPos.x += Math.sin(character.rotation.y) * speed;
                newPos.z += Math.cos(character.rotation.y) * speed;
                
                if(!checkCollision(newPos, 1.4)) {
                    character.position.copy(newPos);
                }
                state = 'run';
            } else {
                state = 'idle';
            }

            // القفز
            if (input.jump && !isJumping) {
                verticalVel = 0.4;
                isJumping = true;
                input.jump = false;
            }
            if (isJumping) {
                character.position.y += verticalVel;
                verticalVel -= 0.022;
                if (character.position.y <= 0) {
                    character.position.y = 0;
                    isJumping = false;
                    verticalVel = 0;
                }
                state = 'jump';
            }

            // الرمي
            if (input.throw && throwTimer <= 0) {
                fireProjectile(throwSide);
                throwSide = !throwSide;
                throwTimer = 35;
                input.throw = false;
            }
            if (throwTimer > 0) throwTimer--;

            // كاميرا
            const camOffset = new THREE.Vector3(0, 9, -20);
            camOffset.applyQuaternion(character.quaternion);
            camera.position.lerp(character.position.clone().add(camOffset), 0.12);
            camera.lookAt(character.position.clone().add(new THREE.Vector3(0, 3.5, 0)));

            // القذائف
            for(let i=projectiles.length-1; i>=0; i--) {
                const p = projectiles[i];
                p.mesh.position.add(p.vel);
                p.life--;

                // تصادم مع الأهداف
                targets.forEach((t, idx) => {
                    if (p.mesh.position.distanceTo(t.position) < 2.0) {
                        createExplosion(t.position);
                        scene.remove(t);
                        targets.splice(idx, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                        spawnTarget();
                        p.life = 0;
                    }
                });

                // تصادم مع الأرض
                if (p.mesh.position.y < 0.5 && !p.hasExploded) {
                    createExplosion(p.mesh.position);
                    p.hasExploded = true;
                    p.life = 0;
                }

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    projectiles.splice(i, 1);
                }
            }

            // الجزيئات
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                if(p.isShockwave) {
                    const progress = p.life / p.maxLife;
                    p.mesh.scale.set(1 + progress * 5, 1 + progress * 5, 1 + progress * 5);
                    p.mesh.material.opacity = 0.8 * (1 - progress);
                } else if(p.isMuzzle) {
                    p.mesh.material.emissiveIntensity = 2.0 * (1 - p.life / p.maxLife);
                } else {
                    p.mesh.position.add(p.vel);
                    p.vel.multiplyScalar(p.friction);
                    p.vel.y -= 0.008;
                    p.life++;
                    if (p.life > p.maxLife * 0.5) {
                        p.mesh.material.opacity = 1 - (p.life - p.maxLife * 0.5) / (p.maxLife * 0.5);
                        p.mesh.material.transparent = true;
                    }
                }
                if (p.life >= p.maxLife) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
        }

        function updateAnimations() {
            const s = 0.2;
            if (state === 'idle') {
                rightArmData.armGroup.rotation.x = lerp(rightArmData.armGroup.rotation.x, Math.sin(animTime * 0.3) * 0.12, s);
                leftArmData.armGroup.rotation.x = lerp(leftArmData.armGroup.rotation.x, -Math.sin(animTime * 0.3) * 0.12, s);
                rightArmData.forearmGroup.rotation.x = lerp(rightArmData.forearmGroup.rotation.x, -0.3, s);
                leftArmData.forearmGroup.rotation.x = lerp(leftArmData.forearmGroup.rotation.x, -0.3, s);
                rightLegData.legGroup.rotation.x = lerp(rightLegData.legGroup.rotation.x, 0, s);
                leftLegData.legGroup.rotation.x = lerp(leftLegData.legGroup.rotation.x, 0, s);
                rightLegData.shinGroup.rotation.x = lerp(rightLegData.shinGroup.rotation.x, 0, s);
                leftLegData.shinGroup.rotation.x = lerp(leftLegData.shinGroup.rotation.x, 0, s);
                torsoGroup.rotation.z = lerp(torsoGroup.rotation.z, 0, s);
            } else if (state === 'run') {
                const t = animTime * 6.0;
                rightLegData.legGroup.rotation.x = lerp(rightLegData.legGroup.rotation.x, Math.sin(t) * 0.9, s);
                leftLegData.legGroup.rotation.x = lerp(leftLegData.legGroup.rotation.x, -Math.sin(t) * 0.9, s);
                rightLegData.shinGroup.rotation.x = lerp(rightLegData.shinGroup.rotation.x, Math.max(0, -Math.sin(t)) * 1.0, s);
                leftLegData.shinGroup.rotation.x = lerp(leftLegData.shinGroup.rotation.x, Math.max(0, Math.sin(t)) * 1.0, s);
                
                rightArmData.armGroup.rotation.x = lerp(rightArmData.armGroup.rotation.x, Math.sin(t) * 0.8, s);
                leftArmData.armGroup.rotation.x = lerp(leftArmData.armGroup.rotation.x, -Math.sin(t) * 0.8, s);
                rightArmData.forearmGroup.rotation.x = lerp(rightArmData.forearmGroup.rotation.x, -1.25, s);
                leftArmData.forearmGroup.rotation.x = lerp(leftArmData.forearmGroup.rotation.x, -1.25, s);
                
                torsoGroup.rotation.z = Math.sin(t * 0.5) * 0.1;
            } else if (state === 'jump') {
                rightArmData.armGroup.rotation.x = lerp(rightArmData.armGroup.rotation.x, 1.0, s);
                leftArmData.armGroup.rotation.x = lerp(leftArmData.armGroup.rotation.x, 1.0, s);
                rightArmData.forearmGroup.rotation.x = lerp(rightArmData.forearmGroup.rotation.x, -1.5, s);
                leftArmData.forearmGroup.rotation.x = lerp(leftArmData.forearmGroup.rotation.x, -1.5, s);
                rightLegData.legGroup.rotation.x = lerp(rightLegData.legGroup.rotation.x, -0.7, s);
                leftLegData.legGroup.rotation.x = lerp(leftLegData.legGroup.rotation.x, -0.7, s);
                rightLegData.shinGroup.rotation.x = lerp(rightLegData.shinGroup.rotation.x, 1.0, s);
                leftLegData.shinGroup.rotation.x = lerp(leftLegData.shinGroup.rotation.x, 1.0, s);
            }

            // أنيميشن الرمي
            if(throwTimer > 18) {
                const throwProgress = (35 - throwTimer) / 17;
                if(throwSide) {
                    rightArmData.armGroup.rotation.x = lerp(rightArmData.armGroup.rotation.x, -1.4 + throwProgress * 0.6, s);
                    rightArmData.armGroup.rotation.z = lerp(rightArmData.armGroup.rotation.z, -0.5, s);
                    rightArmData.forearmGroup.rotation.x = lerp(rightArmData.forearmGroup.rotation.x, -2.0, s);
                } else {
                    leftArmData.armGroup.rotation.x = lerp(leftArmData.armGroup.rotation.x, -1.4 + throwProgress * 0.6, s);
                    leftArmData.armGroup.rotation.z = lerp(leftArmData.armGroup.rotation.z, 0.5, s);
                    leftArmData.forearmGroup.rotation.x = lerp(leftArmData.forearmGroup.rotation.x, -2.0, s);
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            animTime += 0.016;
            updateLogic();
            updateAnimations();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
