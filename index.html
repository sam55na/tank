<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Warrior Pro - شخصية حربية احترافية من الكرات المنحوتة</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 100;
            font-size: 14px;
            pointer-events: none;
            backdrop-filter: blur(8px);
            border-left: 4px solid #ff5500;
            font-weight: bold;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
            z-index: 100;
            font-size: 12px;
            pointer-events: none;
            font-family: monospace;
        }
        #stats {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ffaa66;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        🎯 ELITE WARRIOR | 💣 TACTICAL BOMB | ⚡ SPHERICAL SCULPTING
    </div>
    <div id="controls">
        🖱️ اسحب بالماوس للتدوير | 🔍 اسكرول للتكبير
    </div>
    <div id="stats">
        ⚙️ جاري التحميل...
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // المشهد
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3.5, 7);
        camera.lookAt(0, 2.5, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 2.5, 0);
        
        // إضاءة نظيفة
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        mainLight.position.set(4, 6, 4);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x88aaff, 0.4);
        fillLight.position.set(-2, 3, 2);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffaa77, 0.45);
        backLight.position.set(0, 3, -4);
        scene.add(backLight);
        
        const bombLight = new THREE.PointLight(0xff5533, 0.5);
        bombLight.position.set(2, 2.3, 1.2);
        scene.add(bombLight);
        
        // أرضية
        const gridHelper = new THREE.GridHelper(8, 16, 0x88aaff, 0x446688);
        gridHelper.position.y = -1.3;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.4;
        scene.add(gridHelper);
        
        // مجموعة الشخصية
        const character = new THREE.Group();
        scene.add(character);
        
        let sphereCount = 0;
        
        function addSphere(x, y, z, radius, color, metalness = 0.65, roughness = 0.3, emissive = null) {
            const geometry = new THREE.SphereGeometry(radius, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                metalness: metalness,
                roughness: roughness,
                emissive: emissive || 0x000000,
                emissiveIntensity: emissive ? 0.25 : 0
            });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(x, y, z);
            sphere.castShadow = true;
            sphere.receiveShadow = true;
            character.add(sphere);
            sphereCount++;
            return sphere;
        }
        
        // =============== الألوان ===============
        const C = {
            armor: 0x4a5568,
            armorLight: 0x6b7a92,
            armorDark: 0x2d3748,
            steel: 0x8e9eb5,
            gold: 0xd4af37,
            red: 0xdd5533,
            darkRed: 0xaa3322,
            visor: 0x2a7fae,
            bomb: 0x5a7a4a,
            bombStripe: 0xe8b84a,
            leather: 0x8b5a2b,
            black: 0x222233,
            silver: 0xb8c4d8,
            fabric: 0x5a6b42
        };
        
        // =============== الرأس ===============
        addSphere(0, 4.1, 0, 0.55, C.armorLight, 0.7, 0.28);
        // حاجب العين
        addSphere(0, 3.95, 0.65, 0.32, C.visor, 0.85, 0.2, C.visor);
        addSphere(0.35, 3.95, 0.62, 0.26, C.visor, 0.85, 0.2);
        addSphere(-0.35, 3.95, 0.62, 0.26, C.visor, 0.85, 0.2);
        // جهاز اتصال
        addSphere(0.72, 4.05, 0.15, 0.16, C.red, 0.6, 0.35, C.red);
        addSphere(-0.7, 4.08, 0.12, 0.14, C.silver, 0.8, 0.25);
        // قمة الخوذة
        addSphere(0, 4.65, 0, 0.18, C.gold, 0.85, 0.2);
        
        // =============== الجذع ===============
        // الصدر
        addSphere(0, 3.15, 0.1, 0.68, C.armor, 0.68, 0.3);
        addSphere(0.5, 3.2, 0.15, 0.52, C.armorLight, 0.7, 0.28);
        addSphere(-0.5, 3.2, 0.15, 0.52, C.armorLight, 0.7, 0.28);
        // عضلات الصدر
        addSphere(0.55, 3.0, 0.65, 0.35, C.steel, 0.78, 0.24);
        addSphere(-0.55, 3.0, 0.65, 0.35, C.steel, 0.78, 0.24);
        addSphere(0, 3.05, 0.78, 0.38, C.gold, 0.82, 0.22);
        
        // البطن
        addSphere(0, 2.45, 0.05, 0.6, C.fabric, 0.3, 0.55);
        addSphere(0.4, 2.5, 0.1, 0.44, C.fabric, 0.3, 0.55);
        addSphere(-0.4, 2.5, 0.1, 0.44, C.fabric, 0.3, 0.55);
        
        // الحزام
        addSphere(0, 2.0, 0.2, 0.48, C.leather, 0.4, 0.5);
        
        // =============== الأكتاف ===============
        addSphere(0.95, 3.4, 0, 0.44, C.armorLight, 0.75, 0.26);
        addSphere(-0.95, 3.4, 0, 0.42, C.armorLight, 0.75, 0.26);
        addSphere(1.1, 3.5, 0.1, 0.32, C.gold, 0.85, 0.22);
        addSphere(-1.05, 3.48, 0.08, 0.3, C.gold, 0.85, 0.22);
        
        // =============== الذراع الأيمن ===============
        addSphere(1.3, 3.1, 0, 0.4, C.armor, 0.68, 0.3);
        addSphere(1.5, 2.7, -0.05, 0.36, C.armorLight, 0.7, 0.28);
        addSphere(1.68, 2.3, -0.1, 0.32, C.armorLight, 0.72, 0.27);
        addSphere(1.82, 1.9, -0.12, 0.28, C.steel, 0.74, 0.26);
        addSphere(1.9, 1.5, -0.15, 0.24, C.steel, 0.75, 0.25);
        
        // =============== الذراع الأيسر ===============
        addSphere(-1.28, 3.1, 0, 0.38, C.armor, 0.68, 0.3);
        addSphere(-1.48, 2.72, -0.03, 0.34, C.armorLight, 0.7, 0.28);
        addSphere(-1.65, 2.35, -0.08, 0.3, C.armorLight, 0.71, 0.27);
        addSphere(-1.78, 2.0, -0.1, 0.26, C.steel, 0.73, 0.26);
        
        // =============== الأرجل ===============
        // الرجل اليمنى
        addSphere(0.55, 1.4, 0, 0.42, C.armorDark, 0.65, 0.32);
        addSphere(0.72, 1.0, -0.03, 0.38, C.armorDark, 0.66, 0.31);
        addSphere(0.85, 0.6, -0.06, 0.34, C.black, 0.4, 0.55);
        addSphere(0.92, 0.2, -0.08, 0.3, C.black, 0.35, 0.6);
        
        // الرجل اليسرى
        addSphere(-0.55, 1.4, 0, 0.42, C.armorDark, 0.65, 0.32);
        addSphere(-0.72, 1.0, -0.03, 0.38, C.armorDark, 0.66, 0.31);
        addSphere(-0.85, 0.6, -0.06, 0.34, C.black, 0.4, 0.55);
        addSphere(-0.92, 0.2, -0.08, 0.3, C.black, 0.35, 0.6);
        
        // الأحذية
        addSphere(1.0, -0.08, -0.15, 0.26, C.black, 0.3, 0.65);
        addSphere(-1.0, -0.08, -0.15, 0.26, C.black, 0.3, 0.65);
        
        // واقي الركبة
        addSphere(0.75, 0.85, 0.65, 0.2, C.silver, 0.72, 0.26);
        addSphere(-0.75, 0.85, 0.65, 0.2, C.silver, 0.72, 0.26);
        
        // =============== القنبلة ===============
        // جسم القنبلة
        addSphere(2.4, 2.3, 0.25, 0.42, C.bomb, 0.5, 0.4);
        addSphere(2.78, 2.33, 0.28, 0.4, C.bomb, 0.5, 0.4);
        addSphere(3.14, 2.36, 0.3, 0.38, C.bomb, 0.5, 0.4);
        addSphere(3.48, 2.39, 0.32, 0.36, C.bomb, 0.5, 0.4);
        
        // خطوط تحذير
        addSphere(2.6, 2.32, 0.85, 0.2, C.bombStripe, 0.45, 0.35);
        addSphere(3.0, 2.35, 0.88, 0.19, C.bombStripe, 0.45, 0.35);
        addSphere(3.35, 2.38, 0.9, 0.18, C.bombStripe, 0.45, 0.35);
        
        // رأس القنبلة
        addSphere(3.85, 2.42, 0.35, 0.32, C.gold, 0.8, 0.23);
        addSphere(4.15, 2.45, 0.38, 0.25, C.red, 0.82, 0.21, C.red);
        addSphere(4.38, 2.48, 0.4, 0.18, C.darkRed, 0.85, 0.2, C.darkRed);
        
        // زعانف
        addSphere(2.2, 2.28, 0.95, 0.16, C.silver, 0.75, 0.25);
        addSphere(2.2, 2.28, -0.45, 0.16, C.silver, 0.75, 0.25);
        addSphere(3.55, 2.36, 1.0, 0.16, C.silver, 0.75, 0.25);
        addSphere(3.55, 2.36, -0.5, 0.16, C.silver, 0.75, 0.25);
        
        // أحزمة
        addSphere(2.0, 2.25, 0.5, 0.14, C.leather, 0.35, 0.55);
        addSphere(1.85, 2.35, 0.5, 0.13, C.leather, 0.35, 0.55);
        
        // =============== تفاصيل نظيفة ===============
        // خراطيش ذخيرة
        addSphere(0.35, 2.85, 0.95, 0.11, C.gold, 0.85, 0.2);
        addSphere(-0.35, 2.85, 0.95, 0.11, C.gold, 0.85, 0.2);
        
        // قنابل يدوية
        addSphere(0.7, 1.85, 0.85, 0.16, C.bomb, 0.48, 0.42);
        addSphere(-0.7, 1.85, 0.85, 0.16, C.bomb, 0.48, 0.42);
        
        // جهاز اتصال على الظهر
        addSphere(0, 2.65, -0.85, 0.24, C.black, 0.45, 0.48);
        addSphere(0, 2.85, -0.88, 0.18, C.red, 0.55, 0.4, C.red);
        
        // شارة عسكرية
        addSphere(-1.05, 2.9, 0.7, 0.12, C.red, 0.55, 0.35);
        addSphere(-0.95, 2.8, 0.73, 0.1, C.gold, 0.75, 0.25);
        
        // فتحة تهوية
        addSphere(0.95, 3.1, 0.95, 0.1, C.red, 0.6, 0.3, C.red);
        
        // =============== تأثيرات ===============
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            bombLight.intensity = 0.45 + Math.sin(time * 9) * 0.15;
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        document.getElementById('stats').innerHTML = `✅ ${sphereCount} SPHERES | CLEAN SCULPT`;
        console.log(`✅ شخصية نظيفة من ${sphereCount} كرة | تم إزالة الزوائد`);
    </script>
</body>
</html>
