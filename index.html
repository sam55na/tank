<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحارب الآلي - الإصدار المطور</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a12; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #00f2ff; font-family: 'Courier New', monospace;
            pointer-events: none; text-shadow: 0 0 5px #00f2ff;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }
        #controls {
            position: absolute; bottom: 20px; left: 20px;
            color: #888; font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }
        h2 { margin: 0 0 5px 0; font-size: 18px; }
        p { margin: 0; font-size: 12px; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>⚔️ CYBER-SENTINEL v2.0 ⚔️</h2>
        <p>الحالة: نشط | النظام: مستقر | الألوان: معاكسة للخلفية</p>
    </div>
    <div id="controls">
        🖱️ اسحب للتدوير | 🔍 اسكرول للتكبير
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // 1. إعداد المشهد
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05050a);
        scene.fog = new THREE.FogExp2(0x05050a, 0.02);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3.5, 6);
        camera.lookAt(0, 1.8, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1.8, 0);
        controls.zoomSpeed = 1.2;

        // 2. الإضاءة المحسنة (لإظهار الألوان المعاكسة)
        // ضوء رئيسي
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(4, 8, 3);
        mainLight.castShadow = true;
        mainLight.receiveShadow = false;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        
        // ضوء خلفي
        const backLight = new THREE.PointLight(0xffaa66, 0.5);
        backLight.position.set(-2, 3, -4);
        scene.add(backLight);
        
        // ضوء جانبي أيسر
        const leftLight = new THREE.PointLight(0x88aaff, 0.4);
        leftLight.position.set(-3, 2, 2);
        scene.add(leftLight);
        
        // ضوء جانبي أيمن
        const rightLight = new THREE.PointLight(0xff8866, 0.4);
        rightLight.position.set(3, 2, 2);
        scene.add(rightLight);
        
        const ambient = new THREE.AmbientLight(0x22223a, 0.5);
        scene.add(ambient);

        // 3. المواد بألوان معاكسة للخلفية (ذهبي/برتقالي/أحمر)
        const matArmor = new THREE.MeshStandardMaterial({ color: 0xdd8844, metalness: 0.85, roughness: 0.25, emissive: 0x442200, emissiveIntensity: 0.1 });
        const matDarkArmor = new THREE.MeshStandardMaterial({ color: 0xcc7733, metalness: 0.8, roughness: 0.3 });
        const matGold = new THREE.MeshStandardMaterial({ color: 0xffaa55, metalness: 0.9, roughness: 0.15, emissive: 0xff4400, emissiveIntensity: 0.15 });
        const matGlow = new THREE.MeshStandardMaterial({ color: 0xff6600, metalness: 0.7, roughness: 0.2, emissive: 0xff3300, emissiveIntensity: 0.5 });
        const matRed = new THREE.MeshStandardMaterial({ color: 0xdd4422, metalness: 0.6, roughness: 0.3 });
        const matJoint = new THREE.MeshStandardMaterial({ color: 0xeeaa66, metalness: 0.75, roughness: 0.25 });

        // 4. بناء الشخصية (Group)
        const robot = new THREE.Group();
        scene.add(robot);

        // الجسد (أسطواني مع تفاصيل)
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.45, 1.3, 16), matArmor);
        body.position.y = 2.2;
        body.castShadow = true;
        robot.add(body);
        
        // لوحة صدرية ذهبية
        const chestPlate = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.5, 0.1), matGold);
        chestPlate.position.set(0, 2.3, 0.45);
        chestPlate.castShadow = true;
        robot.add(chestPlate);
        
        // خطوط زخرفية على الجسد
        const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.8, 0.05), matGlow);
        stripe.position.set(0.3, 2.2, 0.5);
        robot.add(stripe);
        
        const stripe2 = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.8, 0.05), matGlow);
        stripe2.position.set(-0.3, 2.2, 0.5);
        robot.add(stripe2);

        // الرأس مع تفاصيل
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.58, 0.5, 0.58), matDarkArmor);
        head.position.y = 3.05;
        head.castShadow = true;
        robot.add(head);
        
        // خوذة/قمة
        const crest = new THREE.Mesh(new THREE.ConeGeometry(0.25, 0.35, 8), matGold);
        crest.position.set(0, 3.38, 0);
        crest.castShadow = true;
        robot.add(crest);
        
        // العين الرئيسية (متوهجة)
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.13, 24, 24), matGlow);
        eye.position.set(0, 3.08, 0.32);
        eye.castShadow = true;
        robot.add(eye);
        
        // عين ثانوية جانبية
        const eyeSide = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), matRed);
        eyeSide.position.set(0.28, 3.05, 0.3);
        eyeSide.castShadow = true;
        robot.add(eyeSide);
        
        const eyeSideL = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), matRed);
        eyeSideL.position.set(-0.28, 3.05, 0.3);
        eyeSideL.castShadow = true;
        robot.add(eyeSideL);
        
        // فتحات تهوية جانبية
        const vent = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.08, 0.05), matGold);
        vent.position.set(0.32, 2.92, 0.32);
        robot.add(vent);
        
        const ventL = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.08, 0.05), matGold);
        ventL.position.set(-0.32, 2.92, 0.32);
        robot.add(ventL);

        // الأذرع (وضعية قتالية محسنة)
        function addArm(side) {
            const armGroup = new THREE.Group();
            
            // كتف (كرة)
            const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.32, 24, 24), matGold);
            shoulder.position.y = 0;
            armGroup.add(shoulder);
            
            // واقي كتف
            const pauldron = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.38, 0.25, 8), matArmor);
            pauldron.position.y = 0.05;
            pauldron.rotation.x = 0.3;
            armGroup.add(pauldron);

            // عضد (الجزء العلوي)
            const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.2, 0.85, 12), matDarkArmor);
            upper.position.y = -0.45;
            upper.castShadow = true;
            armGroup.add(upper);
            
            // مفصل الكوع (كرة)
            const elbow = new THREE.Mesh(new THREE.SphereGeometry(0.18, 20, 20), matJoint);
            elbow.position.set(0, -0.85, 0.15);
            armGroup.add(elbow);

            // ساعد (الجزء السفلي)
            const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.16, 0.8, 12), matArmor);
            lower.position.set(0, -1.25, 0.25);
            lower.rotation.x = -0.55;
            lower.castShadow = true;
            armGroup.add(lower);
            
            // اليد (قبضة)
            const hand = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.22, 0.35), matGold);
            hand.position.set(0, -1.68, 0.35);
            hand.castShadow = true;
            armGroup.add(hand);

            armGroup.position.set(side * 0.92, 2.68, 0);
            robot.add(armGroup);
        }
        addArm(1);  // اليمين
        addArm(-1); // اليسار

        // الأرجل المحسنة
        function addLeg(side) {
            const legGroup = new THREE.Group();
            
            // الفخذ
            const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.24, 0.95, 12), matDarkArmor);
            thigh.position.y = -0.45;
            thigh.castShadow = true;
            legGroup.add(thigh);
            
            // مفصل الركبة
            const knee = new THREE.Mesh(new THREE.SphereGeometry(0.18, 20, 20), matJoint);
            knee.position.set(0, -0.92, 0.1);
            legGroup.add(knee);
            
            // الساق
            const calf = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.2, 0.85, 12), matArmor);
            calf.position.set(0, -1.38, 0);
            calf.castShadow = true;
            legGroup.add(calf);
            
            // القدم
            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.18, 0.75), matDarkArmor);
            foot.position.set(0, -1.82, 0.2);
            foot.castShadow = true;
            legGroup.add(foot);
            
            // واقي القدم الأمامي
            const toe = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.12, 0.28), matGold);
            toe.position.set(0, -1.75, 0.52);
            legGroup.add(toe);
            
            legGroup.position.set(side * 0.52, 1.85, 0);
            robot.add(legGroup);
        }
        addLeg(1);
        addLeg(-1);
        
        // حزام خصر
        const belt = new THREE.Mesh(new THREE.TorusGeometry(0.58, 0.08, 16, 32), matGold);
        belt.rotation.x = Math.PI / 2;
        belt.position.y = 1.65;
        belt.castShadow = true;
        robot.add(belt);
        
        // جهاز على الظهر
        const backPack = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.65, 0.35), matDarkArmor);
        backPack.position.set(0, 2.15, -0.55);
        backPack.castShadow = true;
        robot.add(backPack);
        
        const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.07, 0.45, 6), matGold);
        antenna.position.set(0.2, 2.52, -0.55);
        antenna.castShadow = true;
        robot.add(antenna);

        // أرضية بشبكة متوهجة
        const grid = new THREE.GridHelper(12, 24, 0xff8844, 0x884422);
        grid.position.y = -1.2;
        grid.material.transparent = true;
        grid.material.opacity = 0.5;
        scene.add(grid);
        
        // أرضية شفافة للظلال
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(10, 10),
            new THREE.ShadowMaterial({ opacity: 0.4, color: 0x000000, transparent: true })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -1.15;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // جزيئات خفيفة حول الشخصية
        const particleCount = 200;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 8;
            particlePositions[i*3+1] = Math.random() * 5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 8;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xff8844, size: 0.03, transparent: true, opacity: 0.4 });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // 5. حلقة التحريك
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // دوران بطيء للشخصية
            robot.rotation.y += 0.003;
            
            // نبض العين
            const glowIntensity = 0.4 + Math.sin(time * 8) * 0.2;
            matGlow.emissiveIntensity = glowIntensity;
            
            // دوران الجزيئات
            particles.rotation.y += 0.005;
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // استجابة الشاشة
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('✅ المحارب الآلي جاهز | الألوان: برتقالي/ذهبي معاكس للخلفية الداكنة');
    </script>
</body>
</html>
