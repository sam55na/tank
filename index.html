<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>المحارب المدرع - النسخة المستقرة</title>
    <style>
        body { margin: 0; background-color: #111; overflow: hidden; }
        #loading-hint {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffff; font-family: sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loading-hint">جاري تحميل المحرك...</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.132.2/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. إعداد المشهد
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // إخفاء رسالة التحميل
        document.getElementById('loading-hint').style.display = 'none';

        // 2. إضاءة قوية (لتجنب العتمة)
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 5, 5);
        scene.add(sun);

        // 3. بناء الشخصية المترابطة (High-Contrast & Integrated)
        const robot = new THREE.Group();
        scene.add(robot);

        const matWhite = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 }); // درع أبيض
        const matBlack = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8 }); // مفاصل سوداء

        // الجذع (قطعة واحدة ضخمة)
        const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.6, 1.2, 4, 16), matWhite);
        torso.position.y = 1.8;
        robot.add(torso);

        // الرأس (مدمج مباشرة فوق الجذع)
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 20, 20), matWhite);
        head.position.y = 2.8;
        robot.add(head);

        // عيون (خط أسود عريض)
        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.2), matBlack);
        visor.position.set(0, 2.9, 0.25);
        robot.add(visor);

        // الأذرع (مدمجة في الأكتاف)
        function addArm(side) {
            const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), matBlack);
            shoulder.position.set(side * 0.75, 2.3, 0);
            robot.add(shoulder);

            const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 1), matWhite);
            forearm.position.set(side * 0.85, 1.6, 0);
            forearm.rotation.z = side * 0.1;
            robot.add(forearm);
        }
        addArm(1);
        addArm(-1);

        // الأرجل (قوية ومترابطة)
        function addLeg(side) {
            const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 1.2), matWhite);
            leg.position.set(side * 0.4, 0.7, 0);
            robot.add(leg);

            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.6), matBlack);
            foot.position.set(side * 0.4, 0.1, 0.2);
            robot.add(foot);
        }
        addLeg(1);
        addLeg(-1);

        // 4. التحريك
        function animate() {
            requestAnimationFrame(animate);
            robot.rotation.y += 0.01; // تدوير الشخصية للتأكد من رؤيتها
            renderer.render(scene, camera);
        }
        animate();

        // معالجة تغيير حجم الشاشة
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
