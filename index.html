<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحارب المدرع - تباين عالٍ</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; }
        #indicator {
            position: absolute; top: 10px; left: 10px;
            color: #fff; font-family: monospace; background: rgba(255,0,0,0.5);
            padding: 5px 10px; border-radius: 4px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="indicator">النظام: تباين عالي (High Contrast Mode)</div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/OrbitControls.js';

        // 1. إعداد المشهد بخلفية رمادية فاتحة لتمييز الألوان الداكنة
        const scene = new THREE.Scene();
        scene.background = new Color(0x111111);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 2, 0);

        // 2. إضاءة قوية جداً (ثلاثية النقاط)
        const lightFront = new THREE.DirectionalLight(0xffffff, 1.5);
        lightFront.position.set(0, 5, 5);
        scene.add(lightFront);

        const lightBack = new THREE.DirectionalLight(0xff0000, 1); // ضوء خلفي أحمر للتباين
        lightBack.position.set(0, 5, -5);
        scene.add(lightBack);

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // 3. المواد بألوان متعاكسة (الأبيض والأسود والفسفوري)
        const matMain = new THREE.MeshStandardMaterial({ color: 0xEEEEEE, metalness: 0.2, roughness: 0.1 }); // درع أبيض
        const matJoint = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9 }); // مفاصل سوداء
        const matGlow = new THREE.MeshBasicMaterial({ color: 0x33FF00 }); // عيون خضراء فسفورية

        const character = new THREE.Group();
        scene.add(character);

        // --- الجذع (ضخم ومدمج) ---
        const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.75, 1, 4, 12), matMain);
        torso.position.y = 2;
        character.add(torso);

        // الصدر (قطعة سوداء مدمجة للتباين)
        const chest = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 0.4), matJoint);
        chest.position.set(0, 2.2, 0.5);
        character.add(chest);

        // --- الرأس ---
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), matMain);
        head.position.y = 3.1;
        character.add(head);

        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.2), matGlow);
        visor.position.set(0, 3.2, 0.35);
        character.add(visor);

        // --- الأذرع (تداخل عميق) ---
        function createArm(side) {
            const arm = new THREE.Group();
            
            const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.4, 12, 12), matJoint);
            arm.add(shoulder);

            const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 1.2), matMain);
            forearm.position.y = -0.7;
            forearm.rotation.z = side * 0.2;
            arm.add(forearm);

            const hand = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.35), matJoint);
            hand.position.y = -1.4;
            arm.add(hand);

            arm.position.set(side * 0.8, 2.5, 0); // تداخل مع الجذع
            return arm;
        }
        character.add(createArm(1));
        character.add(createArm(-1));

        // --- الأرجل (قواعد صلبة) ---
        function createLeg(side) {
            const leg = new THREE.Group();
            const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 1.2), matMain);
            thigh.position.y = -0.6;
            leg.add(thigh);

            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 1), matJoint);
            foot.position.set(0, -1.3, 0.2);
            leg.add(foot);

            leg.position.set(side * 0.45, 1.3, 0);
            return leg;
        }
        character.add(createLeg(1));
        character.add(createLeg(-1));

        // 4. حلقة التحريك والتحديث
        function animate() {
            requestAnimationFrame(animate);
            character.rotation.y += 0.01; // دوران مستمر لرؤية الأبعاد
            controls.update();
            renderer.render(scene, camera);
        }

        // معالجة Resize للتأكد من عدم اختفاء المشهد عند تكبير النافذة
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
