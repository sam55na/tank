<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dwarf Bomber - PERFECT | Fixed All Issues</title>
    <style>
        * {
            box-sizing: border-box;
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #0a2f1f;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 30;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 44px;
            height: 44px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 40;
        }
        #crosshair .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 38px;
            height: 38px;
            border: 2px solid #ffaa44;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            animation: pulse 0.8s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        #info-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            color: #ffdd99;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 11px;
            font-weight: bold;
            border-left: 3px solid #ffaa44;
            pointer-events: none;
            z-index: 50;
        }
        #score-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            color: #ffaa44;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 36px;
            font-family: monospace;
            pointer-events: none;
            z-index: 50;
        }

        #left-zone {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200px;
            height: 200px;
            pointer-events: auto;
            z-index: 60;
        }
        .joystick-base {
            position: absolute;
            bottom: 35px;
            left: 35px;
            width: 130px;
            height: 130px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            border: 3px solid #ffaa55;
        }
        .joystick-thumb {
            position: absolute;
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, #ffcc77, #ffaa33);
            border-radius: 50%;
            box-shadow: 0 4px 12px black;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.02s linear;
        }

        #right-zone {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 50%;
            height: 100%;
            pointer-events: auto;
            z-index: 60;
        }
        .camera-hint {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: rgba(255,255,200,0.8);
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 24px;
            pointer-events: none;
        }

        #slider-area {
            position: absolute;
            bottom: 100px;
            left: 190px;
            width: 65px;
            height: 190px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            border: 2px solid #ffaa55;
            pointer-events: auto;
            z-index: 70;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            cursor: pointer;
        }
        #slider-thumb {
            width: 52px;
            height: 52px;
            background: #ffaa55;
            border-radius: 50%;
            margin-bottom: 8px;
            cursor: pointer;
            box-shadow: 0 2px 10px black;
            transition: margin-bottom 0.05s ease-out;
        }
        .slider-labels {
            position: absolute;
            left: -48px;
            top: 10px;
            color: #ffdd99;
            font-size: 11px;
            font-weight: bold;
        }
        #distance-value {
            position: absolute;
            bottom: -38px;
            left: -5px;
            right: -5px;
            text-align: center;
            color: #ffaa55;
            font-weight: bold;
            font-size: 13px;
            background: rgba(0,0,0,0.75);
            padding: 4px;
            border-radius: 20px;
        }

        #action-buttons {
            position: absolute;
            bottom: 100px;
            right: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            pointer-events: auto;
            z-index: 70;
        }
        .action-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border: 2px solid #ffaa55;
            color: white;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.05s;
        }
        .action-btn:active {
            transform: scale(0.92);
            background: #ffaa55;
            color: #222;
        }

        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a3a1a, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            color: #ffcc77;
            font-size: 24px;
            flex-direction: column;
            gap: 15px;
        }

        .bomb-marker-text {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 6px 16px;
            border-radius: 20px;
            color: #ffaa66;
            font-size: 11px;
            pointer-events: none;
            z-index: 80;
        }
        
        @media (max-width: 768px) {
            .joystick-base { width: 100px; height: 100px; bottom: 25px; left: 25px; }
            .joystick-thumb { width: 45px; height: 45px; }
            #left-zone { width: 150px; height: 150px; }
            .action-btn { width: 60px; height: 60px; font-size: 22px; }
            #slider-area { left: 140px; width: 55px; height: 160px; bottom: 80px; }
            #slider-thumb { width: 45px; height: 45px; }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        💣 DWARF BOMBER - PERFECT EDITION 💣<br>
        <span>✅ JOYSTICK FIXED | SLIDER WORKS | SMOOTH MOVEMENT ✅</span>
        <div style="width: 200px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; margin-top: 10px;">
            <div style="width: 0%; height: 100%; background: #ffaa55;" id="loading-bar"></div>
        </div>

    <div id="ui-overlay" style="display: none;">
        <div id="crosshair"><div class="ring"></div></div>
        <div id="info-panel">🎮 اسحب العصا: → يمين | ← يسار | ↑ أمام | ↓ خلف | المنزلق يتحكم بمسافة القنبلة 🎯</div>
        <div id="score-panel">💥 <span id="score">0</span></div>
        
        <div id="left-zone">
            <div class="joystick-base" id="joystick-base"></div>

        <div id="right-zone">
            <div class="camera-hint">🎥 اسحب لتدوير الكاميرا</div>

            <div id="slider-thumb"></div>

        <div id="action-buttons">

            <button class="action-btn" id="btn-throw">💣</button>
        </div>
        <div class="bomb-marker-text">🎯 الدائرة البرتقالية = مكان سقوط القنبلة (تتغير فوراً مع المنزلق)</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        (function() {
            // ========== THREE SETUP ==========
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a3522);
            scene.fog = new THREE.FogExp2(0x0a3522, 0.003);
            
            const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 300);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // Lighting
            const ambient = new THREE.AmbientLight(0x5a6e5a, 0.7);
            scene.add(ambient);
            const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
            mainLight.position.set(10, 20, 8);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 1024;
            mainLight.shadow.mapSize.height = 1024;
            scene.add(mainLight);
            
            // Ground
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshStandardMaterial({ color: 0x5a9e5a, roughness: 0.85 }));
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.05;
            ground.receiveShadow = true;
            scene.add(ground);
            
            const grid = new THREE.GridHelper(300, 40, 0xaacc88, 0x558844);
            grid.position.y = 0.01;
            grid.material.opacity = 0.4;
            scene.add(grid);
            
            // Rocks
            for(let i = 0; i < 80; i++) {
                const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.2 + Math.random() * 0.3), new THREE.MeshStandardMaterial({ color: 0x7a6a55 }));
                rock.position.set((Math.random() - 0.5) * 280, -0.2, (Math.random() - 0.5) * 280);
                rock.castShadow = true;
                scene.add(rock);
            }
            
            // ========== CHARACTER ==========
            let character, mixer, animations = {};
            let currentAction = null;
            let handBone = null;
            let bombInHand = null;
            let throwCooldown = false;
            let modelLoaded = false;
            const SPEED = 0.48;
            
            function createSimpleCharacter() {
                const group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.75, 1.4, 8), new THREE.MeshStandardMaterial({ color: 0x4aae77 }));
                body.castShadow = true;
                body.position.y = 0.7;
                group.add(body);
                
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.6, 24, 24), new THREE.MeshStandardMaterial({ color: 0xffddbb }));
                head.castShadow = true;
                head.position.y = 1.45;
                group.add(head);
                
                const helmet = new THREE.Mesh(new THREE.ConeGeometry(0.65, 0.6, 8), new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.6 }));
                helmet.position.y = 1.8;
                helmet.castShadow = true;
                group.add(helmet);
                
                const rightHand = new THREE.Group();
                rightHand.position.set(0.72, 1.1, 0.32);
                group.add(rightHand);
                handBone = rightHand;
                
                return group;
            }
            
            const loader = new THREE.GLTFLoader();
            let loadAttempts = 0;
            
            function loadModel() {
                loader.load('https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb', 
                    (gltf) => {
                        character = gltf.scene;
                        character.scale.set(0.55, 0.55, 0.55);
                        character.position.set(0, 0, 0);
                        character.traverse(n => { if(n.isMesh) n.castShadow = true; });
                        scene.add(character);
                        mixer = new THREE.AnimationMixer(character);
                        gltf.animations.forEach(clip => animations[clip.name.toLowerCase()] = mixer.clipAction(clip));
                        character.traverse(node => { if(node.isBone && node.name.includes("Hand")) handBone = node; });
                        if(!handBone) { const d = new THREE.Group(); character.add(d); handBone = d; }
                        if(animations['idle']) { currentAction = animations['idle']; currentAction.play(); }
                        modelLoaded = true;
                        createHandBomb();
                        finishLoading();
                    },
                    (xhr) => { document.getElementById('loading-bar').style.width = Math.min((xhr.loaded / xhr.total) * 100, 90) + '%'; },
                    () => { loadAttempts++; if(loadAttempts < 2) setTimeout(loadModel, 800); else { character = createSimpleCharacter(); scene.add(character); modelLoaded = true; finishLoading(); } }
                );
            }
            
            function finishLoading() {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; document.getElementById('ui-overlay').style.display = 'block'; }, 400);
                createHandBomb();
            }
            
            function createHandBomb() {
                if(bombInHand || !handBone) return;
                const bomb = new THREE.Mesh(new THREE.SphereGeometry(0.35, 24, 24), new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.85 }));
                const fuse = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.14, 0.48, 6), new THREE.MeshStandardMaterial({ color: 0xff6633 }));
                fuse.position.y = 0.48;
                bomb.add(fuse);
                bomb.position.set(0.52, -0.12, 0.26);
                handBone.add(bomb);
                bombInHand = bomb;
            }
            
            function removeHandBomb() { if(bombInHand && bombInHand.parent) { bombInHand.parent.remove(bombInHand); bombInHand = null; } }
            
            // ========== CONTROLS ==========
            let moveX = 0, moveZ = 0;
            let jumpRequested = false, throwRequested = false;
            let velocityY = 0, isGrounded = true;
            const GRAVITY = 0.022, JUMP_FORCE = 0.52;
            
            // Keyboard
            const keys = { w: false, s: false, a: false, d: false };
            window.addEventListener('keydown', (e) => {
                if(e.code === 'KeyW') keys.w = true;
                if(e.code === 'KeyS') keys.s = true;
                if(e.code === 'KeyA') keys.a = true;
                if(e.code === 'KeyD') keys.d = true;
                if(e.code === 'Space') { e.preventDefault(); jumpRequested = true; }
                if(e.code === 'KeyF') { e.preventDefault(); throwRequested = true; }
            });
            window.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW') keys.w = false;
                if(e.code === 'KeyS') keys.s = false;
                if(e.code === 'KeyA') keys.a = false;
                if(e.code === 'KeyD') keys.d = false;
            });
            
            // ========== JOYSTICK - PERFECT DIRECTION ==========
            const leftZone = document.getElementById('left-zone');
            const joystickBase = document.getElementById('joystick-base');
            const joystickThumb = document.getElementById('joystick-thumb');
            let joystickActive = false;
            let joyCenterX = 0, joyCenterY = 0;
            const MAX_RADIUS = 52;
            let activeTouch = null;
            
            function updateJoystick(clientX, clientY) {
                let dx = clientX - joyCenterX;
                let dy = clientY - joyCenterY;
                let dist = Math.min(Math.hypot(dx, dy), MAX_RADIUS);
                let angle = Math.atan2(dy, dx);
                let limitedX = Math.cos(angle) * dist;
                let limitedY = Math.sin(angle) * dist;
                joystickThumb.style.transform = `translate(calc(-50% + ${limitedX}px), calc(-50% + ${limitedY}px))`;
                // PERFECT: Right = positive X, Left = negative X
                moveX = limitedX / MAX_RADIUS;
                // Up = negative Y -> positive Z, Down = positive Y -> negative Z
                moveZ = -limitedY / MAX_RADIUS;
            }
            
            function resetJoystick() {
                joystickThumb.style.transform = 'translate(-50%, -50%)';
                if(!keys.w && !keys.s && !keys.a && !keys.d) { moveX = 0; moveZ = 0; }
                joystickActive = false;
                activeTouch = null;
            }
            
            leftZone.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const rect = joystickBase.getBoundingClientRect();
                joyCenterX = rect.left + rect.width / 2;
                joyCenterY = rect.top + rect.height / 2;
                for(let i = 0; i < e.touches.length; i++) {
                    const touch = e.touches[i];
                    const zone = leftZone.getBoundingClientRect();
                    if(touch.clientX >= zone.left && touch.clientX <= zone.right && touch.clientY >= zone.top && touch.clientY <= zone.bottom) {
                        joystickActive = true;
                        activeTouch = touch.identifier;
                        updateJoystick(touch.clientX, touch.clientY);
                        break;
                    }
                }
            });
            
            window.addEventListener('touchmove', (e) => {
                if(!joystickActive || activeTouch === null) return;
                for(let i = 0; i < e.touches.length; i++) {
                    if(e.touches[i].identifier === activeTouch) { 
                        updateJoystick(e.touches[i].clientX, e.touches[i].clientY); 
                        break; 
                    }
                }
            });
            
            window.addEventListener('touchend', (e) => {
                if(!joystickActive) return;
                let found = false;
                for(let i = 0; i < e.touches.length; i++) { 
                    if(e.touches[i].identifier === activeTouch) { found = true; break; } 
                }
                if(!found) resetJoystick();
            });
            
            function updateKeyboard() {
                let x = 0, z = 0;
                if(keys.a) x = -1;
                if(keys.d) x = 1;
                if(keys.w) z = 1;
                if(keys.s) z = -1;
                if(x !== 0 || z !== 0) { moveX = x; moveZ = z; }
                else if(!joystickActive) { moveX = 0; moveZ = 0; }
            }
            
            // ========== CAMERA ==========
            const rightZone = document.getElementById('right-zone');
            let dragActive = false;
            let cameraYaw = 0, targetYaw = 0;
            let cameraPitch = 0.4;
            let dragOffset = 0;
            let lastDrag = 0;
            
            rightZone.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                dragActive = true; 
                lastDrag = e.touches[0].clientX; 
            });
            
            window.addEventListener('touchmove', (e) => { 
                if(dragActive) { 
                    let dx = e.touches[0].clientX - lastDrag; 
                    dragOffset += dx * 0.008; 
                    dragOffset = Math.min(Math.max(dragOffset, -2.2), 2.2); 
                    lastDrag = e.touches[0].clientX; 
                } 
            });
            
            window.addEventListener('touchend', () => { 
                dragActive = false; 
                let start = dragOffset; 
                let startTime = performance.now(); 
                function smooth(t) { 
                    let elapsed = (t - startTime) / 350; 
                    if(elapsed >= 1) { dragOffset = 0; return; } 
                    dragOffset = start * (1 - elapsed); 
                    requestAnimationFrame(smooth); 
                } 
                if(Math.abs(dragOffset) > 0.01) requestAnimationFrame(smooth); 
                else dragOffset = 0; 
            });
            
            // ========== SLIDER - FULLY WORKING ==========
            const sliderArea = document.getElementById('slider-area');
            const sliderThumb = document.getElementById('slider-thumb');
            let throwDistance = 12.5;
            let sliderActiveFlag = false;
            let sliderTouchId = null;
            
            function updateSliderFromY(clientY) {
                const rect = sliderArea.getBoundingClientRect();
                let y = Math.min(rect.bottom, Math.max(rect.top, clientY));
                let t = (rect.bottom - y) / rect.height;
                t = Math.min(1, Math.max(0, t));
                throwDistance = 5 + t * 15;
                document.getElementById('dist-value').innerText = throwDistance.toFixed(1);
                let offset = t * (rect.height - 52);
                sliderThumb.style.marginBottom = `${offset}px`;
                // Update marker immediately
                updateLandingMarker();
            }
            
            sliderArea.addEventListener('touchstart', (e) => {
                e.preventDefault();
                sliderActiveFlag = true;
                sliderTouchId = e.touches[0].identifier;
                updateSliderFromY(e.touches[0].clientY);
            });
            
            window.addEventListener('touchmove', (e) => {
                if(!sliderActiveFlag) return;
                for(let i = 0; i < e.touches.length; i++) {
                    if(e.touches[i].identifier === sliderTouchId) { 
                        updateSliderFromY(e.touches[i].clientY); 
                        break; 
                    }
                }
            });
            
            window.addEventListener('touchend', (e) => {
                if(sliderActiveFlag) {
                    let found = false;
                    for(let i = 0; i < e.touches.length; i++) { 
                        if(e.touches[i].identifier === sliderTouchId) { found = true; break; } 
                    }
                    if(!found) { sliderActiveFlag = false; sliderTouchId = null; }
                }
            });
            
            // Mouse support for testing
            sliderArea.addEventListener('mousedown', (e) => {
                e.preventDefault();
                sliderActiveFlag = true;
                updateSliderFromY(e.clientY);
                function onMouseMove(moveEvent) { updateSliderFromY(moveEvent.clientY); }
                function onMouseUp() { sliderActiveFlag = false; window.removeEventListener('mousemove', onMouseMove); window.removeEventListener('mouseup', onMouseUp); }
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
            });
            
            function initSliderPos() {
                const rect = sliderArea.getBoundingClientRect();
                if(rect.height > 0) {
                    let t = (throwDistance - 5) / 15;
                    let offset = t * (rect.height - 52);
                    sliderThumb.style.marginBottom = `${offset}px`;
                }
            }
            setTimeout(initSliderPos, 200);
            
            // ========== BUTTONS ==========
            const jumpBtn = document.getElementById('btn-jump');
            const throwBtn = document.getElementById('btn-throw');
            
            jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); jumpRequested = true; });
            jumpBtn.addEventListener('touchend', () => { setTimeout(() => jumpRequested = false, 100); });
            jumpBtn.addEventListener('mousedown', () => jumpRequested = true);
            jumpBtn.addEventListener('mouseup', () => setTimeout(() => jumpRequested = false, 100));
            
            throwBtn.addEventListener('touchstart', (e) => { e.preventDefault(); throwRequested = true; });
            throwBtn.addEventListener('touchend', () => { setTimeout(() => throwRequested = false, 100); });
            throwBtn.addEventListener('mousedown', () => throwRequested = true);
            throwBtn.addEventListener('mouseup', () => setTimeout(() => throwRequested = false, 100));
            
            // ========== GAME ==========
            let bombs = [], particles = [], targets = [];
            let score = 0;
            const BLAST_RADIUS = 9.6;
            
            function spawnTarget() {
                const target = new THREE.Mesh(new THREE.BoxGeometry(1.7, 1.7, 1.7), new THREE.MeshStandardMaterial({ color: 0xdd5555, emissive: 0x331100 }));
                const angle = Math.random() * Math.PI * 2;
                const radius = 25 + Math.random() * 115;
                target.position.set(Math.cos(angle) * radius, 0.85, Math.sin(angle) * radius);
                target.castShadow = true;
                scene.add(target);
                targets.push(target);
            }
            
            for(let i = 0; i < 15; i++) spawnTarget();
            
            // ========== PREDICTOR - LIVE WITH SLIDER ==========
            let landingMarker = null;
            
            function createMarker() {
                if(landingMarker) scene.remove(landingMarker);
                const ring = new THREE.Mesh(new THREE.RingGeometry(0.85, 1.4, 32), new THREE.MeshStandardMaterial({ color: 0xffaa55, emissive: 0xff5500, emissiveIntensity: 0.8, side: THREE.DoubleSide, transparent: true, opacity: 0.95 }));
                ring.rotation.x = -Math.PI/2;
                ring.position.y = 0.1;
                scene.add(ring);
                return ring;
            }
            
            function calculateLanding(dist) {
                if(!character) return null;
                const start = character.position.clone().add(new THREE.Vector3(0, 1.5, 0));
                const forwardAngle = character.rotation.y;
                const dir = new THREE.Vector3(Math.sin(forwardAngle), 0, Math.cos(forwardAngle));
                const angleRad = 0.73;
                const gravity = 0.025;
                let speed = Math.sqrt((dist * gravity) / Math.sin(2 * angleRad));
                speed = Math.min(2.5, Math.max(0.85, speed));
                const vx = dir.x * Math.cos(angleRad) * speed;
                const vz = dir.z * Math.cos(angleRad) * speed;
                const vy = Math.sin(angleRad) * speed;
                let pos = start.clone();
                let vel = new THREE.Vector3(vx, vy, vz);
                for(let i = 0; i < 250; i++) {
                    pos.add(vel);
                    vel.y -= gravity;
                    if(pos.y <= 0.2) return pos;
                }
                return null;
            }
            
            function updateLandingMarker() {
                if(!landingMarker) landingMarker = createMarker();
                const pos = calculateLanding(throwDistance);
                if(landingMarker && pos) {
                    landingMarker.position.set(pos.x, 0.12, pos.z);
                    landingMarker.material.emissiveIntensity = 0.7 + Math.sin(Date.now() * 0.012) * 0.35;
                }
            }
            
            function throwBombAction() {
                if(!character || throwCooldown || !modelLoaded) return;
                throwCooldown = true;
                removeHandBomb();
                const start = character.position.clone().add(new THREE.Vector3(0, 1.5, 0));
                const forwardAngle = character.rotation.y;
                const dir = new THREE.Vector3(Math.sin(forwardAngle), 0, Math.cos(forwardAngle));
                const angleRad = 0.73;
                const gravity = 0.025;
                let speed = Math.sqrt((throwDistance * gravity) / Math.sin(2 * angleRad));
                speed = Math.min(2.5, Math.max(0.85, speed));
                const vx = dir.x * Math.cos(angleRad) * speed;
                const vz = dir.z * Math.cos(angleRad) * speed;
                const vy = Math.sin(angleRad) * speed;
                const bomb = new THREE.Mesh(new THREE.SphereGeometry(0.5, 28, 28), new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.9 }));
                const fuse = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.16, 0.55, 8), new THREE.MeshStandardMaterial({ color: 0xff6633 }));
                fuse.position.y = 0.58;
                bomb.add(fuse);
                bomb.position.copy(start);
                bomb.castShadow = true;
                scene.add(bomb);
                bombs.push({ mesh: bomb, vel: new THREE.Vector3(vx, vy, vz), life: 320, gravity: gravity });
                setTimeout(() => { createHandBomb(); throwCooldown = false; }, 380);
            }
            
            function explode(pos) {
                const flash = new THREE.Mesh(new THREE.SphereGeometry(3.5, 16, 16), new THREE.MeshBasicMaterial({ color: 0xff8844, transparent: true, opacity: 0.9 }));
                flash.position.copy(pos);
                scene.add(flash);
                setTimeout(() => scene.remove(flash), 150);
                for(let i = 0; i < 100; i++) {
                    const p = new THREE.Mesh(new THREE.SphereGeometry(0.15 + Math.random() * 0.25), new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4400 }));
                    p.position.copy(pos);
                    scene.add(p);
                    particles.push({ mesh: p, vel: new THREE.Vector3((Math.random() - 0.5) * 3.2, Math.random() * 2.2, (Math.random() - 0.5) * 3.2), life: 0, maxLife: 65, gravity: 0.018 });
                }
                for(let i = 0; i < targets.length; i++) {
                    if(targets[i].position.distanceTo(pos) < BLAST_RADIUS) {
                        scene.remove(targets[i]);
                        targets.splice(i, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                        spawnTarget();
                        i--;
                    }
                }
            }
            
            function updateBombs() {
                for(let i = bombs.length-1; i >= 0; i--) {
                    const b = bombs[i];
                    b.mesh.position.add(b.vel);
                    b.vel.y -= b.gravity;
                    b.mesh.rotation.x += 0.28;
                    if(b.mesh.position.y < 0.2) { explode(b.mesh.position); scene.remove(b.mesh); bombs.splice(i,1); continue; }
                    b.life--;
                    if(b.life <= 0) { explode(b.mesh.position); scene.remove(b.mesh); bombs.splice(i,1); }
                }
            }
            
            function updateParticles() {
                for(let i = particles.length-1; i >= 0; i--) {
                    const p = particles[i];
                    p.mesh.position.add(p.vel);
                    p.vel.y -= p.gravity;
                    p.life++;
                    if(p.life >= p.maxLife || p.mesh.position.y < -0.5) { scene.remove(p.mesh); particles.splice(i,1); }
                }
            }
            
            function handleJumpPhysics() {
                if(jumpRequested && isGrounded) { 
                    velocityY = JUMP_FORCE; 
                    isGrounded = false; 
                    jumpRequested = false; 
                }
                if(!isGrounded) {
                    character.position.y += velocityY;
                    velocityY -= GRAVITY;
                    if(character.position.y <= 0) { 
                        character.position.y = 0; 
                        isGrounded = true; 
                        velocityY = 0; 
                    }
                } else {
                    character.position.y = 0;
                }
            }
            
            function handleMovement() {
                if(!character) return;
                if(Math.abs(moveX) > 0.05 || Math.abs(moveZ) > 0.05) {
                    const angle = Math.atan2(moveX, moveZ);
                    const finalAngle = angle + cameraYaw;
                    character.position.x += Math.sin(finalAngle) * SPEED;
                    character.position.z += Math.cos(finalAngle) * SPEED;
                    character.rotation.y = finalAngle;
                    const limit = 140;
                    character.position.x = Math.min(limit, Math.max(-limit, character.position.x));
                    character.position.z = Math.min(limit, Math.max(-limit, character.position.z));
                    if(animations['walking'] && currentAction !== animations['walking'] && mixer) {
                        if(currentAction) currentAction.fadeOut(0.1);
                        currentAction = animations['walking'];
                        currentAction.reset().fadeIn(0.1).play();
                    }
                } else {
                    if(animations['idle'] && currentAction !== animations['idle'] && mixer) {
                        if(currentAction) currentAction.fadeOut(0.15);
                        currentAction = animations['idle'];
                        currentAction.reset().play();
                    }
                }
            }
            
            function updateCamera() {
                if(!character) return;
                if(dragActive) targetYaw = dragOffset;
                else targetYaw = targetYaw * 0.96 + character.rotation.y * 0.04;
                cameraYaw += (targetYaw - cameraYaw) * 0.12;
                const dist = 10.5;
                const camX = character.position.x - Math.sin(cameraYaw) * dist * Math.cos(cameraPitch);
                const camZ = character.position.z - Math.cos(cameraYaw) * dist * Math.cos(cameraPitch);
                const camY = character.position.y + 1.8 + Math.sin(cameraPitch) * dist * 0.5;
                camera.position.set(camX, camY, camZ);
                camera.lookAt(character.position.clone().add(new THREE.Vector3(0, 1.3, 0)));
            }
            
            const clock = new THREE.Clock();
            
            function animate() {
                requestAnimationFrame(animate);
                if(!character) return;
                updateKeyboard();
                handleJumpPhysics();
                handleMovement();
                updateBombs();
                updateParticles();
                updateLandingMarker();
                updateCamera();
                if(throwRequested && !throwCooldown && modelLoaded) { 
                    throwBombAction(); 
                    throwRequested = false; 
                }
                if(mixer) mixer.update(clock.getDelta());
                renderer.render(scene, camera);
            }
            
            loadModel();
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                initSliderPos();
            });
            
            setInterval(() => { 
                if(modelLoaded && handBone && !bombInHand && !throwCooldown) createHandBomb(); 
            }, 600);
        })();
    </script>
</body>
</html>
