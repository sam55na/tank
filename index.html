<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dwarf Bomber - Multi-Touch Pro</title>
    <style>
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #051a11; font-family: sans-serif; }
        
        /* مناطق اللمس */
        #touch-zones { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; }
        #left-zone { width: 50%; height: 100%; position: relative; border-right: 1px solid rgba(255,255,255,0.05); }
        #right-zone { width: 50%; height: 100%; position: relative; }

        /* الجويستك */
        #joystick-wrapper { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50%; height: 50%; background: #ffaa44; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px rgba(255,170,68,0.5); }

        /* التحكم بالمسافة (اليسار) */
        #distance-control { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); width: 40px; height: 200px; background: rgba(0,0,0,0.5); border: 2px solid #ffaa44; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 10px 0; }
        #distance-slider { width: 100%; height: 100%; writing-mode: bt-lr; appearance: slider-vertical; cursor: pointer; }

        /* أزرار الأكشن (اليمين) */
        #action-group { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 20px; align-items: flex-end; }
        .circle-btn { width: 70px; height: 70px; border-radius: 50%; border: none; background: rgba(255,170,68,0.8); color: white; font-size: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .circle-btn:active { transform: scale(0.9); background: #ffcc66; }
        #btn-throw { width: 90px; height: 90px; background: #e63946; font-size: 40px; }

        /* واجهة المعلومات */
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; color: #ffaa44; z-index: 100; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #ffaa44; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="hud">
        <div>المسافة: <span id="dist-val">12</span> متر</div>
        <div>النقاط: <span id="score">0</span></div>
    </div>

    <div id="crosshair"></div>

    <div id="touch-zones">
        <div id="left-zone">
            <div id="distance-control">
                <span style="color:white; font-size:10px;">MAX</span>
                <input type="range" id="distance-slider" min="5" max="20" value="12" step="1">
                <span style="color:white; font-size:10px;">MIN</span>
            </div>
            <div id="joystick-wrapper"><div id="joystick-knob"></div></div>
        </div>
        <div id="right-zone">
            <div id="action-group">
                <button class="circle-btn" id="btn-jump">🚀</button>
                <button class="circle-btn" id="btn-throw">💣</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // الإعدادات الأساسية
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1a0f);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // الإضاءة
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        light.castShadow = true;
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // الأرضية
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x1b4332 }));
        ground.rotation.x = -Math.PI/2;
        ground.receiveShadow = true;
        scene.add(ground);
        scene.add(new THREE.GridHelper(100, 50, 0x2d6a4f, 0x081c15));

        // اللاعب (نموذج مبسط)
        const playerGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1, 4, 8), new THREE.MeshStandardMaterial({ color: 0xffaa44 }));
        body.position.y = 0.9;
        body.castShadow = true;
        playerGroup.add(body);
        scene.add(playerGroup);

        // محاكي الهدف (Impact Predictor)
        const predictor = new THREE.Mesh(new THREE.RingGeometry(0.3, 0.5, 32), new THREE.MeshBasicMaterial({ color: 0xff0000, side: THREE.DoubleSide }));
        predictor.rotation.x = -Math.PI/2;
        predictor.position.y = 0.05;
        scene.add(predictor);

        // متغيرات التحكم
        let moveData = { x: 0, y: 0 };
        let camRotation = { yaw: 0, pitch: 0 };
        let bombDistance = 12;
        let score = 0;
        let isJumping = false;
        let jumpVelocity = 0;

        // --- نظام اللمس المتعدد (Multi-Touch) ---
        const touches = {};
        const joystickData = { active: false, id: null, startX: 0, startY: 0 };
        const cameraData = { active: false, id: null, lastX: 0, lastY: 0 };

        window.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.clientX < window.innerWidth / 2) {
                    // منطقة الجويستك
                    if (!joystickData.active && t.target.closest('#joystick-wrapper')) {
                        joystickData.active = true;
                        joystickData.id = t.identifier;
                        const rect = document.getElementById('joystick-wrapper').getBoundingClientRect();
                        joystickData.startX = rect.left + rect.width / 2;
                        joystickData.startY = rect.top + rect.height / 2;
                    }
                } else {
                    // منطقة الكاميرا
                    if (!cameraData.active) {
                        cameraData.active = true;
                        cameraData.id = t.identifier;
                        cameraData.lastX = t.clientX;
                        cameraData.lastY = t.clientY;
                    }
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.identifier === joystickData.id) {
                    const dx = t.clientX - joystickData.startX;
                    const dy = t.clientY - joystickData.startY;
                    const dist = Math.min(Math.hypot(dx, dy), 50);
                    const angle = Math.atan2(dy, dx);
                    
                    moveData.x = (Math.cos(angle) * dist) / 50;
                    moveData.y = (Math.sin(angle) * dist) / 50;
                    
                    document.getElementById('joystick-knob').style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
                }
                
                if (t.identifier === cameraData.id) {
                    const dx = t.clientX - cameraData.lastX;
                    const dy = t.clientY - cameraData.lastY;
                    camRotation.yaw -= dx * 0.005;
                    camRotation.pitch -= dy * 0.005;
                    camRotation.pitch = Math.max(-Math.PI/3, Math.min(Math.PI/4, camRotation.pitch));
                    cameraData.lastX = t.clientX;
                    cameraData.lastY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.identifier === joystickData.id) {
                    joystickData.active = false;
                    joystickData.id = null;
                    moveData = { x: 0, y: 0 };
                    document.getElementById('joystick-knob').style.transform = 'translate(-50%, -50%)';
                }
                if (t.identifier === cameraData.id) {
                    cameraData.active = false;
                    cameraData.id = null;
                }
            }
        });

        // تحكم المسافة
        document.getElementById('distance-slider').addEventListener('input', (e) => {
            bombDistance = parseFloat(e.target.value);
            document.getElementById('dist-val').innerText = bombDistance;
        });

        // القفز والرمي
        document.getElementById('btn-jump').addEventListener('touchstart', (e) => {
            if (!isJumping) {
                isJumping = true;
                jumpVelocity = 0.2;
            }
        });

        document.getElementById('btn-throw').addEventListener('touchstart', throwBomb);

        function throwBomb() {
            const bomb = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            bomb.position.copy(playerGroup.position);
            bomb.position.y += 1.5;
            scene.add(bomb);
            
            const targetPos = predictor.position.clone();
            const startPos = bomb.position.clone();
            let t = 0;
            
            function animateBomb() {
                t += 0.02;
                if (t >= 1) {
                    createExplosion(targetPos);
                    scene.remove(bomb);
                    return;
                }
                // حركة قطع مكافئ (Parabola)
                bomb.position.lerpVectors(startPos, targetPos, t);
                bomb.position.y += Math.sin(t * Math.PI) * 5; 
                requestAnimationFrame(animateBomb);
            }
            animateBomb();
        }

        function createExplosion(pos) {
            const flash = new THREE.Mesh(new THREE.SphereGeometry(2), new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.8 }));
            flash.position.copy(pos);
            scene.add(flash);
            setTimeout(() => scene.remove(flash), 100);
            score += 10;
            document.getElementById('score').innerText = score;
        }

        // حلقة التحديث
        function update() {
            // حركة اللاعب (سلسة وبنفس سرعة الكاميرا)
            if (moveData.x !== 0 || moveData.y !== 0) {
                const speed = 0.15;
                const forward = new THREE.Vector3(Math.sin(camRotation.yaw), 0, Math.cos(camRotation.yaw));
                const right = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), forward);
                
                playerGroup.position.addScaledVector(forward, -moveData.y * speed);
                playerGroup.position.addScaledVector(right, moveData.x * speed);
                
                // تدوير وجه اللاعب مع الحركة
                const angle = Math.atan2(moveData.x, -moveData.y) + camRotation.yaw;
                playerGroup.rotation.y = angle;
            }

            // الجاذبية والقفز
            if (isJumping) {
                playerGroup.position.y += jumpVelocity;
                jumpVelocity -= 0.01;
                if (playerGroup.position.y <= 0) {
                    playerGroup.position.y = 0;
                    isJumping = false;
                }
            }

            // تحديث الكاميرا
            const camDist = 6;
            camera.position.set(
                playerGroup.position.x - Math.sin(camRotation.yaw) * camDist,
                playerGroup.position.y + 3 + Math.sin(camRotation.pitch) * camDist,
                playerGroup.position.z - Math.cos(camRotation.yaw) * camDist
            );
            camera.lookAt(playerGroup.position.clone().add(new THREE.Vector3(0, 1, 0)));

            // تحديث مؤشر سقوط القنبلة
            const forwardDir = new THREE.Vector3(0, 0, 1).applyQuaternion(playerGroup.quaternion);
            predictor.position.set(
                playerGroup.position.x + forwardDir.x * bombDistance,
                0.06,
                playerGroup.position.z + forwardDir.z * bombDistance
            );
            predictor.material.opacity = 0.5 + Math.sin(Date.now()*0.01)*0.5;

            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        update();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
