<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شخصية القزم الغامض - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
            pointer-events: none;
            text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>
<body>

    <div id="info">القزم الغامض يحمل قنبلة</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>

    <script>
        // --- 1. إعداد المشهد والكاميرا ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 4);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 2. الإضاءة ---
        const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
        scene.add(ambientLight);

        // ضوء أحمر خافت ينبعث من القنبلة
        const bombLight = new THREE.PointLight(0xff0000, 5, 5);
        bombLight.position.set(0.8, 0.5, 0.5);
        scene.add(bombLight);

        // ضوء علوي لإبراز القبعة
        const topLight = new THREE.SpotLight(0xffffff, 2);
        topLight.position.set(2, 5, 2);
        scene.add(topLight);

        // --- 3. بناء الشخصية ---
        const dwarfGroup = new THREE.Group();

        // المواد
        const darkMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 });
        const hatMat = new THREE.MeshStandardMaterial({ color: 0x2b0505, roughness: 0.9 });

        // الجسم (شبه كروي غامض)
        const body = new THREE.Mesh(new THREE.SphereGeometry(0.6, 32, 32), darkMat);
        body.scale.set(1, 1.2, 0.8);
        dwarfGroup.add(body);

        // القبعة المخروطية المائلة
        const hat = new THREE.Mesh(new THREE.ConeGeometry(0.55, 1.4, 32), hatMat);
        hat.position.y = 1.1;
        hat.rotation.z = 0.3; // إمالة
        hat.rotation.x = -0.1;
        dwarfGroup.add(hat);

        // الأقدام (مكعبات مستديرة الحواف)
        const footGeo = new THREE.BoxGeometry(0.3, 0.15, 0.5);
        const leftFoot = new THREE.Mesh(footGeo, darkMat);
        leftFoot.position.set(-0.35, -0.7, 0.1);
        dwarfGroup.add(leftFoot);

        const rightFoot = new THREE.Mesh(footGeo, darkMat);
        rightFoot.position.set(0.35, -0.7, 0.1);
        dwarfGroup.add(rightFoot);

        // اليدين
        const handGeo = new THREE.SphereGeometry(0.12, 16, 16);
        const leftHand = new THREE.Mesh(handGeo, darkMat);
        leftHand.position.set(-0.8, 0.1, 0.2);
        dwarfGroup.add(leftHand);

        const rightHand = new THREE.Mesh(handGeo, darkMat);
        rightHand.position.set(0.8, 0.1, 0.2);
        dwarfGroup.add(rightHand);

        // القنبلة
        const bombGroup = new THREE.Group();
        const bombBody = new THREE.Mesh(new THREE.SphereGeometry(0.25, 32, 32), new THREE.MeshStandardMaterial({color: 0x050505}));
        const fuse = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.15), new THREE.MeshStandardMaterial({color: 0x444444}));
        fuse.position.y = 0.25;
        bombGroup.add(bombBody, fuse);

        bombGroup.position.set(0.8, 0.35, 0.4);
        dwarfGroup.add(bombGroup);

        scene.add(dwarfGroup);

        // --- 4. التحريك والتفاعل ---
        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.002;
            
            // تمايل بسيط للشخصية
            dwarfGroup.rotation.y = Math.sin(time * 0.5) * 0.2;
            
            // اهتزاز القنبلة ووميض الضوء
            bombGroup.position.y = 0.35 + Math.sin(time * 2) * 0.02;
            bombLight.intensity = 2 + Math.sin(time * 10) * 1.5;

            renderer.render(scene, camera);
        }

        // التعامل مع تغيير حجم النافذة
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
