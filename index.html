<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المحارب المدرع - تجربة اللعب الكاملة</title>
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Tahoma', 'Geneva', 'Verdana', sans-serif;
            background: #87ceeb;
        }
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            direction: rtl;
        }
        #info-panel h1 { margin: 0; font-size: 1.2rem; color: #f39c12; }
        #info-panel p { margin: 5px 0 0; font-size: 0.8rem; opacity: 0.8; }

        /* Joystick Styles */
        #joystick-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            pointer-events: auto;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Action Buttons */
        #action-buttons {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            gap: 20px;
            pointer-events: auto;
        }
        .action-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.1s, background 0.2s;
            user-select: none;
        }
        #btn-jump { background: #3498db; }
        #btn-throw { background: #e74c3c; }
        .action-btn:active { transform: scale(0.9); }

        #score-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #f1c40f;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="info-panel">
            <h1>⚔️ HEAVY VANGUARD - المحارب المدرع</h1>
            <p>استخدم الجويستك للحركة • الأزرار للقفز والرمي</p>
        </div>
        <div id="score-panel">الأهداف: <span id="score">0</span></div>
        
        <div id="joystick-container">
            <div id="joystick-knob"></div>
        </div>

        <div id="action-buttons">
            <button class="action-btn" id="btn-jump">⬆️</button>
            <button class="action-btn" id="btn-throw">🔥</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==========================================
        // 1. إعداد المشهد والبيئة
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // سماء زرقاء
        scene.fog = new THREE.Fog(0x87ceeb, 20, 100);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // إضاءة
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        sunLight.position.set(50, 100, 50);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.left = -50;
        sunLight.shadow.camera.right = 50;
        sunLight.shadow.camera.top = 50;
        sunLight.shadow.camera.bottom = -50;
        scene.add(sunLight);

        // الأرضية (عالم حقيقي)
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x34495e, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // إضافة بعض التضاريس (صخور بسيطة)
        for(let i=0; i<40; i++) {
            const rock = new THREE.Mesh(
                new THREE.DodecahedronGeometry(Math.random() * 2 + 0.5),
                new THREE.MeshStandardMaterial({ color: 0x7f8c8d })
            );
            rock.position.set(Math.random()*160-80, 0, Math.random()*160-80);
            rock.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
            rock.castShadow = true;
            rock.receiveShadow = true;
            scene.add(rock);
        }

        // ==========================================
        // 2. بناء الشخصية (نفس التصميم الأصلي)
        // ==========================================
        const matArmor = new THREE.MeshStandardMaterial({ color: 0x2c3e50, metalness: 0.8, roughness: 0.2 });
        const matJoint = new THREE.MeshStandardMaterial({ color: 0xe67e22, metalness: 0.5 });
        const matGlow = new THREE.MeshStandardMaterial({ color: 0x3a86ff, emissive: 0x3a86ff, emissiveIntensity: 0.5 });

        const character = new THREE.Group();
        scene.add(character);

        const torsoGroup = new THREE.Group();
        character.add(torsoGroup);
        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.5, 1.5, 16), matArmor);
        torso.position.y = 2.0;
        torso.castShadow = true;
        torsoGroup.add(torso);

        const headGroup = new THREE.Group();
        torsoGroup.add(headGroup);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), matArmor);
        head.position.y = 3.0;
        head.castShadow = true;
        headGroup.add(head);
        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.1, 0.1), matGlow);
        visor.position.set(0, 3.1, 0.25);
        headGroup.add(visor);

        function buildArm(side) {
            const arm = new THREE.Group();
            const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.8), matArmor);
            upper.position.y = -0.4;
            upper.castShadow = true;
            arm.add(upper);
            const forearm = new THREE.Group();
            forearm.position.y = -0.8;
            const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 0.8), matArmor);
            lower.position.y = -0.4;
            lower.castShadow = true;
            forearm.add(lower);
            const hand = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), matJoint);
            hand.position.y = -0.9;
            hand.castShadow = true;
            forearm.add(hand);
            arm.add(forearm);
            arm.position.set(side * 1.0, 2.5, 0);
            return { arm, forearm };
        }
        const rightArmData = buildArm(1);
        const leftArmData = buildArm(-1);
        torsoGroup.add(rightArmData.arm);
        torsoGroup.add(leftArmData.arm);

        function buildLeg(side) {
            const leg = new THREE.Group();
            const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.25, 1.0), matArmor);
            thigh.position.y = -0.5;
            thigh.castShadow = true;
            leg.add(thigh);
            const shinGroup = new THREE.Group();
            shinGroup.position.y = -1.0;
            const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 1.0), matArmor);
            shin.position.y = -0.5;
            shin.castShadow = true;
            shinGroup.add(shin);
            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.8), matArmor);
            foot.position.set(0, -1.1, 0.2);
            foot.castShadow = true;
            shinGroup.add(foot);
            leg.add(shinGroup);
            leg.position.set(side * 0.5, 1.2, 0);
            return { leg, shin: shinGroup };
        }
        const rightLegData = buildLeg(1);
        const leftLegData = buildLeg(-1);
        character.add(rightLegData.leg);
        character.add(leftLegData.leg);

        // ==========================================
        // 3. نظام الأهداف (Targets)
        // ==========================================
        const targets = [];
        let score = 0;
        function spawnTarget() {
            const target = new THREE.Mesh(
                new THREE.SphereGeometry(1, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x550000 })
            );
            const angle = Math.random() * Math.PI * 2;
            const dist = 15 + Math.random() * 30;
            target.position.set(Math.cos(angle)*dist, 1.5, Math.sin(angle)*dist);
            target.castShadow = true;
            scene.add(target);
            targets.push(target);
        }
        for(let i=0; i<10; i++) spawnTarget();

        // ==========================================
        // 4. نظام القذائف والانفجارات
        // ==========================================
        const projectiles = [];
        const particles = [];
        function fireProjectile(isRight) {
            const hand = isRight ? rightArmData.arm : leftArmData.arm;
            const handPos = new THREE.Vector3();
            hand.children[1].children[1].getWorldPosition(handPos); // موقع اليد

            const proj = new THREE.Mesh(
                new THREE.SphereGeometry(0.2, 8, 8),
                new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xff2200 })
            );
            proj.position.copy(handPos);
            scene.add(proj);

            const dir = new THREE.Vector3(0, 0, 1);
            dir.applyQuaternion(character.quaternion);
            projectiles.push({ mesh: proj, vel: dir.multiplyScalar(0.6), life: 120 });
        }

        function createExplosion(pos) {
            for(let i=0; i<15; i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(0.1, 4, 4),
                    new THREE.MeshStandardMaterial({ color: 0xffaa00 })
                );
                p.position.copy(pos);
                scene.add(p);
                particles.push({ 
                    mesh: p, 
                    vel: new THREE.Vector3(Math.random()-0.5, Math.random(), Math.random()-0.5).multiplyScalar(0.2),
                    life: 30 
                });
            }
        }

        // ==========================================
        // 5. نظام التحكم (Joystick & Buttons)
        // ==========================================
        const input = { forward: 0, side: 0, jump: false, throw: false };
        const joystick = { active: false, startX: 0, startY: 0, moveX: 0, moveY: 0 };
        const knob = document.getElementById('joystick-knob');

        document.getElementById('joystick-container').addEventListener('touchstart', (e) => {
            joystick.active = true;
            const touch = e.touches[0];
            joystick.startX = touch.clientX;
            joystick.startY = touch.clientY;
        });

        window.addEventListener('touchmove', (e) => {
            if (!joystick.active) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystick.startX;
            let dy = touch.clientY - joystick.startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 50;
            if (dist > maxDist) {
                dx *= maxDist / dist;
                dy *= maxDist / dist;
            }
            knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            input.side = -dx / maxDist;
            input.forward = -dy / maxDist;
        });

        window.addEventListener('touchend', () => {
            joystick.active = false;
            knob.style.transform = `translate(-50%, -50%)`;
            input.forward = 0;
            input.side = 0;
        });

        // أزرار الأكشن
        document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); input.jump = true; });
        document.getElementById('btn-throw').addEventListener('touchstart', (e) => { e.preventDefault(); input.throw = true; });

        // دعم لوحة المفاتيح
        const keys = {};
        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // ==========================================
        // 6. منطق الحركة والتحريك
        // ==========================================
        let state = 'idle';
        let animTime = 0;
        let verticalVel = 0;
        let isJumping = false;
        let throwTimer = 0;
        let throwSide = true;

        function updateLogic() {
            // معالجة مدخلات لوحة المفاتيح
            if (keys['KeyW']) input.forward = 1;
            else if (keys['KeyS']) input.forward = -1;
            else if (!joystick.active) input.forward = 0;

            if (keys['KeyA']) input.side = 1;
            else if (keys['KeyD']) input.side = -1;
            else if (!joystick.active) input.side = 0;

            if (keys['Space']) input.jump = true;
            if (keys['KeyF'] || keys['KeyT']) input.throw = true;

            // الحركة الدورانية والخطية
            if (Math.abs(input.forward) > 0.1 || Math.abs(input.side) > 0.1) {
                const angle = Math.atan2(input.side, input.forward);
                character.rotation.y = angle;
                const speed = 0.15;
                character.position.x += Math.sin(character.rotation.y) * speed;
                character.position.z += Math.cos(character.rotation.y) * speed;
                state = 'run';
            } else {
                state = 'idle';
            }

            // القفز
            if (input.jump && !isJumping) {
                verticalVel = 0.3;
                isJumping = true;
                input.jump = false;
            }
            if (isJumping) {
                character.position.y += verticalVel;
                verticalVel -= 0.015;
                if (character.position.y <= 0) {
                    character.position.y = 0;
                    isJumping = false;
                    verticalVel = 0;
                }
                state = 'jump';
            }

            // الرمي
            if (input.throw && throwTimer <= 0) {
                fireProjectile(throwSide);
                throwSide = !throwSide;
                throwTimer = 20;
                input.throw = false;
            }
            if (throwTimer > 0) throwTimer--;

            // تحديث الكاميرا (تتبع الشخصية)
            const camOffset = new THREE.Vector3(0, 5, -12);
            camOffset.applyQuaternion(character.quaternion);
            camera.position.lerp(character.position.clone().add(camOffset), 0.1);
            camera.lookAt(character.position.clone().add(new THREE.Vector3(0, 2, 0)));

            // تحديث القذائف والتصادم
            for(let i=projectiles.length-1; i>=0; i--) {
                const p = projectiles[i];
                p.mesh.position.add(p.vel);
                p.life--;
                
                // تصادم مع الأهداف
                targets.forEach((t, idx) => {
                    if (p.mesh.position.distanceTo(t.position) < 1.5) {
                        createExplosion(t.position);
                        scene.remove(t);
                        targets.splice(idx, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                        spawnTarget(); // توليد هدف جديد
                        p.life = 0;
                    }
                });

                if (p.life <= 0 || p.mesh.position.y < 0) {
                    scene.remove(p.mesh);
                    projectiles.splice(i, 1);
                }
            }

            // تحديث الجزيئات
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.vel);
                p.life--;
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            animTime += 0.1;
            updateLogic();

            // تحريك الشخصية بناءً على الحالة
            const s = 0.2;
            if (state === 'idle') {
                rightArmData.arm.rotation.x = Math.sin(animTime * 0.5) * 0.1;
                leftArmData.arm.rotation.x = -Math.sin(animTime * 0.5) * 0.1;
                rightArmData.forearm.rotation.x = -0.2;
                leftArmData.forearm.rotation.x = -0.2;
                rightLegData.leg.rotation.x = 0;
                leftLegData.leg.rotation.x = 0;
            } else if (state === 'run') {
                const runSpeed = 1.2;
                rightLegData.leg.rotation.x = Math.sin(animTime * runSpeed) * 0.6;
                leftLegData.leg.rotation.x = -Math.sin(animTime * runSpeed) * 0.6;
                rightLegData.shin.rotation.x = Math.max(0, Math.sin(animTime * runSpeed - 1)) * 0.6;
                leftLegData.shin.rotation.x = Math.max(0, -Math.sin(animTime * runSpeed - 1)) * 0.6;
                
                // ثني اليدين للأمام في الركض
                rightArmData.arm.rotation.x = -Math.sin(animTime * runSpeed) * 0.5;
                leftArmData.arm.rotation.x = Math.sin(animTime * runSpeed) * 0.5;
                rightArmData.forearm.rotation.x = -1.2; // ثني للأمام
                leftArmData.forearm.rotation.x = -1.2;  // ثني للأمام
            } else if (state === 'jump') {
                rightArmData.arm.rotation.x = -0.8;
                leftArmData.arm.rotation.x = -0.8;
                rightArmData.forearm.rotation.x = -1.5;
                leftArmData.forearm.rotation.x = -1.5;
                rightLegData.leg.rotation.x = -0.4;
                leftLegData.leg.rotation.x = -0.4;
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
