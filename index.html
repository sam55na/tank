<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحارب الآلي - الإصدار المطور</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a12; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #00f2ff; font-family: 'Courier New', monospace;
            pointer-events: none; text-shadow: 0 0 5px #00f2ff;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2>CYBER-SENTINEL v2.0</h2>
        <p>الحالة: نشط | النظام: مستقر</p>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // 1. إعداد المشهد
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05050a);
        
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 2, 0);

        // 2. الإضاءة (إضاءة سينمائية)
        const light1 = new THREE.DirectionalLight(0xffffff, 1);
        light1.position.set(5, 10, 5);
        light1.castShadow = true;
        scene.add(light1);

        const ambient = new THREE.AmbientLight(0x4040ff, 0.3);
        scene.add(ambient);

        // 3. المواد (Materials)
        const matArmor = new THREE.MeshStandardMaterial({ color: 0x223344, metalness: 0.8, roughness: 0.2 });
        const matGold = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9, roughness: 0.1 });
        const matGlow = new THREE.MeshBasicMaterial({ color: 0x00f2ff });

        // 4. بناء الشخصية (Group)
        const robot = new THREE.Group();
        scene.add(robot);

        // الجسد
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.3, 1.2, 8), matArmor);
        body.position.y = 2.2;
        robot.add(body);

        // الرأس مع "عين" مضيئة
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 0.5), matArmor);
        head.position.y = 3.1;
        robot.add(head);
        
        const eye = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.1), matGlow);
        eye.position.set(0, 3.15, 0.25);
        robot.add(eye);

        // الأذرع (وضعية قتالية)
        function addArm(side) {
            const armGroup = new THREE.Group();
            
            // كتف
            const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), matGold);
            armGroup.add(shoulder);

            // عضد
            const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.8), matArmor);
            upper.position.y = -0.4;
            armGroup.add(upper);

            // ساعد
            const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.12, 0.8), matArmor);
            lower.position.set(0, -1, 0.2);
            lower.rotation.x = -0.8; // ثني الكوع
            armGroup.add(lower);

            armGroup.position.set(side * 0.8, 2.7, 0);
            robot.add(armGroup);
        }
        addArm(1);  // اليمين
        addArm(-1); // اليسار

        // الأرجل
        function addLeg(side) {
            const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 1.5), matArmor);
            leg.position.set(side * 0.4, 0.75, 0);
            robot.add(leg);
            
            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.6), matArmor);
            foot.position.set(side * 0.4, 0.1, 0.2);
            robot.add(foot);
        }
        addLeg(1);
        addLeg(-1);

        // أرضية بسيطة
        const grid = new THREE.GridHelper(10, 20, 0x00f2ff, 0x222244);
        scene.add(grid);

        // 5. حلقة التحريك
        function animate() {
            requestAnimationFrame(animate);
            robot.rotation.y += 0.005; // دوران بطيء للشخصية
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // استجابة الشاشة
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
