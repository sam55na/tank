<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WARRIOR VANGUARD - شخصية حربية رشيقة</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a12; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #ff8844; font-family: 'Courier New', monospace;
            pointer-events: none; text-shadow: 0 0 5px #ff4400;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border-left: 3px solid #ff6600;
        }
        #controls {
            position: absolute; bottom: 20px; left: 20px;
            color: #ff8844; font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }
        h2 { margin: 0 0 5px 0; font-size: 18px; }
        p { margin: 0; font-size: 12px; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>⚡ WARRIOR VANGUARD ⚡</h2>
        <p>Class: Assault | Agility: High | Combat Ready</p>
    </div>
    <div id="controls">
        🖱️ اسحب للتدوير | 🔍 اسكرول للتكبير
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.128.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // المشهد
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05050a);
        scene.fog = new THREE.FogExp2(0x05050a, 0.015);
        
        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4.5, 3.8, 6.5);
        camera.lookAt(0, 2.2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 2.2, 0);
        controls.zoomSpeed = 1.2;

        // إضاءة ديناميكية
        const ambient = new THREE.AmbientLight(0x22223a, 0.5);
        scene.add(ambient);
        
        const mainLight = new THREE.DirectionalLight(0xffaa77, 1.2);
        mainLight.position.set(4, 7, 3);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x88aaff, 0.45);
        fillLight.position.set(-2, 3, 2);
        scene.add(fillLight);
        
        const rimLight = new THREE.PointLight(0xff6644, 0.6);
        rimLight.position.set(1, 3.5, -4);
        scene.add(rimLight);
        
        const backLight = new THREE.PointLight(0xffaa44, 0.4);
        backLight.position.set(-1, 2.5, -3);
        scene.add(backLight);
        
        const chestLight = new THREE.PointLight(0xff4422, 0.5);
        chestLight.position.set(0, 2.3, 0.8);
        scene.add(chestLight);

        // المواد - ألوان حربية
        const matPrimary = new THREE.MeshStandardMaterial({ color: 0xcc6644, metalness: 0.75, roughness: 0.28, emissive: 0x441100, emissiveIntensity: 0.1 });
        const matSecondary = new THREE.MeshStandardMaterial({ color: 0xaa5533, metalness: 0.7, roughness: 0.32 });
        const matAccent = new THREE.MeshStandardMaterial({ color: 0xff8844, metalness: 0.85, roughness: 0.22, emissive: 0xff3300, emissiveIntensity: 0.2 });
        const matGlow = new THREE.MeshStandardMaterial({ color: 0xff5533, metalness: 0.6, roughness: 0.2, emissive: 0xff2200, emissiveIntensity: 0.45 });
        const matDark = new THREE.MeshStandardMaterial({ color: 0x884422, metalness: 0.65, roughness: 0.35 });
        const matJoint = new THREE.MeshStandardMaterial({ color: 0xdd8855, metalness: 0.8, roughness: 0.25 });

        // مجموعة الشخصية
        const warrior = new THREE.Group();
        scene.add(warrior);

        // =============== الجذع (نحيف ورشيق) ===============
        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.48, 0.42, 1.25, 12), matPrimary);
        torso.position.y = 2.15;
        torso.castShadow = true;
        warrior.add(torso);
        
        // صدر مائل (درع صدري رياضي)
        const chestPlate = new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.48, 0.55, 8), matAccent);
        chestPlate.position.set(0, 2.45, 0.35);
        chestPlate.castShadow = true;
        warrior.add(chestPlate);
        
        // خطوط عضلات جانبية
        const sideStripe = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.9, 0.05), matGlow);
        sideStripe.position.set(0.45, 2.25, 0.4);
        warrior.add(sideStripe);
        
        const sideStripeL = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.9, 0.05), matGlow);
        sideStripeL.position.set(-0.45, 2.25, 0.4);
        warrior.add(sideStripeL);
        
        // حزام قتالي
        const belt = new THREE.Mesh(new THREE.TorusGeometry(0.52, 0.07, 12, 32), matAccent);
        belt.rotation.x = Math.PI / 2;
        belt.position.y = 1.62;
        belt.castShadow = true;
        warrior.add(belt);

        // =============== الرأس (خوذة قتالية) ===============
        const head = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.44, 0.55, 8), matPrimary);
        head.position.y = 3.02;
        head.castShadow = true;
        warrior.add(head);
        
        // قمة الخوذة
        const crest = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.42, 6), matAccent);
        crest.position.set(0, 3.42, 0);
        crest.castShadow = true;
        warrior.add(crest);
        
        // حاجب العين (Visor)
        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.18, 0.08), matGlow);
        visor.position.set(0, 3.05, 0.38);
        visor.castShadow = true;
        warrior.add(visor);
        
        // العين الرئيسية
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 20, 20), matGlow);
        eye.position.set(0, 3.08, 0.42);
        warrior.add(eye);
        
        // فتحات تهوية جانبية
        const ventR = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.08, 0.05), matAccent);
        ventR.position.set(0.32, 2.92, 0.38);
        warrior.add(ventR);
        
        const ventL = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.08, 0.05), matAccent);
        ventL.position.set(-0.32, 2.92, 0.38);
        warrior.add(ventL);
        
        // جهاز اتصال جانبي
        const comm = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 12), matGlow);
        comm.position.set(0.55, 3.05, 0.15);
        warrior.add(comm);

        // =============== الأكتاف (دروع رشيقة) ===============
        function addShoulder(side) {
            const shoulder = new THREE.Mesh(new THREE.ConeGeometry(0.38, 0.45, 6), matAccent);
            shoulder.position.set(side * 0.7, 2.75, 0);
            shoulder.rotation.z = side * 0.2;
            shoulder.castShadow = true;
            warrior.add(shoulder);
            
            const spike = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.28, 4), matGlow);
            spike.position.set(side * 0.72, 2.98, 0.18);
            spike.castShadow = true;
            warrior.add(spike);
        }
        addShoulder(1);
        addShoulder(-1);

        // =============== الذراعين (طويلة ورشيقة) ===============
        function addArm(side) {
            const armGroup = new THREE.Group();
            
            // كتف
            const shoulderJoint = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), matJoint);
            shoulderJoint.position.y = 0;
            armGroup.add(shoulderJoint);
            
            // عضد
            const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.18, 0.95, 10), matSecondary);
            upper.position.y = -0.52;
            upper.castShadow = true;
            armGroup.add(upper);
            
            // مفصل الكوع
            const elbow = new THREE.Mesh(new THREE.SphereGeometry(0.16, 16, 16), matJoint);
            elbow.position.set(0, -0.98, 0.08);
            armGroup.add(elbow);
            
            // ساعد
            const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.17, 0.14, 0.88, 10), matSecondary);
            lower.position.set(0, -1.45, 0.15);
            lower.rotation.x = -0.45;
            lower.castShadow = true;
            armGroup.add(lower);
            
            // قبضة/يد
            const hand = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.2, 0.32), matAccent);
            hand.position.set(0, -1.88, 0.28);
            hand.castShadow = true;
            armGroup.add(hand);
            
            // سلاح خنجر/شفرة على الساعد
            const blade = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.45, 4), matGlow);
            blade.position.set(side * 0.18, -1.25, 0.45);
            blade.rotation.z = side * 0.3;
            armGroup.add(blade);
            
            armGroup.position.set(side * 0.78, 2.55, 0);
            warrior.add(armGroup);
        }
        addArm(1);
        addArm(-1);

        // =============== الأرجل (رشيقة وقوية) ===============
        function addLeg(side) {
            const legGroup = new THREE.Group();
            
            // فخذ
            const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.21, 0.98, 10), matSecondary);
            thigh.position.y = -0.52;
            thigh.castShadow = true;
            legGroup.add(thigh);
            
            // مفصل الركبة
            const knee = new THREE.Mesh(new THREE.SphereGeometry(0.16, 16, 16), matJoint);
            knee.position.set(0, -1.02, 0.08);
            legGroup.add(knee);
            
            // الساق
            const calf = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.17, 0.92, 10), matSecondary);
            calf.position.set(0, -1.52, 0);
            calf.castShadow = true;
            legGroup.add(calf);
            
            // الكاحل
            const ankle = new THREE.Mesh(new THREE.SphereGeometry(0.13, 12, 12), matJoint);
            ankle.position.set(0, -1.98, 0.05);
            legGroup.add(ankle);
            
            // القدم (حذاء قتالي رشيق)
            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.16, 0.68), matDark);
            foot.position.set(0, -2.12, 0.22);
            foot.castShadow = true;
            legGroup.add(foot);
            
            // واقي أمامي
            const toeCap = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.1, 0.22), matAccent);
            toeCap.position.set(0, -2.05, 0.58);
            legGroup.add(toeCap);
            
            legGroup.position.set(side * 0.48, 1.85, 0);
            warrior.add(legGroup);
        }
        addLeg(1);
        addLeg(-1);

        // =============== سلاح رئيسي (سيف/شفرة خلفية) ===============
        const weaponGroup = new THREE.Group();
        
        const bladeMain = new THREE.Mesh(new THREE.ConeGeometry(0.12, 1.2, 5), matGlow);
        bladeMain.position.set(0.55, 2.35, -0.45);
        bladeMain.rotation.z = 0.3;
        bladeMain.rotation.x = 0.2;
        bladeMain.castShadow = true;
        weaponGroup.add(bladeMain);
        
        const bladeMainL = new THREE.Mesh(new THREE.ConeGeometry(0.12, 1.2, 5), matGlow);
        bladeMainL.position.set(-0.55, 2.35, -0.45);
        bladeMainL.rotation.z = -0.3;
        bladeMainL.rotation.x = 0.2;
        bladeMainL.castShadow = true;
        weaponGroup.add(bladeMainL);
        
        const hilt = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.2), matAccent);
        hilt.position.set(0, 2.28, -0.52);
        weaponGroup.add(hilt);
        
        warrior.add(weaponGroup);
        
        // جهاز قتالي على الظهر
        const jetPack = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.65, 0.28), matDark);
        jetPack.position.set(0, 2.15, -0.58);
        jetPack.castShadow = true;
        warrior.add(jetPack);
        
        const jetNozzle = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.14, 0.22, 8), matGlow);
        jetNozzle.position.set(0.22, 2.05, -0.72);
        warrior.add(jetNozzle);
        
        const jetNozzleL = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.14, 0.22, 8), matGlow);
        jetNozzleL.position.set(-0.22, 2.05, -0.72);
        warrior.add(jetNozzleL);

        // =============== أرضية مع شبكة قتالية ===============
        const grid = new THREE.GridHelper(12, 24, 0xff6644, 0x884422);
        grid.position.y = -1.25;
        grid.material.transparent = true;
        grid.material.opacity = 0.4;
        scene.add(grid);
        
        // تأثيرات جزيئات قتالية
        const particleCount = 300;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 7;
            particlePositions[i*3+1] = Math.random() * 5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 6;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xff6644, size: 0.025, transparent: true, opacity: 0.35 });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // =============== حلقة التحريك ===============
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // نبض العين والضوء
            const pulse = 0.45 + Math.sin(time * 10) * 0.2;
            matGlow.emissiveIntensity = pulse;
            chestLight.intensity = 0.4 + Math.sin(time * 8) * 0.15;
            
            // دوران الجزيئات
            particles.rotation.y += 0.003;
            particles.rotation.x = Math.sin(time * 0.5) * 0.1;
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('✅ WARRIOR VANGUARD جاهز | شخصية حربية رشيقة');
    </script>
</body>
</html>
