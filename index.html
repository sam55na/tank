<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TNT Wars - ساحة الدبابات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Cairo', 'Tahoma', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            background: #05070c;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        /* طبقة الخلفية المتحركة */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.4;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 40%, rgba(212,175,55,0.15) 0%, transparent 50%),
                        repeating-linear-gradient(45deg, rgba(212,175,55,0.05) 0px, rgba(212,175,55,0.05) 2px, transparent 2px, transparent 8px);
            animation: rotateBg 60s linear infinite;
        }

        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* شاشة تسجيل الدخول */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, #0a0f1a, #03050a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(2px);
        }

        .login-container {
            background: rgba(8, 12, 20, 0.75);
            backdrop-filter: blur(20px);
            padding: clamp(30px, 6vw, 50px) clamp(25px, 5vw, 45px);
            border-radius: min(60px, 12vw);
            width: calc(100% - 40px);
            max-width: 480px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,175,55,0.1) inset;
        }

        .login-container h1 {
            background: linear-gradient(135deg, #f3e6b0, #d4af37, #b8860b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: clamp(28px, 7vw, 48px);
            margin-bottom: 12px;
            letter-spacing: 2px;
            font-weight: 800;
            white-space: nowrap;
        }

        .subtitle {
            color: #9aaebf;
            font-size: clamp(12px, 3.5vw, 15px);
            margin-bottom: clamp(30px, 7vw, 45px);
        }

        .google-btn {
            width: 100%;
            padding: clamp(14px, 4vw, 18px);
            background: white;
            border: none;
            border-radius: min(80px, 15vw);
            font-size: clamp(16px, 4.5vw, 18px);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: #1e2a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: inherit;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.3);
        }

        .google-btn:active {
            transform: scale(0.97);
        }

        /* الواجهة الرئيسية */
        .main-screen {
            background: radial-gradient(ellipse at 20% 30%, #0f1725, #03050a);
            display: none;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 900;
            overflow: hidden;
        }

        /* الشريط العلوي - سطر واحد متكامل */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(5, 8, 15, 0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.4);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            gap: 12px;
            flex-wrap: nowrap;
        }

        /* قسم الرصيد */
        .balance-card {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4));
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            min-width: 95px;
        }

        .balance-icon {
            font-size: 20px;
        }

        .balance-info {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .balance-label {
            font-size: 10px;
            color: #8a9aa8;
            letter-spacing: 0.5px;
        }

        .balance-amount {
            font-size: 18px;
            font-weight: bold;
            color: #d4af37;
        }

        /* عنوان TNT WARS مع تأثير نيون */
        .title-card {
            text-align: center;
            flex: 1;
        }

        .neon-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #fff8e7, #d4af37, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
            animation: neonPulse 1.8s ease-in-out infinite alternate;
            white-space: nowrap;
        }

        @keyframes neonPulse {
            0% {
                text-shadow: 0 0 2px rgba(212, 175, 55, 0.3);
                opacity: 0.9;
            }
            100% {
                text-shadow: 0 0 12px rgba(212, 175, 55, 0.8), 0 0 20px rgba(212, 175, 55, 0.5);
                opacity: 1;
            }
        }

        /* قسم الإحصائيات */
        .stats-card {
            display: flex;
            gap: 12px;
            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4));
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            min-width: 115px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-icon {
            font-size: 16px;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 10px;
            color: #8a9aa8;
        }

        .stat-value {
            font-size: 15px;
            font-weight: bold;
            color: #d4af37;
        }

        .separator {
            width: 1px;
            height: 25px;
            background: rgba(212, 175, 55, 0.3);
            margin: 0 4px;
        }

        /* المحتوى الرئيسي */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding-top: 80px;
            padding-bottom: 30px;
            overflow-y: auto;
        }

        /* زر تسجيل الخروج - مصغر */
        .logout-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(231, 76, 60, 0.85);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .logout-btn:active {
            transform: scale(0.95);
        }

        .user-card {
            background: rgba(10, 15, 25, 0.7);
            backdrop-filter: blur(15px);
            padding: 25px 35px;
            border-radius: 50px;
            margin-top: 20px;
            text-align: center;
            color: white;
            width: 90%;
            max-width: 420px;
            border: 1px solid rgba(212, 175, 55, 0.35);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 12px;
            border: 3px solid #d4af37;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            background: #1e2a3a;
        }

        .user-name {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #d4af37;
        }

        .user-email {
            font-size: 12px;
            color: #9aaebf;
            word-break: break-all;
        }

        /* كود المستخدم - تصميم مميز */
        .user-id-card {
            margin-top: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .user-id-label {
            font-size: 11px;
            color: #8a9aa8;
            letter-spacing: 1px;
        }

        .user-id-value {
            font-size: 16px;
            font-weight: bold;
            color: #d4af37;
            letter-spacing: 1px;
            font-family: monospace;
        }

        .copy-id-btn {
            background: rgba(212, 175, 55, 0.2);
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 11px;
            color: #d4af37;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-id-btn:active {
            transform: scale(0.95);
            background: rgba(212, 175, 55, 0.4);
        }

        /* أزرار الأصدقاء */
        .friends-section {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .friend-btn {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 13px;
            font-weight: 500;
            color: #d4af37;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .friend-btn:active {
            transform: scale(0.96);
            background: rgba(212, 175, 55, 0.3);
        }

        /* نافذة إضافة صديق */
        .add-friend-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .add-friend-container {
            background: linear-gradient(135deg, #1a1f2e, #0f1420);
            border-radius: 40px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #d4af37;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .add-friend-container h3 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .friend-id-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 60px;
            border: 1px solid rgba(212,175,55,0.4);
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 16px;
            text-align: center;
            letter-spacing: 1px;
            font-family: monospace;
            margin-bottom: 15px;
        }

        .send-request-btn {
            background: #d4af37;
            color: #0a0f1a;
            border: none;
            padding: 12px 25px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .close-friend-btn {
            background: transparent;
            border: 1px solid rgba(212,175,55,0.4);
            color: #d4af37;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }

        /* قائمة الأصدقاء */
        .friends-list-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .friends-list-container {
            background: linear-gradient(135deg, #1a1f2e, #0f1420);
            border-radius: 40px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            max-height: 70vh;
            overflow-y: auto;
            text-align: center;
            border: 1px solid #d4af37;
        }

        .friends-list-container h3 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .friend-item {
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 12px 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .friend-info {
            text-align: left;
        }

        .friend-name {
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .friend-id {
            color: #8a9aa8;
            font-size: 10px;
            font-family: monospace;
        }

        .remove-friend-btn {
            background: rgba(231, 76, 60, 0.7);
            border: none;
            border-radius: 30px;
            padding: 5px 12px;
            color: white;
            font-size: 11px;
            cursor: pointer;
        }

        .no-friends {
            color: #8a9aa8;
            padding: 20px;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(12px);
            padding: 20px 40px;
            border-radius: 70px;
            color: #d4af37;
            display: none;
            z-index: 10001;
            font-size: 18px;
            font-weight: bold;
            border: 1px solid #d4af37;
            white-space: nowrap;
            box-shadow: 0 0 30px rgba(212,175,55,0.3);
        }

        .toast-notify {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            color: #d4af37;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 14px;
            z-index: 10002;
            border: 1px solid #d4af37;
            animation: slideUpFade 2.8s ease forwards;
            max-width: 85vw;
            text-align: center;
            font-weight: 500;
            pointer-events: none;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(30px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }

        @media (max-width: 600px) {
            .top-bar {
                padding: 8px 12px;
                gap: 8px;
            }
            .balance-card, .stats-card {
                padding: 4px 10px;
            }
            .balance-amount {
                font-size: 14px;
            }
            .neon-title {
                font-size: 16px;
            }
            .stat-value {
                font-size: 12px;
            }
            .user-card {
                padding: 18px 25px;
            }
            .user-avatar {
                width: 65px;
                height: 65px;
            }
            .user-name {
                font-size: 18px;
            }
            .user-id-value {
                font-size: 12px;
            }
            .friend-btn {
                padding: 6px 14px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

<div class="bg-animation"></div>

<!-- شاشة تسجيل الدخول -->
<div class="login-screen" id="loginScreen">
    <div class="login-container">
        <h1>💣 TNT WARS 💣</h1>
        <div class="subtitle">ELITE BATTLEFIELD | ساحة المعركة</div>

        <button class="google-btn" id="googleLoginBtn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="24" height="24">

                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
            </svg>
            <span>تسجيل الدخول بحساب Google</span>
        </button>
    </div>
</div>

<!-- الواجهة الرئيسية -->
<div class="main-screen" id="mainScreen">
    <div class="top-bar">
        <div class="balance-card">
            <span class="balance-icon">💰</span>
            <div class="balance-info">
                <span class="balance-label">الرصيد</span>
                <span class="balance-amount" id="topBalance">0</span>
            </div>
        </div>
        <div class="title-card">
            <div class="neon-title">💣 TNT WARS 💣</div>
        </div>
        <div class="stats-card">
            <div class="stat-item">
                <span class="stat-icon">🏆</span>
                <div class="stat-info">
                    <span class="stat-label">مباريات</span>
                    <span class="stat-value" id="topGames">0</span>
                </div>
            </div>
            <div class="separator"></div>
            <div class="stat-item">
                <span class="stat-icon">⚔️</span>
                <div class="stat-info">
                    <span class="stat-label">انتصارات</span>
                    <span class="stat-value" id="topWins">0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="user-card">
            <img class="user-avatar" id="userAvatar" alt="صورة المستخدم">
            <div class="user-name" id="username">اللاعب</div>
            <div class="user-email" id="userEmail">-</div>
            
            <!-- كود المستخدم الفريد -->
            <div class="user-id-card">
                <span class="user-id-label">🆔 المعرف الشخصي</span>
                <span class="user-id-value" id="userIdCode">-----</span>
                <button class="copy-id-btn" id="copyIdBtn">📋 نسخ</button>
            </div>
            
            <!-- أزرار الأصدقاء -->
            <div class="friends-section">
                <button class="friend-btn" id="addFriendBtn">➕ إضافة صديق</button>
                <button class="friend-btn" id="showFriendsBtn">👥 أصدقائي (<span id="friendsCount">0</span>)</button>
            </div>
        </div>
    </div>

    <button class="logout-btn" id="logoutBtn">
        <span>🚪</span> <span>خروج</span>
    </button>
</div>

<!-- نافذة إضافة صديق -->
<div class="add-friend-overlay" id="addFriendOverlay">
    <div class="add-friend-container">
        <h3>➕ إضافة صديق جديد</h3>
        <input type="text" class="friend-id-input" id="friendIdInput" placeholder="أدخل المعرف الشخصي (10 أرقام)" maxlength="10">
        <button class="send-request-btn" id="sendFriendRequestBtn">إرسال طلب صداقة</button>
        <button class="close-friend-btn" id="closeAddFriendBtn">إلغاء</button>
    </div>
</div>

<!-- نافذة قائمة الأصدقاء -->
<div class="friends-list-overlay" id="friendsListOverlay">
    <div class="friends-list-container">
        <h3>👥 قائمة الأصدقاء</h3>
        <div id="friendsListContent"></div>
        <button class="close-friend-btn" id="closeFriendsListBtn">إغلاق</button>
    </div>
</div>

<div class="loading" id="loading">⏳ جاري التحميل...</div>

<script type="module">

        storageBucket: "boomb-fa3e7.firebasestorage.app",
        messagingSenderId: "499624996530",
        appId: "1:499624996530:web:235f71e450845c748523ab"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();
    googleProvider.setCustomParameters({ prompt: 'select_account' });

    let currentUser = null;
    let currentBalance = 0;
    let userStats = { gamesPlayed: 0, wins: 0 };
    let userIdCode = null;
    let friendsList = [];

    // دالة توليد ID فريد من 10 أرقام
    function generateUniqueId() {
        return Math.floor(1000000000 + Math.random() * 9000000000).toString();
    }

    // تحميل بيانات المستخدم
    function loadUserData() {
        if (!currentUser) return;
        const userKey = `tnt_user_${currentUser.uid}`;
        const saved = localStorage.getItem(userKey);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                currentBalance = data.balance ?? 100;
                userStats = data.stats || { gamesPlayed: 0, wins: 0 };
                userIdCode = data.userIdCode;
                friendsList = data.friends || [];
            } catch(e) {}
        }
        
        // إذا لم يكن هناك ID، قم بإنشاء واحد جديد
        if (!userIdCode) {
            userIdCode = generateUniqueId();
            saveUserData();
        }
    }

    // حفظ بيانات المستخدم
    function saveUserData() {
        if (!currentUser) return;
        const userKey = `tnt_user_${currentUser.uid}`;
        localStorage.setItem(userKey, JSON.stringify({
            balance: currentBalance,
            stats: userStats,
            userIdCode: userIdCode,
            friends: friendsList,
            name: currentUser.displayName,
            email: currentUser.email
        }));
    }

    // الحصول على بيانات مستخدم بواسطة ID
    function getUserByCode(code) {
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith('tnt_user_')) {
                try {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (data.userIdCode === code) {
                        return data;
                    }
                } catch(e) {}
            }
        }
        return null;
    }

    // تحديث الواجهة
    function updateUI() {
        if (currentUser) {
            const displayName = currentUser.displayName || currentUser.email.split('@')[0];
            document.getElementById('username').textContent = displayName;
            document.getElementById('userEmail').textContent = currentUser.email;
            document.getElementById('topBalance').textContent = currentBalance;
            document.getElementById('topGames').textContent = userStats.gamesPlayed;
            document.getElementById('topWins').textContent = userStats.wins;
            document.getElementById('userIdCode').textContent = userIdCode || '-----';
            document.getElementById('friendsCount').textContent = friendsList.length;

            if (currentUser.photoURL) {
                document.getElementById('userAvatar').src = currentUser.photoURL;
            }
        }
    }

    // عرض قائمة الأصدقاء
    function renderFriendsList() {
        const container = document.getElementById('friendsListContent');
        if (!container) return;
        
        if (friendsList.length === 0) {
            container.innerHTML = '<div class="no-friends">📭 لا يوجد أصدقاء بعد<br>أضف أصدقاء باستخدام المعرف الشخصي</div>';
            return;
        }
        
        container.innerHTML = '';
        friendsList.forEach((friend, index) => {
            const friendData = getUserByCode(friend.userIdCode);
            const friendName = friendData ? friendData.name || friend.userIdCode : friend.userIdCode;
            
            const friendDiv = document.createElement('div');
            friendDiv.className = 'friend-item';
            friendDiv.innerHTML = `
                <div class="friend-info">
                    <div class="friend-name">${friendName}</div>
                    <div class="friend-id">🆔 ${friend.userIdCode}</div>
                </div>
                <button class="remove-friend-btn" data-index="${index}">🗑️ إزالة</button>
            `;
            container.appendChild(friendDiv);
        });
        
        document.querySelectorAll('.remove-friend-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const index = parseInt(btn.dataset.index);
                removeFriend(index);
            });
        });
    }
    
    // إزالة صديق
    function removeFriend(index) {
        if (confirm('هل أنت متأكد من إزالة هذا الصديق؟')) {
            friendsList.splice(index, 1);
            saveUserData();
            renderFriendsList();
            updateUI();
            showToast('✅ تم إزالة الصديق بنجاح', false);
        }
    }
    
    // إرسال طلب صداقة
    function sendFriendRequest() {
        const friendCode = document.getElementById('friendIdInput').value.trim();
        
        if (!friendCode) {
            showToast('⚠️ الرجاء إدخال المعرف الشخصي', true);
            return;
        }
        
        if (friendCode.length !== 10 || !/^\d+$/.test(friendCode)) {
            showToast('⚠️ المعرف الشخصي يجب أن يكون 10 أرقام', true);
            return;
        }
        
        if (friendCode === userIdCode) {
            showToast('⚠️ لا يمكن إضافة نفسك كصديق', true);
            return;
        }
        
        const friendData = getUserByCode(friendCode);
        if (!friendData) {
            showToast('❌ لا يوجد مستخدم بهذا المعرف', true);
            return;
        }
        
        // التحقق من وجود الصديق مسبقاً
        if (friendsList.some(f => f.userIdCode === friendCode)) {
            showToast('⚠️ هذا المستخدم موجود بالفعل في قائمة أصدقائك', true);
            return;
        }
        
        // إضافة الصديق
        friendsList.push({
            userIdCode: friendCode,
            name: friendData.name,
            addedAt: Date.now()
        });
        
        saveUserData();
        updateUI();
        document.getElementById('friendIdInput').value = '';
        document.getElementById('addFriendOverlay').style.display = 'none';
        showToast(`✅ تم إضافة ${friendData.name || friendCode} إلى قائمة أصدقائك`, false);
    }
    
    // نسخ المعرف
    function copyUserId() {
        if (userIdCode) {
            navigator.clipboard.writeText(userIdCode);
            showToast('📋 تم نسخ المعرف الشخصي', false);
        }
    }

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-notify';
        toast.textContent = message;
        toast.style.background = isError ? 'rgba(231, 76, 60, 0.95)' : 'rgba(0,0,0,0.92)';
        toast.style.borderColor = isError ? '#e74c3c' : '#d4af37';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
    }

    async function loginWithGoogle() {
        document.getElementById('loading').style.display = 'flex';
        try {
            const result = await signInWithPopup(auth, googleProvider);
            const user = result.user;
            currentUser = {
                uid: user.uid,
                email: user.email,
                displayName: user.displayName || user.email.split('@')[0],
                photoURL: user.photoURL,
                isGuest: false
            };
            loadUserData();
            updateUI();
            saveUserData();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'flex';
            showToast(`🌟 مرحباً ${currentUser.displayName} !`, false);
        } catch (error) {
            document.getElementById('loading').style.display = 'none';
            showToast('فشل تسجيل الدخول بحساب Google', true);
        }
    }

    async function handleLogout() {
        document.getElementById('loading').style.display = 'flex';
        try {
            if (currentUser) saveUserData();
            await signOut(auth);
            currentUser = null;
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('loading').style.display = 'none';
            showToast('👋 تم تسجيل الخروج بنجاح', false);
        } catch (error) {
            document.getElementById('loading').style.display = 'none';
            showToast('حدث خطأ أثناء تسجيل الخروج', true);
        }
    }

    function showMainScreen() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainScreen').style.display = 'flex';
    }

    // ربط الأحداث
    document.getElementById('googleLoginBtn').addEventListener('click', loginWithGoogle);
    document.getElementById('logoutBtn').addEventListener('click', handleLogout);
    document.getElementById('copyIdBtn').addEventListener('click', copyUserId);
    document.getElementById('addFriendBtn').addEventListener('click', () => {
        document.getElementById('addFriendOverlay').style.display = 'flex';
    });
    document.getElementById('showFriendsBtn').addEventListener('click', () => {
        renderFriendsList();
        document.getElementById('friendsListOverlay').style.display = 'flex';
    });
    document.getElementById('closeAddFriendBtn').addEventListener('click', () => {
        document.getElementById('addFriendOverlay').style.display = 'none';
    });
    document.getElementById('closeFriendsListBtn').addEventListener('click', () => {
        document.getElementById('friendsListOverlay').style.display = 'none';
    });
    document.getElementById('sendFriendRequestBtn').addEventListener('click', sendFriendRequest);

    onAuthStateChanged(auth, async (user) => {
        if (user && (!currentUser)) {
            currentUser = {
                uid: user.uid,
                email: user.email,
                displayName: user.displayName || user.email.split('@')[0],
                photoURL: user.photoURL,
                isGuest: false
            };
            loadUserData();
            updateUI();
            saveUserData();
            showMainScreen();
        }
    });
</script>
</body>
</html>
