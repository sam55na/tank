<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Elite Tactical Shooter - Pro Model</title>
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; transform: translate(-50%, -50%); pointer-events: none; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ff00; opacity: 0.7; }
        #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
        #crosshair::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
        #info-panel { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.7); color: #fff; padding: 15px 25px; border-radius: 8px; border-left: 4px solid #00ff00; }
        #info-panel h1 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; }
        #info-panel p { margin: 5px 0 0; font-size: 0.8rem; color: #aaa; }
        #score-panel { position: absolute; top: 20px; right: 20px; background: rgba(0, 0, 0, 0.7); color: #00ff00; padding: 10px 25px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; border: 1px solid rgba(0, 255, 0, 0.3); }
        #joystick-container { position: absolute; bottom: 50px; left: 50px; width: 130px; height: 130px; background: rgba(255, 255, 255, 0.05); border-radius: 50%; pointer-events: auto; border: 2px solid rgba(255, 255, 255, 0.2); }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 55px; height: 55px; background: rgba(255, 255, 255, 0.9); border-radius: 50%; transform: translate(-50%,-50%); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #action-buttons { position: absolute; bottom: 50px; right: 50px; display: flex; gap: 25px; pointer-events: auto; }
        .action-btn { width: 80px; height: 80px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); color: white; font-weight: bold; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: all 0.1s; user-select: none; background: rgba(0,0,0,0.6); }
        #btn-jump { border-color: #00aaff; }
        #btn-throw { border-color: #ff4400; }
        .action-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: #fff; }
        .loader { border: 4px solid #333; border-top: 4px solid #00ff00; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <p>جاري تحميل الشخصية الاحترافية والعالم...</p>
    </div>

    <div id="ui-container">
        <div id="crosshair"></div>
        <div id="info-panel">
            <h1>ELITE VANGUARD</h1>
            <p>Pro GLB Model • Double Jump Flip • Laser Precision</p>
        </div>
        <div id="score-panel">SCORE: <span id="score">0</span></div>
        <div id="joystick-container"><div id="joystick-knob"></div></div>
        <div id="action-buttons">
            <button class="action-btn" id="btn-jump">⬆️</button>
            <button class="action-btn" id="btn-throw">🔥</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.128.0/examples/jsm/loaders/GLTFLoader.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';

        // ==========================================
        // 1. إعداد المشهد
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 150, 400);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // الإضاءة
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
        sunLight.position.set(50, 100, 50);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.set(2048, 2048);
        sunLight.shadow.camera.left = -100;
        sunLight.shadow.camera.right = 100;
        sunLight.shadow.camera.top = 100;
        sunLight.shadow.camera.bottom = -100;
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0x404040, 1.0);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x00ff00, 1, 50);
        pointLight.position.set(0, 10, 0);
        scene.add(pointLight);

        // الأرضية
        const grid = new THREE.GridHelper(1000, 100, 0x00ff00, 0x222222);
        scene.add(grid);

        const groundGeo = new THREE.PlaneGeometry(1000, 1000);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // ==========================================
        // 2. تحميل الشخصية الاحترافية (Xbot)
        // ==========================================
        let character, mixer, animations = {};
        let currentAction, activeState = 'idle';
        const loader = new GLTFLoader();

        // رابط نموذج Xbot الشهير من مستودع Three.js
        const modelUrl = 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Xbot.glb';

        loader.load(modelUrl, (gltf) => {
            character = gltf.scene;
            character.scale.set(1.8, 1.8, 1.8);
            character.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(character);

            mixer = new THREE.AnimationMixer(character);
            gltf.animations.forEach(clip => {
                animations[clip.name.toLowerCase()] = mixer.clipAction(clip);
            });

            // تعيين الأنيميشن الافتراضي
            if (animations['idle']) {
                currentAction = animations['idle'];
                currentAction.play();
            }

            document.getElementById('loading-screen').style.display = 'none';
        }, undefined, (error) => {
            console.error('Error loading model:', error);
            // Fallback if model fails
            createFallbackCharacter();
            document.getElementById('loading-screen').style.display = 'none';
        });

        function createFallbackCharacter() {
            character = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.8, 0.4), new THREE.MeshStandardMaterial({ color: 0x00ff00 }));
            body.position.y = 0.9;
            character.add(body);
            scene.add(character);
        }

        // ==========================================
        // 3. نظام الكاميرا والتحكم
        // ==========================================
        const input = { forward: 0, side: 0, jump: false, throw: false };
        const joystick = { active: false, startX: 0, startY: 0 };
        const knob = document.getElementById('joystick-knob');

        // إعداد الجويستك
        document.getElementById('joystick-container').addEventListener('touchstart', (e) => {
            joystick.active = true;
            joystick.startX = e.touches[0].clientX;
            joystick.startY = e.touches[0].clientY;
        });

        window.addEventListener('touchmove', (e) => {
            if (!joystick.active) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystick.startX;
            let dy = touch.clientY - joystick.startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 50;
            if (dist > maxDist) {
                dx *= maxDist / dist;
                dy *= maxDist / dist;
            }
            knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            input.side = -dx / maxDist;
            input.forward = -dy / maxDist;
        });

        window.addEventListener('touchend', () => {
            joystick.active = false;
            knob.style.transform = `translate(-50%, -50%)`;
            input.forward = 0;
            input.side = 0;
        });

        document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); input.jump = true; });
        document.getElementById('btn-throw').addEventListener('touchstart', (e) => { e.preventDefault(); input.throw = true; });

        // الكيبورد
        const keys = {};
        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // ==========================================
        // 4. منطق اللعبة والفيزياء
        // ==========================================
        let verticalVel = 0, isJumping = false, jumpCount = 0;
        let score = 0;
        const projectiles = [], particles = [], targets = [];

        function spawnTarget() {
            const target = new THREE.Mesh(
                new THREE.SphereGeometry(1.2, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5 })
            );
            const angle = Math.random() * Math.PI * 2;
            const dist = 40 + Math.random() * 60;
            target.position.set(Math.cos(angle)*dist, 2, Math.sin(angle)*dist);
            scene.add(target);
            targets.push(target);
        }
        for(let i=0; i<15; i++) spawnTarget();

        function fireProjectile() {
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
            const proj = new THREE.Mesh(
                new THREE.SphereGeometry(0.2, 8, 8),
                new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 1 })
            );
            proj.position.copy(character.position).add(new THREE.Vector3(0, 1.5, 0));
            scene.add(proj);
            projectiles.push({ mesh: proj, vel: dir.multiplyScalar(1.2), life: 200 });
        }

        function createExplosion(pos) {
            for(let i=0; i<30; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.1, 4, 4), new THREE.MeshStandardMaterial({ color: 0x00ff00 }));
                p.position.copy(pos);
                scene.add(p);
                particles.push({
                    mesh: p,
                    vel: new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(0.5),
                    life: 40
                });
            }
        }

        function fadeToAction(name, duration) {
            if (!animations[name] || currentAction === animations[name]) return;
            const previousAction = currentAction;
            currentAction = animations[name];
            if (previousAction) previousAction.fadeOut(duration);
            currentAction.reset().setEffectiveTimeScale(1).setEffectiveWeight(1).fadeIn(duration).play();
        }

        function update(delta) {
            if (!character) return;

            // تحديث المدخلات من الكيبورد
            if (keys['KeyW']) input.forward = 1; else if (keys['KeyS']) input.forward = -1; else if (!joystick.active) input.forward = 0;
            if (keys['KeyA']) input.side = 1; else if (keys['KeyD']) input.side = -1; else if (!joystick.active) input.side = 0;
            if (keys['Space']) { input.jump = true; keys['Space'] = false; }
            if (keys['KeyF']) { input.throw = true; keys['KeyF'] = false; }

            // الحركة
            const moveDir = new THREE.Vector3(input.side, 0, input.forward);
            if (moveDir.length() > 0.1) {
                const angle = Math.atan2(input.side, input.forward);
                character.rotation.y = angle;
                character.position.x += Math.sin(angle) * 0.25;
                character.position.z += Math.cos(angle) * 0.25;
                fadeToAction('run', 0.2);
            } else {
                fadeToAction('idle', 0.2);
            }

            // القفز المزدوج والشقلبة
            if (input.jump && jumpCount < 2) {
                verticalVel = 0.35;
                isJumping = true;
                jumpCount++;
                input.jump = false;
                if (jumpCount === 2) {
                    // تأثير الشقلبة (دوران يدوي للنموذج)
                    character.userData.isFlipping = true;
                    character.userData.flipAngle = 0;
                }
            }

            if (isJumping) {
                character.position.y += verticalVel;
                verticalVel -= 0.018;
                if (character.userData.isFlipping) {
                    character.userData.flipAngle += 0.2;
                    character.children[0].rotation.x = character.userData.flipAngle;
                    if (character.userData.flipAngle >= Math.PI * 2) {
                        character.userData.isFlipping = false;
                        character.children[0].rotation.x = 0;
                    }
                }
                if (character.position.y <= 0) {
                    character.position.y = 0;
                    isJumping = false;
                    jumpCount = 0;
                    character.userData.isFlipping = false;
                    character.children[0].rotation.x = 0;
                }
            }

            // الرمي
            if (input.throw) {
                fireProjectile();
                input.throw = false;
            }

            // الكاميرا
            const camOffset = new THREE.Vector3(0, 4, -10).applyQuaternion(character.quaternion);
            camera.position.lerp(character.position.clone().add(camOffset), 0.1);
            camera.lookAt(character.position.clone().add(new THREE.Vector3(0, 2, 0)));

            // القذائف والأهداف
            for(let i=projectiles.length-1; i>=0; i--) {
                const p = projectiles[i];
                p.mesh.position.add(p.vel);
                p.life--;
                targets.forEach((t, idx) => {
                    if (p.mesh.position.distanceTo(t.position) < 1.5) {
                        createExplosion(t.position);
                        scene.remove(t);
                        targets.splice(idx, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                        spawnTarget();
                        p.life = 0;
                    }
                });
                if (p.life <= 0) { scene.remove(p.mesh); projectiles.splice(i, 1); }
            }

            // الجزيئات
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.vel);
                p.life--;
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }

            if (mixer) mixer.update(delta);
        }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            update(clock.getDelta());
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
