<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TNT Wars - ساحة الدبابات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', 'Cairo', system-ui, sans-serif; overflow: hidden; background: #05070c; position: fixed; width: 100%; height: 100%; top: 0; left: 0; }
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.4; }
        .bg-animation::before { content: ''; position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; background: radial-gradient(circle at 30% 40%, rgba(212,175,55,0.15) 0%, transparent 50%), repeating-linear-gradient(45deg, rgba(212,175,55,0.05) 0px, rgba(212,175,55,0.05) 2px, transparent 2px, transparent 8px); animation: rotateBg 60s linear infinite; }
        @keyframes rotateBg { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 30% 40%, #0a0f1a, #03050a); display: flex; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(2px); }
        .login-container { background: rgba(8, 12, 20, 0.75); backdrop-filter: blur(20px); padding: clamp(30px, 6vw, 50px) clamp(25px, 5vw, 45px); border-radius: min(60px, 12vw); width: calc(100% - 40px); max-width: 480px; text-align: center; border: 1px solid rgba(212, 175, 55, 0.4); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .login-container h1 { background: linear-gradient(135deg, #f3e6b0, #d4af37, #b8860b); -webkit-background-clip: text; background-clip: text; color: transparent; font-size: clamp(28px, 7vw, 48px); margin-bottom: 12px; letter-spacing: 2px; font-weight: 800; white-space: nowrap; }
        .subtitle { color: #9aaebf; font-size: clamp(12px, 3.5vw, 15px); margin-bottom: clamp(30px, 7vw, 45px); }
        .google-btn { width: 100%; padding: clamp(14px, 4vw, 18px); background: white; border: none; border-radius: min(80px, 15vw); font-size: clamp(16px, 4.5vw, 18px); font-weight: 600; cursor: pointer; transition: all 0.25s; color: #1e2a3a; display: flex; align-items: center; justify-content: center; gap: 12px; font-family: inherit; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .google-btn:active { transform: scale(0.97); }
        .main-screen { background: radial-gradient(ellipse at 20% 30%, #0f1725, #03050a); display: none; flex-direction: column; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 900; overflow-y: auto; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; background: rgba(5, 8, 15, 0.92); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(212, 175, 55, 0.4); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 100; gap: 8px; }
        .balance-card { display: flex; align-items: center; gap: 6px; background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4)); padding: 5px 12px; border-radius: 50px; border: 1px solid rgba(212, 175, 55, 0.4); }
        .balance-icon { font-size: 18px; }
        .balance-info { display: flex; flex-direction: column; line-height: 1.2; }
        .balance-label { font-size: 9px; color: #8a9aa8; }
        .balance-amount { font-size: 16px; font-weight: bold; color: #d4af37; }
        .title-card { text-align: center; flex: 1; }
        .neon-title { font-size: 20px; font-weight: 800; letter-spacing: 2px; background: linear-gradient(135deg, #fff8e7, #d4af37, #ffd966); -webkit-background-clip: text; background-clip: text; color: transparent; animation: neonPulse 1.8s ease-in-out infinite alternate; white-space: nowrap; }
        @keyframes neonPulse { 0% { text-shadow: 0 0 2px rgba(212, 175, 55, 0.3); opacity: 0.9; } 100% { text-shadow: 0 0 12px rgba(212, 175, 55, 0.8); opacity: 1; } }
        .stats-card { display: flex; gap: 8px; background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4)); padding: 5px 12px; border-radius: 50px; border: 1px solid rgba(212, 175, 55, 0.3); }
        .stat-item { display: flex; align-items: center; gap: 4px; }
        .stat-icon { font-size: 14px; }
        .stat-info { display: flex; flex-direction: column; line-height: 1.2; }
        .stat-label { font-size: 9px; color: #8a9aa8; }
        .stat-value { font-size: 13px; font-weight: bold; color: #d4af37; }
        .separator { width: 1px; height: 20px; background: rgba(212, 175, 55, 0.3); margin: 0 4px; }
        .community-btn { position: fixed; top: 75px; left: 16px; width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #d4af37, #b8860b); border: 2px solid rgba(255,215,0,0.6); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 110; }
        .community-btn:active { transform: scale(0.95); }
        .community-btn span { font-size: 26px; }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 100vh; padding-top: 100px; padding-bottom: 80px; padding-left: 16px; padding-right: 16px; }
        .logout-btn { position: fixed; bottom: 20px; right: 20px; background: rgba(231, 76, 60, 0.85); border: none; border-radius: 40px; padding: 8px 18px; font-size: 13px; font-weight: 600; color: white; cursor: pointer; display: flex; align-items: center; gap: 6px; z-index: 100; }
        .user-card { background: rgba(10, 15, 25, 0.7); backdrop-filter: blur(15px); padding: 25px 30px; border-radius: 50px; text-align: center; color: white; width: 100%; max-width: 400px; border: 1px solid rgba(212, 175, 55, 0.35); }
        .user-avatar { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 12px; border: 3px solid #d4af37; object-fit: cover; }
        .user-name { font-size: 20px; font-weight: bold; margin-bottom: 8px; color: #d4af37; }
        .user-email { font-size: 11px; color: #9aaebf; }
        .user-id-card { margin-top: 15px; background: rgba(0,0,0,0.5); border-radius: 40px; padding: 8px 15px; display: inline-flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .user-id-value { font-size: 14px; font-weight: bold; color: #d4af37; font-family: monospace; }
        .copy-id-btn { background: rgba(212, 175, 55, 0.2); border: none; border-radius: 30px; padding: 4px 10px; font-size: 10px; color: #d4af37; cursor: pointer; }
        .community-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); z-index: 200; display: none; justify-content: center; align-items: center; }
        .community-container { background: linear-gradient(135deg, #1a1f2e, #0f1420); border-radius: 40px; width: 90%; max-width: 480px; max-height: 85vh; border: 1px solid #d4af37; overflow: hidden; display: flex; flex-direction: column; }
        .community-tabs { display: flex; border-bottom: 1px solid rgba(212, 175, 55, 0.3); background: rgba(0,0,0,0.3); }
        .tab-btn { flex: 1; padding: 14px 8px; background: transparent; border: none; color: #9aaebf; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .tab-btn.active { color: #d4af37; border-bottom: 2px solid #d4af37; }
        .tab-content { flex: 1; overflow-y: auto; padding: 20px; max-height: 55vh; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        .friend-item { background: rgba(255,255,255,0.08); border-radius: 25px; padding: 12px 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(212, 175, 55, 0.2); }
        .friend-info { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .friend-name { color: white; font-weight: bold; font-size: 14px; }
        .friend-id { color: #8a9aa8; font-size: 10px; font-family: monospace; }
        .friend-status { font-size: 10px; padding: 3px 8px; border-radius: 20px; background: rgba(46, 204, 113, 0.2); color: #2ecc71; display: inline-block; width: fit-content; }
        .friend-status.offline { background: rgba(149, 165, 166, 0.2); color: #95a5a6; }
        .remove-friend-btn, .accept-btn, .reject-btn { background: rgba(231, 76, 60, 0.7); border: none; border-radius: 30px; padding: 5px 12px; color: white; font-size: 11px; cursor: pointer; }
        .accept-btn { background: rgba(46, 204, 113, 0.7); }
        .request-btns { display: flex; gap: 8px; }
        .add-friend-input { width: 100%; padding: 14px 18px; border-radius: 60px; border: 1px solid rgba(212,175,55,0.4); background: rgba(0,0,0,0.5); color: white; font-size: 16px; text-align: center; font-family: monospace; margin-bottom: 15px; }
        .send-request-btn { background: #d4af37; color: #0a0f1a; border: none; padding: 12px 25px; border-radius: 60px; font-weight: bold; cursor: pointer; width: 100%; }
        .close-community-btn { background: transparent; border: 1px solid rgba(212,175,55,0.4); color: #d4af37; padding: 12px; border-radius: 30px; cursor: pointer; width: calc(100% - 40px); margin: 15px 20px; font-weight: bold; }
        .no-friends { text-align: center; color: #8a9aa8; padding: 30px; }
        .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.92); padding: 20px 40px; border-radius: 70px; color: #d4af37; display: none; z-index: 10001; border: 1px solid #d4af37; }
        .toast-notify { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: #d4af37; padding: 12px 28px; border-radius: 60px; z-index: 10002; border: 1px solid #d4af37; animation: slideUpFade 2.8s ease forwards; }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateX(-50%) translateY(30px); } 15% { opacity: 1; transform: translateX(-50%) translateY(0); } 85% { opacity: 1; transform: translateX(-50%) translateY(0); } 100% { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
        @media (max-width: 550px) { .community-btn { width: 42px; height: 42px; top: 70px; left: 12px; } .community-btn span { font-size: 22px; } .main-content { padding-top: 90px; } .neon-title { font-size: 16px; } }
    </style>
</head>
<body>

<div class="bg-animation"></div>

<div class="login-screen" id="loginScreen">
    <div class="login-container">
        <h1>💣 TNT WARS 💣</h1>
        <div class="subtitle">ELITE BATTLEFIELD | ساحة المعركة</div>
        <button class="google-btn" id="googleLoginBtn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="24" height="24">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
            </svg>
            <span>تسجيل الدخول بحساب Google</span>
        </button>
    </div>
</div>

<div class="main-screen" id="mainScreen">
    <div class="top-bar">
        <div class="balance-card"><span class="balance-icon">💰</span><div class="balance-info"><span class="balance-label">الرصيد</span><span class="balance-amount" id="topBalance">0</span></div></div>
        <div class="title-card"><div class="neon-title">💣 TNT WARS 💣</div></div>
        <div class="stats-card">
            <div class="stat-item"><span class="stat-icon">🏆</span><div class="stat-info"><span class="stat-label">مباريات</span><span class="stat-value" id="topGames">0</span></div></div>
            <div class="separator"></div>
            <div class="stat-item"><span class="stat-icon">⚔️</span><div class="stat-info"><span class="stat-label">انتصارات</span><span class="stat-value" id="topWins">0</span></div></div>
        </div>
    </div>

    <div class="community-btn" id="communityBtn"><span>👥</span></div>

    <div class="main-content">
        <div class="user-card">
            <img class="user-avatar" id="userAvatar" alt="صورة المستخدم">
            <div class="user-name" id="username">اللاعب</div>
            <div class="user-email" id="userEmail">-</div>
            <div class="user-id-card">
                <span class="user-id-value" id="userIdCode">-----</span>
                <button class="copy-id-btn" id="copyIdBtn">📋 نسخ</button>
            </div>
        </div>
    </div>

    <button class="logout-btn" id="logoutBtn">🚪 خروج</button>
</div>

<div class="community-overlay" id="communityOverlay">
    <div class="community-container">
        <div class="community-tabs">
            <button class="tab-btn active" data-tab="requests">📨 طلبات الصداقة</button>
            <button class="tab-btn" data-tab="active">🟢 النشطين</button>
            <button class="tab-btn" data-tab="add">➕ إضافة صديق</button>
            <button class="tab-btn" data-tab="all">👥 جميع الأصدقاء</button>
        </div>
        <div class="tab-content">
            <div class="tab-pane active" id="tabRequests"><div id="requestsList"></div></div>
            <div class="tab-pane" id="tabActive"><div id="activeFriendsList"></div></div>
            <div class="tab-pane" id="tabAdd">
                <input type="text" class="add-friend-input" id="friendIdInput" placeholder="أدخل المعرف الشخصي (10 أرقام)" maxlength="10">
                <button class="send-request-btn" id="sendFriendRequestBtn">➕ إرسال طلب صداقة</button>
            </div>
            <div class="tab-pane" id="tabAll"><div id="allFriendsList"></div></div>
        </div>
        <button class="close-community-btn" id="closeCommunityBtn">إغلاق</button>
    </div>
</div>

<div class="loading" id="loading">⏳ جاري التحميل...</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js';
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js';

    const firebaseConfig = {
        apiKey: "AIzaSyCvPo4HlsNhyf1WBmTzIr6CdR1c2lQ5sHU",
        authDomain: "boomb-fa3e7.firebaseapp.com",
        databaseURL: "https://boomb-fa3e7-default-rtdb.firebaseio.com",
        projectId: "boomb-fa3e7",
        storageBucket: "boomb-fa3e7.firebasestorage.app",
        messagingSenderId: "499624996530",
        appId: "1:499624996530:web:235f71e450845c748523ab"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();
    googleProvider.setCustomParameters({ prompt: 'select_account' });

    // ========== رابط السيرفر الجديد ==========
    const SERVER_URL = "https://tank-yf0p.onrender.com";

    let currentUser = null;
    let currentBalance = 0;
    let userStats = { gamesPlayed: 0, wins: 0 };
    let userIdCode = null;
    let friendsList = [];
    let friendRequests = [];

    async function fetchWithAuth(url, options = {}) {
        const token = await currentUser?.getIdToken();
        const response = await fetch(url, {
            ...options,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
                ...options.headers
            }
        });
        return response;
    }

    async function loadUserData() {
        if (!currentUser) return;
        try {
            const response = await fetchWithAuth(`${SERVER_URL}/api/user/data?uid=${currentUser.uid}`);
            const data = await response.json();
            if (data.success) {
                currentBalance = data.balance;
                userStats = { gamesPlayed: data.gamesPlayed, wins: data.wins };
                userIdCode = data.userIdCode;
                friendsList = data.friends || [];
                friendRequests = data.friendRequests || [];
                updateUI();
                renderAllTabs();
            }
        } catch (error) {
            console.error('Error loading user data:', error);
            showToast('فشل تحميل البيانات', true);
        }
    }

    async function createUserOnServer() {
        try {
            const response = await fetchWithAuth(`${SERVER_URL}/api/user/create`, {
                method: 'POST',
                body: JSON.stringify({
                    uid: currentUser.uid,
                    email: currentUser.email,
                    displayName: currentUser.displayName
                })
            });
            const data = await response.json();
            if (data.success && data.userIdCode) {
                userIdCode = data.userIdCode;
                return true;
            }
            return false;
        } catch (error) {
            console.error('Error creating user:', error);
            return false;
        }
    }

    async function updateUserOnServer() {
        try {
            await fetchWithAuth(`${SERVER_URL}/api/user/update`, {
                method: 'POST',
                body: JSON.stringify({
                    uid: currentUser.uid,
                    balance: currentBalance,
                    gamesPlayed: userStats.gamesPlayed,
                    wins: userStats.wins
                })
            });
        } catch (error) {
            console.error('Error updating user:', error);
        }
    }

    async function fetchFriendsData() {
        if (!currentUser) return;
        try {
            const response = await fetchWithAuth(`${SERVER_URL}/api/friends/list/${currentUser.uid}`);
            const data = await response.json();
            if (data.success) {
                friendsList = data.friends;
                renderAllTabs();
            }
        } catch (error) {
            console.error('Error fetching friends:', error);
        }
    }

    async function fetchFriendRequests() {
        if (!currentUser) return;
        try {
            const response = await fetchWithAuth(`${SERVER_URL}/api/friends/requests/${currentUser.uid}`);
            const data = await response.json();
            if (data.success) {
                friendRequests = data.requests;
                renderRequestsList();
            }
        } catch (error) {
            console.error('Error fetching requests:', error);
        }
    }

    async function sendFriendRequest() {
        const friendCode = document.getElementById('friendIdInput').value.trim();
        if (!friendCode) {
            showToast('⚠️ الرجاء إدخال المعرف الشخصي', true);
            return;
        }
        if (friendCode.length !== 10 || !/^\d+$/.test(friendCode)) {
            showToast('⚠️ المعرف الشخصي يجب أن يكون 10 أرقام', true);
            return;
        }
        
        try {
            const response = await fetchWithAuth(`${SERVER_URL}/api/friends/request`, {
                method: 'POST',
                body: JSON.stringify({
                    fromUid: currentUser.uid,
                    toUserIdCode: friendCode
                })
            });
            const data = await response.json();
            if (data.success) {
                showToast('✅ تم إرسال طلب الصداقة بنجاح', false);
                document.getElementById('friendIdInput').value = '';
            } else {
                showToast(data.error || 'فشل إرسال الطلب', true);
            }
        } catch (error) {
            showToast('خطأ في الاتصال بالسيرفر', true);
        }
    }

    async function acceptRequest(requesterUid) {
        try {
            const response = await fetchWithAuth(`${SERVER_URL}/api/friends/accept`, {
                method: 'POST',
                body: JSON.stringify({
                    userUid: currentUser.uid,
                    requesterUid: requesterUid
                })
            });
            const data = await response.json();
            if (data.success) {
                showToast('✅ تم قبول طلب الصداقة', false);
                await fetchFriendRequests();
                await fetchFriendsData();
            } else {
                showToast(data.error || 'فشل قبول الطلب', true);
            }
        } catch (error) {
            showToast('خطأ في الاتصال', true);
        }
    }

    async function rejectRequest(requesterUid) {
        try {
            const response = await fetchWithAuth(`${SERVER_URL}/api/friends/reject`, {
                method: 'POST',
                body: JSON.stringify({
                    userUid: currentUser.uid,
                    requesterUid: requesterUid
                })
            });
            const data = await response.json();
            if (data.success) {
                showToast('❌ تم رفض طلب الصداقة', false);
                await fetchFriendRequests();
            } else {
                showToast(data.error || 'فشل رفض الطلب', true);
            }
        } catch (error) {
            showToast('خطأ في الاتصال', true);
        }
    }

    async function removeFriend(friendUid) {
        if (!confirm('هل أنت متأكد من إزالة هذا الصديق؟')) return;
        try {
            const response = await fetchWithAuth(`${SERVER_URL}/api/friends/remove`, {
                method: 'POST',
                body: JSON.stringify({
                    userUid: currentUser.uid,
                    friendUid: friendUid
                })
            });
            const data = await response.json();
            if (data.success) {
                showToast('✅ تم إزالة الصديق', false);
                await fetchFriendsData();
            }
        } catch (error) {
            showToast('خطأ في الاتصال', true);
        }
    }

    function renderRequestsList() {
        const container = document.getElementById('requestsList');
        if (!container) return;
        
        if (friendRequests.length === 0) {
            container.innerHTML = '<div class="no-friends">📭 لا توجد طلبات صداقة</div>';
            return;
        }
        
        container.innerHTML = '';
        friendRequests.forEach(request => {
            const div = document.createElement('div');
            div.className = 'friend-item';
            div.innerHTML = `
                <div class="friend-info">
                    <div class="friend-name">${request.username}</div>
                    <div class="friend-id">🆔 ${request.userIdCode}</div>
                </div>
                <div class="request-btns">
                    <button class="accept-btn" data-uid="${request.uid}">قبول</button>
                    <button class="reject-btn" data-uid="${request.uid}">رفض</button>
                </div>
            `;
            container.appendChild(div);
        });
        
        container.querySelectorAll('.accept-btn').forEach(btn => {
            btn.addEventListener('click', () => acceptRequest(btn.dataset.uid));
        });
        container.querySelectorAll('.reject-btn').forEach(btn => {
            btn.addEventListener('click', () => rejectRequest(btn.dataset.uid));
        });
    }

    function renderFriendsLists() {
        const activeContainer = document.getElementById('activeFriendsList');
        const allContainer = document.getElementById('allFriendsList');
        
        const activeFriends = friendsList.filter(f => f.isActive);
        
        if (activeFriends.length === 0) {
            activeContainer.innerHTML = '<div class="no-friends">🟢 لا يوجد أصدقاء نشطاء حالياً</div>';
        } else {
            activeContainer.innerHTML = '';
            activeFriends.forEach(friend => {
                const div = document.createElement('div');
                div.className = 'friend-item';
                div.innerHTML = `
                    <div class="friend-info">
                        <div class="friend-name">${friend.username}</div>
                        <div class="friend-id">🆔 ${friend.userIdCode}</div>
                        <span class="friend-status">🟢 نشط الآن</span>
                    </div>
                    <button class="remove-friend-btn" data-uid="${friend.uid}">🗑️</button>
                `;
                activeContainer.appendChild(div);
            });
        }
        
        if (friendsList.length === 0) {
            allContainer.innerHTML = '<div class="no-friends">👥 لا يوجد أصدقاء بعد<br>أضف أصدقاء باستخدام المعرف الشخصي</div>';
        } else {
            allContainer.innerHTML = '';
            friendsList.forEach(friend => {
                const div = document.createElement('div');
                div.className = 'friend-item';
                div.innerHTML = `
                    <div class="friend-info">
                        <div class="friend-name">${friend.username}</div>
                        <div class="friend-id">🆔 ${friend.userIdCode}</div>
                        <span class="friend-status ${friend.isActive ? '' : 'offline'}">${friend.isActive ? '🟢 نشط' : '⚫ غير نشط'}</span>
                    </div>
                    <button class="remove-friend-btn" data-uid="${friend.uid}">🗑️</button>
                `;
                allContainer.appendChild(div);
            });
        }
        
        document.querySelectorAll('.remove-friend-btn').forEach(btn => {
            btn.addEventListener('click', () => removeFriend(btn.dataset.uid));
        });
    }

    function renderAllTabs() {
        renderRequestsList();
        renderFriendsLists();
    }

    function updateUI() {
        if (currentUser) {
            const displayName = currentUser.displayName || currentUser.email.split('@')[0];
            document.getElementById('username').textContent = displayName;
            document.getElementById('userEmail').textContent = currentUser.email;
            document.getElementById('topBalance').textContent = currentBalance;
            document.getElementById('topGames').textContent = userStats.gamesPlayed;
            document.getElementById('topWins').textContent = userStats.wins;
            document.getElementById('userIdCode').textContent = userIdCode || '-----';
            if (currentUser.photoURL) {
                document.getElementById('userAvatar').src = currentUser.photoURL;
            }
        }
    }

    function copyUserId() {
        if (userIdCode) {
            navigator.clipboard.writeText(userIdCode);
            showToast('📋 تم نسخ المعرف الشخصي', false);
        }
    }

    function openCommunity() {
        fetchFriendRequests();
        fetchFriendsData();
        document.getElementById('communityOverlay').style.display = 'flex';
    }

    function closeCommunity() {
        document.getElementById('communityOverlay').style.display = 'none';
    }

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-notify';
        toast.textContent = message;
        toast.style.background = isError ? 'rgba(231, 76, 60, 0.95)' : 'rgba(0,0,0,0.92)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
    }

    async function loginWithGoogle() {
        document.getElementById('loading').style.display = 'flex';
        try {
            const result = await signInWithPopup(auth, googleProvider);
            currentUser = result.user;
            await loadUserData();
            if (!userIdCode) {
                await createUserOnServer();
                await loadUserData();
            }
            document.getElementById('loading').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'flex';
            showToast(`🌟 مرحباً ${currentUser.displayName}!`, false);
        } catch (error) {
            document.getElementById('loading').style.display = 'none';
            showToast('فشل تسجيل الدخول', true);
        }
    }

    async function handleLogout() {
        document.getElementById('loading').style.display = 'flex';
        try {
            if (currentUser) await updateUserOnServer();
            await signOut(auth);
            currentUser = null;
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('loading').style.display = 'none';
            showToast('👋 تم تسجيل الخروج', false);
        } catch (error) {
            document.getElementById('loading').style.display = 'none';
            showToast('حدث خطأ', true);
        }
    }

    function setupTabs() {
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const tabId = tab.dataset.tab;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
                document.getElementById(`tab${tabId.charAt(0).toUpperCase() + tabId.slice(1)}`).classList.add('active');
            });
        });
    }

    document.addEventListener('DOMContentLoaded', setupTabs);
    document.getElementById('googleLoginBtn').addEventListener('click', loginWithGoogle);
    document.getElementById('logoutBtn').addEventListener('click', handleLogout);
    document.getElementById('copyIdBtn').addEventListener('click', copyUserId);
    document.getElementById('communityBtn').addEventListener('click', openCommunity);
    document.getElementById('closeCommunityBtn').addEventListener('click', closeCommunity);
    document.getElementById('sendFriendRequestBtn').addEventListener('click', sendFriendRequest);

    onAuthStateChanged(auth, async (user) => {
        if (user && !currentUser) {
            currentUser = user;
            await loadUserData();
            if (!userIdCode) {
                await createUserOnServer();
                await loadUserData();
            }
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'flex';
        }
    });
</script>
</body>
</html>
