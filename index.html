<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dwarf Bomber - Sprint Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0a2f1f, #051a0e);
            font-family: 'Segoe UI', system-ui, monospace;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        #ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 150;
        }
        .crosshair-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 38px;
            height: 38px;
            border: 2px solid #ff8844;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px rgba(255,136,68,0.8);
            animation: crosshairPulse 0.8s ease-out infinite;
        }
        .crosshair-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: #ff8844;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 6px #ffaa44;
        }
        @keyframes crosshairPulse {
            0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Score Panel */
        #score-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            color: #ffaa44;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 32px;
            font-family: 'Courier New', monospace;
            pointer-events: none;
            z-index: 150;
            border: 1px solid #ffaa55;
        }
        
        /* Distance Slider */
        #slider-container {
            position: absolute;
            bottom: 120px;
            left: 20px;
            width: 60px;
            height: 180px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 2px solid #ffaa55;
            pointer-events: auto;
            z-index: 140;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            cursor: pointer;
        }
        #slider-handle {
            width: 48px;
            height: 48px;
            background: radial-gradient(circle, #ffaa66, #ff8844);
            border-radius: 50%;
            margin-bottom: 8px;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(0,0,0,0.5);
            transition: margin-bottom 0.03s linear;
            border: 2px solid #ffdd99;
        }
        .slider-label {
            position: absolute;
            left: -48px;
            top: 15px;
            color: #ffdd99;
            font-size: 10px;
            font-weight: bold;
            text-align: center;
        }
        #distance-value {
            position: absolute;
            bottom: -40px;
            left: -8px;
            right: -8px;
            text-align: center;
            color: #ffaa55;
            font-weight: bold;
            font-size: 11px;
            background: rgba(0,0,0,0.75);
            padding: 4px;
            border-radius: 18px;
        }

        /* Movement Zone - Professional Joystick */
        .zone-move {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 45%;
            height: 45%;
            pointer-events: auto;
            z-index: 110;
        }
        
        /* Outer joystick base */
        .joystick-base {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 140px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            border-radius: 50%;
            border: 3px solid rgba(255,170,85,0.8);
            box-shadow: 0 0 25px rgba(255,170,85,0.3), inset 0 0 15px rgba(0,0,0,0.3);
        }
        
        /* Inner guide ring */
        .joystick-base::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1.5px dashed rgba(255,170,85,0.5);
            background: radial-gradient(circle, rgba(255,170,85,0.05), transparent);
            pointer-events: none;
        }
        
        /* Center dot for reference */
        .joystick-base::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,170,85,0.6);
            pointer-events: none;
        }
        
        /* Joystick thumb */
        .joystick-thumb {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #ffdd99, #ffaa33);
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4), 0 0 0 2px rgba(255,221,153,0.5);
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.02s linear;
            cursor: grab;
        }
        
        /* Thumb inner detail */
        .joystick-thumb::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffeecc, #ffcc66);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
        }

        /* Right Zone Controls */
        .zone-right {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 55%;
            height: 55%;
            pointer-events: auto;
            z-index: 110;
            display: flex;
            flex-direction: column;
        }
        .camera-area {
            flex: 1;
            background: transparent;
            pointer-events: auto;
        }
        .actions-area {
            position: absolute;
            bottom: 30px;
            right: 20px;
            display: flex;
            gap: 15px;
            pointer-events: auto;
            z-index: 120;
        }
        .action-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            border: 2px solid #ffaa55;
            color: #ffaa55;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.05s, background 0.08s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            box-shadow: 0 3px 12px rgba(0,0,0,0.4);
        }
        .action-btn:active {
            transform: scale(0.88);
            background: #ffaa55;
            color: #1a1a1a;
        }
        
        .camera-hint {
            position: absolute;
            bottom: 180px;
            right: 20px;
            color: rgba(255,200,150,0.6);
            font-size: 9px;
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 16px;
            pointer-events: none;
            z-index: 120;
        }
        
        .bomb-marker-label {
            position: absolute;
            bottom: 15px;
            left: 100px;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 18px;
            color: #ffaa66;
            font-size: 9px;
            pointer-events: none;
            z-index: 120;
        }
        
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a3a1a, #0a1a0a);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: #ffcc77;
            font-size: 22px;
            flex-direction: column;
            gap: 15px;
            transition: opacity 0.5s;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .joystick-base { width: 110px; height: 110px; bottom: 50px; }
            .joystick-base::before { width: 78px; height: 78px; }
            .joystick-thumb { width: 48px; height: 48px; }
            .joystick-thumb::before { width: 20px; height: 20px; }
            .action-btn { width: 48px; height: 48px; font-size: 22px; }
            .actions-area { bottom: 25px; right: 15px; gap: 12px; }
            #score-panel { font-size: 26px; padding: 6px 18px; top: 12px; right: 12px; }
            #slider-container { width: 52px; height: 150px; bottom: 100px; left: 12px; }
            #slider-handle { width: 42px; height: 42px; }
            .camera-hint { font-size: 8px; bottom: 150px; }
            .bomb-marker-label { font-size: 8px; left: 85px; }
        }
        
        @media (max-width: 480px) {
            .joystick-base { width: 95px; height: 95px; }
            .joystick-base::before { width: 66px; height: 66px; }
            .joystick-thumb { width: 42px; height: 42px; }
            .joystick-thumb::before { width: 17px; height: 17px; }
            .action-btn { width: 42px; height: 42px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        💣 DWARF BOMBER - SPRINT EDITION 💣
        <div style="width: 250px; height: 3px; background: #2a2a2a; border-radius: 2px; overflow: hidden; margin-top: 12px;">
            <div style="width: 0%; height: 100%; background: #ffaa55;" id="loading-bar"></div>
        </div>
    </div>

    <div id="ui-overlay" style="display: none;">
        <div id="crosshair">
            <div class="crosshair-ring"></div>
            <div class="crosshair-dot"></div>
        </div>
        <div id="score-panel">💣 <span id="score">0</span></div>
        <div class="camera-hint">🎥 DRAG TOP-RIGHT</div>
        <div class="bomb-marker-label">🎯 IMPACT POINT</div>
        
        <div id="slider-container">
            <div id="slider-handle"></div>
            <div class="slider-label">▲<br>▼</div>
            <div id="distance-value"><span id="dist-value">12.5</span>m</div>
        </div>
        
        <div class="zone-move" id="zone-move">
            <div class="joystick-base" id="joystick-base"></div>
            <div class="joystick-thumb" id="joystick-thumb"></div>
        </div>
        
        <div class="zone-right">
            <div class="camera-area" id="camera-area"></div>
            <div class="actions-area">
                <button class="action-btn jump-btn" id="btn-jump">🦘</button>
                <button class="action-btn throw-btn" id="btn-throw">💣</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <script>
        (function() {
            // ========== PHYSICS CONFIGURATION - RUNNING SPEED ==========
            const PHYSICS = {
                GRAVITY: 22.0,
                JUMP_FORCE: 8.5,
                THROW_ANGLE: 42,
                MAX_THROW_SPEED: 24,
                MIN_THROW_SPEED: 12,
                BLAST_RADIUS: 9.5,
                MOVEMENT_SPEED: 22.0,    // Sprint speed - very fast running
                AIR_CONTROL: 0.65,
                GROUND_DRAG: 8.0
            };
            
            // ========== THREE.JS SETUP ==========
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a3522);
            scene.fog = new THREE.FogExp2(0x0a3522, 0.0035);
            
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 350);
            const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            // Lighting
            const ambient = new THREE.AmbientLight(0x4a6e4a, 0.65);
            scene.add(ambient);
            const mainLight = new THREE.DirectionalLight(0xfff0cf, 1.3);
            mainLight.position.set(12, 22, 10);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            scene.add(mainLight);
            
            const backFill = new THREE.PointLight(0x88aacc, 0.55);
            backFill.position.set(-6, 14, -8);
            scene.add(backFill);
            
            // Ground
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x5a9e5a, roughness: 0.75 });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(280, 280), groundMat);
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -0.08;
            ground.receiveShadow = true;
            scene.add(ground);
            
            const grid = new THREE.GridHelper(280, 40, 0xaacc88, 0x558844);
            grid.position.y = 0.02;
            grid.material.transparent = true;
            grid.material.opacity = 0.45;
            scene.add(grid);
            
            // Decorative rocks
            for(let i = 0; i < 80; i++) {
                const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.22 + Math.random() * 0.35), 
                    new THREE.MeshStandardMaterial({ color: 0x7a6a55, roughness: 0.85 }));
                const angle = Math.random() * Math.PI * 2;
                const radius = 45 + Math.random() * 100;
                rock.position.set(Math.cos(angle) * radius, -0.12, Math.sin(angle) * radius);
                rock.castShadow = true;
                rock.scale.set(1, 0.5 + Math.random() * 0.7, 1);
                scene.add(rock);
            }
            
            // ========== PROFESSIONAL CHARACTER ==========
            let character = null;
            let mixer = null;
            let animations = {};
            let currentAction = null;
            let handBone = null;
            let modelLoaded = false;
            let bombInHand = null;
            
            function createHandBomb(targetHand) {
                if(bombInHand) return;
                const bombGroup = new THREE.Group();
                
                const bombCore = new THREE.Mesh(new THREE.SphereGeometry(0.38, 48, 48), 
                    new THREE.MeshStandardMaterial({ color: 0x2a2a2a, metalness: 0.9, roughness: 0.15, emissive: 0x111111 }));
                bombCore.castShadow = true;
                bombGroup.add(bombCore);
                
                const ring1 = new THREE.Mesh(new THREE.TorusGeometry(0.42, 0.05, 16, 48), 
                    new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.85 }));
                ring1.rotation.x = Math.PI / 2;
                ring1.position.y = 0.15;
                bombGroup.add(ring1);
                
                const ring2 = new THREE.Mesh(new THREE.TorusGeometry(0.42, 0.05, 16, 48), 
                    new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.85 }));
                ring2.rotation.x = Math.PI / 2;
                ring2.position.y = -0.15;
                bombGroup.add(ring2);
                
                const fuse = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.15, 0.58, 12), 
                    new THREE.MeshStandardMaterial({ color: 0xcc6644, emissive: 0x442200, emissiveIntensity: 0.6 }));
                fuse.position.y = 0.52;
                bombGroup.add(fuse);
                
                const fuseTip = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 12), 
                    new THREE.MeshStandardMaterial({ color: 0xff6644, emissive: 0xff4400, emissiveIntensity: 0.9 }));
                fuseTip.position.y = 0.82;
                bombGroup.add(fuseTip);
                
                const spark = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), 
                    new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff6600, emissiveIntensity: 1.2 }));
                spark.position.y = 0.88;
                bombGroup.add(spark);
                
                bombGroup.position.set(0.58, -0.12, 0.32);
                targetHand.add(bombGroup);
                bombInHand = bombGroup;
            }
            
            function removeHandBomb() {
                if(bombInHand) {
                    bombInHand.parent.remove(bombInHand);
                    bombInHand = null;
                }
            }
            
            function createFallbackCharacter() {
                const group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.72, 0.78, 1.45, 8), 
                    new THREE.MeshStandardMaterial({ color: 0x4aae77, metalness: 0.25 }));
                body.castShadow = true;
                body.position.y = 0.72;
                group.add(body);
                
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.62, 32, 32), 
                    new THREE.MeshStandardMaterial({ color: 0xffddbb }));
                head.castShadow = true;
                head.position.y = 1.48;
                group.add(head);
                
                const helmet = new THREE.Mesh(new THREE.ConeGeometry(0.68, 0.62, 8), 
                    new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.7 }));
                helmet.position.y = 1.82;
                helmet.castShadow = true;
                group.add(helmet);
                
                const rightHand = new THREE.Group();
                rightHand.position.set(0.78, 1.12, 0.38);
                group.add(rightHand);
                
                scene.add(group);
                return { group, handBone: rightHand };
            }
            
            const loader = new THREE.GLTFLoader();
            let loadAttempts = 0;
            
            function loadProfessionalCharacter() {
                loader.load('https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb', 
                    (gltf) => {
                        character = gltf.scene;
                        character.scale.set(0.52, 0.52, 0.52);
                        character.position.set(0, 0, 0);
                        character.traverse(n => { if(n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
                        scene.add(character);
                        
                        mixer = new THREE.AnimationMixer(character);
                        gltf.animations.forEach(clip => {
                            animations[clip.name.toLowerCase()] = mixer.clipAction(clip);
                        });
                        
                        character.traverse(node => {
                            if(node.isBone && (node.name.toLowerCase().includes('hand') || node.name.toLowerCase().includes('handr'))) {
                                handBone = node;
                            }
                        });
                        
                        if(!handBone) {
                            const dummyHand = new THREE.Group();
                            character.add(dummyHand);
                            dummyHand.position.set(0.65, 1.15, 0.35);
                            handBone = dummyHand;
                        }
                        
                        if(animations['idle']) {
                            currentAction = animations['idle'];
                            currentAction.play();
                        }
                        
                        modelLoaded = true;
                        createHandBomb(handBone);
                        finishLoading();
                    },
                    (xhr) => {
                        const progress = (xhr.loaded / xhr.total) * 100;
                        document.getElementById('loading-bar').style.width = Math.min(progress, 90) + '%';
                    },
                    () => {
                        loadAttempts++;
                        if(loadAttempts < 2) {
                            setTimeout(loadProfessionalCharacter, 800);
                        } else {
                            const fallback = createFallbackCharacter();
                            character = fallback.group;
                            handBone = fallback.handBone;
                            modelLoaded = true;
                            createHandBomb(handBone);
                            finishLoading();
                        }
                    }
                );
            }
            
            // ========== CONTROLS ==========
            let moveInput = { x: 0, z: 0 };
            let jumpRequested = false;
            let throwRequested = false;
            let throwCooldown = 0;
            let throwDistance = 12.5;
            let playerVelocityX = 0;
            let playerVelocityZ = 0;
            let velocityY = 0;
            let isGrounded = true;
            
            // Keyboard
            const keys = { w: false, s: false, a: false, d: false };
            window.addEventListener('keydown', (e) => {
                switch(e.code) {
                    case 'KeyW': keys.w = true; break;
                    case 'KeyS': keys.s = true; break;
                    case 'KeyA': keys.a = true; break;
                    case 'KeyD': keys.d = true; break;
                    case 'Space': e.preventDefault(); jumpRequested = true; break;
                    case 'KeyF': e.preventDefault(); throwRequested = true; break;
                }
            });
            window.addEventListener('keyup', (e) => {
                switch(e.code) {
                    case 'KeyW': keys.w = false; break;
                    case 'KeyS': keys.s = false; break;
                    case 'KeyA': keys.a = false; break;
                    case 'KeyD': keys.d = false; break;
                }
            });
            
            function updateKeyboardInput() {
                let x = 0, z = 0;
                if(keys.w) z = 1;
                if(keys.s) z = -1;
                if(keys.d) x = 1;
                if(keys.a) x = -1;
                if(x !== 0 || z !== 0) {
                    const len = Math.hypot(x, z);
                    moveInput.x = x / len;
                    moveInput.z = z / len;
                } else if(!joystickActive) {
                    moveInput.x = 0;
                    moveInput.z = 0;
                }
            }
            
            // Professional Joystick with proper alignment
            const zoneMove = document.getElementById('zone-move');
            const joystickBase = document.getElementById('joystick-base');
            const joystickThumb = document.getElementById('joystick-thumb');
            let joystickActive = false;
            let activeTouchId = null;
            let joyCenterX = 0, joyCenterY = 0;
            
            function getBaseRadius() {
                const rect = joystickBase.getBoundingClientRect();
                return rect.width / 2;
            }
            
            function updateJoystick(clientX, clientY) {
                let dx = clientX - joyCenterX;
                let dy = clientY - joyCenterY;
                const maxRadius = getBaseRadius() - 10;
                let dist = Math.min(Math.hypot(dx, dy), maxRadius);
                let angle = Math.atan2(dy, dx);
                let limitedX = Math.cos(angle) * dist;
                let limitedY = Math.sin(angle) * dist;
                joystickThumb.style.transform = `translate(calc(-50% + ${limitedX}px), calc(-50% + ${limitedY}px))`;
                // Reversed horizontal movement
                moveInput.x = -limitedX / maxRadius;
                moveInput.z = -limitedY / maxRadius;
            }
            
            function resetJoystick() {
                joystickThumb.style.transform = 'translate(-50%, -50%)';
                if(!keys.w && !keys.s && !keys.a && !keys.d) {
                    moveInput.x = 0;
                    moveInput.z = 0;
                }
                joystickActive = false;
                activeTouchId = null;
            }
            
            zoneMove.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const rect = joystickBase.getBoundingClientRect();
                joyCenterX = rect.left + rect.width / 2;
                joyCenterY = rect.top + rect.height / 2;
                for(let i = 0; i < e.touches.length; i++) {
                    const touch = e.touches[i];
                    const zoneRect = zoneMove.getBoundingClientRect();
                    if(touch.clientX >= zoneRect.left && touch.clientX <= zoneRect.right &&
                       touch.clientY >= zoneRect.top && touch.clientY <= zoneRect.bottom) {
                        joystickActive = true;
                        activeTouchId = touch.identifier;
                        updateJoystick(touch.clientX, touch.clientY);
                        break;
                    }
                }
            });
            
            window.addEventListener('touchmove', (e) => {
                if(!joystickActive || activeTouchId === null) return;
                for(let i = 0; i < e.touches.length; i++) {
                    if(e.touches[i].identifier === activeTouchId) {
                        updateJoystick(e.touches[i].clientX, e.touches[i].clientY);
                        break;
                    }
                }
            });
            
            window.addEventListener('touchend', (e) => {
                if(!joystickActive) return;
                let found = false;
                for(let i = 0; i < e.touches.length; i++) {
                    if(e.touches[i].identifier === activeTouchId) { found = true; break; }
                }
                if(!found) resetJoystick();
            });
            
            // Camera Control
            const cameraArea = document.getElementById('camera-area');
            let cameraDragActive = false;
            let cameraAngle = 0;
            let targetCameraAngle = 0;
            let lastDragX = 0;
            
            cameraArea.addEventListener('touchstart', (e) => {
                e.preventDefault();
                cameraDragActive = true;
                lastDragX = e.touches[0].clientX;
            });
            
            window.addEventListener('touchmove', (e) => {
                if(!cameraDragActive) return;
                let dx = e.touches[0].clientX - lastDragX;
                targetCameraAngle += dx * 0.008;
                lastDragX = e.touches[0].clientX;
            });
            
            window.addEventListener('touchend', () => {
                cameraDragActive = false;
            });
            
            // Slider
            const sliderContainer = document.getElementById('slider-container');
            const sliderHandle = document.getElementById('slider-handle');
            let sliderActive = false;
            let sliderTouchId = null;
            
            function updateSliderFromY(clientY) {
                const rect = sliderContainer.getBoundingClientRect();
                let y = Math.min(rect.bottom, Math.max(rect.top, clientY));
                let t = (rect.bottom - y) / rect.height;
                t = Math.min(1, Math.max(0, t));
                throwDistance = 5 + t * 17;
                document.getElementById('dist-value').innerText = throwDistance.toFixed(1);
                let offset = t * (rect.height - 48);
                sliderHandle.style.marginBottom = `${offset}px`;
                updateLandingMarker();
            }
            
            sliderContainer.addEventListener('touchstart', (e) => {
                e.preventDefault();
                sliderActive = true;
                sliderTouchId = e.touches[0].identifier;
                updateSliderFromY(e.touches[0].clientY);
            });
            
            window.addEventListener('touchmove', (e) => {
                if(!sliderActive) return;
                for(let i = 0; i < e.touches.length; i++) {
                    if(e.touches[i].identifier === sliderTouchId) {
                        updateSliderFromY(e.touches[i].clientY);
                        break;
                    }
                }
            });
            
            window.addEventListener('touchend', (e) => {
                if(sliderActive) {
                    let found = false;
                    for(let i = 0; i < e.touches.length; i++) {
                        if(e.touches[i].identifier === sliderTouchId) { found = true; break; }
                    }
                    if(!found) { sliderActive = false; sliderTouchId = null; }
                }
            });
            
            // Buttons
            const jumpBtn = document.getElementById('btn-jump');
            const throwBtn = document.getElementById('btn-throw');
            
            jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); jumpRequested = true; });
            jumpBtn.addEventListener('touchend', () => { setTimeout(() => jumpRequested = false, 100); });
            jumpBtn.addEventListener('mousedown', () => jumpRequested = true);
            jumpBtn.addEventListener('mouseup', () => setTimeout(() => jumpRequested = false, 100));
            
            throwBtn.addEventListener('touchstart', (e) => { e.preventDefault(); throwRequested = true; });
            throwBtn.addEventListener('touchend', () => { setTimeout(() => throwRequested = false, 100); });
            throwBtn.addEventListener('mousedown', () => throwRequested = true);
            throwBtn.addEventListener('mouseup', () => setTimeout(() => throwRequested = false, 100));
            
            // ========== BOMB SYSTEM ==========
            let bombs = [];
            let explosions = [];
            let targets = [];
            let score = 0;
            
            class Bomb {
                constructor(position, velocity) {
                    const bombGroup = new THREE.Group();
                    
                    const core = new THREE.Mesh(new THREE.SphereGeometry(0.42, 48, 48), 
                        new THREE.MeshStandardMaterial({ color: 0x2a2a2a, metalness: 0.88, roughness: 0.12 }));
                    bombGroup.add(core);
                    
                    const ringTop = new THREE.Mesh(new THREE.TorusGeometry(0.46, 0.06, 16, 48), 
                        new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.85 }));
                    ringTop.position.y = 0.2;
                    bombGroup.add(ringTop);
                    
                    const ringBottom = new THREE.Mesh(new THREE.TorusGeometry(0.46, 0.06, 16, 48), 
                        new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.85 }));
                    ringBottom.position.y = -0.2;
                    bombGroup.add(ringBottom);
                    
                    const fuse = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.16, 0.62, 12), 
                        new THREE.MeshStandardMaterial({ color: 0xdd6644, emissive: 0x552200, emissiveIntensity: 0.7 }));
                    fuse.position.y = 0.55;
                    bombGroup.add(fuse);
                    
                    const fuseTip = new THREE.Mesh(new THREE.SphereGeometry(0.11, 12, 12), 
                        new THREE.MeshStandardMaterial({ color: 0xff7744, emissive: 0xff5500, emissiveIntensity: 1.0 }));
                    fuseTip.position.y = 0.86;
                    bombGroup.add(fuseTip);
                    
                    this.mesh = bombGroup;
                    this.mesh.position.copy(position);
                    this.mesh.castShadow = true;
                    scene.add(this.mesh);
                    this.velocity = velocity;
                    this.age = 0;
                    this.lifeTime = 1.8;
                    this.hasExploded = false;
                }
                
                update(delta) {
                    if(this.hasExploded) return false;
                    this.age += delta;
                    this.velocity.y -= PHYSICS.GRAVITY * delta;
                    this.mesh.position.x += this.velocity.x * delta;
                    this.mesh.position.y += this.velocity.y * delta;
                    this.mesh.position.z += this.velocity.z * delta;
                    this.mesh.rotation.x += 10 * delta;
                    this.mesh.rotation.z += 8 * delta;
                    this.mesh.rotation.y += 5 * delta;
                    
                    if(this.mesh.position.y <= 0.15) {
                        this.explode();
                        return false;
                    }
                    
                    if(this.age >= this.lifeTime) {
                        this.explode();
                        return false;
                    }
                    return true;
                }
                
                explode() {
                    if(this.hasExploded) return;
                    this.hasExploded = true;
                    
                    const flash = new THREE.Mesh(new THREE.SphereGeometry(3.2, 24, 24), 
                        new THREE.MeshBasicMaterial({ color: 0xff8844, transparent: true, opacity: 0.98 }));
                    flash.position.copy(this.mesh.position);
                    scene.add(flash);
                    
                    const shockwave = new THREE.Mesh(new THREE.RingGeometry(1.0, 3.5, 32), 
                        new THREE.MeshBasicMaterial({ color: 0xffaa66, transparent: true, opacity: 0.9, side: THREE.DoubleSide }));
                    shockwave.rotation.x = -Math.PI / 2;
                    shockwave.position.copy(this.mesh.position);
                    shockwave.position.y = 0.1;
                    scene.add(shockwave);
                    
                    const fireRing = new THREE.Mesh(new THREE.RingGeometry(1.2, 2.8, 32), 
                        new THREE.MeshBasicMaterial({ color: 0xff6633, transparent: true, opacity: 0.85, side: THREE.DoubleSide }));
                    fireRing.rotation.x = -Math.PI / 2;
                    fireRing.position.copy(this.mesh.position);
                    fireRing.position.y = 0.05;
                    scene.add(fireRing);
                    
                    setTimeout(() => scene.remove(flash), 180);
                    setTimeout(() => scene.remove(shockwave), 250);
                    setTimeout(() => scene.remove(fireRing), 200);
                    
                    for(let i = 0; i < 70; i++) {
                        const particle = new THREE.Mesh(new THREE.SphereGeometry(0.1 + Math.random() * 0.25, 8, 8), 
                            new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4411, emissiveIntensity: 0.8 }));
                        particle.position.copy(this.mesh.position);
                        particle.userData = {
                            vel: new THREE.Vector3(
                                (Math.random() - 0.5) * 6,
                                Math.random() * 5 + 1,
                                (Math.random() - 0.5) * 6
                            ),
                            life: 0,
                            maxLife: 0.7
                        };
                        scene.add(particle);
                        explosions.push(particle);
                    }
                    
                    for(let i = 0; i < 25; i++) {
                        const smoke = new THREE.Mesh(new THREE.SphereGeometry(0.15 + Math.random() * 0.3, 6, 6), 
                            new THREE.MeshStandardMaterial({ color: 0x664422, transparent: true, opacity: 0.6 }));
                        smoke.position.copy(this.mesh.position);
                        smoke.userData = {
                            vel: new THREE.Vector3(
                                (Math.random() - 0.5) * 3,
                                Math.random() * 3,
                                (Math.random() - 0.5) * 3
                            ),
                            life: 0,
                            maxLife: 0.9
                        };
                        scene.add(smoke);
                        explosions.push(smoke);
                    }
                    
                    for(let i = 0; i < targets.length; i++) {
                        const dist = targets[i].position.distanceTo(this.mesh.position);
                        if(dist < PHYSICS.BLAST_RADIUS) {
                            scene.remove(targets[i]);
                            targets.splice(i, 1);
                            score++;
                            document.getElementById('score').innerText = score;
                            spawnTarget();
                            i--;
                        }
                    }
                    
                    scene.remove(this.mesh);
                }
            }
            
            function spawnTarget() {
                const targetMat = new THREE.MeshStandardMaterial({ color: 0xdd5555, emissive: 0x331100 });
                const target = new THREE.Mesh(new THREE.BoxGeometry(1.7, 1.7, 1.7), targetMat);
                const angle = Math.random() * Math.PI * 2;
                const radius = 35 + Math.random() * 110;
                target.position.set(Math.cos(angle) * radius, 0.85, Math.sin(angle) * radius);
                target.castShadow = true;
                scene.add(target);
                targets.push(target);
            }
            
            for(let i = 0; i < 12; i++) spawnTarget();
            
            let landingMarker = null;
            
            function createLandingMarker() {
                if(landingMarker) scene.remove(landingMarker);
                const ring = new THREE.Mesh(new THREE.RingGeometry(0.9, 1.55, 48), 
                    new THREE.MeshStandardMaterial({ color: 0xffaa55, emissive: 0xff5500, emissiveIntensity: 0.7, side: THREE.DoubleSide, transparent: true }));
                ring.rotation.x = -Math.PI/2;
                ring.position.y = 0.08;
                scene.add(ring);
                return ring;
            }
            
            function calculateTrajectory(distance) {
                const angleRad = PHYSICS.THROW_ANGLE * Math.PI / 180;
                const v0 = Math.sqrt((distance * PHYSICS.GRAVITY) / Math.sin(2 * angleRad));
                return Math.min(PHYSICS.MAX_THROW_SPEED, Math.max(PHYSICS.MIN_THROW_SPEED, v0));
            }
            
            function getLandingPosition() {
                if(!character) return null;
                const startPos = character.position.clone();
                startPos.y += 1.55;
                const forwardAngle = character.rotation.y;
                const dir = new THREE.Vector3(Math.sin(forwardAngle), 0, Math.cos(forwardAngle));
                const angleRad = PHYSICS.THROW_ANGLE * Math.PI / 180;
                const speed = calculateTrajectory(throwDistance);
                const vx = dir.x * Math.cos(angleRad) * speed;
                const vz = dir.z * Math.cos(angleRad) * speed;
                const vy = Math.sin(angleRad) * speed;
                
                let pos = startPos.clone();
                let vel = new THREE.Vector3(vx, vy, vz);
                const dt = 1/60;
                for(let i = 0; i < 180; i++) {
                    pos.add(vel.clone().multiplyScalar(dt));
                    vel.y -= PHYSICS.GRAVITY * dt;
                    if(pos.y <= 0.2) return pos;
                }
                return null;
            }
            
            function updateLandingMarker() {
                if(!landingMarker) landingMarker = createLandingMarker();
                const pos = getLandingPosition();
                if(landingMarker && pos) {
                    landingMarker.position.set(pos.x, 0.12, pos.z);
                    landingMarker.material.emissiveIntensity = 0.6 + Math.sin(Date.now() * 0.012) * 0.35;
                }
            }
            
            function throwBomb() {
                if(throwCooldown > 0 || !character) return;
                throwCooldown = 0.65;
                removeHandBomb();
                
                const startPos = character.position.clone();
                startPos.y += 1.55;
                const forwardAngle = character.rotation.y;
                const dir = new THREE.Vector3(Math.sin(forwardAngle), 0, Math.cos(forwardAngle));
                const angleRad = PHYSICS.THROW_ANGLE * Math.PI / 180;
                const speed = calculateTrajectory(throwDistance);
                const vx = dir.x * Math.cos(angleRad) * speed;
                const vz = dir.z * Math.cos(angleRad) * speed;
                const vy = Math.sin(angleRad) * speed;
                
                const bomb = new Bomb(startPos, new THREE.Vector3(vx, vy, vz));
                bombs.push(bomb);
                
                setTimeout(() => { if(handBone) createHandBomb(handBone); }, 500);
                setTimeout(() => { throwCooldown = 0; }, 650);
            }
            
            // ========== PLAYER PHYSICS WITH SPRINT SPEED ==========
            function updatePlayerPhysics(delta) {
                if(!character) return;
                
                const speed = PHYSICS.MOVEMENT_SPEED; // 22.0 for fast sprint
                let targetVelX = moveInput.x * speed;
                let targetVelZ = moveInput.z * speed;
                
                const control = isGrounded ? 1.0 : PHYSICS.AIR_CONTROL;
                playerVelocityX += (targetVelX - playerVelocityX) * 12 * delta * control;
                playerVelocityZ += (targetVelZ - playerVelocityZ) * 12 * delta * control;
                
                if(isGrounded && (moveInput.x === 0 && moveInput.z === 0)) {
                    playerVelocityX *= (1 - PHYSICS.GROUND_DRAG * delta);
                    playerVelocityZ *= (1 - PHYSICS.GROUND_DRAG * delta);
                }
                
                character.position.x += playerVelocityX * delta;
                character.position.z += playerVelocityZ * delta;
                
                const bound = 135;
                character.position.x = Math.min(bound, Math.max(-bound, character.position.x));
                character.position.z = Math.min(bound, Math.max(-bound, character.position.z));
                
                if(Math.abs(playerVelocityX) > 0.1 || Math.abs(playerVelocityZ) > 0.1) {
                    const moveAngle = Math.atan2(playerVelocityX, playerVelocityZ);
                    character.rotation.y = moveAngle;
                    
                    if(modelLoaded && mixer && animations['walking'] && currentAction !== animations['walking']) {
                        if(currentAction) currentAction.fadeOut(0.12);
                        currentAction = animations['walking'];
                        currentAction.reset().fadeIn(0.12).play();
                    }
                } else {
                    if(modelLoaded && mixer && animations['idle'] && currentAction !== animations['idle']) {
                        if(currentAction) currentAction.fadeOut(0.15);
                        currentAction = animations['idle'];
                        currentAction.reset().play();
                    }
                }
                
                if(jumpRequested && isGrounded) {
                    velocityY = PHYSICS.JUMP_FORCE;
                    isGrounded = false;
                    jumpRequested = false;
                    
                    if(modelLoaded && mixer && animations['jump']) {
                        animations['jump'].reset().play();
                        setTimeout(() => { if(animations['jump']) animations['jump'].fadeOut(0.3); }, 400);
                    }
                }
                
                if(!isGrounded) {
                    character.position.y += velocityY * delta;
                    velocityY -= PHYSICS.GRAVITY * delta;
                    if(character.position.y <= 0) {
                        character.position.y = 0;
                        isGrounded = true;
                        velocityY = 0;
                    }
                } else {
                    character.position.y = 0;
                }
            }
            
            // ========== CAMERA ==========
            function updateCamera() {
                if(!character) return;
                
                cameraAngle += (targetCameraAngle - cameraAngle) * 0.1;
                const totalAngle = character.rotation.y + cameraAngle;
                const distance = 9.5;
                const height = 4.0;
                
                const camX = character.position.x - Math.sin(totalAngle) * distance;
                const camZ = character.position.z - Math.cos(totalAngle) * distance;
                const camY = character.position.y + height;
                
                camera.position.set(camX, camY, camZ);
                camera.lookAt(character.position.clone().add(new THREE.Vector3(0, 1.3, 0)));
            }
            
            // ========== UPDATE SYSTEMS ==========
            function updateExplosions(delta) {
                for(let i = explosions.length-1; i >= 0; i--) {
                    const p = explosions[i];
                    if(p.userData) {
                        p.userData.life += delta;
                        p.position.x += p.userData.vel.x * delta;
                        p.position.y += p.userData.vel.y * delta;
                        p.position.z += p.userData.vel.z * delta;
                        p.userData.vel.y -= PHYSICS.GRAVITY * delta * 0.55;
                        const alpha = 1 - (p.userData.life / p.userData.maxLife);
                        if(p.material) p.material.opacity = alpha;
                        if(p.userData.life >= p.userData.maxLife || p.position.y < -0.5) {
                            scene.remove(p);
                            explosions.splice(i,1);
                        }
                    }
                }
            }
            
            function updateBombs(delta) {
                for(let i = bombs.length-1; i >= 0; i--) {
                    const alive = bombs[i].update(delta);
                    if(!alive) bombs.splice(i,1);
                }
            }
            
            // ========== ANIMATION LOOP ==========
            let lastTime = performance.now();
            let clock = new THREE.Clock();
            
            function animate() {
                const now = performance.now();
                let delta = Math.min(0.033, (now - lastTime) / 1000);
                lastTime = now;
                
                updateKeyboardInput();
                updatePlayerPhysics(delta);
                updateBombs(delta);
                updateExplosions(delta);
                updateLandingMarker();
                updateCamera();
                
                if(throwRequested && throwCooldown === 0) {
                    throwBomb();
                    throwRequested = false;
                }
                
                if(mixer) mixer.update(clock.getDelta());
                
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            
            function finishLoading() {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('ui-overlay').style.display = 'block';
                }, 400);
            }
            
            let loadProgress = 0;
            const loadInterval = setInterval(() => {
                loadProgress += 12;
                document.getElementById('loading-bar').style.width = Math.min(loadProgress, 100) + '%';
                if(loadProgress >= 100) clearInterval(loadInterval);
            }, 70);
            
            loadProfessionalCharacter();
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            setInterval(() => {
                if(modelLoaded && handBone && !bombInHand && throwCooldown === 0) {
                    createHandBomb(handBone);
                }
            }, 800);
        })();
    </script>
</body>
</html>
