<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>المحارب الاحترافي - التصميم الانسيابي</title>
    <style>
        body { margin: 0; overflow: hidden; background: #ffffff; }
        #overlay {
            position: absolute; top: 30px; left: 30px;
            font-family: 'Segoe UI', sans-serif; color: #1a1a1a;
            border-left: 5px solid #3498db; padding-left: 15px;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="margin:0; font-size: 22px;">ELITE UNIT v4.0</h1>
        <p style="margin:5px 0; font-size: 14px; color: #555;">ترابط هيكلي كامل | تنعيم الحواف الهندسية</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 9);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- إضاءة احترافية (3-Point Lighting) ---
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);

        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambient);

        const blueRim = new THREE.PointLight(0x3498db, 0.5);
        blueRim.position.set(-5, 5, -5);
        scene.add(blueRim);

        // --- المواد (Materials) ---
        const matArmor = new THREE.MeshStandardMaterial({ 
            color: 0x2c3e50, 
            metalness: 0.6, 
            roughness: 0.3,
            flatShading: false // لضمان النعومة القصوى
        });
        const matJoint = new THREE.MeshStandardMaterial({ color: 0x34495e, metalness: 0.8, roughness: 0.1 });
        const matGlow = new THREE.MeshBasicMaterial({ color: 0x3498db });

        const character = new THREE.Group();
        scene.add(character);

        // 1. الجذع المنحوت (Lathe Geometry لضمان الانسيابية)
        const points = [];
        for ( let i = 0; i < 12; i ++ ) {
            // رسم منحنى الصدر والخصر رياضياً
            points.push( new THREE.Vector2( Math.sin( i * 0.3 ) * 0.4 + 0.3, ( i - 5 ) * 0.3 ) );
        }
        const torsoGeo = new THREE.LatheGeometry( points, 32 );
        const torso = new THREE.Mesh( torsoGeo, matArmor );
        torso.position.y = 2.0;
        character.add(torso);

        // 2. الرأس المدمج (Seamless Head)
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.38, 32, 32), matArmor);
        head.scale.y = 1.1; // جعله بيضاوياً قليلاً
        head.position.y = 3.3;
        character.add(head);

        const visor = new THREE.Mesh(new THREE.TorusGeometry(0.25, 0.03, 16, 32, Math.PI), matGlow);
        visor.position.set(0, 3.4, 0.25);
        character.add(visor);

        // 3. الأطراف بنظام "المفاصل الكروية" المخفية
        function createSmoothMember(side, type) {
            const group = new THREE.Group();

            // مفصل الكتف/الفخذ الكروي (لتنعيم الالتقاء)
            const rootJoint = new THREE.Mesh(new THREE.SphereGeometry(0.32, 32, 32), matArmor);
            group.add(rootJoint);

            // الجزء العلوي (Capsule)
            const upper = new THREE.Mesh(new THREE.CapsuleGeometry(0.22, 0.8, 20, 20), matArmor);
            upper.position.y = -0.5;
            group.add(upper);

            // مفصل المرفق/الركبة
            const midJoint = new THREE.Mesh(new THREE.SphereGeometry(0.18, 20, 20), matJoint);
            midJoint.position.y = -1.0;
            group.add(midJoint);

            // الجزء السفلي
            const lower = new THREE.Mesh(new THREE.CapsuleGeometry(0.2, 0.8, 20, 20), matArmor);
            lower.position.y = -1.5;
            group.add(lower);

            if (type === 'arm') {
                group.position.set(side * 0.9, 2.7, 0);
                group.rotation.z = side * 0.1;
            } else {
                group.position.set(side * 0.45, 1.4, 0);
                // قدم انسيابية
                const foot = new THREE.Mesh(new THREE.CapsuleGeometry(0.18, 0.35, 10, 20), matArmor);
                foot.rotation.x = Math.PI / 2;
                foot.position.set(0, -2.1, 0.15);
                group.add(foot);
            }

            return group;
        }

        character.add(createSmoothMember(1, 'arm'));
        character.add(createSmoothMember(-1, 'arm'));
        character.add(createSmoothMember(1, 'leg'));
        character.add(createSmoothMember(-1, 'leg'));

        // 4. حلقة التحريك (دوران ناعم)
        function animate() {
            requestAnimationFrame(animate);
            character.rotation.y += 0.006;
            
            // حركة تنفس (Scaling بسيط جداً للجذع)
            const breath = 1 + Math.sin(Date.now() * 0.002) * 0.02;
            torso.scale.set(breath, 1, breath);
            
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
