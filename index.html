<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>المحارب المدرع - وضوح فائق</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #status { position: absolute; top: 20px; width: 100%; text-align: center; color: #fff; pointer-events: none; }
    </style>
</head>
<body>
    <div id="status">جاري تشغيل الوحدة القتالية...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. إعداد المشهد والكاميرا
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        document.getElementById('status').innerText = "تم الاتصال: المحارب نشط";

        // 2. إضاءة قوية جداً (ثلاثية الاتجاهات)
        const light1 = new THREE.DirectionalLight(0xffffff, 1.5);
        light1.position.set(5, 5, 5);
        scene.add(light1);

        const light2 = new THREE.DirectionalLight(0xff0000, 1); // ضوء أحمر جانبي للتباين
        light2.position.set(-5, 2, 2);
        scene.add(light2);

        scene.add(new THREE.AmbientLight(0xffffff, 0.3));

        // 3. بناء الشخصية (تصميم مدمج ومترابط)
        const robot = new THREE.Group();
        scene.add(robot);

        // خامات بألوان متعاكسة جداً
        const matWhite = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.5, roughness: 0.2 }); // درع أبيض
        const matDark = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9 }); // مفاصل سوداء
        const matRed = new THREE.MeshBasicMaterial({ color: 0xff0000 }); // عيون حمراء

        // --- الجذع (كتلة واحدة ضخمة) ---
        const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.8, 1, 4, 16), matWhite);
        torso.position.y = 2;
        robot.add(torso);

        // --- الرأس (مدمج في الجسد) ---
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), matWhite);
        head.position.y = 3;
        robot.add(head);

        const eye = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.1, 0.2), matRed);
        eye.position.set(0, 3.1, 0.35);
        robot.add(eye);

        // --- الأذرع (متداخلة تماماً مع الأكتاف) ---
        function addArm(side) {
            const armGroup = new THREE.Group();
            
            // كتف كروي أسود مدمج في الجذع
            const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), matDark);
            armGroup.add(shoulder);

            // ذراع أبيض سميك
            const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 1.2), matWhite);
            forearm.position.y = -0.6;
            armGroup.add(forearm);

            armGroup.position.set(side * 0.85, 2.4, 0);
            armGroup.rotation.z = side * 0.2;
            robot.add(armGroup);
        }
        addArm(1);
        addArm(-1);

        // --- الأرجل (قواعد عريضة متماسكة) ---
        function addLeg(side) {
            const leg = new THREE.Group();
            
            const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.25, 1.5), matWhite);
            thigh.position.y = -0.7;
            leg.add(thigh);

            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 0.9), matDark);
            foot.position.set(0, -1.5, 0.2);
            leg.add(foot);

            leg.position.set(side * 0.45, 1.3, 0);
            robot.add(leg);
        }
        addLeg(1);
        addLeg(-1);

        // 4. حلقة التحريك
        function animate() {
            requestAnimationFrame(animate);
            
            // دوران مستمر للتأكد من رؤية الأبعاد
            robot.rotation.y += 0.01;
            
            // حركة "نبض" خفيفة للعيون
            const scale = 1 + Math.sin(Date.now() * 0.005) * 0.1;
            eye.scale.set(scale, 1, 1);

            renderer.render(scene, camera);
        }
        animate();

        // استجابة الشاشة
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
