<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول - منصة الألعاب</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #05070c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at center, rgba(212,175,55,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .login-container {
            position: relative;
            z-index: 10;
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 50px 40px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #d4af37;
            font-size: 42px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .logo p {
            color: #8a9aa8;
            margin-top: 10px;
            font-size: 14px;
        }

        .google-btn {
            width: 100%;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            margin: 20px 0;
            color: #1a1a2e;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            background: white;
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-btn img {
            width: 24px;
            height: 24px;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 20px 40px;
            border-radius: 60px;
            color: #d4af37;
            display: none;
            z-index: 1000;
            font-size: 18px;
            backdrop-filter: blur(10px);
            border: 1px solid #d4af37;
        }

        .error-message {
            color: #ff6b6b;
            background: rgba(255, 0, 0, 0.1);
            padding: 12px;
            border-radius: 12px;
            margin: 15px 0;
            font-size: 14px;
            display: none;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        .user-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            display: none;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 10px;
            border: 2px solid #d4af37;
        }

        .user-name {
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .user-email {
            color: #8a9aa8;
            font-size: 14px;
            margin: 5px 0;
        }

        .logout-btn {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(212, 175, 55, 0.4);
        }

        .footer {
            margin-top: 30px;
            color: #4a5568;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 25px;
                width: 95%;
            }
            .logo h1 {
                font-size: 32px;
            }
            .google-btn {
                padding: 14px 20px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="login-container" id="loginContainer">
        <div class="logo">
            <h1>🎮 منصة الألعاب</h1>
            <p>سجل دخولك بواسطة Google للمتابعة</p>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <button class="google-btn" id="googleLoginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            تسجيل الدخول بحساب Google
        </button>
        
        <div class="user-info" id="userInfo">
            <img class="user-avatar" id="userAvatar" alt="Avatar">
            <div class="user-name" id="userName"></div>
            <div class="user-email" id="userEmail"></div>
            <button class="logout-btn" id="logoutBtn">تسجيل الخروج</button>
        </div>
        
        <div class="footer">
            <p>🔒 جميع البيانات مشفرة وتُمر عبر السيرفر الآمن</p>
        </div>
    </div>
    
    <div class="loading" id="loading">
        ⏳ جاري التحقق من الحساب...
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js"
            }
        }
    </script>
    
    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from 'firebase/auth';
        
        // إعدادات Firebase (نفس الكود المرفق)
        const firebaseConfig = {
            apiKey: "AlzaSyCvPo4HIsNhyf1WBmTzlr6CdR1c2lQ5sHU",
            authDomain: "boomb-fa3e7.firebaseapp.com",
            databaseURL: "https://boomb-fa3e7-default-rtdb.firebaseio.com",
            projectId: "boomb-fa3e7",
            storageBucket: "boomb-fa3e7.firebasestorage.app",
            messagingSenderId: "499624996530",
            appId: "1:499624996530:web:235f71e450845c748523ab"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        // رابط السيرفر (نفس الرابط الموجود)
        const SERVER_URL = "https://tank-yf0p.onrender.com";
        
        // العناصر
        const googleBtn = document.getElementById('googleLoginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginContainer = document.getElementById('loginContainer');
        const userInfoDiv = document.getElementById('userInfo');
        const loadingDiv = document.getElementById('loading');
        const errorMessageDiv = document.getElementById('errorMessage');
        const userNameSpan = document.getElementById('userName');
        const userEmailSpan = document.getElementById('userEmail');
        const userAvatarImg = document.getElementById('userAvatar');
        
        function showError(msg) {
            errorMessageDiv.textContent = msg;
            errorMessageDiv.style.display = 'block';
            setTimeout(() => errorMessageDiv.style.display = 'none', 5000);
        }
        
        function showLoading(show) {
            loadingDiv.style.display = show ? 'flex' : 'none';
        }
        
        async function authenticateWithServer(idToken, userData) {
            try {
                const res = await fetch(`${SERVER_URL}/api/auth/google`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken, userData })
                });
                const result = await res.json();
                
                if (result.success) {
                    localStorage.setItem('user', JSON.stringify({
                        uid: userData.uid,
                        email: userData.email,
                        name: userData.displayName,
                        photoURL: userData.photoURL,
                        token: result.token,
                        balance: result.balance
                    }));
                    showUserInfo(userData, result.balance);
                    return true;
                } else {
                    showError(result.error || 'فشل المصادقة');
                    return false;
                }
            } catch (error) {
                showError('لا يمكن الاتصال بالسيرفر');
                return false;
            }
        }
        
        function showUserInfo(userData) {
            document.querySelector('.logo h1').style.fontSize = '28px';
            document.querySelector('.logo p').style.display = 'none';
            googleBtn.style.display = 'none';
            userInfoDiv.style.display = 'block';
            userNameSpan.textContent = userData.displayName || userData.email.split('@')[0];
            userEmailSpan.textContent = userData.email;
            userAvatarImg.src = userData.photoURL || `https://ui-avatars.com/api/?background=d4af37&color=fff&name=${encodeURIComponent(userData.displayName || 'User')}`;
        }
        
        async function loginWithGoogle() {
            showLoading(true);
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const idToken = await user.getIdToken();
                await authenticateWithServer(idToken, {
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName,
                    photoURL: user.photoURL
                });
            } catch (error) {
                if (error.code === 'auth/popup-blocked') showError('الرجاء السماح بالنوافذ المنبثقة');
                else if (error.code === 'auth/popup-closed-by-user') showError('تم إغلاق النافذة');
                else showError('فشل تسجيل الدخول');
            } finally {
                showLoading(false);
            }
        }
        
        async function logout() {
            showLoading(true);
            try {
                await signOut(auth);
                const saved = localStorage.getItem('user');
                if (saved) {
                    const { token } = JSON.parse(saved);
                    await fetch(`${SERVER_URL}/api/auth/logout`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token })
                    });
                }
                localStorage.removeItem('user');
                document.querySelector('.logo h1').style.fontSize = '42px';
                document.querySelector('.logo p').style.display = 'block';
                googleBtn.style.display = 'flex';
                userInfoDiv.style.display = 'none';
            } catch (error) {
                showError('خطأ في تسجيل الخروج');
            } finally {
                showLoading(false);
            }
        }
        
        async function checkAuthState() {
            const saved = localStorage.getItem('user');
            if (saved) {
                try {
                    const userData = JSON.parse(saved);
                    const res = await fetch(`${SERVER_URL}/api/auth/verify`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: userData.token })
                    });
                    const result = await res.json();
                    if (result.valid) {
                        showUserInfo({
                            displayName: userData.name,
                            email: userData.email,
                            photoURL: userData.photoURL
                        });
                    } else {
                        localStorage.removeItem('user');
                    }
                } catch (error) {
                    localStorage.removeItem('user');
                }
            }
        }
        
        googleBtn.addEventListener('click', loginWithGoogle);
        logoutBtn.addEventListener('click', logout);
        checkAuthState();
    </script>
</body>
</html>
