<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dwarf Bomber - Pro Edition</title>
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: sans-serif; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; border: 2px solid #ffaa00; border-radius: 50%; }
        #info-panel { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #fff; padding: 10px; border-radius: 5px; font-size: 12px; }
        #score-panel { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #ffaa00; padding: 10px; border-radius: 5px; font-weight: bold; }
        #joystick-container { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: #ffaa00; border-radius: 50%; transform: translate(-50%,-50%); }
        #action-buttons { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 20px; pointer-events: auto; }
        .action-btn { width: 70px; height: 70px; border-radius: 50%; background: rgba(0,0,0,0.7); color: white; border: 2px solid #ffaa00; font-size: 24px; cursor: pointer; }
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>
    <div id="loading-screen">LOADING PRO DWARF...</div>
    <div id="ui-container">
        <div id="crosshair"></div>
        <div id="info-panel">DWARF BOMBER PRO<br>Ready-made Model • Double Jump • Physics</div>
        <div id="score-panel">SCORE: <span id="score">0</span></div>
        <div id="joystick-container"><div id="joystick-knob"></div></div>
        <div id="action-buttons">
            <button class="action-btn" id="btn-jump">⬆️</button>
            <button class="action-btn" id="btn-throw">💣</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Ground
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(500, 500),
            new THREE.MeshStandardMaterial({ color: 0x336633 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Character Loading
        let character, mixer, animations = {};
        let currentAction;
        const loader = new THREE.GLTFLoader();
        const modelUrl = 'https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb';

        loader.load(modelUrl, (gltf) => {
            character = gltf.scene;
            character.scale.set(0.5, 0.5, 0.5); // Dwarf scale
            character.traverse(n => { if (n.isMesh) n.castShadow = true; });
            scene.add(character);

            mixer = new THREE.AnimationMixer(character);
            gltf.animations.forEach(clip => {
                animations[clip.name.toLowerCase()] = mixer.clipAction(clip);
            });
            if (animations['idle']) {
                currentAction = animations['idle'];
                currentAction.play();
            }
            document.getElementById('loading-screen').style.display = 'none';
        });

        // Input
        const input = { forward: 0, side: 0, jump: false, throw: false };
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Joystick
        const knob = document.getElementById('joystick-knob');
        let joyActive = false, joyStart = { x: 0, y: 0 };
        document.getElementById('joystick-container').addEventListener('touchstart', e => {
            joyActive = true;
            joyStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        });
        window.addEventListener('touchmove', e => {
            if (!joyActive) return;
            let dx = e.touches[0].clientX - joyStart.x;
            let dy = e.touches[0].clientY - joyStart.y;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const angle = Math.atan2(dy, dx);
            dx = Math.cos(angle) * dist;
            dy = Math.sin(angle) * dist;
            knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            input.side = -dx / 50;
            input.forward = -dy / 50;
        });
        window.addEventListener('touchend', () => {
            joyActive = false;
            knob.style.transform = 'translate(-50%, -50%)';
            input.forward = 0; input.side = 0;
        });

        document.getElementById('btn-jump').onclick = () => input.jump = true;
        document.getElementById('btn-throw').onclick = () => input.throw = true;

        // Physics & Game Logic
        const bombs = [], particles = [], targets = [];
        let score = 0;
        let jumpCount = 0, isJumping = false, velY = 0, isFlipping = false, flipRot = 0;

        function spawnTarget() {
            const t = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
            t.position.set((Math.random()-0.5)*100, 1, (Math.random()-0.5)*100);
            scene.add(t);
            targets.push(t);
        }
        for(let i=0; i<10; i++) spawnTarget();

        function throwBomb() {
            const bomb = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            bomb.position.copy(character.position).add(new THREE.Vector3(0, 1.5, 0));
            scene.add(bomb);
            const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(character.quaternion);
            bombs.push({ mesh: bomb, vel: dir.multiplyScalar(1.2).add(new THREE.Vector3(0, 0.5, 0)), life: 200 });
            if (animations['punch']) {
                animations['punch'].reset().play();
                setTimeout(() => animations['idle'].play(), 500);
            }
        }

        function explode(pos) {
            for(let i=0; i<30; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshStandardMaterial({ color: 0xffaa00 }));
                p.position.copy(pos);
                scene.add(p);
                particles.push({ mesh: p, vel: new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(1), life: 50 });
            }
        }

        // Animation Loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (!character) return;

            // Movement
            if (keys['KeyW']) input.forward = 1; else if (keys['KeyS']) input.forward = -1;
            if (keys['KeyA']) input.side = 1; else if (keys['KeyD']) input.side = -1;
            if (keys['Space']) { input.jump = true; keys['Space'] = false; }
            if (keys['KeyF']) { input.throw = true; keys['KeyF'] = false; }

            const move = new THREE.Vector3(input.side, 0, input.forward);
            if (move.length() > 0.1) {
                const angle = Math.atan2(input.side, input.forward);
                character.rotation.y = angle;
                character.position.x += Math.sin(angle) * 0.3;
                character.position.z += Math.cos(angle) * 0.3;
                if (animations['walking']) {
                    if (currentAction !== animations['walking']) {
                        if (currentAction) currentAction.fadeOut(0.2);
                        currentAction = animations['walking'];
                        currentAction.reset().fadeIn(0.2).play();
                    }
                }
            } else {
                if (animations['idle']) {
                    if (currentAction !== animations['idle']) {
                        if (currentAction) currentAction.fadeOut(0.2);
                        currentAction = animations['idle'];
                        currentAction.reset().fadeIn(0.2).play();
                    }
                }
            }

            // Jump
            if (input.jump && jumpCount < 2) {
                velY = 0.5;
                isJumping = true;
                jumpCount++;
                input.jump = false;
                if (jumpCount === 2) isFlipping = true;
            }
            if (isJumping) {
                character.position.y += velY;
                velY -= 0.02;
                if (isFlipping) {
                    flipRot += 0.3;
                    character.rotation.x = flipRot;
                    if (flipRot >= Math.PI * 2) { isFlipping = false; flipRot = 0; character.rotation.x = 0; }
                }
                if (character.position.y <= 0) { character.position.y = 0; isJumping = false; jumpCount = 0; }
            }

            // Throw
            if (input.throw) { throwBomb(); input.throw = false; }

            // Camera
            const camPos = character.position.clone().add(new THREE.Vector3(0, 6, -10).applyQuaternion(character.quaternion));
            camera.position.lerp(camPos, 0.1);
            camera.lookAt(character.position.clone().add(new THREE.Vector3(0, 2, 5)));

            // Bombs
            for(let i=bombs.length-1; i>=0; i--) {
                const b = bombs[i];
                b.mesh.position.add(b.vel);
                b.vel.y -= 0.02;
                targets.forEach((t, idx) => {
                    if (b.mesh.position.distanceTo(t.position) < 2) {
                        explode(t.position);
                        scene.remove(t); targets.splice(idx, 1);
                        score++; document.getElementById('score').innerText = score;
                        spawnTarget(); b.life = 0;
                    }
                });
                if (b.mesh.position.y < 0) { explode(b.mesh.position); b.life = 0; }
                b.life--;
                if (b.life <= 0) { scene.remove(b.mesh); bombs.splice(i, 1); }
            }

            // Particles
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.vel);
                p.life--;
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }

            if (mixer) mixer.update(delta);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
