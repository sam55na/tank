<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحارب الحديدي - Mecha Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #overlay {
            position: absolute; top: 20px; left: 20px;
            color: #00d4ff; text-shadow: 0 0 10px #00d4ff;
            pointer-events: none;
        }
        .label { font-size: 18px; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="label">UNIT-01: THE GUARDIAN</div>
        <div style="font-size: 12px; color: #888;">نظام المحاكاة النشط | 2026</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05050a);
        scene.fog = new THREE.Fog(0x05050a, 5, 15);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 4, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1.5, 0);

        // --- الإضاءة ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        scene.add(hemiLight);

        const light1 = new THREE.DirectionalLight(0x00d4ff, 1);
        light1.position.set(5, 5, 5);
        light1.castShadow = true;
        scene.add(light1);

        const light2 = new THREE.PointLight(0xff0055, 0.5);
        light2.position.set(-5, 2, -2);
        scene.add(light2);

        // --- المواد ---
        const matArmor = new THREE.MeshStandardMaterial({ color: 0x2c3e50, metalness: 0.8, roughness: 0.2 });
        const matGold = new THREE.MeshStandardMaterial({ color: 0xf1c40f, metalness: 0.9, roughness: 0.1 });
        const matInner = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        const matGlow = new THREE.MeshBasicMaterial({ color: 0x00ffff });

        const robot = new THREE.Group();
        scene.add(robot);

        // --- الجسد (Torso) ---
        const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.6, 1, 4, 16), matArmor);
        torso.position.y = 2;
        torso.castShadow = true;
        robot.add(torso);

        // حزام ذهبي
        const belt = new THREE.Mesh(new THREE.TorusGeometry(0.55, 0.05, 16, 32), matGold);
        belt.position.y = 1.6;
        belt.rotation.x = Math.PI/2;
        robot.add(belt);

        // --- الرأس ---
        const headGroup = new THREE.Group();
        headGroup.position.y = 2.9;
        robot.add(headGroup);

        const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 0.6), matArmor);
        headGroup.add(head);

        const eye = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.1), matGlow);
        eye.position.set(0, 0.1, 0.3);
        headGroup.add(eye);

        const hornR = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.5, 8), matGold);
        hornR.position.set(0.2, 0.4, 0);
        hornR.rotation.z = -0.3;
        headGroup.add(hornR);

        const hornL = hornR.clone();
        hornL.position.x = -0.2;
        hornL.rotation.z = 0.3;
        headGroup.add(hornL);

        // --- الأذرع ---
        function createArm(side) {
            const arm = new THREE.Group();
            const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), matArmor);
            arm.add(shoulder);

            const bicep = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.8), matInner);
            bicep.position.y = -0.5;
            arm.add(bicep);

            const elbow = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), matGold);
            elbow.position.y = -0.9;
            arm.add(elbow);

            const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.25, 0.8), matArmor);
            forearm.position.y = -1.3;
            arm.add(forearm);

            const hand = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), matGold);
            hand.position.y = -1.8;
            arm.add(hand);

            arm.position.set(side * 0.9, 2.5, 0);
            arm.rotation.z = side * 0.2; // زاوية هجومية
            arm.rotation.x = -0.3;
            return arm;
        }

        robot.add(createArm(1)); // Right
        robot.add(createArm(-1)); // Left

        // --- الأرجل ---
        function createLeg(side) {
            const leg = new THREE.Group();
            const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 1), matArmor);
            thigh.position.y = -0.5;
            leg.add(thigh);

            const knee = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), matGold);
            knee.position.y = -1;
            leg.add(knee);

            const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 1), matArmor);
            shin.position.y = -1.5;
            leg.add(shin);

            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.8), matInner);
            foot.position.set(0, -2, 0.1);
            leg.add(foot);

            leg.position.set(side * 0.45, 1.5, 0);
            return leg;
        }

        robot.add(createLeg(1));
        robot.add(createLeg(-1));

        // --- الأرضية ---
        const grid = new THREE.GridHelper(20, 40, 0x00d4ff, 0x222222);
        scene.add(grid);

        const floorGeo = new THREE.PlaneGeometry(20, 20);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.1, metalness: 0.5 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.5;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- التحريك ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.002;
            
            // حركة تنفس خفيفة
            robot.position.y = Math.sin(time) * 0.05;
            headGroup.rotation.y = Math.sin(time * 0.5) * 0.1;
            
            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
