<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>القزم الغامض: المظهر المدمج النهائي</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>

<script>
    // --- الإعدادات الأساسية ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020202); // خلفية داكنة جداً

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.2, 3.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- الإضاءة (سر الاندماج البصري) ---
    // ضوء أمامي خافت لإبراز الكتلة
    const ambient = new THREE.AmbientLight(0x202020, 0.6); 
    scene.add(ambient);

    // ضوء علوي خلفي (Rim Light) لخلق هالة غامضة وإخفاء التفاصيل
    const rimLight = new THREE.SpotLight(0xffffff, 1.2);
    rimLight.position.set(0, 4, -2);
    rimLight.angle = Math.PI / 4;
    scene.add(rimLight);

    // ضوء القنبلة الأحمر
    const bombGlow = new THREE.PointLight(0xff0000, 12, 2.5);
    bombGlow.position.set(0.9, 0.4, 0.6);
    scene.add(bombGlow);

    // --- الخامات والمجموعة ---
    const dwarf = new THREE.Group();
    const darkMat = new THREE.MeshStandardMaterial({ 
        color: 0x111111, 
        roughness: 0.85, 
        metalness: 0.1 
    });
    const hatMat = new THREE.MeshStandardMaterial({ color: 0x330000, roughness: 0.9 });

    // --- بناء الشخصية ---

    // 1. الجسم الرئيسي (كتلة مركزية)
    const bodyGeo = new THREE.SphereGeometry(0.6, 32, 32);
    const body = new THREE.Mesh(bodyGeo, darkMat);
    body.scale.y = 1.1; // تمديد قليل لجسم أطول
    dwarf.add(body);

    // 2. الرقبة/الرأس (مندمج مع الجسم)
    // وضعناه في نفس موقع أعلى الجسم ليتداخلا
    const headGeo = new THREE.CylinderGeometry(0.2, 0.35, 0.3, 16);
    const head = new THREE.Mesh(headGeo, darkMat);
    head.position.y = 0.55; // منخفض ليتداخل مع كرة الجسم
    dwarf.add(head);

    // 3. القبعة المخروطية المائلة
    const hatGeo = new THREE.ConeGeometry(0.48, 1.3, 32);
    const hat = new THREE.Mesh(hatGeo, hatMat);
    hat.position.y = 1.3; // فوق الرأس المندمج
    hat.rotation.z = 0.28; 
    dwarf.add(hat);

    // --- الأطراف العلوية (متصلة ومندمجة) ---

    // الذراع اليسرى
    const armGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.55, 16);
    const leftArm = new THREE.Mesh(armGeo, darkMat);
    leftArm.position.set(-0.65, 0.1, 0.2);
    leftArm.rotation.z = Math.PI / 2.5;
    dwarf.add(leftArm);

    // الكف الأيسر (بيضوي ومندمج مع نهاية الذراع)
    const palmGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const leftPalm = new THREE.Mesh(palmGeo, darkMat);
    leftPalm.scale.set(1, 1.4, 0.8); // شكل الكف
    leftPalm.position.set(-0.88, -0.05, 0.25); // متداخل مع نهاية الذراع
    leftPalm.rotation.z = Math.PI / 2; // زاوية اليد
    dwarf.add(leftPalm);

    // الذراع اليمنى (التي تحمل القنبلة)
    const rightArm = new THREE.Mesh(armGeo, darkMat);
    rightArm.position.set(0.62, 0.1, 0.2);
    rightArm.rotation.z = -Math.PI / 3;
    dwarf.add(rightArm);

    // الكف الأيمن
    const rightPalm = new THREE.Mesh(palmGeo, darkMat);
    rightPalm.scale.set(1, 1.4, 0.8);
    rightPalm.position.set(0.85, -0.05, 0.25); 
    rightPalm.rotation.z = -Math.PI / 2;
    dwarf.add(rightPalm);

    // --- الأطراف السفلية ---

    // الساق اليسرى
    const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.45, 16);
    const leftLeg = new THREE.Mesh(legGeo, darkMat);
    leftLeg.position.set(-0.35, -0.62, 0.1);
    dwarf.add(leftLeg);

    // القدم اليسرى (المكعب)
    const footGeo = new THREE.BoxGeometry(0.35, 0.15, 0.5);
    const leftFoot = new THREE.Mesh(footGeo, darkMat);
    leftFoot.position.set(-0.35, -0.85, 0.1);
    dwarf.add(leftFoot);

    // الساق اليمنى
    const rightLeg = new THREE.Mesh(legGeo, darkMat);
    rightLeg.position.set(0.35, -0.62, 0.1);
    dwarf.add(rightLeg);

    // القدم اليمنى
    const rightFoot = new THREE.Mesh(footGeo, darkMat);
    rightFoot.position.set(0.35, -0.85, 0.1);
    dwarf.add(rightFoot);

    // --- القنبلة المحسنة ---
    const bombGroup = new THREE.Group();
    const bombBody = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 32, 32), 
        new THREE.MeshStandardMaterial({color: 0x050505, roughness: 0.1})
    );
    
    // الفتيل المنحني
    const curve = new THREE.QuadraticBezierCurve3(
        new THREE.Vector3(0, 0.25, 0),
        new THREE.Vector3(0.08, 0.48, 0),
        new THREE.Vector3(0.28, 0.48, 0)
    );
    const fuseGeo = new THREE.TubeGeometry(curve, 10, 0.02, 8, false);
    const fuse = new THREE.Mesh(fuseGeo, new THREE.MeshBasicMaterial({ color: 0xeeeeee }));
    
    bombGroup.add(bombBody, fuse);
    bombGroup.position.set(0.9, 0.28, 0.4); // وضعها في اليد اليمنى
    dwarf.add(bombGroup);

    scene.add(dwarf);

    // --- حلقة التحريك ---
    function animate() {
        requestAnimationFrame(animate);
        
        const t = Date.now() * 0.001;
        
        // تمايل جانبي خفيف
        dwarf.rotation.y = Math.sin(t * 0.5) * 0.06;
        
        // وميض ضوء القنبلة
        bombGlow.intensity = 8 + Math.sin(t * 12) * 3 + Math.random();

        renderer.render(scene, camera);
    }

    // التعامل مع تغيير حجم النافذة
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
