<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>القزم الهندسي - Three.js</title>
    <style>
        body { margin: 0; background-color: #ffffff; overflow: hidden; }
        canvas { display: block; }
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif; color: #333;
        }
    </style>
</head>
<body>

    <div id="loading">جاري تحميل المشهد...</div>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // إخفاء رسالة التحميل
        document.getElementById('loading').style.display = 'none';

        // 1. إعداد المشهد
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 4);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 2. الإضاءة
        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // 3. المواد (Materials)
        const tunicMat = new THREE.MeshStandardMaterial({ color: 0xeeb422 }); // أصفر
        const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });  // بشرة
        const beardMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee }); // أبيض
        const bootMat = new THREE.MeshStandardMaterial({ color: 0x5d4037 });  // بني

        // 4. بناء القزم
        const dwarf = new THREE.Group();

        // الجسم
        const body = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), tunicMat);
        body.scale.y = 1.2;
        dwarf.add(body);

        // الرأس
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), skinMat);
        head.position.y = 1.1;
        dwarf.add(head);

        // اللحية (كرات مدمجة)
        for (let i = 0; i < 60; i++) {
            const bGeo = new THREE.SphereGeometry(0.08, 12, 12);
            const bPart = new THREE.Mesh(bGeo, beardMat);
            const angle = Math.random() * Math.PI; 
            const radius = 0.4;
            bPart.position.set(
                Math.sin(angle) * Math.cos(i) * radius,
                0.9 - Math.random() * 0.5,
                0.3 + Math.random() * 0.2
            );
            dwarf.add(bPart);
        }

        // الأنف
        const nose = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), skinMat);
        nose.position.set(0, 1.1, 0.45);
        dwarf.add(nose);

        // القبعة (مخروط مع ميلان)
        const hat = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.2, 32), tunicMat);
        hat.position.y = 1.7;
        hat.rotation.z = -0.2;
        dwarf.add(hat);

        // الحذاء
        const createFoot = (x) => {
            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.5), bootMat);
            foot.position.set(x, -0.8, 0.1);
            dwarf.add(foot);
        };
        createFoot(0.35);
        createFoot(-0.35);

        scene.add(dwarf);

        // 5. التحريك
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
