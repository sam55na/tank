<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المحارب المدرع - النسخة النهائية الاحترافية</title>
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body { margin: 0; overflow: hidden; background: #87ceeb; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #info-panel { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); color: #fff; padding: 15px 25px; border-radius: 12px; direction: rtl; }
        #info-panel h1 { margin: 0; font-size: 1.3rem; color: #f39c12; }
        #info-panel p { margin: 5px 0 0; font-size: 0.85rem; opacity: 0.9; }
        #joystick-container { position: absolute; bottom: 50px; left: 50px; width: 130px; height: 130px; background: rgba(255,255,255,0.12); border-radius: 50%; pointer-events: auto; border: 2px solid rgba(255,255,255,0.3); }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 55px; height: 55px; background: rgba(255,255,255,0.95); border-radius: 50%; transform: translate(-50%,-50%); box-shadow: 0 6px 15px rgba(0,0,0,0.4); }
        #action-buttons { position: absolute; bottom: 50px; right: 50px; display: flex; gap: 25px; pointer-events: auto; }
        .action-btn { width: 80px; height: 80px; border-radius: 50%; border: none; color: white; font-weight: bold; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 18px rgba(0,0,0,0.5); transition: transform 0.1s; user-select: none; }
        #btn-jump { background: linear-gradient(135deg, #3498db, #2980b9); }
        #btn-throw { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .action-btn:active { transform: scale(0.82); }
        #score-panel { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: #f1c40f; padding: 12px 25px; border-radius: 12px; font-size: 1.3rem; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="info-panel">
            <h1>⚔️ HEAVY VANGUARD - المحارب المدرع</h1>
            <p>الركض السريع • الرمي القوي • الانفجارات الواقعية</p>
        </div>
        <div id="score-panel">الأهداف المصابة: <span id="score">0</span></div>
        <div id="joystick-container"><div id="joystick-knob"></div></div>
        <div id="action-buttons">
            <button class="action-btn" id="btn-jump">⬆️</button>
            <button class="action-btn" id="btn-throw">🔥</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==========================================
        // 1. إعداد المشهد
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 80, 200);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // الإضاءة
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
        sunLight.position.set(60, 100, 60);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.left = -150;
        sunLight.shadow.camera.right = 150;
        sunLight.shadow.camera.top = 150;
        sunLight.shadow.camera.bottom = -150;
        sunLight.shadow.bias = -0.0005;
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        // الأرضية
        const groundGeo = new THREE.PlaneGeometry(400, 400);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5016, roughness: 0.95, metalness: 0 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // العوائق (صخور كبيرة)
        const obstacles = [];
        for(let i=0; i<60; i++) {
            const rockGeo = new THREE.DodecahedronGeometry(Math.random() * 3 + 1);
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x8b7355, roughness: 0.85 });
            const rock = new THREE.Mesh(rockGeo, rockMat);
            rock.position.set(Math.random()*300-150, 0, Math.random()*300-150);
            rock.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
            rock.castShadow = true;
            rock.receiveShadow = true;
            scene.add(rock);
            obstacles.push({ mesh: rock, radius: Math.random() * 3 + 1 });
        }

        // ==========================================
        // 2. بناء الشخصية بأبعاد متسقة
        // ==========================================
        const matArmor = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, metalness: 0.9, roughness: 0.15 });
        const matJoint = new THREE.MeshStandardMaterial({ color: 0xff8c00, metalness: 0.7, roughness: 0.3 });
        const matGlow = new THREE.MeshStandardMaterial({ color: 0x00d4ff, emissive: 0x0088ff, emissiveIntensity: 0.6 });
        const matSoftJoint = new THREE.MeshStandardMaterial({ color: 0xd4a574, metalness: 0.5, roughness: 0.4 });

        const character = new THREE.Group();
        character.scale.set(1.2, 1.2, 1.2); // تكبير الشخصية
        scene.add(character);

        // الجذع (متسق)
        const torsoGroup = new THREE.Group();
        character.add(torsoGroup);

        const upperTorso = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.55, 1.1, 28), matArmor);
        upperTorso.position.y = 2.5;
        upperTorso.castShadow = true;
        torsoGroup.add(upperTorso);

        const lowerTorso = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.65, 0.9, 28), matArmor);
        lowerTorso.position.y = 1.65;
        lowerTorso.castShadow = true;
        torsoGroup.add(lowerTorso);

        const waistRing = new THREE.Mesh(new THREE.TorusGeometry(0.6, 0.09, 16, 50), matSoftJoint);
        waistRing.position.y = 2.0;
        waistRing.rotation.x = Math.PI / 2;
        torsoGroup.add(waistRing);

        // الرأس (متسق)
        const headGroup = new THREE.Group();
        torsoGroup.add(headGroup);

        const neckJoint = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.42, 0.25, 18), matSoftJoint);
        neckJoint.position.y = 3.05;
        headGroup.add(neckJoint);

        const head = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.62, 0.62), matArmor);
        head.position.y = 3.35;
        head.castShadow = true;
        headGroup.add(head);

        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.68, 0.14, 0.18), matGlow);
        visor.position.set(0, 3.45, 0.31);
        headGroup.add(visor);

        // الأذرع (متسقة)
        function buildArm(side) {
            const armGroup = new THREE.Group();
            const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), matSoftJoint);
            shoulder.castShadow = true;
            armGroup.add(shoulder);

            const shoulderRing = new THREE.Mesh(new THREE.TorusGeometry(0.36, 0.06, 12, 36), matArmor);
            shoulderRing.rotation.x = Math.PI / 2;
            shoulderRing.position.y = -0.18;
            armGroup.add(shoulderRing);

            const bicep = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.23, 0.95, 28), matArmor);
            bicep.position.y = -0.62;
            bicep.castShadow = true;
            armGroup.add(bicep);

            const forearmGroup = new THREE.Group();
            forearmGroup.position.y = -1.15;

            const elbow = new THREE.Mesh(new THREE.SphereGeometry(0.26, 32, 32), matSoftJoint);
            elbow.castShadow = true;
            forearmGroup.add(elbow);

            const elbowRing = new THREE.Mesh(new THREE.TorusGeometry(0.31, 0.052, 12, 36), matArmor);
            elbowRing.rotation.x = Math.PI / 2;
            forearmGroup.add(elbowRing);

            const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.25, 1.0, 28), matArmor);
            forearm.position.y = -0.54;
            forearm.castShadow = true;
            forearmGroup.add(forearm);

            const wrist = new THREE.Mesh(new THREE.SphereGeometry(0.22, 28, 28), matSoftJoint);
            wrist.position.y = -1.08;
            wrist.castShadow = true;
            forearmGroup.add(wrist);

            const hand = new THREE.Mesh(new THREE.BoxGeometry(0.36, 0.32, 0.36), matJoint);
            hand.position.y = -1.2;
            hand.castShadow = true;
            forearmGroup.add(hand);

            armGroup.add(forearmGroup);
            armGroup.position.set(side * 1.3, 2.8, 0);

            return { armGroup, forearmGroup };
        }

        const rightArmData = buildArm(1);
        const leftArmData = buildArm(-1);
        torsoGroup.add(rightArmData.armGroup);
        torsoGroup.add(leftArmData.armGroup);

        // الأرجل (متسقة)
        function buildLeg(side) {
            const legGroup = new THREE.Group();
            const hipJoint = new THREE.Mesh(new THREE.SphereGeometry(0.42, 32, 32), matSoftJoint);
            hipJoint.position.y = -0.18;
            hipJoint.castShadow = true;
            legGroup.add(hipJoint);

            const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.41, 0.32, 1.2, 28), matArmor);
            thigh.position.y = -0.72;
            thigh.castShadow = true;
            legGroup.add(thigh);

            const thighRing = new THREE.Mesh(new THREE.TorusGeometry(0.38, 0.055, 12, 36), matArmor);
            thighRing.position.y = -1.15;
            thighRing.rotation.x = Math.PI / 2;
            legGroup.add(thighRing);

            const shinGroup = new THREE.Group();
            shinGroup.position.y = -1.35;

            const knee = new THREE.Mesh(new THREE.SphereGeometry(0.32, 32, 32), matSoftJoint);
            knee.castShadow = true;
            shinGroup.add(knee);

            const kneeRing = new THREE.Mesh(new THREE.TorusGeometry(0.37, 0.05, 12, 36), matArmor);
            kneeRing.rotation.x = Math.PI / 2;
            shinGroup.add(kneeRing);

            const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.25, 1.2, 28), matArmor);
            shin.position.y = -0.62;
            shin.castShadow = true;
            shinGroup.add(shin);

            const ankle = new THREE.Mesh(new THREE.SphereGeometry(0.27, 28, 28), matSoftJoint);
            ankle.position.y = -1.24;
            ankle.castShadow = true;
            shinGroup.add(ankle);

            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.3, 1.05), matArmor);
            foot.position.set(0, -1.38, 0.25);
            foot.castShadow = true;
            shinGroup.add(foot);

            legGroup.add(shinGroup);
            legGroup.position.set(side * 0.62, 1.4, 0);

            return { legGroup, shinGroup };
        }

        const rightLegData = buildLeg(1);
        const leftLegData = buildLeg(-1);
        character.add(rightLegData.legGroup);
        character.add(leftLegData.legGroup);

        // ==========================================
        // 3. نظام الأهداف
        // ==========================================
        const targets = [];
        let score = 0;
        function spawnTarget() {
            const target = new THREE.Mesh(
                new THREE.SphereGeometry(1.3, 18, 18),
                new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x660000, metalness: 0.6 })
            );
            const angle = Math.random() * Math.PI * 2;
            const dist = 25 + Math.random() * 50;
            target.position.set(Math.cos(angle)*dist, 2.2, Math.sin(angle)*dist);
            target.castShadow = true;
            scene.add(target);
            targets.push(target);
        }
        for(let i=0; i<15; i++) spawnTarget();

        // ==========================================
        // 4. نظام القذائف والانفجارات المتقدمة
        // ==========================================
        const projectiles = [];
        const particles = [];

        function fireProjectile(isRight) {
            const hand = isRight ? rightArmData.forearmGroup.children[4] : leftArmData.forearmGroup.children[4];
            const handWorldPos = new THREE.Vector3();
            hand.getWorldPosition(handWorldPos);

            const proj = new THREE.Mesh(
                new THREE.SphereGeometry(0.25, 12, 12),
                new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xff2200, emissiveIntensity: 0.9, metalness: 0.8 })
            );
            proj.position.copy(handWorldPos);
            proj.castShadow = true;
            scene.add(proj);

            const dir = new THREE.Vector3(0, 0.15, 1);
            dir.applyQuaternion(character.quaternion);
            dir.normalize();
            projectiles.push({ mesh: proj, vel: dir.multiplyScalar(0.75), life: 180, hasExploded: false });
        }

        function createExplosion(pos) {
            // انفجار جزيئي متقدم
            const explosionTypes = [
                { count: 30, color: 0xff4400, speed: 0.4, life: 50 },
                { count: 25, color: 0xffaa00, speed: 0.35, life: 45 },
                { count: 20, color: 0xffff00, speed: 0.3, life: 40 },
                { count: 15, color: 0xff0000, speed: 0.45, life: 55 }
            ];

            explosionTypes.forEach(type => {
                for(let i=0; i<type.count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const elevation = Math.random() * Math.PI - Math.PI / 2;
                    
                    const p = new THREE.Mesh(
                        new THREE.SphereGeometry(0.08 + Math.random() * 0.08, 6, 6),
                        new THREE.MeshStandardMaterial({
                            color: type.color,
                            emissive: type.color,
                            emissiveIntensity: 0.8,
                            metalness: 0.6
                        })
                    );
                    p.position.copy(pos);
                    scene.add(p);

                    const vel = new THREE.Vector3(
                        Math.cos(angle) * Math.cos(elevation),
                        Math.sin(elevation),
                        Math.sin(angle) * Math.cos(elevation)
                    ).multiplyScalar(type.speed + Math.random() * 0.15);

                    particles.push({
                        mesh: p,
                        vel: vel,
                        life: 0,
                        maxLife: type.life,
                        friction: 0.98
                    });
                }
            });

            // موجة صدمة بصرية
            const shockwave = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 16, 16),
                new THREE.MeshStandardMaterial({
                    color: 0xff6600,
                    emissive: 0xff3300,
                    emissiveIntensity: 1.0,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.6
                })
            );
            shockwave.position.copy(pos);
            scene.add(shockwave);

            particles.push({
                mesh: shockwave,
                vel: new THREE.Vector3(0, 0, 0),
                life: 0,
                maxLife: 20,
                isShockwave: true,
                initialScale: 0.5
            });
        }

        // ==========================================
        // 5. نظام التحكم
        // ==========================================
        const input = { forward: 0, side: 0, jump: false, throw: false };
        const joystick = { active: false, startX: 0, startY: 0 };
        const knob = document.getElementById('joystick-knob');

        document.getElementById('joystick-container').addEventListener('touchstart', (e) => {
            joystick.active = true;
            joystick.startX = e.touches[0].clientX;
            joystick.startY = e.touches[0].clientY;
        });

        window.addEventListener('touchmove', (e) => {
            if (!joystick.active) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystick.startX;
            let dy = touch.clientY - joystick.startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 55;
            if (dist > maxDist) {
                dx *= maxDist / dist;
                dy *= maxDist / dist;
            }
            knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            input.side = -dx / maxDist;
            input.forward = -dy / maxDist;
        });

        window.addEventListener('touchend', () => {
            joystick.active = false;
            knob.style.transform = `translate(-50%, -50%)`;
            input.forward = 0;
            input.side = 0;
        });

        document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); input.jump = true; });
        document.getElementById('btn-throw').addEventListener('touchstart', (e) => { e.preventDefault(); input.throw = true; });

        const keys = {};
        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // ==========================================
        // 6. منطق اللعبة
        // ==========================================
        let state = 'idle';
        let animTime = 0;
        let verticalVel = 0;
        let isJumping = false;
        let throwTimer = 0;
        let throwSide = true;
        let throwState = 0; // 0: idle, 1: raising, 2: throwing

        function lerp(a, b, t) { return a + (b - a) * Math.min(t, 1); }

        function checkCollision(pos, radius) {
            for(let obs of obstacles) {
                const dist = pos.distanceTo(obs.mesh.position);
                if(dist < radius + obs.radius) return true;
            }
            return false;
        }

        function updateLogic() {
            if (keys['KeyW']) input.forward = 1;
            else if (keys['KeyS']) input.forward = -1;
            else if (!joystick.active) input.forward = 0;

            if (keys['KeyA']) input.side = 1;
            else if (keys['KeyD']) input.side = -1;
            else if (!joystick.active) input.side = 0;

            if (keys['Space']) input.jump = true;
            if (keys['KeyF'] || keys['KeyT']) input.throw = true;

            // الحركة مع التصادم
            if (Math.abs(input.forward) > 0.1 || Math.abs(input.side) > 0.1) {
                const angle = Math.atan2(input.side, input.forward);
                character.rotation.y = angle;
                const speed = 0.22; // سرعة أسرع
                const newPos = character.position.clone();
                newPos.x += Math.sin(character.rotation.y) * speed;
                newPos.z += Math.cos(character.rotation.y) * speed;
                
                if(!checkCollision(newPos, 1.2)) {
                    character.position.copy(newPos);
                }
                state = 'run';
            } else {
                state = 'idle';
            }

            // القفز
            if (input.jump && !isJumping) {
                verticalVel = 0.38;
                isJumping = true;
                input.jump = false;
            }
            if (isJumping) {
                character.position.y += verticalVel;
                verticalVel -= 0.02;
                if (character.position.y <= 0) {
                    character.position.y = 0;
                    isJumping = false;
                    verticalVel = 0;
                }
                state = 'jump';
            }

            // الرمي
            if (input.throw && throwTimer <= 0) {
                fireProjectile(throwSide);
                throwSide = !throwSide;
                throwTimer = 30;
                input.throw = false;
            }
            if (throwTimer > 0) throwTimer--;

            // كاميرا
            const camOffset = new THREE.Vector3(0, 8, -18);
            camOffset.applyQuaternion(character.quaternion);
            camera.position.lerp(character.position.clone().add(camOffset), 0.1);
            camera.lookAt(character.position.clone().add(new THREE.Vector3(0, 3, 0)));

            // القذائف والتصادمات
            for(let i=projectiles.length-1; i>=0; i--) {
                const p = projectiles[i];
                p.mesh.position.add(p.vel);
                p.vel.y -= 0.012;
                p.life--;

                // تصادم مع الأهداف
                targets.forEach((t, idx) => {
                    if (p.mesh.position.distanceTo(t.position) < 1.8) {
                        createExplosion(t.position);
                        scene.remove(t);
                        targets.splice(idx, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                        spawnTarget();
                        p.life = 0;
                    }
                });

                // تصادم مع الأرض
                if (p.mesh.position.y < 0.3 && !p.hasExploded) {
                    createExplosion(p.mesh.position);
                    p.hasExploded = true;
                    p.life = 0;
                }

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    projectiles.splice(i, 1);
                }
            }

            // الجزيئات
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                if(p.isShockwave) {
                    const progress = p.life / p.maxLife;
                    p.mesh.scale.set(1 + progress * 4, 1 + progress * 4, 1 + progress * 4);
                    p.mesh.material.opacity = 1 - progress;
                } else {
                    p.mesh.position.add(p.vel);
                    p.vel.multiplyScalar(p.friction);
                    p.vel.y -= 0.01;
                    p.life++;
                    if (p.life > p.maxLife * 0.6) {
                        p.mesh.material.opacity = 1 - (p.life - p.maxLife * 0.6) / (p.maxLife * 0.4);
                        p.mesh.material.transparent = true;
                    }
                }
                if (p.life >= p.maxLife) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
        }

        function updateAnimations() {
            const s = 0.18;
            if (state === 'idle') {
                rightArmData.armGroup.rotation.x = lerp(rightArmData.armGroup.rotation.x, Math.sin(animTime * 0.4) * 0.1, s);
                leftArmData.armGroup.rotation.x = lerp(leftArmData.armGroup.rotation.x, -Math.sin(animTime * 0.4) * 0.1, s);
                rightArmData.forearmGroup.rotation.x = lerp(rightArmData.forearmGroup.rotation.x, -0.25, s);
                leftArmData.forearmGroup.rotation.x = lerp(leftArmData.forearmGroup.rotation.x, -0.25, s);
                rightLegData.legGroup.rotation.x = lerp(rightLegData.legGroup.rotation.x, 0, s);
                leftLegData.legGroup.rotation.x = lerp(leftLegData.legGroup.rotation.x, 0, s);
                rightLegData.shinGroup.rotation.x = lerp(rightLegData.shinGroup.rotation.x, 0, s);
                leftLegData.shinGroup.rotation.x = lerp(leftLegData.shinGroup.rotation.x, 0, s);
            } else if (state === 'run') {
                const t = animTime * 5.5; // أسرع
                rightLegData.legGroup.rotation.x = lerp(rightLegData.legGroup.rotation.x, Math.sin(t) * 0.85, s);
                leftLegData.legGroup.rotation.x = lerp(leftLegData.legGroup.rotation.x, -Math.sin(t) * 0.85, s);
                rightLegData.shinGroup.rotation.x = lerp(rightLegData.shinGroup.rotation.x, Math.max(0, -Math.sin(t)) * 0.95, s);
                leftLegData.shinGroup.rotation.x = lerp(leftLegData.shinGroup.rotation.x, Math.max(0, Math.sin(t)) * 0.95, s);
                
                rightArmData.armGroup.rotation.x = lerp(rightArmData.armGroup.rotation.x, Math.sin(t) * 0.75, s);
                leftArmData.armGroup.rotation.x = lerp(leftArmData.armGroup.rotation.x, -Math.sin(t) * 0.75, s);
                rightArmData.forearmGroup.rotation.x = lerp(rightArmData.forearmGroup.rotation.x, -1.2, s);
                leftArmData.forearmGroup.rotation.x = lerp(leftArmData.forearmGroup.rotation.x, -1.2, s);
                
                torsoGroup.rotation.z = Math.sin(t * 0.5) * 0.08;
            } else if (state === 'jump') {
                rightArmData.armGroup.rotation.x = lerp(rightArmData.armGroup.rotation.x, 0.9, s);
                leftArmData.armGroup.rotation.x = lerp(leftArmData.armGroup.rotation.x, 0.9, s);
                rightArmData.forearmGroup.rotation.x = lerp(rightArmData.forearmGroup.rotation.x, -1.4, s);
                leftArmData.forearmGroup.rotation.x = lerp(leftArmData.forearmGroup.rotation.x, -1.4, s);
                rightLegData.legGroup.rotation.x = lerp(rightLegData.legGroup.rotation.x, -0.6, s);
                leftLegData.legGroup.rotation.x = lerp(leftLegData.legGroup.rotation.x, -0.6, s);
                rightLegData.shinGroup.rotation.x = lerp(rightLegData.shinGroup.rotation.x, 0.9, s);
                leftLegData.shinGroup.rotation.x = lerp(leftLegData.shinGroup.rotation.x, 0.9, s);
            }

            // أنيميشن الرمي (رفع اليد)
            if(throwTimer > 15) {
                const throwProgress = (30 - throwTimer) / 15;
                if(throwSide) {
                    rightArmData.armGroup.rotation.x = lerp(rightArmData.armGroup.rotation.x, -1.3 + throwProgress * 0.5, s);
                    rightArmData.armGroup.rotation.z = lerp(rightArmData.armGroup.rotation.z, -0.4, s);
                    rightArmData.forearmGroup.rotation.x = lerp(rightArmData.forearmGroup.rotation.x, -1.8, s);
                } else {
                    leftArmData.armGroup.rotation.x = lerp(leftArmData.armGroup.rotation.x, -1.3 + throwProgress * 0.5, s);
                    leftArmData.armGroup.rotation.z = lerp(leftArmData.armGroup.rotation.z, 0.4, s);
                    leftArmData.forearmGroup.rotation.x = lerp(leftArmData.forearmGroup.rotation.x, -1.8, s);
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            animTime += 0.016;
            updateLogic();
            updateAnimations();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
