<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المحارب المدرع - الهيكل العريض | مفاصل ناعمة</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Tahoma', 'Geneva', 'Verdana', sans-serif;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(4px);
            color: #1e2a3a;
            padding: 12px 20px;
            border-radius: 12px;
            border-left: 5px solid #d35400;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            pointer-events: none;
            z-index: 100;
            font-weight: 500;
            direction: rtl;
            font-size: 14px;
        }
        #info-panel h1 {
            margin: 0;
            font-size: 1.3rem;
            letter-spacing: 1px;
            color: #c4450c;
            font-weight: 700;
        }
        #info-panel p {
            margin: 5px 0 0;
            font-size: 0.8rem;
            opacity: 0.8;
        }
        @media (max-width: 600px) {
            #info-panel { padding: 8px 14px; top: 12px; left: 12px; }
            #info-panel h1 { font-size: 1rem; }
        }
        .controls-note {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            font-family: monospace;
            direction: ltr;
        }
    </style>
</head>
<body>
    <div id="info-panel">
        <h1>⚔️ HEAVY VANGUARD — المحارب المدرع</h1>
        <p>هيكل عريض مدمج • مفاصل ناعمة محسنة • خلفية استوديو أبيض</p>
    </div>
    <div class="controls-note">
        🖱️ اسحب لتدوير | ⚡ زر الفأرة الأيمن للتحريك
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // 1. إعداد المشهد (خلفية بيضاء)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(7, 4, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // ظلال ناعمة
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 2, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 2. إضاءة الاستوديو (لإظهار التفاصيل على الخلفية البيضاء)
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.0);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        mainLight.receiveShadow = false;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);

        const fillLight = new THREE.PointLight(0x88aaff, 0.55);
        fillLight.position.set(-4, 3, 6);
        scene.add(fillLight);

        const backLight = new THREE.PointLight(0xffaa66, 0.4);
        backLight.position.set(2, 3, -5);
        scene.add(backLight);

        const ambient = new THREE.AmbientLight(0xffffff, 0.55);
        scene.add(ambient);
        
        // إضاءة إضافية من الأسفل لإبراز التفاصيل
        const rimLight = new THREE.PointLight(0xccaa88, 0.35);
        rimLight.position.set(0, -1, 2);
        scene.add(rimLight);

        // 3. المواد (مع لمعان محسن للمفاصل)
        const matArmor = new THREE.MeshStandardMaterial({ color: 0x2c3e50, metalness: 0.85, roughness: 0.2, emissive: 0x000000 });
        const matJoint = new THREE.MeshStandardMaterial({ color: 0xe67e22, metalness: 0.6, roughness: 0.35, emissive: 0x442200, emissiveIntensity: 0.25 });
        const matGlow = new THREE.MeshStandardMaterial({ color: 0x3a86ff, emissive: 0x1a4488, emissiveIntensity: 0.4, metalness: 0.3 });
        
        // مادة إضافية للمفاصل الكروية الناعمة (سيليكون معدني)
        const matSoftJoint = new THREE.MeshStandardMaterial({ color: 0xbc6c25, metalness: 0.5, roughness: 0.4, emissive: 0x552200, emissiveIntensity: 0.2 });

        const character = new THREE.Group();
        scene.add(character);

        // ==========================================
        // 1. الجذع (تم تكبير العرض بنسبة 25% - كما هو)
        // ==========================================
        // الجزء العلوي (الصدر العريض)
        const upperTorso = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.5, 1.0, 24), matArmor);
        upperTorso.position.y = 2.4;
        upperTorso.castShadow = true;
        upperTorso.receiveShadow = false;
        character.add(upperTorso);

        // الجزء السفلي (الخصر المدمج)
        const lowerTorso = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 0.8, 24), matArmor);
        lowerTorso.position.y = 1.6;
        lowerTorso.castShadow = true;
        character.add(lowerTorso);
        
        // حلقة توصيل ناعمة بين الصدر والخصر (إضافة انتقال أنيق)
        const waistRing = new THREE.Mesh(new THREE.TorusGeometry(0.55, 0.08, 16, 48), matSoftJoint);
        waistRing.position.y = 1.95;
        waistRing.rotation.x = Math.PI / 2;
        waistRing.castShadow = true;
        character.add(waistRing);

        // ==========================================
        // 2. الرأس والخوذة (مع رقبة ناعمة)
        // ==========================================
        // إضافة رقبة ناعمة لانتقال سلس
        const neckJoint = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.38, 0.22, 16), matSoftJoint);
        neckJoint.position.y = 2.98;
        neckJoint.castShadow = true;
        character.add(neckJoint);
        
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.55, 0.55), matArmor);
        head.position.y = 3.25;
        head.castShadow = true;
        character.add(head);

        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.12, 0.15), matGlow);
        visor.position.set(0, 3.35, 0.27);
        visor.castShadow = true;
        character.add(visor);
        
        // إضافات للخوذة: حواف جانبية ناعمة
        const helmetCrest = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.08, 0.55), matArmor);
        helmetCrest.position.set(0, 3.58, 0.15);
        helmetCrest.castShadow = true;
        character.add(helmetCrest);

        // ==========================================
        // 3. الأذرع (مفاصل ناعمة جداً مع حلقات توصيل)
        // ==========================================
        function createArm(side) {
            const arm = new THREE.Group();
            
            // كتف عريض ناعم (مفصل كروي محسن)
            const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.44, 32, 32), matSoftJoint);
            shoulder.castShadow = true;
            arm.add(shoulder);
            
            // حلقة توصيل علوية عند بداية الذراع
            const shoulderRing = new THREE.Mesh(new THREE.TorusGeometry(0.32, 0.05, 12, 32), matArmor);
            shoulderRing.rotation.x = Math.PI / 2;
            shoulderRing.position.y = -0.15;
            shoulderRing.castShadow = true;
            arm.add(shoulderRing);

            const bicep = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.2, 0.85, 24), matArmor);
            bicep.position.y = -0.55;
            bicep.castShadow = true;
            arm.add(bicep);

            // مفصل المرفق - كرة ناعمة محسنة (نقطة الالتقاء)
            const elbow = new THREE.Mesh(new THREE.SphereGeometry(0.23, 32, 32), matSoftJoint);
            elbow.position.y = -1.02;
            elbow.castShadow = true;
            arm.add(elbow);
            
            // حلقة زخرفية حول المرفق
            const elbowRing = new THREE.Mesh(new THREE.TorusGeometry(0.27, 0.045, 12, 32), matArmor);
            elbowRing.position.y = -1.02;
            elbowRing.rotation.x = Math.PI / 2;
            elbowRing.castShadow = true;
            arm.add(elbowRing);

            const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.22, 0.9, 24), matArmor);
            forearm.position.y = -1.5;
            forearm.castShadow = true;
            arm.add(forearm);
            
            // مفصل الرسغ ناعم
            const wrist = new THREE.Mesh(new THREE.SphereGeometry(0.19, 24, 24), matSoftJoint);
            wrist.position.y = -1.98;
            wrist.castShadow = true;
            arm.add(wrist);

            const hand = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.28, 0.32), matJoint);
            hand.position.y = -2.08;
            hand.castShadow = true;
            arm.add(hand);

            arm.position.set(side * 1.15, 2.7, 0);
            return arm;
        }
        character.add(createArm(1));
        character.add(createArm(-1));

        // ==========================================
        // 4. الأرجل (مفاصل ناعمة عند الورك والركبة والكاحل)
        // ==========================================
        function createLeg(side) {
            const leg = new THREE.Group();
            
            // مفصل الورك - كرة ناعمة لانتقال سلس من الجذع
            const hipJoint = new THREE.Mesh(new THREE.SphereGeometry(0.38, 32, 32), matSoftJoint);
            hipJoint.position.y = -0.15;
            hipJoint.castShadow = true;
            leg.add(hipJoint);
            
            const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.37, 0.28, 1.1, 24), matArmor);
            thigh.position.y = -0.65;
            thigh.castShadow = true;
            leg.add(thigh);
            
            // حلقة وصل عند منتصف الفخذ
            const thighRing = new THREE.Mesh(new THREE.TorusGeometry(0.34, 0.05, 12, 32), matArmor);
            thighRing.position.y = -1.05;
            thighRing.rotation.x = Math.PI / 2;
            thighRing.castShadow = true;
            leg.add(thighRing);

            // مفصل الركبة - كرة ناعمة كبيرة قليلاً (نقطة الالتقاء المحسنة)
            const knee = new THREE.Mesh(new THREE.SphereGeometry(0.29, 32, 32), matSoftJoint);
            knee.position.y = -1.22;
            knee.castShadow = true;
            leg.add(knee);
            
            // حلقة زخرفية حول الركبة
            const kneeRing = new THREE.Mesh(new THREE.TorusGeometry(0.33, 0.045, 12, 32), matArmor);
            kneeRing.position.y = -1.22;
            kneeRing.rotation.x = Math.PI / 2;
            kneeRing.castShadow = true;
            leg.add(kneeRing);

            const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.35, 1.02, 24), matArmor);
            shin.position.y = -1.78;
            shin.castShadow = true;
            leg.add(shin);
            
            // مفصل الكاحل الناعم
            const ankle = new THREE.Mesh(new THREE.SphereGeometry(0.24, 28, 28), matSoftJoint);
            ankle.position.y = -2.32;
            ankle.castShadow = true;
            leg.add(ankle);

            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.26, 0.95), matArmor);
            foot.position.set(0, -2.44, 0.22);
            foot.castShadow = true;
            leg.add(foot);
            
            // إضافة قاعدة صغيرة تحت القدم لاستقرار بصري
            const footPad = new THREE.Mesh(new THREE.BoxGeometry(0.68, 0.08, 1.02), matSoftJoint);
            footPad.position.set(0, -2.58, 0.2);
            footPad.castShadow = true;
            leg.add(footPad);

            leg.position.set(side * 0.55, 1.3, 0);
            return leg;
        }
        character.add(createLeg(1));
        character.add(createLeg(-1));
        
        // ==========================================
        // إضافات: حلقات توصيل إضافية عند الكتفين والخصر (لتنعيم بصري)
        // ==========================================
        // حلقة كتف يمنى خارجية
        const rightShoulderCap = new THREE.Mesh(new THREE.TorusGeometry(0.52, 0.07, 16, 40), matArmor);
        rightShoulderCap.position.set(1.15, 2.78, 0.1);
        rightShoulderCap.rotation.z = 0.3;
        rightShoulderCap.rotation.x = 0.5;
        rightShoulderCap.castShadow = true;
        character.add(rightShoulderCap);
        
        const leftShoulderCap = new THREE.Mesh(new THREE.TorusGeometry(0.52, 0.07, 16, 40), matArmor);
        leftShoulderCap.position.set(-1.15, 2.78, 0.1);
        leftShoulderCap.rotation.z = -0.3;
        leftShoulderCap.rotation.x = 0.5;
        leftShoulderCap.castShadow = true;
        character.add(leftShoulderCap);
        
        // حلقات حول العضد (لتنعيم انتقال الكتف)
        const armRingR = new THREE.Mesh(new THREE.TorusGeometry(0.34, 0.05, 12, 32), matArmor);
        armRingR.position.set(1.15, 2.32, 0);
        armRingR.rotation.x = Math.PI / 2;
        armRingR.castShadow = true;
        character.add(armRingR);
        
        const armRingL = new THREE.Mesh(new THREE.TorusGeometry(0.34, 0.05, 12, 32), matArmor);
        armRingL.position.set(-1.15, 2.32, 0);
        armRingL.rotation.x = Math.PI / 2;
        armRingL.castShadow = true;
        character.add(armRingL);
        
        // إضافة زخارف جانبية على الصدر (تعزيز المظهر العريض)
        const chestPlateR = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.65, 0.18), matArmor);
        chestPlateR.position.set(0.82, 2.55, 0.45);
        chestPlateR.castShadow = true;
        character.add(chestPlateR);
        
        const chestPlateL = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.65, 0.18), matArmor);
        chestPlateL.position.set(-0.82, 2.55, 0.45);
        chestPlateL.castShadow = true;
        character.add(chestPlateL);
        
        // لوحة صدر مركزية
        const centerPlate = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.45, 0.12), matJoint);
        centerPlate.position.set(0, 2.5, 0.58);
        centerPlate.castShadow = true;
        character.add(centerPlate);

        // أرضية ناعمة لتحديد الأبعاد (شبكة خفيفة جداً)
        const grid = new THREE.GridHelper(20, 30, 0xd0d0d0, 0xe8e8e8);
        grid.position.y = -1.15;
        grid.material.transparent = true;
        grid.material.opacity = 0.45;
        scene.add(grid);
        
        // إضافة مرآة انعكاس خفيفة جداً (حلقة أرضية اختيارية)
        const groundReflector = new THREE.Mesh(
            new THREE.PlaneGeometry(12, 12),
            new THREE.MeshStandardMaterial({ color: 0xf8f8f8, metalness: 0.05, roughness: 0.9, transparent: true, opacity: 0.12 })
        );
        groundReflector.rotation.x = -Math.PI / 2;
        groundReflector.position.y = -1.12;
        groundReflector.receiveShadow = false;
        scene.add(groundReflector);

        // --- حلقة التحريك مع حركة تنفس خفيفة جداً وتحسين دوران بطيء ---
        let timeAcc = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            timeAcc += 0.012;
            
            // دوران بطيء جداً للمعاينة (أقل من السابق للحفاظ على الهدوء)
            character.rotation.y += 0.0028;
            
            // حركة تنفس خفيفة جداً مع نبض بسيط في المفاصل (تأثير بصري ناعم)
            const breath = Math.sin(timeAcc) * 0.012;
            character.position.y = breath * 0.6;
            
            // تأثير نابض خفيف جداً على بعض العناصر (حلقات الكتف)
            const pulse = Math.sin(timeAcc * 1.8) * 0.008;
            if (rightShoulderCap && leftShoulderCap) {
                rightShoulderCap.scale.setScalar(1 + pulse * 0.2);
                leftShoulderCap.scale.setScalar(1 + pulse * 0.2);
            }

            controls.update(); // تحديث عناصر التحكم مع damping
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // تلميح بسيط في الكونسول
        console.log('✅ نموذج المحارب المدرع - مفاصل ناعمة محسنة بنقاط التقاء كروية ناعمة');
    </script>
</body>
</html>
