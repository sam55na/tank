<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القزم الهيكلي الغامض - نسخة مطورة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 50%, #0a0a0a 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        .header {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            animation: fadeIn 1s ease-in;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ff4444 0%, #ff8800 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            animation: fadeIn 2s ease-in;
        }

        .stats {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 100, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            min-width: 200px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 100, 0, 0.1);
        }

        .stat-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .stat-label {
            color: rgba(255, 150, 0, 0.8);
        }

        .stat-value {
            color: rgba(255, 255, 255, 0.9);
            font-weight: bold;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .header p {
                font-size: 0.85rem;
            }

            .stats {
                font-size: 0.75rem;
                bottom: 1rem;
                right: 1rem;
                min-width: 150px;
            }

            .ui-overlay {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="ui-overlay">
    <div class="header">
        <h1>⚡ القزم الهيكلي الغامض ⚡</h1>
        <p>مشهد ثلاثي الأبعاد متطور</p>
    </div>
    <div class="footer">
        <p>استمتع بالمشهد الغامض والمثير</p>
    </div>
</div>

<div class="stats">
    <div class="stat-item">
        <span class="stat-label">FPS:</span>
        <span class="stat-value" id="fps">60</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">الكائنات:</span>
        <span class="stat-value">12</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">الإضاءات:</span>
        <span class="stat-value">4</span>
    </div>
    <div class="stat-item">
        <span class="stat-label">الحالة:</span>
        <span class="stat-value" style="color: #44ff44;">نشط</span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- الإعدادات الأساسية ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);
    scene.fog = new THREE.Fog(0x0a0a0a, 10, 20);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.2, 3.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // --- نظام الإضاءة المتقدم ---
    const ambientLight = new THREE.AmbientLight(0x1a1a2e, 0.4);
    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
    mainLight.position.set(6, 12, 8);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 2048;
    mainLight.shadow.mapSize.height = 2048;
    mainLight.shadow.camera.far = 50;
    mainLight.shadow.camera.left = -10;
    mainLight.shadow.camera.right = 10;
    mainLight.shadow.camera.top = 10;
    mainLight.shadow.camera.bottom = -10;
    scene.add(mainLight);

    // ضوء أرجواني إضافي (غامض)
    const purpleLight = new THREE.PointLight(0x8844ff, 0.5, 15);
    purpleLight.position.set(-3, 2, 3);
    scene.add(purpleLight);

    // ضوء القنبلة الأحمر المتطور
    const bombGlow = new THREE.PointLight(0xff3333, 12, 3);
    bombGlow.position.set(0.9, 0.4, 0.6);
    scene.add(bombGlow);

    // ضوء إضافي من الأسفل
    const bottomLight = new THREE.PointLight(0xff6600, 0.4, 8);
    bottomLight.position.set(0, -1.5, 0);
    scene.add(bottomLight);

    // --- الخامات المحسّنة ---
    const darkMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a1a,
        roughness: 0.7,
        metalness: 0.1,
        emissive: 0x0a0a0a
    });

    const hatMat = new THREE.MeshStandardMaterial({
        color: 0x550000,
        roughness: 0.8,
        metalness: 0.05,
        emissive: 0x220000
    });

    const fuseMat = new THREE.MeshStandardMaterial({
        color: 0xffeecc,
        roughness: 0.3,
        metalness: 0.2,
        emissive: 0xffaa00,
        emissiveIntensity: 0.3
    });

    const bombMat = new THREE.MeshStandardMaterial({
        color: 0x0a0a0a,
        roughness: 0.2,
        metalness: 0.8,
        emissive: 0x330000,
        emissiveIntensity: 0.2
    });

    // --- بناء الشخصية المتماسكة ---
    const dwarf = new THREE.Group();

    // 1. الجسم الرئيسي
    const bodyGeo = new THREE.SphereGeometry(0.6, 32, 32);
    const body = new THREE.Mesh(bodyGeo, darkMat);
    body.scale.y = 1.1;
    body.castShadow = true;
    body.receiveShadow = true;
    dwarf.add(body);

    // 2. الرقبة (الوصلة بين الجسم والقبعة)
    const neckGeo = new THREE.CylinderGeometry(0.2, 0.25, 0.3, 16);
    const neck = new THREE.Mesh(neckGeo, darkMat);
    neck.position.y = 0.65;
    neck.castShadow = true;
    neck.receiveShadow = true;
    dwarf.add(neck);

    // 3. القبعة المخروطية المائلة
    const hatGeo = new THREE.ConeGeometry(0.5, 1.4, 32);
    const hat = new THREE.Mesh(hatGeo, hatMat);
    hat.position.y = 1.35;
    hat.rotation.z = 0.25;
    hat.castShadow = true;
    hat.receiveShadow = true;
    dwarf.add(hat);

    // --- الأطراف العلوية ---

    // الذراع اليسرى
    const leftArmGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.6, 16);
    const leftArm = new THREE.Mesh(leftArmGeo, darkMat);
    leftArm.position.set(-0.7, 0.1, 0.2);
    leftArm.rotation.z = Math.PI / 2.5;
    leftArm.castShadow = true;
    leftArm.receiveShadow = true;
    dwarf.add(leftArm);

    // اليد اليسرى
    const handGeo = new THREE.SphereGeometry(0.15, 16, 16);
    const leftHand = new THREE.Mesh(handGeo, darkMat);
    leftHand.position.set(-0.95, -0.05, 0.25);
    leftHand.castShadow = true;
    leftHand.receiveShadow = true;
    dwarf.add(leftHand);

    // الذراع اليمنى (التي تحمل القنبلة)
    const rightArmGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.5, 16);
    const rightArm = new THREE.Mesh(rightArmGeo, darkMat);
    rightArm.position.set(0.65, 0.1, 0.2);
    rightArm.rotation.z = -Math.PI / 3;
    rightArm.castShadow = true;
    rightArm.receiveShadow = true;
    dwarf.add(rightArm);

    // اليد اليمنى
    const rightHand = new THREE.Mesh(handGeo, darkMat);
    rightHand.position.set(0.85, -0.05, 0.25);
    rightHand.castShadow = true;
    rightHand.receiveShadow = true;
    dwarf.add(rightHand);

    // --- الأطراف السفلية ---

    // الساق اليسرى
    const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.4, 16);
    const leftLeg = new THREE.Mesh(legGeo, darkMat);
    leftLeg.position.set(-0.35, -0.65, 0.1);
    leftLeg.castShadow = true;
    leftLeg.receiveShadow = true;
    dwarf.add(leftLeg);

    // القدم اليسرى
    const footGeo = new THREE.BoxGeometry(0.35, 0.15, 0.5);
    const leftFoot = new THREE.Mesh(footGeo, darkMat);
    leftFoot.position.set(-0.35, -0.85, 0.1);
    leftFoot.castShadow = true;
    leftFoot.receiveShadow = true;
    dwarf.add(leftFoot);

    // الساق اليمنى
    const rightLeg = new THREE.Mesh(legGeo, darkMat);
    rightLeg.position.set(0.35, -0.65, 0.1);
    rightLeg.castShadow = true;
    rightLeg.receiveShadow = true;
    dwarf.add(rightLeg);

    // القدم اليمنى
    const rightFoot = new THREE.Mesh(footGeo, darkMat);
    rightFoot.position.set(0.35, -0.85, 0.1);
    rightFoot.castShadow = true;
    rightFoot.receiveShadow = true;
    dwarf.add(rightFoot);

    // --- القنبلة المحسّنة ---
    const bombGroup = new THREE.Group();
    
    const bombBody = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), bombMat);
    bombBody.castShadow = true;
    bombBody.receiveShadow = true;

    // الفتيل المنحني
    const curve = new THREE.QuadraticBezierCurve3(
        new THREE.Vector3(0, 0.25, 0),
        new THREE.Vector3(0.15, 0.55, 0.05),
        new THREE.Vector3(0.35, 0.6, 0)
    );
    const fuseGeo = new THREE.TubeGeometry(curve, 12, 0.025, 8, false);
    const fuse = new THREE.Mesh(fuseGeo, fuseMat);
    fuse.castShadow = true;

    // إضافة جزيئات توهج حول الفتيل
    const sparkGeo = new THREE.SphereGeometry(0.03, 8, 8);
    const sparkMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
    const spark1 = new THREE.Mesh(sparkGeo, sparkMat);
    spark1.position.set(0.35, 0.65, 0);

    bombGroup.add(bombBody, fuse, spark1);
    bombGroup.position.set(0.9, 0.3, 0.4);
    dwarf.add(bombGroup);

    // إضافة ظل أرضي بسيط
    const shadowGeo = new THREE.PlaneGeometry(2, 2);
    const shadowMat = new THREE.MeshBasicMaterial({
        color: 0x000000,
        transparent: true,
        opacity: 0.3
    });
    const shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
    shadowPlane.rotation.x = -Math.PI / 2;
    shadowPlane.position.y = -1;
    shadowPlane.receiveShadow = true;
    scene.add(shadowPlane);

    scene.add(dwarf);

    // --- متغيرات الحركة والتأثيرات ---
    let frameCount = 0;
    const fpsDisplay = document.getElementById('fps');
    let lastTime = Date.now();

    // --- حلقة التحريك ---
    function animate() {
        requestAnimationFrame(animate);

        frameCount++;
        const currentTime = Date.now();
        if (currentTime - lastTime >= 1000) {
            fpsDisplay.textContent = frameCount;
            frameCount = 0;
            lastTime = currentTime;
        }

        const t = Date.now() * 0.001;

        // تمايل جانبي سلس للشخصية بالكامل
        dwarf.rotation.y = Math.sin(t * 0.4) * 0.1;
        dwarf.position.y = Math.sin(t * 0.6) * 0.1;

        // حركة طفيفة للذراع اليمنى (تحمل القنبلة)
        rightArm.rotation.z = -Math.PI / 3 + Math.sin(t * 0.8) * 0.15;

        // حركة القنبلة
        bombGroup.rotation.z = Math.sin(t * 1.5) * 0.2;
        bombGroup.rotation.y = Math.cos(t * 0.7) * 0.15;

        // وميض الضوء الأحمر بشكل ديناميكي
        const glowIntensity = 8 + Math.sin(t * 12) * 4 + Math.sin(t * 5) * 2;
        bombGlow.intensity = Math.max(6, glowIntensity);

        // تأثير نبضي على الفتيل
        fuseMat.emissiveIntensity = 0.3 + Math.sin(t * 8) * 0.2;

        // حركة الإضاءة الأرجوانية
        purpleLight.position.x = Math.sin(t * 0.5) * 4;
        purpleLight.position.z = Math.cos(t * 0.5) * 3;

        // استخدام المحرر مباشرة
        renderer.render(scene, camera);
    }

    // التعامل مع تغيير حجم النافذة
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>

</body>
</html>
