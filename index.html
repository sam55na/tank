<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PUBG Tactical Shooter - Elite Combat</title>
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body { margin: 0; overflow: hidden; background: #0a0e27; font-family: 'Arial', sans-serif; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); pointer-events: none; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ff88; }
        #crosshair::before { width: 2px; height: 12px; left: 50%; top: -15px; transform: translateX(-50%); }
        #crosshair::after { width: 12px; height: 2px; left: -15px; top: 50%; transform: translateY(-50%); }
        #info-panel { position: absolute; top: 20px; left: 20px; background: rgba(10, 14, 39, 0.85); color: #00ff88; padding: 12px 20px; border-radius: 6px; border: 1px solid #00ff88; font-family: 'Courier New', monospace; font-size: 0.85rem; }
        #info-panel h1 { margin: 0; font-size: 1rem; color: #00ffff; }
        #info-panel p { margin: 3px 0 0; font-size: 0.75rem; opacity: 0.8; }
        #score-panel { position: absolute; top: 20px; right: 20px; background: rgba(10, 14, 39, 0.85); color: #ffff00; padding: 10px 20px; border-radius: 6px; border: 1px solid #ffff00; font-size: 1rem; font-weight: bold; font-family: 'Courier New', monospace; }
        #joystick-container { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(0, 255, 136, 0.05); border-radius: 50%; pointer-events: auto; border: 1px solid rgba(0, 255, 136, 0.2); }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: radial-gradient(circle, #00ff88, #00cc66); border-radius: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 15px #00ff88; }
        #action-buttons { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 20px; pointer-events: auto; }
        .action-btn { width: 70px; height: 70px; border-radius: 50%; border: 1px solid; color: white; font-weight: bold; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px; transition: all 0.1s; user-select: none; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), rgba(0,0,0,0.4)); }
        #btn-jump { border-color: #00d4ff; box-shadow: 0 0 15px #00d4ff; }
        #btn-throw { border-color: #ff0055; box-shadow: 0 0 15px #ff0055; }
        .action-btn:active { transform: scale(0.88); }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="crosshair"></div>
        <div id="info-panel">
            <h1>🎮 PUBG ELITE TACTICAL</h1>
            <p>Double Jump • Cinematic Explosions • Tracer Rounds</p>
        </div>
        <div id="score-panel">TARGETS: <span id="score">0</span></div>
        <div id="joystick-container"><div id="joystick-knob"></div></div>
        <div id="action-buttons">
            <button class="action-btn" id="btn-jump">⬆️</button>
            <button class="action-btn" id="btn-throw">🔥</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==========================================
        // 1. إعداد المشهد
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0e27);
        scene.fog = new THREE.Fog(0x0a0e27, 120, 300);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // الإضاءة
        const sunLight = new THREE.DirectionalLight(0x00ffff, 1.3);
        sunLight.position.set(100, 150, 100);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.left = -200;
        sunLight.shadow.camera.right = 200;
        sunLight.shadow.camera.top = 200;
        sunLight.shadow.camera.bottom = -200;
        sunLight.shadow.bias = -0.0008;
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0x1a2a4a, 0.9);
        scene.add(ambientLight);

        // الأرضية
        const groundGeo = new THREE.PlaneGeometry(600, 600);
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x0f1a2a,
            roughness: 0.95,
            metalness: 0.05
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // العوائق
        const obstacles = [];
        for(let i=0; i<40; i++) {
            const rockGeo = new THREE.DodecahedronGeometry(Math.random() * 2.5 + 1.2);
            const rockMat = new THREE.MeshStandardMaterial({
                color: 0x1a3a4a,
                roughness: 0.8,
                metalness: 0.2
            });
            const rock = new THREE.Mesh(rockGeo, rockMat);
            rock.position.set(Math.random()*400-200, 0, Math.random()*400-200);
            rock.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
            rock.castShadow = true;
            rock.receiveShadow = true;
            scene.add(rock);
            obstacles.push({ mesh: rock, radius: Math.random() * 2.5 + 1.2 });
        }

        // ==========================================
        // 2. بناء الشخصية (PUBG Tactical Style)
        // ==========================================
        const matBody = new THREE.MeshStandardMaterial({
            color: 0x2a2a3a,
            metalness: 0.3,
            roughness: 0.7
        });
        const matArmor = new THREE.MeshStandardMaterial({
            color: 0x1a1a2a,
            metalness: 0.8,
            roughness: 0.2,
            emissive: 0x00ff88,
            emissiveIntensity: 0.08
        });
        const matSkin = new THREE.MeshStandardMaterial({
            color: 0xd4a574,
            metalness: 0.1,
            roughness: 0.6
        });
        const matHelmet = new THREE.MeshStandardMaterial({
            color: 0x1a1a2a,
            metalness: 0.95,
            roughness: 0.1,
            emissive: 0x00ffff,
            emissiveIntensity: 0.15
        });

        const character = new THREE.Group();
        character.scale.set(1.0, 1.0, 1.0);
        scene.add(character);

        // الجسم (Body)
        const torsoGroup = new THREE.Group();
        character.add(torsoGroup);

        // الصدرية (Chest Plate)
        const chest = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.65, 0.3), matArmor);
        chest.position.y = 2.5;
        chest.castShadow = true;
        torsoGroup.add(chest);

        // الظهر (Back)
        const backpack = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.7, 0.35), matBody);
        backpack.position.set(0, 2.45, -0.25);
        backpack.castShadow = true;
        torsoGroup.add(backpack);

        // الجذع الأساسي
        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.4, 0.8, 24), matBody);
        torso.position.y = 1.95;
        torso.castShadow = true;
        torsoGroup.add(torso);

        // الحوض
        const pelvis = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.42, 0.6, 24), matBody);
        pelvis.position.y = 1.2;
        pelvis.castShadow = true;
        torsoGroup.add(pelvis);

        // الرقبة
        const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.2, 0.25, 16), matSkin);
        neck.position.y = 3.15;
        neck.castShadow = true;
        torsoGroup.add(neck);

        // الرأس
        const headGroup = new THREE.Group();
        torsoGroup.add(headGroup);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 24, 24), matSkin);
        head.position.y = 3.45;
        head.castShadow = true;
        headGroup.add(head);

        // الخوذة (Level 3 Helmet)
        const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.32, 24, 24), matHelmet);
        helmet.position.y = 3.45;
        helmet.castShadow = true;
        headGroup.add(helmet);

        // الواقي الوجهي
        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.15, 0.08), new THREE.MeshStandardMaterial({
            color: 0x00ffff,
            emissive: 0x00ffff,
            emissiveIntensity: 0.6,
            metalness: 0.95
        }));
        visor.position.set(0, 3.5, 0.32);
        headGroup.add(visor);

        // الأذرع (Arms)
        function buildArm(side) {
            const armGroup = new THREE.Group();

            const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.22, 20, 20), matBody);
            shoulder.castShadow = true;
            armGroup.add(shoulder);

            const bicep = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.16, 0.75, 20), matBody);
            bicep.position.y = -0.48;
            bicep.castShadow = true;
            armGroup.add(bicep);

            const forearmGroup = new THREE.Group();
            forearmGroup.position.y = -0.95;

            const elbow = new THREE.Mesh(new THREE.SphereGeometry(0.17, 20, 20), matBody);
            elbow.castShadow = true;
            forearmGroup.add(elbow);

            const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.14, 0.8, 20), matBody);
            forearm.position.y = -0.45;
            forearm.castShadow = true;
            forearmGroup.add(forearm);

            const wrist = new THREE.Mesh(new THREE.SphereGeometry(0.15, 18, 18), matSkin);
            wrist.position.y = -0.95;
            wrist.castShadow = true;
            forearmGroup.add(wrist);

            const hand = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.22, 0.18), matSkin);
            hand.position.y = -1.05;
            hand.castShadow = true;
            forearmGroup.add(hand);

            armGroup.add(forearmGroup);
            armGroup.position.set(side * 0.55, 2.6, 0);

            return { armGroup, forearmGroup };
        }

        const rightArmData = buildArm(1);
        const leftArmData = buildArm(-1);
        torsoGroup.add(rightArmData.armGroup);
        torsoGroup.add(leftArmData.armGroup);

        // الأرجل (Legs)
        function buildLeg(side) {
            const legGroup = new THREE.Group();

            const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.2, 0.95, 20), matBody);
            thigh.position.y = -0.55;
            thigh.castShadow = true;
            legGroup.add(thigh);

            const shinGroup = new THREE.Group();
            shinGroup.position.y = -1.15;

            const knee = new THREE.Mesh(new THREE.SphereGeometry(0.18, 20, 20), matBody);
            knee.castShadow = true;
            shinGroup.add(knee);

            const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.16, 0.95, 20), matBody);
            shin.position.y = -0.5;
            shin.castShadow = true;
            shinGroup.add(shin);

            const ankle = new THREE.Mesh(new THREE.SphereGeometry(0.16, 18, 18), matSkin);
            ankle.position.y = -1.0;
            ankle.castShadow = true;
            shinGroup.add(ankle);

            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.15, 0.35), matBody);
            foot.position.set(0, -1.12, 0.1);
            foot.castShadow = true;
            shinGroup.add(foot);

            legGroup.add(shinGroup);
            legGroup.position.set(side * 0.25, 0.8, 0);

            return { legGroup, shinGroup };
        }

        const rightLegData = buildLeg(1);
        const leftLegData = buildLeg(-1);
        character.add(rightLegData.legGroup);
        character.add(leftLegData.legGroup);

        // ==========================================
        // 3. نظام الكاميرا السلس
        // ==========================================
        const cameraTarget = new THREE.Vector3();
        const cameraVelocity = new THREE.Vector3();
        const cameraSmoothing = 0.08;

        function updateCamera() {
            const targetOffset = new THREE.Vector3(0, 5.5, -14);
            targetOffset.applyQuaternion(character.quaternion);
            const targetPos = character.position.clone().add(targetOffset);

            cameraVelocity.copy(targetPos).sub(camera.position).multiplyScalar(cameraSmoothing);
            camera.position.add(cameraVelocity);

            const lookTarget = character.position.clone().add(new THREE.Vector3(0, 3.2, 0));
            camera.lookAt(lookTarget);
        }

        // ==========================================
        // 4. نظام الأهداف
        // ==========================================
        const targets = [];
        let score = 0;
        function spawnTarget() {
            const target = new THREE.Mesh(
                new THREE.SphereGeometry(1.2, 16, 16),
                new THREE.MeshStandardMaterial({
                    color: 0xff0055,
                    emissive: 0xff0055,
                    emissiveIntensity: 0.5,
                    metalness: 0.7
                })
            );
            const angle = Math.random() * Math.PI * 2;
            const dist = 35 + Math.random() * 70;
            target.position.set(Math.cos(angle)*dist, 2.2, Math.sin(angle)*dist);
            target.castShadow = true;
            scene.add(target);
            targets.push(target);
        }
        for(let i=0; i<20; i++) spawnTarget();

        // ==========================================
        // 5. نظام القذائف (Tracer + Explosion)
        // ==========================================
        const projectiles = [];
        const particles = [];
        const tracers = [];

        function fireProjectile(isRight) {
            const rayDir = new THREE.Vector3(0, 0, -1);
            rayDir.applyQuaternion(camera.quaternion);
            rayDir.normalize();

            const proj = new THREE.Mesh(
                new THREE.SphereGeometry(0.2, 10, 10),
                new THREE.MeshStandardMaterial({
                    color: 0xff3300,
                    emissive: 0xff3300,
                    emissiveIntensity: 1.0,
                    metalness: 0.95
                })
            );
            proj.position.copy(camera.position).add(rayDir.clone().multiplyScalar(5));
            proj.castShadow = true;
            scene.add(proj);

            projectiles.push({
                mesh: proj,
                vel: rayDir.multiplyScalar(1.0),
                life: 250,
                hasExploded: false,
                startPos: proj.position.clone()
            });

            // إضافة Tracer Trail
            addTracerTrail(proj.position.clone(), rayDir);
        }

        function addTracerTrail(startPos, direction) {
            const trailLength = 15;
            const trailPoints = [];
            for(let i=0; i<trailLength; i++) {
                trailPoints.push(startPos.clone().add(direction.clone().multiplyScalar(i * 0.3)));
            }

            const trailGeo = new THREE.BufferGeometry().setFromPoints(trailPoints);
            const trailMat = new THREE.LineBasicMaterial({
                color: 0xffff00,
                linewidth: 3,
                transparent: true,
                opacity: 0.8
            });
            const trail = new THREE.Line(trailGeo, trailMat);
            scene.add(trail);

            tracers.push({
                mesh: trail,
                life: 0,
                maxLife: 15
            });
        }

        function createExplosion(pos) {
            // انفجار متعدد الطبقات
            // الطبقة 1: لهب أحمر/أصفر
            for(let i=0; i<60; i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(0.08 + Math.random() * 0.12, 8, 8),
                    new THREE.MeshStandardMaterial({
                        color: [0xff0000, 0xff6600, 0xffff00][Math.floor(Math.random()*3)],
                        emissive: [0xff0000, 0xff6600, 0xffff00][Math.floor(Math.random()*3)],
                        emissiveIntensity: 1.0,
                        metalness: 0.6
                    })
                );
                p.position.copy(pos);
                scene.add(p);

                const angle = Math.random() * Math.PI * 2;
                const elevation = Math.random() * Math.PI - Math.PI / 2;
                const vel = new THREE.Vector3(
                    Math.cos(angle) * Math.cos(elevation),
                    Math.sin(elevation),
                    Math.sin(angle) * Math.cos(elevation)
                ).multiplyScalar(0.6 + Math.random() * 0.35);

                particles.push({
                    mesh: p,
                    vel: vel,
                    life: 0,
                    maxLife: 60,
                    friction: 0.94,
                    type: 'fire'
                });
            }

            // الطبقة 2: دخان رمادي
            for(let i=0; i<40; i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(0.15 + Math.random() * 0.2, 8, 8),
                    new THREE.MeshStandardMaterial({
                        color: 0x666666,
                        emissive: 0x333333,
                        emissiveIntensity: 0.2,
                        metalness: 0.1,
                        transparent: true,
                        opacity: 0.6
                    })
                );
                p.position.copy(pos);
                scene.add(p);

                const angle = Math.random() * Math.PI * 2;
                const elevation = Math.random() * Math.PI * 0.5;
                const vel = new THREE.Vector3(
                    Math.cos(angle) * Math.cos(elevation),
                    Math.sin(elevation),
                    Math.sin(angle) * Math.cos(elevation)
                ).multiplyScalar(0.3 + Math.random() * 0.2);

                particles.push({
                    mesh: p,
                    vel: vel,
                    life: 0,
                    maxLife: 80,
                    friction: 0.98,
                    type: 'smoke'
                });
            }

            // موجة صدمة
            const shockwave = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 20, 20),
                new THREE.MeshStandardMaterial({
                    color: 0xffff00,
                    emissive: 0xff6600,
                    emissiveIntensity: 1.0,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.9
                })
            );
            shockwave.position.copy(pos);
            scene.add(shockwave);

            particles.push({
                mesh: shockwave,
                vel: new THREE.Vector3(0, 0, 0),
                life: 0,
                maxLife: 20,
                isShockwave: true,
                initialScale: 0.5
            });
        }

        // ==========================================
        // 6. نظام التحكم
        // ==========================================
        const input = { forward: 0, side: 0, jump: false, throw: false };
        const joystick = { active: false, startX: 0, startY: 0 };
        const knob = document.getElementById('joystick-knob');

        document.getElementById('joystick-container').addEventListener('touchstart', (e) => {
            joystick.active = true;
            joystick.startX = e.touches[0].clientX;
            joystick.startY = e.touches[0].clientY;
        });

        window.addEventListener('touchmove', (e) => {
            if (!joystick.active) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystick.startX;
            let dy = touch.clientY - joystick.startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 50;
            if (dist > maxDist) {
                dx *= maxDist / dist;
                dy *= maxDist / dist;
            }
            knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            input.side = -dx / maxDist;
            input.forward = -dy / maxDist;
        });

        window.addEventListener('touchend', () => {
            joystick.active = false;
            knob.style.transform = `translate(-50%, -50%)`;
            input.forward = 0;
            input.side = 0;
        });

        document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); input.jump = true; });
        document.getElementById('btn-throw').addEventListener('touchstart', (e) => { e.preventDefault(); input.throw = true; });

        const keys = {};
        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // ==========================================
        // 7. منطق اللعبة (Double Jump + Flip)
        // ==========================================
        let state = 'idle';
        let animTime = 0;
        let verticalVel = 0;
        let isJumping = false;
        let jumpCount = 0; // 0: ground, 1: first jump, 2: double jump
        let flipRotation = 0;
        let throwTimer = 0;
        let throwSide = true;

        function lerp(a, b, t) { return a + (b - a) * Math.min(t, 1); }

        function checkCollision(pos, radius) {
            for(let obs of obstacles) {
                if(pos.distanceTo(obs.mesh.position) < radius + obs.radius) return true;
            }
            return false;
        }

        function updateLogic() {
            if (keys['KeyW']) input.forward = 1;
            else if (keys['KeyS']) input.forward = -1;
            else if (!joystick.active) input.forward = 0;

            if (keys['KeyA']) input.side = 1;
            else if (keys['KeyD']) input.side = -1;
            else if (!joystick.active) input.side = 0;

            if (keys['Space']) input.jump = true;
            if (keys['KeyF'] || keys['KeyT']) input.throw = true;

            // الحركة
            if (Math.abs(input.forward) > 0.1 || Math.abs(input.side) > 0.1) {
                const angle = Math.atan2(input.side, input.forward);
                character.rotation.y = angle;
                const speed = 0.28;
                const newPos = character.position.clone();
                newPos.x += Math.sin(character.rotation.y) * speed;
                newPos.z += Math.cos(character.rotation.y) * speed;
                
                if(!checkCollision(newPos, 1.2)) {
                    character.position.copy(newPos);
                }
                state = 'run';
            } else {
                state = 'idle';
            }

            // القفز المزدوج مع الشقلبة
            if (input.jump && jumpCount < 2) {
                if (jumpCount === 0) {
                    // القفزة الأولى
                    verticalVel = 0.38;
                    isJumping = true;
                    jumpCount = 1;
                } else if (jumpCount === 1) {
                    // القفزة الثانية (Double Jump)
                    verticalVel = 0.35;
                    jumpCount = 2;
                    state = 'flip';
                }
                input.jump = false;
            }

            if (isJumping || jumpCount > 0) {
                character.position.y += verticalVel;
                verticalVel -= 0.022;

                // الشقلبة الهوائية
                if (state === 'flip') {
                    flipRotation += 0.15; // دوران الشقلبة
                    torsoGroup.rotation.x = flipRotation;
                }

                if (character.position.y <= 0) {
                    character.position.y = 0;
                    isJumping = false;
                    jumpCount = 0;
                    flipRotation = 0;
                    torsoGroup.rotation.x = 0;
                    state = 'idle';

                    // تأثير الهبوط
                    createLandingEffect();
                }
            }

            // الرمي
            if (input.throw && throwTimer <= 0) {
                fireProjectile(throwSide);
                throwSide = !throwSide;
                throwTimer = 30;
                input.throw = false;
            }
            if (throwTimer > 0) throwTimer--;

            // تحديث الكاميرا
            updateCamera();

            // القذائف
            for(let i=projectiles.length-1; i>=0; i--) {
                const p = projectiles[i];
                p.mesh.position.add(p.vel);
                p.life--;

                targets.forEach((t, idx) => {
                    if (p.mesh.position.distanceTo(t.position) < 1.7) {
                        createExplosion(t.position);
                        scene.remove(t);
                        targets.splice(idx, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                        spawnTarget();
                        p.life = 0;
                    }
                });

                if (p.mesh.position.y < 0.3 && !p.hasExploded) {
                    createExplosion(p.mesh.position);
                    p.hasExploded = true;
                    p.life = 0;
                }

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    projectiles.splice(i, 1);
                }
            }

            // Tracers
            for(let i=tracers.length-1; i>=0; i--) {
                const t = tracers[i];
                t.life++;
                if (t.life >= t.maxLife) {
                    scene.remove(t.mesh);
                    tracers.splice(i, 1);
                }
            }

            // الجزيئات
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                if(p.isShockwave) {
                    const progress = p.life / p.maxLife;
                    p.mesh.scale.set(1 + progress * 5, 1 + progress * 5, 1 + progress * 5);
                    p.mesh.material.opacity = 0.9 * (1 - progress);
                } else {
                    p.mesh.position.add(p.vel);
                    p.vel.multiplyScalar(p.friction);
                    p.vel.y -= 0.008;
                    p.life++;
                    if (p.type === 'smoke') {
                        p.mesh.scale.multiplyScalar(1.02);
                    }
                    if (p.life > p.maxLife * 0.5) {
                        p.mesh.material.opacity = 1 - (p.life - p.maxLife * 0.5) / (p.maxLife * 0.5);
                        p.mesh.material.transparent = true;
                    }
                }
                if (p.life >= p.maxLife) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
        }

        function createLandingEffect() {
            // تأثير الهبوط
            for(let i=0; i<20; i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(0.05 + Math.random() * 0.08, 6, 6),
                    new THREE.MeshStandardMaterial({
                        color: 0xcccccc,
                        emissive: 0x666666,
                        emissiveIntensity: 0.3
                    })
                );
                p.position.copy(character.position);
                scene.add(p);

                const angle = Math.random() * Math.PI * 2;
                const vel = new THREE.Vector3(
                    Math.cos(angle) * 0.3,
                    0.2 + Math.random() * 0.1,
                    Math.sin(angle) * 0.3
                );

                particles.push({
                    mesh: p,
                    vel: vel,
                    life: 0,
                    maxLife: 30,
                    friction: 0.92
                });
            }
        }

        function updateAnimations() {
            const s = 0.22;
            if (state === 'idle') {
                rightArmData.armGroup.rotation.x = lerp(rightArmData.armGroup.rotation.x, Math.sin(animTime * 0.3) * 0.08, s);
                leftArmData.armGroup.rotation.x = lerp(leftArmData.armGroup.rotation.x, -Math.sin(animTime * 0.3) * 0.08, s);
                rightArmData.forearmGroup.rotation.x = lerp(rightArmData.forearmGroup.rotation.x, -0.2, s);
                leftArmData.forearmGroup.rotation.x = lerp(leftArmData.forearmGroup.rotation.x, -0.2, s);
                rightLegData.legGroup.rotation.x = lerp(rightLegData.legGroup.rotation.x, 0, s);
                leftLegData.legGroup.rotation.x = lerp(leftLegData.legGroup.rotation.x, 0, s);
                rightLegData.shinGroup.rotation.x = lerp(rightLegData.shinGroup.rotation.x, 0, s);
                leftLegData.shinGroup.rotation.x = lerp(leftLegData.shinGroup.rotation.x, 0, s);
            } else if (state === 'run') {
                const t = animTime * 6.5;
                rightLegData.legGroup.rotation.x = lerp(rightLegData.legGroup.rotation.x, Math.sin(t) * 0.85, s);
                leftLegData.legGroup.rotation.x = lerp(leftLegData.legGroup.rotation.x, -Math.sin(t) * 0.85, s);
                rightLegData.shinGroup.rotation.x = lerp(rightLegData.shinGroup.rotation.x, Math.max(0, -Math.sin(t)) * 0.95, s);
                leftLegData.shinGroup.rotation.x = lerp(leftLegData.shinGroup.rotation.x, Math.max(0, Math.sin(t)) * 0.95, s);
                
                rightArmData.armGroup.rotation.x = lerp(rightArmData.armGroup.rotation.x, Math.sin(t) * 0.75, s);
                leftArmData.armGroup.rotation.x = lerp(leftArmData.armGroup.rotation.x, -Math.sin(t) * 0.75, s);
                rightArmData.forearmGroup.rotation.x = lerp(rightArmData.forearmGroup.rotation.x, -1.15, s);
                leftArmData.forearmGroup.rotation.x = lerp(leftArmData.forearmGroup.rotation.x, -1.15, s);
            } else if (state === 'jump' || state === 'flip') {
                rightArmData.armGroup.rotation.x = lerp(rightArmData.armGroup.rotation.x, 0.8, s);
                leftArmData.armGroup.rotation.x = lerp(leftArmData.armGroup.rotation.x, 0.8, s);
                rightArmData.forearmGroup.rotation.x = lerp(rightArmData.forearmGroup.rotation.x, -1.3, s);
                leftArmData.forearmGroup.rotation.x = lerp(leftArmData.forearmGroup.rotation.x, -1.3, s);
                rightLegData.legGroup.rotation.x = lerp(rightLegData.legGroup.rotation.x, -0.5, s);
                leftLegData.legGroup.rotation.x = lerp(leftLegData.legGroup.rotation.x, -0.5, s);
                rightLegData.shinGroup.rotation.x = lerp(rightLegData.shinGroup.rotation.x, 0.8, s);
                leftLegData.shinGroup.rotation.x = lerp(leftLegData.shinGroup.rotation.x, 0.8, s);
            }

            if(throwTimer > 16) {
                const throwProgress = (30 - throwTimer) / 14;
                if(throwSide) {
                    rightArmData.armGroup.rotation.x = lerp(rightArmData.armGroup.rotation.x, -1.25 + throwProgress * 0.5, s);
                    rightArmData.armGroup.rotation.z = lerp(rightArmData.armGroup.rotation.z, -0.35, s);
                    rightArmData.forearmGroup.rotation.x = lerp(rightArmData.forearmGroup.rotation.x, -1.75, s);
                } else {
                    leftArmData.armGroup.rotation.x = lerp(leftArmData.armGroup.rotation.x, -1.25 + throwProgress * 0.5, s);
                    leftArmData.armGroup.rotation.z = lerp(leftArmData.armGroup.rotation.z, 0.35, s);
                    leftArmData.forearmGroup.rotation.x = lerp(leftArmData.forearmGroup.rotation.x, -1.75, s);
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            animTime += 0.016;
            updateLogic();
            updateAnimations();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
