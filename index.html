<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>القزم الغامض بالقنبلة - Three.js</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>

<script>
    // --- 1. إعداد المشهد والكاميرا ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x010101); // خلفية سوداء نقية

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.3, 3.8); // زاوية عرض ممتازة

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- 2. الإضاءة المحسنة ---
    // ضوء محيطي ناعم
    const ambient = new THREE.AmbientLight(0xffffff, 0.5); 
    scene.add(ambient);

    // ضوء أمامي قوي لإبراز المجسم
    const frontLight = new THREE.DirectionalLight(0xffffff, 1);
    frontLight.position.set(1, 1.5, 3);
    scene.add(frontLight);

    // ضوء خلفي (Rim Light) لخلق هالة غامضة
    const rimLight = new THREE.SpotLight(0xffffff, 0.6);
    rimLight.position.set(0, 4, -2);
    rimLight.angle = Math.PI / 4;
    scene.add(rimLight);

    // --- 3. المواد (Materials) ---
    // مادة ناعمة ولامعة قليلاً للأطراف والحوض
    const smoothMat = new THREE.MeshStandardMaterial({ 
        color: 0x222222, 
        roughness: 0.65, 
        metalness: 0.1 
    });
    const hatMat = new THREE.MeshStandardMaterial({ color: 0x330000, roughness: 0.85 });

    // --- 4. بناء الشخصية الهيكلية (Group) ---
    const dwarf = new THREE.Group();

    // الجسم والجزء العلوي (أسود مع خف خفيف)
    const upperBodyGeo = new THREE.SphereGeometry(0.55, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2);
    const upperBody = new THREE.Mesh(upperBodyGeo, new THREE.MeshStandardMaterial({ color: 0x1a1a1a }));
    upperBody.scale.y = 1.05;
    upperBody.position.y = 0.5;
    dwarf.add(upperBody);

    // الرأس المدمج
    const headGeo = new THREE.CylinderGeometry(0.2, 0.35, 0.3, 16);
    const head = new THREE.Mesh(headGeo, smoothMat);
    head.position.y = 0.7; // متداخل قليلاً
    dwarf.add(head);

    // القبعة المخروطية المائلة
    const hatGeo = new THREE.ConeGeometry(0.48, 1.3, 32);
    const hat = new THREE.Mesh(hatGeo, hatMat);
    hat.position.y = 1.45; // فوق الرأس المندمج
    hat.rotation.z = 0.28; 
    hat.rotation.x = -0.05; // إمالة خفيفة للامام
    dwarf.add(hat);

    // --- 5. الأطراف المتصلة والمدمجة ---

    // الذراع اليسرى (التي تحمل القنبلة)
    const armGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.55, 16);
    const leftArm = new THREE.Mesh(armGeo, smoothMat);
    leftArm.position.set(-0.65, 0.25, 0.2);
    leftArm.rotation.z = Math.PI / 2.8; // زاوية ميل الذراع
    leftArm.rotation.y = 0.15; // إمالة بسيطة للامام
    dwarf.add(leftArm);

    // الكف الأيسر (بيضوي ومندمج)
    const palmGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const leftPalm = new THREE.Mesh(palmGeo, smoothMat);
    leftPalm.scale.set(1, 1.4, 0.8);
    leftPalm.position.set(-0.88, 0.1, 0.25); // متداخل مع نهاية الذراع
    leftPalm.rotation.z = Math.PI / 2.2;
    dwarf.add(leftPalm);

    // الذراع اليمنى (للموازنة)
    const rightArm = new THREE.Mesh(armGeo, smoothMat);
    rightArm.position.set(0.62, 0.25, 0.2);
    rightArm.rotation.z = -Math.PI / 3;
    rightArm.rotation.y = -0.15;
    dwarf.add(rightArm);

    // الكف الأيمن
    const rightPalm = new THREE.Mesh(palmGeo, smoothMat);
    rightPalm.scale.set(1, 1.4, 0.8);
    rightPalm.position.set(0.85, 0.1, 0.25); 
    rightPalm.rotation.z = -Math.PI / 2.2;
    dwarf.add(rightPalm);

    // الساقين والقدمين
    const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.45, 16);
    const footGeo = new THREE.BoxGeometry(0.35, 0.15, 0.5);

    function createLegAndFoot(x, flip = false) {
        const group = new THREE.Group();
        const leg = new THREE.Mesh(legGeo, smoothMat);
        leg.position.y = 0.2;
        group.add(leg);

        const foot = new THREE.Mesh(footGeo, smoothMat);
        foot.position.y = 0; // تحت الساق
        group.add(foot);

        group.position.set(x, -0.62, 0.1);
        dwarf.add(group);
    }
    createLegAndFoot(-0.35);
    createLegAndFoot(0.35);

    // --- 6. القنبلة المضافة ---
    const bombGroup = new THREE.Group();
    const bombBody = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 32, 32), 
        new THREE.MeshStandardMaterial({color: 0x010101, roughness: 0.1, metalness: 0.2})
    );
    
    // الفتيل المنحني
    const curve = new THREE.QuadraticBezierCurve3(
        new THREE.Vector3(0, 0.25, 0),
        new THREE.Vector3(0.08, 0.48, 0),
        new THREE.Vector3(0.28, 0.48, 0)
    );
    const fuseGeo = new THREE.TubeGeometry(curve, 10, 0.02, 8, false);
    const fuse = new THREE.Mesh(fuseGeo, new THREE.MeshBasicMaterial({ color: 0xeeeeee }));
    
    bombGroup.add(bombBody, fuse);
    bombGroup.position.set(-0.9, 0.35, 0.38); // وضعها في اليد اليسرى
    bombGroup.rotation.y = 0.15; // إمالة خفيفة
    dwarf.add(bombGroup);

    scene.add(dwarf);

    // --- 7. حلقة التحريك والتفاعل ---
    function animate() {
        requestAnimationFrame(animate);
        
        const t = Date.now() * 0.001;
        
        // تمايل جانبي خفيف
        dwarf.rotation.y = Math.sin(t * 0.5) * 0.06;
        
        renderer.render(scene, camera);
    }

    // التعامل مع تغيير حجم النافذة
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
