<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dwarf Bomber Pro - Frontend Test</title>
    <style>
        :root { --accent: #ffaa44; --panel: rgba(0, 15, 10, 0.8); }
        body { margin: 0; overflow: hidden; background: #051a10; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }

        /* UI Layer */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .stats-box { position: absolute; top: 20px; left: 20px; background: var(--panel); color: white; padding: 12px 20px; border-radius: 15px; border-left: 4px solid var(--accent); pointer-events: auto; }
        
        /* Joystick Pro */
        .joy-area { position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 1px solid rgba(255,170,68,0.2); pointer-events: auto; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; background: radial-gradient(circle, var(--accent), #cc7722); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        /* Buttons */
        .actions { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 20px; pointer-events: auto; }
        .btn { width: 80px; height: 80px; border-radius: 50%; border: none; background: var(--panel); color: var(--accent); font-weight: bold; font-size: 14px; border: 2px solid var(--accent); cursor: pointer; transition: 0.1s; }
        .btn:active { transform: scale(0.9); background: var(--accent); color: black; }
        
        #loading { position: fixed; inset: 0; background: #051a10; display: flex; justify-content: center; align-items: center; color: var(--accent); z-index: 100; font-size: 20px; }
    </style>
</head>
<body>

    <div id="loading">جاري تحضير البيئة الاحترافية...</div>

    <div id="hud">
        <div class="stats-box">
            <div style="font-size: 12px; opacity: 0.7;">وضع التجربة المحلية</div>
            <div id="p-name">Dwarf_Warrior #1</div>
            <div style="color: var(--accent); font-weight: bold; margin-top: 5px;">النقاط: <span id="score">0</span></div>
        </div>

        <div class="joy-area" id="joy-base">
            <div id="joy-stick"></div>
        </div>

        <div class="actions">
            <button class="btn" id="btn-jump">قفز (J)</button>
            <button class="btn" id="btn-fire" style="background: var(--accent); color: black;">قنبلة (F)</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        class ProGame {
            constructor() {
                this.initEngine();
                this.initWorld();
                this.initPlayer();
                this.initInputs();
                this.animate();
                document.getElementById('loading').style.display = 'none';
            }

            initEngine() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x0a1f15);
                this.scene.fog = new THREE.FogExp2(0x0a1f15, 0.03);

                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                document.body.appendChild(this.renderer.domElement);

                const ambient = new THREE.AmbientLight(0xffffff, 0.4);
                this.scene.add(ambient);

                const sun = new THREE.DirectionalLight(0xffaa55, 1);
                sun.position.set(10, 20, 10);
                sun.castShadow = true;
                this.scene.add(sun);
            }

            initWorld() {
                // أرضية شبكية احترافية
                const ground = new THREE.Mesh(
                    new THREE.PlaneGeometry(200, 200),
                    new THREE.MeshStandardMaterial({ color: 0x152b1e, roughness: 0.8 })
                );
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                this.scene.add(ground);

                const grid = new THREE.GridHelper(200, 40, 0x224433, 0x112211);
                this.scene.add(grid);

                // ماركر الهدف (Predictor)
                const markerGeo = new THREE.RingGeometry(0.8, 1.2, 32);
                const markerMat = new THREE.MeshBasicMaterial({ color: 0xffaa44, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
                this.predictor = new THREE.Mesh(markerGeo, markerMat);
                this.predictor.rotation.x = -Math.PI / 2;
                this.predictor.position.y = 0.1;
                this.scene.add(this.predictor);
            }

            initPlayer() {
                // تمثيل اللاعب (Gnome Placeholder)
                this.player = new THREE.Group();
                const body = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.5, 0.7, 1.5, 8),
                    new THREE.MeshStandardMaterial({ color: 0xffaa44 })
                );
                body.position.y = 0.75;
                body.castShadow = true;
                this.player.add(body);
                
                // اتجاه الوجه
                const eye = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.2), new THREE.MeshBasicMaterial({color: 0x000000}));
                eye.position.set(0, 1.2, 0.4);
                this.player.add(eye);

                this.scene.add(this.player);
                
                this.moveDir = new THREE.Vector2();
                this.isJumping = false;
                this.vVel = 0;
            }

            initInputs() {
                const base = document.getElementById('joy-base');
                const stick = document.getElementById('joy-stick');
                
                const updateJoy = (x, y) => {
                    const rect = base.getBoundingClientRect();
                    const cx = rect.left + rect.width/2;
                    const cy = rect.top + rect.height/2;
                    const dx = x - cx;
                    const dy = y - cy;
                    const dist = Math.min(Math.hypot(dx, dy), 60);
                    const angle = Math.atan2(dy, dx);
                    
                    stick.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
                    
                    this.moveDir.set(Math.cos(angle) * (dist/60), -Math.sin(angle) * (dist/60));
                };

                base.addEventListener('touchstart', (e) => updateJoy(e.touches[0].clientX, e.touches[0].clientY));
                window.addEventListener('touchmove', (e) => updateJoy(e.touches[0].clientX, e.touches[0].clientY));
                window.addEventListener('touchend', () => {
                    stick.style.transform = 'translate(-50%, -50%)';
                    this.moveDir.set(0, 0);
                });

                document.getElementById('btn-fire').onclick = () => this.fire();
                document.getElementById('btn-jump').onclick = () => this.jump();
            }

            jump() {
                if(!this.isJumping) {
                    this.vVel = 0.3;
                    this.isJumping = true;
                }
            }

            fire() {
                const bomb = new THREE.Mesh(
                    new THREE.SphereGeometry(0.4),
                    new THREE.MeshStandardMaterial({ color: 0x222222, emissive: 0xff0000 })
                );
                bomb.position.copy(this.player.position).add(new THREE.Vector3(0, 1.5, 0));
                this.scene.add(bomb);

                const force = 15;
                const angle = 0.8;
                const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(this.player.quaternion);
                
                let t = 0;
                const startPos = bomb.position.clone();
                const throwInterval = setInterval(() => {
                    t += 0.03;
                    bomb.position.x = startPos.x + forward.x * force * t;
                    bomb.position.z = startPos.z + forward.z * force * t;
                    bomb.position.y = startPos.y + (Math.sin(angle) * force * t) - (0.5 * 9.8 * t * t);

                    if(bomb.position.y <= 0.2) {
                        this.createExplosion(bomb.position);
                        this.scene.remove(bomb);
                        clearInterval(throwInterval);
                    }
                }, 20);
            }

            createExplosion(pos) {
                const flash = new THREE.PointLight(0xffaa00, 5, 10);
                flash.position.copy(pos);
                this.scene.add(flash);
                setTimeout(() => this.scene.remove(flash), 100);
            }

            update() {
                // حركة اللاعب
                if(this.moveDir.length() > 0.1) {
                    const speed = 0.15;
                    this.player.position.x += this.moveDir.x * speed;
                    this.player.position.z -= this.moveDir.y * speed;
                    this.player.rotation.y = Math.atan2(this.moveDir.x, this.moveDir.y);
                }

                // فيزياء القفز
                if(this.isJumping) {
                    this.player.position.y += this.vVel;
                    this.vVel -= 0.015;
                    if(this.player.position.y <= 0) {
                        this.player.position.y = 0;
                        this.isJumping = false;
                    }
                }

                // تحديث الماركر (Prediction)
                const forward = new THREE.Vector3(0,0,1).applyQuaternion(this.player.quaternion);
                this.predictor.position.set(
                    this.player.position.x + forward.x * 12, // مسافة تقريبية
                    0.1,
                    this.player.position.z + forward.z * 12
                );
                this.predictor.material.opacity = 0.3 + Math.sin(Date.now()*0.01)*0.2;

                // كاميرا احترافية
                const camOffset = new THREE.Vector3(0, 8, 12);
                this.camera.position.lerp(this.player.position.clone().add(camOffset), 0.1);
                this.camera.lookAt(this.player.position);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        const game = new ProGame();
    </script>
</body>
</html>
