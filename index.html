<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المحارب المدرع - فيزياء احترافية</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #fff;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.92);
            padding: 12px 20px;
            border-radius: 12px;
            border-left: 5px solid #d35400;
            z-index: 100;
            direction: rtl;
        }
        #controls-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 100;
        }
        .ctrl-btn {
            background: #1e2a3a;
            color: #fff;
            border: 2px solid transparent;
            border-radius: 14px;
            padding: 10px 22px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .ctrl-btn.active {
            background: #d35400;
            border-color: #f39c12;
            box-shadow: 0 0 15px rgba(211, 84, 0, 0.4);
        }
        #state-label {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #1e2a3a;
            color: #f39c12;
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: 700;
            direction: rtl;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info-panel">
        <h1 style="margin:0; font-size:1.2rem; color:#c4450c;">⚔️ HEAVY VANGUARD</h1>
        <p style="margin:5px 0 0; font-size:0.8rem;">محاكاة فيزيائية: رمي دقيق • ركض ثقيل • هبوط ناعم</p>
    </div>
    <div id="state-label">🧍 وقوف</div>
    <div id="controls-panel">
        <button class="ctrl-btn" id="btn-idle">🧍 وقوف</button>
        <button class="ctrl-btn" id="btn-run">🏃 ركض</button>
        <button class="ctrl-btn" id="btn-jump">⬆️ قفز</button>
        <button class="ctrl-btn" id="btn-throw">🎯 رمي</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // 1. المشهد والإضاءة (نفس الإعدادات الأصلية)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(7, 4, 10);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 2, 0);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.0);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        scene.add(mainLight, new THREE.AmbientLight(0xffffff, 0.6));

        // 2. المواد (نفس الألوان الأصلية)
        const matArmor = new THREE.MeshStandardMaterial({ color: 0x2c3e50, metalness: 0.85, roughness: 0.2 });
        const matJoint = new THREE.MeshStandardMaterial({ color: 0xe67e22, metalness: 0.6 });
        const matSoftJoint = new THREE.MeshStandardMaterial({ color: 0xbc6c25, metalness: 0.5 });
        const matProjectile = new THREE.MeshStandardMaterial({ color: 0xff3300, emissive: 0xff1100, emissiveIntensity: 0.8 });

        // 3. بناء الشخصية (الحفاظ على الهيكل الأصلي بالكامل)
        const character = new THREE.Group();
        scene.add(character);

        const torsoGroup = new THREE.Group();
        character.add(torsoGroup);

        // الجذع والدروع
        const upperT = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.5, 1.0, 24), matArmor);
        upperT.position.y = 2.4; upperT.castShadow = true;
        torsoGroup.add(upperT);
        
        const lowerT = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 0.8, 24), matArmor);
        lowerT.position.y = 1.6; lowerT.castShadow = true;
        torsoGroup.add(lowerT);

        // الرأس
        const headGroup = new THREE.Group();
        torsoGroup.add(headGroup);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.55, 0.55), matArmor);
        head.position.y = 3.25; head.castShadow = true;
        headGroup.add(head);

        // الأذرع
        function buildArm(side) {
            const arm = new THREE.Group();
            const bicep = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.2, 0.85), matArmor);
            bicep.position.y = -0.55; arm.add(bicep);
            const fore = new THREE.Group();
            fore.position.y = -1.02;
            const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.22, 0.9), matArmor);
            forearm.position.y = -0.48; fore.add(forearm);
            const hand = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.28, 0.32), matJoint);
            hand.position.y = -1.06; fore.add(hand);
            arm.add(fore);
            arm.position.set(side * 1.15, 2.7, 0);
            return { arm, fore };
        }
        const rArmData = buildArm(1); const lArmData = buildArm(-1);
        torsoGroup.add(rArmData.arm, lArmData.arm);

        // الأرجل
        function buildLeg(side) {
            const leg = new THREE.Group();
            const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.37, 0.28, 1.1), matArmor);
            thigh.position.y = -0.65; leg.add(thigh);
            const shinG = new THREE.Group();
            shinG.position.y = -1.22;
            const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.22, 1.1), matArmor);
            shin.position.y = -0.56; shinG.add(shin);
            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.26, 0.95), matArmor);
            foot.position.set(0, -1.22, 0.22); shinG.add(foot);
            leg.add(shinG);
            leg.position.set(side * 0.55, 1.3, 0);
            return { leg, shinG };
        }
        const rLegData = buildLeg(1); const lLegData = buildLeg(-1);
        character.add(rLegData.leg, lLegData.leg);

        // 4. نظام القذائف
        const projectiles = [];
        function fire(pos, dir) {
            const p = new THREE.Mesh(new THREE.SphereGeometry(0.12), matProjectile);
            p.position.copy(pos);
            scene.add(p);
            projectiles.push({ mesh: p, vel: dir.multiplyScalar(0.25), life: 0 });
        }

        // 5. محرك الحركات الفيزيائي
        let state = 'idle';
        let time = 0;
        const rot = { tX:0, rAX:0, lAX:0, rFX:0, lFX:0, rLX:0, lLX:0, rSX:0, lSX:0, y:0 };
        const lerp = (a, b, t) => a + (b - a) * t;

        function updateAnim() {
            time += 0.016;
            const s = 0.15; // سرعة الانتقال السلس

            if (state === 'idle') {
                rot.y = Math.sin(time * 2) * 0.01; // تنفس
                rot.tX = lerp(rot.tX, 0, s);
                rot.rAX = lerp(rot.rAX, 0.1, s);
                rot.lAX = lerp(rot.lAX, 0.1, s);
                rot.rLX = lerp(rot.rLX, 0, s);
                rot.lLX = lerp(rot.lLX, 0, s);
                rot.rSX = lerp(rot.rSX, 0, s);
                rot.lSX = lerp(rot.lSX, 0, s);
                character.rotation.y += 0.003;
            } 
            else if (state === 'run') {
                const cycle = time * 12;
                rot.y = Math.abs(Math.sin(cycle * 0.5)) * 0.15; // قفزة الركض
                rot.tX = 0.15 + Math.sin(cycle * 0.5) * 0.05; // ميلان للأمام
                
                rot.rLX = Math.sin(cycle * 0.5) * 0.7;
                rot.lLX = Math.sin(cycle * 0.5 + Math.PI) * 0.7;
                
                // الركبة تنثني فقط عند العودة للخلف (فيزياء حقيقية)
                rot.rSX = Math.max(0, -Math.sin(cycle * 0.5 - 0.5)) * 0.8;
                rot.lSX = Math.max(0, -Math.sin(cycle * 0.5 + Math.PI - 0.5)) * 0.8;
                
                rot.rAX = -Math.sin(cycle * 0.5) * 0.6;
                rot.lAX = Math.sin(cycle * 0.5) * 0.6;
                rot.rFX = 0.6; rot.lFX = 0.6;
            }
            else if (state === 'throw') {
                const t = (time * 5) % 10;
                if (t < 4) { // شحن الرمية
                    rot.rAX = lerp(rot.rAX, -2.2, 0.2);
                    rot.rFX = lerp(rot.rFX, -0.8, 0.2);
                    rot.tX = -0.2;
                } else if (t < 6) { // الإطلاق
                    rot.rAX = lerp(rot.rAX, 1.2, 0.5);
                    rot.rFX = lerp(rot.rFX, 0.5, 0.5);
                    rot.tX = 0.3;
                    if (t > 4.2 && t < 4.5) { // توقيت خروج القذيفة
                        const wp = new THREE.Vector3();
                        rArmData.fore.getWorldPosition(wp);
                        fire(wp, new THREE.Vector3(0, 0.4, 1).normalize());
                    }
                } else { state = 'idle'; }
            }
            else if (state === 'jump') {
                const jt = (time * 3) % Math.PI;
                rot.y = Math.sin(jt) * 2;
                rot.rSX = 0.8; rot.lSX = 0.8; // وضعية الانكماش
                if (jt > 2.8) state = 'idle';
            }

            // تطبيق القيم على الموديل
            torsoGroup.rotation.x = rot.tX;
            rArmData.arm.rotation.x = rot.rAX;
            lArmData.arm.rotation.x = rot.lAX;
            rArmData.fore.rotation.x = rot.rFX;
            lArmData.fore.rotation.x = rot.lFX;
            rLegData.leg.rotation.x = rot.rLX;
            lLegData.leg.rotation.x = rot.lLX;
            rLegData.shinG.rotation.x = rot.rSX;
            lLegData.shinG.rotation.x = rot.lSX;
            character.position.y = rot.y;
        }

        function animate() {
            requestAnimationFrame(animate);
            updateAnim();
            projectiles.forEach((p, i) => {
                p.vel.y -= 0.008; // جاذبية
                p.mesh.position.add(p.vel);
                if (p.mesh.position.y < -1) { scene.remove(p.mesh); projectiles.splice(i, 1); }
            });
            controls.update();
            renderer.render(scene, camera);
        }

        // إعداد الأزرار
        const btns = { idle: 'btn-idle', run: 'btn-run', jump: 'btn-jump', throw: 'btn-throw' };
        Object.keys(btns).forEach(k => {
            document.getElementById(btns[k]).onclick = () => {
                state = k; time = 0;
                document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(btns[k]).classList.add('active');
                document.getElementById('state-label').innerText = document.getElementById(btns[k]).innerText;
            };
        });

        animate();
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
