<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gnome Viewer - Professional</title>
    <style>
        body { margin: 0; background-color: #f0f0f0; overflow: hidden; font-family: sans-serif; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #333; font-weight: bold; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="loading">جاري تحميل القزم...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;

        function init() {
            // 1. المشهد
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xeeeeee);

            // 2. الكاميرا
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.2, 3.5);

            // 3. المحرك (Renderer)
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.toneMapping = THREE.ReinhardToneMapping; // لتحسين جودة الألوان
            document.body.appendChild(renderer.domElement);

            // 4. التحكم (OrbitControls)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(0, 0.8, 0);

            // 5. الإضاءة الاحترافية
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(2, 5, 2);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // 6. تحميل ملف الـ GLB
            const loader = new GLTFLoader();
            // استبدل هذا المسار بمسار ملفك على GitHub
            loader.load('./models/gnome.glb', (gltf) => {
                const model = gltf.scene;
                
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                scene.add(model);
                document.getElementById('loading').style.display = 'none';
                console.log("تم تحميل الموديل بنجاح");
            }, 
            (xhr) => {
                // تتبع نسبة التحميل
                console.log((xhr.loaded / xhr.total * 100) + '% loaded');
            },
            (error) => {
                console.error("حدث خطأ:", error);
                document.getElementById('loading').innerText = "خطأ في التحميل (تأكد من وجود ملف gnome.glb في مجلد models)";
            });

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
