<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Character Controller - Professional Soldier/Dwarf Model</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
            pointer-events: none;
            font-size: 12px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #ff0;
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        🎮 RAW CHARACTER MODULE<br>
        Model: RobotExpressive.glb | All animations included
    </div>
    <div id="controls">
        ⌨️ WASD = Move | SPACE = Jump | F = Attack/Throw<br>
        🖱️ Drag mouse to rotate camera (optional)
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ============================================
        // RAW CHARACTER SETUP - CLEAN VERSION
        // ============================================
        
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        scene.fog = new THREE.FogExp2(0x111122, 0.008);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 8);
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // Optional Orbit Controls for debugging (comment if not needed)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.target.set(0, 1.5, 0);
        
        // ============================================
        // LIGHTING
        // ============================================
        const ambientLight = new THREE.AmbientLight(0x404060, 0.7);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        mainLight.position.set(10, 20, 5);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 30;
        mainLight.shadow.camera.left = -10;
        mainLight.shadow.camera.right = 10;
        mainLight.shadow.camera.top = 10;
        mainLight.shadow.camera.bottom = -10;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.4);
        fillLight.position.set(-3, 2, 4);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffaa66, 0.3);
        backLight.position.set(0, 2, -5);
        scene.add(backLight);
        
        // Ground helper (simple grid)
        const gridHelper = new THREE.GridHelper(50, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(50, 50),
            new THREE.MeshStandardMaterial({ color: 0x226622, roughness: 0.8, metalness: 0.1 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // ============================================
        // THE CHARACTER - RAW MODEL LOADER
        // ============================================
        
        // Character properties
        let character = null;
        let mixer = null;
        let animations = {};
        let currentAction = null;
        
        // Movement state
        const moveState = {
            forward: false,
            backward: false,
            left: false,
            right: false,
            jump: false,
            attack: false,
            velocityY: 0,
            isGrounded: true,
            jumpCount: 0,
            position: new THREE.Vector3(0, 0, 0)
        };
        
        // Movement speed
        const WALK_SPEED = 4.5;
        const RUN_SPEED = 7.5;
        const JUMP_FORCE = 0.42;
        const GRAVITY = 0.022;
        
        // Load the professional model
        const loader = new GLTFLoader();
        const MODEL_URL = 'https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb';
        
        loader.load(MODEL_URL, (gltf) => {
            character = gltf.scene;
            
            // Scale to desired size (adjust for dwarf or soldier)
            character.scale.set(0.8, 0.8, 0.8);
            character.position.y = 0;
            
            // Enable shadows
            character.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                }
            });
            
            scene.add(character);
            
            // Setup animation mixer
            mixer = new THREE.AnimationMixer(character);
            
            // Load all animations
            gltf.animations.forEach((clip) => {
                const action = mixer.clipAction(clip);
                animations[clip.name] = action;
                console.log('✅ Animation loaded:', clip.name);
            });
            
            // Start with idle animation
            if (animations['Idle']) {
                currentAction = animations['Idle'];
                currentAction.play();
            }
            
            console.log('✅ Character model loaded successfully!');
            
        }, undefined, (error) => {
            console.error('❌ Error loading model:', error);
            createPlaceholderCharacter();
        });
        
        // Fallback placeholder character if model fails to load
        function createPlaceholderCharacter() {
            character = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 1.4, 0.6),
                new THREE.MeshStandardMaterial({ color: 0x44aa88, roughness: 0.3 })
            );
            body.castShadow = true;
            body.position.y = 0.7;
            character.add(body);
            
            // Head
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.5),
                new THREE.MeshStandardMaterial({ color: 0xffccaa })
            );
            head.castShadow = true;
            head.position.y = 1.45;
            character.add(head);
            
            scene.add(character);
            console.log('⚠️ Using placeholder character');
        }
        
        // ============================================
        // INPUT HANDLING (Keyboard)
        // ============================================
        const keyState = {};
        
        window.addEventListener('keydown', (e) => {
            keyState[e.code] = true;
            
            // Prevent default for game keys
            if (e.code === 'Space' || e.code === 'KeyF') {
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keyState[e.code] = false;
        });
        
        function updateInput() {
            // Movement
            moveState.forward = keyState['KeyW'] || false;
            moveState.backward = keyState['KeyS'] || false;
            moveState.left = keyState['KeyA'] || false;
            moveState.right = keyState['KeyD'] || false;
            
            // Jump
            if (keyState['Space'] && !moveState.jump) {
                moveState.jump = true;
            }
            
            // Attack / Throw
            if (keyState['KeyF'] && !moveState.attack) {
                moveState.attack = true;
            }
        }
        
        // ============================================
        // ANIMATION MANAGEMENT
        // ============================================
        function updateAnimation() {
            if (!mixer || !animations) return;
            
            const isMoving = moveState.forward || moveState.backward || moveState.left || moveState.right;
            const isJumping = !moveState.isGrounded;
            
            let targetAnimation = 'Idle';
            
            if (isJumping) {
                targetAnimation = 'Jump';
            } else if (isMoving) {
                targetAnimation = 'Running';
            } else {
                targetAnimation = 'Idle';
            }
            
            // Switch animation if needed
            if (animations[targetAnimation] && currentAction !== animations[targetAnimation]) {
                if (currentAction) currentAction.fadeOut(0.2);
                currentAction = animations[targetAnimation];
                currentAction.reset().fadeIn(0.2).play();
            }
            
            // Handle attack animation (temporary)
            if (moveState.attack && animations['Wave']) {
                const attackAnim = animations['Wave'];
                attackAnim.reset().play();
                setTimeout(() => {
                    attackAnim.fadeOut(0.1);
                }, 400);
                moveState.attack = false;
            }
        }
        
        // ============================================
        // MOVEMENT & PHYSICS
        // ============================================
        function updateMovement(deltaTime) {
            if (!character) return;
            
            // Calculate movement direction
            let moveX = 0;
            let moveZ = 0;
            
            if (moveState.forward) moveZ -= 1;
            if (moveState.backward) moveZ += 1;
            if (moveState.left) moveX -= 1;
            if (moveState.right) moveX += 1;
            
            // Normalize diagonal movement
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
            }
            
            // Apply movement
            const speed = RUN_SPEED * deltaTime;
            character.position.x += moveX * speed;
            character.position.z += moveZ * speed;
            
            // Rotate character to face movement direction
            if (moveX !== 0 || moveZ !== 0) {
                const angle = Math.atan2(moveX, moveZ);
                character.rotation.y = angle;
            }
            
            // Jump physics
            if (moveState.jump && moveState.isGrounded) {
                moveState.velocityY = JUMP_FORCE;
                moveState.isGrounded = false;
                moveState.jumpCount = 1;
                moveState.jump = false;
            }
            
            // Apply gravity
            if (!moveState.isGrounded) {
                character.position.y += moveState.velocityY;
                moveState.velocityY -= GRAVITY;
                
                // Ground check
                if (character.position.y <= 0) {
                    character.position.y = 0;
                    moveState.isGrounded = true;
                    moveState.velocityY = 0;
                    moveState.jumpCount = 0;
                }
            } else {
                character.position.y = 0;
            }
            
            // Optional: Boundary limits
            character.position.x = Math.max(-20, Math.min(20, character.position.x));
            character.position.z = Math.max(-20, Math.min(20, character.position.z));
        }
        
        // ============================================
        // CAMERA CONTROL (Follow Camera)
        // ============================================
        let cameraMode = 'follow'; // 'orbit' or 'follow'
        
        function updateCamera() {
            if (!character) return;
            
            if (cameraMode === 'follow') {
                // Third-person follow camera
                const targetPosition = character.position.clone();
                const offset = new THREE.Vector3(-3, 2.5, 5);
                const desiredPosition = targetPosition.clone().add(offset);
                
                camera.position.lerp(desiredPosition, 0.1);
                camera.lookAt(targetPosition.clone().add(new THREE.Vector3(0, 1.5, 0)));
            }
            // Orbit controls handle themselves when enabled
        }
        
        // ============================================
        // PUBLIC METHODS (For external control)
        // ============================================
        
        // Get character instance
        function getCharacter() {
            return character;
        }
        
        // Get animations list
        function getAnimations() {
            return Object.keys(animations);
        }
        
        // Play specific animation
        function playAnimation(animationName, duration = 0.2) {
            if (animations[animationName]) {
                if (currentAction) currentAction.fadeOut(duration);
                currentAction = animations[animationName];
                currentAction.reset().fadeIn(duration).play();
                return true;
            }
            return false;
        }
        
        // Set character scale
        function setScale(x, y, z) {
            if (character) character.scale.set(x, y, z);
        }
        
        // Set character position
        function setPosition(x, y, z) {
            if (character) character.position.set(x, y, z);
        }
        
        // Get character position
        function getPosition() {
            return character ? character.position.clone() : null;
        }
        
        // Set walk/run speed
        function setSpeed(walk, run) {
            // Not implemented as variables are constants, modify if needed
            console.log('Speed adjustment available by modifying WALK_SPEED and RUN_SPEED constants');
        }
        
        // Toggle camera mode
        function setCameraMode(mode) {
            cameraMode = mode;
            if (mode === 'orbit') {
                controls.enabled = true;
            } else {
                controls.enabled = false;
            }
        }
        
        // ============================================
        // ANIMATION LOOP
        // ============================================
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let deltaTime = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            // Update input
            updateInput();
            
            // Update movement and physics
            updateMovement(deltaTime);
            
            // Update animations
            updateAnimation();
            
            // Update camera
            updateCamera();
            
            // Update animation mixer
            if (mixer) mixer.update(deltaTime);
            
            // Update orbit controls if enabled
            if (controls.enabled) controls.update();
            
            // Render scene
            renderer.render(scene, camera);
            
            requestAnimationFrame(animate);
        }
        
        // Start the animation loop
        animate();
        
        // Handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // ============================================
        // EXPOSE CONTROLS TO CONSOLE (for debugging)
        // ============================================
        window.CharacterAPI = {
            getCharacter,
            getAnimations,
            playAnimation,
            setScale,
            setPosition,
            getPosition,
            setCameraMode,
            listAnimations: () => console.log('Available animations:', Object.keys(animations))
        };
        
        console.log('🎮 RAW CHARACTER READY!');
        console.log('📦 Available animations will appear after model loads');
        console.log('💡 Use window.CharacterAPI to control the character from console');
        console.log('   Example: CharacterAPI.playAnimation("Wave")');
        console.log('   Example: CharacterAPI.setCameraMode("orbit")');
    </script>
</body>
</html>
