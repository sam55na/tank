<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>CYBER-SAMURAI | شخصية متطورة</title>
    <style>
        body { margin: 0; background: #050508; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #overlay {
            position: absolute; top: 30px; left: 30px;
            color: #00f2ff; border-left: 4px solid #ff3300;
            padding-left: 15px; pointer-events: none;
        }
        .model-name { font-size: 24px; font-weight: bold; letter-spacing: 2px; color: #fff; }
        .stats { font-size: 12px; color: #ff3300; text-transform: uppercase; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="model-name">EXO-SHINOBI v3.0</div>
        <div class="stats">Core: Stable | Weapon: Charged | Mode: Combat</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.Fog(0x020205, 5, 15);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- الإضاءة ---
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(5, 10, 7);
        sun.castShadow = true;
        scene.add(sun);

        const blueLight = new THREE.PointLight(0x00f2ff, 1, 10);
        blueLight.position.set(-3, 2, 3);
        scene.add(blueLight);

        const rimLight = new THREE.PointLight(0xff3300, 0.8, 10);
        rimLight.position.set(0, 4, -4);
        scene.add(rimLight);

        // --- المواد ---
        const matCarbon = new THREE.MeshStandardMaterial({ color: 0x151515, metalness: 0.9, roughness: 0.2 });
        const matChrome = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 1, roughness: 0.1 });
        const matEnergy = new THREE.MeshBasicMaterial({ color: 0x00f2ff });
        const matDetail = new THREE.MeshStandardMaterial({ color: 0xff3300, emissive: 0xff0000, emissiveIntensity: 0.5 });

        const character = new THREE.Group();
        scene.add(character);

        // 1. الجذع (V-Shape)
        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.2, 1.2, 6), matCarbon);
        torso.position.y = 1.8;
        torso.rotation.x = 0.2; // ميلان للأمام
        character.add(torso);

        // نواة الطاقة في الصدر
        const core = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), matEnergy);
        core.position.set(0, 2.1, 0.4);
        character.add(core);

        // 2. الرأس (الخوذة)
        const headGroup = new THREE.Group();
        headGroup.position.set(0, 2.6, 0.2);
        character.add(headGroup);

        const helmet = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.45, 0.5), matCarbon);
        headGroup.add(helmet);

        const visor = new THREE.Mesh(new THREE.PlaneGeometry(0.35, 0.05), matEnergy);
        visor.position.set(0, 0.1, 0.26);
        headGroup.add(visor);

        const hornR = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.4, 4), matChrome);
        hornR.position.set(0.15, 0.3, 0);
        hornR.rotation.z = -0.4;
        headGroup.add(hornR);

        // 3. الأذرع (وضعية هجومية)
        function createArm(side) {
            const arm = new THREE.Group();
            
            // درع الكتف (طبقات)
            const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 8, 0, Math.PI), matCarbon);
            shoulder.rotation.x = Math.PI / 2;
            arm.add(shoulder);

            const bicep = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 0.6), matChrome);
            bicep.position.y = -0.4;
            arm.add(bicep);

            const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.15, 0.7), matCarbon);
            forearm.position.set(0, -0.9, 0.2);
            forearm.rotation.x = -0.8;
            arm.add(forearm);

            // نصل الطاقة (سيف الساعد)
            if(side === 1) {
                const blade = new THREE.Mesh(new THREE.BoxGeometry(0.02, 1.2, 0.1), matEnergy);
                blade.position.set(0, -1.3, 0.5);
                blade.rotation.x = -0.8;
                arm.add(blade);
            }

            arm.position.set(side * 0.8, 2.3, 0);
            return arm;
        }
        character.add(createArm(1)); // يمين بالسيف
        character.add(createArm(-1)); // يسار

        // 4. الأرجل (وضعية الاستعداد)
        function createLeg(side) {
            const leg = new THREE.Group();
            
            const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.15, 0.9), matCarbon);
            thigh.position.y = -0.4;
            leg.add(thigh);

            const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 0.9), matCarbon);
            shin.position.set(0, -1.1, 0.2);
            shin.rotation.x = -0.4; // ثني الركبة
            leg.add(shin);

            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.6), matChrome);
            foot.position.set(0, -1.5, 0.4);
            leg.add(foot);

            leg.position.set(side * 0.4, 1.3, 0);
            return leg;
        }
        character.add(createLeg(1));
        character.add(createLeg(-1));

        // أرضية فنية
        const grid = new THREE.GridHelper(20, 40, 0xff3300, 0x111122);
        grid.position.y = -0.3;
        scene.add(grid);

        // --- حلقة التحريك ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.002;
            
            // نبض النواة
            core.scale.setScalar(1 + Math.sin(time * 2) * 0.1);
            
            // دوران بسيط للشخصية
            character.rotation.y = Math.sin(time * 0.5) * 0.2;
            
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
