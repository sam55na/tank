<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Battle Tanks Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #0a0a1a);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #d4af37;
        }

        .header h1 {
            color: #d4af37;
            font-size: 28px;
        }

        .back-btn {
            background: #d4af37;
            color: #1a1a2e;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #d4af37;
        }

        .stat-card h3 {
            color: #d4af37;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }

        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .section h2 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .users-table {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            color: #d4af37;
            font-weight: bold;
        }

        .action-btn {
            background: #d4af37;
            color: #1a1a2e;
            padding: 5px 15px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            margin: 2px;
        }

        .action-btn.danger {
            background: #e74c3c;
            color: white;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #d4af37;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #d4af37;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .submit-btn {
            background: #d4af37;
            color: #1a1a2e;
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .submit-btn.danger {
            background: #e74c3c;
            color: white;
        }

        .message {
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
        }

        .message.success {
            background: #27ae60;
            display: block;
        }

        .message.error {
            background: #e74c3c;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #d4af37;
        }

        /* أنماط الغرف */
        .rooms-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .room-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #d4af37;
            border-radius: 15px;
            padding: 15px;
        }

        .room-card h3 {
            color: #d4af37;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .room-info {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .room-info span {
            background: rgba(212,175,55,0.2);
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 12px;
        }

        .room-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
            margin-top: 10px;
        }

        .room-controls .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .room-controls label {
            font-size: 12px;
            color: #aaa;
        }

        .room-controls input {
            width: 100px;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #d4af37;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .room-controls button {
            background: #d4af37;
            color: #1a1a2e;
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .room-controls button.danger {
            background: #e74c3c;
            color: white;
        }

        .status-waiting {
            color: #27ae60;
        }

        .status-active {
            color: #f39c12;
        }

        .status-ended {
            color: #e74c3c;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            th, td {
                padding: 8px;
                font-size: 12px;
            }
            .room-controls {
                flex-direction: column;
                align-items: flex-start;
            }
            .room-controls input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ لوحة تحكم الآدمن</h1>
            <a href="index.html" class="back-btn">🏠 العودة للعبة</a>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <h3>إجمالي اللاعبين</h3>
                <div class="value" id="totalUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>إجمالي الأرصدة</h3>
                <div class="value" id="totalBalance">-</div>
            </div>
            <div class="stat-card">
                <h3>المباريات المنتهية</h3>
                <div class="value" id="totalGames">-</div>
            </div>
        </div>

        <div class="section">
            <h2>💰 إدارة الأرصدة</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>البريد الإلكتروني للاعب</label>
                    <input type="email" id="targetEmail" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>المبلغ</label>
                    <input type="number" id="amount" placeholder="المبلغ بالدولار">
                </div>
            </div>
            <div class="form-row">
                <button class="submit-btn" id="depositBtn">➕ إيداع</button>
                <button class="submit-btn danger" id="withdrawBtn">➖ سحب</button>
            </div>
            <div id="balanceMessage" class="message"></div>
        </div>

        <div class="section">
            <h2>🎮 إدارة الغرف</h2>
            <div id="roomsList" class="rooms-list">
                <div class="loading">جاري تحميل الغرف...</div>
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <button class="submit-btn" id="refreshRoomsBtn">🔄 تحديث الغرف</button>
            </div>
            <div id="roomsMessage" class="message"></div>
        </div>

        <div class="section">
            <h2>👥 قائمة اللاعبين</h2>
            <div class="users-table">
                <table id="usersTable">
                    <thead>
                        <tr><th>البريد الإلكتروني</th><th>اسم المستخدم</th><th>الرصيد</th><th>مباريات</th><th>فوز</th><th>مدير</th><th>إجراءات</th>\\
                    </thead>
                    <tbody id="usersList">
                        <tr><td colspan="7" class="loading">جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://tank-yf0p.onrender.com";
        
        // الحصول على التوكن من localStorage
        function getAdminToken() {
            return localStorage.getItem('adminToken');
        }

        function getStatusText(status) {
            if (status === 'waiting') return '⏳ في الانتظار';
            if (status === 'active') return '🔥 جارية';
            if (status === 'ended') return '✅ منتهية';
            return '❓ غير معروف';
        }

        function showMessage(elementId, msg, type) {
            const messageDiv = document.getElementById(elementId);
            if (!messageDiv) return;
            messageDiv.className = `message ${type}`;
            messageDiv.innerText = msg;
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 3000);
        }

        function showBalanceMessage(msg, type) {
            showMessage('balanceMessage', msg, type);
        }

        function showRoomsMessage(msg, type) {
            showMessage('roomsMessage', msg, type);
        }

        async function fetchStats() {
            const token = getAdminToken();
            if (!token) return;
            
            try {
                const response = await fetch(`${SERVER_URL}/api/admin/stats?adminToken=${token}`);
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('totalUsers').innerText = data.report?.totalUsers || 0;
                    document.getElementById('totalBalance').innerText = (data.report?.totalBalance || 0) + ' $';
                    document.getElementById('totalGames').innerText = data.report?.totalGames || 0;
                    
                    const usersList = document.getElementById('usersList');
                    usersList.innerHTML = '';
                    
                    if (data.report?.users && data.report.users.length > 0) {
                        data.report.users.forEach(user => {
                            const row = usersList.insertRow();
                            row.insertCell(0).innerText = user.email || user.id;
                            row.insertCell(1).innerText = user.username || user.email?.split('@')[0] || 'لاعب';
                            row.insertCell(2).innerHTML = `<span style="color:#d4af37;">${user.balance || 100} $</span>`;
                            row.insertCell(3).innerText = user.gamesPlayed || 0;
                            row.insertCell(4).innerText = user.wins || 0;
                            row.insertCell(5).innerText = user.isAdmin ? '✅' : '❌';
                            row.insertCell(5).innerHTML = `
                                <button class="action-btn" onclick="quickDeposit('${user.email || user.id}', 10)">+10$</button>
                                <button class="action-btn danger" onclick="quickWithdraw('${user.email || user.id}', 10)">-10$</button>
                            `;
                        });
                    } else {
                        usersList.innerHTML = '<tr><td colspan="7" class="loading">لا يوجد لاعبين</td></tr>';
                    }
                } else {
                    showBalanceMessage(data.error || 'خطأ في تحميل البيانات', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showBalanceMessage('فشل الاتصال بالخادم', 'error');
            }
        }

        async function fetchRooms() {
            const token = getAdminToken();
            if (!token) return;
            
            try {
                const response = await fetch(`${SERVER_URL}/api/admin/rooms?adminToken=${token}`);
                const data = await response.json();
                
                if (data.success && data.rooms) {
                    displayRooms(data.rooms);
                } else {
                    showRoomsMessage(data.error || 'خطأ في تحميل الغرف', 'error');
                }
            } catch (error) {
                console.error('Error fetching rooms:', error);
                showRoomsMessage('فشل الاتصال بالخادم', 'error');
            }
        }

        function displayRooms(rooms) {
            const roomsDiv = document.getElementById('roomsList');
            if (!roomsDiv) return;
            
            if (!rooms || rooms.length === 0) {
                roomsDiv.innerHTML = '<div class="loading">لا توجد غرف حالياً</div>';
                return;
            }
            
            roomsDiv.innerHTML = rooms.map(room => `
                <div class="room-card">
                    <h3>${room.name || '🏠 غرفة ' + room.id}</h3>
                    <div class="room-info">
                        <span>🆔 ${room.id}</span>
                        <span>👥 ${room.playersCount || 0}/${room.maxSeats}</span>
                        <span>💰 سعر المقعد: ${room.seatPrice || 1}$</span>
                        <span class="status-${room.status}">📌 ${getStatusText(room.status)}</span>
                    </div>
                    <div class="room-controls">
                        <div class="control-group">
                            <label>سعر المقعد ($)</label>
                            <input type="number" id="price_${room.id}" value="${room.seatPrice || 1}" min="1" max="1000" step="1">
                        </div>
                        <div class="control-group">
                            <label>عدد اللاعبين</label>
                            <input type="number" id="maxSeats_${room.id}" value="${room.maxSeats || 2}" min="2" max="16" step="1">
                        </div>
                        <button onclick="updateRoomSettings('${room.id}')">💾 حفظ التغييرات</button>
                        ${room.status === 'waiting' ? `<button class="danger" onclick="deleteRoom('${room.id}')" style="background:#e74c3c;">🗑️ حذف الغرفة</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function updateRoomSettings(roomId) {
            const token = getAdminToken();
            if (!token) return;
            
            const priceInput = document.getElementById(`price_${roomId}`);
            const maxSeatsInput = document.getElementById(`maxSeats_${roomId}`);
            
            const seatPrice = parseInt(priceInput?.value) || 1;
            const maxSeats = parseInt(maxSeatsInput?.value) || 2;
            
            try {
                const response = await fetch(`${SERVER_URL}/api/admin/updateRoom`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        adminToken: token, 
                        roomId, 
                        seatPrice, 
                        maxSeats 
                    })
                });
                const data = await response.json();
                
                if (data.success) {
                    showRoomsMessage(`تم تحديث إعدادات الغرفة ${roomId} بنجاح`, 'success');
                    fetchRooms();
                } else {
                    showRoomsMessage(data.error || 'فشل تحديث الغرفة', 'error');
                }
            } catch (error) {
                console.error('Error updating room:', error);
                showRoomsMessage('خطأ في الاتصال بالخادم', 'error');
            }
        }

        async function deleteRoom(roomId) {
            const token = getAdminToken();
            if (!token) return;
            
            if (!confirm(`هل أنت متأكد من حذف الغرفة ${roomId}؟`)) return;
            
            try {
                const response = await fetch(`${SERVER_URL}/api/admin/deleteRoom`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminToken: token, roomId })
                });
                const data = await response.json();
                
                if (data.success) {
                    showRoomsMessage(`تم حذف الغرفة ${roomId} بنجاح`, 'success');
                    fetchRooms();
                } else {
                    showRoomsMessage(data.error || 'فشل حذف الغرفة', 'error');
                }
            } catch (error) {
                console.error('Error deleting room:', error);
                showRoomsMessage('خطأ في الاتصال بالخادم', 'error');
            }
        }

        async function quickDeposit(email, amount) {
            const token = getAdminToken();
            if (!token) return;
            
            try {
                const response = await fetch(`${SERVER_URL}/api/admin/balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminToken: token, userId: email, amount, action: 'deposit' })
                });
                const data = await response.json();
                
                if (data.success) {
                    showBalanceMessage(`تم إيداع ${amount}$ للمستخدم`, 'success');
                    fetchStats();
                } else {
                    showBalanceMessage(data.error, 'error');
                }
            } catch (error) {
                showBalanceMessage('خطأ في الاتصال', 'error');
            }
        }

        async function quickWithdraw(email, amount) {
            const token = getAdminToken();
            if (!token) return;
            
            try {
                const response = await fetch(`${SERVER_URL}/api/admin/balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminToken: token, userId: email, amount, action: 'withdraw' })
                });
                const data = await response.json();
                
                if (data.success) {
                    showBalanceMessage(`تم سحب ${amount}$ من المستخدم`, 'success');
                    fetchStats();
                } else {
                    showBalanceMessage(data.error, 'error');
                }
            } catch (error) {
                showBalanceMessage('خطأ في الاتصال', 'error');
            }
        }

        async function deposit() {
            const email = document.getElementById('targetEmail').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const token = getAdminToken();
            
            if (!email || !amount) {
                showBalanceMessage('الرجاء إدخال البريد الإلكتروني والمبلغ', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${SERVER_URL}/api/admin/balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminToken: token, userId: email, amount, action: 'deposit' })
                });
                const data = await response.json();
                
                if (data.success) {
                    showBalanceMessage(`تم إيداع ${amount}$ بنجاح`, 'success');
                    document.getElementById('targetEmail').value = '';
                    document.getElementById('amount').value = '';
                    fetchStats();
                } else {
                    showBalanceMessage(data.error, 'error');
                }
            } catch (error) {
                showBalanceMessage('خطأ في الاتصال', 'error');
            }
        }

        async function withdraw() {
            const email = document.getElementById('targetEmail').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const token = getAdminToken();
            
            if (!email || !amount) {
                showBalanceMessage('الرجاء إدخال البريد الإلكتروني والمبلغ', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${SERVER_URL}/api/admin/balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminToken: token, userId: email, amount, action: 'withdraw' })
                });
                const data = await response.json();
                
                if (data.success) {
                    showBalanceMessage(`تم سحب ${amount}$ بنجاح`, 'success');
                    document.getElementById('targetEmail').value = '';
                    document.getElementById('amount').value = '';
                    fetchStats();
                } else {
                    showBalanceMessage(data.error, 'error');
                }
            } catch (error) {
                showBalanceMessage('خطأ في الاتصال', 'error');
            }
        }

        // التحقق من صلاحية الآدمن
        async function checkAdmin() {
            const token = getAdminToken();
            const isAdmin = localStorage.getItem('isAdmin');
            
            console.log('Checking admin access:', { hasToken: !!token, isAdmin });
            
            if (!token || isAdmin !== 'true') {
                console.log('Not admin, redirecting to login');
                window.location.href = 'index.html';
                return;
            }
            
            await fetchStats();
            await fetchRooms();
        }

        // إضافة الأحداث
        document.getElementById('depositBtn').onclick = deposit;
        document.getElementById('withdrawBtn').onclick = withdraw;
        document.getElementById('refreshRoomsBtn').onclick = () => fetchRooms();

        // تنفيذ عند تحميل الصفحة
        checkAdmin();
        
        // تحديث البيانات كل 10 ثوانٍ
        setInterval(() => {
            fetchStats();
            fetchRooms();
        }, 10000);
    </script>
</body>
</html>
