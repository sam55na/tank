<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Battle Tanks Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #0a0a1a);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #d4af37;
        }

        .header h1 {
            color: #d4af37;
            font-size: 28px;
        }

        .back-btn {
            background: #d4af37;
            color: #1a1a2e;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #d4af37;
        }

        .stat-card h3 {
            color: #d4af37;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }

        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .section h2 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .users-table {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            color: #d4af37;
            font-weight: bold;
        }

        .action-btn {
            background: #d4af37;
            color: #1a1a2e;
            padding: 5px 15px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            margin: 2px;
        }

        .action-btn.danger {
            background: #e74c3c;
            color: white;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #d4af37;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #d4af37;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .submit-btn {
            background: #d4af37;
            color: #1a1a2e;
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .message {
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
        }

        .message.success {
            background: #27ae60;
            display: block;
        }

        .message.error {
            background: #e74c3c;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #d4af37;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            th, td {
                padding: 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ لوحة تحكم الآدمن</h1>
            <a href="index.html" class="back-btn">🏠 العودة للعبة</a>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <h3>إجمالي اللاعبين</h3>
                <div class="value" id="totalUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>إجمالي الأرصدة</h3>
                <div class="value" id="totalBalance">-</div>
            </div>
            <div class="stat-card">
                <h3>المباريات المنتهية</h3>
                <div class="value" id="totalGames">-</div>
            </div>
        </div>

        <div class="section">
            <h2>💰 إدارة الأرصدة</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>البريد الإلكتروني للاعب</label>
                    <input type="email" id="targetEmail" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>المبلغ</label>
                    <input type="number" id="amount" placeholder="المبلغ بالدولار">
                </div>
            </div>
            <div class="form-row">
                <button class="submit-btn" id="depositBtn">➕ إيداع</button>
                <button class="submit-btn danger" id="withdrawBtn" style="background:#e74c3c;">➖ سحب</button>
            </div>
            <div id="balanceMessage" class="message"></div>
        </div>

        <div class="section">
            <h2>👥 قائمة اللاعبين</h2>
            <div class="users-table">
                <table id="usersTable">
                    <thead>
                        <tr><th>البريد الإلكتروني</th><th>اسم المستخدم</th><th>الرصيد</th><th>مباريات</th><th>مدير</th><th>إجراءات</th>\
                    </thead>
                    <tbody id="usersList">
                        <tr><td colspan="6" class="loading">جاري التحميل...</td>\
                    </tbody>
                 \\
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://tank-yf0p.onrender.com";
        let adminToken = null;
        let currentAdminEmail = null;

        // الحصول على التوكن من localStorage
        function getAdminToken() {
            return localStorage.getItem('adminToken');
        }

        async function fetchStats() {
            const token = getAdminToken();
            if (!token) return;
            
            try {
                const response = await fetch(`${SERVER_URL}/api/admin/stats?adminToken=${token}`);
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('totalUsers').innerText = data.stats.totalUsers;
                    document.getElementById('totalBalance').innerText = data.stats.totalBalance + ' $';
                    
                    const usersList = document.getElementById('usersList');
                    usersList.innerHTML = '';
                    
                    data.stats.usersList.forEach(user => {
                        const row = usersList.insertRow();
                        row.insertCell(0).innerText = user.email || user.id;
                        row.insertCell(1).innerText = user.username || user.email?.split('@')[0] || 'لاعب';
                        row.insertCell(2).innerHTML = `<span style="color:#d4af37;">${user.balance} $</span>`;
                        row.insertCell(3).innerText = user.gamesPlayed || 0;
                        row.insertCell(4).innerText = user.isAdmin ? '✅' : '❌';
                        row.insertCell(5).innerHTML = `
                            <button class="action-btn" onclick="quickDeposit('${user.id}', 10)">+10$</button>
                            <button class="action-btn danger" onclick="quickWithdraw('${user.id}', 10)">-10$</button>
                        `;
                    });
                } else {
                    showMessage('خطأ في تحميل البيانات', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('فشل الاتصال بالخادم', 'error');
            }
        }

        async function quickDeposit(userId, amount) {
            const token = getAdminToken();
            if (!token) return;
            
            try {
                const response = await fetch(`${SERVER_URL}/api/deposit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminToken: token, userId, amount })
                });
                const data = await response.json();
                
                if (data.success) {
                    showMessage(`تم إيداع ${amount}$ للمستخدم`, 'success');
                    fetchStats();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('خطأ في الاتصال', 'error');
            }
        }

        async function quickWithdraw(userId, amount) {
            const token = getAdminToken();
            if (!token) return;
            
            try {
                const response = await fetch(`${SERVER_URL}/api/withdraw`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminToken: token, userId, amount })
                });
                const data = await response.json();
                
                if (data.success) {
                    showMessage(`تم سحب ${amount}$ من المستخدم`, 'success');
                    fetchStats();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('خطأ في الاتصال', 'error');
            }
        }

        async function deposit() {
            const email = document.getElementById('targetEmail').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const token = getAdminToken();
            
            if (!email || !amount) {
                showMessage('الرجاء إدخال البريد الإلكتروني والمبلغ', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${SERVER_URL}/api/deposit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminToken: token, userId: email, amount })
                });
                const data = await response.json();
                
                if (data.success) {
                    showMessage(`تم إيداع ${amount}$ بنجاح`, 'success');
                    document.getElementById('targetEmail').value = '';
                    document.getElementById('amount').value = '';
                    fetchStats();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('خطأ في الاتصال', 'error');
            }
        }

        async function withdraw() {
            const email = document.getElementById('targetEmail').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const token = getAdminToken();
            
            if (!email || !amount) {
                showMessage('الرجاء إدخال البريد الإلكتروني والمبلغ', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${SERVER_URL}/api/withdraw`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminToken: token, userId: email, amount })
                });
                const data = await response.json();
                
                if (data.success) {
                    showMessage(`تم سحب ${amount}$ بنجاح`, 'success');
                    document.getElementById('targetEmail').value = '';
                    document.getElementById('amount').value = '';
                    fetchStats();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('خطأ في الاتصال', 'error');
            }
        }

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('balanceMessage');
            messageDiv.className = `message ${type}`;
            messageDiv.innerText = msg;
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 3000);
        }

        // التحقق من صلاحية الآدمن
        async function checkAdmin() {
            const token = getAdminToken();
            const isAdmin = localStorage.getItem('isAdmin');
            
            console.log('Checking admin access:', { hasToken: !!token, isAdmin });
            
            if (!token || isAdmin !== 'true') {
                console.log('Not admin, redirecting to login');
                window.location.href = 'index.html';
                return;
            }
            
            fetchStats();
        }

        document.getElementById('depositBtn').onclick = deposit;
        document.getElementById('withdrawBtn').onclick = withdraw;

        // تنفيذ عند تحميل الصفحة
        checkAdmin();
    </script>
</body>
</html>
