<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Tanks Admin - لوحة التحكم</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #0a0a1a);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #d4af37;
            flex-wrap: wrap;
            gap: 15px;
        }
        header h1 { color: #d4af37; font-size: 28px; }
        .back-btn {
            background: #d4af37;
            color: #1a1a2e;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #d4af37;
        }
        .stat-card h3 { color: #d4af37; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; }
        .stat-card .value { font-size: 32px; font-weight: bold; }
        section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }
        section h2 { color: #d4af37; margin-bottom: 20px; font-size: 20px; border-right: 3px solid #d4af37; padding-right: 15px; }
        .users-table { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: #d4af37; font-weight: bold; }
        .action-btn {
            background: #d4af37;
            color: #1a1a2e;
            padding: 5px 15px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            margin: 2px;
        }
        .action-btn.danger { background: #e74c3c; color: white; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #d4af37; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #d4af37;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .submit-btn {
            background: #d4af37;
            color: #1a1a2e;
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .submit-btn.danger { background: #e74c3c; color: white; }
        .message {
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
        }
        .message.success { background: #27ae60; display: block; }
        .message.error { background: #e74c3c; display: block; }
        .loading { text-align: center; padding: 20px; color: #d4af37; }
        hr { border-color: rgba(212,175,55,0.3); margin: 20px 0; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } th, td { padding: 8px; font-size: 12px; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ لوحة تحكم المشرف - Battle Tanks Elite</h1>
            <button class="back-btn" onclick="window.location.href='index.html'">🏠 العودة للعبة</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>👥 إجمالي المستخدمين</h3>
                <div class="value" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>💰 إجمالي الرصيد</h3>
                <div class="value" id="totalBalance">0 $</div>
            </div>
            <div class="stat-card">
                <h3>🎮 إجمالي المعارك</h3>
                <div class="value" id="totalGames">0</div>
            </div>
        </div>

        <section>
            <h2>💰 إدارة رصيد اللاعبين</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>📧 البريد الإلكتروني</label>
                    <input type="email" id="targetEmail" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>💵 المبلغ ($)</label>
                    <input type="number" id="amount" placeholder="100" min="1">
                </div>
            </div>
            <div class="form-row">
                <button class="submit-btn" onclick="deposit()">➕ إيداع</button>
                <button class="submit-btn danger" onclick="withdraw()">➖ سحب</button>
            </div>
            <div id="balanceMessage" class="message"></div>
        </section>

        <section>
            <h2>👥 قائمة اللاعبين</h2>
            <div class="users-table">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>البريد الإلكتروني</th>
                            <th>اسم المستخدم</th>
                            <th>💰 الرصيد</th>
                            <th>🎮 المعارك</th>
                            <th>🏆 الفوز</th>
                            <th>👑 الصلاحية</th>
                            <th>⚡ إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="usersList">
                        <tr><td colspan="7" class="loading">⏳ جاري تحميل المستخدمين...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <hr>
        <div class="form-row">
            <button class="submit-btn danger" id="resetDataBtn">🗑️ مسح جميع بيانات اللاعبين</button>
            <button class="submit-btn" id="refreshStatsBtn">🔄 تحديث الإحصائيات</button>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://tank-yf0p.onrender.com";

        // الحصول على التوكن و userId من localStorage
        function getAdminToken() {
            return localStorage.getItem('adminToken');
        }

        function getUserId() {
            return localStorage.getItem('userId');
        }

        function showMessage(messageId, msg, type) {
            const messageDiv = document.getElementById(messageId);
            if (!messageDiv) return;
            messageDiv.className = `message ${type}`;
            messageDiv.innerText = msg;
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 3000);
        }

        function showBalanceMessage(msg, type) {
            showMessage('balanceMessage', msg, type);
        }

        // ==================== إحصائيات المستخدمين ====================
        async function fetchStats() {
            const token = getAdminToken();
            const userId = getUserId();
            
            console.log('📊 Fetching stats with:', { token: !!token, userId });
            
            if (!token) {
                console.log('❌ No token found');
                const usersList = document.getElementById('usersList');
                if (usersList) usersList.innerHTML = '<tr><td colspan="7" class="loading">❌ يرجى تسجيل الدخول أولاً</td></tr>';
                return;
            }

            if (!userId) {
                console.log('❌ No userId found');
                const usersList = document.getElementById('usersList');
                if (usersList) usersList.innerHTML = '<tr><td colspan="7" class="loading">❌ لم يتم العثور على معرف المستخدم</td></tr>';
                return;
            }

            try {
                // إضافة userId إلى الـ query parameters
                const url = `${SERVER_URL}/api/admin/stats?adminToken=${token}&userId=${userId}`;
                console.log('🔗 Fetching stats from:', url);
                
                const response = await fetch(url);
                console.log('📡 Response status:', response.status);
                
                const data = await response.json();
                console.log('📊 Stats response:', data);

                if (data.success && data.report) {
                    document.getElementById('totalUsers').innerText = data.report.totalUsers || 0;
                    document.getElementById('totalBalance').innerText = (data.report.totalBalance || 0) + ' $';
                    document.getElementById('totalGames').innerText = data.report.totalGames || 0;

                    const usersList = document.getElementById('usersList');
                    usersList.innerHTML = '';

                    if (data.report.users && data.report.users.length > 0) {
                        data.report.users.forEach(user => {
                            const row = usersList.insertRow();
                            row.insertCell(0).innerText = user.email || user.id;
                            row.insertCell(1).innerText = user.username || user.email?.split('@')[0] || 'لاعب';
                            row.insertCell(2).innerHTML = `<span style="color:#d4af37; font-weight:bold;">${user.balance || 100} $</span>`;
                            row.insertCell(3).innerText = user.gamesPlayed || 0;
                            row.insertCell(4).innerText = user.wins || 0;
                            row.insertCell(5).innerText = user.isAdmin ? '✅ مشرف' : '👤 عادي';
                            row.insertCell(6).innerHTML = `
                                <button class="action-btn" onclick="quickDeposit('${user.email || user.id}', 10)">+10$</button>
                                <button class="action-btn danger" onclick="quickWithdraw('${user.email || user.id}', 10)">-10$</button>
                            `;
                        });
                    } else {
                        usersList.innerHTML = '<tr><td colspan="7" class="loading">📭 لا يوجد لاعبين</td></tr>';
                    }
                } else {
                    console.log('❌ Stats error:', data.error);
                    showBalanceMessage(data.error || 'خطأ في تحميل البيانات', 'error');
                }
            } catch (error) {
                console.error('❌ Error fetching stats:', error);
                showBalanceMessage('فشل الاتصال بالخادم: ' + error.message, 'error');
            }
        }

        async function quickDeposit(email, amount) {
            const token = getAdminToken();
            const userId = getUserId();
            if (!token || !userId) {
                showBalanceMessage('يرجى تسجيل الدخول أولاً', 'error');
                return;
            }

            try {
                const response = await fetch(`${SERVER_URL}/api/admin/balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        adminToken: token, 
                        userId: email, 
                        adminId: userId, 
                        amount, 
                        action: 'deposit' 
                    })
                });
                const data = await response.json();
                if (data.success) {
                    showBalanceMessage(`✅ تم إيداع ${amount}$ للمستخدم`, 'success');
                    fetchStats();
                } else {
                    showBalanceMessage(data.error || 'فشل الإيداع', 'error');
                }
            } catch (error) {
                showBalanceMessage('خطأ في الاتصال', 'error');
            }
        }

        async function quickWithdraw(email, amount) {
            const token = getAdminToken();
            const userId = getUserId();
            if (!token || !userId) {
                showBalanceMessage('يرجى تسجيل الدخول أولاً', 'error');
                return;
            }

            try {
                const response = await fetch(`${SERVER_URL}/api/admin/balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        adminToken: token, 
                        userId: email, 
                        adminId: userId, 
                        amount, 
                        action: 'withdraw' 
                    })
                });
                const data = await response.json();
                if (data.success) {
                    showBalanceMessage(`✅ تم سحب ${amount}$ من المستخدم`, 'success');
                    fetchStats();
                } else {
                    showBalanceMessage(data.error || 'فشل السحب', 'error');
                }
            } catch (error) {
                showBalanceMessage('خطأ في الاتصال', 'error');
            }
        }

        async function deposit() {
            const email = document.getElementById('targetEmail').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const token = getAdminToken();
            const userId = getUserId();

            if (!email || !amount) {
                showBalanceMessage('⚠️ الرجاء إدخال البريد الإلكتروني والمبلغ', 'error');
                return;
            }

            if (!token || !userId) {
                showBalanceMessage('⚠️ يرجى تسجيل الدخول أولاً', 'error');
                return;
            }

            try {
                const response = await fetch(`${SERVER_URL}/api/admin/balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        adminToken: token, 
                        userId: email, 
                        adminId: userId, 
                        amount, 
                        action: 'deposit' 
                    })
                });
                const data = await response.json();
                if (data.success) {
                    showBalanceMessage(`✅ تم إيداع ${amount}$ بنجاح`, 'success');
                    document.getElementById('targetEmail').value = '';
                    document.getElementById('amount').value = '';
                    fetchStats();
                } else {
                    showBalanceMessage(data.error || 'فشل الإيداع', 'error');
                }
            } catch (error) {
                showBalanceMessage('خطأ في الاتصال', 'error');
            }
        }

        async function withdraw() {
            const email = document.getElementById('targetEmail').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const token = getAdminToken();
            const userId = getUserId();

            if (!email || !amount) {
                showBalanceMessage('⚠️ الرجاء إدخال البريد الإلكتروني والمبلغ', 'error');
                return;
            }

            if (!token || !userId) {
                showBalanceMessage('⚠️ يرجى تسجيل الدخول أولاً', 'error');
                return;
            }

            try {
                const response = await fetch(`${SERVER_URL}/api/admin/balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        adminToken: token, 
                        userId: email, 
                        adminId: userId, 
                        amount, 
                        action: 'withdraw' 
                    })
                });
                const data = await response.json();
                if (data.success) {
                    showBalanceMessage(`✅ تم سحب ${amount}$ بنجاح`, 'success');
                    document.getElementById('targetEmail').value = '';
                    document.getElementById('amount').value = '';
                    fetchStats();
                } else {
                    showBalanceMessage(data.error || 'فشل السحب', 'error');
                }
            } catch (error) {
                showBalanceMessage('خطأ في الاتصال', 'error');
            }
        }

        async function resetAllData() {
            const token = getAdminToken();
            const userId = getUserId();
            
            if (!token || !userId) {
                showBalanceMessage('⚠️ يرجى تسجيل الدخول أولاً', 'error');
                return;
            }
            
            if (!confirm('⚠️ تحذير نهائي! سيتم مسح جميع بيانات اللاعبين بشكل دائم. هل أنت متأكد؟')) return;
            const confirmText = prompt('اكتب كلمة "مسح" للتأكيد النهائي:');
            if (confirmText !== 'مسح') return;

            try {
                const response = await fetch(`${SERVER_URL}/api/admin/resetData`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminToken: token, userId: userId })
                });
                const data = await response.json();
                if (data.success) {
                    showBalanceMessage('✅ تم مسح جميع بيانات اللاعبين بنجاح', 'success');
                    fetchStats();
                } else {
                    showBalanceMessage(data.error || 'فشل مسح البيانات', 'error');
                }
            } catch (error) {
                showBalanceMessage('خطأ في الاتصال', 'error');
            }
        }

        // ==================== التحقق من الصلاحية ====================
        async function checkAdmin() {
            const token = getAdminToken();
            const isAdmin = localStorage.getItem('isAdmin');
            const userId = getUserId();
            
            console.log('🔐 Checking admin access:', { hasToken: !!token, isAdmin, userId });
            
            if (!token || isAdmin !== 'true') {
                console.log('❌ Not admin, redirecting to login');
                alert('❌ غير مصرح بالدخول. يجب تسجيل الدخول كمشرف أولاً.');
                window.location.href = 'index.html';
                return;
            }
            
            if (!userId) {
                console.log('⚠️ No userId found in localStorage');
                alert('⚠️ خطأ: لم يتم العثور على معرف المستخدم. يرجى تسجيل الخروج وتسجيل الدخول مرة أخرى.');
                window.location.href = 'index.html';
                return;
            }
            
            console.log('✅ Admin access granted, loading data...');
            await fetchStats();
        }

        // ربط الأزرار
        document.getElementById('resetDataBtn').onclick = resetAllData;
        document.getElementById('refreshStatsBtn').onclick = () => {
            fetchStats();
        };

        // بدء التشغيل
        checkAdmin();
    </script>
</body>
</html>
