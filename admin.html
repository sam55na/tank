<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Battle Tanks Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #0a0a1a);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #d4af37;
        }

        .header h1 {
            color: #d4af37;
            font-size: 28px;
        }

        .back-btn {
            background: #d4af37;
            color: #1a1a2e;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #d4af37;
        }

        .stat-card h3 {
            color: #d4af37;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }

        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .section h2 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .users-table {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            color: #d4af37;
            font-weight: bold;
        }

        .action-btn {
            background: #d4af37;
            color: #1a1a2e;
            padding: 5px 15px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            margin: 2px;
        }

        .action-btn.danger {
            background: #e74c3c;
            color: white;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #d4af37;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #d4af37;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .submit-btn {
            background: #d4af37;
            color: #1a1a2e;
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .submit-btn.danger {
            background: #e74c3c;
            color: white;
        }

        .message {
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
        }

        .message.success {
            background: #27ae60;
            display: block;
        }

        .message.error {
            background: #e74c3c;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #d4af37;
        }

        .rooms-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .room-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #d4af37;
            border-radius: 15px;
            padding: 15px;
        }

        .room-card h3 {
            color: #d4af37;
            margin-bottom: 10px;
        }

        .room-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .room-info span {
            background: rgba(212,175,55,0.2);
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 12px;
        }

        .room-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .room-controls .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .room-controls label {
            font-size: 12px;
            color: #aaa;
        }

        .room-controls input {
            width: 100px;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #d4af37;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .room-controls button {
            background: #d4af37;
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .room-type-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #d4af37;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .room-type-card h3 {
            color: #d4af37;
            margin-bottom: 10px;
        }

        .room-type-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .room-type-info span {
            background: rgba(212,175,55,0.2);
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 12px;
        }

        .room-type-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .active-room-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #d4af37;
            border-radius: 10px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .status-waiting { color: #27ae60; }
        .status-active { color: #f39c12; }
        .status-ended { color: #e74c3c; }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            th, td { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ لوحة تحكم الآدمن</h1>
            <a href="index.html" class="back-btn">🏠 العودة للعبة</a>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <h3>إجمالي اللاعبين</h3>
                <div class="value" id="totalUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>إجمالي الأرصدة</h3>
                <div class="value" id="totalBalance">-</div>
            </div>
            <div class="stat-card">
                <h3>المباريات المنتهية</h3>
                <div class="value" id="totalGames">-</div>
            </div>
        </div>

        <div class="section">
            <h2>💰 إدارة الأرصدة</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>البريد الإلكتروني للاعب</label>
                    <input type="email" id="targetEmail" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>المبلغ</label>
                    <input type="number" id="amount" placeholder="المبلغ بالدولار">
                </div>
            </div>
            <div class="form-row">
                <button class="submit-btn" id="depositBtn">➕ إيداع</button>
                <button class="submit-btn danger" id="withdrawBtn">➖ سحب</button>
            </div>
            <div id="balanceMessage" class="message"></div>
        </div>

        <div class="section">
            <h2>🏠 إدارة أنواع الغرف</h2>
            <div id="roomTypesList" class="rooms-list">
                <div class="loading">جاري تحميل أنواع الغرف...</div>
            </div>
            <div id="roomTypesMessage" class="message"></div>
        </div>

        <div class="section">
            <h2>📋 الغرف النشطة</h2>
            <div id="activeRoomsList" class="rooms-list">
                <div class="loading">جاري تحميل الغرف...</div>
            </div>
            <button class="submit-btn" id="refreshRoomsBtn" style="margin-top: 15px;">🔄 تحديث الغرف</button>
            <div id="roomsMessage" class="message"></div>
        </div>

        <div class="section">
            <h2>👥 قائمة اللاعبين</h2>
            <div class="users-table">
                <table id="usersTable">
                    <thead>
                        <tr><th>البريد الإلكتروني</th><th>اسم المستخدم</th><th>الرصيد</th><th>مباريات</th><th>فوز</th><th>مدير</th><th>إجراءات</th>\\
                    </thead>
                    <tbody id="usersList">
                        <tr><td colspan="7" class="loading">جاري التحميل...</td>\\
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://tank-yf0p.onrender.com";
        
        // الحصول على التوكن و userId من localStorage
        function getAdminToken() {
            return localStorage.getItem('adminToken');
        }

        function getUserId() {
            return localStorage.getItem('userId');
        }

        function getStatusText(status) {
            if (status === 'waiting') return '⏳ في الانتظار';
            if (status === 'active') return '🔥 جارية';
            if (status === 'ended') return '✅ منتهية';
            return '❓ غير معروف';
        }

        function showMessage(elementId, msg, type) {
            const messageDiv = document.getElementById(elementId);
            if (!messageDiv) return;
            messageDiv.className = `message ${type}`;
            messageDiv.innerText = msg;
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 3000);
        }

        function showBalanceMessage(msg, type) {
            showMessage('balanceMessage', msg, type);
        }

        function showRoomsMessage(msg, type) {
            showMessage('roomsMessage', msg, type);
        }

        function showRoomTypesMessage(msg, type) {
            showMessage('roomTypesMessage', msg, type);
        }

        // ==================== إدارة أنواع الغرف ====================

        async function fetchRoomTypes() {
            const token = getAdminToken();
            const userId = getUserId();
            
            if (!token || !userId) {
                console.log('Missing token or userId');
                return;
            }
            
            try {
                const url = `${SERVER_URL}/api/admin/roomTypes?adminToken=${token}&userId=${userId}`;
                console.log('Fetching room types:', url);
                const response = await fetch(url);
                const data = await response.json();
                console.log('Room types response:', data);
                
                if (data.success) {
                    displayRoomTypes(data.types);
                } else {
                    showRoomTypesMessage(data.error || 'خطأ في تحميل أنواع الغرف', 'error');
                }
            } catch (error) {
                console.error('Error fetching room types:', error);
                showRoomTypesMessage('فشل الاتصال بالخادم', 'error');
            }
        }

        function displayRoomTypes(types) {
            const container = document.getElementById('roomTypesList');
            if (!container) return;
            
            if (!types || types.length === 0) {
                container.innerHTML = '<div class="loading">لا توجد أنواع غرف</div>';
                return;
            }
            
            container.innerHTML = types.map(type => `
                <div class="room-type-card">
                    <h3>${type.name}</h3>
                    <div class="room-type-info">
                        <span>👥 الحد الأقصى: ${type.maxSeats} لاعب</span>
                        <span>💰 سعر المقعد: ${type.seatPrice}$</span>
                        <span>🏠 الحد الأقصى للغرف: ${type.maxRooms}</span>
                        <span>📌 الغرف المتاحة: ${type.availableRooms}</span>
                        <span>⚔️ غرف نشطة: ${type.activeRooms}</span>
                    </div>
                    <div class="room-type-controls">
                        <div class="control-group">
                            <label>عدد اللاعبين (2-16)</label>
                            <input type="number" id="maxSeats_${type.name.replace(/\s/g, '_')}" value="${type.maxSeats}" min="2" max="16">
                        </div>
                        <div class="control-group">
                            <label>سعر المقعد ($)</label>
                            <input type="number" id="price_${type.name.replace(/\s/g, '_')}" value="${type.seatPrice}" min="1" max="1000">
                        </div>
                        <button onclick="updateRoomType('${type.name}')">💾 حفظ التغييرات</button>
                    </div>
                </div>
            `).join('');
        }

        async function updateRoomType(typeName) {
            const token = getAdminToken();
            const userId = getUserId();
            
            if (!token || !userId) return;
            
            const safeName = typeName.replace(/\s/g, '_');
            const maxSeatsInput = document.getElementById(`maxSeats_${safeName}`);
            const priceInput = document.getElementById(`price_${safeName}`);
            
            const maxSeats = parseInt(maxSeatsInput?.value) || 2;
            const seatPrice = parseInt(priceInput?.value) || 1;
            
            try {
                const response = await fetch(`${SERVER_URL}/api/admin/updateRoomType`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminToken: token, userId: userId, typeName, maxSeats, seatPrice })
                });
                const data = await response.json();
                
                if (data.success) {
                    showRoomTypesMessage(`تم تحديث إعدادات ${typeName} بنجاح`, 'success');
                    fetchRoomTypes();
                    fetchActiveRooms();
                } else {
                    showRoomTypesMessage(data.error || 'فشل تحديث الإعدادات', 'error');
                }
            } catch (error) {
                console.error('Error updating room type:', error);
                showRoomTypesMessage('خطأ في الاتصال بالخادم', 'error');
            }
        }

        // ==================== الغرف النشطة ====================

        async function fetchActiveRooms() {
            const token = getAdminToken();
            const userId = getUserId();
            
            if (!token || !userId) return;
            
            try {
                const url = `${SERVER_URL}/api/admin/rooms?adminToken=${token}&userId=${userId}`;
                console.log('Fetching active rooms:', url);
                const response = await fetch(url);
                const data = await response.json();
                console.log('Active rooms response:', data);
                
                if (data.success && data.rooms) {
                    displayActiveRooms(data.rooms);
                } else {
                    showRoomsMessage(data.error || 'خطأ في تحميل الغرف', 'error');
                }
            } catch (error) {
                console.error('Error fetching active rooms:', error);
                showRoomsMessage('فشل الاتصال بالخادم', 'error');
            }
        }

        function displayActiveRooms(rooms) {
            const container = document.getElementById('activeRoomsList');
            if (!container) return;
            
            if (!rooms || rooms.length === 0) {
                container.innerHTML = '<div class="loading">لا توجد غرف نشطة</div>';
                return;
            }
            
            container.innerHTML = rooms.map(room => `
                <div class="active-room-card">
                    <div>
                        <strong>${room.name}</strong><br>
                        <small>ID: ${room.id}</small>
                    </div>
                    <div>
                        <span>👥 ${room.playersCount || 0}/${room.maxSeats}</span>
                        <span>💰 ${room.seatPrice || 1}$</span>
                        <span class="status-${room.status}">${getStatusText(room.status)}</span>
                    </div>
                </div>
            `).join('');
        }

        // ==================== إدارة اللاعبين ====================

        async function fetchStats() {
            const token = getAdminToken();
            const userId = getUserId();
            
            if (!token || !userId) {
                console.log('Missing token or userId for stats');
                return;
            }
            
            try {
                const url = `${SERVER_URL}/api/admin/stats?adminToken=${token}&userId=${userId}`;
                console.log('Fetching stats:', url);
                const response = await fetch(url);
                const data = await response.json();
                console.log('Stats response:', data);
                
                if (data.success && data.report) {
                    document.getElementById('totalUsers').innerText = data.report.totalUsers || 0;
                    document.getElementById('totalBalance').innerText = (data.report.totalBalance || 0) + ' $';
                    document.getElementById('totalGames').innerText = data.report.totalGames || 0;
                    
                    const usersList = document.getElementById('usersList');
                    usersList.innerHTML = '';
                    
                    if (data.report.users && data.report.users.length > 0) {
                        data.report.users.forEach(user => {
                            const row = usersList.insertRow();
                            row.insertCell(0).innerText = user.email || user.id;
                            row.insertCell(1).innerText = user.username || user.email?.split('@')[0] || 'لاعب';
                            row.insertCell(2).innerHTML = `<span style="color:#d4af37;">${user.balance || 100} $</span>`;
                            row.insertCell(3).innerText = user.gamesPlayed || 0;
                            row.insertCell(4).innerText = user.wins || 0;
                            row.insertCell(5).innerText = user.isAdmin ? '✅' : '❌';
                            row.insertCell(6).innerHTML = `
                                <button class="action-btn" onclick="quickDeposit('${user.email || user.id}', 10)">+10$</button>
                                <button class="action-btn danger" onclick="quickWithdraw('${user.email || user.id}', 10)">-10$</button>
                            `;
                        });
                    } else {
                        usersList.innerHTML = '<tr><td colspan="7" class="loading">لا يوجد لاعبين</td></tr>';
                    }
                } else {
                    showBalanceMessage(data.error || 'خطأ في تحميل البيانات', 'error');
                }
            } catch (error) {
                console.error('Error fetching stats:', error);
                showBalanceMessage('فشل الاتصال بالخادم: ' + error.message, 'error');
            }
        }

        async function quickDeposit(email, amount) {
            const token = getAdminToken();
            const userId = getUserId();
            
            if (!token || !userId) {
                showBalanceMessage('يرجى تسجيل الدخول أولاً', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${SERVER_URL}/api/admin/balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        adminToken: token, 
                        userId: email, 
                        adminId: userId, 
                        amount, 
                        action: 'deposit' 
                    })
                });
                const data = await response.json();
                
                if (data.success) {
                    showBalanceMessage(`تم إيداع ${amount}$ للمستخدم`, 'success');
                    fetchStats();
                } else {
                    showBalanceMessage(data.error, 'error');
                }
            } catch (error) {
                showBalanceMessage('خطأ في الاتصال', 'error');
            }
        }

        async function quickWithdraw(email, amount) {
            const token = getAdminToken();
            const userId = getUserId();
            
            if (!token || !userId) {
                showBalanceMessage('يرجى تسجيل الدخول أولاً', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${SERVER_URL}/api/admin/balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        adminToken: token, 
                        userId: email, 
                        adminId: userId, 
                        amount, 
                        action: 'withdraw' 
                    })
                });
                const data = await response.json();
                
                if (data.success) {
                    showBalanceMessage(`تم سحب ${amount}$ من المستخدم`, 'success');
                    fetchStats();
                } else {
                    showBalanceMessage(data.error, 'error');
                }
            } catch (error) {
                showBalanceMessage('خطأ في الاتصال', 'error');
            }
        }

        async function deposit() {
            const email = document.getElementById('targetEmail').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const token = getAdminToken();
            const userId = getUserId();
            
            if (!email || !amount) {
                showBalanceMessage('الرجاء إدخال البريد الإلكتروني والمبلغ', 'error');
                return;
            }
            
            if (!token || !userId) {
                showBalanceMessage('يرجى تسجيل الدخول أولاً', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${SERVER_URL}/api/admin/balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        adminToken: token, 
                        userId: email, 
                        adminId: userId, 
                        amount, 
                        action: 'deposit' 
                    })
                });
                const data = await response.json();
                
                if (data.success) {
                    showBalanceMessage(`تم إيداع ${amount}$ بنجاح`, 'success');
                    document.getElementById('targetEmail').value = '';
                    document.getElementById('amount').value = '';
                    fetchStats();
                } else {
                    showBalanceMessage(data.error, 'error');
                }
            } catch (error) {
                showBalanceMessage('خطأ في الاتصال', 'error');
            }
        }

        async function withdraw() {
            const email = document.getElementById('targetEmail').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const token = getAdminToken();
            const userId = getUserId();
            
            if (!email || !amount) {
                showBalanceMessage('الرجاء إدخال البريد الإلكتروني والمبلغ', 'error');
                return;
            }
            
            if (!token || !userId) {
                showBalanceMessage('يرجى تسجيل الدخول أولاً', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${SERVER_URL}/api/admin/balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        adminToken: token, 
                        userId: email, 
                        adminId: userId, 
                        amount, 
                        action: 'withdraw' 
                    })
                });
                const data = await response.json();
                
                if (data.success) {
                    showBalanceMessage(`تم سحب ${amount}$ بنجاح`, 'success');
                    document.getElementById('targetEmail').value = '';
                    document.getElementById('amount').value = '';
                    fetchStats();
                } else {
                    showBalanceMessage(data.error, 'error');
                }
            } catch (error) {
                showBalanceMessage('خطأ في الاتصال', 'error');
            }
        }

        // التحقق من صلاحية الآدمن
        async function checkAdmin() {
            const token = getAdminToken();
            const isAdmin = localStorage.getItem('isAdmin');
            const userId = getUserId();
            
            console.log('🔐 Checking admin access:', { hasToken: !!token, isAdmin, userId });
            
            if (!token || isAdmin !== 'true') {
                console.log('❌ Not admin, redirecting to login');
                alert('❌ غير مصرح بالدخول. يجب تسجيل الدخول كمشرف أولاً.');
                window.location.href = 'index.html';
                return;
            }
            
            if (!userId) {
                console.log('⚠️ No userId found in localStorage');
                alert('⚠️ خطأ: لم يتم العثور على معرف المستخدم. يرجى تسجيل الخروج وتسجيل الدخول مرة أخرى.');
                window.location.href = 'index.html';
                return;
            }
            
            console.log('✅ Admin access granted, loading data...');
            await fetchStats();
            await fetchRoomTypes();
            await fetchActiveRooms();
        }

        // ربط الأزرار
        document.getElementById('depositBtn').onclick = deposit;
        document.getElementById('withdrawBtn').onclick = withdraw;
        document.getElementById('refreshRoomsBtn').onclick = () => fetchActiveRooms();

        // بدء التشغيل
        checkAdmin();
        
        // تحديث البيانات كل 10 ثوانٍ
        setInterval(() => {
            if (getAdminToken() && getUserId()) {
                fetchStats();
                fetchRoomTypes();
                fetchActiveRooms();
            }
        }, 10000);
    </script>
</body>
</html>
